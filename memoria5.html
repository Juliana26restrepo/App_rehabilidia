<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memoria 5 - Juan: Entrenamiento 70 Escenas</title>
    <style>
        :root {
            --baby-blue: #E1F5FE;
            --ocean: #0288D1;
            --deep-blue: #01579B;
            --gold: #FFD700;
            --success: #43A047;
            --error: #E53935;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; overflow: hidden; 
            background: var(--baby-blue); 
            text-align: center; color: #2C3E50; 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            touch-action: none;
        }

        #contenedor-proporcional {
            width: 100vw; height: 100vh;
            max-width: 1280px; max-height: 800px;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }
        
        #cabecera { 
            background: rgba(255, 255, 255, 0.8); height: 12%; 
            display: flex; align-items: center; justify-content: center; 
            padding: 0 15px; border-bottom: 4px solid var(--gold); flex-shrink: 0; 
        }
        #instruccion-box { 
            background: white; padding: 10px 25px; border-radius: 30px; 
            color: var(--ocean); display: flex; align-items: center; 
            font-weight: bold; width: 95%; max-width: 700px;
            border: 3px solid var(--ocean); font-size: clamp(0.9rem, 2.5vw, 1.3rem);
        }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; position: relative; }

        #reloj-visual { 
            font-size: 2rem; background: white; padding: 10px 30px; 
            border-radius: 50px; margin-bottom: 10px; display: none; align-items: center; 
            gap: 15px; border: 4px solid var(--ocean); color: var(--ocean); font-weight: bold; 
        }
        .urgente { color: var(--error); border-color: var(--error) !important; animation: pulse 0.6s infinite; }

        #display-memorizar, #panel-reto { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .img-memoria { width: auto; max-width: 90%; max-height: 55vh; border: 8px solid white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        #grid-opciones { 
            display: flex; gap: 20px; justify-content: center; 
            margin-top: 15px; width: 100%; flex-wrap: wrap; 
        }
        .btn-tarjeta { 
            background: white; padding: 10px; border-radius: 20px; 
            cursor: pointer; border: 6px solid #CFD8DC; transition: 0.2s; 
            touch-action: manipulation; width: 45%; max-width: 400px;
        }
        .btn-tarjeta img { width: 100%; height: auto; border-radius: 10px; display: block; pointer-events: none; }
        
        .correcto { border-color: var(--success) !important; background: #E8F5E9; transform: scale(1.05); }
        .incorrecto { border-color: var(--error) !important; background: #FFEBEE; opacity: 0.7; }

        #pantalla-cambio-nivel, #overlay-final { 
            display: none; position: absolute; top:0; left:0; width:100%; height:100%; 
            z-index:5000; flex-direction:column; justify-content:center; align-items:center; padding: 20px;
        }
        #pantalla-cambio-nivel { background: var(--ocean); color: white; }
        #overlay-final { background: rgba(1, 87, 155, 0.98); color: white; }
        
        .badge-nivel { background: var(--gold); color: var(--deep-blue); padding: 15px 50px; border-radius: 50px; font-size: 2.2rem; font-weight: bold; margin-bottom: 20px; }
        .cuadro-resultados { background: white; color: var(--deep-blue); padding: 30px; border-radius: 25px; width: 90%; max-width: 500px; text-align: center; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body onload="iniciarEntrenamiento()">

<div id="contenedor-proporcional">
    <div id="cabecera">
        <div id="instruccion-box">
            <img src="COTERAPEUTA.JPG" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1041/1041916.png'">
            <span id="label-guia">¡Hola Juan! Prepárate.</span>
        </div>
    </div>

    <div id="contenedor-juego">
        <div id="reloj-visual">⏱️ <span id="segundos">8</span>s</div>

        <div id="display-memorizar">
            <img id="img-target" class="img-memoria" src="">
            <h2 id="contador-secuencia" style="margin-top:15px; font-size: 1.5rem; color: var(--deep-blue);"></h2>
        </div>

        <div id="panel-reto">
            <h2 id="pregunta-texto" style="font-size: clamp(1.2rem, 4vw, 1.8rem); margin-bottom: 10px; color: var(--deep-blue);"></h2>
            <div id="grid-opciones"></div>
        </div>
    </div>

    <div id="pantalla-cambio-nivel">
        <div class="badge-nivel" id="num-nivel-tit">NIVEL 1</div>
        <h1 id="desc-nivel" style="font-size: 2rem; width: 85%; text-align: center;"></h1>
    </div>

    <div id="overlay-final">
        <div class="cuadro-resultados">
            <h1 style="color: var(--ocean); margin-top: 0;">¡SESIÓN COMPLETADA!</h1>
            <div id="resumen-final" style="font-size: 1.3rem; margin: 20px 0; text-align: left;"></div>
            <button onpointerdown="location.reload()" style="width: 100%; padding: 20px; background: var(--gold); color: var(--deep-blue); border: none; border-radius: 15px; font-size: 1.5rem; cursor: pointer; font-weight: bold;">REPETIR SESIÓN</button>
        </div>
    </div>
</div>

<script>
    const TOTAL_ESCENAS = 70;
    let bolsaGlobal = [], nivelActual = 1, intentoActual = 0, secuenciaActual = [], pasoReconocimiento = 0;
    let aciertosGlobales = 0, erroresGlobales = 0, statsNiveles = { 1:{a:0, e:0}, 2:{a:0, e:0}, 3:{a:0, e:0} };

    const config = {
        1: { nombre: "Nivel Bajo", intentos: 3, carga: 1, desc: "Memoriza una sola imagen." },
        2: { nombre: "Nivel Medio", intentos: 4, carga: 2, desc: "Ahora recuerda el orden de 2 imágenes." },
        3: { nombre: "Nivel Alto", intentos: 5, carga: 3, desc: "¡Máximo reto! Recuerda 3 imágenes." }
    };

    let timerInterval, bloqueado = false;

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        msg.rate = 0.9;
        
        // Regla de los 10 segundos para la voz
        let fallSafe = setTimeout(() => { if(callback) callback(); }, 10000);
        
        msg.onend = () => { 
            clearTimeout(fallSafe);
            if(callback) callback(); 
        };
        window.speechSynthesis.speak(msg);
    }

    function iniciarEntrenamiento() {
        bolsaGlobal = Array.from({length: TOTAL_ESCENAS}, (_, i) => i + 1).sort(() => 0.5 - Math.random());
        presentarCambioNivel();
    }

    function presentarCambioNivel() {
        const c = config[nivelActual];
        const pantalla = document.getElementById('pantalla-cambio-nivel');
        document.getElementById('num-nivel-tit').innerText = c.nombre.toUpperCase();
        document.getElementById('desc-nivel').innerText = c.desc;
        pantalla.style.display = 'flex';
        
        hablar(`Juan, iniciamos el ${c.nombre}. ${c.desc}`, () => {
            setTimeout(() => {
                pantalla.style.display = 'none';
                intentoActual = 0;
                iniciarIntento();
            }, 2000);
        });
    }

    function iniciarIntento() {
        pasoReconocimiento = 0;
        secuenciaActual = [];
        const c = config[nivelActual];
        for(let i=0; i<c.carga; i++) {
            if(bolsaGlobal.length === 0) iniciarEntrenamiento();
            secuenciaActual.push(bolsaGlobal.shift());
        }
        mostrarSecuencia(0);
    }

    function mostrarSecuencia(idx) {
        document.getElementById('panel-reto').style.display = 'none';
        document.getElementById('display-memorizar').style.display = 'flex';
        
        if(idx < secuenciaActual.length) {
            const num = secuenciaActual[idx];
            document.getElementById('img-target').src = `mem5/escena${num}.png`;
            document.getElementById('contador-secuencia').innerText = `Imagen ${idx + 1} de ${secuenciaActual.length}`;
            document.getElementById('label-guia').innerText = "Juan, observa esta imagen.";
            
            hablar("Mira bien esta escena.", () => {
                iniciarReloj(8, () => mostrarSecuencia(idx + 1));
            });
        } else {
            prepararReconocimiento();
        }
    }

    function iniciarReloj(segundos, finCallback) {
        clearInterval(timerInterval);
        const reloj = document.getElementById('reloj-visual');
        const span = document.getElementById('segundos');
        reloj.classList.remove('urgente');
        reloj.style.display = 'flex';
        let restante = segundos;
        span.innerText = restante;

        timerInterval = setInterval(() => {
            restante--;
            span.innerText = restante;
            if(restante <= 3) reloj.classList.add('urgente');
            if(restante <= 0) {
                clearInterval(timerInterval);
                reloj.style.display = 'none';
                finCallback();
            }
        }, 1000);
    }

    function prepararReconocimiento() {
        bloqueado = false;
        document.getElementById('display-memorizar').style.display = 'none';
        document.getElementById('panel-reto').style.display = 'flex';
        
        const numCorrecto = secuenciaActual[pasoReconocimiento];
        const pregunta = (secuenciaActual.length === 1) ? "¿Cuál imagen acabas de ver?" : `¿Cuál era la imagen número ${pasoReconocimiento + 1}?`;
        
        document.getElementById('pregunta-texto').innerText = pregunta;
        document.getElementById('label-guia').innerText = pregunta;
        
        const grid = document.getElementById('grid-opciones');
        grid.innerHTML = "";

        let opciones = [
            { id: numCorrecto, img: `escena${numCorrecto}.png`, esCorrecta: true },
            { id: numCorrecto, img: `escena${numCorrecto}b.png`, esCorrecta: false }
        ].sort(() => 0.5 - Math.random());

        opciones.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'btn-tarjeta';
            btn.innerHTML = `<img src="mem5/${opt.img}" onerror="this.src='https://via.placeholder.com/400x300?text=Error'">`;
            btn.onpointerdown = (e) => { if(!bloqueado) verificar(opt.esCorrecta, btn); };
            grid.appendChild(btn);
        });

        hablar(pregunta);
    }

    function verificar(esCorrecta, el) {
        bloqueado = true;
        if(esCorrecta) {
            el.classList.add('correcto');
            aciertosGlobales++;
            statsNiveles[nivelActual].a++;
            hablar("¡Excelente!", () => {
                setTimeout(() => {
                    pasoReconocimiento++;
                    if(pasoReconocimiento < secuenciaActual.length) prepararReconocimiento();
                    else proximoIntento();
                }, 1000);
            });
        } else {
            el.classList.add('incorrecto');
            erroresGlobales++;
            statsNiveles[nivelActual].e++;
            hablar("Esa tenía un cambio. Ánimo.", () => {
                setTimeout(proximoIntento, 1500);
            });
        }
    }

    function proximoIntento() {
        intentoActual++;
        if(intentoActual < config[nivelActual].intentos) {
            iniciarIntento();
        } else if(nivelActual < 3) {
            nivelActual++;
            presentarCambioNivel();
        } else {
            finalizarSesion();
        }
    }

    function finalizarSesion() {
        const total = aciertosGlobales + erroresGlobales;
        const eficacia = Math.round((aciertosGlobales / total) * 100);
        
        let historial = JSON.parse(localStorage.getItem('sesiones_rehabilitidia') || "[]");
        historial.push({ fecha: new Date().toLocaleDateString(), modulo: "Memoria", id_sesion: 5, aciertos: aciertosGlobales, errores: erroresGlobales, eficacia: eficacia + "%" });
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(historial));

        document.getElementById('panel-reto').style.display = 'none';
        document.getElementById('resumen-final').innerHTML = `
            <p>Nivel Bajo: ${Math.round((statsNiveles[1].a / (statsNiveles[1].a + statsNiveles[1].e || 1)) * 100)}%</p>
            <p>Nivel Medio: ${Math.round((statsNiveles[2].a / (statsNiveles[2].a + statsNiveles[2].e || 1)) * 100)}%</p>
            <p>Nivel Alto: ${Math.round((statsNiveles[3].a / (statsNiveles[3].a + statsNiveles[3].e || 1)) * 100)}%</p>
            <h2 style="color:var(--ocean)">Eficacia Total: ${eficacia}%</h2>
        `;
        document.getElementById('overlay-final').style.display = 'flex';
        hablar("¡Muy bien Juan! Hemos terminado el entrenamiento de las 70 escenas.");
    }
</script>
</body>
</html>

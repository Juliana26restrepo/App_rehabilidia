<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 3: Atención - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p-blue: #103A57; --green: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; overflow: hidden; }
        
        /* Pantalla de inicio */
        #overlay-inicio {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(16, 58, 87, 0.98); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        /* CONTENEDOR CON SCROLL HORIZONTAL */
        #viewport {
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
        }

        #game-world {
            position: relative; 
            width: 150vw; /* Mundo más ancho que la pantalla */
            height: 100vh;
            background: url('img/fondo_habitacion3.jpg') no-repeat center center;
            background-size: cover;
            display: none;
        }

        /* METAS DISTRIBUIDAS */
        .contenedor-metas {
            position: absolute; top: 40%; width: 100%;
            display: flex; justify-content: space-around; padding: 0 100px;
            box-sizing: border-box;
        }
        .drop-zone {
            width: 200px; height: 240px; 
            border: 4px dashed rgba(255,255,255,0.6);
            border-radius: 20px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(255,255,255,0.1);
        }
        .drop-zone img { width: 130px; }
        .drop-zone span { color: white; font-weight: bold; font-size: 20px; margin-top: 10px; }

        /* CUADRÍCULA DE OBJETOS (2x5) */
        #grid-objetos {
            position: absolute; bottom: 5%; left: 10vw;
            width: 80vw; height: 25vh;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 15px;
            z-index: 100;
        }
        .grid-cell {
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .draggable {
            width: 90px; height: 90px; 
            filter: drop-shadow(0 5px 8px rgba(0,0,0,0.5));
            cursor: grab; touch-action: none;
        }

        /* COTERAPEUTA FIJO (No se mueve con el scroll) */
        #ui-fija {
            position: fixed; width: 100vw; height: 100vh;
            top: 0; left: 0; pointer-events: none; z-index: 500;
        }
        #coterapeuta-box {
            position: absolute; bottom: 20px; left: 20px;
            display: flex; align-items: flex-end; pointer-events: auto;
        }
        #avatar-guia { width: 150px; border-radius: 15px; border: 3px solid white; background: white; }
        #bocadillo {
            background: white; border-radius: 15px; padding: 12px;
            margin-bottom: 80px; margin-left: -10px; max-width: 220px;
            font-size: 0.9rem; font-weight: bold; color: var(--p-blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: none;
        }

        header {
            position: fixed; top: 0; width: 100%; padding: 15px;
            background: rgba(16, 58, 87, 0.9); color: white;
            display: flex; justify-content: space-between; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="overlay-inicio">
    <img src="COTERAPEUTA.JPG" style="width: 180px; border-radius: 50%; margin-bottom: 20px;">
    <h2>Sesión 3: Atención</h2>
    <button style="padding: 20px 40px; background: var(--green); color: white; border: none; border-radius: 50px; font-size: 1.5rem; font-weight: bold;" 
            onclick="iniciar()">¡COMENZAR!</button>
</div>

<header id="header-app" style="display:none;">
    <a href="perfil_paciente.html" style="color:white; text-decoration:none;"><i class="fas fa-arrow-left"></i> Volver</a>
    <div id="hits-display">ACIERTO: 0/3</div>
</header>

<div id="viewport">
    <div id="game-world">
        <img src="img/D_mosca.png" id="mosca" style="position:absolute; width:70px; display:none; z-index:600;">
        
        <div class="contenedor-metas">
            <div class="drop-zone" data-type="R">
                <img src="img/meta_armario.png"><span>ARMARIO</span>
            </div>
            <div class="drop-zone" data-type="L">
                <img src="img/meta_estante.png"><span>ESTANTE</span>
            </div>
            <div class="drop-zone" data-type="B">
                <img src="img/meta_cesto.png"><span>CESTO</span>
            </div>
        </div>

        <div id="grid-objetos"></div>
    </div>
</div>

<div id="ui-fija">
    <div id="coterapeuta-box">
        <img src="COTERAPEUTA.JPG" id="avatar-guia">
        <div id="bocadillo"></div>
    </div>
</div>

<script>
    let nivel = 1;
    let aciertos = 0;
    const config = { 
        1: { items: 1, dist: 0 }, 
        2: { items: 2, dist: 3 }, 
        3: { items: 3, dist: 5 } 
    };

    function hablar(mensaje) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(mensaje);
        msg.lang = 'es-ES';
        window.speechSynthesis.speak(msg);
        const b = document.getElementById('bocadillo');
        b.innerText = mensaje; b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 5000);
    }

    function iniciar() {
        document.getElementById('overlay-inicio').style.display = 'none';
        document.getElementById('game-world').style.display = 'block';
        document.getElementById('header-app').style.display = 'flex';
        hablar("¡Hola! Vamos a organizar la habitación. Pon la ropa en el armario, los libros en el estante y la basura en el cesto.");
        generarNivel();
    }

    function generarNivel() {
        const grid = document.getElementById('grid-objetos');
        grid.innerHTML = "";
        aciertos = 0;
        const c = config[nivel];
        document.getElementById('hits-display').innerText = `ACIERTO: 0/${c.items * 3}`;

        // Crear pool de objetos (Diana + Distractores)
        let pool = [];
        ['R', 'L', 'B'].forEach(tipo => {
            let nums = [1,2,3,4,5].sort(() => Math.random() - 0.5);
            for(let i=0; i<c.items; i++) pool.push({tipo: tipo, img: `${tipo}${nums[i]}`});
        });
        for(let i=0; i<c.dist; i++) pool.push({tipo: 'D', img: `D${Math.floor(Math.random()*5)+1}`});

        // Barajar pool
        pool.sort(() => Math.random() - 0.5);

        // Crear las 10 celdas de la cuadrícula
        for(let i=0; i<10; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            if(pool[i]) {
                const img = document.createElement('img');
                img.src = `img/${pool[i].img}.png`;
                img.className = 'draggable';
                img.dataset.tipo = pool[i].tipo;
                makeDraggable(img);
                cell.appendChild(img);
            }
            grid.appendChild(cell);
        }

        // Mosca en Nivel 3
        const mosca = document.getElementById('mosca');
        if(nivel === 3) { mosca.style.display = 'block'; moverMosca(); }
    }

    function makeDraggable(el) {
        let x, y, startX, startY;
        el.onmousedown = el.ontouchstart = (e) => {
            const ev = e.touches ? e.touches[0] : e;
            startX = el.offsetLeft; startY = el.offsetTop;
            x = ev.clientX; y = ev.clientY;
            el.style.position = 'fixed';
            el.style.left = ev.clientX - 45 + "px";
            el.style.top = ev.clientY - 45 + "px";
            el.style.zIndex = 1000;

            document.onmousemove = document.ontouchmove = (m) => {
                const mev = m.touches ? m.touches[0] : m;
                el.style.left = mev.clientX - 45 + "px";
                el.style.top = mev.clientY - 45 + "px";
            };

            document.onmouseup = document.ontouchend = (up) => {
                document.onmousemove = document.ontouchmove = null;
                verificar(el, up.touches ? up.changedTouches[0] : up);
            };
        };
    }

    function verificar(obj, pos) {
        const metas = document.querySelectorAll('.drop-zone');
        let acerto = false;

        metas.forEach(m => {
            const r = m.getBoundingClientRect();
            if (pos.clientX > r.left && pos.clientX < r.right && pos.clientY > r.top && pos.clientY < r.bottom) {
                if (obj.dataset.tipo === m.dataset.type) {
                    obj.style.display = "none";
                    aciertos++;
                    document.getElementById('hits-display').innerText = `ACIERTO: ${aciertos}/${config[nivel].items*3}`;
                    hablar("¡Muy bien!");
                    cambiarAvatar("COTERAPEUTA_FELIZ.JPG");
                    acerto = true;
                } else if (obj.dataset.tipo !== 'D') {
                    hablar("Ese no va ahí.");
                    cambiarAvatar("COTERAPEUTA_PENSATIVO.JPG");
                }
            }
        });

        if (!acerto) {
            obj.style.position = 'relative';
            obj.style.left = '0'; obj.style.top = '0';
        }

        if (aciertos === config[nivel].items * 3) {
            nivel++;
            if(nivel <= 3) {
                setTimeout(() => {
                    hablar("¡Vas muy bien! Sigamos organizando.");
                    generarNivel();
                }, 1500);
            } else {
                hablar("¡Excelente trabajo! Has terminado.");
                setTimeout(() => window.location.href="perfil_paciente.html", 3000);
            }
        }
    }

    function moverMosca() {
        if(nivel !== 3) return;
        const m = document.getElementById('mosca');
        m.style.left = Math.random() * 140 + "vw";
        m.style.top = Math.random() * 80 + "vh";
        setTimeout(moverMosca, 1000);
    }

    function cambiarAvatar(src) {
        const a = document.getElementById('avatar-guia');
        a.src = src;
        setTimeout(() => a.src = "COTERAPEUTA.JPG", 2000);
    }
</script>
</body>
</html>

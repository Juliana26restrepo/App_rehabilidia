<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atención 3 - REHABILIDIA</title>
    <style>
        :root { --p-blue: #103A57; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; overflow: hidden; }
        
        /* 1. SCROLL HORIZONTAL ACTIVO */
        #game-viewport {
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
        }

        #game-world {
            width: 180vw; height: 100vh; /* Mundo ancho para mover la cámara */
            background: url('img/fondo_habitacion3.jpg') no-repeat center center;
            background-size: cover; position: relative;
        }

        /* 2. METAS GIGANTES */
        .contenedor-metas {
            position: absolute; top: 30%; width: 100%;
            display: flex; justify-content: space-around; padding: 0 50px;
        }
        .drop-zone {
            width: 280px; height: 320px; /* Tamaño máximo para tablet */
            border: 6px dashed rgba(255,255,255,0.5);
            border-radius: 30px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(255,255,255,0.1);
        }
        .drop-zone img { width: 180px; }
        .drop-zone span { color: white; font-weight: bold; font-size: 26px; margin-top: 15px; text-shadow: 2px 2px 4px #000; }

        /* 3. ÁREA DE OBJETOS (Para que no se salgan) */
        #area-objetos {
            position: fixed; bottom: 5%; left: 5%; width: 90%; height: 25%;
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
            z-index: 10; pointer-events: none;
        }
        .celda { display: flex; align-items: center; justify-content: center; }
        .draggable { width: 100px; height: 100px; cursor: grab; pointer-events: auto; touch-action: none; }

        /* 4. COTERAPEUTA FIJO (Estilo Ejercicio 2) */
        #coterapeuta-box {
            position: fixed; bottom: 20px; left: 20px;
            display: flex; align-items: flex-end; z-index: 1000;
        }
        #avatar-guia { width: 180px; border-radius: 20px; border: 4px solid white; background: white; }
        #bocadillo {
            background: white; border-radius: 20px; padding: 15px 20px;
            margin-bottom: 120px; margin-left: -30px; max-width: 250px;
            font-size: 1.1rem; font-weight: bold; color: var(--p-blue);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); display: none; position: relative;
        }

        #hits-display { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 10px; font-size: 1.5rem; z-index: 1100; }
    </style>
</head>
<body>

<div id="hits-display">ACIERTO: 0/3</div>

<div id="game-viewport">
    <div id="game-world">
        <div class="contenedor-metas">
            <div class="drop-zone" data-type="R"><img src="img/meta_armario.png"><span>ARMARIO</span></div>
            <div class="drop-zone" data-type="L"><img src="img/meta_estante.png"><span>ESTANTE</span></div>
            <div class="drop-zone" data-type="B"><img src="img/meta_cesto.png"><span>CESTO</span></div>
        </div>
    </div>
</div>

<div id="area-objetos"></div>

<div id="coterapeuta-box">
    <div id="bocadillo"></div>
    <img src="COTERAPEUTA.JPG" id="avatar-guia">
</div>

<script>
    let nivel = 1; let aciertos = 0;
    const config = { 1: 1, 2: 2, 3: 3 };

    function hablar(msg) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(msg);
        utterance.lang = 'es-ES';
        window.speechSynthesis.speak(utterance);
        const b = document.getElementById('bocadillo');
        b.innerText = msg; b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 5000);
    }

    function generarNivel() {
        const area = document.getElementById('area-objetos');
        area.innerHTML = ""; aciertos = 0;
        let pool = [];
        ['R', 'L', 'B'].forEach(t => {
            for(let i=0; i<config[nivel]; i++) pool.push({t: t, img: `${t}${Math.floor(Math.random()*5)+1}`});
        });
        pool.sort(() => Math.random() - 0.5);
        pool.forEach(obj => {
            const div = document.createElement('div');
            div.className = "celda";
            const img = document.createElement('img');
            img.src = `img/${obj.img}.png`; img.className = "draggable"; img.dataset.tipo = obj.t;
            makeDraggable(img);
            div.appendChild(img);
            area.appendChild(div);
        });
    }

    function makeDraggable(el) {
        let x, y;
        el.ontouchstart = (e) => {
            el.style.position = 'fixed';
            el.style.zIndex = 2000;
            const move = (me) => {
                const touch = me.touches[0];
                el.style.left = (touch.clientX - 50) + 'px';
                el.style.top = (touch.clientY - 50) + 'px';
            };
            const end = (ee) => {
                document.removeEventListener('touchmove', move);
                document.removeEventListener('touchend', end);
                verificar(el, ee.changedTouches[0]);
            };
            document.addEventListener('touchmove', move, {passive: false});
            document.addEventListener('touchend', end);
        };
    }

    function verificar(el, pos) {
        const metas = document.querySelectorAll('.drop-zone');
        let acerto = false;
        metas.forEach(m => {
            const rect = m.getBoundingClientRect();
            if(pos.clientX > rect.left && pos.clientX < rect.right && pos.clientY > rect.top && pos.clientY < rect.bottom) {
                if(el.dataset.tipo === m.dataset.type) {
                    el.style.display = 'none'; aciertos++; acerto = true;
                    document.getElementById('hits-display').innerText = `ACIERTO: ${aciertos}/${config[nivel]*3}`;
                    hablar("¡Excelente!");
                    document.getElementById('avatar-guia').src = "COTERAPEUTA_FELIZ.JPG";
                    setTimeout(() => document.getElementById('avatar-guia').src = "COTERAPEUTA.JPG", 2000);
                }
            }
        });
        if(!acerto) {
            el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0';
            hablar("Ese no va ahí");
            document.getElementById('avatar-guia').src = "COTERAPEUTA_PENSATIVO.JPG";
            setTimeout(() => document.getElementById('avatar-guia').src = "COTERAPEUTA.JPG", 2000);
        }
        if(aciertos === config[nivel]*3) {
            nivel++;
            if(nivel <= 3) setTimeout(generarNivel, 2000);
            else hablar("¡Has terminado el ejercicio!");
        }
    }

    window.onload = () => { hablar("¡Hola! Vamos a ordenar la habitación."); generarNivel(); };
</script>
</body>
</html>

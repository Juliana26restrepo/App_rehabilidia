<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 3: Atención - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --p-blue: #103A57; --t-blue: #307B8E; --bg: #F4F7F9;
            --white: #ffffff; --green: #2ecc71; --red: #e74c3c;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #222; overflow: hidden; touch-action: none; }
        
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: url('img/fondo_habitacion3.jpg') no-repeat center center;
            background-size: cover;
        }

        /* Pantalla de inicio necesaria para activar el Audio */
        #overlay-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(16, 58, 87, 0.95); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; padding: 20px;
        }
        .btn-comenzar {
            padding: 20px 50px; border-radius: 50px; border: none;
            background: var(--green); color: white; font-size: 1.8rem;
            font-weight: bold; cursor: pointer; box-shadow: 0 8px 0 #27ae60;
        }

        header {
            position: absolute; top: 0; width: 100%; padding: 15px;
            background: rgba(16, 58, 87, 0.9); color: white;
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
            box-sizing: border-box;
        }

        .drop-zone {
            position: absolute; border: 2px dashed rgba(255,255,255,0.4);
            border-radius: 15px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: rgba(255,255,255,0.1);
        }
        .drop-zone img { width: 70%; pointer-events: none; }

        #zona-armario { bottom: 8%; left: 5%; width: 26%; height: 58%; }
        #zona-estante { top: 18%; right: 4%; width: 24%; height: 38%; }
        #zona-cesto { bottom: 6%; right: 10%; width: 20%; height: 30%; }

        .draggable {
            position: absolute; width: 85px; height: 85px; z-index: 5;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6)); object-fit: contain;
            touch-action: none; cursor: grab;
        }

        /* COTERAPEUTA */
        #coterapeuta-box {
            position: absolute; bottom: 10px; left: 10px;
            display: flex; align-items: flex-end; z-index: 20;
            pointer-events: none;
        }
        #avatar-guia { width: 160px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4)); border-radius: 10px; }
        #bocadillo {
            background: white; border-radius: 15px; padding: 15px;
            margin-bottom: 90px; margin-left: -15px; max-width: 220px;
            font-size: 0.95rem; font-weight: bold; color: var(--p-blue);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: relative;
            display: none;
        }
        #bocadillo::after {
            content: ''; position: absolute; left: -10px; bottom: 15px;
            border-top: 10px solid transparent; border-bottom: 10px solid transparent;
            border-right: 10px solid white;
        }
    </style>
</head>
<body>

<div id="overlay-inicio">
    <img src="img/COTERAPEUTA.JPG" style="width: 200px; border-radius: 20px; margin-bottom: 20px;">
    <h2>Sesión 3: Atención Sostenida</h2>
    <p>Ayúdame a organizar la habitación</p>
    <button class="btn-comenzar" onclick="empezarJuego()">COMENZAR</button>
</div>

<audio id="audio-guia" src="audio/instruccion_atencion3.mp3"></audio>

<header>
    <a href="perfil_paciente.html" style="color:white; text-decoration:none;"><i class="fas fa-arrow-left"></i> Volver</a>
    <div style="font-weight: bold;">NIVEL: <span id="current-level">BAJO</span></div>
    <div><i class="fas fa-check-circle"></i> <span id="hits">0</span>/<span id="total-needed">3</span></div>
</header>

<div id="game-container">
    <div id="zona-armario" class="drop-zone" data-type="R">
        <img src="img/meta_armario.png">
        <span style="color:white; font-size:12px; font-weight: bold;">ARMARIO</span>
    </div>
    <div id="zona-estante" class="drop-zone" data-type="L">
        <img src="img/meta_estante.png">
        <span style="color:white; font-size:12px; font-weight: bold;">ESTANTE</span>
    </div>
    <div id="zona-cesto" class="drop-zone" data-type="B">
        <img src="img/meta_cesto.png">
        <span style="color:white; font-size:12px; font-weight: bold;">CESTO</span>
    </div>

    <div id="objects-layer"></div>
    <img src="img/D_mosca.png" id="mosca" style="position:absolute; width:45px; display:none; z-index:9;">

    <div id="coterapeuta-box">
        <img src="img/COTERAPEUTA.JPG" id="avatar-guia">
        <div id="bocadillo">¡Hola! Pon la ropa en el armario, los libros en el estante y la basura al cesto. ¡Cuidado con la mosca!</div>
    </div>
</div>

<script>
    let nivel = 1;
    let aciertos = 0;
    const config = { 1: { name: "BAJO", items: 1, dist: 0 }, 2: { name: "MEDIO", items: 2, dist: 2 }, 3: { name: "ALTO", items: 3, dist: 4 } };

    function empezarJuego() {
        document.getElementById('overlay-inicio').style.display = 'none';
        const audio = document.getElementById('audio-guia');
        audio.play().catch(e => console.log("Error audio:", e));
        
        document.getElementById('bocadillo').style.display = 'block';
        setTimeout(() => { document.getElementById('bocadillo').style.display = 'none'; }, 8000);
        init();
    }

    function init() {
        aciertos = 0;
        const c = config[nivel];
        document.getElementById('current-level').innerText = c.name;
        document.getElementById('total-needed').innerText = c.items * 3;
        document.getElementById('hits').innerText = "0";
        document.getElementById('objects-layer').innerHTML = "";
        
        ['R','L','B'].forEach(tipo => {
            for(let i=0; i<c.items; i++) { createObj(`${tipo}${Math.floor(Math.random()*5)+1}`, tipo); }
        });
        for(let i=1; i<=c.dist; i++) { createObj(`D${i}`, 'D'); }

        if(nivel === 3) { document.getElementById('mosca').style.display = 'block'; moverMosca(); }
    }

    function createObj(name, tipo) {
        const img = document.createElement('img');
        img.src = `img/${name}.png`; 
        img.className = 'draggable';
        img.dataset.tipo = tipo;
        img.style.left = (Math.random() * 40 + 30) + "%";
        img.style.top = (Math.random() * 30 + 35) + "%";
        setupDrag(img);
        document.getElementById('objects-layer').appendChild(img);
    }

    function setupDrag(el) {
        let x1=0, y1=0;
        el.onmousedown = el.ontouchstart = (e) => {
            x1 = e.clientX || e.touches[0].clientX;
            y1 = e.clientY || e.touches[0].clientY;
            el.style.zIndex = 100;
            document.onmousemove = document.ontouchmove = (ev) => {
                let cx = ev.clientX || ev.touches[0].clientX;
                let cy = ev.clientY || ev.touches[0].clientY;
                el.style.top = (el.offsetTop - (y1 - cy)) + "px";
                el.style.left = (el.offsetLeft - (x1 - cx)) + "px";
                x1 = cx; y1 = cy;
            };
            document.onmouseup = document.ontouchend = () => {
                document.onmousemove = document.ontouchmove = null;
                el.style.zIndex = 5;
                checkDrop(el);
            };
        };
    }

    function checkDrop(obj) {
        const r = obj.getBoundingClientRect();
        const metas = document.querySelectorAll('.drop-zone');
        let zonaToca = false;

        metas.forEach(m => {
            const mr = m.getBoundingClientRect();
            if (r.left < mr.right && r.right > mr.left && r.top < mr.bottom && r.bottom > mr.top) {
                zonaToca = true;
                if(obj.dataset.tipo === m.dataset.type) {
                    obj.style.display = "none";
                    aciertos++;
                    document.getElementById('hits').innerText = aciertos;
                    cambiarAvatar("FELIZ");
                    if(aciertos == config[nivel].items * 3) setTimeout(nextLevel, 1000);
                } else {
                    obj.style.top = "50%"; obj.style.left = "50%";
                    cambiarAvatar("PENSATIVO");
                }
            }
        });
    }

    function cambiarAvatar(estado) {
        const avatar = document.getElementById('avatar-guia');
        // Nombres exactos de tus archivos
        if(estado === "FELIZ") {
            avatar.src = "img/COTERAPUETA_FELIZ.JPG";
        } else {
            avatar.src = "img/COTERAPUETA_PENSATIVO.JPG";
        }
        
        // Vuelve al normal (COTERAPEUTA.JPG) tras 2 segundos
        setTimeout(() => { avatar.src = "img/COTERAPEUTA.JPG"; }, 2000);
    }

    function nextLevel() {
        if(nivel < 3) { nivel++; alert("¡Muy bien hecho! Siguiente nivel."); init(); }
        else { alert("¡Excelente! Habitación ordenada."); window.location.href = "perfil_paciente.html"; }
    }

    function moverMosca() {
        const m = document.getElementById('mosca');
        if(nivel === 3 && m) {
            m.style.left = Math.random() * 80 + "%"; m.style.top = Math.random() * 80 + "%";
            m.style.transition = "1.5s linear"; setTimeout(moverMosca, 1500);
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atención 3 - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p-blue: #103A57; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; overflow: hidden; }
        
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: url('img/fondo_habitacion3.jpg') no-repeat center center;
            background-size: cover;
        }

        /* COTERAPEUTA ESTILO EJERCICIO 2 (BOCADILLO AZUL ARRIBA) */
        #coterapeuta-top {
            position: absolute; top: 80px; left: 50%;
            transform: translateX(-50%);
            display: flex; align-items: center;
            background: white; border: 3px solid #307B8E;
            border-radius: 50px; padding: 10px 30px;
            width: 80%; max-width: 600px; z-index: 1000;
        }
        #avatar-circulo {
            width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid #307B8E; margin-right: 20px;
            background: white; object-fit: cover;
        }
        #texto-guia { font-size: 1.2rem; font-weight: bold; color: var(--p-blue); margin: 0; }

        /* METAS ORGANIZADAS */
        .contenedor-metas {
            position: absolute; top: 35%; width: 100%;
            display: flex; justify-content: space-around; padding: 0 20px;
            box-sizing: border-box;
        }
        .drop-zone {
            width: 220px; height: 260px;
            border: 4px dashed rgba(255,255,255,0.5);
            border-radius: 20px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(255,255,255,0.1);
        }
        .drop-zone img { width: 140px; }
        .drop-zone span { color: white; font-weight: bold; font-size: 1.2rem; margin-top: 10px; text-shadow: 2px 2px 4px #000; }

        /* ZONA DE OBJETOS (PARA QUE SE VEAN) */
        #zona-suelo {
            position: absolute; bottom: 5%; left: 0; width: 100%; height: 20%;
            display: flex; justify-content: center; gap: 20px; align-items: center;
        }
        .draggable { width: 110px; height: 110px; cursor: grab; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); touch-action: none; }

        header { position: absolute; top: 0; width: 100%; padding: 15px; background: rgba(16, 58, 87, 0.9); color: white; display: flex; justify-content: space-between; align-items: center; z-index: 1100; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <a href="perfil_paciente.html" style="color:white; text-decoration:none;"><i class="fas fa-arrow-left"></i> Volver</a>
    <div id="hits-display" style="font-size: 1.4rem; font-weight: bold;">ACIERTO: 0/3</div>
</header>

<div id="game-container">
    <div id="coterapeuta-top">
        <img src="COTERAPEUTA.JPG" id="avatar-circulo">
        <p id="texto-guia">¡Hola! Vamos a ordenar la habitación.</p>
    </div>

    <div class="contenedor-metas">
        <div class="drop-zone" data-type="R"><img src="img/meta_armario.png"><span>ARMARIO</span></div>
        <div class="drop-zone" data-type="L"><img src="img/meta_estante.png"><span>ESTANTE</span></div>
        <div class="drop-zone" data-type="B"><img src="img/meta_cesto.png"><span>CESTO</span></div>
    </div>

    <div id="zona-suelo"></div>
</div>

<script>
    let nivel = 1; let aciertos = 0;
    const itemsNivel = { 1: 1, 2: 2, 3: 3 };

    function hablar(mensaje, emocion = 'NORMAL') {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(mensaje);
        msg.lang = 'es-ES';
        window.speechSynthesis.speak(msg);
        
        document.getElementById('texto-guia').innerText = mensaje;
        const img = document.getElementById('avatar-circulo');
        
        if(emocion === 'FELIZ') img.src = "COTERAPEUTA_FELIZ.JPG";
        else if(emocion === 'PENSATIVO') img.src = "COTERAPEUTA_PENSATIVO.JPG";
        else img.src = "COTERAPEUTA.JPG";

        if(emocion !== 'NORMAL') setTimeout(() => img.src = "COTERAPEUTA.JPG", 2500);
    }

    function generarObjetos() {
        const suelo = document.getElementById('zona-suelo');
        suelo.innerHTML = ""; aciertos = 0;
        let pool = [];
        ['R', 'L', 'B'].forEach(tipo => {
            for(let i=0; i<itemsNivel[nivel]; i++) {
                pool.push({tipo: tipo, img: `${tipo}${Math.floor(Math.random()*5)+1}.png`});
            }
        });
        pool.sort(() => Math.random() - 0.5).forEach(item => {
            const img = document.createElement('img');
            img.src = `img/${item.img}`;
            img.className = 'draggable';
            img.dataset.tipo = item.tipo;
            makeDraggable(img);
            suelo.appendChild(img);
        });
        document.getElementById('hits-display').innerText = `ACIERTO: 0/${itemsNivel[nivel]*3}`;
    }

    function makeDraggable(el) {
        let startX, startY;
        el.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            el.style.position = 'fixed';
            el.style.zIndex = 2000;
            const move = (me) => {
                me.preventDefault();
                const t = me.touches[0];
                el.style.left = (t.clientX - 55) + 'px';
                el.style.top = (t.clientY - 55) + 'px';
            };
            const end = (ee) => {
                document.removeEventListener('touchmove', move);
                document.removeEventListener('touchend', end);
                verificar(el, ee.changedTouches[0]);
            };
            document.addEventListener('touchmove', move, {passive: false});
            document.addEventListener('touchend', end);
        });
    }

    function verificar(el, pos) {
        const metas = document.querySelectorAll('.drop-zone');
        let acerto = false;
        metas.forEach(m => {
            const r = m.getBoundingClientRect();
            if(pos.clientX > r.left && pos.clientX < r.right && pos.clientY > r.top && pos.clientY < r.bottom) {
                if(el.dataset.tipo === m.dataset.type) {
                    el.style.display = 'none'; aciertos++; acerto = true;
                    document.getElementById('hits-display').innerText = `ACIERTO: ${aciertos}/${itemsNivel[nivel]*3}`;
                    hablar("¡Muy bien hecho!", "FELIZ");
                }
            }
        });
        if(!acerto) {
            el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0';
            hablar("Ese no va ahí.", "PENSATIVO");
        }
        if(aciertos === itemsNivel[nivel]*3) {
            nivel++;
            if(nivel <= 3) setTimeout(generarObjetos, 2000);
            else { hablar("¡Felicidades! Terminaste."); setTimeout(()=>window.location.href="perfil_paciente.html",3000); }
        }
    }

    window.onload = () => { generarObjetos(); hablar("¡Hola! Pon la ropa en el armario, libros al estante y basura al cesto."); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atención 3 - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p-blue: #103A57; --green: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; overflow: hidden; touch-action: none; }
        
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: url('img/fondo_habitacion3.jpg') no-repeat center center;
            background-size: cover; display: none;
        }

        /* METAS: Posición central y tamaño grande */
        .contenedor-metas {
            position: absolute; top: 35%; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 30px; z-index: 5;
            width: 90%; justify-content: center;
        }
        .drop-zone {
            width: 200px; height: 220px; 
            border: 4px dashed rgba(255,255,255,0.5);
            border-radius: 20px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(255,255,255,0.1);
        }
        .drop-zone img { width: 140px; pointer-events: none; }
        .drop-zone span { color: white; font-weight: bold; font-size: 20px; margin-top: 10px; text-shadow: 2px 2px 4px #000; }

        /* CUADRÍCULA SEGURA: Aquí los objetos NUNCA se salen */
        #area-suelo-segura {
            position: absolute; bottom: 5%; left: 5%;
            width: 90%; height: 30%;
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(2, 1fr);
            gap: 10px; z-index: 10;
            /* background: rgba(255,255,255,0.05); /* Opcional: para ver el área */
        }
        .celda {
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .draggable {
            width: 100px; height: 100px; /* Tamaño ideal para tablet */
            cursor: grab; touch-action: none;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        /* COTERAPEUTA */
        #coterapeuta-box {
            position: absolute; bottom: 15px; left: 15px;
            display: flex; align-items: flex-end; z-index: 100;
        }
        #avatar-guia { width: 160px; border-radius: 15px; border: 4px solid white; background: white; }
        #bocadillo {
            background: white; border-radius: 20px; padding: 15px;
            margin-bottom: 90px; margin-left: -10px; max-width: 250px;
            font-size: 1rem; font-weight: bold; color: var(--p-blue);
            box-shadow: 0 5px 20px rgba(0,0,0,0.4); display: none;
        }

        #mosca { position: absolute; width: 60px; z-index: 200; display: none; pointer-events: none; }

        #overlay-inicio {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(16, 58, 87, 0.98); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
    </style>
</head>
<body>

<div id="overlay-inicio">
    <img src="COTERAPEUTA.JPG" style="width: 200px; border-radius: 50%; border: 5px solid white; margin-bottom: 20px;">
    <h1>Sesión 3: Atención</h1>
    <button style="padding: 20px 50px; background: var(--green); color: white; border: none; border-radius: 50px; font-size: 2rem; font-weight: bold; cursor: pointer;" 
            onclick="iniciarJuego()">¡COMENZAR!</button>
</div>

<header style="position: absolute; top: 0; width: 100%; padding: 20px; background: rgba(16, 58, 87, 0.9); color: white; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-sizing: border-box;">
    <a href="perfil_paciente.html" style="color:white; text-decoration:none; font-size: 1.2rem;"><i class="fas fa-arrow-left"></i> Volver</a>
    <div id="hits-display" style="font-size: 1.5rem; font-weight: bold;">ACIERTO: 0/3</div>
</header>

<div id="game-container">
    <img src="img/D_mosca.png" id="mosca">
    
    <div class="contenedor-metas">
        <div class="drop-zone" data-type="R"><img src="img/meta_armario.png"><span>ARMARIO</span></div>
        <div class="drop-zone" data-type="L"><img src="img/meta_estante.png"><span>ESTANTE</span></div>
        <div class="drop-zone" data-type="B"><img src="img/meta_cesto.png"><span>CESTO</span></div>
    </div>

    <div id="area-suelo-segura"></div>

    <div id="coterapeuta-box">
        <img src="COTERAPEUTA.JPG" id="avatar-guia">
        <div id="bocadillo"></div>
    </div>
</div>

<script>
    let nivel = 1;
    let aciertos = 0;
    const config = { 1: {items: 1, dist: 0}, 2: {items: 2, dist: 3}, 3: {items: 3, dist: 1} };

    function hablar(mensaje) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(mensaje);
        msg.lang = 'es-ES';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
        const boc = document.getElementById('bocadillo');
        boc.innerText = mensaje; boc.style.display = 'block';
        setTimeout(() => boc.style.display = 'none', 5000);
    }

    function iniciarJuego() {
        document.getElementById('overlay-inicio').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        hablar("¡Hola! Vamos a organizar la habitación. Pon la ropa en el armario, los libros en el estante y la basura en el cesto.");
        generarNivel();
    }

    function generarNivel() {
        const grid = document.getElementById('area-suelo-segura');
        grid.innerHTML = "";
        aciertos = 0;
        const totalAciertos = config[nivel].items * 3;
        document.getElementById('hits-display').innerText = `ACIERTO: 0/${totalAciertos}`;

        // Crear Pool
        let pool = [];
        ['R', 'L', 'B'].forEach(t => {
            let nums = [1,2,3,4,5].sort(() => Math.random() - 0.5);
            for(let i=0; i<config[nivel].items; i++) pool.push({tipo: t, img: `${t}${nums[i]}`});
        });
        for(let i=0; i<config[nivel].dist; i++) pool.push({tipo: 'D', img: `D${Math.floor(Math.random()*5)+1}`});

        pool.sort(() => Math.random() - 0.5);

        // Llenar las 10 celdas
        for(let i=0; i<10; i++) {
            const celda = document.createElement('div');
            celda.className = 'celda';
            if(pool[i]) {
                const img = document.createElement('img');
                img.src = `img/${pool[i].img}.png`;
                img.className = 'draggable';
                img.dataset.tipo = pool[i].tipo;
                makeDraggable(img);
                celda.appendChild(img);
            }
            grid.appendChild(celda);
        }

        if(nivel === 3) { document.getElementById('mosca').style.display = 'block'; moverMosca(); }
    }

    function makeDraggable(el) {
        let startX, startY;
        const start = (e) => {
            const ev = e.touches ? e.touches[0] : e;
            el.style.position = 'fixed';
            el.style.zIndex = 1000;
            move(e);
            document.addEventListener('touchmove', move, {passive: false});
            document.addEventListener('touchend', end);
        };
        const move = (e) => {
            e.preventDefault();
            const ev = e.touches ? e.touches[0] : e;
            el.style.left = (ev.clientX - 50) + "px";
            el.style.top = (ev.clientY - 50) + "px";
        };
        const end = (e) => {
            document.removeEventListener('touchmove', move);
            document.removeEventListener('touchend', end);
            const ev = e.changedTouches[0];
            verificar(el, ev);
        };
        el.addEventListener('touchstart', start, {passive: false});
    }

    function verificar(el, pos) {
        const metas = document.querySelectorAll('.drop-zone');
        let acerto = false;

        metas.forEach(m => {
            const r = m.getBoundingClientRect();
            if(pos.clientX > r.left && pos.clientX < r.right && pos.clientY > r.top && pos.clientY < r.bottom) {
                if(el.dataset.tipo === m.dataset.type) {
                    el.style.display = "none"; aciertos++;
                    document.getElementById('hits-display').innerText = `ACIERTO: ${aciertos}/${config[nivel].items*3}`;
                    hablar("¡Muy bien!"); cambiarAvatar("COTERAPEUTA_FELIZ.JPG");
                    acerto = true;
                } else if(el.dataset.tipo !== 'D') {
                    hablar("Ese no va ahí, inténtalo de nuevo."); cambiarAvatar("COTERAPEUTA_PENSATIVO.JPG");
                }
            }
        });

        if(!acerto) {
            el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0';
        }

        if(aciertos === config[nivel].items * 3) {
            setTimeout(() => {
                if(nivel < 3) {
                    nivel++;
                    hablar("¡Vas muy bien! Ahora sigamos organizando la habitación.");
                    generarNivel();
                } else {
                    hablar("¡Excelente! Has terminado el ejercicio.");
                    setTimeout(() => window.location.href="perfil_paciente.html", 3000);
                }
            }, 1500);
        }
    }

    function moverMosca() {
        if(nivel !== 3) return;
        const m = document.getElementById('mosca');
        m.style.left = (Math.random() * 80 + 10) + "vw";
        m.style.top = (Math.random() * 70 + 10) + "vh";
        setTimeout(moverMosca, 1200);
    }

    function cambiarAvatar(src) {
        const a = document.getElementById('avatar-guia');
        a.src = src; setTimeout(() => a.src = "COTERAPEUTA.JPG", 2000);
    }
</script>
</body>
</html>

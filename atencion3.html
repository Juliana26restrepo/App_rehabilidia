<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atención 3 - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p-blue: #103A57; --green: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; overflow: hidden; touch-action: none; }
        
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: url('img/fondo_habitacion3.jpg') no-repeat center center;
            background-size: cover; display: none;
        }

        /* Pantalla de inicio para forzar la activación de la VOZ */
        #overlay-inicio {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(16, 58, 87, 0.95); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        /* UBICACIÓN DE METAS: JUNTAS EN LA VENTANA */
        .contenedor-metas {
            position: absolute; top: 38%; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 30px; z-index: 5;
        }
        .drop-zone {
            width: 140px; height: 150px; border: 2px dashed rgba(255,255,255,0.4);
            border-radius: 15px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(255,255,255,0.1);
        }
        .drop-zone img { width: 80px; pointer-events: none; }
        .drop-zone span { color: white; font-weight: bold; font-size: 14px; margin-top: 5px; }

        /* OBJETOS EN EL SUELO */
        #suelo-area {
            position: absolute; bottom: 5%; left: 10%; width: 80%; height: 25%;
            z-index: 10;
        }
        .draggable {
            position: absolute; width: 75px; height: 75px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
            cursor: grab; touch-action: none;
        }

        /* COTERAPEUTA */
        #coterapeuta-box {
            position: absolute; bottom: 20px; left: 20px;
            display: flex; align-items: flex-end; z-index: 100;
        }
        #avatar-guia { width: 160px; border-radius: 10px; border: 3px solid white; }
        #bocadillo {
            background: white; border-radius: 15px; padding: 15px;
            margin-bottom: 80px; margin-left: -10px; max-width: 200px;
            font-size: 1rem; font-weight: bold; color: var(--p-blue);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: none;
        }
    </style>
</head>
<body>

<div id="overlay-inicio">
    <img src="COTERAPEUTA.JPG" style="width: 200px; border-radius: 20px; margin-bottom: 20px;">
    <h2>Sesión 3: Atención</h2>
    <button style="padding: 20px 40px; background: var(--green); color: white; border: none; border-radius: 50px; font-size: 1.5rem; font-weight: bold; cursor: pointer;" 
            onclick="iniciarJuego()">¡COMENZAR!</button>
</div>

<audio id="audio-guia" src="audio/instruccion_atencion3.mp3"></audio>

<header style="position: absolute; top: 0; width: 100%; padding: 15px; background: rgba(16, 58, 87, 0.9); color: white; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box;">
    <a href="perfil_paciente.html" style="color:white; text-decoration:none;"><i class="fas fa-arrow-left"></i> Volver</a>
    <div id="hits-display">ACIERTO: 0/3</div>
</header>

<div id="game-container">
    <div class="contenedor-metas">
        <div class="drop-zone" data-type="R">
            <img src="img/meta_armario.png"><span>ARMARIO</span>
        </div>
        <div class="drop-zone" data-type="L">
            <img src="img/meta_estante.png"><span>ESTANTE</span>
        </div>
        <div class="drop-zone" data-type="B">
            <img src="img/meta_cesto.png"><span>CESTO</span>
        </div>
    </div>

    <div id="suelo-area"></div>

    <div id="coterapeuta-box">
        <img src="COTERAPEUTA.JPG" id="avatar-guia">
        <div id="bocadillo">¡Hola! Ayúdame a organizar. Pon cada cosa en su lugar.</div>
    </div>
</div>

<script>
    let nivel = 1;
    let aciertos = 0;
    const itemsPorNivel = { 1: 1, 2: 2, 3: 3 };

    function iniciarJuego() {
        document.getElementById('overlay-inicio').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        
        // HABLAR: Activa audio y bocadillo
        const audio = document.getElementById('audio-guia');
        audio.play().catch(e => console.log("Error de audio"));
        
        document.getElementById('bocadillo').style.display = 'block';
        setTimeout(() => { document.getElementById('bocadillo').style.display = 'none'; }, 6000);
        
        generarObjetos();
    }

    function generarObjetos() {
        const area = document.getElementById('suelo-area');
        area.innerHTML = "";
        aciertos = 0;
        const cantidad = itemsPorNivel[nivel];
        document.getElementById('hits-display').innerText = `ACIERTO: 0/${cantidad * 3}`;

        // Tipos: R (Ropa/Armario), L (Libros/Estante), B (Basura/Cesto)
        ['R', 'L', 'B'].forEach(tipo => {
            for(let i=0; i<cantidad; i++) {
                const img = document.createElement('img');
                img.src = `img/${tipo}${Math.floor(Math.random()*5)+1}.png`;
                img.className = 'draggable';
                img.dataset.tipo = tipo;
                img.style.left = Math.random() * 90 + "%";
                img.style.top = Math.random() * 70 + "%";
                makeDraggable(img);
                area.appendChild(img);
            }
        });
    }

    function makeDraggable(el) {
        let x, y;
        el.onmousedown = el.ontouchstart = (e) => {
            e.preventDefault();
            const ev = e.touches ? e.touches[0] : e;
            x = ev.clientX; y = ev.clientY;
            
            document.onmousemove = document.ontouchmove = (m) => {
                const mev = m.touches ? m.touches[0] : m;
                el.style.left = (el.offsetLeft + (mev.clientX - x)) + "px";
                el.style.top = (el.offsetTop + (mev.clientY - y)) + "px";
                x = mev.clientX; y = mev.clientY;
            };

            document.onmouseup = document.ontouchend = () => {
                document.onmousemove = document.ontouchmove = null;
                verificarDestino(el);
            };
        };
    }

    function verificarDestino(obj) {
        const r = obj.getBoundingClientRect();
        const metas = document.querySelectorAll('.drop-zone');
        let acerto = false;

        metas.forEach(m => {
            const mr = m.getBoundingClientRect();
            if (r.left < mr.right && r.right > mr.left && r.top < mr.bottom && r.bottom > mr.top) {
                if (obj.dataset.tipo === m.dataset.type) {
                    obj.style.display = "none";
                    aciertos++;
                    document.getElementById('hits-display').innerText = `ACIERTO: ${aciertos}/${itemsPorNivel[nivel]*3}`;
                    cambiarAvatar("FELIZ");
                    acerto = true;
                } else {
                    cambiarAvatar("PENSATIVO");
                    obj.style.top = "20%"; // Lo devuelve al centro del suelo
                }
            }
        });

        if (aciertos === itemsPorNivel[nivel] * 3) {
            setTimeout(() => {
                if(nivel < 3) { nivel++; alert("¡Siguiente nivel!"); generarObjetos(); }
                else { alert("¡Excelente sesión!"); window.location.href="perfil_paciente.html"; }
            }, 500);
        }
    }

    function cambiarAvatar(estado) {
        const avatar = document.getElementById('avatar-guia');
        if (estado === "FELIZ") avatar.src = "COTERAPEUTA_FELIZ.JPG";
        else if (estado === "PENSATIVO") avatar.src = "COTERAPEUTA_PENSATIVO.JPG";
        
        setTimeout(() => { avatar.src = "COTERAPEUTA.JPG"; }, 2000);
    }
</script>
</body>
</html>

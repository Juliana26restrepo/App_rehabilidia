<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atención 3 - REHABILIDIA</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; overflow: hidden; touch-action: none; }
        
        /* FONDO ESTÁTICO */
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: url('img/fondo_habitacion3.jpg') no-repeat center center;
            background-size: cover; display: flex; z-index: 1;
        }

        /* COTERAPEUTA FIJO ARRIBA */
        #guia-box {
            position: absolute; top: 65px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; background: white;
            border: 4px solid var(--t-blue); border-radius: 50px;
            padding: 10px 25px; width: 80%; max-width: 600px; z-index: 1000;
        }
        #avatar { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--t-blue); margin-right: 15px; }
        #texto-guia { font-size: 1.1rem; font-weight: bold; color: var(--p-blue); margin: 0; }

        /* COLUMNA IZQUIERDA: METAS */
        #col-metas {
            width: 35%; height: 100%; padding: 160px 10px 20px 20px;
            display: flex; flex-direction: column; justify-content: space-around;
            box-sizing: border-box; z-index: 5;
        }
        .meta {
            width: 100%; height: 30%; border: 4px dashed rgba(255,255,255,0.6);
            border-radius: 20px; background: rgba(255,255,255,0.15);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .meta img { width: 45%; pointer-events: none; }
        .meta span { color: white; font-weight: bold; font-size: 1.1rem; text-shadow: 2px 2px 4px #000; }

        /* COLUMNA DERECHA: ESTÍMULOS EN GRID */
        #col-estimulos {
            width: 65%; height: 100%; padding: 160px 20px 20px 10px;
            display: grid; grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(4, 1fr); gap: 10px;
            box-sizing: border-box; z-index: 5;
        }
        .celda { display: flex; align-items: center; justify-content: center; }
        .draggable { width: 90px; height: 90px; cursor: grab; touch-action: none; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.7)); }

        header { position: fixed; top: 0; width: 100%; padding: 12px; background: rgba(16, 58, 87, 0.9); color: white; display: flex; justify-content: space-between; align-items: center; z-index: 1100; box-sizing: border-box; }
        #mosca { position: absolute; width: 55px; z-index: 2000; display: none; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold;">Sesión 3 - Atención</div>
    <div id="puntos" style="font-size: 1.3rem; font-weight: bold;">ACIERTO: 0/3</div>
</header>

<div id="game-container">
    <img src="img/D_mosca.png" id="mosca">
    
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Ordena los objetos en su lugar.</p>
    </div>

    <div id="col-metas">
        <div class="meta" data-tipo="R"><img src="img/meta_armario.png"><span>ARMARIO</span></div>
        <div class="meta" data-tipo="L"><img src="img/meta_estante.png"><span>ESTANTE</span></div>
        <div class="meta" data-tipo="B"><img src="img/meta_cesto.png"><span>CESTO</span></div>
    </div>

    <div id="col-estimulos"></div>
</div>

<script>
    let nivel = 1; let aciertos = 0;
    const config = { 1: 1, 2: 2, 3: 3 };

    function hablar(msg, emocion = 'NORMAL') {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
        document.getElementById('texto-guia').innerText = msg;
        const img = document.getElementById('avatar');
        img.src = emocion === 'FELIZ' ? "COTERAPEUTA_FELIZ.JPG" : (emocion === 'PENSATIVO' ? "COTERAPEUTA_PENSATIVO.JPG" : "COTERAPEUTA.JPG");
    }

    function cargarNivel() {
        const grid = document.getElementById('col-estimulos');
        grid.innerHTML = ""; aciertos = 0;
        let pool = [];

        ['R', 'L', 'B'].forEach(t => {
            for(let i=0; i<config[nivel]; i++) pool.push({t: t, img: `${t}${Math.floor(Math.random()*5)+1}.png`});
        });

        if(nivel === 2) for(let i=0; i<3; i++) pool.push({t: 'D', img: `D${Math.floor(Math.random()*5)+1}.png`});
        if(nivel === 3) pool.push({t: 'D', img: `D${Math.floor(Math.random()*5)+1}.png`});

        pool.sort(() => Math.random() - 0.5).forEach(item => {
            const celda = document.createElement('div');
            celda.className = 'celda';
            const img = document.createElement('img');
            img.src = `img/${item.img}`; img.className = 'draggable'; img.dataset.t = item.t;
            activarDrag(img);
            celda.appendChild(img);
            grid.appendChild(celda);
        });

        document.getElementById('puntos').innerText = `ACIERTO: 0/${config[nivel]*3}`;
        if(nivel === 3) { document.getElementById('mosca').style.display = 'block'; moverMosca(); }
    }

    function activarDrag(el) {
        el.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            el.style.position = 'fixed'; el.style.zIndex = 3000;
            const mover = (me) => {
                me.preventDefault();
                const mt = me.touches[0];
                el.style.left = (mt.clientX - 45) + 'px';
                el.style.top = (mt.clientY - 45) + 'px';
            };
            const soltar = (se) => {
                document.removeEventListener('touchmove', mover);
                document.removeEventListener('touchend', soltar);
                validar(el, se.changedTouches[0]);
            };
            document.addEventListener('touchmove', mover, {passive: false});
            document.addEventListener('touchend', soltar);
        });
    }

    function validar(el, pos) {
        const metas = document.querySelectorAll('.meta');
        let acerto = false;
        metas.forEach(m => {
            const r = m.getBoundingClientRect();
            if(pos.clientX > r.left && pos.clientX < r.right && pos.clientY > r.top && pos.clientY < r.bottom) {
                if(el.dataset.t === m.dataset.tipo) {
                    el.style.display = 'none'; aciertos++; acerto = true;
                    document.getElementById('puntos').innerText = `ACIERTO: ${aciertos}/${config[nivel]*3}`;
                    hablar("¡Muy bien!", "FELIZ");
                } else if(el.dataset.t !== 'D') {
                    hablar("Ahí no va.", "PENSATIVO");
                }
            }
        });
        if(!acerto) {
            el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0';
        }
        if(aciertos === config[nivel]*3) {
            setTimeout(() => {
                if(nivel < 3) { nivel++; hablar("¡Nivel superado!"); cargarNivel(); }
                else { hablar("¡Excelente! Has terminado."); }
            }, 1000);
        }
    }

    function moverMosca() {
        if(nivel !== 3) return;
        const m = document.getElementById('mosca');
        m.style.left = Math.random() * 80 + "vw"; m.style.top = Math.random() * 80 + "vh";
        setTimeout(moverMosca, 1000);
    }

    window.onload = () => { cargarNivel(); hablar("Organiza la habitación."); };
</script>
</body>
</html>

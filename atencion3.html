<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atención 3 - REHABILIDIA</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --green: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; overflow: hidden; touch-action: none; }
        
        /* DISEÑO FIJADO SEGÚN IMAGEN 1000216423.png */
        #viewport {
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
        }

        #mundo {
            width: 180vw; height: 100vh;
            background: url('img/fondo_habitacion3.jpg') no-repeat center center;
            background-size: cover; position: relative;
        }

        #guia-container {
            position: fixed; top: 75px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; background: white;
            border: 4px solid var(--t-blue); border-radius: 50px;
            padding: 10px 25px; width: 85%; max-width: 650px; z-index: 1000;
        }
        #avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--t-blue); margin-right: 15px; }
        #texto { font-size: 1.2rem; font-weight: bold; color: var(--p-blue); margin: 0; }

        .metas-wrapper {
            position: absolute; top: 35%; width: 100%;
            display: flex; justify-content: space-around; padding: 0 50px;
        }
        .meta {
            width: 250px; height: 350px; border: 4px dashed rgba(255,255,255,0.6);
            border-radius: 30px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(255,255,255,0.1);
        }
        .meta img { width: 160px; pointer-events: none; }
        .meta span { color: white; font-weight: bold; font-size: 1.4rem; margin-top: 10px; text-shadow: 2px 2px 4px #000; }

        #objetos-suelo {
            position: fixed; bottom: 5%; left: 0; width: 100%; height: 20%;
            display: flex; justify-content: center; gap: 25px; align-items: center; z-index: 500;
        }
        .objeto { width: 110px; height: 110px; cursor: grab; touch-action: none; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }

        header { position: fixed; top: 0; width: 100%; padding: 15px; background: rgba(16, 58, 87, 0.9); color: white; display: flex; justify-content: space-between; align-items: center; z-index: 1100; }
        #mosca { position: absolute; width: 65px; z-index: 600; display: none; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold;">Volver</div>
    <div id="puntos" style="font-size: 1.4rem; font-weight: bold;">ACIERTO: 0/3</div>
</header>

<div id="viewport">
    <div id="mundo">
        <img src="img/D_mosca.png" id="mosca">
        <div class="metas-wrapper">
            <div class="meta" data-tipo="R"><img src="img/meta_armario.png"><span>ARMARIO</span></div>
            <div class="meta" data-tipo="L"><img src="img/meta_estante.png"><span>ESTANTE</span></div>
            <div class="meta" data-tipo="B"><img src="img/meta_cesto.png"><span>CESTO</span></div>
        </div>
    </div>
</div>

<div id="objetos-suelo"></div>

<div id="guia-container">
    <img src="COTERAPEUTA.JPG" id="avatar">
    <p id="texto">Ordena la habitación: ropa al armario, libros al estante y basura al cesto.</p>
</div>

<script>
    let nivel = 1; let aciertos = 0;
    const config = { 1: 1, 2: 2, 3: 3 };

    function hablar(msg, emocion = 'NORMAL') {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
        document.getElementById('texto').innerText = msg;
        const img = document.getElementById('avatar');
        img.src = emocion === 'FELIZ' ? "COTERAPEUTA_FELIZ.JPG" : (emocion === 'PENSATIVO' ? "COTERAPEUTA_PENSATIVO.JPG" : "COTERAPEUTA.JPG");
        if(emocion !== 'NORMAL') setTimeout(() => img.src = "COTERAPEUTA.JPG", 2500);
    }

    function cargarNivel() {
        const contenedor = document.getElementById('objetos-suelo');
        contenedor.innerHTML = ""; aciertos = 0;
        let lista = [];
        
        // Estímulos Diana
        ['R', 'L', 'B'].forEach(t => {
            for(let i=0; i<config[nivel]; i++) lista.push({t: t, img: `${t}${Math.floor(Math.random()*5)+1}.png`});
        });

        // DISTRACTORES (Nivel 2 y 3)
        if(nivel >= 2) {
            let cantD = (nivel === 2) ? 3 : 1;
            for(let i=0; i<cantD; i++) lista.push({t: 'D', img: `D${Math.floor(Math.random()*5)+1}.png`});
        }

        lista.sort(() => Math.random() - 0.5).forEach(item => {
            const img = document.createElement('img');
            img.src = `img/${item.img}`; img.className = 'objeto'; img.dataset.t = item.t;
            activarArrastre(img);
            contenedor.appendChild(img);
        });
        
        document.getElementById('puntos').innerText = `ACIERTO: 0/${config[nivel]*3}`;
        
        // MOSCA (Solo Nivel 3)
        if(nivel === 3) { document.getElementById('mosca').style.display = 'block'; moverMosca(); }
        else { document.getElementById('mosca').style.display = 'none'; }
    }

    function activarArrastre(el) {
        el.addEventListener('touchstart', (e) => {
            const t = e.touches[0];
            el.style.position = 'fixed'; el.style.zIndex = 2000;
            const mover = (me) => {
                me.preventDefault();
                const mt = me.touches[0];
                el.style.left = (mt.clientX - 55) + 'px';
                el.style.top = (mt.clientY - 55) + 'px';
            };
            const soltar = (se) => {
                document.removeEventListener('touchmove', mover);
                document.removeEventListener('touchend', soltar);
                chequear(el, se.changedTouches[0]);
            };
            document.addEventListener('touchmove', mover, {passive: false});
            document.addEventListener('touchend', soltar);
        });
    }

    function chequear(el, pos) {
        const metas = document.querySelectorAll('.meta');
        let acertoMeta = false;

        metas.forEach(meta => {
            const r = meta.getBoundingClientRect();
            // Verificamos si el dedo (pos) está dentro de los límites de la meta
            if(pos.clientX > r.left && pos.clientX < r.right && pos.clientY > r.top && pos.clientY < r.bottom) {
                if(el.dataset.t === meta.dataset.tipo) {
                    el.style.display = 'none'; aciertos++; acertoMeta = true;
                    document.getElementById('puntos').innerText = `ACIERTO: ${aciertos}/${config[nivel]*3}`;
                    hablar("¡Muy bien!", "FELIZ");
                } else if(el.dataset.t !== 'D') {
                    hablar("Ese no va ahí.", "PENSATIVO");
                } else {
                    hablar("Eso no va en ningún lado.", "PENSATIVO");
                }
            }
        });

        if(!acertoMeta) {
            el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0';
        }

        if(aciertos === config[nivel]*3) {
            setTimeout(() => {
                if(nivel < 3) { nivel++; hablar("¡Nivel superado!"); cargarNivel(); }
                else { hablar("¡Excelente! Has terminado todos los niveles."); }
            }, 1500);
        }
    }

    function moverMosca() {
        if(nivel !== 3) return;
        const m = document.getElementById('mosca');
        m.style.left = Math.random() * 160 + "vw";
        m.style.top = Math.random() * 80 + "vh";
        setTimeout(moverMosca, 1000);
    }

    window.onload = () => { cargarNivel(); hablar("Ordena la habitación: ropa al armario, libros al estante y basura al cesto."); };
</script>
</body>
</html>

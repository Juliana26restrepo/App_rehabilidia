<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atención 3 - REHABILIDIA</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; overflow: hidden; touch-action: none; }
        
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: url('img/fondo_habitacion3.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        header { position: fixed; top: 0; width: 100%; padding: 15px; background: rgba(16, 58, 87, 0.9); color: white; display: flex; justify-content: space-between; z-index: 3000; box-sizing: border-box; }

        /* COTERAPEUTA */
        #guia-box {
            position: absolute; top: 75px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; background: white;
            border: 4px solid var(--t-blue); border-radius: 50px;
            padding: 10px 20px; width: 85%; max-width: 650px; z-index: 1000;
        }
        #avatar { width: 75px; height: 75px; border-radius: 50%; border: 3px solid var(--t-blue); margin-right: 15px; }
        #texto-guia { font-size: 1.1rem; font-weight: bold; color: var(--p-blue); margin: 0; }

        /* METAS DISTRIBUIDAS */
        .meta {
            position: absolute; width: 200px; height: 260px;
            border: 4px dashed rgba(255,255,255,0.7); border-radius: 25px;
            background: rgba(255,255,255,0.2); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        .meta img { width: 130px; pointer-events: none; }
        .meta span { color: white; font-weight: bold; font-size: 1.2rem; margin-top: 8px; text-shadow: 2px 2px 4px #000; }

        #meta-R { top: 180px; left: 40px; } /* Armario Arriba */
        #meta-B { bottom: 40px; left: 40px; } /* Cesto Abajo */
        #meta-L { top: 50%; left: 280px; transform: translateY(-50%); } /* Estante Medio-Derecha */

        /* OBJETOS A LA DERECHA */
        #contenedor-objetos {
            position: absolute; top: 180px; right: 40px; bottom: 40px;
            width: 250px; display: grid; grid-template-columns: 1fr 1fr;
            gap: 20px; align-content: start; z-index: 20;
        }
        .draggable { width: 110px; height: 110px; cursor: grab; touch-action: none; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); z-index: 25; }

        #mosca { position: absolute; width: 65px; z-index: 5000; display: none; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold;">Sesión 3 - Atención</div>
    <div id="puntos" style="font-size: 1.4rem; font-weight: bold;">ACIERTO: 0/3</div>
</header>

<div id="game-container">
    <img src="img/D_mosca.png" id="mosca">
    
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Cargando...</p>
    </div>

    <div class="meta" data-tipo="R" id="meta-R"><img src="img/meta_armario.png"><span>ARMARIO</span></div>
    <div class="meta" data-tipo="L" id="meta-L"><img src="img/meta_estante.png"><span>ESTANTE</span></div>
    <div class="meta" data-tipo="B" id="meta-B"><img src="img/meta_cesto.png"><span>CESTO</span></div>

    <div id="contenedor-objetos"></div>
</div>

<script>
    let nivel = 1; let aciertos = 0;
    const config = { 1: 1, 2: 2, 3: 3 };

    function hablar(msg, emocion = 'NORMAL') {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
        document.getElementById('texto-guia').innerText = msg;
        const img = document.getElementById('avatar');
        img.src = emocion === 'FELIZ' ? "COTERAPEUTA_FELIZ.JPG" : (emocion === 'PENSATIVO' ? "COTERAPEUTA_PENSATIVO.JPG" : "COTERAPEUTA.JPG");
        if(emocion !== 'NORMAL') setTimeout(() => img.src = "COTERAPEUTA.JPG", 2500);
    }

    function cargarNivel() {
        const div = document.getElementById('contenedor-objetos');
        div.innerHTML = ""; aciertos = 0;
        let pool = [];

        ['R', 'L', 'B'].forEach(t => {
            for(let i=0; i<config[nivel]; i++) pool.push({t: t, img: `${t}${Math.floor(Math.random()*5)+1}.png`});
        });

        if(nivel === 2) for(let i=0; i<3; i++) pool.push({t: 'D', img: `D${Math.floor(Math.random()*5)+1}.png`});
        if(nivel === 3) pool.push({t: 'D', img: `D${Math.floor(Math.random()*5)+1}.png`});

        pool.sort(() => Math.random() - 0.5).forEach(item => {
            const img = document.createElement('img');
            img.src = `img/${item.img}`; img.className = 'draggable'; img.dataset.t = item.t;
            activarDrag(img);
            div.appendChild(img);
        });

        document.getElementById('puntos').innerText = `ACIERTO: 0/${config[nivel]*3}`;
        
        const instruccion = "Ordena la habitación: pon la ropa en el armario, los libros en el estante y la basura en el cesto.";
        hablar(instruccion);
        
        if(nivel === 3) { document.getElementById('mosca').style.display = 'block'; moverMosca(); }
    }

    function activarDrag(el) {
        el.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const startX = touch.clientX - el.offsetLeft;
            const startY = touch.clientY - el.offsetTop;
            
            el.style.position = 'fixed';
            el.style.zIndex = 10000;

            const mover = (me) => {
                me.preventDefault();
                const mt = me.touches[0];
                el.style.left = (mt.clientX - 55) + 'px';
                el.style.top = (mt.clientY - 55) + 'px';
            };

            const soltar = (se) => {
                document.removeEventListener('touchmove', mover);
                document.removeEventListener('touchend', soltar);
                verificar(el, se.changedTouches[0]);
            };

            document.addEventListener('touchmove', mover, {passive: false});
            document.addEventListener('touchend', soltar);
        });
    }

    function verificar(el, pos) {
        const metas = document.querySelectorAll('.meta');
        let acerto = false;
        const centroX = pos.clientX;
        const centroY = pos.clientY;

        metas.forEach(m => {
            const r = m.getBoundingClientRect();
            // DETECCIÓN MATEMÁTICA PURA
            if(centroX > r.left && centroX < r.right && centroY > r.top && centroY < r.bottom) {
                if(el.dataset.t === m.dataset.tipo) {
                    el.style.display = 'none'; aciertos++; acerto = true;
                    document.getElementById('puntos').innerText = `ACIERTO: ${aciertos}/${config[nivel]*3}`;
                    hablar("¡Excelente!", "FELIZ");
                } else if(el.dataset.t !== 'D') {
                    hablar("Ese no va ahí.", "PENSATIVO");
                } else {
                    hablar("Ese es un distractor.", "PENSATIVO");
                }
            }
        });

        if(!acerto) {
            el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0'; el.style.zIndex = 25;
        }

        if(aciertos === config[nivel]*3) {
            setTimeout(() => {
                if(nivel < 3) { nivel++; cargarNivel(); }
                else { hablar("¡Felicidades! Has terminado el ejercicio."); }
            }, 1500);
        }
    }

    function moverMosca() {
        if(nivel !== 3) return;
        const m = document.getElementById('mosca');
        m.style.left = Math.random() * 85 + "vw"; m.style.top = Math.random() * 80 + "vh";
        setTimeout(moverMosca, 1000);
    }

    window.onload = cargarNivel;
</script>
</body>
</html>

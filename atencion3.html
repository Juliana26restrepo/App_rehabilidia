<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atención 3 - REHABILIDIA</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --green: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; overflow: hidden; touch-action: none; }
        
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: url('img/fondo_habitacion3.jpg') no-repeat center center;
            background-size: cover;
        }

        header { 
            position: absolute; top: 0; width: 100%; padding: 15px 25px; 
            background: rgba(16, 58, 87, 0.9); color: white; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1100; box-sizing: border-box; 
        }

        /* COTERAPEUTA DISEÑO EJERCICIO 2 */
        #coterapeuta-box {
            position: absolute; top: 85px; left: 50%;
            transform: translateX(-50%);
            display: flex; align-items: center;
            background: white; border: 4px solid var(--t-blue);
            border-radius: 60px; padding: 10px 25px;
            width: 85%; max-width: 700px; z-index: 1000;
        }
        #avatar-circulo {
            width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid var(--t-blue); margin-right: 20px;
            background: white; object-fit: cover; flex-shrink: 0;
        }
        #texto-guia { font-size: 1.2rem; font-weight: bold; color: var(--p-blue); margin: 0; }

        /* METAS MÁS BAJAS Y AMPLIAS PARA MEJOR DETECCIÓN */
        .contenedor-metas {
            position: absolute; top: 42%; /* Ajustado para alinear con muebles */
            width: 100%; display: flex; justify-content: space-around; 
            padding: 0 10px; box-sizing: border-box;
        }
        .drop-zone {
            width: 260px; height: 280px; /* Área de detección más grande */
            border: 3px dashed rgba(255,255,255,0.4);
            border-radius: 20px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(255,255,255,0.1);
        }
        .drop-zone img { width: 160px; opacity: 0.8; }
        .drop-zone span { color: white; font-weight: bold; font-size: 1.4rem; text-shadow: 2px 2px 4px #000; }

        #zona-suelo {
            position: absolute; bottom: 5%; width: 100%; height: 20%;
            display: flex; justify-content: center; gap: 25px; align-items: center;
        }
        .draggable { width: 110px; height: 110px; cursor: grab; touch-action: none; z-index: 10; }

        #mosca { position: absolute; width: 60px; z-index: 500; display: none; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <a href="perfil_paciente.html" style="color:white; text-decoration:none;">Volver</a>
    <div id="hits-display" style="font-size: 1.4rem; font-weight: bold;">ACIERTO: 0/3</div>
</header>

<div id="game-container">
    <img src="img/D_mosca.png" id="mosca">
    <div id="coterapeuta-box">
        <img src="COTERAPEUTA.JPG" id="avatar-circulo">
        <p id="texto-guia">¡Hola! Vamos a empezar.</p>
    </div>
    <div class="contenedor-metas">
        <div class="drop-zone" data-type="R"><img src="img/meta_armario.png"><span>ARMARIO</span></div>
        <div class="drop-zone" data-type="L"><img src="img/meta_estante.png"><span>ESTANTE</span></div>
        <div class="drop-zone" data-type="B"><img src="img/meta_cesto.png"><span>CESTO</span></div>
    </div>
    <div id="zona-suelo"></div>
</div>

<script>
    let nivel = 1, aciertos = 0;
    const itemsNivel = { 1: 1, 2: 2, 3: 3 };

    function hablar(mensaje, emocion = 'NORMAL') {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(mensaje);
        msg.lang = 'es-ES';
        window.speechSynthesis.speak(msg);
        document.getElementById('texto-guia').innerText = mensaje;
        const img = document.getElementById('avatar-circulo');
        img.src = emocion === 'FELIZ' ? "COTERAPEUTA_FELIZ.JPG" : (emocion === 'PENSATIVO' ? "COTERAPEUTA_PENSATIVO.JPG" : "COTERAPEUTA.JPG");
        if(emocion !== 'NORMAL') setTimeout(() => img.src = "COTERAPEUTA.JPG", 2000);
    }

    function generarObjetos() {
        const suelo = document.getElementById('zona-suelo');
        suelo.innerHTML = ""; aciertos = 0;
        let pool = [];
        ['R', 'L', 'B'].forEach(t => {
            for(let i=0; i<itemsNivel[nivel]; i++) pool.push({tipo: t, img: `${t}${Math.floor(Math.random()*5)+1}.png`});
        });
        if(nivel > 1) { // Distractores
            for(let i=0; i<(nivel === 2 ? 3 : 1); i++) pool.push({tipo: 'D', img: `D${Math.floor(Math.random()*5)+1}.png`});
        }
        pool.sort(() => Math.random() - 0.5).forEach(item => {
            const img = document.createElement('img');
            img.src = `img/${item.img}`; img.className = 'draggable'; img.dataset.tipo = item.tipo;
            makeDraggable(img); suelo.appendChild(img);
        });
        document.getElementById('hits-display').innerText = `ACIERTO: 0/${itemsNivel[nivel]*3}`;
        if(nivel === 3) { document.getElementById('mosca').style.display = 'block'; moverMosca(); }
    }

    function makeDraggable(el) {
        el.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            el.style.position = 'fixed';
            el.style.zIndex = 2000;
            const move = (me) => {
                me.preventDefault();
                const t = me.touches[0];
                el.style.left = (t.clientX - 55) + 'px';
                el.style.top = (t.clientY - 55) + 'px';
            };
            const end = (ee) => {
                document.removeEventListener('touchmove', move);
                document.removeEventListener('touchend', end);
                verificar(el, ee.changedTouches[0]);
            };
            document.addEventListener('touchmove', move, {passive: false});
            document.addEventListener('touchend', end);
        });
    }

    function verificar(el, pos) {
        const metas = document.querySelectorAll('.drop-zone');
        let acerto = false;
        metas.forEach(m => {
            const r = m.getBoundingClientRect();
            // Área de detección expandida para tablet
            if(pos.clientX > r.left && pos.clientX < r.right && pos.clientY > r.top && pos.clientY < r.bottom) {
                if(el.dataset.tipo === m.dataset.type) {
                    el.style.display = 'none'; aciertos++; acerto = true;
                    document.getElementById('hits-display').innerText = `ACIERTO: ${aciertos}/${itemsNivel[nivel]*3}`;
                    hablar("¡Muy bien!", "FELIZ");
                } else if (el.dataset.tipo !== 'D') {
                    hablar("Ahí no va eso.", "PENSATIVO");
                }
            }
        });
        if(!acerto) {
            el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0';
        }
        if(aciertos === itemsNivel[nivel]*3) {
            setTimeout(() => {
                if(nivel < 3) { nivel++; hablar("¡Siguiente nivel!"); generarObjetos(); }
                else { hablar("¡Terminamos!"); setTimeout(()=>window.location.href="perfil_paciente.html", 2000); }
            }, 1000);
        }
    }

    function moverMosca() {
        if(nivel !== 3) return;
        const m = document.getElementById('mosca');
        m.style.left = Math.random() * 80 + "vw"; m.style.top = Math.random() * 80 + "vh";
        setTimeout(moverMosca, 1000);
    }

    window.onload = () => { generarObjetos(); hablar("Ordena la habitación: ropa al armario, libros al estante y basura al cesto."); };
</script>
</body>
</html>

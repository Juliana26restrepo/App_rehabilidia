<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atención 3 - REHABILIDIA</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; overflow: hidden; touch-action: none; }
        
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: url('img/fondo_habitacion3.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        /* COTERAPEUTA */
        #guia-box {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; background: white;
            border: 4px solid var(--t-blue); border-radius: 50px;
            padding: 8px 20px; width: 70%; max-width: 500px; z-index: 1000;
        }
        #avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--t-blue); margin-right: 15px; }
        #texto-guia { font-size: 1rem; font-weight: bold; color: var(--p-blue); margin: 0; }

        /* POSICIONAMIENTO DE METAS (SIN SOBREPONER) */
        .meta {
            position: absolute; width: 180px; height: 220px;
            border: 3px dashed rgba(255,255,255,0.5); border-radius: 20px;
            background: rgba(255,255,255,0.1); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        .meta img { width: 100px; pointer-events: none; }
        .meta span { color: white; font-weight: bold; font-size: 0.9rem; margin-top: 5px; text-shadow: 2px 2px 4px #000; }

        #target-armario { top: 150px; left: 30px; }
        #target-cesto { bottom: 30px; left: 30px; }
        #target-estante { top: 50%; left: 240px; transform: translateY(-50%); }

        /* ÁREA DE ESTÍMULOS A LA DERECHA */
        #col-objetos {
            position: absolute; top: 150px; right: 40px; bottom: 40px;
            width: 250px; display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; align-content: start; z-index: 20;
        }
        .draggable { width: 90px; height: 90px; cursor: grab; touch-action: none; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }

        header { position: fixed; top: 0; width: 100%; padding: 10px; background: rgba(16, 58, 87, 0.9); color: white; display: flex; justify-content: space-between; z-index: 1100; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold;">Sesión 3 - Atención</div>
    <div id="puntos" style="font-size: 1.2rem; font-weight: bold;">ACIERTO: 0/3</div>
</header>

<div id="game-container">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Organiza la habitación.</p>
    </div>

    <div class="meta" data-tipo="R" id="target-armario"><img src="img/meta_armario.png"><span>ARMARIO</span></div>
    <div class="meta" data-tipo="B" id="target-cesto"><img src="img/meta_cesto.png"><span>CESTO</span></div>
    <div class="meta" data-tipo="L" id="target-estante"><img src="img/meta_estante.png"><span>ESTANTE</span></div>

    <div id="col-objetos"></div>
</div>

<script>
    let nivel = 1; let aciertos = 0;
    const config = { 1: 1, 2: 2, 3: 3 };

    function hablar(msg, emocion = 'NORMAL') {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
        document.getElementById('texto-guia').innerText = msg;
        const img = document.getElementById('avatar');
        img.src = emocion === 'FELIZ' ? "COTERAPEUTA_FELIZ.JPG" : (emocion === 'PENSATIVO' ? "COTERAPEUTA_PENSATIVO.JPG" : "COTERAPEUTA.JPG");
    }

    function cargarNivel() {
        const contenedor = document.getElementById('col-objetos');
        contenedor.innerHTML = ""; aciertos = 0;
        let pool = [];

        ['R', 'L', 'B'].forEach(t => {
            for(let i=0; i<config[nivel]; i++) pool.push({t: t, img: `${t}${Math.floor(Math.random()*5)+1}.png`});
        });

        if(nivel >= 2) {
            let nD = (nivel === 2) ? 3 : 1;
            for(let i=0; i<nD; i++) pool.push({t: 'D', img: `D${Math.floor(Math.random()*5)+1}.png`});
        }

        pool.sort(() => Math.random() - 0.5).forEach(item => {
            const img = document.createElement('img');
            img.src = `img/${item.img}`; img.className = 'draggable'; img.dataset.t = item.t;
            activarDrag(img);
            contenedor.appendChild(img);
        });

        document.getElementById('puntos').innerText = `ACIERTO: 0/${config[nivel]*3}`;
    }

    function activarDrag(el) {
        el.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            el.style.position = 'fixed'; el.style.zIndex = 5000;
            const mover = (me) => {
                me.preventDefault();
                const mt = me.touches[0];
                el.style.left = (mt.clientX - 45) + 'px';
                el.style.top = (mt.clientY - 45) + 'px';
            };
            const soltar = (se) => {
                document.removeEventListener('touchmove', mover);
                document.removeEventListener('touchend', soltar);
                verificar(el, se.changedTouches[0]);
            };
            document.addEventListener('touchmove', mover, {passive: false});
            document.addEventListener('touchend', soltar);
        });
    }

    function verificar(el, pos) {
        const metas = document.querySelectorAll('.meta');
        let acerto = false;
        const total = config[nivel] * 3;

        metas.forEach(m => {
            const r = m.getBoundingClientRect();
            // Detección de colisión mejorada
            if(pos.clientX > r.left && pos.clientX < r.right && pos.clientY > r.top && pos.clientY < r.bottom) {
                if(el.dataset.t === m.dataset.tipo) {
                    el.style.display = 'none'; aciertos++; acerto = true;
                    document.getElementById('puntos').innerText = `ACIERTO: ${aciertos}/${total}`;
                    hablar("¡Muy bien!", "FELIZ");
                } else if(el.dataset.t !== 'D') {
                    hablar("Ahí no va.", "PENSATIVO");
                }
            }
        });

        if(!acerto) {
            el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0'; el.style.zIndex = 20;
        }

        if(aciertos === total) {
            setTimeout(() => {
                if(nivel < 3) { nivel++; hablar("¡Nivel superado!"); cargarNivel(); }
                else { hablar("¡Excelente! Has terminado."); }
            }, 1000);
        }
    }

    window.onload = () => { cargarNivel(); hablar("Organiza la habitación."); };
</script>
</body>
</html>

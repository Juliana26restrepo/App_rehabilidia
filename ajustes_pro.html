<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configuración Profesional - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --p-blue: #103A57; --t-blue: #307B8E; --bg: #F4F7F9;
            --white: #ffffff; --gray: #6c757d; --pas-blue: #A9D3C5;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--p-blue); -webkit-tap-highlight-color: transparent; }
        
        header { 
            background: var(--p-blue); color: white; padding: 20px; 
            display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100;
        }
        .btn-back { color: white; text-decoration: none; font-size: 1.4rem; cursor: pointer; border: none; background: none; padding: 5px; }

        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; padding-bottom: 50px; }

        /* PERFIL CARD */
        .profile-section {
            background: white; border-radius: 25px; padding: 30px;
            text-align: center; box-shadow: 0 10px 25px rgba(16, 58, 87, 0.05);
            margin-bottom: 25px;
        }
        .profile-img {
            width: 90px; height: 90px; background: var(--t-blue);
            border-radius: 50%; margin: 0 auto 15px; display: flex;
            align-items: center; justify-content: center; color: white;
            font-size: 2.2rem; position: relative; border: 4px solid var(--pas-blue);
        }
        .edit-badge {
            position: absolute; bottom: 0; right: 0; background: var(--p-blue);
            width: 28px; height: 28px; border-radius: 50%; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center; border: 2px solid white;
        }

        /* GRUPOS DE MENÚ */
        .menu-group { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .menu-item {
            display: flex; align-items: center; padding: 18px 20px;
            text-decoration: none; color: var(--p-blue); border-bottom: 1px solid #f5f5f5;
            transition: 0.2s; cursor: pointer;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:active { background: #f0f4f7; }
        .menu-item i:first-child { width: 35px; font-size: 1.2rem; color: var(--t-blue); }
        .menu-item .label { flex: 1; font-weight: 500; font-size: 0.95rem; }

        /* SWITCH TOGGLE */
        .switch { position: relative; display: inline-block; width: 42px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ddd; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--t-blue); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* BOTÓN LOGOUT */
        .btn-logout {
            display: block; width: 100%; padding: 16px; border-radius: 18px;
            border: 2px solid #ff5e5e; color: #ff5e5e; text-align: center;
            text-decoration: none; font-weight: bold; margin-top: 30px; 
            transition: 0.3s; box-sizing: border-box; background: transparent;
        }
        .btn-logout:active { background: #ff5e5e; color: white; }

        .footer-info { text-align: center; color: #abb8c3; font-size: 0.75rem; margin-top: 30px; line-height: 1.5; }
    </style>
</head>
<body>

<header>
    <button onclick="window.history.back()" class="btn-back">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h2 style="margin:0; font-size:1.1rem; letter-spacing: 0.5px;">Configuración Profesional</h2>
</header>

<div class="container">
    <div class="profile-section">
        <div class="profile-img">
            <i class="fas fa-user-md"></i>
            <div class="edit-badge"><i class="fas fa-camera"></i></div>
        </div>
        <h3 style="margin:0; font-size: 1.3rem;">Dra. Elena Valderrama</h3>
        <p style="margin:5px 0 0; color:var(--gray); font-size:0.9rem; font-weight: 500;">Neuropsicóloga</p>
    </div>

    <div class="menu-group">
        <div class="menu-item">
            <i class="fas fa-bell"></i>
            <span class="label">Notificaciones en tiempo real</span>
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div class="menu-item" onclick="alert('Accediendo a firma digital...')">
            <i class="fas fa-signature"></i>
            <span class="label">Gestionar Firma Digital</span>
            <i class="fas fa-chevron-right" style="color:#d1d1d1; font-size:0.8rem;"></i>
        </div>
    </div>

    <div class="menu-group">
        <div class="menu-item" onclick="alert('Abriendo calendario de turnos...')">
            <i class="fas fa-calendar-alt"></i>
            <span class="label">Horarios de Disponibilidad</span>
            <i class="fas fa-chevron-right" style="color:#d1d1d1; font-size:0.8rem;"></i>
        </div>
        <div class="menu-item" onclick="alert('Cargando opciones de seguridad...')">
            <i class="fas fa-user-shield"></i>
            <span class="label">Centro de Privacidad</span>
            <i class="fas fa-chevron-right" style="color:#d1d1d1; font-size:0.8rem;"></i>
        </div>
    </div>

    <div class="menu-group">
        <div class="menu-item" onclick="alert('Ayuda y Soporte técnico')">
            <i class="fas fa-headset"></i>
            <span class="label">Soporte REHABILIDIA</span>
            <i class="fas fa-chevron-right" style="color:#d1d1d1; font-size:0.8rem;"></i>
        </div>
    </div>

    <a href="login.html" class="btn-logout">Cerrar Sesión Profesional</a>
    
    <div class="footer-info">
        <strong>REHABILIDIA Pro v3.2.0</strong><br>
        ID de Licencia: RH-8829-2026<br>
        Sistema de salud verificado
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 3: Control Inhibitorio - REHABILIDIA</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #F3E5F5; --gold: #FFD700; --navy: #103A57; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 10px; font-weight: bold; }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .panel-regla { background: var(--p-purple); color: white; padding: 10px 20px; border-radius: 15px; font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; border: 3px solid var(--gold); }

        #estimulo-central { font-size: 4rem; font-weight: 900; margin-bottom: 30px; text-transform: uppercase; min-height: 100px; line-height: 100px; }

        #zona-opciones { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; max-width: 400px; }
        .opcion { background: white; border: 2px solid var(--navy); padding: 15px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; background: rgba(16, 58, 87, 0.98); color: white; z-index: 1000; padding: 20px; }
        .btn-final { background: var(--gold); border: none; padding: 15px 30px; border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; color: var(--p-purple); }
    </style>
</head>
<body onload="iniciarSesion()">

<header>SESIÓN 3: CONTROL DE IMPULSOS</header>

<div id="contenedor-juego">
    <div id="panel-regla" id="texto-instruccion">¡CARGANDO!</div>
    <div id="estimulo-central" id="palabra-display">---</div>
    <div id="zona-opciones" id="botones-contenedor"></div>
</div>

<div id="overlay-final">
    <h1 style="color: var(--gold);">¡SESIÓN FINALIZADA!</h1>
    <p id="stats" style="font-size: 1.2rem;"></p>
    <p style="font-style: italic; margin: 20px 0;">"Controlar tus impulsos también es una forma de cuidarte a ti."</p>
    <button class="btn-final" onclick="window.location.href='index.html'">CONTINUAR</button>
</div>

<script>
    const colores = [
        { n: "ROJO", h: "#FF0000" }, { n: "AZUL", h: "#0000FF" },
        { n: "VERDE", h: "#008000" }, { n: "AMARILLO", h: "#E6B800" },
        { n: "NEGRO", h: "#000000" }
    ];

    let intentos = 0, aciertos = 0, errores = 0, regla = "palabra";

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 1;
        window.speechSynthesis.speak(m);
    }

    function iniciarSesion() {
        // Sin esperas, arrancamos ya
        hablar("Juan, selecciona la opción correcta según la instrucción.");
        proxima();
    }

    function proxima() {
        if (intentos >= 15) { finalizar(); return; }

        // Lógica de Niveles Directa
        if (intentos < 5) { 
            regla = "palabra"; 
        } else if (intentos < 10) { 
            regla = "color"; 
        } else { 
            regla = Math.random() > 0.5 ? "palabra" : "color"; 
        }

        const textoRegla = regla === "palabra" ? "LEE LA PALABRA" : "MIRA EL COLOR";
        document.getElementById('panel-regla').innerText = textoRegla;

        // Generar estímulo con interferencia (Stroop)
        const pRandom = colores[Math.floor(Math.random() * colores.length)];
        let cRandom;
        do { cRandom = colores[Math.floor(Math.random() * colores.length)]; } while (cRandom.h === pRandom.h);

        const display = document.getElementById('estimulo-central');
        display.innerText = pRandom.n;
        display.style.color = cRandom.h;

        // Definir respuesta correcta
        const correcta = regla === "palabra" ? pRandom : cRandom;

        // Crear botones
        const contenedor = document.getElementById('zona-opciones');
        contenedor.innerHTML = "";
        
        // Mezclar 4 opciones
        let opciones = [...colores].sort(() => 0.5 - Math.random()).slice(0, 4);
        if (!opciones.find(o => o.n === correcta.n)) { opciones[0] = correcta; }
        opciones.sort(() => 0.5 - Math.random());

        opciones.forEach(col => {
            const btn = document.createElement('div');
            btn.className = 'opcion';
            btn.innerText = col.n;
            btn.onclick = () => {
                intentos++;
                if (col.n === correcta.n) {
                    aciertos++;
                    document.body.style.backgroundColor = "#C8E6C9"; // Flash verde
                } else {
                    errores++;
                    document.body.style.backgroundColor = "#FFCDD2"; // Flash rojo
                }
                setTimeout(() => {
                    document.body.style.backgroundColor = "#F3E5F5";
                    proxima();
                }, 200);
            };
            contenedor.appendChild(btn);
        });
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        document.getElementById('stats').innerText = `Aciertos: ${aciertos} | Errores: ${errores}`;
        hablar("Muy bien Juan. Has terminado tu entrenamiento de hoy.");
    }
</script>
</body>
</html>

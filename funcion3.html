<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 3: Control Inhibitorio - REHABILIDIA</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #F3E5F5; --gold: #FFD700; --navy: #103A57; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 15px; font-weight: bold; font-size: 1.2rem; }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

        .panel-regla { background: var(--p-purple); color: white; padding: 15px 25px; border-radius: 20px; font-size: 1.5rem; font-weight: bold; margin-bottom: 30px; border: 4px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        #estimulo-central { font-size: 5rem; font-weight: 900; margin-bottom: 40px; text-transform: uppercase; min-height: 120px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }

        #zona-opciones { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px; }
        .opcion { background: white; border: 3px solid var(--navy); padding: 20px; border-radius: 15px; font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .opcion:active { transform: scale(0.9); background: #eee; }

        #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; background: rgba(16, 58, 87, 0.95); color: white; z-index: 100; }
        .btn-final { background: var(--gold); border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 20px; color: var(--p-purple); }
    </style>
</head>
<body onload="iniciarSesion()">

<header>SESIÓN 3: CONTROL DE IMPULSOS</header>

<div id="contenedor-juego">
    <div id="panel-regla" id="instruccion-texto">¡PREPÁRATE!</div>
    
    <div id="estimulo-central">---</div>

    <div id="zona-opciones"></div>
</div>

<div id="overlay-final">
    <h1 style="color: var(--gold); font-size: 2.5rem;">¡BIEN HECHO!</h1>
    <p id="stats" style="font-size: 1.4rem;"></p>
    <p style="padding: 20px; font-style: italic;">"Controlar tus impulsos también es una forma de cuidarte a ti."</p>
    <button class="btn-final" onclick="window.location.href='index.html'">VOLVER AL MENÚ</button>
</div>

<script>
    const colores = [
        { nombre: "ROJO", hex: "#FF0000" },
        { nombre: "AZUL", hex: "#0000FF" },
        { nombre: "VERDE", hex: "#008000" },
        { nombre: "AMARILLO", hex: "#FFD700" },
        { nombre: "NEGRO", hex: "#000000" }
    ];

    let nivel = 1;
    let aciertos = 0;
    let errores = 0;
    let totalIntentos = 0;
    let reglaActual = "palabra"; // palabra o color

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 0.9;
        window.speechSynthesis.speak(m);
    }

    function iniciarSesion() {
        hablar("Juan, en esta actividad debes elegir la palabra correcta, ignorando el color de la letra. ¡Concéntrate!");
        setTimeout(siguientePregunta, 3000);
    }

    function siguientePregunta() {
        if (totalIntentos >= 15) {
            finalizar();
            return;
        }

        // Subir nivel según intentos
        if (totalIntentos === 5) { nivel = 2; reglaActual = "color"; hablar("¡Cambio! Ahora elige el color de la tinta, no la palabra."); }
        if (totalIntentos === 10) { nivel = 3; hablar("¡Cuidado! La regla cambiará en cada turno."); }

        if (nivel === 3) {
            reglaActual = Math.random() > 0.5 ? "palabra" : "color";
        }

        document.getElementById('panel-regla').innerText = reglaActual === "palabra" ? "LEE LA PALABRA" : "MIRA EL COLOR";
        
        // Crear el estímulo (palabra y color que no coincidan para crear interferencia)
        const pRandom = colores[Math.floor(Math.random() * colores.length)];
        let cRandom;
        do {
            cRandom = colores[Math.floor(Math.random() * colores.length)];
        } while (cRandom.hex === pRandom.hex);

        const central = document.getElementById('estimulo-central');
        central.innerText = pRandom.nombre;
        central.style.color = cRandom.hex;

        // Generar opciones
        const zonaOpciones = document.getElementById('zona-opciones');
        zonaOpciones.innerHTML = "";

        // Mezclar colores para las opciones
        const opcionesMezcladas = [...colores].sort(() => 0.5 - Math.random()).slice(0, nivel === 1 ? 2 : 4);
        
        // Asegurar que la respuesta correcta esté
        const correcta = reglaActual === "palabra" ? pRandom : cRandom;
        if (!opcionesMezcladas.includes(correcta)) {
            opcionesMezcladas[0] = correcta;
        }
        opcionesMezcladas.sort(() => 0.5 - Math.random());

        opcionesMezcladas.forEach(col => {
            const btn = document.createElement('div');
            btn.className = 'opcion';
            btn.innerText = col.nombre;
            btn.onclick = () => validar(col, correcta);
            zonaOpciones.appendChild(btn);
        });
    }

    function validar(elegido, correcto) {
        totalIntentos++;
        if (elegido.nombre === correcto.nombre) {
            aciertos++;
            siguientePregunta();
        } else {
            errores++;
            hablar("¡Concéntrate, Juan!");
            document.body.style.backgroundColor = "#FFCDD2";
            setTimeout(() => {
                document.body.style.backgroundColor = var(--bg);
                siguientePregunta();
            }, 500);
        }
    }

    function finalizar() {
        const porc = Math.round((aciertos / totalIntentos) * 100);
        document.getElementById('stats').innerText = `Aciertos: ${aciertos} | Errores: ${errores} | Precisión: ${porc}%`;
        document.getElementById('overlay-final').style.display = 'flex';
        hablar("Muy bien Juan. Controlar tus impulsos también es una forma de cuidarte a ti.");
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 9 - La Cocina de Juan</title>
    <style>
        body { 
            font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; display: flex; flex-direction: column; height: 100vh;
            background: #f4f4f4 url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); 
        }
        #cabecera { background: #1B4F72; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #guia-box { background: white; color: #1B4F72; width: 90%; border-radius: 10px; padding: 10px; display: flex; align-items: center; border: 3px solid #E67E22; min-height: 60px; }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; }
        
        #escenario { flex-grow: 1; display: flex; position: relative; padding: 15px; gap: 20px; align-items: stretch; }
        
        #zona-receta { width: 25%; display: flex; flex-direction: column; gap: 10px; }
        #lista-pasos { background: #fff3e0; padding: 15px; border-radius: 12px; border: 2px solid #E67E22; text-align: center; }
        
        /* Cuadro exclusivo para instrucciones de VOZ (Contradicciones) */
        #caja-instruccion-voz { 
            background: #e8f4fd; border: 2px solid #3498db; border-radius: 10px; padding: 10px; 
            text-align: center; font-weight: bold; color: #1B4F72; min-height: 50px; display: flex; align-items: center; justify-content: center;
        }

        #zona-coccion { width: 45%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 50px; }
        #estufa-img { width: 100%; max-width: 380px; z-index: 1; }
        #sarten-img { width: 240px; position: absolute; top: 90px; z-index: 2; pointer-events: none; }
        /* Área de colisión ampliada para mejor agarre */
        #sarten-target { width: 180px; height: 140px; position: absolute; top: 110px; z-index: 10; border-radius: 50%; }

        #despensa { 
            width: 30%; background: rgba(255,255,255,0.9); border: 3px solid #1B4F72; border-radius: 20px; 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; overflow-y: auto; max-height: 75vh;
        }
        .item { width: 80px; height: 80px; object-fit: contain; cursor: grab; touch-action: none; z-index: 20; }

        /* Ventana de emergencia central */
        #alerta-emergencia { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: #C0392B; color: white; border: 6px solid #FFC300; border-radius: 25px; padding: 25px; text-align: center; z-index: 2000; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .btn-accion { padding: 15px 30px; margin-top: 20px; background: #FFC300; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body onload="iniciarSesion9()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Cargando...</p>
    </div>
</div>

<div id="escenario">
    <div id="zona-receta">
        <div id="lista-pasos">
            <strong>PLATILLO:</strong><br><span id="nombre-plato">---</span>
            <hr>
            <strong>PANTALLA DICE:</strong><br>
            <span id="paso-texto" style="font-size: 1.4rem; font-weight: bold; color: #d35400;">---</span>
        </div>
        <div id="caja-instruccion-voz">Escucha con atención...</div>
    </div>

    <div id="zona-coccion">
        <img src="img9/estufa.png" id="estufa-img">
        <img src="img9/sarten.png" id="sarten-img">
        <div id="sarten-target"></div>
    </div>

    <div id="despensa"></div>
</div>

<div id="alerta-emergencia">
    <h2>¡ATENCIÓN!</h2>
    <p id="txt-alerta"></p>
    <button class="btn-accion" onclick="resolverInterrupcion()">SOLUCIONAR</button>
</div>

<script>
    let nivelActual = 1;
    let pasoProgreso = 0;
    let interrupcionActiva = false;
    let ingredienteObligatorioVoz = ""; 
    let audioAmbiente = new Audio();

    const recetas = {
        1: { 
            nombre: "Desayuno", 
            meta: ["arepa.png", "huevo.png", "queso.png", "tocino.png"],
            extra: ["fresa.png", "azucar.png"],
            audio: "img9/ambiente_cocina.mp3",
            bienvenida: "Hola Juan, preparemos el Desayuno. Sigue mis instrucciones de voz.",
            emergencia: "¡Juan, el chocolate se está regando! Bátelo rápido."
        },
        2: { 
            nombre: "Arroz con Pollo", 
            meta: ["arroz.png", "pollo.png", "zanahoria.png", "tomate.png"],
            extra: ["naranja.png", "harina.png"],
            audio: "img9/radio.mp3",
            bienvenida: "Bien Juan, ahora Arroz con Pollo. ¡Atento a los cambios!",
            emergencia: "¡Juan! El arroz se está quemando, muévelo ya."
        },
        3: { 
            nombre: "Sancocho", 
            meta: ["carne.png", "cerdo.png", "pollo.png", "papa.png", "yuca.png", "platano.png", "mazorca.png", "cilantro.png"],
            extra: ["pepino.png", "apio.png"],
            audio: "img9/licuadora.mp3",
            bienvenida: "Reto final: El Sancocho. No te distraigas.",
            emergencia: "¡Peligro! La carne se quema, apaga el fogón."
        }
    };

    function vozCoterapeuta(txt, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        document.getElementById('texto-guia').innerText = txt;
        if(callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function vozInstruccion(txt) {
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-MX';
        msg.pitch = 0.9;
        // Solo actualiza el cuadro de la izquierda para retos de voz
        document.getElementById('caja-instruccion-voz').innerText = txt;
        window.speechSynthesis.speak(msg);
    }

    function iniciarSesion9() {
        const conf = recetas[nivelActual];
        vozCoterapeuta(conf.bienvenida, () => { cargarCocina(); });
    }

    function cargarCocina() {
        pasoProgreso = 0;
        const conf = recetas[nivelActual];
        document.getElementById('nombre-plato').innerText = conf.nombre;
        document.getElementById('caja-instruccion-voz').innerText = "Cocinando...";
        
        const d = document.getElementById('despensa');
        d.innerHTML = "";
        let pool = [...conf.meta, ...conf.extra].sort(() => Math.random() - 0.5);
        
        pool.forEach(imgName => {
            const img = document.createElement('img');
            img.src = `img9/${imgName}`;
            img.className = 'item';
            img.dataset.file = imgName;
            img.onmousedown = img.ontouchstart = dragIngrediente;
            d.appendChild(img);
        });

        audioAmbiente.src = conf.audio;
        audioAmbiente.play().catch(e => {});
        actualizarUI();
        setTimeout(lanzarEmergencia, 15000);
    }

    function actualizarUI() {
        const conf = recetas[nivelActual];
        if(pasoProgreso < conf.meta.length) {
            document.getElementById('paso-texto').innerText = conf.meta[pasoProgreso].split('.')[0].toUpperCase();
            
            // Reto de contradicción ocasional
            if(Math.random() > 0.6) {
                let rIdx = Math.floor(Math.random() * conf.meta.length);
                ingredienteObligatorioVoz = conf.meta[rIdx];
                let nombreVoz = ingredienteObligatorioVoz.split('.')[0];
                vozInstruccion("¡Juan! Olvida la pantalla, pon el " + nombreVoz);
            } else {
                ingredienteObligatorioVoz = "";
                document.getElementById('caja-instruccion-voz').innerText = "Sigue el orden visual.";
            }
        }
    }

    function lanzarEmergencia() {
        if(pasoProgreso < recetas[nivelActual].meta.length) {
            interrupcionActiva = true;
            document.getElementById('estufa-img').src = "img9/estufa_prendida.png";
            document.getElementById('alerta-emergencia').style.display = 'block';
            document.getElementById('txt-alerta').innerText = recetas[nivelActual].emergencia;
            // Solo voz, NO se escribe en el cuadro de la izquierda
            const msg = new SpeechSynthesisUtterance(recetas[nivelActual].emergencia);
            msg.lang = 'es-ES';
            window.speechSynthesis.speak(msg);
        }
    }

    function resolverInterrupcion() {
        interrupcionActiva = false;
        document.getElementById('estufa-img').src = "img9/estufa.png";
        document.getElementById('alerta-emergencia').style.display = 'none';
        vozCoterapeuta("Excelente, continúa.");
    }

    function dragIngrediente(e) {
        if(interrupcionActiva) return;
        e.preventDefault();
        const el = e.target;
        const t = e.type === 'touchstart' ? e.touches[0] : e;
        let ox = t.clientX - el.getBoundingClientRect().left;
        let oy = t.clientY - el.getBoundingClientRect().top;
        el.style.position = 'fixed'; el.style.zIndex = "1000";

        const move = (me) => {
            const mt = me.type === 'touchmove' ? me.touches[0] : me;
            el.style.left = (mt.clientX - ox) + 'px'; el.style.top = (mt.clientY - oy) + 'px';
        };

        const stop = (se) => {
            document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop);
            const st = se.type === 'touchend' ? se.changedTouches[0] : se;
            el.style.display = 'none';
            const drop = document.elementFromPoint(st.clientX, st.clientY);
            el.style.display = 'block';

            const conf = recetas[nivelActual];
            let objetivo = (ingredienteObligatorioVoz !== "") ? ingredienteObligatorioVoz : conf.meta[pasoProgreso];

            if(drop && drop.id === 'sarten-target' && el.dataset.file === objetivo) {
                new Audio('img8/exito.mp3').play().catch(e=>{});
                el.remove();
                if(ingredienteObligatorioVoz !== "" && ingredienteObligatorioVoz !== conf.meta[pasoProgreso]) {
                    conf.meta = conf.meta.filter(item => item !== el.dataset.file);
                } else { pasoProgreso++; }

                if(pasoProgreso >= conf.meta.length) {
                    finalizarPlato();
                } else { actualizarUI(); }
            } else {
                el.style.position = 'relative'; el.style.left = 'auto'; el.style.top = 'auto';
            }
        };
        document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
        document.addEventListener('touchmove', move, {passive: false}); document.addEventListener('touchend', stop);
    }

    function finalizarPlato() {
        audioAmbiente.pause();
        vozCoterapeuta("¡Delicioso Juan! Pasemos al siguiente.", () => {
            setTimeout(() => {
                if(nivelActual < 3) { nivelActual++; iniciarSesion9(); }
                else { vozCoterapeuta("¡Sesión completada, eres un gran chef!"); }
            }, 2000);
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 9 - La Cocina de Juan</title>
    <style>
        /* FONDO INVENTADO: Cocina acogedora */
        body { 
            font-family: sans-serif; 
            margin: 0; 
            background: #e5e5e5;
            background-image: 
                linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)),
                url('https://www.transparenttextures.com/patterns/tileable-wood.png');
            overflow: hidden; 
            touch-action: none; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        #cabecera { background: #1B4F72; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #guia-box { background: white; color: #1B4F72; width: 90%; border-radius: 10px; padding: 10px; display: flex; align-items: center; border: 3px solid #E67E22; min-height: 60px; }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; }
        
        #escenario { 
            flex-grow: 1; 
            display: flex; 
            position: relative; 
            padding: 15px; 
            gap: 20px;
            /* Simulación de pared de cocina */
            border-top: 10px solid #AED6F1;
        }
        
        #zona-receta { width: 25%; display: flex; flex-direction: column; gap: 15px; }
        
        /* El plato ahora está oculto por defecto */
        #img-receta-guia { 
            width: 100%; 
            border-radius: 50%; 
            border: 8px solid white; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none; 
            transition: all 0.5s ease-in-out;
        }

        #lista-pasos { background: #fff3e0; padding: 15px; border-radius: 12px; border: 2px solid #E67E22; text-align: center; }
        
        #zona-coccion { width: 45%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 50px; }
        
        /* Estufa y Sartén */
        #estufa-img { width: 100%; max-width: 350px; z-index: 1; }
        #sarten-img { 
            width: 220px; 
            position: absolute; 
            bottom: 120px; /* Ajustado para quedar sobre la estufa */
            z-index: 2; 
        }
        #sarten-target { 
            width: 140px; 
            height: 100px; 
            position: absolute; 
            bottom: 140px; 
            z-index: 5; 
            border-radius: 50%;
        }

        #despensa { 
            width: 30%; 
            background: rgba(255,255,255,0.9); 
            border: 3px solid #1B4F72; 
            border-radius: 20px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 15px; 
            overflow-y: auto; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        .item { width: 85px; height: 85px; object-fit: contain; cursor: grab; touch-action: none; filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.2)); }

        /* Alertas */
        #alerta-emergencia { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: #C0392B; color: white; border: 6px solid #FFC300; border-radius: 25px; padding: 25px; text-align: center; z-index: 2000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .btn-accion { padding: 15px 30px; margin-top: 20px; background: #FFC300; color: #000; border: none; border-radius: 15px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }

        #modal-cierre { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body onload="iniciarSesion9()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">¡Cocinemos, Juan!</p>
    </div>
</div>

<div id="escenario">
    <div id="zona-receta">
        <img id="img-receta-guia" class="guia-visual">
        <div id="lista-pasos">
            <strong>RECETA ACTUAL:</strong><br>
            <span id="nombre-plato" style="color: #1B4F72; font-weight: bold;">---</span>
            <hr>
            <strong>SIGUIENTE PASO:</strong><br>
            <span id="paso-texto" style="font-size: 1.4rem; font-weight: bold; color: #d35400;">---</span>
        </div>
    </div>

    <div id="zona-coccion">
        <img src="img9/estufa.png" id="estufa-img">
        <img src="img9/sarten.png" id="sarten-img">
        <div id="sarten-target"></div>
    </div>

    <div id="despensa"></div>
</div>

<div id="alerta-emergencia">
    <h2 id="titulo-alerta">¡ATENCIÓN!</h2>
    <p id="txt-alerta"></p>
    <button class="btn-accion" onclick="resolverInterrupcion()">SOLUCIONAR</button>
</div>

<div id="modal-cierre">
    <h1 style="color: #FFC300;">¡PLATILLO TERMINADO!</h1>
    <p id="mensaje-final" style="padding: 20px; font-size: 1.5rem; max-width: 600px;"></p>
    <button onclick="location.reload()" style="padding:15px 40px; border-radius:15px; font-size: 1.2rem;">Siguiente Nivel</button>
</div>

<script>
    let nivelActual = 1;
    let pasoProgreso = 0;
    let interrupcionActiva = false;
    let ingredienteVozContradictorio = ""; 
    let audioAmbiente = new Audio();
    const exitoSnd = new Audio('img8/exito.mp3');

    const recetas = {
        1: { 
            nombre: "Desayuno", img: "img9/desayuno.png",
            meta: ["arepa.png", "huevo.png", "queso.png", "tocino.png"],
            extra: ["fresa.png", "azucar.png", "maracuya.png"],
            audio: "img9/ambiente_cocina.mp3",
            instruccion: "¡Juan, el chocolate se sube! Toca el botón para batirlo."
        },
        2: { 
            nombre: "Arroz con Pollo", img: "img9/arroz_con_pollo.png",
            meta: ["arroz.png", "pollo.png", "zanahoria.png", "tomate.png"],
            extra: ["naranja.png", "harina.png", "papaya.png"],
            audio: "img9/radio.mp3",
            instruccion: "¡Juan, suena el teléfono! Contesta rápido."
        },
        3: { 
            nombre: "Sancocho", img: "img9/sancocho.png",
            meta: ["carne.png", "cerdo.png", "pollo.png", "papa.png", "yuca.png", "platano.png", "mazorca.png", "cilantro.png"],
            extra: ["pepino.png", "camote.png", "perejil.png", "apio.png", "jengibre.png"],
            audio: "img9/licuadora.mp3",
            instruccion: "¡Prioridad Auditiva! Escúchame bien."
        }
    };

    function vozCoterapeuta(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        msg.pitch = 1.1;
        document.getElementById('texto-guia').innerText = txt;
        window.speechSynthesis.speak(msg);
    }

    function vozInterrupcion(txt) {
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-MX';
        msg.pitch = 0.8; 
        msg.rate = 1.1;
        window.speechSynthesis.speak(msg);
    }

    function iniciarSesion9() {
        document.getElementById('img-receta-guia').style.display = 'none';
        vozCoterapeuta("Juan, vamos a cocinar. Agrega los ingredientes al sartén. ¡Escucha bien mis instrucciones!");
        cargarCocina();
    }

    function cargarCocina() {
        pasoProgreso = 0;
        interrupcionActiva = false;
        const conf = recetas[nivelActual];
        
        document.getElementById('img-receta-guia').src = conf.img;
        document.getElementById('img-receta-guia').style.display = 'none';
        document.getElementById('nombre-plato').innerText = conf.nombre.toUpperCase();
        
        const d = document.getElementById('despensa');
        d.innerHTML = "";
        
        let pool = [...conf.meta, ...conf.extra].sort(() => Math.random() - 0.5);
        pool.forEach(imgName => {
            const img = document.createElement('img');
            img.src = `img9/${imgName}`;
            img.className = 'item';
            img.dataset.file = imgName;
            img.onmousedown = img.ontouchstart = dragIngrediente;
            d.appendChild(img);
        });

        audioAmbiente.src = conf.audio;
        audioAmbiente.loop = true;
        audioAmbiente.volume = 0.2;
        audioAmbiente.play();

        actualizarUI();
        setTimeout(lanzarRetoAuditivo, 10000);
    }

    function actualizarUI() {
        const conf = recetas[nivelActual];
        if(pasoProgreso < conf.meta.length) {
            const nombre = conf.meta[pasoProgreso].split('.')[0].toUpperCase();
            document.getElementById('paso-texto').innerText = nombre;
            
            if(nivelActual === 3 && Math.random() > 0.5) {
                ingredienteVozContradictorio = conf.meta[Math.floor(Math.random()*conf.meta.length)];
                if(ingredienteVozContradictorio !== conf.meta[pasoProgreso]) {
                    setTimeout(() => {
                        vozInterrupcion("¡Juan, olvida la lista! Echa mejor el " + ingredienteVozContradictorio.split('.')[0]);
                    }, 1200);
                }
            } else {
                ingredienteVozContradictorio = "";
            }
        }
    }

    function lanzarRetoAuditivo() {
        if(pasoProgreso < recetas[nivelActual].meta.length) {
            interrupcionActiva = true;
            document.getElementById('alerta-emergencia').style.display = 'block';
            const msg = recetas[nivelActual].instruccion;
            document.getElementById('txt-alerta').innerText = msg;
            vozInterrupcion(msg);
            document.getElementById('estufa-img').style.filter = "sepia(1) saturate(5) hue-rotate(-50deg) blur(1px)";
        }
    }

    function resolverInterrupcion() {
        interrupcionActiva = false;
        document.getElementById('alerta-emergencia').style.display = 'none';
        document.getElementById('estufa-img').style.filter = "none";
        vozCoterapeuta("¡Perfecto! Sigue con la receta.");
    }

    function dragIngrediente(e) {
        if(interrupcionActiva) { vozInterrupcion("¡Atiende la emergencia!"); return; }
        e.preventDefault();
        const el = e.target;
        const t = e.type === 'touchstart' ? e.touches[0] : e;
        let ox = t.clientX - el.getBoundingClientRect().left;
        let oy = t.clientY - el.getBoundingClientRect().top;
        el.style.position = 'fixed'; el.style.zIndex = "1000";

        const move = (me) => {
            const mt = me.type === 'touchmove' ? me.touches[0] : me;
            el.style.left = (mt.clientX - ox) + 'px'; el.style.top = (mt.clientY - oy) + 'px';
        };

        const stop = (se) => {
            document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop);
            const st = se.type === 'touchend' ? se.changedTouches[0] : se;
            el.style.display = 'none';
            const dropZone = document.elementFromPoint(st.clientX, st.clientY);
            el.style.display = 'block';

            const conf = recetas[nivelActual];
            let objetivoCorrecto = ingredienteVozContradictorio !== "" ? ingredienteVozContradictorio : conf.meta[pasoProgreso];

            if(dropZone && dropZone.id === 'sarten-target' && el.dataset.file === objetivoCorrecto) {
                exitoSnd.play();
                el.remove();
                pasoProgreso++;
                
                if(pasoProgreso >= conf.meta.length) {
                    mostrarPlatoFinal();
                } else {
                    vozCoterapeuta("¡Muy bien!");
                    actualizarUI();
                }
            } else {
                vozInterrupcion("¡Ese no es!");
                el.style.position = 'relative'; el.style.left = 'auto'; el.style.top = 'auto';
            }
        };
        document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
        document.addEventListener('touchmove', move, {passive: false}); document.addEventListener('touchend', stop);
    }

    function mostrarPlatoFinal() {
        const guia = document.getElementById('img-receta-guia');
        guia.style.display = 'block';
        guia.style.transform = 'scale(1.2)';
        vozCoterapeuta("¡Juan, mira qué delicia has preparado!");
        setTimeout(avanzarNivel, 4000);
    }

    function avanzarNivel() {
        audioAmbiente.pause();
        if(nivelActual < 3) {
            nivelActual++;
            cargarCocina();
        } else {
            finalizarSesion();
        }
    }

    function finalizarSesion() {
        document.getElementById('modal-cierre').style.display = 'flex';
        const finalTxt = "Tu capacidad para atender varias cosas a la vez te ayudará a ser más independiente.";
        document.getElementById('mensaje-final').innerText = finalTxt;
        vozCoterapeuta(finalTxt);
    }
</script>
</body>
</html>

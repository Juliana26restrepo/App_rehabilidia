<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 9 - La Cocina de Juan</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f0f0; overflow: hidden; touch-action: none; display: flex; flex-direction: column; height: 100vh; }
        #cabecera { background: #1B4F72; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #guia-box { background: white; color: #1B4F72; width: 90%; border-radius: 10px; padding: 10px; display: flex; align-items: center; border: 3px solid #E67E22; min-height: 60px; }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; }
        
        #escenario { flex-grow: 1; display: flex; background: #f9f9f9; position: relative; padding: 10px; gap: 10px; }
        
        #zona-receta { width: 25%; display: flex; flex-direction: column; gap: 10px; }
        .guia-visual { width: 100%; border-radius: 15px; border: 3px solid #1B4F72; background: #ddd; }
        #lista-pasos { background: #fff3e0; padding: 10px; border-radius: 10px; border: 2px solid #E67E22; text-align: center; }
        
        #zona-coccion { width: 45%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #estufa-img { width: 100%; max-width: 320px; transition: filter 0.3s; }
        #olla-target { width: 180px; height: 160px; position: absolute; top: 25%; z-index: 5; border-radius: 50%; }

        #despensa { width: 30%; background: #fff; border: 3px solid #1B4F72; border-radius: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 10px; overflow-y: auto; }
        .item { width: 75px; height: 75px; object-fit: contain; cursor: grab; touch-action: none; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2)); }

        /* Alertas de Interrupción */
        #alerta-emergencia { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: #C0392B; color: white; border: 6px solid #FFC300; border-radius: 20px; padding: 20px; text-align: center; z-index: 2000; }
        .btn-accion { padding: 15px 25px; margin-top: 15px; background: #FFC300; color: #000; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; }

        #modal-cierre { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body onload="iniciarSesion9()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">¡Cocinemos, Juan!</p>
    </div>
</div>

<div id="escenario">
    <div id="zona-receta">
        <img id="img-receta-guia" class="guia-visual">
        <div id="lista-pasos">
            <strong>ORDEN VISUAL:</strong><br>
            <span id="paso-texto" style="font-size: 1.3rem; font-weight: bold; color: #d35400;">---</span>
        </div>
    </div>

    <div id="zona-coccion">
        <img src="img9/estufa.png" id="estufa-img">
        <div id="olla-target"></div>
    </div>

    <div id="despensa"></div>
</div>

<div id="alerta-emergencia">
    <h2 id="titulo-alerta">¡ATENCIÓN!</h2>
    <p id="txt-alerta" style="font-size: 1.1rem;"></p>
    <button id="btn-resolver" class="btn-accion" onclick="resolverInterrupcion()">SOLUCIONAR</button>
</div>

<div id="modal-cierre">
    <h2>¡Misión Cumplida, Chef Juan!</h2>
    <p id="mensaje-final" style="padding: 20px; font-size: 1.2rem;"></p>
    <button onclick="location.reload()" style="padding:15px; border-radius:10px;">Reiniciar Sesión</button>
</div>

<script>
    let nivelActual = 1;
    let pasoProgreso = 0;
    let interrupcionActiva = false;
    let ingredienteVozContradictorio = ""; 
    let audioAmbiente = new Audio();
    const exitoSnd = new Audio('img8/exito.mp3');

    const recetas = {
        1: { 
            nombre: "Desayuno", img: "img9/desayuno.png",
            meta: ["arepa.png", "huevo.png", "queso.png", "tocino.png"],
            extra: ["fresa.png", "azucar.png", "maracuya.png"],
            audio: "img9/ambiente_cocina.mp3",
            instruccion: "¡Juan, el chocolate se sube! Toca el botón para batirlo."
        },
        2: { 
            nombre: "Arroz con Pollo", img: "img9/arroz_con_pollo.png",
            meta: ["arroz.png", "pollo.png", "zanahoria.png", "tomate.png"],
            extra: ["naranja.png", "harina.png", "papaya.png"],
            audio: "img9/radio.mp3",
            instruccion: "¡Juan, suena el teléfono! Contesta antes de seguir."
        },
        3: { 
            nombre: "Sancocho", img: "img9/sancocho.png",
            meta: ["carne.png", "cerdo.png", "pollo.png", "papa.png", "yuca.png", "platano.png", "mazorca.png", "cilantro.png"],
            extra: ["pepino.png", "camote.png", "perejil.png", "apio.png", "jengibre.png"],
            audio: "img9/licuadora.mp3",
            instruccion: "¡Prioridad Auditiva!"
        }
    };

    // FUNCIÓN DE VOCES DIFERENCIADAS
    function vozCoterapeuta(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        msg.pitch = 1.1; // Voz más amable
        document.getElementById('texto-guia').innerText = txt;
        window.speechSynthesis.speak(msg);
    }

    function vozInterrupcion(txt) {
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-MX'; // Cambio de acento si es posible
        msg.pitch = 0.8; // Voz más seria/directa
        msg.rate = 1.1;
        window.speechSynthesis.speak(msg);
    }

    function iniciarSesion9() {
        vozCoterapeuta("Juan, vamos a cocinar. Mira la receta, pero escucha mis cambios de último minuto.");
        cargarCocina();
    }

    function cargarCocina() {
        pasoProgreso = 0;
        interrupcionActiva = false;
        const conf = recetas[nivelActual];
        
        document.getElementById('img-receta-guia').src = conf.img;
        const d = document.getElementById('despensa');
        d.innerHTML = "";
        
        let pool = [...conf.meta, ...conf.extra].sort(() => Math.random() - 0.5);
        pool.forEach(imgName => {
            const img = document.createElement('img');
            img.src = `img9/${imgName}`;
            img.className = 'item';
            img.dataset.file = imgName;
            img.onmousedown = img.ontouchstart = dragIngrediente;
            d.appendChild(img);
        });

        audioAmbiente.src = conf.audio;
        audioAmbiente.loop = true;
        audioAmbiente.volume = 0.2;
        audioAmbiente.play();

        actualizarUI();
        // Programar primera interrupción tras 8 segundos
        setTimeout(lanzarRetoAuditivo, 8000);
    }

    function actualizarUI() {
        const conf = recetas[nivelActual];
        if(pasoProgreso < conf.meta.length) {
            const nombre = conf.meta[pasoProgreso].split('.')[0].toUpperCase();
            document.getElementById('paso-texto').innerText = nombre;
            
            // TRAMPA NIVEL ALTO: Voz contradice al texto
            if(nivelActual === 3 && Math.random() > 0.4) {
                ingredienteVozContradictorio = conf.meta[Math.floor(Math.random()*conf.meta.length)];
                if(ingredienteVozContradictorio !== conf.meta[pasoProgreso]) {
                    setTimeout(() => {
                        vozInterrupcion("¡Juan, olvida la pantalla! Echa primero el " + ingredienteVozContradictorio.split('.')[0]);
                    }, 1000);
                }
            } else {
                ingredienteVozContradictorio = "";
            }
        }
    }

    function lanzarRetoAuditivo() {
        if(pasoProgreso < recetas[nivelActual].meta.length) {
            interrupcionActiva = true;
            const alerta = document.getElementById('alerta-emergencia');
            alerta.style.display = 'block';
            const msg = recetas[nivelActual].instruccion;
            document.getElementById('txt-alerta').innerText = msg;
            vozInterrupcion(msg);
            document.getElementById('estufa-img').style.filter = "sepia(1) saturate(5) hue-rotate(-50deg)"; // Efecto quemado
        }
    }

    function resolverInterrupcion() {
        interrupcionActiva = false;
        document.getElementById('alerta-emergencia').style.display = 'none';
        document.getElementById('estufa-img').style.filter = "none";
        vozCoterapeuta("¡Eso es, Juan! Seguimos con la receta.");
    }

    function dragIngrediente(e) {
        if(interrupcionActiva) { vozInterrupcion("¡Juan! Atiende la emergencia primero."); return; }
        e.preventDefault();
        const el = e.target;
        const t = e.type === 'touchstart' ? e.touches[0] : e;
        let ox = t.clientX - el.getBoundingClientRect().left;
        let oy = t.clientY - el.getBoundingClientRect().top;
        el.style.position = 'fixed'; el.style.zIndex = "1000";

        const move = (me) => {
            const mt = me.type === 'touchmove' ? me.touches[0] : me;
            el.style.left = (mt.clientX - ox) + 'px'; el.style.top = (mt.clientY - oy) + 'px';
        };

        const stop = (se) => {
            document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop);
            const st = se.type === 'touchend' ? se.changedTouches[0] : se;
            el.style.display = 'none';
            const dropZone = document.elementFromPoint(st.clientX, st.clientY);
            el.style.display = 'block';

            const conf = recetas[nivelActual];
            let objetivoCorrecto = ingredienteVozContradictorio !== "" ? ingredienteVozContradictorio : conf.meta[pasoProgreso];

            if(dropZone && dropZone.id === 'olla-target' && el.dataset.file === objetivoCorrecto) {
                exitoSnd.play();
                el.remove();
                if(ingredienteVozContradictorio !== "") {
                    // Si cumplió la orden auditiva, buscamos dónde quedó ese ingrediente en la lista meta
                    pasoProgreso++; // O podrías marcarlo como hecho
                } else {
                    pasoProgreso++;
                }
                
                if(pasoProgreso >= conf.meta.length) {
                    avanzarNivel();
                } else {
                    vozCoterapeuta("¡Perfecto!");
                    actualizarUI();
                }
            } else {
                vozInterrupcion("¡Cuidado Juan! Ese no es el paso.");
                el.style.position = 'relative'; el.style.left = 'auto'; el.style.top = 'auto';
            }
        };
        document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
        document.addEventListener('touchmove', move, {passive: false}); document.addEventListener('touchend', stop);
    }

    function avanzarNivel() {
        audioAmbiente.pause();
        if(nivelActual < 3) {
            nivelActual++;
            vozCoterapeuta("¡Increíble! Esa receta quedó muy bien. Vamos a la siguiente.");
            setTimeout(cargarCocina, 3000);
        } else {
            finalizarSesion();
        }
    }

    function finalizarSesion() {
        document.getElementById('modal-cierre').style.display = 'flex';
        const finalTxt = "Tu capacidad para atender varias cosas a la vez te ayudará a ser más independiente.";
        document.getElementById('mensaje-final').innerText = finalTxt;
        vozCoterapeuta(finalTxt);
    }
</script>
</body>
</html>

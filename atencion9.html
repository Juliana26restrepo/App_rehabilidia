<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 9 - La Cocina de Juan</title>
    <style>
        body { 
            font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; display: flex; flex-direction: column; height: 100vh;
            background: url('img7/mesa_fondo.jpg') no-repeat center center fixed; background-size: cover;
        }
        #cabecera { background: rgba(27, 79, 114, 0.9); color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #guia-box { background: white; color: #1B4F72; width: 90%; border-radius: 10px; padding: 10px; display: flex; align-items: center; border: 3px solid #E67E22; }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; }
        #escenario { flex-grow: 1; display: flex; position: relative; padding: 15px; gap: 20px; }
        #zona-receta { width: 25%; display: flex; flex-direction: column; gap: 10px; }
        #lista-pasos { background: rgba(255, 253, 224, 0.95); padding: 15px; border-radius: 12px; border: 2px solid #E67E22; text-align: center; }
        #caja-instruccion-voz { background: rgba(232, 244, 253, 0.95); border: 3px solid #3498db; border-radius: 10px; padding: 15px; text-align: center; font-weight: bold; color: #1B4F72; min-height: 70px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        #zona-coccion { width: 45%; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        #estufa-img { width: 100%; max-width: 380px; }
        #sarten-target { width: 180px; height: 140px; position: absolute; top: 110px; z-index: 10; border-radius: 50%; }
        #plato-final-img { position: absolute; top: 50px; width: 300px; z-index: 100; display: none; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6)); }
        #despensa { width: 30%; background: rgba(255,255,255,0.9); border: 3px solid #1B4F72; border-radius: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; overflow-y: auto; max-height: 75vh; }
        .item { width: 85px; height: 85px; object-fit: contain; cursor: grab; touch-action: none; }
        #alerta-emergencia { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; background: #C0392B; color: white; border: 6px solid #FFC300; border-radius: 25px; padding: 25px; text-align: center; z-index: 2000; }
        .btn-accion { padding: 15px 30px; margin-top: 20px; background: #FFC300; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; color: #1B4F72; font-size: 1.2rem; }
    </style>
</head>
<body onload="iniciarSesion9()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">¡Juan! Vamos a cocinar con lo que tenemos.</p>
    </div>
</div>

<div id="escenario">
    <div id="zona-receta">
        <div id="lista-pasos">
            <strong>RECETA:</strong><br><span id="nombre-plato">---</span>
            <hr>
            <strong>MIRA LA PANTALLA:</strong><br>
            <span id="paso-texto" style="font-size: 1.6rem; font-weight: bold; color: #d35400;">---</span>
        </div>
        <div id="caja-instruccion-voz">Escucha...</div>
    </div>
    <div id="zona-coccion">
        <img src="img9/estufa.png" id="estufa-img">
        <img src="img9/sarten.png" style="width: 240px; position: absolute; top: 90px; z-index: 2; pointer-events: none;">
        <div id="sarten-target"></div>
        <img id="plato-final-img">
    </div>
    <div id="despensa"></div>
</div>

<div id="alerta-emergencia">
    <h2>⚠️ ¡ATENCIÓN!</h2>
    <p id="txt-alerta"></p>
    <button class="btn-accion" onclick="resolverInterrupcion()">SOLUCIONAR</button>
</div>

<script>
    let nivelActual = 1;
    let ingredientesRestantes = []; 
    let interrupcionActiva = false;
    let ingredienteObjetivo = ""; 
    let audioAmbiente = new Audio();

    // Lista VERIFICADA basada en tus archivos
    const todosLosIngredientes = [
        "apio.png", "arepa.png", "arroz.png", "azucar.png", "bowl.png", "camote.png", "carne.png", "cebolla.png", 
        "cerdo.png", "chocolate.png", "cilantro.png", "fresa.png", "harina.png", "huevo.png", "jengibre.png", 
        "maracuya.png", "mazorca.png", "naranja.png", "papa.png", "papaya.png", "pepino.png", "pera.png", 
        "perejil.png", "pescado.png", "platano.png", "pollo.png", "queso.png", "sal.png", "tocino.png", 
        "uva.png", "yuca.png", "zanahoria.png"
    ];

    const recetas = {
        1: { nombre: "Desayuno", platoFinal: "img9/desayuno.png", meta: ["arepa.png", "huevo.png", "queso.png", "tocino.png"], audio: "img9/ambiente_cocina.mp3", emergencia: "¡El chocolate se está regando!" },
        2: { nombre: "Arroz con Pollo", platoFinal: "img9/arroz_con_pollo.png", meta: ["arroz.png", "pollo.png", "zanahoria.png", "arroz.png"], audio: "img9/radio.mp3", emergencia: "¡El arroz se está pegando!" },
        3: { nombre: "Sancocho", platoFinal: "img9/sancocho.png", meta: ["carne.png", "papa.png", "yuca.png", "mazorca.png", "platano.png", "cilantro.png"], audio: "img9/licuadora.mp3", emergencia: "¡Apaga el fogón!" }
    };

    function vozCoterapeuta(txt, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        document.getElementById('texto-guia').innerText = txt;
        if(callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function vozInstruccion(txt) {
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-MX';
        document.getElementById('caja-instruccion-voz').innerText = txt;
        window.speechSynthesis.speak(msg);
    }

    function iniciarSesion9() {
        document.getElementById('plato-final-img').style.display = 'none';
        const conf = recetas[nivelActual];
        ingredientesRestantes = [...conf.meta]; 
        vozCoterapeuta("Hagamos " + conf.nombre, () => { cargarCocina(); });
    }

    function cargarCocina() {
        const conf = recetas[nivelActual];
        document.getElementById('nombre-plato').innerText = conf.nombre;
        const d = document.getElementById('despensa');
        d.innerHTML = "";
        
        let distractores = todosLosIngredientes.filter(i => !conf.meta.includes(i));
        let pool = [...conf.meta, ...distractores.slice(0, 10)].sort(() => Math.random() - 0.5);
        
        pool.forEach(imgName => {
            const img = document.createElement('img');
            img.src = `img9/${imgName}`;
            img.className = 'item';
            img.dataset.file = imgName;
            img.onmousedown = img.ontouchstart = dragIngrediente;
            d.appendChild(img);
        });

        audioAmbiente.src = conf.audio;
        audioAmbiente.play().catch(e=>{});
        actualizarUI();
        planearEmergencia();
    }

    function planearEmergencia() {
        setTimeout(() => {
            if(ingredientesRestantes.length > 0 && !interrupcionActiva) lanzarEmergencia();
        }, 15000 + Math.random() * 8000);
    }

    function actualizarUI() {
        if(ingredientesRestantes.length > 0) {
            const pantallaPide = ingredientesRestantes[0];
            document.getElementById('paso-texto').innerText = pantallaPide.split('.')[0].toUpperCase();
            
            // AZAR 50/50
            if(Math.random() > 0.5 && ingredientesRestantes.length > 1) {
                let opcionesVoz = ingredientesRestantes.filter(i => i !== pantallaPide);
                ingredienteObjetivo = opcionesVoz[Math.floor(Math.random() * opcionesVoz.length)];
                vozInstruccion("¡Juan! Olvida la pantalla, pon el " + ingredienteObjetivo.split('.')[0]);
            } else {
                ingredienteObjetivo = pantallaPide;
                vozInstruccion("¡Eso es! Sigue la pantalla y pon el " + ingredienteObjetivo.split('.')[0]);
            }
        }
    }

    function lanzarEmergencia() {
        interrupcionActiva = true;
        document.getElementById('estufa-img').src = "img9/estufa_prendida.png";
        document.getElementById('alerta-emergencia').style.display = 'block';
        document.getElementById('txt-alerta').innerText = recetas[nivelActual].emergencia;
        vozCoterapeuta(recetas[nivelActual].emergencia);
    }

    function resolverInterrupcion() {
        interrupcionActiva = false;
        document.getElementById('estufa-img').src = "img9/estufa.png";
        document.getElementById('alerta-emergencia').style.display = 'none';
        vozCoterapeuta("¡Bien hecho!");
        planearEmergencia();
    }

    function dragIngrediente(e) {
        if(interrupcionActiva) return;
        const el = e.target;
        const t = e.type === 'touchstart' ? e.touches[0] : e;
        let ox = t.clientX - el.getBoundingClientRect().left;
        let oy = t.clientY - el.getBoundingClientRect().top;
        el.style.position = 'fixed'; el.style.zIndex = "1000";

        const move = (me) => {
            const mt = me.type === 'touchmove' ? me.touches[0] : me;
            el.style.left = (mt.clientX - ox) + 'px'; el.style.top = (mt.clientY - oy) + 'px';
        };

        const stop = (se) => {
            document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop);
            const st = se.type === 'touchend' ? se.changedTouches[0] : se;
            el.style.display = 'none';
            const drop = document.elementFromPoint(st.clientX, st.clientY);
            el.style.display = 'block';

            if(drop && drop.id === 'sarten-target') {
                if(el.dataset.file === ingredienteObjetivo) {
                    new Audio('img8/exito.mp3').play().catch(e=>{});
                    ingredientesRestantes = ingredientesRestantes.filter(i => i !== el.dataset.file);
                    el.remove();
                    if(ingredientesRestantes.length === 0) mostrarResultadoFinal();
                    else actualizarUI();
                } else {
                    new Audio('img8/error.mp3').play().catch(e=>{});
                    vozCoterapeuta("¡No Juan! Era el " + ingredienteObjetivo.split('.')[0]);
                    el.style.position = 'relative'; el.style.left = 'auto'; el.style.top = 'auto';
                }
            } else {
                el.style.position = 'relative'; el.style.left = 'auto'; el.style.top = 'auto';
            }
        };
        document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
        document.addEventListener('touchmove', move, {passive: false}); document.addEventListener('touchend', stop);
    }

    function mostrarResultadoFinal() {
        audioAmbiente.pause();
        const pf = document.getElementById('plato-final-img');
        pf.src = recetas[nivelActual].platoFinal;
        pf.style.display = 'block';
        vozCoterapeuta("¡Listo! El plato se ve genial.", () => {
            setTimeout(() => {
                if(nivelActual < 3) { nivelActual++; iniciarSesion9(); }
                else { vozCoterapeuta("¡Sesión finalizada!"); }
            }, 3000);
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 9 - La Cocina de Juan</title>
    <style>
        body { 
            font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; display: flex; flex-direction: column; height: 100vh;
            background: #f0f0f0 url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); 
        }
        #cabecera { background: #1B4F72; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #guia-box { background: white; color: #1B4F72; width: 90%; border-radius: 10px; padding: 10px; display: flex; align-items: center; border: 3px solid #E67E22; min-height: 60px; }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; }
        
        #escenario { flex-grow: 1; display: flex; position: relative; padding: 15px; gap: 20px; align-items: stretch; }
        
        #zona-receta { width: 25%; display: flex; flex-direction: column; gap: 10px; }
        #img-receta-guia { width: 100%; border-radius: 15px; border: 5px solid white; display: none; }
        #lista-pasos { background: #fff3e0; padding: 10px; border-radius: 12px; border: 2px solid #E67E22; text-align: center; }
        
        /* FOGÓN Y SARTÉN MÁS ARRIBA Y CENTRADOS */
        #zona-coccion { width: 45%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 20px; }
        #estufa-img { width: 100%; max-width: 360px; z-index: 1; }
        #sarten-img { width: 220px; position: absolute; top: 60px; z-index: 2; }
        #sarten-target { width: 150px; height: 100px; position: absolute; top: 80px; z-index: 10; }

        /* DESPENSA CORREGIDA: Asegura visibilidad */
        #despensa { 
            width: 30%; 
            background: rgba(255,255,255,0.9); 
            border: 3px solid #1B4F72; 
            border-radius: 20px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            padding: 15px; 
            overflow-y: auto;
            max-height: 70vh; /* Altura máxima para obligar a mostrar el scroll si hay muchos */
        }
        .item { width: 75px; height: 75px; object-fit: contain; cursor: grab; touch-action: none; z-index: 20; }

        #alerta-emergencia { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: #C0392B; color: white; border: 6px solid #FFC300; border-radius: 25px; padding: 20px; text-align: center; z-index: 3000; }
        .btn-accion { padding: 12px 25px; margin-top: 15px; background: #FFC300; color: #000; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="iniciarSesion9()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Cargando ingredientes...</p>
    </div>
</div>

<div id="escenario">
    <div id="zona-receta">
        <img id="img-receta-guia">
        <div id="lista-pasos">
            <strong>PLATILLO:</strong><br><span id="nombre-plato" style="color:#1B4F72; font-weight:bold;">---</span>
            <hr>
            <strong>PRÓXIMO INGREDIENTE:</strong><br>
            <span id="paso-texto" style="font-size: 1.4rem; font-weight: bold; color: #d35400;">---</span>
        </div>
    </div>

    <div id="zona-coccion">
        <img src="img9/estufa.png" id="estufa-img">
        <img src="img9/sarten.png" id="sarten-img">
        <div id="sarten-target"></div>
    </div>

    <div id="despensa"></div>
</div>

<div id="alerta-emergencia">
    <h2>¡PELIGRO!</h2>
    <p id="txt-alerta"></p>
    <button class="btn-accion" onclick="resolverInterrupcion()">SOLUCIONAR</button>
</div>

<script>
    let nivelActual = 1;
    let pasoProgreso = 0;
    let interrupcionActiva = false;
    let ingredienteVozVara = ""; 
    let audioAmbiente = new Audio();

    const recetas = {
        1: { 
            nombre: "Desayuno", img: "img9/desayuno.png",
            meta: ["arepa.png", "huevo.png", "queso.png", "tocino.png"],
            extra: ["fresa.png", "azucar.png"],
            audio: "img9/ambiente_cocina.mp3",
            bienvenida: "Hola Juan, ahora prepararemos un rico Desayuno. Necesitamos arepa, huevo, queso y tocino. ¡Manos a la obra!",
            emergencia: "¡Juan, el chocolate se está subiendo! Bátelo ya."
        },
        2: { 
            nombre: "Arroz con Pollo", img: "img9/arroz_con_pollo.png",
            meta: ["arroz.png", "pollo.png", "zanahoria.png", "tomate.png"],
            extra: ["naranja.png", "harina.png"],
            audio: "img9/radio.mp3",
            bienvenida: "¡Muy bien! Ahora prepararemos un Arroz con Pollo. Mira bien los ingredientes y no te distraigas.",
            emergencia: "¡Juan! El arroz se está quemando abajo, muévelo rápido."
        },
        3: { 
            nombre: "Sancocho", img: "img9/sancocho.png",
            meta: ["carne.png", "cerdo.png", "pollo.png", "papa.png", "yuca.png", "platano.png", "mazorca.png", "cilantro.png"],
            extra: ["pepino.png", "camote.png", "apio.png"],
            audio: "img9/licuadora.mp3",
            bienvenida: "¡Reto final! Ahora prepararemos un Sancocho. Es una receta larga, escucha con mucha atención el orden.",
            emergencia: "¡CUIDADO! La carne se está pegando al fondo. ¡Apaga el fogón!"
        }
    };

    function vozCoterapeuta(txt, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        document.getElementById('texto-guia').innerText = txt;
        if(callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function vozInterrupcion(txt) {
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-MX';
        msg.pitch = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function iniciarSesion9() {
        const conf = recetas[nivelActual];
        vozCoterapeuta(conf.bienvenida, () => {
            cargarCocina();
        });
    }

    function cargarCocina() {
        pasoProgreso = 0;
        interrupcionActiva = false;
        const conf = recetas[nivelActual];
        document.getElementById('nombre-plato').innerText = conf.nombre;
        
        const d = document.getElementById('despensa');
        d.innerHTML = "";
        let pool = [...conf.meta, ...conf.extra].sort(() => Math.random() - 0.5);
        
        pool.forEach(imgName => {
            const img = document.createElement('img');
            img.src = `img9/${imgName}`;
            img.className = 'item';
            img.dataset.file = imgName;
            img.onmousedown = img.ontouchstart = dragIngrediente;
            d.appendChild(img);
        });

        audioAmbiente.src = conf.audio;
        audioAmbiente.loop = true;
        audioAmbiente.volume = 0.2;
        audioAmbiente.play();

        actualizarUI();
        setTimeout(lanzarEmergencia, 10000);
    }

    function actualizarUI() {
        const conf = recetas[nivelActual];
        if(pasoProgreso < conf.meta.length) {
            document.getElementById('paso-texto').innerText = conf.meta[pasoProgreso].split('.')[0].toUpperCase();
            
            // Lógica contradictoria insistente
            if(Math.random() > 0.4) {
                ingredienteVozVara = conf.meta[Math.floor(Math.random() * conf.meta.length)];
                if(ingredienteVozVara !== conf.meta[pasoProgreso]) {
                    setTimeout(() => {
                        vozInterrupcion("¡Juan! No mires la pantalla, pon el " + ingredienteVozVara.split('.')[0] + " ahora mismo.");
                    }, 1000);
                }
            } else { ingredienteVozVara = ""; }
        }
    }

    function lanzarEmergencia() {
        if(pasoProgreso < recetas[nivelActual].meta.length) {
            interrupcionActiva = true;
            document.getElementById('estufa-img').src = "img9/estufa_prendida.png"; // REALISMO
            document.getElementById('alerta-emergencia').style.display = 'block';
            document.getElementById('txt-alerta').innerText = recetas[nivelActual].emergencia;
            vozInterrupcion(recetas[nivelActual].emergencia);
        }
    }

    function resolverInterrupcion() {
        interrupcionActiva = false;
        document.getElementById('estufa-img').src = "img9/estufa.png"; // Vuelve a la normalidad
        document.getElementById('alerta-emergencia').style.display = 'none';
        vozCoterapeuta("¡Bien hecho! Continuemos.");
    }

    function dragIngrediente(e) {
        if(interrupcionActiva) { vozInterrupcion("¡Juan, apaga el fuego primero!"); return; }
        e.preventDefault();
        const el = e.target;
        const t = e.type === 'touchstart' ? e.touches[0] : e;
        let ox = t.clientX - el.getBoundingClientRect().left;
        let oy = t.clientY - el.getBoundingClientRect().top;
        el.style.position = 'fixed'; el.style.zIndex = "1000";

        const move = (me) => {
            const mt = me.type === 'touchmove' ? me.touches[0] : me;
            el.style.left = (mt.clientX - ox) + 'px'; el.style.top = (mt.clientY - oy) + 'px';
        };

        const stop = (se) => {
            document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop);
            const st = se.type === 'touchend' ? se.changedTouches[0] : se;
            el.style.display = 'none';
            const drop = document.elementFromPoint(st.clientX, st.clientY);
            el.style.display = 'block';

            const conf = recetas[nivelActual];
            let objetivo = (ingredienteVozVara !== "") ? ingredienteVozVara : conf.meta[pasoProgreso];

            if(drop && drop.id === 'sarten-target' && el.dataset.file === objetivo) {
                new Audio('img8/exito.mp3').play();
                el.remove();
                if(ingredienteVozVara !== "" && ingredienteVozVara !== conf.meta[pasoProgreso]) {
                    conf.meta = conf.meta.filter(item => item !== el.dataset.file);
                } else { pasoProgreso++; }

                if(pasoProgreso >= conf.meta.length) { finalizar(); }
                else { vozCoterapeuta("Excelente."); actualizarUI(); }
            } else {
                vozInterrupcion("¡Ese no es! Concéntrate.");
                el.style.position = 'relative'; el.style.left = 'auto'; el.style.top = 'auto';
            }
        };
        document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
        document.addEventListener('touchmove', move, {passive: false}); document.addEventListener('touchend', stop);
    }

    function finalizar() {
        audioAmbiente.pause();
        document.getElementById('img-receta-guia').style.display = 'block';
        vozCoterapeuta("¡Increíble Juan! El " + recetas[nivelActual].nombre + " se ve delicioso.", () => {
            setTimeout(() => {
                if(nivelActual < 3) { nivelActual++; iniciarSesion9(); }
                else { vozCoterapeuta("¡Felicidades Chef! Has terminado todas las sesiones."); }
            }, 3000);
        });
    }
</script>
</body>
</html>

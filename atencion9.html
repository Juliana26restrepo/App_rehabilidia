<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 9 - La Cocina de Juan</title>
    <style>
        body { 
            font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; display: flex; flex-direction: column; height: 100vh;
            background: #f0f0f0 url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); 
        }
        #cabecera { background: #1B4F72; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #guia-box { background: white; color: #1B4F72; width: 90%; border-radius: 10px; padding: 10px; display: flex; align-items: center; border: 3px solid #E67E22; min-height: 60px; }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; }
        
        #escenario { flex-grow: 1; display: flex; position: relative; padding: 15px; gap: 20px; }
        
        #zona-receta { width: 25%; display: flex; flex-direction: column; gap: 15px; }
        #img-receta-guia { width: 100%; border-radius: 15px; border: 5px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: none; }
        #lista-pasos { background: #fff3e0; padding: 15px; border-radius: 12px; border: 2px solid #E67E22; text-align: center; }
        
        /* FOGÓN Y SARTÉN MÁS ARRIBA */
        #zona-coccion { width: 45%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 100px; }
        #estufa-img { width: 100%; max-width: 380px; z-index: 1; position: relative; bottom: 20px; }
        #sarten-img { width: 240px; position: absolute; top: 25%; z-index: 2; transition: transform 0.2s; }
        #sarten-target { width: 160px; height: 110px; position: absolute; top: 28%; z-index: 5; }

        #despensa { width: 30%; background: rgba(255,255,255,0.9); border: 3px solid #1B4F72; border-radius: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; overflow-y: auto; }
        .item { width: 80px; height: 80px; object-fit: contain; cursor: grab; touch-action: none; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2)); }

        #alerta-emergencia { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: #C0392B; color: white; border: 6px solid #FFC300; border-radius: 25px; padding: 25px; text-align: center; z-index: 2000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .btn-accion { padding: 15px 30px; margin-top: 20px; background: #FFC300; color: #000; border: none; border-radius: 15px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body onload="iniciarSesion9()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Preparando la cocina...</p>
    </div>
</div>

<div id="escenario">
    <div id="zona-receta">
        <img id="img-receta-guia">
        <div id="lista-pasos">
            <strong>RECETA ACTUAL:</strong><br><span id="nombre-plato" style="color:#1B4F72; font-weight:bold;">---</span>
            <hr>
            <strong>PANTALLA DICE:</strong><br>
            <span id="paso-texto" style="font-size: 1.5rem; font-weight: bold; color: #d35400;">---</span>
        </div>
    </div>

    <div id="zona-coccion">
        <img src="img9/estufa.png" id="estufa-img">
        <img src="img9/sarten.png" id="sarten-img">
        <div id="sarten-target"></div>
    </div>

    <div id="despensa"></div>
</div>

<div id="alerta-emergencia">
    <h2 id="titulo-alerta">¡ATENCIÓN!</h2>
    <p id="txt-alerta" style="font-size: 1.2rem;"></p>
    <button class="btn-accion" onclick="resolverInterrupcion()">SOLUCIONAR</button>
</div>

<script>
    let nivelActual = 1;
    let pasoProgreso = 0;
    let interrupcionActiva = false;
    let ingredienteObligatorioVoz = ""; 
    let audioAmbiente = new Audio();

    const recetas = {
        1: { 
            nombre: "Desayuno", img: "img9/desayuno.png",
            meta: ["arepa.png", "huevo.png", "queso.png", "tocino.png"],
            extra: ["fresa.png", "azucar.png", "maracuya.png"],
            audio: "img9/ambiente_cocina.mp3",
            bienvenida: "Hola Juan, vamos a preparar un rico Desayuno. Pon la arepa, el huevo, el queso y el tocino en el sartén. ¡Escucha bien mis instrucciones!",
            emergencia: "¡Juan, el chocolate se está regando! Bátelo rápido."
        },
        2: { 
            nombre: "Arroz con Pollo", img: "img9/arroz_con_pollo.png",
            meta: ["arroz.png", "pollo.png", "zanahoria.png", "tomate.png"],
            extra: ["naranja.png", "harina.png", "papaya.png"],
            audio: "img9/radio.mp3",
            bienvenida: "¡Muy bien! Ahora prepararemos un Arroz con Pollo. Necesitamos arroz, pollo, zanahoria y tomate. ¡Atento a la radio!",
            emergencia: "¡Juan, el Arroz se está pegando! Mueve la olla ahora."
        },
        3: { 
            nombre: "Sancocho", img: "img9/sancocho.png",
            meta: ["carne.png", "cerdo.png", "pollo.png", "papa.png", "yuca.png", "platano.png", "mazorca.png", "cilantro.png"],
            extra: ["pepino.png", "camote.png", "perejil.png", "apio.png"],
            audio: "img9/licuadora.mp3",
            bienvenida: "¡Excelente reto final! Ahora prepararemos un Sancocho. Es largo, así que escucha bien el orden que te daré.",
            emergencia: "¡CUIDADO! Se está quemando la carne, apaga el fogón."
        }
    };

    function vozCoterapeuta(txt, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        msg.pitch = 1.0;
        document.getElementById('texto-guia').innerText = txt;
        if(callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function vozInterrupcion(txt) {
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-MX';
        msg.pitch = 0.8;
        msg.rate = 1.1;
        window.speechSynthesis.speak(msg);
    }

    function iniciarSesion9() {
        const conf = recetas[nivelActual];
        vozCoterapeuta(conf.bienvenida, () => {
            cargarCocina();
        });
    }

    function cargarCocina() {
        pasoProgreso = 0;
        interrupcionActiva = false;
        const conf = recetas[nivelActual];
        document.getElementById('img-receta-guia').style.display = 'none';
        document.getElementById('nombre-plato').innerText = conf.nombre;
        
        const d = document.getElementById('despensa');
        d.innerHTML = "";
        let pool = [...conf.meta, ...conf.extra].sort(() => Math.random() - 0.5);
        
        pool.forEach(imgName => {
            const img = document.createElement('img');
            img.src = `img9/${imgName}`;
            img.className = 'item';
            img.dataset.file = imgName;
            img.onmousedown = img.ontouchstart = dragIngrediente;
            d.appendChild(img);
        });

        audioAmbiente.src = conf.audio;
        audioAmbiente.loop = true;
        audioAmbiente.volume = 0.2;
        audioAmbiente.play().catch(e => console.log("Audio esperando interacción"));

        actualizarUI();
        setTimeout(lanzarEmergencia, 15000);
    }

    function actualizarUI() {
        const conf = recetas[nivelActual];
        if(pasoProgreso < conf.meta.length) {
            const nombreVisual = conf.meta[pasoProgreso].split('.')[0].toUpperCase();
            document.getElementById('paso-texto').innerText = nombreVisual;
            
            // Probabilidad de contradicción (mucha más insistencia)
            if(Math.random() > 0.4) {
                let randomIdx = Math.floor(Math.random() * conf.meta.length);
                ingredienteObligatorioVoz = conf.meta[randomIdx];
                let nombreVoz = ingredienteObligatorioVoz.split('.')[0];
                
                setTimeout(() => {
                    if(ingredienteObligatorioVoz !== conf.meta[pasoProgreso]) {
                        vozInterrupcion("¡Juan, olvida la pantalla! Pon primero el " + nombreVoz + ". ¡Hazme caso!");
                    } else {
                        vozInterrupcion("¡Juan, pon el " + nombreVoz + " justo ahora!");
                    }
                }, 800);
            } else {
                ingredienteObligatorioVoz = "";
            }
        }
    }

    function lanzarEmergencia() {
        if(pasoProgreso < recetas[nivelActual].meta.length) {
            interrupcionActiva = true;
            document.getElementById('estufa-img').src = "img9/estufa_prendida.png"; // CAMBIO A ESTUFA PRENDIDA
            document.getElementById('alerta-emergencia').style.display = 'block';
            document.getElementById('txt-alerta').innerText = recetas[nivelActual].emergencia;
            vozInterrupcion(recetas[nivelActual].emergencia);
        }
    }

    function resolverInterrupcion() {
        interrupcionActiva = false;
        document.getElementById('estufa-img').src = "img9/estufa.png"; // VUELVE A ESTUFA NORMAL
        document.getElementById('alerta-emergencia').style.display = 'none';
        vozCoterapeuta("¡Eso es, Juan! Seguimos cocinando.");
    }

    function dragIngrediente(e) {
        if(interrupcionActiva) { 
            vozInterrupcion("¡Juan, concéntrate! Primero soluciona lo del fogón."); 
            return; 
        }
        e.preventDefault();
        const el = e.target;
        const t = e.type === 'touchstart' ? e.touches[0] : e;
        let ox = t.clientX - el.getBoundingClientRect().left;
        let oy = t.clientY - el.getBoundingClientRect().top;
        el.style.position = 'fixed'; el.style.zIndex = "1000";

        const move = (me) => {
            const mt = me.type === 'touchmove' ? me.touches[0] : me;
            el.style.left = (mt.clientX - ox) + 'px'; el.style.top = (mt.clientY - oy) + 'px';
        };

        const stop = (se) => {
            document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop);
            const st = se.type === 'touchend' ? se.changedTouches[0] : se;
            el.style.display = 'none';
            const drop = document.elementFromPoint(st.clientX, st.clientY);
            el.style.display = 'block';

            const conf = recetas[nivelActual];
            let objetivo = (ingredienteObligatorioVoz !== "") ? ingredienteObligatorioVoz : conf.meta[pasoProgreso];

            if(drop && drop.id === 'sarten-target' && el.dataset.file === objetivo) {
                new Audio('img8/exito.mp3').play();
                el.remove();
                
                // Si obedeció a la voz y no era el orden de pantalla, reordenamos
                if(ingredienteObligatorioVoz !== "" && ingredienteObligatorioVoz !== conf.meta[pasoProgreso]) {
                    conf.meta = conf.meta.filter(item => item !== el.dataset.file);
                } else {
                    pasoProgreso++;
                }

                if(pasoProgreso >= conf.meta.length) {
                    finalizarReceta();
                } else {
                    vozCoterapeuta("¡Muy bien hecho!");
                    actualizarUI();
                }
            } else {
                vozInterrupcion("¡Ese no es Juan! Mira bien los ingredientes.");
                el.style.position = 'relative'; el.style.left = 'auto'; el.style.top = 'auto';
            }
        };
        document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
        document.addEventListener('touchmove', move, {passive: false}); document.addEventListener('touchend', stop);
    }

    function finalizarReceta() {
        audioAmbiente.pause();
        const guia = document.getElementById('img-receta-guia');
        guia.style.display = 'block';
        vozCoterapeuta("¡Juan, mira qué delicia! Has terminado el " + recetas[nivelActual].nombre);
        setTimeout(() => {
            if(nivelActual < 3) { nivelActual++; iniciarSesion9(); }
            else { vozCoterapeuta("¡Eres un Chef estrella! Has completado todas las recetas."); }
        }, 5000);
    }
</script>
</body>
</html>

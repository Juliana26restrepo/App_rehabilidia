<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sesión 9 - La Cocina de Juan</title>
    <style>
        :root { --p-blue: #1B4F72; --accent: #E67E22; }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; overflow: hidden; 
            background: #fdf2e9;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* Cabecera idéntica a tus fotos */
        #cabecera { 
            background: #2E5A7D; padding: 15px; 
            display: flex; justify-content: center;
        }

        #guia-box { 
            background: white; border: 3px solid #E67E22; 
            border-radius: 10px; width: 85%; padding: 10px;
            display: flex; align-items: center;
        }

        #avatar { width: 50px; height: 50px; margin-right: 15px; }

        /* Cuerpo del juego */
        #escenario { 
            display: flex; flex-grow: 1; padding: 20px; gap: 20px;
        }

        /* Panel izquierdo (Receta e Instrucciones) */
        #panel-izquierdo { width: 25%; display: flex; flex-direction: column; gap: 15px; }

        .caja-blanca { 
            background: white; border: 2px solid #FAD7A0; 
            border-radius: 10px; padding: 15px; text-align: center;
        }

        #instruccion-voz-caja {
            border: 2px solid #3498db; background: #EBF5FB;
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #2E86C1; padding: 20px; font-size: 1.2rem;
        }

        /* Centro (Estufa) */
        #zona-coccion { 
            width: 40%; display: flex; align-items: center; justify-content: center; position: relative;
        }
        #estufa { width: 100%; max-width: 400px; }
        #sarten { width: 200px; position: absolute; top: 45%; }

        /* Panel Derecho (Despensa - MÁS ANCHA para ver todo) */
        #despensa { 
            width: 35%; background: white; border: 3px solid #2E5A7D; 
            border-radius: 15px; display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 15px; padding: 20px; overflow-y: auto; align-content: start;
        }

        .item { width: 90px; height: 90px; object-fit: contain; cursor: pointer; margin: auto; }

        /* Modales */
        #modal-resultados {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .cuadro { background: white; padding: 40px; border-radius: 20px; text-align: center; border: 5px solid var(--accent); }
        .btn { background: #FFC300; border: none; padding: 15px 30px; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body onload="iniciar()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia" style="margin:0">¡Juan! Atención a mis palabras.</p>
    </div>
</div>

<div id="escenario">
    <div id="panel-izquierdo">
        <div class="caja-blanca">
            <strong>RECETA:</strong><br><span id="nombre-plato">---</span>
            <hr style="border: 0.5px solid #eee">
            <strong>MIRA LA PANTALLA:</strong><br>
            <span id="paso-texto" style="font-size: 1.5rem; color: #E67E22; font-weight: bold;">---</span>
        </div>
        <div id="instruccion-voz-caja">Escuchando...</div>
    </div>

    <div id="zona-coccion">
        <img src="img9/estufa.png" id="estufa">
        <img src="img9/sarten.png" id="sarten">
    </div>

    <div id="despensa"></div>
</div>

<div id="modal-resultados">
    <div class="cuadro">
        <h2>¡Excelente Chef!</h2>
        <div id="stats" style="margin-bottom: 20px; font-size: 1.2rem;"></div>
        <button class="btn" onclick="finalizarSesion()">REGRESAR AL MENÚ</button>
    </div>
</div>

<script>
    let nivel = 1;
    let aciertos = 0, errores = 0;
    let metaNivel = [];
    let objetivoVoz = "";

    const recetas = {
        1: { n: "Desayuno Completo", m: ["arepa.png", "huevo.png", "queso.png", "tocino.png"] },
        2: { n: "Arroz con Pollo", m: ["arroz.png", "pollo.png", "zanahoria.png", "cebolla.png"] },
        3: { n: "Sancocho Trifásico", m: ["carne.png", "cerdo.png", "papa.png", "yuca.png", "mazorca.png", "cilantro.png"] }
    };

    const todos = ["apio.png", "arepa.png", "arroz.png", "carne.png", "cebolla.png", "cerdo.png", "cilantro.png", "huevo.png", "mazorca.png", "papa.png", "pollo.png", "queso.png", "tocino.png", "yuca.png", "zanahoria.png", "fresa.png", "maracuya.png"];

    function hablar(t, cb) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        if(cb) m.onend = cb;
        window.speechSynthesis.speak(m);
    }

    function iniciar() {
        const r = recetas[nivel];
        metaNivel = [...r.m];
        document.getElementById('nombre-plato').innerText = r.n;
        cargarDespensa();
        actualizarReto();
    }

    function cargarDespensa() {
        const d = document.getElementById('despensa');
        d.innerHTML = "";
        // Mezclamos los necesarios con algunos distractores
        let pool = [...recetas[nivel].m, ...todos.filter(x => !recetas[nivel].m.includes(x)).slice(0, 4)];
        pool.sort(() => Math.random() - 0.5).forEach(img => {
            const el = document.createElement('img');
            el.src = `img9/${img}`;
            el.className = 'item';
            el.onclick = () => revisar(img, el);
            d.appendChild(el);
        });
    }

    function actualizarReto() {
        if(metaNivel.length === 0) {
            if(nivel < 3) { nivel++; iniciar(); }
            else { mostrarFinal(); }
            return;
        }

        let pantalla = metaNivel[0];
        document.getElementById('paso-texto').innerText = pantalla.split('.')[0].toUpperCase();

        // Lógica Stroop: A veces la voz dice algo diferente
        if(Math.random() > 0.5 && metaNivel.length > 1) {
            objetivoVoz = metaNivel[1];
            document.getElementById('instruccion-voz-caja').innerText = "¡IGNORA LA PANTALLA! Trae el " + objetivoVoz.split('.')[0].toUpperCase();
            hablar("Juan, olvida la pantalla, pon el " + objetivoVoz.split('.')[0]);
        } else {
            objetivoVoz = pantalla;
            document.getElementById('instruccion-voz-caja').innerText = "Sigue la pantalla: Pon el " + objetivoVoz.split('.')[0].toUpperCase();
            hablar("Pon el " + objetivoVoz.split('.')[0]);
        }
    }

    function revisar(seleccion, el) {
        if(seleccion === objetivoVoz) {
            aciertos++;
            metaNivel = metaNivel.filter(x => x !== seleccion);
            el.style.opacity = "0.3";
            el.onclick = null;
            actualizarReto();
        } else {
            errores++;
            hablar("No Juan, ese no es.");
        }
    }

    function mostrarFinal() {
        document.getElementById('stats').innerHTML = `Aciertos: ${aciertos}<br>Errores: ${errores}`;
        document.getElementById('modal-resultados').style.display = 'flex';
    }

    function finalizarSesion() {
        const ef = Math.round((aciertos / (aciertos + errores || 1)) * 100);
        const data = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Atención",
            id_sesion: 9,
            aciertos: aciertos,
            errores: errores,
            eficacia: ef + "%"
        };
        let h = JSON.parse(localStorage.getItem('sesiones_rehabilitidia')) || [];
        h.push(data);
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(h));
        window.location.href = "atencion_sesiones.html";
    }
</script>
</body>
</html>

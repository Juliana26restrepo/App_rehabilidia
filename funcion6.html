<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 6: Toma de Decisiones - REHABILIDIA</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #E3F2FD; --gold: #FFD700; --navy: #103A57; --red: #ff4d4d; --green: #4CAF50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px; font-weight: bold; }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 15px; }
        
        .panel-instruccion { background: white; padding: 15px; border-radius: 15px; border: 3px solid var(--p-purple); width: 90%; max-width: 600px; margin-bottom: 10px; font-weight: bold; font-size: 1.1rem; }

        .rejilla-numeros { 
            display: grid; gap: 10px; width: 95%; max-width: 800px; margin: auto; 
            padding: 10px; overflow-y: auto;
        }

        /* Estilos de los botones de números */
        .num-card {
            background: white; border: 2px solid var(--navy); border-radius: 10px;
            font-size: 1.8rem; font-weight: bold; padding: 15px; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            min-height: 60px; position: relative;
        }

        /* Animación de resaltado intermitente */
        @keyframes parpadeoIntermitente {
            0% { background-color: white; color: var(--navy); }
            33% { background-color: var(--red); color: white; border-color: var(--red); }
            66% { background-color: var(--green); color: white; border-color: var(--green); }
            100% { background-color: white; color: var(--navy); }
        }

        .resaltado { animation: parpadeoIntermitente 3s infinite; }
        .seleccionado { opacity: 0.2; transform: scale(0.8); pointer-events: none; }

        #overlay-nivel, #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index: 3000; padding: 20px; text-align: center; }
        #overlay-nivel { background: rgba(74, 20, 140, 0.98); color: white; }
        #overlay-final { background: rgba(16, 58, 87, 0.98); color: white; }
        
        .btn-finalizar { background: var(--gold); border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; color: var(--navy); }
    </style>
</head>
<body onload="iniciarSesion()">

<header>SESIÓN 6: DECISIONES E INHIBICIÓN</header>

<div id="contenedor-juego">
    <div id="panel-instruccion" class="panel-instruccion">Cargando...</div>
    <div id="contador-objetivos" style="font-weight: bold; margin-bottom: 5px;"></div>
    <div id="pantalla-juego" class="rejilla-numeros"></div>
</div>

<div id="overlay-nivel">
    <h1 id="lvl-titulo" style="color: var(--gold); font-size: 3rem;">NIVEL 1</h1>
    <p id="lvl-mensaje" style="font-size: 1.5rem;"></p>
</div>

<div id="overlay-final">
    <h1 style="color: var(--gold);">¡SESIÓN COMPLETADA!</h1>
    <div id="resumen-stats" style="font-size: 1.2rem; color: white;"></div>
    <p style="font-size: 1.3rem; font-weight: bold; margin: 20px;">"Tu mente se adapta cada vez mejor a los cambios."</p>
    <button class="btn-finalizar" onclick="window.location.href='funcion_sesiones.html'">VOLVER A INICIO</button>
</div>

<script>
    let nivel = 1, ronda = 1;
    let aciertosTotales = 0, erroresTotales = 0;
    let numerosEnPantalla = [];
    let objetivosRestantes = 0;

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 0.9;
        window.speechSynthesis.speak(m);
    }

    function iniciarSesion() {
        hablar("Juan, en esta actividad debes seleccionar los números más pequeños de la lista. No te dejes distraer por los colores o los números grandes.");
        cargarRonda();
    }

    function cargarRonda() {
        const pantalla = document.getElementById('pantalla-juego');
        const instruccion = document.getElementById('panel-instruccion');
        pantalla.innerHTML = "";
        
        let cantidadTotal, cantidadObjetivo, columnas;

        if (nivel === 1) { cantidadTotal = 6; cantidadObjetivo = 3; columnas = "repeat(3, 1fr)"; }
        else if (nivel === 2) { cantidadTotal = 12; cantidadObjetivo = 6; columnas = "repeat(4, 1fr)"; }
        else { cantidadTotal = 24; cantidadObjetivo = 12; columnas = "repeat(4, 1fr)"; }

        pantalla.style.gridTemplateColumns = columnas;
        objetivosRestantes = cantidadObjetivo;
        actualizarContador();

        instruccion.innerHTML = `Nivel ${nivel} - Ronda ${ronda}/3 <br> Selecciona los ${cantidadObjetivo} números <span style="color:var(--red)">MÁS PEQUEÑOS</span>`;

        // Generar números aleatorios únicos
        let pool = [];
        while(pool.length < cantidadTotal) {
            let n = Math.floor(Math.random() * 98) + 1;
            if(!pool.includes(n)) pool.push(n);
        }

        // Determinar cuáles son los "pequeños" (objetivos)
        let ordenados = [...pool].sort((a,b) => a - b);
        let umbralCorte = ordenados[cantidadObjetivo - 1];

        pool.forEach((num, index) => {
            const card = document.createElement('div');
            card.className = 'num-card';
            card.innerText = num;
            
            // Aplicar resaltado intermitente (al azar para que no todos brillen igual)
            if (Math.random() > 0.4) {
                card.classList.add('resaltado');
                card.style.animationDelay = (Math.random() * 2) + "s";
            }

            card.onclick = () => {
                if (num <= umbralCorte) {
                    card.classList.add('seleccionado');
                    aciertosTotales++;
                    objetivosRestantes--;
                    actualizarContador();
                    if (objetivosRestantes === 0) avanzar();
                } else {
                    erroresTotales++;
                    hablar("Ese es un número grande, busca los pequeños.");
                    card.style.backgroundColor = "var(--red)";
                    setTimeout(() => card.style.backgroundColor = "white", 500);
                }
            };
            pantalla.appendChild(card);
        });
    }

    function actualizarContador() {
        document.getElementById('contador-objetivos').innerText = `Faltan: ${objetivosRestantes} números pequeños`;
    }

    function avanzar() {
        if (ronda < 3) {
            ronda++;
            hablar("¡Muy bien hecho!");
            setTimeout(cargarRonda, 1000);
        } else {
            if (nivel < 3) {
                nivel++; ronda = 1;
                mostrarCambioNivel();
            } else {
                finalizar();
            }
        }
    }

    function mostrarCambioNivel() {
        const overlay = document.getElementById('overlay-nivel');
        let msj = nivel === 2 ? "Ahora buscaremos 6 números entre 12." : "¡Cuidado! Ahora son 12 números entre 24.";
        document.getElementById('lvl-titulo').innerText = "NIVEL " + nivel;
        document.getElementById('lvl-mensaje').innerText = msj;
        overlay.style.display = 'flex';
        hablar(msj);
        setTimeout(() => { overlay.style.display = 'none'; cargarRonda(); }, 3500);
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        let total = aciertosTotales + erroresTotales;
        let porcentaje = Math.round((aciertosTotales / total) * 100);
        document.getElementById('resumen-stats').innerHTML = `
            Aciertos: ${aciertosTotales} <br>
            Errores: ${erroresTotales} <br>
            Efectividad: ${porcentaje}%
        `;
        hablar("Juan, has terminado. Tu mente se adapta cada vez mejor a los cambios.");
    }
</script>
</body>
</html>

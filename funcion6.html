<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sesión 6: Toma de Decisiones - REHABILIDIA</title>
    <style>
        :root { 
            --p-purple: #4A148C; 
            --bg: #E3F2FD; 
            --gold: #FFD700; 
            --navy: #103A57; 
            --red: #ff4d4d; 
            --green: #4CAF50; 
            --white: #ffffff;
        }

        /* UNIVERSAL ZOOM & RESET */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #1a1a1a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        #viewport-container {
            width: 100vw;
            height: 100vh;
            max-width: 1024px;
            max-height: 768px;
            background: var(--bg);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        header { 
            background: var(--navy); 
            color: white; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            flex-shrink: 0;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
        }

        #contenedor-juego { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            padding: 15px; 
        }

        .panel-instruccion { 
            background: var(--white); 
            padding: 15px; 
            border-radius: 15px; 
            border: 3px solid var(--p-purple); 
            width: 95%; 
            max-width: 700px; 
            margin-bottom: 10px; 
            font-weight: bold; 
            font-size: clamp(0.9rem, 2.5vw, 1.2rem); 
            min-height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .rejilla-numeros { 
            display: grid; 
            gap: 10px; 
            width: 100%; 
            max-width: 900px; 
            margin: auto; 
            padding: 10px; 
            overflow-y: auto; 
            max-height: 60vh; 
        }

        .num-card { 
            background: var(--white); 
            border: 3px solid var(--navy); 
            border-radius: 12px; 
            font-size: clamp(1.2rem, 4vw, 1.8rem); 
            font-weight: bold; 
            padding: 15px; 
            cursor: pointer; 
            transition: opacity 0.3s, transform 0.1s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 65px;
            box-shadow: 0 4px 0px var(--navy);
        }

        .num-card:active { transform: translateY(4px); box-shadow: 0 0 0px var(--navy); }
        
        @keyframes parpadeoLento {
            0% { background-color: white; color: var(--navy); }
            45% { background-color: var(--red); color: white; }
            55% { background-color: var(--green); color: white; }
            100% { background-color: white; color: var(--navy); }
        }
        .resaltado { animation: parpadeoLento 8s infinite; }
        .seleccionado { visibility: hidden; pointer-events: none; }
        
        /* OVERLAYS */
        #overlay-nivel, #overlay-final { position: absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index: 3000; padding: 20px; text-align: center; }
        #overlay-nivel { background: rgba(74, 20, 140, 0.98); color: white; }
        #overlay-final { background: rgba(16, 58, 87, 0.98); color: white; }

        .cuadro-resultados { background: white; color: var(--navy); padding: 30px; border-radius: 25px; width: 90%; max-width: 450px; border: 5px solid var(--gold); }
        
        .btn-finalizar { background: var(--gold); border: none; padding: 18px 40px; border-radius: 35px; font-weight: bold; cursor: pointer; margin-top: 20px; color: var(--navy); font-size: 1.3rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body onload="iniciarSesion()">

<div id="viewport-container">
    <header>SESIÓN 6: DECISIONES E INHIBICIÓN</header>

    <div id="contenedor-juego">
        <div id="panel-instruccion" class="panel-instruccion">Cargando...</div>
        <div id="status-ronda" style="font-weight: bold; margin: 10px; color: var(--p-purple); font-size: 1.1rem;"></div>
        <div id="pantalla-juego" class="rejilla-numeros"></div>
    </div>

    <div id="overlay-nivel">
        <h1 id="lvl-titulo" style="color: var(--gold); font-size: 3.5rem; margin:0;">NIVEL 1</h1>
        <p id="lvl-mensaje" style="font-size: 1.8rem;"></p>
    </div>

    <div id="overlay-final">
        <div class="cuadro-resultados">
            <h1 style="color: var(--p-purple); margin: 0;">¡SESIÓN COMPLETADA!</h1>
            <div id="resumen-stats" style="font-size: 1.2rem; margin: 20px 0; line-height: 1.6;"></div>
            <p style="font-style: italic; color: #555;">"Tu mente se adapta cada vez mejor a los cambios, Juan."</p>
            <button class="btn-finalizar" onpointerdown="guardarYSalir()">FINALIZAR</button>
        </div>
    </div>
</div>

<script>
    const baseDatos = [17, 482, 93, 205, 16, 378, 44, 129, 301, 78, 56, 410, 223, 19, 67, 288, 145, 399, 2, 350, 174, 82, 461, 37, 290, 115, 64, 418, 251, 9, 333, 147, 72, 396, 28, 184, 512, 6, 270, 134, 89, 455, 213, 48, 362, 101, 420, 76, 5, 398, 167, 244, 53, 309, 91, 402, 186, 73, 258, 14, 371, 120, 499, 32, 260, 87, 411, 155, 68, 305, 11, 472, 139, 57, 289, 200, 413, 96, 24, 361, 75, 182, 449, 30, 277, 108, 421, 66, 3, 354, 141, 88, 467, 21, 312, 50, 239, 104, 480, 265, 92, 336, 7, 390, 153, 47, 422, 81, 214, 59, 375, 26, 300, 98, 431, 63, 176, 285, 10, 460, 137, 70, 348, 29, 407, 122, 55, 492, 34, 218, 83, 369, 18, 445, 140, 71, 326, 94, 62, 380, 27, 415, 109, 52, 468, 35, 240, 84, 397, 13, 444, 162, 58, 320, 95, 276, 74, 408, 23, 356, 131, 69, 41, 219, 86, 364, 15, 430, 166, 60, 311, 99, 287, 45, 401, 22, 370, 135, 80, 459, 33, 206, 90, 338, 8, 419, 158, 61, 294, 102, 274, 49, 386, 25, 343, 126, 79, 473, 40, 212, 85, 355, 4, 438, 150, 65, 317, 103, 263, 54, 392];

    let nivel = 1, ronda = 1;
    let aciertos = 0, errores = 0;
    let objetivosRestantes = 0;
    let siguienteCorrecto = 0;
    let listaActual = [];
    const TOTAL_RONDAS = 3;

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); 
        m.lang = 'es-ES'; 
        m.rate = 0.95;
        window.speechSynthesis.speak(m);
    }

    function iniciarSesion() {
        hablar("Juan, selecciona los números más pequeños en orden. Ignora los colores que intentan confundirte.");
        cargarRonda();
    }

    function cargarRonda() {
        const pantalla = document.getElementById('pantalla-juego');
        const instruccion = document.getElementById('panel-instruccion');
        pantalla.innerHTML = "";
        
        let cantTotal = (nivel === 1) ? 6 : (nivel === 2) ? 12 : 24;
        let cantObj = Math.floor(cantTotal / 2);
        
        let gridCols = "repeat(3, 1fr)";
        if(nivel === 2) gridCols = "repeat(4, 1fr)";
        if(nivel === 3) gridCols = "repeat(4, 1fr)";
        pantalla.style.gridTemplateColumns = gridCols;

        let pool = [...baseDatos].sort(() => Math.random() - 0.5).slice(0, cantTotal);
        listaActual = [...pool].sort((a,b) => a - b).slice(0, cantObj);
        siguienteCorrecto = listaActual[0];
        objetivosRestantes = cantObj;

        if (nivel === 1) {
            instruccion.innerHTML = `Busca los ${cantObj} números más pequeños de la rejilla.`;
        } else if (nivel === 2) {
            instruccion.innerHTML = `<span style="color:var(--red)">¡ATENCIÓN!</span> Ignora el color rojo y sigue buscando el más pequeño.`;
            hablar("Cuidado Juan, ahora los colores pueden intentar distraerte. Sigue buscando el menor.");
        } else {
            instruccion.innerHTML = `Nivel de Interferencia Alto: Encuentra los ${cantObj} menores.`;
        }

        document.getElementById('status-ronda').innerText = `Nivel ${nivel} - Ronda ${ronda}/${TOTAL_RONDAS} | Faltan: ${objetivosRestantes}`;

        pool.forEach(num => {
            const card = document.createElement('div');
            card.className = 'num-card';
            card.innerText = num;
            
            if (nivel >= 2) {
                card.classList.add('resaltado');
                if (nivel === 2 && listaActual.includes(num)) {
                    card.style.animationDelay = "-2s"; 
                } else {
                    card.style.animationDelay = (Math.random() * 8) + "s";
                }
            } else if (Math.random() > 0.6) {
                card.classList.add('resaltado');
            }

            card.onpointerdown = (e) => {
                e.preventDefault();
                if (num === siguienteCorrecto) {
                    card.classList.add('seleccionado');
                    aciertos++;
                    listaActual.shift();
                    objetivosRestantes--;
                    if (listaActual.length > 0) {
                        siguienteCorrecto = listaActual[0];
                        document.getElementById('status-ronda').innerText = `Nivel ${nivel} - Ronda ${ronda}/${TOTAL_RONDAS} | Faltan: ${objetivosRestantes}`;
                    } else {
                        avanzar();
                    }
                } else {
                    if(!card.classList.contains('seleccionado')) {
                        errores++;
                        hablar("Ese no es el más pequeño, Juan.");
                        card.style.borderColor = "var(--red)";
                        card.style.transform = "translateX(5px)";
                        setTimeout(() => {
                            card.style.borderColor = "var(--navy)";
                            card.style.transform = "none";
                        }, 400);
                    }
                }
            };
            pantalla.appendChild(card);
        });
    }

    function avanzar() {
        if (ronda < TOTAL_RONDAS) {
            ronda++;
            hablar("¡Excelente decisión!");
            setTimeout(cargarRonda, 1200);
        } else if (nivel < 3) {
            nivel++; ronda = 1;
            mostrarCambioNivel();
        } else {
            finalizar();
        }
    }

    function mostrarCambioNivel() {
        const overlay = document.getElementById('overlay-nivel');
        let msj = nivel === 2 ? "Ahora los números parpadearán para distraerte. ¡No les hagas caso!" : "Máxima concentración. Los números son más y cambian rápido.";
        document.getElementById('lvl-titulo').innerText = "NIVEL " + nivel;
        document.getElementById('lvl-mensaje').innerText = msj;
        overlay.style.display = 'flex';
        hablar(msj);
        setTimeout(() => { overlay.style.display = 'none'; cargarRonda(); }, 4000);
    }

    function finalizar() {
        const totalIntentos = aciertos + errores;
        const eficacia = totalIntentos > 0 ? Math.round((aciertos / totalIntentos) * 100) : 0;
        
        document.getElementById('overlay-final').style.display = 'flex';
        document.getElementById('resumen-stats').innerHTML = `
            <b>Aciertos:</b> ${aciertos}<br>
            <b>Errores:</b> ${errores}<br>
            <b>Eficacia:</b> ${eficacia}%
        `;
        hablar("Juan, has terminado con éxito. Tu mente se adapta cada vez mejor a los cambios.");
    }

    function guardarYSalir() {
        const totalIntentos = aciertos + errores;
        const eficacia = totalIntentos > 0 ? Math.round((aciertos / totalIntentos) * 100) : 0;

        const dataLog = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Funciones Ejecutivas",
            id_sesion: 6,
            aciertos: aciertos,
            errores: errores,
            eficacia: eficacia + "%"
        };

        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(dataLog));
        window.location.href = 'funcion_sesiones.html';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logística Progresiva - REHABILIDIA</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --road: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; background-color: #FDF5E6; touch-action: none; }
        
        /* Guía de texto más compacta para no tapar nada */
        #guia { 
            position: fixed; top: 5px; left: 50%; transform: translateX(-50%); 
            background: white; padding: 8px; border-radius: 12px; 
            border: 2px solid var(--t-blue); width: 90%; 
            display: flex; align-items: center; gap: 10px; z-index: 100; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        #guia img { width: 40px; height: 40px; border-radius: 50%; }
        #texto-instruccion { margin: 0; font-weight: bold; color: var(--p-blue); font-size: 0.85rem; line-height: 1.1; }

        #escenario { width: 100vw; height: 100vh; position: relative; background: #444; display: flex; justify-content: center; }
        
        .carril { height: 100%; border-left: 1px dashed rgba(255,255,255,0.4); border-right: 1px dashed rgba(255,255,255,0.4); background: var(--road); position: relative; flex-grow: 1; }
        
        /* Casas posicionadas más abajo para que se vean bajo el texto */
        .casa-contenedor { 
            position: absolute; 
            top: 15%; /* Bajamos la casa del 2% al 15% */
            left: 0; width: 100%; text-align: center; z-index: 20; 
        }
        .casa-emoji { font-size: 3.2rem; display: block; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5)); }

        .carrito { 
            position: absolute; font-size: 3.8rem; cursor: pointer; z-index: 50; 
            bottom: -10%; transition: left 0.15s ease-out; 
            filter: drop-shadow(2px 4px 5px rgba(0,0,0,0.5)); transform: translateX(-50%); 
        }

        #anuncio-transicion { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(16, 58, 87, 0.95); color: white; padding: 30px; 
            border-radius: 20px; z-index: 500; display: none; text-align: center; 
            border: 4px solid #FFD700; width: 75%; 
        }
    </style>
</head>
<body>

<div id="anuncio-transicion">
    <h1 id="txt-anuncio-titulo">NIVEL COMPLETADO</h1>
    <p id="txt-anuncio-sub">Siguiente ejercicio...</p>
</div>

<div id="guia">
    <img src="COTERAPEUTA.JPG">
    <p id="texto-instruccion">Juan, toca los carros para cambiarlos de carril y llevarlos a la casa que corresponde según su color.</p>
</div>

<div id="escenario"></div>

<script>
    const niveles = [
        { nombre: "Básico", carros: 4, vel: 1.3, carriles: 2, casas: ["🔴", "🔵"], emojis: ["🚗", "🚙"] },
        { nombre: "Medio", carros: 6, vel: 1.8, carriles: 2, casas: ["🔴", "🔵"], emojis: ["🚗", "🚙"] },
        { nombre: "Superior", carros: 10, vel: 2.4, carriles: 3, casas: ["🔴", "🔵", "🟢"], emojis: ["🚗", "🚙", "🚛"] }
    ];

    let nIdx = 0, ejIdx = 1, aciertos = 0, errores = 0, finalizadosRonda = 0;

    function hablar(m) {
        window.speechSynthesis.cancel();
        const v = new SpeechSynthesisUtterance(m);
        v.lang = 'es-ES'; v.rate = 0.9;
        window.speechSynthesis.speak(v);
    }

    function mostrarAnuncio(titulo, sub, tiempo) {
        const box = document.getElementById('anuncio-transicion');
        document.getElementById('txt-anuncio-titulo').innerText = titulo;
        document.getElementById('txt-anuncio-sub').innerText = sub;
        box.style.display = 'block';
        setTimeout(() => { box.style.display = 'none'; }, tiempo);
    }

    function iniciarNivel() {
        dibujarEscenario();
        const n = niveles[nIdx];
        
        // Instrucción por voz solicitada
        if(nIdx === 0 && ejIdx === 1) {
            hablar("Juan toca los carros para cambiarlos de carril y llevarlos a la casa que corresponde según su color");
        } else {
            hablar(`Nivel ${n.nombre}. Ejercicio ${ejIdx}`);
        }

        mostrarAnuncio(`NIVEL ${n.nombre.toUpperCase()}`, `Ejercicio ${ejIdx} de 3`, 2500);
        setTimeout(lanzarTanda, 3000);
    }

    function dibujarEscenario() {
        const esc = document.getElementById('escenario');
        esc.innerHTML = "";
        const n = niveles[nIdx];
        n.casas.forEach((emoji, i) => {
            const divCarril = document.createElement('div');
            divCarril.className = "carril";
            divCarril.innerHTML = `
                <div class="casa-contenedor">
                    <span class="casa-emoji">🏠${emoji}</span>
                </div>
            `;
            esc.appendChild(divCarril);
        });
    }

    function lanzarTanda() {
        finalizadosRonda = 0;
        const n = niveles[nIdx];
        for(let i=0; i < n.carros; i++) {
            setTimeout(crearCarro, i * (3200 / n.vel));
        }
    }

    function crearCarro() {
        const n = niveles[nIdx];
        const esc = document.getElementById('escenario');
        const car = document.createElement('div');
        const tipo = Math.floor(Math.random() * n.emojis.length);
        let carril = Math.floor(Math.random() * n.carriles);

        car.className = 'carrito';
        car.innerHTML = n.emojis[tipo];
        
        const actualizarPosicion = () => {
            const anchoCarrilPerc = 100 / n.carriles;
            car.style.left = ((carril * anchoCarrilPerc) + (anchoCarrilPerc / 2)) + "vw";
        };

        car.onpointerdown = (e) => {
            e.preventDefault();
            carril = (carril + 1) % n.carriles;
            actualizarPosicion();
        };

        actualizarPosicion();
        esc.appendChild(car);

        let p = -10;
        const loop = setInterval(() => {
            p += n.vel;
            car.style.bottom = p + "%";
            
            // Verificación de colisión con la zona de la casa (15% superior)
            if(p >= 78) { 
                clearInterval(loop);
                if(carril === tipo) {
                    aciertos++;
                } else {
                    errores++;
                }
                car.remove();
                finalizadosRonda++;
                if(finalizadosRonda === n.carros) revisarProgreso();
            }
        }, 50);
    }

    function revisarProgreso() {
        if(ejIdx < 3) {
            ejIdx++;
            mostrarAnuncio("¡BIEN!", `Ejercicio ${ejIdx}`, 1500);
            setTimeout(lanzarTanda, 2000);
        } else if(nIdx < niveles.length - 1) {
            nIdx++; ejIdx = 1;
            dibujarEscenario();
            mostrarAnuncio("¡NIVEL LOGRADO!", `Pasando a nivel ${niveles[nIdx].nombre}`, 2500);
            setTimeout(iniciarNivel, 3000);
        } else {
            finalizarSesion();
        }
    }

    function finalizarSesion() {
        const total = niveles.reduce((a, b) => a + (b.carros * 3), 0);
        const ef = Math.round((aciertos / total) * 100);
        
        const datosSesion = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Atención",
            id_sesion: 10,
            aciertos: aciertos,
            errores: errores,
            eficacia: ef + "%"
        };

        let h = JSON.parse(localStorage.getItem('sesiones_rehabilitidia')) || [];
        h.push(datosSesion);
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(h));

        hablar("Muy bien Juan. Has terminado el ejercicio.");
        window.location.href = "atencion_sesiones.html";
    }

    window.onload = iniciarNivel;
</script>
</body>
</html>

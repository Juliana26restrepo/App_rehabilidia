<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 10 - Juan</title>
    <style>
        body { font-family: 'Arial Rounded MT Bold', sans-serif; margin: 0; overflow: hidden; touch-action: none; background: url('img10/fondo_habitacion.png') no-repeat center center; background-size: cover; height: 100vh; display: flex; flex-direction: column; }
        #cabecera { background: rgba(27, 79, 114, 0.95); color: white; padding: 10px; border-bottom: 5px solid #E67E22; z-index: 100; }
        #guia-box { background: white; color: #1B4F72; width: 92%; margin: 0 auto; border-radius: 15px; padding: 15px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #avatar { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; border: 3px solid #1B4F72; }
        #escenario { flex-grow: 1; position: relative; display: flex; padding: 20px; }
        #panel-objetos { width: 160px; background: rgba(255,255,255,0.9); border-radius: 20px; border: 4px solid #1B4F72; display: flex; flex-direction: column; gap: 15px; padding: 15px; overflow-y: auto; align-items: center; z-index: 10; }
        .objeto-arrastrable { width: 90px; height: 90px; object-fit: contain; cursor: grab; touch-action: none; }
        #area-cama { position: absolute; left: 200px; right: 20px; top: 0; bottom: 0; display: flex; align-items: center; justify-content: center; }
        #cama-base { width: 95%; max-width: 580px; pointer-events: auto; }
        .pieza-puesta { position: absolute; width: 130px; pointer-events: none; z-index: 5; }
        #cuadro-pregunta { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; background: #FFD700; border: 8px solid #1B4F72; border-radius: 35px; padding: 25px; text-align: center; z-index: 2000; box-shadow: 0 0 60px rgba(0,0,0,0.6); }
        .btn-pregunta { padding: 18px; margin: 10px; width: 120px; border-radius: 20px; border: 4px solid #1B4F72; font-weight: bold; cursor: pointer; color: white; font-size: 1.5rem; }
        #modal-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(27, 79, 114, 0.98); z-index: 3000; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body onload="iniciarSesion()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-instruccion" style="margin:0; font-size: 1.3rem; font-weight:bold;">¡Hola Juan!</p>
    </div>
</div>

<div id="escenario">
    <div id="panel-objetos"></div>
    <div id="area-cama">
        <img src="img10/cama_destendida.png" id="cama-base">
    </div>
</div>

<div id="cuadro-pregunta">
    <p id="txt-pregunta" style="font-size: 1.6rem; font-weight: bold; color: #1B4F72; margin-bottom: 25px;"></p>
    <button class="btn-pregunta" style="background:#2ECC71" onclick="validarRespuesta('SÍ')">SÍ</button>
    <button class="btn-pregunta" style="background:#E74C3C" onclick="validarRespuesta('NO')">NO</button>
</div>

<div id="modal-final">
    <h1 style="font-size: 4rem; color: #FFD700;">¡MUY BIEN JUAN!</h1>
    <p id="puntos-final" style="font-size: 2.2rem; margin: 30px;"></p>
    <button onclick="proximoNivel()" style="padding: 25px 60px; font-size: 2rem; background: #E67E22; color: white; border: none; border-radius: 25px; cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.3);">SIGUIENTE</button>
</div>

<script>
    let nivel = 1;
    let paso = 0;
    let objetivos = [];
    let pTotales = 0, pCorrectas = 0;
    let rCorrecta = "";
    let bloqueado = false;

    // AUDIOS AMBIENTALES
    const ambiente = {
        pajaros: new Audio('img10/pajaros.mp3'),
        conversacion: new Audio('img10/conversacion.mp3'),
        radio: new Audio('img10/radio.mp3')
    };

    const sfx = { 
        ok: new Audio('img8/exito.mp3'), 
        error: new Audio('img8/alarma.mp3') 
    };

    const preguntas = [
        {q: "¿El sol brilla?", a: "SÍ"}, 
        {q: "¿El hielo quema?", a: "SÍ"},
        {q: "¿El agua moja?", a: "SÍ"}, 
        {q: "¿El fuego da calor?", a: "SÍ"},
        {q: "¿Los aviones nadan?", a: "NO"}
    ];

    const piezas = [
        {id: "sabana_azul.png", n: "la sábana azul"},
        {id: "almohada_blanca.png", n: "la almohada blanca"},
        {id: "cobija_termica.png", n: "la cobija térmica"},
        {id: "almohada_gris.png", n: "la almohada gris"},
        {id: "sabana_blanca.png", n: "la sábana blanca"}
    ];

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        document.getElementById('texto-instruccion').innerText = t;
        if(callback) m.onend = callback;
        window.speechSynthesis.speak(m);
    }

    function iniciarSesion() {
        // Reproducir todos los ambientes en bucle
        Object.values(ambiente).forEach(a => {
            a.loop = true;
            a.volume = 0.2;
            a.play().catch(() => console.log("Clic para audio"));
        });
        cargarNivel();
        setInterval(lanzarPregunta, 20000);
    }

    function cargarNivel() {
        document.getElementById('modal-final').style.display = 'none';
        document.getElementById('panel-objetos').innerHTML = "";
        document.querySelectorAll('.pieza-puesta').forEach(p => p.remove());
        paso = 0; pTotales = 0; pCorrectas = 0; bloqueado = false;

        let cant = nivel === 1 ? 3 : (nivel === 2 ? 4 : 5);
        objetivos = piezas.slice(0, cant);

        let pool = [...objetivos, {id: "control.png", n:"el control"}, {id: "reloj.png", n:"el reloj"}];
        pool.sort(() => Math.random() - 0.5).forEach(item => {
            const img = document.createElement('img');
            img.src = `img10/${item.id}`;
            img.className = 'objeto-arrastrable';
            img.dataset.ref = item.id;
            img.onmousedown = img.ontouchstart = drag;
            document.getElementById('panel-objetos').appendChild(img);
        });

        hablar(`Nivel ${nivel}. Juan, pon ${objetivos[0].n} en la cama.`);
    }

    function drag(e) {
        if(bloqueado || document.getElementById('cuadro-pregunta').style.display === 'block') return;
        const el = e.target;
        const t = e.type === 'touchstart' ? e.touches[0] : e;
        let rect = el.getBoundingClientRect();
        let ox = t.clientX - rect.left, oy = t.clientY - rect.top;

        el.style.position = 'fixed'; el.style.zIndex = "1000"; el.style.opacity = "0.8";

        const move = (me) => {
            const mt = me.type === 'touchmove' ? me.touches[0] : me;
            el.style.left = (mt.clientX - ox) + 'px'; el.style.top = (mt.clientY - oy) + 'px';
        };

        const stop = (se) => {
            document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop);
            
            const st = se.type === 'touchend' ? se.changedTouches[0] : se;
            const cama = document.getElementById('cama-base').getBoundingClientRect();
            const hit = (st.clientX > cama.left && st.clientX < cama.right && st.clientY > cama.top && st.clientY < cama.bottom);

            // COMPROBACIÓN POR ID DE ARCHIVO
            if (hit && el.dataset.ref === objetivos[paso].id) {
                bloqueado = true;
                sfx.ok.play();
                const fija = document.createElement('img');
                fija.src = el.src; fija.className = 'pieza-puesta';
                let area = document.getElementById('area-cama').getBoundingClientRect();
                fija.style.left = (st.clientX - area.left - 50) + 'px';
                fija.style.top = (st.clientY - area.top - 50) + 'px';
                document.getElementById('area-cama').appendChild(fija);
                
                el.style.display = 'none';
                let nombrePuesto = objetivos[paso].n;
                paso++;

                if (paso >= objetivos.length) {
                    setTimeout(mostrarExito, 1000);
                } else {
                    hablar(`¡Bien hecho! Pusiste ${nombrePuesto}. Ahora busca ${objetivos[paso].n}`, () => { bloqueado = false; });
                }
            } else {
                if(hit) {
                    sfx.error.play();
                    hablar(`Esa no es, Juan. Pon ${objetivos[paso].n}`);
                }
                el.style.position = 'static'; el.style.opacity = "1";
            }
        };
        document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
        document.addEventListener('touchmove', move, {passive:false}); document.addEventListener('touchend', stop);
    }

    function lanzarPregunta() {
        if(document.getElementById('cuadro-pregunta').style.display === 'block') return;
        const p = preguntas[Math.floor(Math.random() * preguntas.length)];
        rCorrecta = p.a; pTotales++;
        document.getElementById('txt-pregunta').innerText = p.q;
        document.getElementById('cuadro-pregunta').style.display = 'block';
        hablar(p.q);
    }

    function validarRespuesta(rta) {
        document.getElementById('cuadro-pregunta').style.display = 'none';
        if(rta === rCorrecta) { pCorrectas++; sfx.ok.play(); hablar("¡Bien!"); }
        else { sfx.error.play(); hablar("¡Oh no!"); }
        setTimeout(() => { if(!bloqueado) hablar(`Juan, busca ${objetivos[paso].n}`); }, 2000);
    }

    function mostrarExito() {
        let pct = pTotales > 0 ? Math.round((pCorrectas/pTotales)*100) : 100;
        document.getElementById('puntos-final').innerText = `Nivel ${nivel} Superado\nAciertos: ${pct}%`;
        document.getElementById('modal-final').style.display = 'flex';
        hablar("¡Excelente Juan, terminaste el nivel!");
    }

    function proximoNivel() {
        if(nivel < 3) { nivel++; cargarNivel(); }
        else { location.reload(); }
    }
</script>
</body>
</html>

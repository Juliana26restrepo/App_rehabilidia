<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 10 - Juan: DESAFÍO ELITE</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; overflow: hidden; touch-action: none; background: url('img10/fondo_habitacion.png') no-repeat center center fixed; background-size: cover; height: 100vh; }
        #cabecera { background: rgba(27, 79, 114, 0.95); color: white; height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 4px solid #E67E22; z-index: 1000; position: relative; }
        #instruccion-box { background: white; padding: 10px 20px; border-radius: 20px; color: #1B4F72; display: flex; align-items: center; border: 3px solid #1B4F72; font-weight: bold; max-width: 60%; }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }
        #panel-objetos { width: 180px; background: rgba(255,255,255,0.9); border-right: 4px solid #1B4F72; display: flex; flex-direction: column; gap: 10px; padding: 15px; align-items: center; overflow-y: auto; height: calc(100vh - 84px); float: left; }
        .draggable { width: 90px; height: 90px; object-fit: contain; cursor: grab; }
        #escena-central { margin-left: 184px; height: calc(100vh - 84px); position: relative; display: flex; justify-content: center; align-items: center; }
        #area-cama-detect { position: relative; width: 95%; height: 90%; }
        #cama_base { width: 100%; max-width: 650px; display: block; margin: 40px auto; pointer-events: none; }
        .pieza-fija { position: absolute; width: 160px; z-index: 5; pointer-events: none; transform: translate(-50%, -50%); }
        #panel-preguntas { position: absolute; right: 20px; top: 20px; width: 320px; z-index: 500; }
        #cuadro-pregunta { background: #FFD700; border: 6px solid #1B4F72; border-radius: 25px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.4); display: none; }
        .btn-p { width: 100%; padding: 18px; margin: 10px 0; font-weight: bold; cursor: pointer; border-radius: 15px; border: none; color: white; font-size: 1.5rem; }
        #overlay-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(27, 79, 114, 0.98); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
    </style>
</head>
<body onload="iniciar()">

<div id="cabecera">
    <div id="instruccion-box"><img src="COTERAPEUTA.JPG"><span id="label-guia">Cargando ambiente...</span></div>
    <div style="text-align: right;">
        <div id="exito-txt" style="font-size: 1.6rem; font-weight: bold;">Éxito: 100%</div>
        <div id="nivel-txt" style="color: #FFD700; font-weight: bold;">SESIÓN 10</div>
    </div>
</div>

<div id="panel-objetos"></div>

<div id="escena-central">
    <div id="area-cama-detect">
        <img src="img10/cama_destendida.png" id="cama_base">
        <div id="contenedor-piezas"></div>
    </div>
    <div id="panel-preguntas">
        <div id="cuadro-pregunta">
            <p id="pregunta-texto" style="font-size: 1.5rem; font-weight: bold; color:#1B4F72;"></p>
            <button class="btn-p" style="background:#2ECC71" onclick="verificarRespuesta('SÍ')">SÍ</button>
            <button class="btn-p" style="background:#E74C3C" onclick="verificarRespuesta('NO')">NO</button>
        </div>
    </div>
</div>

<div id="overlay-final">
    <h1 style="font-size: 4rem; color: #FFD700;">¡DOMINIO TOTAL!</h1>
    <p id="resumen-final" style="font-size: 2rem; max-width: 800px; padding: 20px;"></p>
    <button onclick="location.reload()" style="padding: 20px 50px; font-size: 1.5rem; border-radius: 20px; background: #E67E22; color: white; border: none; cursor: pointer; font-weight: bold;">REPETIR DESAFÍO</button>
</div>

<script>
    let nivel = 1, paso = 0, aciertos = 0, errores = 0, bloqueado = false;
    const sfxOk = new Audio('img8/exito.mp3'); 
    const sfxErr = new Audio('img8/alarma.mp3');
    const sfxFondo = new Audio('img10/pajaros.mp3');
    sfxFondo.loop = true;

    const db = {
        "almohada_blanca": { img: "almohada_blanca.png", nom: "la almohada blanca" },
        "almohada_cafe": { img: "almohada_cafe.png", nom: "la almohada café" },
        "almohada_gris": { img: "almohada_gris.png", nom: "la almohada gris" },
        "cobija": { img: "cobija.png", nom: "la cobija azul" },
        "cobija_termica": { img: "cobija_termica.png", nom: "la cobija térmica" },
        "cobija_tigre": { img: "cobija_tigre.png", nom: "la cobija de tigre" },
        "sabana_azul": { img: "sabana_azul.png", nom: "la sábana azul" },
        "sabana_blanca": { img: "sabana_blanca.png", nom: "la sábana blanca" },
        "sabana_gris": { img: "sabana_gris.png", nom: "la sábana gris" },
        "sobresabana_gris": { img: "sobresabana_gris.png", nom: "la sobresábana gris" },
        "sobresabana_morada": { img: "sobresabana_morada.png", nom: "la sobresábana morada" },
        "sobresabana_negra": { img: "sobresabana_negra.png", nom: "la sobresábana negra" },
        "control": { img: "control.png", nom: "el control" },
        "reloj": { img: "reloj.png", nom: "el reloj" },
        "revista": { img: "revista.png", nom: "la revista" },
        "vaso": { img: "vaso.png", nom: "el vaso" },
        "lampara": { img: "lampara.png", nom: "la lámpara" },
        "medias": { img: "medias.png", nom: "las medias" }
    };

    const niveles = {
        1: { nom: "10-A", pedir: ["sabana_azul", "sobresabana_gris", "almohada_blanca", "almohada_cafe"], extra: ["reloj", "revista"], t: 6000, rate: 1.1 },
        2: { nom: "10-B", pedir: ["sabana_blanca", "sobresabana_negra", "cobija_termica", "almohada_gris", "reloj"], extra: ["medias", "control"], t: 4500, rate: 1.2 },
        3: { nom: "10-C FINAL", pedir: ["sabana_gris", "sobresabana_negra", "sobresabana_morada", "cobija_tigre", "cobija", "almohada_gris", "almohada_cafe", "almohada_blanca", "control", "vaso"], extra: ["revista", "lampara"], t: 3000, rate: 1.35 }
    };

    const bancoPreguntas = [
        {q: "¿El sol es una estrella?", a: "SÍ"}, {q: "¿El agua moja?", a: "SÍ"}, {q: "¿Colombia está en América?", a: "SÍ"}, {q: "¿El hielo es frío?", a: "SÍ"}, {q: "¿2+2 son 5?", a: "NO"}, {q: "¿Los perros ladran?", a: "SÍ"}, {q: "¿La sal es dulce?", a: "NO"}, {q: "¿Dormir es necesario?", a: "SÍ"}, {q: "¿Los gatos vuelan?", a: "NO"}, {q: "¿El azúcar es dulce?", a: "SÍ"},
        {q: "¿El fuego quema?", a: "SÍ"}, {q: "¿La tierra es plana?", a: "NO"}, {q: "¿Los peces nadan?", a: "SÍ"}, {q: "¿La sangre es azul?", a: "NO"}, {q: "¿El cielo es azul?", a: "SÍ"}, {q: "¿Tenemos dos ojos?", a: "SÍ"}, {q: "¿El hierro es blando?", a: "NO"}, {q: "¿La vaca da leche?", a: "SÍ"}, {q: "¿El café tiene cafeína?", a: "SÍ"}, {q: "¿París es capital de Francia?", a: "SÍ"}
        // Aquí puedes pegar las otras 80 preguntas siguiendo el mismo formato.
    ];

    function hablar(t) {
        window.speechSynthesis.cancel();
        document.getElementById('label-guia').innerText = t;
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES'; msg.rate = niveles[nivel].rate;
        window.speechSynthesis.speak(msg);
    }

    let loopPreguntas;
    function iniciar() { 
        sfxFondo.play().catch(() => console.log("Clic para audio")); 
        cargarFase(); 
    }

    function cargarFase() {
        if(loopPreguntas) clearInterval(loopPreguntas);
        const config = niveles[nivel];
        document.getElementById('panel-objetos').innerHTML = "";
        document.getElementById('contenedor-piezas').innerHTML = "";
        document.getElementById('nivel-txt').innerText = `NIVEL: ${config.nom}`;
        paso = 0; bloqueado = false;
        
        let pool = [...config.pedir, ...config.extra].sort(() => Math.random() - 0.5);
        pool.forEach(id => {
            const img = document.createElement('img');
            img.src = `img10/${db[id].img}`; img.className = 'draggable';
            img.dataset.id = id;
            img.onmousedown = img.ontouchstart = drag;
            document.getElementById('panel-objetos').appendChild(img);
        });
        
        hablar(`Juan, pon ${db[config.pedir[0]].nom}.`);
        loopPreguntas = setInterval(lanzarPregunta, config.t);
    }

    function drag(e) {
        if(bloqueado) return;
        const el = e.target;
        const t = e.type.includes('touch') ? e.touches[0] : e;
        let sx = t.clientX - el.getBoundingClientRect().left;
        let sy = t.clientY - el.getBoundingClientRect().top;
        el.style.position = 'fixed'; el.style.zIndex = 1000;

        function mover(me) {
            const mt = me.type.includes('touch') ? me.touches[0] : me;
            el.style.left = (mt.clientX - sx) + 'px'; el.style.top = (mt.clientY - sy) + 'px';
        }

        function soltar(se) {
            document.removeEventListener('mousemove', mover); document.removeEventListener('mouseup', soltar);
            document.removeEventListener('touchmove', mover); document.removeEventListener('touchend', soltar);
            const st = se.type.includes('touch') ? se.changedTouches[0] : se;
            const cama = document.getElementById('area-cama-detect').getBoundingClientRect();
            const objId = niveles[nivel].pedir[paso];

            if (st.clientX > (cama.left + 50) && el.dataset.id === objId) {
                sfxOk.play(); aciertos++;
                const fija = document.createElement('img');
                fija.src = el.src; fija.className = 'pieza-fija';
                fija.style.left = (st.clientX - cama.left) + 'px';
                fija.style.top = (st.clientY - cama.top) + 'px';
                document.getElementById('contenedor-piezas').appendChild(fija);
                el.style.display = 'none';
                paso++;
                if (paso < niveles[nivel].pedir.length) {
                    hablar(`Bien. Ahora ${db[niveles[nivel].pedir[paso]].nom}`);
                } else {
                    bloqueado = true;
                    setTimeout(() => { if(nivel < 3){ nivel++; cargarFase(); } else { finalizar(); }}, 1500);
                }
            } else if (st.clientX > (cama.left + 50)) {
                sfxErr.play(); errores++; hablar(`No, Juan. Busca ${db[objId].nom}`);
                el.style.position = 'static';
            } else { el.style.position = 'static'; }
            actualizarStats();
        }
        document.addEventListener('mousemove', mover); document.addEventListener('mouseup', soltar);
        document.addEventListener('touchmove', mover, {passive:false}); document.addEventListener('touchend', soltar);
    }

    function lanzarPregunta() {
        if(bloqueado || document.getElementById('cuadro-pregunta').style.display === 'block') return;
        const p = bancoPreguntas[Math.floor(Math.random()*bancoPreguntas.length)];
        document.getElementById('pregunta-texto').innerText = p.q;
        document.getElementById('cuadro-pregunta').dataset.ans = p.a;
        document.getElementById('cuadro-pregunta').style.display = 'block';
        hablar(p.q);
    }

    function verificarRespuesta(v) {
        if(v === document.getElementById('cuadro-pregunta').dataset.ans) { sfxOk.play(); aciertos++; } 
        else { sfxErr.play(); errores++; }
        document.getElementById('cuadro-pregunta').style.display = 'none';
        actualizarStats();
    }

    function actualizarStats() {
        let total = aciertos + errores;
        document.getElementById('exito-txt').innerText = `Éxito: ${total === 0 ? 100 : Math.round((aciertos/total)*100)}%`;
    }

    function finalizar() {
        clearInterval(loopPreguntas);
        document.getElementById('overlay-final').style.display = 'flex';
        document.getElementById('resumen-final').innerText = `¡Espectacular Juan! Has cerrado la etapa de Atención con maestría. Mañana nos vemos para empezar a entrenar tu memoria.`;
        hablar("¡Misión cumplida! Has terminado todos los niveles de atención. Mañana iniciaremos con memoria.");
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 10 - Juan - CORREGIDO</title>
    <style>
        body { font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; background: url('img10/fondo_habitacion.png') no-repeat center center fixed; background-size: cover; height: 100vh; display: flex; flex-direction: column; }
        #cabecera { background: rgba(27, 79, 114, 0.95); color: white; padding: 10px; border-bottom: 5px solid #E67E22; z-index: 100; }
        #guia-box { background: white; color: #1B4F72; width: 92%; margin: 0 auto; border-radius: 15px; padding: 10px; display: flex; align-items: center; border: 3px solid #1B4F72; }
        #escenario { flex-grow: 1; position: relative; display: flex; }
        #panel-objetos { width: 170px; background: rgba(255,255,255,0.85); border-radius: 20px; border: 4px solid #1B4F72; display: flex; flex-direction: column; gap: 10px; padding: 15px; overflow-y: auto; align-items: center; z-index: 10; margin: 10px; }
        .draggable { width: 85px; height: 85px; object-fit: contain; cursor: grab; touch-action: none; }
        #area-cama { position: absolute; left: 190px; right: 0; top: 0; bottom: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        #cama_base { width: 90%; max-width: 600px; pointer-events: auto; }
        .pieza-fija { position: absolute; width: 120px; z-index: 5; pointer-events: none; }
        #cuadro-pregunta { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: #FFD700; border: 6px solid #1B4F72; border-radius: 25px; padding: 20px; text-align: center; z-index: 2000; }
        .btn-p { padding: 12px; margin: 8px; width: 100px; font-weight: bold; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body onload="iniciar()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" style="width:50px; height:50px; border-radius:50%; margin-right:10px;">
        <p id="instruccion" style="margin:0; font-weight:bold; font-size:1.1rem;">Cargando...</p>
    </div>
</div>

<div id="escenario">
    <div id="panel-objetos"></div>
    <div id="area-cama"><img src="img10/cama_destendida.png" id="cama_base"></div>
</div>

<div id="cuadro-pregunta">
    <p id="txt-q" style="font-weight: bold; font-size: 1.2rem;"></p>
    <button class="btn-p" style="background:#2ECC71" onclick="resp('SÍ')">SÍ</button>
    <button class="btn-p" style="background:#E74C3C" onclick="resp('NO')">NO</button>
</div>

<script>
    let nivel = 1; let paso = 0; let bloqueado = false;
    const sfxOk = new Audio('img8/exito.mp3'); const sfxErr = new Audio('img8/alarma.mp3');
    const sonidosAmbiente = [new Audio('img10/conversacion.mp3'), new Audio('img10/pajaros.mp3'), new Audio('img10/radio.mp3')];

    // BANCO DE ESTÍMULOS (Garantizar que los IDs coincidan exactamente)
    const banco = [
        {id: 0, img: "sabana_azul.png", nombre: "la sábana azul", meta: true},
        {id: 1, img: "almohada_blanca.png", nombre: "la almohada blanca", meta: true},
        {id: 2, img: "cobija_termica.png", nombre: "la cobija térmica", meta: true},
        {id: 3, img: "control.png", nombre: "el control", meta: false},
        {id: 4, img: "reloj.png", nombre: "el reloj", meta: false}
    ];

    const preguntas = [
        {q: "¿El sol brilla?", a: "SÍ"}, {q: "¿El hielo quema?", a: "SÍ"}, {q: "¿El agua moja?", a: "SÍ"}
        // Aquí puedes pegar las otras 97 preguntas siguiendo el mismo formato
    ];

    function hablar(t) {
        window.speechSynthesis.cancel();
        document.getElementById('instruccion').innerText = t;
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        window.speechSynthesis.speak(m);
    }

    function iniciar() {
        sonidosAmbiente.forEach(s => { s.loop = true; s.volume = 0.1; s.play().catch(()=>{}); });
        armarNivel();
        setInterval(lanzarQ, 20000);
    }

    function armarNivel() {
        const panel = document.getElementById('panel-objetos');
        panel.innerHTML = "";
        paso = 0; bloqueado = false;

        // Definir qué objetos mostrar (Aumenta según nivel)
        let objsAMostrar = (nivel === 1) ? banco.slice(0, 4) : banco; 
        objsAMostrar.sort(() => Math.random() - 0.5);

        objsAMostrar.forEach(item => {
            const img = document.createElement('img');
            img.src = `img10/${item.img}`;
            img.className = 'draggable';
            img.dataset.idx = item.id;
            img.onmousedown = img.ontouchstart = dragStart;
            panel.appendChild(img);
        });

        hablar("Juan, pon " + banco[paso].nombre + " en la cama.");
    }

    function dragStart(e) {
        if (bloqueado) return;
        const el = e.target;
        const t = e.type === 'touchstart' ? e.touches[0] : e;
        let rect = el.getBoundingClientRect();
        let ox = t.clientX - rect.left; let oy = t.clientY - rect.top;

        el.style.position = 'fixed'; el.style.zIndex = "1000";

        const move = (me) => {
            const mt = me.type === 'touchmove' ? me.touches[0] : me;
            el.style.left = (mt.clientX - ox) + 'px'; el.style.top = (mt.clientY - oy) + 'px';
        };

        const stop = (se) => {
            document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop);
            
            const st = se.type === 'touchend' ? se.changedTouches[0] : se;
            const cama = document.getElementById('cama_base').getBoundingClientRect();
            const tocaCama = (st.clientX > cama.left && st.clientX < cama.right && st.clientY > cama.top && st.clientY < cama.bottom);

            // VALIDACIÓN POR ID NUMÉRICO (Infalible)
            if (tocaCama && parseInt(el.dataset.idx) === paso) {
                sfxOk.play();
                const fija = document.createElement('img');
                fija.src = el.src; fija.className = 'pieza-fija';
                fija.style.left = (st.clientX - 60) + 'px'; fija.style.top = (st.clientY - 60) + 'px';
                document.body.appendChild(fija);
                el.style.display = 'none';
                paso++;
                
                if (paso < 3) { // 3 es la cantidad de piezas meta (sábana, almohada, cobija)
                    setTimeout(() => hablar("¡Bien! Ahora busca " + banco[paso].nombre), 500);
                } else {
                    hablar("¡Excelente! Nivel superado.");
                    setTimeout(() => { nivel++; armarNivel(); }, 2000);
                }
            } else {
                if (tocaCama) {
                    sfxErr.play();
                    hablar("Esa no es, pon " + banco[paso].nombre);
                }
                // Resetear posición si falla o se suelta fuera
                el.style.position = 'static'; el.style.zIndex = "10";
            }
        };

        document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
        document.addEventListener('touchmove', move, {passive:false}); document.addEventListener('touchend', stop);
    }

    function lanzarQ() {
        if(document.getElementById('cuadro-pregunta').style.display === 'block') return;
        const p = preguntas[Math.floor(Math.random()*preguntas.length)];
        document.getElementById('txt-q').innerText = p.q;
        document.getElementById('cuadro-pregunta').dataset.ans = p.a;
        document.getElementById('cuadro-pregunta').style.display = 'block';
        hablar(p.q);
    }

    function resp(r) {
        const correct = document.getElementById('cuadro-pregunta').dataset.ans;
        document.getElementById('cuadro-pregunta').style.display = 'none';
        if(r === correct) { sfxOk.play(); hablar("¡Muy bien!"); }
        else { sfxErr.play(); hablar("Oh oh."); }
    }
</script>
</body>
</html>

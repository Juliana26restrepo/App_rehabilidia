<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 10 - La Habitación de Juan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; background: url('img10/fondo_habitacion.png') no-repeat center center fixed; background-size: cover; height: 100vh; display: flex; flex-direction: column; }
        #cabecera { background: rgba(27, 79, 114, 0.9); color: white; padding: 10px; z-index: 100; border-bottom: 4px solid #E67E22; }
        #guia-box { background: white; color: #1B4F72; width: 90%; margin: 0 auto; border-radius: 15px; padding: 12px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #avatar { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; border: 3px solid #1B4F72; }
        #escenario { flex-grow: 1; position: relative; display: flex; padding: 15px; gap: 20px; }
        #despensa-objetos { width: 160px; background: rgba(255,255,255,0.95); border-radius: 20px; border: 3px solid #1B4F72; display: flex; flex-direction: column; gap: 15px; padding: 15px; overflow-y: auto; align-items: center; z-index: 10; height: 85%; }
        .item-cama { width: 90px; height: 90px; object-fit: contain; cursor: grab; touch-action: none; z-index: 11; }
        #contenedor-cama { position: absolute; left: 200px; right: 20px; top: 0; bottom: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        #cama_img { width: 90%; max-width: 550px; pointer-events: auto; }
        .pieza-fija { position: absolute; width: 110px; z-index: 5; pointer-events: none; }
        #notificacion { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: #FFD700; border: 6px solid #1B4F72; border-radius: 30px; padding: 25px; text-align: center; z-index: 2000; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .btn-notif { padding: 15px; margin: 10px; width: 110px; border-radius: 15px; border: 3px solid #1B4F72; font-weight: bold; cursor: pointer; color: white; font-size: 1.2rem; }
        #modal-cierre { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(27, 79, 114, 0.98); z-index: 3000; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body onload="configurarNivel()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia" style="margin:0; font-size: 1.2rem; font-weight:bold;">¡Hola Juan!</p>
    </div>
</div>

<div id="escenario">
    <div id="despensa-objetos"></div>
    <div id="contenedor-cama">
        <img src="img10/cama_destendida.png" id="cama_img">
    </div>
</div>

<div id="notificacion">
    <p id="pregunta-txt" style="font-size: 1.4rem; font-weight: bold; color: #1B4F72; margin-bottom: 20px;"></p>
    <button class="btn-notif" style="background:#2ECC71" onclick="verificarRespuesta('SÍ')">SÍ</button>
    <button class="btn-notif" style="background:#E74C3C" onclick="verificarRespuesta('NO')">NO</button>
</div>

<div id="modal-cierre">
    <h1 id="titulo-final" style="font-size: 3.5rem; color: #FFD700;">¡LOGRADO!</h1>
    <p id="stats-nivel" style="font-size: 2rem; margin: 30px;"></p>
    <button onclick="irASiguiente()" style="padding: 20px 50px; font-size: 1.8rem; background: #E67E22; color: white; border: none; border-radius: 20px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">SIGUIENTE</button>
</div>

<script>
    let nivelActual = 1;
    let objetivoIdx = 0;
    let piezasNivel = [];
    let timerPregunta = null;
    let isProcessing = false; // CERROJO PARA EVITAR DOBLE VALIDACIÓN
    let preguntasTotales = 0;
    let preguntasCorrectas = 0;
    let respuestaEsperada = "";

    const sonidos = { exito: new Audio('img8/exito.mp3'), error: new Audio('img8/alarma.mp3') };
    const banco = [{p:"¿El cielo es azul?", r:"SÍ"}, {p:"¿El fuego es frío?", r:"NO"}, {p:"¿Los perros maúllan?", r:"NO"}, {p:"¿La leche es blanca?", r:"SÍ"}];
    
    // Nombres exactos basados en tus fotos
    const catalogo = {
        piezas: ["sabana_azul.png", "almohada_blanca.png", "cobija_termica.png", "almohada_gris.png", "sabana_blanca.png", "cobija_tigre.png", "almohada_cafe.png", "sabana_gris.png"],
        distractores: ["control.png", "lampara.png", "medias.png", "reloj.png"]
    };

    function hablar(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        msg.rate = 0.9;
        document.getElementById('texto-guia').innerText = txt;
        window.speechSynthesis.speak(msg);
    }

    function configurarNivel() {
        document.getElementById('modal-cierre').style.display = 'none';
        objetivoIdx = 0; preguntasTotales = 0; preguntasCorrectas = 0;
        document.getElementById('despensa-objetos').innerHTML = "";
        document.querySelectorAll('.pieza-fija').forEach(p => p.remove());

        let cant = (nivelActual === 1) ? 4 : (nivelActual === 2 ? 6 : 8);
        piezasNivel = [];
        for(let i=0; i<cant; i++) {
            let img = catalogo.piezas[i % catalogo.piezas.length];
            let tipo = img.includes("sabana") ? "la sábana" : (img.includes("almohada") ? "la almohada" : "la cobija");
            piezasNivel.push({img: img, nombre: tipo});
        }
        renderizarPanel();
        setTimeout(pedirObjeto, 1000);
        iniciarTimer();
    }

    function renderizarPanel() {
        const panel = document.getElementById('despensa-objetos');
        let unicos = [...new Set(piezasNivel.map(p => p.img))];
        let pool = [...unicos, ...catalogo.distractores].sort(() => Math.random() - 0.5);
        pool.forEach(imgName => {
            const img = document.createElement('img');
            img.src = `img10/${imgName}`;
            img.className = 'item-cama';
            img.dataset.archivo = imgName;
            img.onmousedown = img.ontouchstart = dragStart;
            panel.appendChild(img);
        });
    }

    function pedirObjeto() {
        if (objetivoIdx < piezasNivel.length) {
            hablar("Juan, busca " + piezasNivel[objetivoIdx].nombre);
        }
    }

    function iniciarTimer() {
        if(timerPregunta) clearInterval(timerPregunta);
        let ms = (nivelActual === 1) ? 15000 : (nivelActual === 2 ? 10000 : 5000);
        timerPregunta = setInterval(lanzarPregunta, ms);
    }

    function lanzarPregunta() {
        if (document.getElementById('notificacion').style.display === 'block') return;
        const data = banco[Math.floor(Math.random() * banco.length)];
        respuestaEsperada = data.r;
        preguntasTotales++;
        document.getElementById('pregunta-txt').innerText = data.p;
        document.getElementById('notificacion').style.display = 'block';
        hablar(data.p);
    }

    function verificarRespuesta(userR) {
        document.getElementById('notificacion').style.display = 'none';
        if(userR === respuestaEsperada) { 
            preguntasCorrectas++; 
            sonidos.exito.play(); 
            hablar("¡Muy bien Juan!"); 
        } else { 
            sonidos.error.play(); 
            hablar("Esa no era la respuesta."); 
        }
    }

    function dragStart(e) {
        if(isProcessing || document.getElementById('notificacion').style.display === 'block') return;
        const el = e.target;
        const touch = e.type === 'touchstart' ? e.touches[0] : e;
        let rect = el.getBoundingClientRect();
        let offX = touch.clientX - rect.left;
        let offY = touch.clientY - rect.top;
        el.style.position = 'fixed'; el.style.zIndex = "1000"; el.style.opacity = "0.8";

        const move = (me) => {
            const mt = me.type === 'touchmove' ? me.touches[0] : me;
            el.style.left = (mt.clientX - offX) + 'px'; el.style.top = (mt.clientY - offY) + 'px';
        };

        const stop = (se) => {
            document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop);
            
            const st = se.type === 'touchend' ? se.changedTouches[0] : se;
            const camaRect = document.getElementById('cama_img').getBoundingClientRect();
            
            const hit = (st.clientX > camaRect.left && st.clientX < camaRect.right && 
                         st.clientY > camaRect.top && st.clientY < camaRect.bottom);

            // COMPROBACIÓN FINAL
            if (hit && !isProcessing && el.dataset.archivo === piezasNivel[objetivoIdx].img) {
                isProcessing = true; // BLOQUEAMOS OTROS ARRASTRES
                sonidos.exito.play();
                
                // Fijar pieza
                const fija = document.createElement('img');
                fija.src = el.src; fija.className = 'pieza-fija';
                let contRect = document.getElementById('contenedor-cama').getBoundingClientRect();
                fija.style.left = (st.clientX - contRect.left - 50) + 'px';
                fija.style.top = (st.clientY - contRect.top - 50) + 'px';
                document.getElementById('contenedor-cama').appendChild(fija);
                
                el.style.position = 'static'; el.style.opacity = "1";
                objetivoIdx++;

                if (objetivoIdx >= piezasNivel.length) {
                    clearInterval(timerPregunta);
                    setTimeout(mostrarResumen, 1000);
                } else {
                    // ESPERAMOS A QUE TERMINE DE HABLAR ANTES DE PEDIR EL SIGUIENTE
                    setTimeout(() => { isProcessing = false; pedirObjeto(); }, 1200);
                }
            } else {
                if(hit) { 
                    sonidos.error.play(); 
                    hablar("Esa no es " + piezasNivel[objetivoIdx].nombre + ", busca otra vez."); 
                }
                el.style.position = 'static'; el.style.opacity = "1";
            }
        };
        document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
        document.addEventListener('touchmove', move, {passive:false}); document.addEventListener('touchend', stop);
    }

    function mostrarResumen() {
        let porc = preguntasTotales > 0 ? Math.round((preguntasCorrectas/preguntasTotales)*100) : 100;
        document.getElementById('stats-nivel').innerHTML = `Nivel ${nivelActual} terminado.<br>Aciertos en preguntas: ${porc}%`;
        document.getElementById('modal-cierre').style.display = 'flex';
        hablar("¡Excelente Juan! Nivel superado.");
        isProcessing = false;
    }

    function irASiguiente() {
        if(nivelActual < 3) { nivelActual++; configurarNivel(); }
        else { alert("¡Juan, lo lograste! Sesión 10 terminada."); location.reload(); }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 10 - La Habitación de Juan</title>
    <style>
        body { font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; background: url('img10/fondo_habitacion.png') no-repeat center; background-size: cover; height: 100vh; display: flex; flex-direction: column; }
        #cabecera { background: #1B4F72; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; z-index: 100; border-bottom: 3px solid #E67E22; }
        #guia-box { background: white; color: #1B4F72; width: 90%; border-radius: 10px; padding: 10px; display: flex; align-items: center; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; border: 2px solid #1B4F72; }
        
        #escenario { flex-grow: 1; display: flex; padding: 15px; gap: 15px; position: relative; overflow: hidden; height: 70vh; }
        
        #despensa-objetos { width: 150px; background: rgba(255,255,255,0.9); border-radius: 15px; border: 3px solid #1B4F72; display: flex; flex-direction: column; gap: 10px; padding: 10px; overflow-y: auto; align-items: center; z-index: 10; }
        .item-cama { width: 85px; height: 85px; object-fit: contain; cursor: grab; touch-action: none; }
        
        /* SOLUCIÓN DEFINITIVA PARA LA CAMA INMÓVIL */
        #contenedor-cama { 
            position: absolute;
            left: 180px; right: 20px; top: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center;
        }
        #cama_img { width: 90%; max-width: 550px; pointer-events: none; }

        #notificacion { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: #FFD700; border: 6px solid #1B4F72; border-radius: 25px; padding: 25px; text-align: center; z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .btn-notif { padding: 15px; margin: 10px 5px; width: 110px; border-radius: 12px; border: 3px solid #1B4F72; font-weight: bold; cursor: pointer; color: white; font-size: 1.2rem; }
        #btnA { background: #2ECC71; } #btnB { background: #E74C3C; }

        #modal-cierre { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1B4F72; z-index: 3000; color: white; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body onload="iniciarSesion()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia" style="margin:0; font-weight:bold;">Juan, prepárate...</p>
    </div>
</div>

<div id="escenario">
    <div id="despensa-objetos"></div>
    <div id="contenedor-cama">
        <img src="img10/cama_destendida.png" id="cama_img">
    </div>
</div>

<div id="notificacion">
    <p id="pregunta-txt" style="font-size: 1.3rem; font-weight: bold; color: #1B4F72; margin-bottom: 20px;"></p>
    <div style="display: flex; justify-content: center; gap: 10px;">
        <button class="btn-notif" id="btnA">SÍ</button>
        <button class="btn-notif" id="btnB">NO</button>
    </div>
</div>

<div id="modal-cierre">
    <h1 style="font-size: 4rem; color: #FFD700;">¡SÚPER JUAN!</h1>
    <p id="stats" style="font-size: 2rem; margin-bottom: 30px;">Sesión 10 completada.</p>
    <button onclick="location.reload()" style="padding: 15px 40px; font-size: 1.5rem; background: #E67E22; color: white; border: none; border-radius: 15px; cursor: pointer;">REPETIR</button>
</div>

<script>
    let nivelActual = 1;
    let objetivoIdx = 0;
    let piezasNivel = [];
    let timerPregunta = null;
    let juegoFinalizado = false;
    let respuestaCorrectaGlobal = "";

    const sonidos = { exito: new Audio('img8/exito.mp3'), alerta: new Audio('img8/alarma.mp3') };

    // BANCO DE DATOS CON RESPUESTAS CORRECTAS
    const banco = [
        {p: "¿El sol es una estrella?", r: "SÍ"}, {p: "¿El agua moja?", r: "SÍ"},
        {p: "¿El fuego es frío?", r: "NO"}, {p: "¿Los gatos ladran?", r: "NO"},
        {p: "¿La nieve es fría?", r: "SÍ"}, {p: "¿El azúcar es salado?", r: "NO"},
        {p: "¿Los pájaros vuelan?", r: "SÍ"}, {p: "¿El cielo es verde?", r: "NO"}
    ];

    const catalogo = {
        piezas: ["sabana_azul.png", "almohada_blanca.png", "cobija_termica.png", "almohada_gris.png", "sabana_blanca.png", "cobija_tigre.png", "almohada_cafe.png", "sabana_gris.png"],
        distractores: ["control.png", "lampara.png", "medias.png", "reloj.png", "revista.png", "vaso.png"]
    };

    function hablar(txt, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        msg.rate = 0.95;
        document.getElementById('texto-guia').innerText = txt;
        if(callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function iniciarSesion() {
        hablar("Hola Juan, vamos a tender la cama. Atento a lo que te pida.", configurarNivel);
    }

    function configurarNivel() {
        objetivoIdx = 0;
        document.getElementById('despensa-objetos').innerHTML = "";
        const puestas = document.querySelectorAll('#contenedor-cama .item-cama');
        puestas.forEach(v => v.remove());

        // Definición de objetivos (Nivel 1: 4, Nivel 2: 6, Nivel 3: 8)
        let cantidad = (nivelActual === 1) ? 4 : (nivelActual === 2 ? 6 : 8);
        piezasNivel = [];
        for(let i=0; i<cantidad; i++) {
            let img = catalogo.piezas[i % catalogo.piezas.length];
            let nombre = img.split('_')[0].replace('sabana', 'la sábana').replace('almohada', 'la almohada').replace('cobija', 'la cobija');
            piezasNivel.push({img: img, nombre: nombre});
        }

        renderizarPanel();
        pedirObjeto();
        iniciarTimer();
    }

    function renderizarPanel() {
        const panel = document.getElementById('despensa-objetos');
        let pool = [...new Set(piezasNivel.map(p => p.img)), ...catalogo.distractores].sort(() => Math.random() - 0.5);
        
        pool.forEach(imgName => {
            const img = document.createElement('img');
            img.src = `img10/${imgName}`;
            img.className = 'item-cama';
            img.dataset.archivo = imgName;
            img.onmousedown = img.ontouchstart = dragStart;
            panel.appendChild(img);
        });
    }

    function pedirObjeto() {
        if (objetivoIdx < piezasNivel.length) {
            hablar("Juan, busca " + piezasNivel[objetivoIdx].nombre);
        }
    }

    function iniciarTimer() {
        if(timerPregunta) clearInterval(timerPregunta);
        let ms = nivelActual === 1 ? 15000 : (nivelActual === 2 ? 10000 : 5000);
        timerPregunta = setInterval(lanzarPregunta, ms);
    }

    function lanzarPregunta() {
        if (juegoFinalizado || document.getElementById('notificacion').style.display === 'block') return;
        sonidos.alerta.play();
        const data = banco[Math.floor(Math.random() * banco.length)];
        respuestaCorrectaGlobal = data.r;
        
        document.getElementById('pregunta-txt').innerText = data.p;
        document.getElementById('notificacion').style.display = 'block';
        hablar(data.p);

        document.getElementById('btnA').onclick = () => verificarRespuesta("SÍ");
        document.getElementById('btnB').onclick = () => verificarRespuesta("NO");
    }

    function verificarRespuesta(userR) {
        document.getElementById('notificacion').style.display = 'none';
        if(userR === respuestaCorrectaGlobal) {
            sonidos.exito.play();
            hablar("¡Correcto Juan! Sigamos.");
        } else {
            hablar("Esa no era la respuesta, pero no te preocupes. Continúa.");
        }
    }

    function dragStart(e) {
        if(juegoFinalizado || document.getElementById('notificacion').style.display === 'block') return;
        const el = e.target;
        const touch = e.type === 'touchstart' ? e.touches[0] : e;
        let rect = el.getBoundingClientRect();
        let offX = touch.clientX - rect.left;
        let offY = touch.clientY - rect.top;
        
        el.style.position = 'fixed'; el.style.zIndex = "1000";

        const move = (me) => {
            const mt = me.type === 'touchmove' ? me.touches[0] : me;
            el.style.left = (mt.clientX - offX) + 'px'; el.style.top = (mt.clientY - offY) + 'px';
        };

        const stop = (se) => {
            document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop);
            
            const st = se.type === 'touchend' ? se.changedTouches[0] : se;
            const cama = document.getElementById('cama_img').getBoundingClientRect();
            const sobreCama = (st.clientX > cama.left && st.clientX < cama.right && st.clientY > cama.top && st.clientY < cama.bottom);

            if (sobreCama && el.dataset.archivo === piezasNivel[objetivoIdx].img) {
                const clone = el.cloneNode(true);
                clone.style.position = 'absolute';
                let cont = document.getElementById('contenedor-cama').getBoundingClientRect();
                clone.style.left = (st.clientX - cont.left - 40) + 'px';
                clone.style.top = (st.clientY - cont.top - 40) + 'px';
                document.getElementById('contenedor-cama').appendChild(clone);
                
                sonidos.exito.play();
                objetivoIdx++;
                el.style.position = 'static';
                
                if (objetivoIdx >= piezasNivel.length) {
                    setTimeout(pasarNivel, 1000);
                } else {
                    pedirObjeto();
                }
            } else {
                if(sobreCama) hablar("Ese no es, busca " + piezasNivel[objetivoIdx].nombre);
                el.style.position = 'static';
            }
        };
        document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
        document.addEventListener('touchmove', move, {passive: false}); document.addEventListener('touchend', stop);
    }

    function pasarNivel() {
        if (nivelActual < 3) {
            nivelActual++;
            hablar("¡Nivel superado! Vamos por más objetos.", configurarNivel);
        } else {
            juegoFinalizado = true;
            clearInterval(timerPregunta);
            document.getElementById('modal-cierre').style.display = 'flex';
            hablar("¡Excelente trabajo Juan! Has terminado todas las sesiones.");
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 10 - Juan</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; overflow: hidden; touch-action: none; background: url('img10/fondo_habitacion.png') no-repeat center center fixed; background-size: cover; height: 100vh; }
        #cabecera { background: rgba(27, 79, 114, 0.95); color: white; padding: 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 5px solid #E67E22; }
        #instruccion-box { background: white; padding: 10px 20px; border-radius: 20px; color: #1B4F72; display: flex; align-items: center; border: 3px solid #1B4F72; font-weight: bold; min-width: 300px; }
        #panel-objetos { position: absolute; left: 15px; top: 110px; width: 150px; background: rgba(255,255,255,0.9); border: 4px solid #1B4F72; border-radius: 20px; display: flex; flex-direction: column; gap: 10px; padding: 15px; align-items: center; z-index: 10; height: 75vh; overflow-y: auto; }
        .draggable { width: 90px; height: 90px; object-fit: contain; cursor: grab; z-index: 20; margin-bottom: 5px; }
        #area-cama-detect { position: absolute; left: 20%; top: 25%; width: 60%; height: 55%; border: 2px dashed transparent; pointer-events: auto; }
        #cama_base { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .pieza-fija { position: absolute; width: 120px; z-index: 5; pointer-events: none; transform: translate(-50%, -50%); }
        #cuadro-pregunta { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 350px; background: #FFD700; border: 6px solid #1B4F72; border-radius: 25px; padding: 25px; text-align: center; z-index: 2000; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .btn-p { padding: 15px 30px; margin: 10px; font-weight: bold; cursor: pointer; border-radius: 15px; border: none; color: white; font-size: 1.4rem; }
    </style>
</head>
<body onload="iniciar()">

<div id="cabecera">
    <div id="instruccion-box">
        <img src="COTERAPEUTA.JPG" style="width:50px; height:50px; border-radius:50%; margin-right:15px; border: 2px solid #1B4F72;">
        <span id="label-guia">Cargando...</span>
    </div>
    <div id="exito-txt" style="font-size: 1.5rem; font-weight: bold; margin-right: 20px;">Éxito: 100%</div>
</div>

<div id="panel-objetos"></div>

<div id="area-cama-detect">
    <img src="img10/cama_destendida.png" id="cama_base">
    <div id="contenedor-piezas"></div>
</div>

<div id="cuadro-pregunta">
    <p id="pregunta-texto" style="font-size: 1.5rem; font-weight: bold; color:#1B4F72;"></p>
    <button class="btn-p" style="background:#2ECC71" onclick="verificarRespuesta('SÍ')">SÍ</button>
    <button class="btn-p" style="background:#E74C3C" onclick="verificarRespuesta('NO')">NO</button>
</div>

<script>
    let nivel = 1, paso = 0, aciertos = 0, errores = 0, bloqueado = false;
    const sfxOk = new Audio('img8/exito.mp3'); 
    const sfxErr = new Audio('img8/alarma.mp3');

    // BANCO COMPLETO DE ESTÍMULOS (Nombres exactos de tu carpeta)
    const db = {
        "sabana_azul": { img: "sabana_azul.png", nom: "la sábana azul" },
        "almohada_blanca": { img: "almohada_blanca.png", nom: "la almohada blanca" },
        "cobija_termica": { img: "cobija_termica.png", nom: "la cobija térmica" },
        "almohada_gris": { img: "almohada_gris.png", nom: "la almohada gris" },
        "sabana_blanca": { img: "sabana_blanca.png", nom: "la sábana blanca" },
        "reloj": { img: "reloj.png", nom: "el reloj" },
        "control": { img: "control.png", nom: "el control" },
        "revista": { img: "revista.png", nom: "la revista" },
        "medias": { img: "medias.png", nom: "las medias" },
        "vaso": { img: "vaso.png", nom: "el vaso" },
        "lampara": { img: "lampara.png", nom: "la lámpara" }
    };

    // NIVELES USANDO EL BANCO DE ESTÍMULOS
    const niveles = {
        1: { pedir: ["sabana_azul", "almohada_blanca"], distractores: ["revista", "vaso", "reloj"] },
        2: { pedir: ["cobija_termica", "control"], distractores: ["medias", "lampara", "reloj"] },
        3: { pedir: ["sabana_blanca", "almohada_gris"], distractores: ["reloj", "control", "vaso", "revista", "medias"] }
    };

    const preguntas = [
        {q: "¿El agua es seca?", a: "NO"},
        {q: "¿El cielo es azul?", a: "SÍ"},
        {q: "¿Los pájaros vuelan?", a: "SÍ"}
    ];

    function hablar(t) {
        window.speechSynthesis.cancel();
        document.getElementById('label-guia').innerText = t;
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        window.speechSynthesis.speak(msg);
    }

    function iniciar() {
        cargarFase();
        setInterval(lanzarPregunta, 15000); 
    }

    function cargarFase() {
        const panel = document.getElementById('panel-objetos');
        const contenedorCama = document.getElementById('contenedor-piezas');
        panel.innerHTML = "";
        contenedorCama.innerHTML = ""; // Limpieza total de cama entre niveles
        paso = 0; bloqueado = false;

        const conf = niveles[nivel];
        // Combinar objetos necesarios con distractores
        let listaNivel = [...conf.pedir, ...conf.distractores];
        listaNivel.sort(() => Math.random() - 0.5);

        listaNivel.forEach(id => {
            const img = document.createElement('img');
            img.src = `img10/${db[id].img}`;
            img.className = 'draggable';
            img.dataset.id = id;
            img.onmousedown = img.ontouchstart = drag;
            panel.appendChild(img);
        });

        hablar("Juan, pon " + db[conf.pedir[0]].nom + " en la cama.");
    }

    function drag(e) {
        if(bloqueado) return;
        const el = e.target;
        const t = e.type.includes('touch') ? e.touches[0] : e;
        let sx = t.clientX - el.getBoundingClientRect().left;
        let sy = t.clientY - el.getBoundingClientRect().top;
        el.style.position = 'fixed'; el.style.zIndex = 1000;

        function mover(me) {
            const mt = me.type.includes('touch') ? me.touches[0] : me;
            el.style.left = (mt.clientX - sx) + 'px'; el.style.top = (mt.clientY - sy) + 'px';
        }

        function soltar(se) {
            document.removeEventListener('mousemove', mover); document.removeEventListener('mouseup', soltar);
            document.removeEventListener('touchmove', mover); document.removeEventListener('touchend', soltar);

            const st = se.type.includes('touch') ? se.changedTouches[0] : se;
            const camaRect = document.getElementById('area-cama-detect').getBoundingClientRect();
            
            // Detección mejorada: si el centro del objeto está sobre la cama
            const enCama = (st.clientX > camaRect.left && st.clientX < camaRect.right && 
                            st.clientY > camaRect.top && st.clientY < camaRect.bottom);
            
            const objetivoId = niveles[nivel].pedir[paso];

            if (enCama && el.dataset.id === objetivoId) {
                sfxOk.play(); aciertos++;
                const fija = document.createElement('img');
                fija.src = el.src; fija.className = 'pieza-fija';
                fija.style.left = (st.clientX - camaRect.left) + 'px';
                fija.style.top = (st.clientY - camaRect.top) + 'px';
                document.getElementById('contenedor-piezas').appendChild(fija);
                el.style.display = 'none';
                paso++;
                
                if (paso < niveles[nivel].pedir.length) {
                    hablar("¡Muy bien! Ahora busca " + db[niveles[nivel].pedir[paso]].nom);
                } else {
                    bloqueado = true;
                    if(nivel < 3) {
                        setTimeout(() => { nivel++; cargarFase(); }, 2000);
                    } else { hablar("¡Excelente Juan! Terminamos."); }
                }
            } else if (enCama) {
                sfxErr.play(); errores++;
                hablar("Esa no es Juan. Busca " + db[objetivoId].nom);
                el.style.position = 'static';
            } else {
                el.style.position = 'static';
            }
            actualizarStats();
        }
        document.addEventListener('mousemove', mover); document.addEventListener('mouseup', soltar);
        document.addEventListener('touchmove', mover, {passive:false}); document.addEventListener('touchend', soltar);
    }

    function actualizarStats() {
        let total = aciertos + errores;
        let p = total === 0 ? 100 : Math.round((aciertos / total) * 100);
        document.getElementById('exito-txt').innerText = `Éxito: ${p}%`;
    }

    function lanzarPregunta() {
        if(document.getElementById('cuadro-pregunta').style.display === 'block' || bloqueado) return;
        const p = preguntas[Math.floor(Math.random()*preguntas.length)];
        document.getElementById('pregunta-texto').innerText = p.q;
        document.getElementById('cuadro-pregunta').dataset.ans = p.a;
        document.getElementById('cuadro-pregunta').style.display = 'block';
        hablar(p.q);
    }

    function verificarRespuesta(v) {
        const correcta = document.getElementById('cuadro-pregunta').dataset.ans;
        document.getElementById('cuadro-pregunta').style.display = 'none';
        if(v === correcta) { sfxOk.play(); aciertos++; hablar("¡Muy bien!"); }
        else { sfxErr.play(); errores++; hablar("No, Juan."); }
        actualizarStats();
    }
</script>
</body>
</html>

<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 10 - Juan: Atención Dividida</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; overflow: hidden; touch-action: none; background: url('img10/fondo_habitacion.png') no-repeat center center fixed; background-size: cover; height: 100vh; }
        #cabecera { background: rgba(27, 79, 114, 0.95); color: white; height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 4px solid #E67E22; z-index: 1000; position: relative; }
        #instruccion-box { background: white; padding: 10px 25px; border-radius: 30px; color: #1B4F72; display: flex; align-items: center; border: 3px solid #1B4F72; font-weight: bold; max-width: 65%; }
        #instruccion-box img { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; border: 2px solid #1B4F72; }
        #panel-objetos { width: 160px; background: rgba(255,255,255,0.85); border-right: 4px solid #1B4F72; display: flex; flex-direction: column; gap: 15px; padding: 20px; align-items: center; overflow-y: auto; height: calc(100vh - 84px); float: left; }
        .draggable { width: 90px; height: 90px; object-fit: contain; cursor: grab; z-index: 100; }
        #escena-central { margin-left: 164px; height: calc(100vh - 84px); position: relative; display: flex; justify-content: center; align-items: center; }
        #area-cama-detect { position: relative; width: 90%; height: 80%; display: flex; justify-content: center; align-items: center; }
        #cama_base { width: 100%; max-width: 650px; pointer-events: none; }
        .pieza-fija { position: absolute; width: 130px; z-index: 5; pointer-events: none; transform: translate(-50%, -50%); }
        #panel-preguntas { position: absolute; right: 20px; top: 100px; width: 300px; z-index: 500; }
        #cuadro-pregunta { background: #FFD700; border: 5px solid #1B4F72; border-radius: 25px; padding: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none; }
        .btn-p { width: 100%; padding: 12px; margin: 8px 0; font-weight: bold; cursor: pointer; border-radius: 12px; border: none; color: white; font-size: 1.2rem; }
        #overlay-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(27, 79, 114, 0.95); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; }
    </style>
</head>
<body onload="iniciar()">

<div id="cabecera">
    <div id="instruccion-box"><img src="COTERAPEUTA.JPG"><span id="label-guia">Cargando...</span></div>
    <div style="text-align: right;">
        <div id="exito-txt" style="font-size: 1.6rem; font-weight: bold;">Éxito: 100%</div>

    </div>
</div>

            <button class="btn-p" style="background:#E74C3C" onclick="verificarRespuesta('NO')">NO</button>

    <button onclick="location.reload()" style="padding: 15px 30px; font-size: 1.2rem; border-radius: 15px; cursor: pointer; background: #E67E22; color: white; border: none; margin-top: 20px;">Reiniciar</button>
</div>

        "vaso": { img: "vaso.png", nom: "el vaso" },
        "lampara": { img: "lampara.png", nom: "la lámpara" },
        "medias": { img: "medias.png", nom: "las medias" }
    };

    const niveles = {
        1: { nom: "BAJO", pedir: ["sabana_azul", "almohada_blanca"], extra: ["reloj", "revista"], t: 15000 },
        2: { nom: "MEDIO", pedir: ["sabana_blanca", "cobija_termica", "almohada_cafe"], extra: ["control", "vaso", "lampara"], t: 10000 },
        3: { nom: "ALTO", pedir: ["sabana_gris", "cobija_tigre", "sobresabana_negra", "almohada_gris"], extra: ["medias", "reloj", "control", "revista"], t: 7000 }
    };

    const bancoPreguntas = [
        {q: "¿El sol es una estrella?", a: "SÍ"}, {q: "¿Colombia está en América del Sur?", a: "SÍ"},
        {q: "¿El agua hierve a 100 grados Celsius?", a: "SÍ"}, {q: "¿Los perros son mamíferos?", a: "SÍ"},
        {q: "¿La luna tiene luz propia?", a: "NO"}, {q: "¿París es la capital de Francia?", a: "SÍ"},

        {q: "¿Los humanos tienen 4 pulmones?", a: "NO"}, {q: "¿El Amazonas es un río?", a: "SÍ"},
        {q: "¿Los gatos maúllan?", a: "SÍ"}, {q: "¿La electricidad puede ser peligrosa?", a: "SÍ"},
        {q: "¿El hielo es agua en estado sólido?", a: "SÍ"}, {q: "¿Los pájaros vuelan?", a: "SÍ"},
        {q: "¿El corazón bombea sangre?", a: "SÍ"}, {q: "¿La sal es dulce?", a: "NO"},
        {q: "¿El café contiene cafeína?", a: "SÍ"}, {q: "¿El planeta Marte es rojo?", a: "SÍ"},
        {q: "¿Las plantas necesitan luz para crecer?", a: "SÍ"}, {q: "¿El océano es agua salada?", a: "SÍ"},
        {q: "¿El fútbol se juega con las manos?", a: "NO"}, {q: "¿Los elefantes son animales grandes?", a: "SÍ"},
        {q: "¿La nieve es caliente?", a: "NO"}, {q: "¿El fuego quema?", a: "SÍ"},
        {q: "¿La Tierra es plana?", a: "NO"}, {q: "¿Los humanos respiran oxígeno?", a: "SÍ"},
        {q: "¿El oro es un metal precioso?", a: "SÍ"}, {q: "¿El invierno es más frío que el verano?", a: "SÍ"},
        {q: "¿Las abejas producen miel?", a: "SÍ"}, {q: "¿El cuerpo humano tiene huesos?", a: "SÍ"},
        {q: "¿La leche viene de animales?", a: "SÍ"}, {q: "¿El sol sale por el este?", a: "SÍ"},
        {q: "¿La luna es más grande que la Tierra?", a: "NO"}, {q: "¿El azúcar es salado?", a: "NO"},
        {q: "¿Los árboles tienen hojas?", a: "SÍ"}, {q: "¿El aire es invisible?", a: "SÍ"},
        {q: "¿Los tiburones son peces?", a: "SÍ"}, {q: "¿El desierto tiene mucha agua?", a: "NO"},
        {q: "¿La lluvia cae del cielo?", a: "SÍ"}, {q: "¿El hielo flota en el agua?", a: "SÍ"},
        {q: "¿El plomo es ligero?", a: "NO"}, {q: "¿Los humanos necesitan dormir?", a: "SÍ"},
        {q: "¿El vidrio es transparente?", a: "SÍ"}, {q: "¿La electricidad ilumina?", a: "SÍ"},
        {q: "¿Los caballos tienen alas?", a: "NO"}, {q: "¿La Tierra tiene una luna?", a: "SÍ"},
        {q: "¿El pan se hace con harina?", a: "SÍ"}, {q: "¿Los volcanes hacen erupción?", a: "SÍ"},
        {q: "¿El agua es incolora?", a: "SÍ"}, {q: "¿El cuerpo tiene sangre?", a: "SÍ"},

        {q: "¿El cerebro está en la cabeza?", a: "SÍ"}, {q: "¿El mar es dulce?", a: "NO"},

        {q: "¿Las nubes están en el cielo?", a: "SÍ"}, {q: "¿El sonido viaja por el aire?", a: "SÍ"},
        {q: "¿El agua es necesaria?", a: "SÍ"}, {q: "¿Los leones son carnívoros?", a: "SÍ"},
        {q: "¿Venus está más cerca del sol que la Tierra?", a: "SÍ"}, {q: "¿El viento se siente?", a: "SÍ"},
        {q: "¿Las plantas producen oxígeno?", a: "SÍ"}, {q: "¿El azúcar se disuelve?", a: "SÍ"},
        {q: "¿El cuerpo tiene piel?", a: "SÍ"}, {q: "¿Los peces viven en el agua?", a: "SÍ"},
        {q: "¿La sangre es roja?", a: "SÍ"}, {q: "¿El hielo es caliente?", a: "NO"},
        {q: "¿Los humanos viven sin agua?", a: "NO"}, {q: "¿El aire ocupa espacio?", a: "SÍ"},
        {q: "¿Los árboles crecen?", a: "SÍ"}, {q: "¿El fuego es frío?", a: "NO"},
        {q: "¿La Tierra tiene gravedad?", a: "SÍ"}, {q: "¿El café es caliente?", a: "SÍ"},
        {q: "¿Los perros ladran?", a: "SÍ"}, {q: "¿El vidrio se rompe?", a: "SÍ"},
        {q: "¿El cuerpo necesita comida?", a: "SÍ"}, {q: "¿La luz es más rápida que el sonido?", a: "SÍ"},
        {q: "¿El agua moja?", a: "SÍ"}, {q: "¿Los gatos tienen cola?", a: "SÍ"},
        {q: "¿El cielo es azul de día?", a: "SÍ"}, {q: "¿Los humanos tienen cabello?", a: "SÍ"},
        {q: "¿El hielo es más denso que el agua?", a: "NO"}, {q: "¿Se puede ver sin ojos?", a: "NO"},
        {q: "¿El sol da calor?", a: "SÍ"}, {q: "¿Los árboles necesitan agua?", a: "SÍ"},
        {q: "¿Júpiter es grande?", a: "SÍ"}, {q: "¿La sal se disuelve?", a: "SÍ"},
        {q: "¿El cuerpo tiene músculos?", a: "SÍ"}, {q: "¿El fuego da luz?", a: "SÍ"},
        {q: "¿Las montañas son altas?", a: "SÍ"}, {q: "¿El aire siempre huele?", a: "NO"},
        {q: "¿Los humanos nadan?", a: "SÍ"}, {q: "¿La luna tiene fases?", a: "SÍ"},
        {q: "¿El agua se evapora?", a: "SÍ"}, {q: "¿El corazón late?", a: "SÍ"}
    ];

    function hablar(t) {
        window.speechSynthesis.cancel();
        document.getElementById('label-guia').innerText = t;
        const msg = new SpeechSynthesisUtterance(t); msg.lang = 'es-ES';
        window.speechSynthesis.speak(msg);
    }

    function iniciar() {
        new Audio('img10/pajaros.mp3').play().catch(()=>{});
        cargarFase();
        setInterval(lanzarPregunta, 12000); 
    }

    function cargarFase() {
        const c = niveles[nivel];
        document.getElementById('panel-objetos').innerHTML = "";
        document.getElementById('contenedor-piezas').innerHTML = "";
        document.getElementById('nivel-txt').innerText = `NIVEL: ${c.nom}`;
        paso = 0; bloqueado = false;
        let items = [...c.pedir, ...c.extra].sort(() => Math.random() - 0.5);
        items.forEach(id => {
            const img = document.createElement('img');
            img.src = `img10/${db[id].img}`;
            img.className = 'draggable';
            img.dataset.id = id;
            img.onmousedown = img.ontouchstart = drag;
            document.getElementById('panel-objetos').appendChild(img);
        });
        hablar(`Juan, pon ${db[c.pedir[0]].nom} en la cama.`);
    }

    function drag(e) {
        if(bloqueado) return;
        const el = e.target;
        const t = e.type.includes('touch') ? e.touches[0] : e;
        let sx = t.clientX - el.getBoundingClientRect().left;
        let sy = t.clientY - el.getBoundingClientRect().top;
        el.style.position = 'fixed'; el.style.zIndex = 1000;

        function mover(me) {
            const mt = me.type.includes('touch') ? me.touches[0] : me;
            el.style.left = (mt.clientX - sx) + 'px'; el.style.top = (mt.clientY - sy) + 'px';
        }

        function soltar(se) {
            document.removeEventListener('mousemove', mover); document.removeEventListener('mouseup', soltar);
            document.removeEventListener('touchmove', mover); document.removeEventListener('touchend', soltar);
            const st = se.type.includes('touch') ? se.changedTouches[0] : se;
            const cama = document.getElementById('area-cama-detect').getBoundingClientRect();
            const enCama = (st.clientX > (cama.left + 50));
            const objId = niveles[nivel].pedir[paso];

            if (enCama && el.dataset.id === objId) {
                sfxOk.play(); aciertos++;
                const fija = document.createElement('img');
                fija.src = el.src; fija.className = 'pieza-fija';
                fija.style.left = (st.clientX - cama.left) + 'px';
                fija.style.top = (st.clientY - cama.top) + 'px';
                document.getElementById('contenedor-piezas').appendChild(fija);
                el.style.display = 'none';
                paso++;
                if (paso < niveles[nivel].pedir.length) {
                    hablar(`¡Bien! Ahora busca ${db[niveles[nivel].pedir[paso]].nom}`);
                } else {
                    bloqueado = true;
                    setTimeout(() => { if(nivel < 3){ nivel++; cargarFase(); } else { finalizar(); }}, 2000);
                }
            } else if (enCama) {
                sfxErr.play(); errores++; hablar(`No, busca ${db[objId].nom}`);
                el.style.position = 'static';
            } else { el.style.position = 'static'; }
            actualizarStats();
        }
        document.addEventListener('mousemove', mover); document.addEventListener('mouseup', soltar);
        document.addEventListener('touchmove', mover, {passive:false}); document.addEventListener('touchend', soltar);
    }

    function lanzarPregunta() {
        if(bloqueado || document.getElementById('cuadro-pregunta').style.display === 'block') return;
        const p = bancoPreguntas[Math.floor(Math.random()*bancoPreguntas.length)];
        document.getElementById('pregunta-texto').innerText = p.q;
        document.getElementById('cuadro-pregunta').dataset.ans = p.a;
        document.getElementById('cuadro-pregunta').style.display = 'block';
        hablar(p.q);
    }

    function verificarRespuesta(v) {
        if(v === document.getElementById('cuadro-pregunta').dataset.ans) { sfxOk.play(); aciertos++; } 
        else { sfxErr.play(); errores++; }
        document.getElementById('cuadro-pregunta').style.display = 'none';
        actualizarStats();
    }

    function actualizarStats() {
        let t = aciertos + errores;
        document.getElementById('exito-txt').innerText = `Éxito: ${t === 0 ? 100 : Math.round((aciertos/t)*100)}%`;
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        document.getElementById('resumen-final').innerText = `Excelente Juan, lograste mantenerte atento en más de una tarea al mismo tiempo. Lograste un ${document.getElementById('exito-txt').innerText} de precisión.`;
        hablar("Excelente Juan, lograste mantenerte atento en más de una tarea al mismo tiempo.");
    }
</script>
</body>
</html>

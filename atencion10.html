<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 10 - Juan: ATENCIÓN EXTREMA</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; overflow: hidden; touch-action: none; background: url('img10/fondo_habitacion.png') no-repeat center center fixed; background-size: cover; height: 100vh; }
        #cabecera { background: rgba(27, 79, 114, 0.95); color: white; height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 4px solid #E67E22; z-index: 1000; position: relative; }
        #instruccion-box { background: white; padding: 10px 25px; border-radius: 30px; color: #1B4F72; display: flex; align-items: center; border: 3px solid #1B4F72; font-weight: bold; max-width: 65%; }
        #instruccion-box img { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; border: 2px solid #1B4F72; }
        #panel-objetos { width: 170px; background: rgba(255,255,255,0.85); border-right: 4px solid #1B4F72; display: flex; flex-direction: column; gap: 10px; padding: 15px; align-items: center; overflow-y: auto; height: calc(100vh - 84px); float: left; }
        .draggable { width: 85px; height: 85px; object-fit: contain; cursor: grab; z-index: 100; transition: transform 0.1s; }
        #escena-central { margin-left: 174px; height: calc(100vh - 84px); position: relative; display: flex; justify-content: center; align-items: center; }
        #area-cama-detect { position: relative; width: 90%; height: 85%; display: flex; justify-content: center; align-items: center; }
        #cama_base { width: 100%; max-width: 600px; pointer-events: none; }
        .pieza-fija { position: absolute; width: 140px; z-index: 5; pointer-events: none; transform: translate(-50%, -50%); }
        #panel-preguntas { position: absolute; right: 20px; top: 80px; width: 320px; z-index: 500; }
        #cuadro-pregunta { background: #FFD700; border: 6px solid #1B4F72; border-radius: 25px; padding: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); display: none; }
        .btn-p { width: 100%; padding: 15px; margin: 8px 0; font-weight: bold; cursor: pointer; border-radius: 15px; border: none; color: white; font-size: 1.4rem; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        #overlay-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(27, 79, 114, 0.98); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; }
    </style>
</head>
<body onload="iniciar()">

<div id="cabecera">
    <div id="instruccion-box"><img src="COTERAPEUTA.JPG"><span id="label-guia">Cargando sesión...</span></div>
    <div style="text-align: right;">
        <div id="exito-txt" style="font-size: 1.6rem; font-weight: bold;">Éxito: 100%</div>
        <div id="nivel-txt" style="color: #FFD700; font-weight: bold; font-size: 1.2rem;">NIVEL: BAJO</div>
    </div>
</div>

<div id="panel-objetos"></div>

<div id="escena-central">
    <div id="area-cama-detect">
        <img src="img10/cama_destendida.png" id="cama_base">
        <div id="contenedor-piezas"></div>
    </div>
    <div id="panel-preguntas">
        <div id="cuadro-pregunta">
            <p id="pregunta-texto" style="font-size: 1.4rem; font-weight: bold; color:#1B4F72; line-height: 1.2;"></p>
            <button class="btn-p" style="background:#2ECC71" onclick="verificarRespuesta('SÍ')">SÍ</button>
            <button class="btn-p" style="background:#E74C3C" onclick="verificarRespuesta('NO')">NO</button>
        </div>
    </div>
</div>

<div id="overlay-final">
    <h1 style="font-size: 4rem; color: #FFD700; margin-bottom: 10px;">¡INCREÍBLE TRABAJO!</h1>
    <p id="resumen-final" style="font-size: 1.8rem; max-width: 800px; font-weight: 300;"></p>
    <button onclick="location.reload()" style="padding: 20px 50px; font-size: 1.5rem; border-radius: 20px; cursor: pointer; background: #E67E22; color: white; border: none; margin-top: 30px; font-weight: bold;">REPETIR DESAFÍO</button>
</div>

<script>
    let nivel = 1, paso = 0, aciertos = 0, errores = 0, bloqueado = false;
    const sfxOk = new Audio('img8/exito.mp3'); const sfxErr = new Audio('img8/alarma.mp3');

    const db = {
        "almohada_blanca": { img: "almohada_blanca.png", nom: "la almohada blanca" },
        "almohada_cafe": { img: "almohada_cafe.png", nom: "la almohada café" },

        "cobija_tigre": { img: "cobija_tigre.png", nom: "la cobija de tigre" },
        "sabana_azul": { img: "sabana_azul.png", nom: "la sábana azul" },
        "sabana_blanca": { img: "sabana_blanca.png", nom: "la sábana blanca" },
        "sabana_gris": { img: "sabana_gris.png", nom: "la sábana gris" },
        "sobresabana_gris": { img: "sobresabana_gris.png", nom: "la sobresábana gris" },
        "sobresabana_morada": { img: "sobresabana_morada.png", nom: "la sobresábana morada" },
        "sobresabana_negra": { img: "sobresabana_negra.png", nom: "la sobresábana negra" },
        "control": { img: "control.png", nom: "el control" },
        "reloj": { img: "reloj.png", nom: "el reloj" },
        "revista": { img: "revista.png", nom: "la revista" },
        "vaso": { img: "vaso.png", nom: "el vaso" },
        "lampara": { img: "lampara.png", nom: "la lámpara" },
        "medias": { img: "medias.png", nom: "las medias" }
    };

    const niveles = {
        1: { nom: "BAJO", pedir: ["sabana_azul", "almohada_blanca"], extra: ["reloj"], t: 10000, rate: 1.0 },
        2: { nom: "MEDIO", pedir: ["sabana_blanca", "cobija_termica", "almohada_cafe"], extra: ["control", "vaso"], t: 7000, rate: 1.1 },
        3: { nom: "EXTREMO", pedir: ["sabana_gris", "sobresabana_gris", "sobresabana_negra", "cobija_tigre", "almohada_gris", "almohada_cafe"], extra: ["medias", "reloj", "control", "revista", "vaso", "lampara", "almohada_blanca"], t: 3500, rate: 1.2 }
    };

    // BANCO COMPLETO DE PREGUNTAS (100)
    const bancoPreguntas = [
        {q: "¿El sol es una estrella?", a: "SÍ"}, {q: "¿Colombia está en América?", a: "SÍ"},
        {q: "¿El agua hierve a 100 grados?", a: "SÍ"}, {q: "¿Los perros son mamíferos?", a: "SÍ"},
        {q: "¿La luna tiene luz propia?", a: "NO"}, {q: "¿París es capital de Francia?", a: "SÍ"},
        {q: "¿El hierro es un metal?", a: "SÍ"}, {q: "¿Peces respiran aire?", a: "NO"},
        {q: "¿Tierra gira alrededor del sol?", a: "SÍ"}, {q: "¿El chocolate viene del cacao?", a: "SÍ"},
        {q: "¿Humanos tienen 4 pulmones?", a: "NO"}, {q: "¿El Amazonas es un río?", a: "SÍ"},
        {q: "¿Los gatos maúllan?", a: "SÍ"}, {q: "¿Electricidad es peligrosa?", a: "SÍ"},
        {q: "¿El hielo es agua sólida?", a: "SÍ"}, {q: "¿Los pájaros vuelan?", a: "SÍ"},
        {q: "¿Corazón bombea sangre?", a: "SÍ"}, {q: "¿La sal es dulce?", a: "NO"},
        {q: "¿Café tiene cafeína?", a: "SÍ"}, {q: "¿Marte es rojo?", a: "SÍ"},
        {q: "¿Plantas necesitan luz?", a: "SÍ"}, {q: "¿Océano es agua salada?", a: "SÍ"},
        {q: "¿Fútbol se juega con manos?", a: "NO"}, {q: "¿Elefantes son grandes?", a: "SÍ"},
        {q: "¿La nieve es caliente?", a: "NO"}, {q: "¿El fuego quema?", a: "SÍ"},
        {q: "¿La Tierra es plana?", a: "NO"}, {q: "¿Respiramos oxígeno?", a: "SÍ"},
        {q: "¿Oro es metal precioso?", a: "SÍ"}, {q: "¿Invierno es frío?", a: "SÍ"},
        {q: "¿Abejas hacen miel?", a: "SÍ"}, {q: "¿Tenemos huesos?", a: "SÍ"},
        {q: "¿Leche viene de animales?", a: "SÍ"}, {q: "¿Sol sale por el este?", a: "SÍ"},
        {q: "¿Luna es mayor que Tierra?", a: "NO"}, {q: "¿Azúcar es salado?", a: "NO"},
        {q: "¿Árboles tienen hojas?", a: "SÍ"}, {q: "¿Aire es invisible?", a: "SÍ"},
        {q: "¿Tiburones son peces?", a: "SÍ"}, {q: "¿Desierto tiene mucha agua?", a: "NO"},
        {q: "¿Lluvia cae del cielo?", a: "SÍ"}, {q: "¿Hielo flota?", a: "SÍ"},
        {q: "¿Plomo es ligero?", a: "NO"}, {q: "¿Necesitamos dormir?", a: "SÍ"},
        {q: "¿Vidrio es transparente?", a: "SÍ"}, {q: "¿Luz es rápida?", a: "SÍ"},
        {q: "¿Caballos tienen alas?", a: "NO"}, {q: "¿Tierra tiene una luna?", a: "SÍ"},
        {q: "¿Pan se hace con harina?", a: "SÍ"}, {q: "¿Volcanes hacen erupción?", a: "SÍ"},
        {q: "¿Agua es incolora?", a: "SÍ"}, {q: "¿Tenemos sangre?", a: "SÍ"},
        {q: "¿Estrellas se ven de día?", a: "NO"}, {q: "¿Fuego necesita aire?", a: "SÍ"},
        {q: "¿Murciélagos vuelan?", a: "SÍ"}, {q: "¿Arroz crece en plantas?", a: "SÍ"},
        {q: "¿Cerebro está en la cabeza?", a: "SÍ"}, {q: "¿Mar es dulce?", a: "NO"},
        {q: "¿Tenemos dos ojos?", a: "SÍ"}, {q: "¿Hielo se derrite?", a: "SÍ"},
        {q: "¿Nubes están en el cielo?", a: "SÍ"}, {q: "¿Sonido viaja por aire?", a: "SÍ"},
        {q: "¿Agua es vital?", a: "SÍ"}, {q: "¿Leones comen carne?", a: "SÍ"},
        {q: "¿Venus es caliente?", a: "SÍ"}, {q: "¿Viento se siente?", a: "SÍ"},
        {q: "¿Plantas dan oxígeno?", a: "SÍ"}, {q: "¿Azúcar se disuelve?", a: "SÍ"},
        {q: "¿Tenemos piel?", a: "SÍ"}, {q: "¿Peces viven en agua?", a: "SÍ"},
        {q: "¿Sangre es roja?", a: "SÍ"}, {q: "¿Hielo es caliente?", a: "NO"},
        {q: "¿Vivimos sin agua?", a: "NO"}, {q: "¿Aire ocupa espacio?", a: "SÍ"},
        {q: "¿Árboles crecen?", a: "SÍ"}, {q: "¿Fuego es frío?", a: "NO"},
        {q: "¿Hay gravedad?", a: "SÍ"}, {q: "¿Café es bebida?", a: "SÍ"},
        {q: "¿Perros ladran?", a: "SÍ"}, {q: "¿Vidrio se rompe?", a: "SÍ"},
        {q: "¿Comer es necesario?", a: "SÍ"}, {q: "¿Luz vence al sonido?", a: "SÍ"},
        {q: "¿Agua moja?", a: "SÍ"}, {q: "¿Gatos tienen cola?", a: "SÍ"},
        {q: "¿Cielo es azul?", a: "SÍ"}, {q: "¿Tenemos pelo?", a: "SÍ"},
        {q: "¿Hielo es más denso que agua?", a: "NO"}, {q: "¿Vemos sin ojos?", a: "NO"},
        {q: "¿Sol calienta?", a: "SÍ"}, {q: "¿Árboles beben agua?", a: "SÍ"},
        {q: "¿Júpiter es gigante?", a: "SÍ"}, {q: "¿Sal se disuelve?", a: "SÍ"},
        {q: "¿Tenemos músculos?", a: "SÍ"}, {q: "¿Fuego ilumina?", a: "SÍ"},
        {q: "¿Montañas son altas?", a: "SÍ"}, {q: "¿Aire siempre huele?", a: "NO"},
        {q: "¿Humanos nadan?", a: "SÍ"}, {q: "¿Luna tiene fases?", a: "SÍ"},
        {q: "¿Agua se evapora?", a: "SÍ"}, {q: "¿El corazón late?", a: "SÍ"}
    ];

    function hablar(t) {
        window.speechSynthesis.cancel();
        document.getElementById('label-guia').innerText = t;
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        msg.rate = niveles[nivel].rate; // Aumenta velocidad según nivel
        window.speechSynthesis.speak(msg);
    }

    let loopPreguntas;
    function iniciar() {
        new Audio('img10/pajaros.mp3').play().catch(()=>{});
        cargarFase();
    }

    function cargarFase() {
        if(loopPreguntas) clearInterval(loopPreguntas);
        const c = niveles[nivel];
        document.getElementById('panel-objetos').innerHTML = "";
        document.getElementById('contenedor-piezas').innerHTML = "";
        document.getElementById('nivel-txt').innerText = `NIVEL: ${c.nom}`;
        paso = 0; bloqueado = false;
        
        let items = [...c.pedir, ...c.extra].sort(() => Math.random() - 0.5);
        items.forEach(id => {
            const img = document.createElement('img');
            img.src = `img10/${db[id].img}`;
            img.className = 'draggable';
            img.dataset.id = id;
            img.onmousedown = img.ontouchstart = drag;
            document.getElementById('panel-objetos').appendChild(img);
        });
        
        hablar(`Juan, atención. Pon ${db[c.pedir[0]].nom}.`);
        loopPreguntas = setInterval(lanzarPregunta, c.t); 
    }

    function drag(e) {
        if(bloqueado) return;
        const el = e.target;
        const t = e.type.includes('touch') ? e.touches[0] : e;
        let sx = t.clientX - el.getBoundingClientRect().left;
        let sy = t.clientY - el.getBoundingClientRect().top;
        el.style.position = 'fixed'; el.style.zIndex = 1000;
        el.style.transform = "scale(1.2)";

        function mover(me) {
            const mt = me.type.includes('touch') ? me.touches[0] : me;
            el.style.left = (mt.clientX - sx) + 'px'; el.style.top = (mt.clientY - sy) + 'px';
        }

        function soltar(se) {
            el.style.transform = "scale(1)";
            document.removeEventListener('mousemove', mover); document.removeEventListener('mouseup', soltar);
            document.removeEventListener('touchmove', mover); document.removeEventListener('touchend', soltar);
            
            const st = se.type.includes('touch') ? se.changedTouches[0] : se;
            const cama = document.getElementById('area-cama-detect').getBoundingClientRect();
            const enCama = (st.clientX > (cama.left + 30));
            const objId = niveles[nivel].pedir[paso];

            if (enCama && el.dataset.id === objId) {
                sfxOk.play(); aciertos++;
                const fija = document.createElement('img');
                fija.src = el.src; fija.className = 'pieza-fija';
                fija.style.left = (st.clientX - cama.left) + 'px';
                fija.style.top = (st.clientY - cama.top) + 'px';
                document.getElementById('contenedor-piezas').appendChild(fija);
                el.style.display = 'none';
                paso++;
                if (paso < niveles[nivel].pedir.length) {
                    hablar(`¡Bien! Ahora ${db[niveles[nivel].pedir[paso]].nom}`);
                } else {
                    bloqueado = true;
                    setTimeout(() => { 
                        if(nivel < 3){ nivel++; cargarFase(); } 
                        else { finalizar(); }
                    }, 2000);
                }
            } else if (enCama) {
                sfxErr.play(); errores++;
                hablar(`¡No! Concentración Juan. Busca ${db[objId].nom}`);
                el.style.position = 'static';
            } else { el.style.position = 'static'; }
            actualizarStats();
        }
        document.addEventListener('mousemove', mover); document.addEventListener('mouseup', soltar);
        document.addEventListener('touchmove', mover, {passive:false}); document.addEventListener('touchend', soltar);
    }

    function lanzarPregunta() {
        if(bloqueado || document.getElementById('cuadro-pregunta').style.display === 'block') return;
        const p = bancoPreguntas[Math.floor(Math.random()*bancoPreguntas.length)];
        document.getElementById('pregunta-texto').innerText = p.q;
        document.getElementById('cuadro-pregunta').dataset.ans = p.a;
        document.getElementById('cuadro-pregunta').style.display = 'block';
        hablar(p.q);
    }

    function verificarRespuesta(v) {
        if(v === document.getElementById('cuadro-pregunta').dataset.ans) { sfxOk.play(); aciertos++; } 
        else { sfxErr.play(); errores++; }
        document.getElementById('cuadro-pregunta').style.display = 'none';
        actualizarStats();
    }

    function actualizarStats() {
        let t = aciertos + errores;
        document.getElementById('exito-txt').innerText = `Éxito: ${t === 0 ? 100 : Math.round((aciertos/t)*100)}%`;
    }

    function finalizar() {
        if(loopPreguntas) clearInterval(loopPreguntas);
        document.getElementById('overlay-final').style.display = 'flex';
        document.getElementById('resumen-final').innerText = `Juan, has demostrado una capacidad de atención dividida excepcional. Completaste el nivel EXTREMO con un ${document.getElementById('exito-txt').innerText} de precisión bajo presión constante.`;
        hablar("Excelente, lograste mantenerte atento en más de una tarea al mismo tiempo.");
    }
</script>
</body>
</html>

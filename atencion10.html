<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 10 - Juan</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; touch-action: none; background: url('img10/fondo_habitacion.png') no-repeat center center fixed; background-size: cover; height: 100vh; }
        #cabecera { background: rgba(27, 79, 114, 0.9); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 5px solid #E67E22; }
        #instruccion-box { background: white; padding: 10px 20px; border-radius: 20px; color: #1B4F72; display: flex; align-items: center; border: 3px solid #1B4F72; font-weight: bold; font-size: 1.1rem; }
        #panel-objetos { position: absolute; left: 20px; top: 120px; width: 150px; background: rgba(255,255,255,0.85); border: 4px solid #1B4F72; border-radius: 20px; display: flex; flex-direction: column; gap: 20px; padding: 20px; align-items: center; z-index: 10; }
        .draggable { width: 90px; height: 90px; object-fit: contain; cursor: grab; z-index: 20; }
        #area-cama { position: absolute; left: 200px; top: 100px; width: calc(100% - 250px); height: calc(100% - 150px); pointer-events: none; border: 2px dashed transparent; }
        #cama_base { width: 80%; max-width: 550px; display: block; margin: 80px auto; pointer-events: auto; }
        .pieza-fija { position: absolute; width: 130px; z-index: 5; pointer-events: none; }
        #cuadro-pregunta { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 350px; background: #FFD700; border: 6px solid #1B4F72; border-radius: 25px; padding: 25px; text-align: center; z-index: 2000; }
        .btn-p { padding: 12px 30px; margin: 10px; font-weight: bold; cursor: pointer; border-radius: 12px; border: none; color: white; font-size: 1.3rem; }
        #exito-txt { font-size: 1.5rem; font-weight: bold; margin-right: 20px; }
    </style>
</head>
<body onload="iniciar()">

<div id="cabecera">
    <div id="instruccion-box">
        <img src="COTERAPEUTA.JPG" style="width:50px; height:50px; border-radius:50%; margin-right:15px; border: 2px solid #1B4F72;">
        <span id="label-guia">Iniciando...</span>
    </div>
    <div id="exito-txt">Éxito: 100%</div>
</div>

<div id="panel-objetos"></div>

<div id="area-cama">
    <img src="img10/cama_destendida.png" id="cama_base">
</div>

<div id="cuadro-pregunta">
    <p id="pregunta-texto" style="font-size: 1.4rem; font-weight: bold; color:#1B4F72;"></p>
    <button class="btn-p" style="background:#2ECC71" onclick="verificarRespuesta('SÍ')">SÍ</button>
    <button class="btn-p" style="background:#E74C3C" onclick="responderNo()">NO</button>
</div>

<script>
    let nivel = 1, paso = 0, aciertos = 0, errores = 0, bloqueado = false;
    const sfxOk = new Audio('img8/exito.mp3'); 
    const sfxErr = new Audio('img8/alarma.mp3');
    const ambientes = [new Audio('img10/conversacion.mp3'), new Audio('img10/pajaros.mp3')];

    const database = {
        "sabana_azul": { img: "sabana_azul.png", nombre: "la sábana azul" },
        "almohada_blanca": { img: "almohada_blanca.png", nombre: "la almohada blanca" },
        "cobija_termica": { img: "cobija_termica.png", nombre: "la cobija térmica" },
        "almohada_gris": { img: "almohada_gris.png", nombre: "la almohada gris" },
        "sabana_blanca": { img: "sabana_blanca.png", nombre: "la sábana blanca" },
        "reloj": { img: "reloj.png", nombre: "el reloj" },
        "control": { img: "control.png", nombre: "el control" }
    };

    const fases = {
        1: { pedir: ["sabana_azul", "almohada_blanca"], mostrar: ["sabana_azul", "almohada_blanca", "control"] },
        2: { pedir: ["cobija_termica"], mostrar: ["cobija_termica", "reloj"] },
        3: { pedir: ["almohada_gris", "sabana_blanca"], mostrar: ["almohada_gris", "sabana_blanca", "reloj", "control"] }
    };

    const bancoPreguntas = [{q: "¿El sol brilla?", a: "SÍ"}, {q: "¿El agua es seca?", a: "NO"}];

    function hablar(texto) {
        window.speechSynthesis.cancel();
        document.getElementById('label-guia').innerText = texto;
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = 'es-ES';
        window.speechSynthesis.speak(msg);
    }

    function iniciar() {
        ambientes.forEach(a => { a.loop = true; a.volume = 0.1; a.play().catch(() => {}); });
        cargarNivel();
        setInterval(mostrarPregunta, 12000);
    }

    function cargarNivel() {
        const panel = document.getElementById('panel-objetos');
        panel.innerHTML = ""; 
        paso = 0; bloqueado = false;
        
        const config = fases[nivel];
        config.mostrar.sort(() => Math.random() - 0.5).forEach(id => {
            const img = document.createElement('img');
            img.src = `img10/${database[id].img}`;
            img.className = 'draggable';
            img.dataset.id = id;
            img.onmousedown = img.ontouchstart = alEmpezarArrastre;
            panel.appendChild(img);
        });
        hablar("Juan, pon " + database[config.pedir[0]].nombre + " en la cama.");
    }

    function alEmpezarArrastre(e) {
        if(bloqueado) return;
        const el = e.target;
        const t = e.type.includes('touch') ? e.touches[0] : e;
        let shiftX = t.clientX - el.getBoundingClientRect().left;
        let shiftY = t.clientY - el.getBoundingClientRect().top;

        el.style.position = 'fixed';
        el.style.zIndex = 1000;

        function mover(me) {
            const mt = me.type.includes('touch') ? me.touches[0] : me;
            el.style.left = (mt.clientX - shiftX) + 'px';
            el.style.top = (mt.clientY - shiftY) + 'px';
        }

        function soltar(se) {
            document.removeEventListener('mousemove', mover);
            document.removeEventListener('mouseup', soltar);
            document.removeEventListener('touchmove', mover);
            document.removeEventListener('touchend', soltar);

            const st = se.type.includes('touch') ? se.changedTouches[0] : se;
            const camaRect = document.getElementById('cama_base').getBoundingClientRect();
            
            // Ampliamos un poco el rango de detección para evitar falsos errores
            const enCama = (st.clientX > (camaRect.left - 20) && st.clientX < (camaRect.right + 20) && 
                            st.clientY > (camaRect.top - 20) && st.clientY < (camaRect.bottom + 20));
            
            const objetivo = fases[nivel].pedir[paso];

            if (enCama) {
                if (el.dataset.id === objetivo) {
                    sfxOk.play(); aciertos++;
                    const fija = document.createElement('img');
                    fija.src = el.src;
                    fija.className = 'pieza-fija';
                    fija.style.left = (st.clientX - 65) + 'px';
                    fija.style.top = (st.clientY - 65) + 'px';
                    document.getElementById('area-cama').appendChild(fija);
                    el.style.display = 'none';
                    paso++;
                    
                    if (paso < fases[nivel].pedir.length) {
                        hablar("¡Muy bien! Ahora pon " + database[fases[nivel].pedir[paso]].nombre);
                    } else {
                        bloqueado = true;
                        if(nivel < 3) {
                            hablar("¡Excelente! Nivel " + nivel + " terminado.");
                            setTimeout(() => { nivel++; cargarNivel(); }, 2000);
                        } else {
                            hablar("¡Felicidades Juan! Has terminado de organizar la habitación.");
                        }
                    }
                } else {
                    sfxErr.play(); errores++;
                    hablar("Esa no es Juan. Pon " + database[objetivo].nombre);
                    el.style.position = 'static';
                }
            } else {
                el.style.position = 'static';
            }
            actualizarMarcador();
        }

        document.addEventListener('mousemove', mover);
        document.addEventListener('mouseup', soltar);
        document.addEventListener('touchmove', mover, {passive: false});
        document.addEventListener('touchend', soltar);
    }

    function actualizarMarcador() {
        let total = aciertos + errores;
        let p = total === 0 ? 100 : Math.round((aciertos / total) * 100);
        document.getElementById('exito-txt').innerText = `Éxito: ${p}%`;
    }

    function mostrarPregunta() {
        if(document.getElementById('cuadro-pregunta').style.display === 'block' || bloqueado) return;
        const p = bancoPreguntas[Math.floor(Math.random()*bancoPreguntas.length)];
        document.getElementById('pregunta-texto').innerText = p.q;
        document.getElementById('cuadro-pregunta').dataset.respuesta = p.a;
        document.getElementById('cuadro-pregunta').style.display = 'block';
        hablar(p.q);
    }

    function verificarRespuesta(valor) {
        const correcta = document.getElementById('cuadro-pregunta').dataset.respuesta;
        document.getElementById('cuadro-pregunta').style.display = 'none';
        if(valor === correcta) { sfxOk.play(); aciertos++; hablar("¡Correcto!"); }
        else { sfxErr.play(); errores++; hablar("No, Juan."); }
        actualizarMarcador();
    }
    
    function responderNo() { verificarRespuesta('NO'); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sesión 10 FINAL - Juan - REHABILIDIA</title>
    <style>
        :root { --p-blue: #1B4F72; --accent: #E67E22; --gold: #FFD700; --bg-light: rgba(255,255,255,0.9); }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; background: #2c3e50 url('img10/fondo_habitacion.png') no-repeat center center fixed; background-size: cover; height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        #cabecera { background: rgba(27, 79, 114, 0.95); color: white; height: 12vh; display: flex; align-items: center; justify-content: space-between; padding: 0 2vw; border-bottom: 4px solid var(--accent); z-index: 1000; box-sizing: border-box; }
        #instruccion-box { background: white; padding: 5px 20px; border-radius: 40px; color: var(--p-blue); display: flex; align-items: center; border: 3px solid var(--p-blue); font-weight: bold; max-width: 70%; font-size: clamp(0.9rem, 1.5vw, 1.3rem); }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }
        #contenedor-principal { display: flex; flex-grow: 1; height: 88vh; overflow: hidden; }
        #panel-objetos { width: 18%; background: var(--bg-light); border-right: 4px solid var(--p-blue); display: flex; flex-direction: column; gap: 1vh; padding: 1vh; align-items: center; overflow-y: auto; box-sizing: border-box; }
        .draggable { width: 80%; max-width: 110px; aspect-ratio: 1/1; object-fit: contain; cursor: grab; transition: transform 0.2s; touch-action: none; }
        #escena-central { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #area-cama-detect { position: relative; width: 90%; height: 90%; display: flex; justify-content: center; align-items: center; }
        #cama_base { width: 100%; max-width: 700px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); pointer-events: none; }
        .pieza-fija { position: absolute; width: 30%; max-width: 200px; z-index: 5; pointer-events: none; transform: translate(-50%, -50%); animation: pop 0.3s ease-out; }
        @keyframes pop { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        #cuadro-pregunta { position: absolute; right: 2%; top: 5%; width: 25vw; min-width: 260px; background: var(--gold); border: 6px solid var(--p-blue); border-radius: 25px; padding: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: none; z-index: 2000; }
        .btn-p { width: 100%; padding: 12px; margin: 8px 0; font-weight: bold; cursor: pointer; border-radius: 15px; border: 3px solid rgba(0,0,0,0.1); color: white; font-size: 1.2rem; }
        #overlay-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(27, 79, 114, 0.98); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .card-resultados { background: white; color: var(--p-blue); padding: 40px; border-radius: 30px; border: 8px solid var(--gold); max-width: 500px; width: 90%; }
    </style>
</head>
<body onload="iniciar()">

<div id="cabecera">
    <div id="instruccion-box"><img src="COTERAPEUTA.JPG"><span id="label-guia">Cargando ambiente...</span></div>
    <div id="exito-txt" style="font-size: 1.4rem; font-weight: bold;">Eficacia: 100%</div>
</div>

<div id="contenedor-principal">
    <div id="panel-objetos"></div>
    <div id="escena-central">
        <div id="area-cama-detect">
            <img src="img10/cama_destendida.png" id="cama_base">
            <div id="contenedor-piezas"></div>
        </div>
        <div id="cuadro-pregunta">
            <p id="pregunta-texto" style="font-size: 1.3rem; font-weight: bold; color:#1B4F72; margin-bottom: 15px;"></p>
            <button class="btn-p" style="background:#2ECC71" onpointerdown="verificarRespuesta('SÍ')">SÍ</button>
            <button class="btn-p" style="background:#E74C3C" onpointerdown="verificarRespuesta('NO')">NO</button>
        </div>
    </div>
</div>

<div id="overlay-final">
    <div class="card-resultados">
        <h1>¡SESIÓN COMPLETADA!</h1>
        <div id="stats-container" style="font-size: 1.5rem; margin-bottom: 30px; text-align: left;"></div>
        <button onclick="window.location.href='index.html'" style="padding: 15px 40px; font-size: 1.3rem; border-radius: 50px; background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; width: 100%;">IR AL INICIO</button>
    </div>
</div>

<script>
    let nivel = 1, paso = 0, aciertos = 0, errores = 0, bloqueado = false;
    let preguntasDisponibles = [];
    const sfxOk = new Audio('img8/exito.mp3'); 
    const sfxErr = new Audio('img8/alarma.mp3');
    const sfxFondo = new Audio('img10/pajaros.mp3');
    sfxFondo.loop = true;

    const db = {
        "sabana_azul": { img: "sabana_azul.png", nom: "la sábana azul" },
        "almohada_blanca": { img: "almohada_blanca.png", nom: "la almohada blanca" },
        "sabana_blanca": { img: "sabana_blanca.png", nom: "la sábana blanca" },
        "sobresabana_negra": { img: "sobresabana_negra.png", nom: "la sobresábana negra" },
        "cobija_termica": { img: "cobija_termica.png", nom: "la cobija térmica" },
        "almohada_cafe": { img: "almohada_cafe.png", nom: "la almohada café" },
        "sabana_gris": { img: "sabana_gris.png", nom: "la sábana gris" },
        "sobresabana_morada": { img: "sobresabana_morada.png", nom: "la sobresábana morada" },
        "cobija_tigre": { img: "cobija_tigre.png", nom: "la cobija de tigre" },
        "almohada_gris": { img: "almohada_gris.png", nom: "la almohada gris" },
        "reloj": { img: "reloj.png", nom: "el reloj" },
        "vaso": { img: "vaso.png", nom: "el vaso" },
        "revista": { img: "revista.png", nom: "la revista" },
        "control": { img: "control.png", nom: "el control" }
    };

    const niveles = {
        1: { pedir: ["sabana_azul", "almohada_blanca"], extra: ["reloj", "vaso"], t: 9000 },
        2: { pedir: ["sabana_blanca", "sobresabana_negra", "cobija_termica", "almohada_cafe"], extra: ["control", "reloj", "revista"], t: 7500 },
        3: { pedir: ["sabana_gris", "sobresabana_negra", "sobresabana_morada", "cobija_tigre", "almohada_gris", "almohada_cafe"], extra: ["control", "revista", "vaso", "reloj"], t: 6000 }
    };

    const bancoPreguntas = [
        {q: "¿La Tierra es redonda?", a: "SÍ"}, {q: "¿El fuego es frío?", a: "NO"}, {q: "¿Los perros ladran?", a: "SÍ"},
        {q: "¿El azúcar es salado?", a: "NO"}, {q: "¿El sol sale de noche?", a: "NO"}, {q: "¿El agua moja?", a: "SÍ"}
    ];

    function hablar(t) {
        window.speechSynthesis.cancel(); 
        document.getElementById('label-guia').innerText = t;
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        window.speechSynthesis.speak(msg);
    }

    let loopPreguntas;
    function iniciar() { 
        sfxFondo.play().catch(() => {});
        preguntasDisponibles = [...bancoPreguntas];
        cargarFase(); 
    }

    function cargarFase() {
        if(loopPreguntas) clearInterval(loopPreguntas);
        const config = niveles[nivel];
        const panel = document.getElementById('panel-objetos');
        panel.innerHTML = "";
        document.getElementById('contenedor-piezas').innerHTML = "";
        paso = 0; bloqueado = false;
        
        let pool = [...config.pedir, ...config.extra].sort(() => Math.random() - 0.5);
        pool.forEach(id => {
            const img = document.createElement('img');
            img.src = `img10/${db[id].img}`; img.className = 'draggable';
            img.dataset.id = id; img.onpointerdown = iniciarDrag;
            panel.appendChild(img);
        });
        
        hablar(`Juan, pon ${db[config.pedir[0]].nom} sobre la cama.`);
        loopPreguntas = setInterval(lanzarPregunta, config.t);
    }

    function iniciarDrag(e) {
        if(bloqueado || document.getElementById('cuadro-pregunta').style.display === 'block') return;
        const el = e.target;
        const rect = el.getBoundingClientRect();
        const originalWidth = rect.width;

        el.style.position = 'fixed';
        el.style.zIndex = 1000;
        el.style.width = originalWidth + 'px';
        el.style.transform = 'scale(1.1)';

        const mover = (me) => {
            el.style.left = (me.clientX - originalWidth/2) + 'px';
            el.style.top = (me.clientY - originalWidth/2) + 'px';
        }

        const soltar = (se) => {
            window.removeEventListener('pointermove', mover);
            window.removeEventListener('pointerup', soltar);
            
            const cama = document.getElementById('area-cama-detect').getBoundingClientRect();
            const idCorrecto = niveles[nivel].pedir[paso];

            // SI ESTÁ DENTRO DE LA CAMA
            if (se.clientX > cama.left && se.clientX < cama.right && se.clientY > cama.top && se.clientY < cama.bottom) {
                if (el.dataset.id === idCorrecto) {
                    // TODO CORRECTO
                    sfxOk.play(); aciertos++;
                    const fija = document.createElement('img');
                    fija.src = el.src; fija.className = 'pieza-fija';
                    fija.style.left = (se.clientX - cama.left) + 'px';
                    fija.style.top = (se.clientY - cama.top) + 'px';
                    document.getElementById('contenedor-piezas').appendChild(fija);
                    el.remove();
                    paso++;
                    actualizarStats();

                    if (paso < niveles[nivel].pedir.length) {
                        setTimeout(() => hablar(`Bien. Ahora la siguiente: ${db[niveles[nivel].pedir[paso]].nom}.`), 500);
                    } else {
                        bloqueado = true;
                        setTimeout(() => { if(nivel < 3){ nivel++; cargarFase(); } else { finalizar(); }}, 1500);
                    }
                } else {
                    // OBJETO EQUIVOCADO DENTRO DE LA CAMA
                    sfxErr.play(); errores++;
                    hablar("No Juan, ese objeto no sigue ahora.");
                    el.style.position = 'static'; el.style.transform = 'scale(1)'; el.style.width = '80%';
                    actualizarStats();
                }
            } else {
                // SOLTADO FUERA DE LA CAMA
                el.style.position = 'static'; el.style.transform = 'scale(1)'; el.style.width = '80%';
            }
        }
        window.addEventListener('pointermove', mover);
        window.addEventListener('pointerup', soltar);
    }

    function lanzarPregunta() {
        if(bloqueado || document.getElementById('cuadro-pregunta').style.display === 'block') return;
        const p = bancoPreguntas[Math.floor(Math.random() * bancoPreguntas.length)];
        document.getElementById('pregunta-texto').innerText = p.q;
        document.getElementById('cuadro-pregunta').dataset.ans = p.a;
        document.getElementById('cuadro-pregunta').style.display = 'block';
        hablar(p.q);
    }

    function verificarRespuesta(v) {
        if(v === document.getElementById('cuadro-pregunta').dataset.ans) { sfxOk.play(); aciertos++; } 
        else { sfxErr.play(); errores++; }
        document.getElementById('cuadro-pregunta').style.display = 'none';
        actualizarStats();
        if(!bloqueado) setTimeout(() => hablar(`Seguimos con ${db[niveles[nivel].pedir[paso]].nom}.`), 1000);
    }

    function actualizarStats() {
        let total = aciertos + errores;
        let ef = total === 0 ? 100 : Math.round((aciertos/total)*100);
        document.getElementById('exito-txt').innerText = `Eficacia: ${ef}%`;
    }

    function finalizar() {
        clearInterval(loopPreguntas);
        let total = aciertos + errores;
        let ef = total === 0 ? 100 : Math.round((aciertos/total)*100);
        let historial = JSON.parse(localStorage.getItem('sesiones_rehabilitidia') || "[]");
        historial.push({ fecha: new Date().toLocaleDateString(), modulo: "Atención", id_sesion: 10, aciertos, errores, eficacia: ef + "%" });
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(historial));
        document.getElementById('stats-container').innerHTML = `Aciertos: ${aciertos}<br>Errores: ${errores}<br>Eficacia: ${ef}%`;
        document.getElementById('overlay-final').style.display = 'flex';
        hablar("¡Misión cumplida Juan! Closet y cama listos.");
    }
</script>
</body>
</html>

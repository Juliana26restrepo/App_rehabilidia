<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 10 - La Habitación de Juan</title>
    <style>
        body { font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; background: url('img10/fondo_habitacion.png') no-repeat center center fixed; background-size: cover; height: 100vh; display: flex; flex-direction: column; }
        #cabecera { background: #1B4F72; color: white; padding: 10px; z-index: 100; border-bottom: 3px solid #E67E22; }
        #guia-box { background: white; color: #1B4F72; width: 90%; margin: 0 auto; border-radius: 10px; padding: 10px; display: flex; align-items: center; }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; border: 2px solid #1B4F72; }
        #escenario { flex-grow: 1; position: relative; display: flex; padding: 10px; gap: 10px; }
        #despensa-objetos { width: 140px; background: rgba(255,255,255,0.9); border-radius: 15px; border: 3px solid #1B4F72; display: flex; flex-direction: column; gap: 10px; padding: 10px; overflow-y: auto; align-items: center; z-index: 10; height: 90%; }
        .item-cama { width: 80px; height: 80px; object-fit: contain; cursor: grab; touch-action: none; }
        #contenedor-cama { position: absolute; left: 160px; right: 10px; top: 0; bottom: 0; display: flex; align-items: center; justify-content: center; }
        #cama_img { width: 85%; max-width: 500px; pointer-events: none; }
        .pieza-fija { position: absolute; width: 100px; z-index: 5; pointer-events: none; }
        #notificacion { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: #FFD700; border: 6px solid #1B4F72; border-radius: 25px; padding: 20px; text-align: center; z-index: 2000; }
        .btn-notif { padding: 12px; margin: 10px 5px; width: 100px; border-radius: 12px; border: 2px solid #1B4F72; font-weight: bold; cursor: pointer; color: white; font-size: 1.1rem; }
        #modal-cierre { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(27, 79, 114, 0.98); z-index: 3000; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body onload="configurarNivel()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia" style="margin:0; font-weight:bold;">Cargando...</p>
    </div>
</div>

<div id="escenario">
    <div id="despensa-objetos"></div>
    <div id="contenedor-cama">
        <img src="img10/cama_destendida.png" id="cama_img">
    </div>
</div>

<div id="notificacion">
    <p id="pregunta-txt" style="font-size: 1.2rem; font-weight: bold; color: #1B4F72;"></p>
    <button class="btn-notif" style="background:#2ECC71" onclick="verificarRespuesta('SÍ')">SÍ</button>
    <button class="btn-notif" style="background:#E74C3C" onclick="verificarRespuesta('NO')">NO</button>
</div>

<div id="modal-cierre">
    <h1 id="titulo-final" style="font-size: 3rem; color: #FFD700;">¡NIVEL LOGRADO!</h1>
    <p id="stats-nivel" style="font-size: 1.8rem; margin: 20px;"></p>
    <button id="btn-final" onclick="irASiguiente()" style="padding: 15px 40px; font-size: 1.5rem; background: #2ECC71; color: white; border: none; border-radius: 15px; cursor: pointer;">CONTINUAR</button>
</div>

<script>
    let nivelActual = 1;
    let objetivoIdx = 0;
    let piezasNivel = [];
    let timerPregunta = null;
    let juegoBloqueado = false;
    let preguntasTotales = 0;
    let preguntasCorrectas = 0;
    let respuestaEsperada = "";

    const sonidos = { exito: new Audio('img8/exito.mp3'), error: new Audio('img8/alarma.mp3') };
    const banco = [{p:"¿El sol es caliente?", r:"SÍ"}, {p:"¿El hielo quema?", r:"NO"}, {p:"¿Los perros hablan?", r:"NO"}, {p:"¿El azúcar es dulce?", r:"SÍ"}];
    const catalogo = {
        piezas: ["sabana_azul.png", "almohada_blanca.png", "cobija_termica.png", "almohada_gris.png", "sabana_blanca.png", "cobija_tigre.png", "almohada_cafe.png", "sabana_gris.png"],
        distractores: ["control.png", "lampara.png", "medias.png"]
    };

    function hablar(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        document.getElementById('texto-guia').innerText = txt;
        window.speechSynthesis.speak(msg);
    }

    function configurarNivel() {
        document.getElementById('modal-cierre').style.display = 'none';
        objetivoIdx = 0; preguntasTotales = 0; preguntasCorrectas = 0;
        document.getElementById('despensa-objetos').innerHTML = "";
        document.querySelectorAll('.pieza-fija').forEach(p => p.remove());

        let cant = (nivelActual === 1) ? 4 : (nivelActual === 2 ? 6 : 8);
        piezasNivel = [];
        for(let i=0; i<cant; i++) {
            let img = catalogo.piezas[i % catalogo.piezas.length];
            let nombre = img.includes("sabana") ? "la sábana" : (img.includes("almohada") ? "la almohada" : "la cobija");
            piezasNivel.push({img: img, nombre: nombre});
        }
        renderizarPanel();
        setTimeout(pedirObjeto, 1000);
        iniciarTimer();
    }

    function renderizarPanel() {
        const panel = document.getElementById('despensa-objetos');
        let pool = [...new Set(piezasNivel.map(p => p.img)), ...catalogo.distractores].sort(() => Math.random() - 0.5);
        pool.forEach(imgName => {
            const img = document.createElement('img');
            img.src = `img10/${imgName}`;
            img.className = 'item-cama';
            img.dataset.archivo = imgName;
            img.onmousedown = img.ontouchstart = dragStart;
            panel.appendChild(img);
        });
    }

    function pedirObjeto() {
        if (objetivoIdx < piezasNivel.length) {
            hablar("Juan, busca " + piezasNivel[objetivoIdx].nombre);
        }
    }

    function iniciarTimer() {
        if(timerPregunta) clearInterval(timerPregunta);
        let ms = nivelActual === 1 ? 15000 : (nivelActual === 2 ? 10000 : 5000);
        timerPregunta = setInterval(lanzarPregunta, ms);
    }

    function lanzarPregunta() {
        if (juegoBloqueado || document.getElementById('notificacion').style.display === 'block') return;
        const data = banco[Math.floor(Math.random() * banco.length)];
        respuestaEsperada = data.r;
        preguntasTotales++;
        document.getElementById('pregunta-txt').innerText = data.p;
        document.getElementById('notificacion').style.display = 'block';
        hablar(data.p);
    }

    function verificarRespuesta(userR) {
        document.getElementById('notificacion').style.display = 'none';
        if(userR === respuestaEsperada) { preguntasCorrectas++; sonidos.exito.play(); hablar("¡Bien!"); }
        else { sonidos.error.play(); hablar("Incorrecto"); }
    }

    function dragStart(e) {
        if(juegoBloqueado || document.getElementById('notificacion').style.display === 'block') return;
        const el = e.target;
        const touch = e.type === 'touchstart' ? e.touches[0] : e;
        let rect = el.getBoundingClientRect();
        let offX = touch.clientX - rect.left;
        let offY = touch.clientY - rect.top;
        el.style.position = 'fixed'; el.style.zIndex = "1000";

        const move = (me) => {
            const mt = me.type === 'touchmove' ? me.touches[0] : me;
            el.style.left = (mt.clientX - offX) + 'px'; el.style.top = (mt.clientY - offY) + 'px';
        };

        const stop = (se) => {
            document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move); document.removeEventListener('touchend', stop);
            
            const st = se.type === 'touchend' ? se.changedTouches[0] : se;
            const camaRect = document.getElementById('cama_img').getBoundingClientRect();
            const sobreCama = (st.clientX > camaRect.left && st.clientX < camaRect.right && st.clientY > camaRect.top && st.clientY < camaRect.bottom);

            // VALIDACIÓN ESTRICTA: ¿Es el objeto que pedí AHORA MISMO?
            if (sobreCama && el.dataset.archivo === piezasNivel[objetivoIdx].img) {
                sonidos.exito.play();
                const fija = document.createElement('img');
                fija.src = el.src; fija.className = 'pieza-fija';
                let contRect = document.getElementById('contenedor-cama').getBoundingClientRect();
                fija.style.left = (st.clientX - contRect.left - 40) + 'px';
                fija.style.top = (st.clientY - contRect.top - 40) + 'px';
                document.getElementById('contenedor-cama').appendChild(fija);
                
                el.style.position = 'static';
                objetivoIdx++;

                if (objetivoIdx >= piezasNivel.length) {
                    clearInterval(timerPregunta);
                    setTimeout(mostrarResumen, 1000);
                } else {
                    // Pausa antes de pedir el siguiente para no confundir
                    setTimeout(pedirObjeto, 800);
                }
            } else {
                if(sobreCama) { 
                    sonidos.error.play(); 
                    hablar("Esa no es " + piezasNivel[objetivoIdx].nombre); 
                }
                el.style.position = 'static';
            }
        };
        document.addEventListener('mousemove', move); document.addEventListener('mouseup', stop);
        document.addEventListener('touchmove', move, {passive:false}); document.addEventListener('touchend', stop);
    }

    function mostrarResumen() {
        let porc = preguntasTotales > 0 ? Math.round((preguntasCorrectas/preguntasTotales)*100) : 100;
        document.getElementById('stats-nivel').innerHTML = `Nivel ${nivelActual} completado.<br>Aciertos en preguntas: ${porc}%`;
        document.getElementById('modal-cierre').style.display = 'flex';
        hablar("¡Nivel logrado Juan!");
    }

    function irASiguiente() {
        if(nivelActual < 3) { nivelActual++; configurarNivel(); }
        else { alert("¡Fin de la Sesión 10!"); location.reload(); }
    }
</script>
</body>
</html>

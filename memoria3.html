<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memoria 3 - Juan: Sonidos con Pistas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; text-align: center; }
        
        #escena-total { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('mem3/fondo.jpg') no-repeat center center; 
            background-size: cover; z-index: -1; 
        }

        #cabecera { background: rgba(108, 91, 123, 0.95); color: white; height: 80px; display: flex; align-items: center; padding: 0 20px; border-bottom: 4px solid #307B8E; }
        #instruccion-box { background: white; padding: 10px 20px; border-radius: 20px; color: #103A57; display: flex; align-items: center; border: 3px solid #6C5B7B; font-weight: bold; }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }

        #contenedor-juego { height: calc(100vh - 84px); display: flex; flex-direction: column; position: relative; }
        
        /* FASE 1: ONDA */
        #panel-codificacion { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #box-onda { background: rgba(255, 255, 255, 0.9); border: 4px solid #366B2B; border-radius: 20px; width: 60%; height: 200px; display: flex; align-items: center; justify-content: center; position: relative; gap: 8px; }
        
        .bar { width: 12px; height: 40px; background: #366B2B; border-radius: 5px; display: none; }
        .animating .bar { display: block; animation: soundWave 0.5s infinite alternate; }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes soundWave { from { height: 20px; } to { height: 80px; } }

        /* FASE 2: ARRASTRE */
        #panel-respuesta { display: none; flex: 1; flex-direction: column; align-items: center; padding: 15px; }
        #zona-banco-sonidos { background: rgba(255,255,255,0.9); border: 3px solid #6C5B7B; border-radius: 15px; width: 95%; height: 50%; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        #zona-linea-arrastre { background: rgba(54, 107, 43, 0.9); border: 3px dashed #FFD700; border-radius: 15px; width: 95%; height: 40%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }

        .btn-sonido { background: white; border: 3px solid #103A57; border-radius: 15px; width: 100px; height: 100px; cursor: grab; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .btn-sonido img { width: 70px; height: 70px; pointer-events: none; }
        
        .hueco-arrastre { background: rgba(255,255,255,0.2); border: 3px dashed white; border-radius: 50%; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; transition: 0.3s; }
        .hueco-arrastre img { width: 80px; height: 80px; }

        /* PISTA: Parpadeo amarillo */
        .pista-ayuda { animation: parpadeo 1s infinite; border: 5px solid #FFD700 !important; background: rgba(255, 215, 0, 0.4) !important; color: #FFD700 !important; }
        @keyframes parpadeo { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #overlay-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.98); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .linea-resumen { margin: 10px 0; width: 400px; display: flex; justify-content: space-between; font-size: 1.8rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
    </style>
</head>
<body onload="iniciarNivel()">

<div id="escena-total"></div>

<div id="cabecera">
    <div id="instruccion-box">
        <img src="COTERAPEUTA.JPG">
        <span id="label-guia">Juan, escucha los sonidos...</span>
    </div>
</div>

<div id="contenedor-juego">
    <div id="panel-codificacion">
        <div id="box-onda">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div id="txt-sonido-count" style="position: absolute; bottom: 10px; font-weight: bold; color: #333;"></div>
        </div>
    </div>

    <div id="panel-respuesta">
        <div id="zona-banco-sonidos"></div>
        <div id="zona-linea-arrastre"></div>
    </div>
</div>

<div id="overlay-final">
    <h1 style="color: #FFD700; font-size: 3.5rem;">¡REPORTE FINAL!</h1>
    <div id="resumen-niveles" style="margin: 20px 0;"></div>
    <p style="font-style: italic; font-size: 1.4rem;">"Cada sonido que recuerdas, te acerca más a dominar tu vida"</p>
    <button onclick="location.reload()" style="padding: 15px 40px; background: #366B2B; color: white; border: none; border-radius: 10px; font-size: 1.5rem; cursor: pointer; margin-top: 20px;">REINTENTAR</button>
</div>

<script>
    const banco = ["ambulancia", "aplausos", "avion", "bebe", "carro", "freno", "gato", "lluvia", "martillo", "moto", "pajaro", "pasos", "perro", "puerta", "taladro", "telefono", "timbre", "trueno", "vaca", "vidrio"];
    let nivelActual = 1;
    let secuenciaReto = [];
    let respuestasUsuario = [];
    let erroresSeguidos = 0;
    let aciertosFinales = { 1: 0, 2: 0, 3: 0 };
    let intentosTotales = { 1: 0, 2: 0, 3: 0 }; 
    const metas = { 1: 5, 2: 8, 3: 11 };

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        msg.rate = 0.85;
        if(callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function iniciarNivel() {
        respuestasUsuario = [];
        erroresSeguidos = 0;
        secuenciaReto = [...banco].sort(() => 0.5 - Math.random()).slice(0, metas[nivelActual]);
        document.getElementById('panel-respuesta').style.display = 'none';
        document.getElementById('panel-codificacion').style.display = 'flex';
        hablar(`Escucha con atención estos ${metas[nivelActual]} sonidos.`, () => {
            setTimeout(() => reproducirSecuencia(0), 1000);
        });
    }

    function reproducirSecuencia(idx) {
        if (idx < secuenciaReto.length) {
            document.getElementById('txt-sonido-count').innerText = `Sonido ${idx + 1} de ${secuenciaReto.length}`;
            document.getElementById('box-onda').classList.add('animating');
            const audio = new Audio(`mem3/${secuenciaReto[idx]}.mp3`);
            audio.play();
            setTimeout(() => {
                audio.pause();
                document.getElementById('box-onda').classList.remove('animating');
                setTimeout(() => reproducirSecuencia(idx + 1), 2000);
            }, 4000); // 4 SEGUNDOS DE AUDIO
        } else {
            prepararFaseRespuesta();
        }
    }

    function prepararFaseRespuesta() {
        document.getElementById('panel-codificacion').style.display = 'none';
        const panelRes = document.getElementById('panel-respuesta');
        const bancoDiv = document.getElementById('zona-banco-sonidos');
        const lineaDiv = document.getElementById('zona-linea-arrastre');
        bancoDiv.innerHTML = ""; lineaDiv.innerHTML = "";
        panelRes.style.display = 'flex';
        hablar("Juan, ¿en qué orden los escuchaste?");

        secuenciaReto.forEach((_, i) => {
            const h = document.createElement('div');
            h.className = 'hueco-arrastre';
            h.innerText = i + 1;
            lineaDiv.appendChild(h);
        });

        let opciones = [...secuenciaReto, ...banco.filter(x => !secuenciaReto.includes(x)).slice(0, 6)].sort(() => 0.5 - Math.random());
        opciones.forEach(id => {
            const btn = document.createElement('div');
            btn.className = 'btn-sonido';
            btn.innerHTML = `<img src="mem3/${id}.png">`;
            btn.setAttribute('draggable', true);
            btn.onclick = () => { 
                const a = new Audio(`mem3/${id}.mp3`);
                a.play(); setTimeout(() => a.pause(), 2500);
            };
            btn.ondragstart = (e) => e.dataTransfer.setData('text', id);
            bancoDiv.appendChild(btn);
        });

        lineaDiv.ondragover = (e) => e.preventDefault();
        lineaDiv.ondrop = (e) => {
            const id = e.dataTransfer.getData('text');
            evaluar(id);
        };
    }

    function evaluar(id) {
        intentosTotales[nivelActual]++;
        const objetivo = secuenciaReto[respuestasUsuario.length];
        const huecos = document.querySelectorAll('.hueco-arrastre');
        const huecoActual = huecos[respuestasUsuario.length];

        if (id === objetivo) {
            huecoActual.innerHTML = `<img src="mem3/${id}.png">`;
            huecoActual.classList.remove('pista-ayuda');
            huecoActual.style.borderStyle = "solid";
            huecoActual.style.borderColor = "#FFD700";
            respuestasUsuario.push(id);
            erroresSeguidos = 0;
            if (respuestasUsuario.length === secuenciaReto.length) {
                aciertosFinales[nivelActual] = secuenciaReto.length;
                setTimeout(nivelActual < 3 ? () => { nivelActual++; iniciarNivel(); } : finalizar, 1500);
            }
        } else {
            erroresSeguidos++;
            hablar("Ese no sigue el orden.");
            // PISTA: Si se equivoca 3 veces en el mismo lugar
            if (erroresSeguidos >= 3) {
                huecoActual.classList.add('pista-ayuda');
                hablar(`¡Mira Juan! El siguiente es el sonido de ${objetivo}.`);
            }
        }
    }

    function finalizar() {
        document.getElementById('panel-respuesta').style.display = 'none';
        const resumen = document.getElementById('resumen-niveles');
        
        const getP = (n) => {
            let p = Math.round((aciertosFinales[n] / intentosTotales[n]) * 100);
            return isNaN(p) ? 0 : p;
        };

        resumen.innerHTML = `
            <div class="linea-resumen"><span>Nivel 1 (5 sonidos):</span> <b>${getP(1)}%</b></div>
            <div class="linea-resumen"><span>Nivel 2 (8 sonidos):</span> <b>${getP(2)}%</b></div>
            <div class="linea-resumen"><span>Nivel 3 (11 sonidos):</span> <b>${getP(3)}%</b></div>
        `;
        document.getElementById('overlay-final').style.display = 'flex';
        hablar("¡Excelente Juan! Has recuperado todos los sonidos. Mira tus resultados.");
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memoria 4 - Juan: Discriminación - REHABILIDIA</title>
    <style>
        :root {
            --primary: #366B2B;
            --secondary: #103A57;
            --accent: #FFD700;
            --white: #ffffff;
            --error: #C0392B;
            --success: #27AE60;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; overflow: hidden; 
            touch-action: none; 
            background: #1a1a1a; 
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        
        #contenedor-proporcional {
            width: 100vw; height: 100vh;
            max-width: 1200px; max-height: 800px;
            background: url('mem4/FONDO.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        #cabecera { 
            background: rgba(54, 107, 43, 0.95); color: white; 
            height: 12%; display: flex; align-items: center; 
            padding: 0 20px; border-bottom: 4px solid var(--accent); 
            z-index: 100; flex-shrink: 0;
        }

        #instruccion-box { 
            background: white; padding: 10px 25px; border-radius: 30px; 
            color: var(--primary); display: flex; align-items: center; 
            border: 3px solid var(--accent); font-weight: bold;
            font-size: clamp(0.8rem, 2.5vw, 1.2rem);
        }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }

        #contenedor-juego { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            position: relative; padding: 20px;
        }

        #display-aprendizaje { 
            background: rgba(255,255,255,0.95); border: 5px solid var(--accent); 
            border-radius: 25px; padding: 30px; display: none; 
            flex-direction: column; align-items: center; 
            max-width: 80%;
        }
        #img-aprendizaje { width: clamp(200px, 40vh, 350px); height: auto; border-radius: 15px; margin-bottom: 15px; }
        
        #panel-reto { 
            display: none; width: 95%; height: 90%; 
            background: rgba(255,255,255,0.92); border-radius: 20px; 
            padding: 15px; flex-direction: column; align-items: center; 
            border: 4px solid var(--primary); box-sizing: border-box;
        }

        #grid-opciones { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 10px; width: 100%; margin-top: 15px; 
            justify-items: center; overflow-y: auto;
            flex-grow: 1;
        }

        .btn-opcion { 
            background: white; border: 4px solid #BDC3C7; 
            border-radius: 15px; width: 130px; height: 130px; 
            cursor: pointer; display: flex; align-items: center; 
            justify-content: center; transition: 0.2s;
        }
        .btn-opcion img { width: 110px; height: 110px; object-fit: contain; pointer-events: none; }
        
        #pantalla-paso { 
            display: none; position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(54, 107, 43, 0.98); 
            z-index: 4000; flex-direction: column; justify-content: center; 
            align-items: center; color: white; 
        }

        #overlay-final { 
            display: none; position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(16, 58, 87, 0.98); 
            z-index: 5000; flex-direction: column; justify-content: center; 
            align-items: center; color: white; 
        }

        .cuadro-resultados {
            background: white; color: #103A57; padding: 30px; 
            border-radius: 20px; border: 5px solid var(--accent);
            width: 80%; max-width: 400px; text-align: center;
        }

        .btn-grande {
            padding: 15px 40px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-size: 1.4rem; 
            cursor: pointer; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body onload="iniciarNivel()">

<div id="contenedor-proporcional">
    <div id="cabecera">
        <div id="instruccion-box">
            <img src="COTERAPEUTA.JPG">
            <span id="label-guia">Juan, escucha y memoriza...</span>
        </div>
    </div>

    <div id="contenedor-juego">
        <div id="display-aprendizaje">
            <img id="img-aprendizaje" src="">
            <div style="font-size: 50px;">🔊</div>
        </div>

        <div id="panel-reto">
            <div onpointerdown="reproducirPregunta()" style="font-size: 60px; cursor: pointer; background: var(--accent); border-radius: 50%; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">👂</div>
            <div id="grid-opciones"></div>
        </div>
    </div>

    <div id="pantalla-paso">
        <h2 id="txt-paso-nivel" style="font-size: 2.5rem; color: var(--accent);">¡Nivel Completado!</h2>
    </div>

    <div id="overlay-final">
        <div class="cuadro-resultados">
            <h1 style="color: var(--primary); margin-top: 0;">¡Sesión Exitosa!</h1>
            <div id="resumen-lista" style="font-size: 1.3rem; margin-bottom: 20px;"></div>
            <button class="btn-grande" onpointerdown="irAlMenu()">TERMINAR</button>
        </div>
    </div>
</div>

<script>
    const banco = [
        {id: "agua", img2: "agua2.png"}, {id: "ambulancia", img2: "ambulancia2.png"}, 
        {id: "aplauso", img2: "aplauso2.png"}, {id: "bebe", img2: "bebe2.png"}, 
        {id: "beso", img2: "beso2.png"}, {id: "campana", img2: "capana2.png"}, 
        {id: "elefante", img2: "elefante2.png"}, {id: "gallo", img2: "gallo2.png"}, 
        {id: "gato", img2: "gato2.png"}, {id: "helicoptero", img2: "helicoptero2.png"}, 
        {id: "leon", img2: "leon2.png"}, {id: "moto", img2: "moto2.png"}, 
        {id: "perro", img2: "perro2.png"}, {id: "piano", img2: "piano2.png"}, 
        {id: "sierra", img2: "sierra2.png"}, {id: "tambor", img2: "tambor2.png"}, 
        {id: "tren", img2: "tren2.png"}, {id: "trueno", img2: "trueno2.png"}, 
        {id: "vaca", img2: "vaca2.png"}, {id: "vidrio", img2: "vidrio2.png"}
    ];
    
    let nivelActual = 1, itemsNivel = [], actualIdx = 0;
    let aciertosTotales = 0, erroresTotales = 0;
    const metas = { 1: 4, 2: 6, 3: 8 }; 
    let audioActivo = null;

    function detenerTodo() {
        if(audioActivo) { audioActivo.pause(); audioActivo.currentTime = 0; audioActivo = null; }
        window.speechSynthesis.cancel();
    }

    function hablar(t, callback) {
        detenerTodo();
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        if(callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function iniciarNivel() {
        document.getElementById('pantalla-paso').style.display = 'none';
        actualIdx = 0;
        itemsNivel = [...banco].sort(() => 0.5 - Math.random()).slice(0, metas[nivelActual]);
        document.getElementById('panel-reto').style.display = 'none';
        document.getElementById('display-aprendizaje').style.display = 'flex';
        
        hablar(`Juan, memoriza estas imágenes y sonidos.`, () => {
            setTimeout(() => mostrarAprendizaje(0), 1000);
        });
    }

    function mostrarAprendizaje(idx) {
        if (idx < itemsNivel.length) {
            const item = itemsNivel[idx];
            document.getElementById('img-aprendizaje').src = `mem4/${item.id}.png`;
            detenerTodo();
            audioActivo = new Audio(`mem4/${item.id}.mp3`);
            audioActivo.play();
            setTimeout(() => {
                detenerTodo();
                setTimeout(() => mostrarAprendizaje(idx + 1), 1000);
            }, 3000);
        } else {
            prepararReto();
        }
    }

    function prepararReto() {
        document.getElementById('display-aprendizaje').style.display = 'none';
        document.getElementById('panel-reto').style.display = 'flex';
        hablar("Juan, ¿cuál acabas de escuchar?", () => {
            reproducirPregunta();
            dibujarOpciones();
        });
    }

    function reproducirPregunta() {
        detenerTodo();
        audioActivo = new Audio(`mem4/${itemsNivel[actualIdx].id}.mp3`);
        audioActivo.play();
    }

    function dibujarOpciones() {
        const grid = document.getElementById('grid-opciones');
        grid.innerHTML = "";
        const itemCorrecto = itemsNivel[actualIdx];
        let pool = [{ img: itemCorrecto.id + '.png', esCorrecta: true }, { img: itemCorrecto.img2, esCorrecta: false }];
        let distractores = banco.filter(x => x.id !== itemCorrecto.id).sort(() => 0.5 - Math.random());
        const numOpciones = nivelActual === 1 ? 4 : (nivelActual === 2 ? 6 : 8);

        while(pool.length < numOpciones) {
            let extra = distractores.pop();
            pool.push({ img: extra.id + '.png', esCorrecta: false });
        }

        pool.sort(() => 0.5 - Math.random()).forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'btn-opcion';
            btn.innerHTML = `<img src="mem4/${opt.img}">`;
            btn.onpointerdown = () => verificar(opt.esCorrecta, btn);
            grid.appendChild(btn);
        });
    }

    function verificar(esCorrecta, el) {
        if (esCorrecta) {
            aciertosTotales++;
            el.style.borderColor = "var(--success)";
            setTimeout(() => {
                actualIdx++;
                if (actualIdx < itemsNivel.length) {
                    reproducirPregunta();
                    dibujarOpciones();
                } else {
                    if (nivelActual < 3) {
                        nivelActual++;
                        document.getElementById('pantalla-paso').style.display = 'flex';
                        setTimeout(iniciarNivel, 2000);
                    } else {
                        finalizar();
                    }
                }
            }, 1000);
        } else {
            erroresTotales++;
            el.style.borderColor = "var(--error)";
            hablar("Ese no es, intenta de nuevo.");
        }
    }

    function finalizar() {
        detenerTodo();
        document.getElementById('panel-reto').style.display = 'none';
        const ef = Math.round((aciertosTotales / (aciertosTotales + erroresTotales || 1)) * 100);
        document.getElementById('resumen-lista').innerHTML = `Aciertos: ${aciertosTotales}<br>Errores: ${erroresTotales}<br>Eficacia: ${ef}%`;
        document.getElementById('overlay-final').style.display = 'flex';
    }

    function irAlMenu() {
        const ef = Math.round((aciertosTotales / (aciertosTotales + erroresTotales || 1)) * 100);
        const datosSesion = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Memoria", 
            id_sesion: 4,     
            aciertos: aciertosTotales,
            errores: erroresTotales,
            eficacia: ef + "%"
        };
        let historial = JSON.parse(localStorage.getItem('sesiones_rehabilitidia')) || []; 
        historial.push(datosSesion); 
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(historial)); 
        window.location.href = "memoria_sesiones.html";
    }
</script>
</body>
</html>

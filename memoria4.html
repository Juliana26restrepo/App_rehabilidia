<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memoria 4 - Juan: Discriminación</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; touch-action: none; text-align: center; }
        
        /* CORREGIDO A MAYÚSCULAS */
        #escena-total { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('mem4/FONDO.jpg') no-repeat center center; 
            background-size: cover; z-index: -1; 
        }

        #cabecera { background: rgba(54, 107, 43, 0.9); color: white; height: 80px; display: flex; align-items: center; padding: 0 20px; border-bottom: 4px solid #FFD700; }
        #instruccion-box { background: white; padding: 10px 20px; border-radius: 20px; color: #366B2B; display: flex; align-items: center; border: 3px solid #FFD700; font-weight: bold; }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }

        #contenedor-juego { height: calc(100vh - 84px); display: flex; flex-direction: column; align-items: center; justify-content: center; }

        #display-aprendizaje { background: rgba(255,255,255,0.95); border: 5px solid #FFD700; border-radius: 25px; padding: 30px; display: none; flex-direction: column; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #img-aprendizaje { width: 280px; height: 280px; object-fit: contain; margin-bottom: 15px; border-radius: 15px; }
        
        #panel-reto { display: none; width: 90%; height: 85%; background: rgba(255,255,255,0.9); border-radius: 20px; padding: 20px; flex-direction: column; align-items: center; border: 4px solid #366B2B; }
        #grid-opciones { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; width: 100%; margin-top: 20px; justify-items: center; overflow-y: auto; }

        .btn-opcion { background: white; border: 3px solid #BDC3C7; border-radius: 15px; width: 140px; height: 140px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-opcion img { width: 120px; height: 120px; object-fit: contain; }
        
        #overlay-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .linea-resumen { margin: 10px 0; width: 350px; display: flex; justify-content: space-between; font-size: 1.8rem; border-bottom: 2px solid #FFD700; padding-bottom: 5px; }
    </style>
</head>
<body onload="iniciarNivel()">

<div id="escena-total"></div>

<div id="cabecera">
    <div id="instruccion-box">
        <img src="COTERAPEUTA.JPG">
        <span id="label-guia">Juan, escucha y memoriza...</span>
    </div>
</div>

<div id="contenedor-juego">
    <div id="display-aprendizaje">
        <img id="img-aprendizaje" src="">
        <div id="onda-visual" style="font-size: 60px;">🔊</div>
    </div>

    <div id="panel-reto">
        <div onclick="reproducirPregunta()" style="font-size: 70px; cursor: pointer; background: #FFD700; border-radius: 50%; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center;">👂</div>
        <div id="grid-opciones"></div>
    </div>
</div>

<div id="overlay-final">
    <h1 style="color: #FFD700; font-size: 3.5rem;">¡LOGRADO!</h1>
    <div id="resumen-lista"></div>
    <p style="font-size: 1.4rem; margin: 30px; text-align: center;">"Recordar lo cotidiano te acerca a tu independencia, cada intento cuenta"</p>
    <button onclick="location.reload()" style="padding: 15px 45px; background: #366B2B; color: white; border: none; border-radius: 12px; font-size: 1.6rem; cursor: pointer;">REPETIR</button>
</div>

<script>
    // Configuración de IDs basada en tus fotos
    const banco = [
        {id: "agua", img2: "agua2.png"}, {id: "ambulancia", img2: "ambulancia2.png"}, 
        {id: "aplauso", img2: "aplauso2.png"}, {id: "bebe", img2: "bebe2.png"}, 
        {id: "beso", img2: "beso2.png"}, {id: "campana", img2: "capana2.png"}, // capana sin M por tu foto
        {id: "elefante", img2: "elefante2.png"}, {id: "gallo", img2: "gallo2.png"}, 
        {id: "gato", img2: "gato2.png"}, {id: "helicoptero", img2: "helicoptero2.png"}, 
        {id: "leon", img2: "leon2.png"}, {id: "moto", img2: "moto2.png"}, 
        {id: "perro", img2: "perro2.png"}, {id: "piano", img2: "piano2.png"}, 
        {id: "sierra", img2: "sierra2.png"}, {id: "tambor", img2: "tambor2.png"}, 
        {id: "tren", img2: "tren2.png"}, {id: "trueno", img2: "trueno2.png"}, 
        {id: "vaca", img2: "vaca2.png"}, {id: "vidrio", img2: "vidrio2.png"}
    ];
    
    let nivelActual = 1;
    let itemsNivel = [];
    let actualIdx = 0;
    let stats = { 1: {a:0, e:0}, 2: {a:0, e:0}, 3: {a:0, e:0} };
    const metas = { 1: 4, 2: 8, 3: 12 };

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        msg.rate = 0.9;
        if(callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function iniciarNivel() {
        actualIdx = 0;
        itemsNivel = [...banco].sort(() => 0.5 - Math.random()).slice(0, metas[nivelActual]);
        document.getElementById('panel-reto').style.display = 'none';
        document.getElementById('display-aprendizaje').style.display = 'flex';
        
        hablar(`Juan, memoriza bien la foto y el sonido.`, () => {
            setTimeout(() => mostrarAprendizaje(0), 1000);
        });
    }

    function mostrarAprendizaje(idx) {
        if (idx < itemsNivel.length) {
            const item = itemsNivel[idx];
            document.getElementById('img-aprendizaje').src = `mem4/${item.id}.png`;
            const audio = new Audio(`mem4/${item.id}.mp3`);
            audio.play();
            
            setTimeout(() => {
                audio.pause();
                setTimeout(() => mostrarAprendizaje(idx + 1), 1000);
            }, 3500);
        } else {
            prepararReto();
        }
    }

    function prepararReto() {
        document.getElementById('display-aprendizaje').style.display = 'none';
        document.getElementById('panel-reto').style.display = 'flex';
        hablar("Juan, ¿cuál de estos acabas de escuchar?", () => {
            reproducirPregunta();
            dibujarOpciones();
        });
    }

    function reproducirPregunta() {
        const audio = new Audio(`mem4/${itemsNivel[actualIdx].id}.mp3`);
        audio.play();
    }

    function dibujarOpciones() {
        const grid = document.getElementById('grid-opciones');
        grid.innerHTML = "";
        const itemCorrecto = itemsNivel[actualIdx];

        let pool = [{ img: itemCorrecto.id + '.png', esCorrecta: true }];
        pool.push({ img: itemCorrecto.img2, esCorrecta: false });

        let otros = banco.filter(x => x.id !== itemCorrecto.id).sort(() => 0.5 - Math.random());
        while(pool.length < (nivelActual === 1 ? 4 : 8)) {
            let extra = otros.pop();
            pool.push({ img: extra.id + '.png', esCorrecta: false });
        }

        pool.sort(() => 0.5 - Math.random()).forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'btn-opcion';
            btn.innerHTML = `<img src="mem4/${opt.img}" onerror="this.src='mem4/error.png'">`;
            btn.onclick = () => verificar(opt.esCorrecta, btn);
            grid.appendChild(btn);
        });
    }

    function verificar(esCorrecta, el) {
        if (esCorrecta) {
            el.style.borderColor = "#27AE60";
            stats[nivelActual].a++;
            hablar("¡Bien!", () => {
                actualIdx++;
                if (actualIdx < itemsNivel.length) {
                    reproducirPregunta();
                    dibujarOpciones();
                } else {
                    if (nivelActual < 3) { nivelActual++; setTimeout(iniciarNivel, 1200); }
                    else { finalizar(); }
                }
            });
        } else {
            stats[nivelActual].e++;
            el.style.borderColor = "#C0392B";
            hablar("Intenta de nuevo.");
            reproducirPregunta();
        }
    }

    function finalizar() {
        document.getElementById('panel-reto').style.display = 'none';
        const res = document.getElementById('resumen-lista');
        const calc = (n) => {
            let t = stats[n].a + stats[n].e;
            return t > 0 ? Math.round((stats[n].a / t) * 100) : 0;
        };
        res.innerHTML = `
            <div class="linea-resumen"><span>Nivel 1:</span> <b>${calc(1)}%</b></div>
            <div class="linea-resumen"><span>Nivel 2:</span> <b>${calc(2)}%</b></div>
            <div class="linea-resumen"><span>Nivel 3:</span> <b>${calc(3)}%</b></div>
        `;
        document.getElementById('overlay-final').style.display = 'flex';
        hablar("¡Excelente Juan! Recordar lo cotidiano te acerca a tu independencia, cada intento cuenta.");
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajería Profesional - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --bg: #F4F7F9; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--p-blue); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER PRINCIPAL */
        header { background: var(--p-blue); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; flex-shrink: 0; z-index: 10; }
        .btn-volver { color: white; text-decoration: none; font-size: 1.2rem; cursor: pointer; }

        /* CONTENEDOR DE VISTAS */
        .main-container { flex: 1; position: relative; }

        /* VISTA 1: LISTA DE PACIENTES */
        #lista-chats { width: 100%; height: 100%; overflow-y: auto; padding: 10px; box-sizing: border-box; display: block; }
        .chat-item { 
            background: white; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; 
            margin-bottom: 10px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* VISTA 2: VENTANA DE CHAT (MESSENGER STYLE) */
        #ventana-chat { 
            position: absolute; top: 0; left: 100%; width: 100%; height: 100%; 
            background: #F0F2F5; display: flex; flex-direction: column; transition: 0.3s ease; z-index: 20;
        }
        #ventana-chat.active { left: 0; }

        /* CABECERA DEL CHAT */
        .chat-header { background: white; padding: 10px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #ddd; }
        .avatar { width: 40px; height: 40px; background: var(--t-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* CAJA DE MENSAJES */
        #mensajes-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; position: relative; }
        .msg.pro { align-self: flex-end; background: var(--t-blue); color: white; border-bottom-right-radius: 2px; }
        .msg.paciente { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        /* ÁREA DE ENTRADA (CORREGIDA) */
        .input-area { 
            background: white; padding: 15px; 
            display: flex; align-items: center; gap: 10px; 
            border-top: 1px solid #ddd;
            margin-bottom: 0; /* Asegura que pegue al borde inferior */
        }
        #mensajeInput { 
            flex: 1; border: 1px solid #ddd; padding: 12px 15px; 
            border-radius: 25px; outline: none; font-size: 1rem; background: #F0F2F5;
        }
        .btn-enviar { 
            background: var(--p-blue); color: white; border: none; 
            width: 45px; height: 45px; border-radius: 50%; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<header>
    <a href="perfil_neuropsicologo.html" class="btn-volver"><i class="fas fa-chevron-left"></i></a>
    <span style="font-weight: bold;">Mensajería REHABILIDIA</span>
</header>

<div class="main-container">
    <div id="lista-chats">
        <div class="chat-item" onclick="abrirChat('Juan Pérez', 'chat_rehabilitidia_juan')">
            <div class="avatar">JP</div>
            <div>
                <h4 style="margin:0;">Juan Pérez</h4>
                <p style="margin:5px 0 0; font-size:0.8rem; color:#666;">Toca para abrir el chat</p>
            </div>
        </div>
    </div>

    <div id="ventana-chat">
        <div class="chat-header">
            <i class="fas fa-arrow-left" style="cursor:pointer;" onclick="cerrarChat()"></i>
            <div class="avatar" id="mini-avatar">JP</div>
            <strong id="nombre-paciente">Paciente</strong>
        </div>
        
        <div id="mensajes-box"></div>

        <div class="input-area">
            <input type="text" id="mensajeInput" placeholder="Escribe un mensaje...">
            <button class="btn-enviar" onclick="enviarMensaje()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
    let chatActivo = '';

    function abrirChat(nombre, key) {
        chatActivo = key;
        document.getElementById('nombre-paciente').innerText = nombre;
        document.getElementById('ventana-chat').classList.add('active');
        cargarChat();
    }

    function cerrarChat() {
        document.getElementById('ventana-chat').classList.remove('active');
        chatActivo = '';
    }

    function cargarChat() {
        if(!chatActivo) return;
        const box = document.getElementById('mensajes-box');
        const msgs = JSON.parse(localStorage.getItem(chatActivo)) || [];
        box.innerHTML = msgs.map(m => `
            <div class="msg ${m.emisor}">
                ${m.texto}
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    function enviarMensaje() {
        const input = document.getElementById('mensajeInput');
        if(!input.value.trim()) return;

        const msgs = JSON.parse(localStorage.getItem(chatActivo)) || [];
        msgs.push({ emisor: 'pro', texto: input.value });
        localStorage.setItem(chatActivo, JSON.stringify(msgs));
        
        input.value = '';
        cargarChat();
    }

    // Enter para enviar
    document.getElementById('mensajeInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') enviarMensaje();
    });
</script>

</body>
</html>

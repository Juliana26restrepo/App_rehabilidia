<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajería Profesional - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --p-blue: #103A57; /* Azul Prusiano */
            --t-blue: #307B8E; /* Verde Mughal */
            --bg-main: #F4F7F9; 
            --white: #ffffff; 
            --light-gray: #e0e0e0;
        }
        
        /* 1. ESTRUCTURA CRUCIAL: Obliga al body a ser un Flex Container de altura total */
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        body { display: flex; flex-direction: column; background-color: var(--bg-main); }

        /* HEADER PRINCIPAL */
        header { 
            background: var(--p-blue); 
            color: white; 
            padding: 12px 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            flex-shrink: 0; /* IMPORTANTE: No deja que el header se encoja */
        }
        .btn-volver { color: white; text-decoration: none; font-size: 1.2rem; cursor: pointer; }

        /* CONTENEDOR DE VISTAS */
        .main-container { flex: 1; position: relative; width: 100%; overflow: hidden; }

        /* LISTA DE PACIENTES */
        #lista-chats { position: absolute; width: 100%; height: 100%; background: white; z-index: 5; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .avatar { width: 45px; height: 45px; background: var(--t-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

        /* VENTANA DE CHAT (ESTILO FACEBOOK MESSENGER) */
        #ventana-chat { 
            position: absolute; top: 0; left: 100%; width: 100%; height: 100%; 
            background: #fdfdfd; 
            display: flex; /* Nuevo Flex Container para el chat interno */
            flex-direction: column; 
            transition: 0.3s ease; 
            z-index: 100;
        }
        #ventana-chat.active { left: 0; }

        .chat-header { background: var(--white); color: #333; padding: 10px 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #ddd; flex-shrink: 0; }
        
        /* CONTENEDOR DE MENSAJES QUE SE TRAGABA EL ESPACIO */
        #mensajes-box { 
            flex: 1; /* Esto es la clave: Ocupa todo el espacio sobrante */
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            background-color: #f9f9f9; 
        }
        
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; }
        .msg.pro { align-self: flex-end; background: var(--p-blue); color: white; border-bottom-right-radius: 2px; }
        .msg.paciente { align-self: flex-start; background: var(--t-blue); color: white; border-bottom-left-radius: 2px; }

        /* 2. LA SOLUCIÓN: Barra de escritura fija al fondo con flex-shrink: 0 */
        .input-area { 
            background: white; 
            padding: 8px 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            border-top: 1px solid #ddd;
            flex-shrink: 0; /* NUNCA SE ENCOGE, SIEMPRE VISIBLE */
        }
        
        .input-wrapper { flex: 1; background: #f0f2f5; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; }
        #mensajeInput { flex: 1; border: none; background: transparent; padding: 8px 0; outline: none; font-size: 1rem; }
        
        .btn-enviar { background: var(--p-blue); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* MENÚ OPCIONES */
        .menu-options { 
            position: absolute; top: 55px; right: 10px; background: white; border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 200; 
        }
        .menu-options.active { display: flex; }
        .menu-item { padding: 12px 20px; font-size: 0.9rem; cursor: pointer; color: #333; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <a href="perfil_neuropsicologo.html" class="btn-volver"><i class="fas fa-arrow-left"></i></a>
    <span style="font-weight: bold;">Mensajería Rehabilitidia</span>
</header>

<div class="main-container">
    <div id="lista-chats">
        <div class="chat-item" onclick="abrirChat('Juan Pérez', 'chat_rehabilitidia_juan')">
            <div class="avatar">JP</div>
            <div style="margin-left:15px;">
                <h4 style="margin:0;">Juan Pérez</h4>
                <p id="preview-juan" style="margin:5px 0 0; font-size:0.85rem; color:#888;">Toca para abrir el chat</p>
            </div>
        </div>
    </div>

    <div id="ventana-chat">
        <div class="chat-header">
            <i class="fas fa-arrow-left" style="cursor:pointer;" onclick="cerrarChat()"></i>
            <div class="avatar" style="width: 32px; height: 32px; font-size: 0.8rem; background: var(--t-blue); color: white;">JP</div>
            <div style="flex:1;">
                <div style="font-weight: bold; font-size: 0.9rem;" id="chat-nombre">Juan Pérez</div>
                <div style="font-size: 0.7rem; opacity: 0.8;">En línea</div>
            </div>
            <i class="fas fa-ellipsis-v" style="cursor:pointer; padding: 5px;" onclick="toggleMenu(event)"></i>
        </div>

        <div id="menu-dropdown" class="menu-options">
            <div class="menu-item" onclick="alert('Cámara')"><i class="fas fa-camera"></i> Cámara</div>
            <div class="menu-item" onclick="alert('Audio')"><i class="fas fa-microphone"></i> Audio</div>
            <div class="menu-item" onclick="alert('Archivo')"><i class="fas fa-paperclip"></i> Archivo</div>
        </div>

        <div id="mensajes-box">
            </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="mensajeInput" placeholder="Escribe un mensaje..." autocomplete="off">
            </div>
            <button class="btn-enviar" onclick="enviarMensaje()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
    let chatActivo = '';

    function toggleMenu(e) {
        e.stopPropagation();
        document.getElementById('menu-dropdown').classList.toggle('active');
    }

    function abrirChat(nombre, key) {
        chatActivo = key;
        document.getElementById('chat-nombre').innerText = nombre;
        document.getElementById('ventana-chat').classList.add('active');
        cargarChat();
    }

    function cerrarChat() {
        document.getElementById('ventana-chat').classList.remove('active');
        document.getElementById('menu-dropdown').classList.remove('active');
    }

    function cargarChat() {
        if(!chatActivo) return;
        const box = document.getElementById('mensajes-box');
        const msgs = JSON.parse(localStorage.getItem(chatActivo)) || [];
        box.innerHTML = msgs.map(m => `<div class="msg ${m.emisor}">${m.texto}</div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    function enviarMensaje() {
        const input = document.getElementById('mensajeInput');
        if(!input.value.trim()) return;
        const msgs = JSON.parse(localStorage.getItem(chatActivo)) || [];
        msgs.push({ emisor: 'pro', texto: input.value });
        localStorage.setItem(chatActivo, JSON.stringify(msgs));
        input.value = '';
        cargarChat();
    }
    
    document.getElementById('mensajeInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') enviarMensaje();
    });
</script>

</body>
</html>

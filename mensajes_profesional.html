<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mensajería REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --bg: #F4F7F9; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); overflow: hidden; }

        header { background: var(--p-blue); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }

        /* LISTA DE PACIENTES */
        .pacientes-container { padding: 15px; max-width: 600px; margin: auto; }
        .paciente-card { 
            background: white; padding: 15px; border-radius: 12px; display: flex; align-items: center; 
            gap: 15px; margin-bottom: 10px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* FONDO OSCURO DEL POP-UP */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000;
        }

        /* CAJA DEL CHAT (IGUAL A LA HISTORIA CLÍNICA) */
        .chat-modal {
            background: white; width: 90%; max-width: 450px; height: 85vh;
            border-radius: 25px; display: flex; flex-direction: column; position: relative;
            overflow: hidden; animation: popUp 0.3s ease;
        }

        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* HEADER DEL CHAT (ICONOS ARRIBA) */
        .chat-header { 
            padding: 10px 15px; background: white; border-bottom: 1px solid #eee;
            display: flex; align-items: center; gap: 10px; flex-shrink: 0;
        }

        .action-icons { display: flex; gap: 15px; color: var(--t-blue); cursor: pointer; }

        /* CUERPO DE MENSAJES */
        #mensajes-box { flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 0.9rem; }
        .msg.pro { align-self: flex-end; background: var(--p-blue); color: white; border-bottom-right-radius: 2px; }
        .msg.paciente { align-self: flex-start; background: #e0e0e0; color: #333; border-bottom-left-radius: 2px; }

        /* BARRA DE ESCRIBIR (ICONOS ABAJO) */
        .input-area { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: white; padding: 10px 15px; border-top: 1px solid #eee;
            display: flex; align-items: center; gap: 10px;
        }

        .input-pill { flex: 1; background: #f0f2f5; border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; }
        #mensajeInput { flex: 1; border: none; background: transparent; outline: none; }
        
        .icon-btn { color: #888; cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { color: var(--t-blue); }

        .btn-send { background: var(--p-blue); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        /* SUBMENÚ DE ADJUNTOS ARRIBA */
        .clip-pop { position: absolute; top: 55px; right: 15px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: none; flex-direction: column; z-index: 100; }
        .clip-pop.active { display: flex; }
        .clip-item { padding: 12px 20px; font-size: 0.85rem; cursor: pointer; color: #333; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<header>
    <a href="perfil_neuropsicologo.html" style="color:white;"><i class="fas fa-arrow-left"></i></a>
    <span style="font-weight: bold; margin-left:10px;">Mensajería Profesional</span>
</header>

<div class="pacientes-container">
    <div class="paciente-card" onclick="abrirPopUp('Juan Pérez', 'chat_rehabilitidia_juan')">
        <div style="width:50px; height:50px; background:var(--t-blue); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white;">JP</div>
        <div>
            <strong>Juan Pérez</strong>
            <p style="margin:5px 0 0; font-size:0.8rem; color:#888;">Paciente en fase de atención</p>
        </div>
    </div>
</div>

<div id="chatModal" class="modal-overlay">
    <div class="chat-modal">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:10px; flex:1">
                <div style="width:35px; height:35px; background:var(--p-blue); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:0.8rem;">JP</div>
                <strong id="chatNombrePop">Nombre</strong>
            </div>
            <div class="action-icons">
                <i class="fas fa-paperclip" onclick="toggleClipMenu(event)"></i>
                <i class="fas fa-times" onclick="cerrarChat()" style="color:#aaa;"></i>
            </div>
        </div>

        <div id="clipMenu" class="clip-pop">
            <div class="clip-item" onclick="alert('Abriendo cámara')"><i class="fas fa-camera"></i> Cámara</div>
            <div class="clip-item" onclick="alert('Seleccionar Archivo')"><i class="fas fa-file-alt"></i> Documentos</div>
        </div>

        <div id="mensajes-box"></div>

        <div class="input-area">
            <i class="fas fa-microphone icon-btn" onclick="alert('Grabando Audio...')"></i>
            <div class="input-pill">
                <input type="text" id="mensajeInput" placeholder="Escribe un mensaje..." autocomplete="off">
                <i class="far fa-smile icon-btn" style="margin-left: 10px;"></i>
            </div>
            <button class="btn-send" onclick="enviarMensaje()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
    let keyActiva = '';

    function toggleClipMenu(e) {
        e.stopPropagation();
        document.getElementById('clipMenu').classList.toggle('active');
    }

    function abrirPopUp(nombre, key) {
        keyActiva = key;
        document.getElementById('chatNombrePop').innerText = nombre;
        document.getElementById('chatModal').style.display = 'flex';
        actualizarChat();
    }

    function cerrarChat() {
        document.getElementById('chatModal').style.display = 'none';
        document.getElementById('clipMenu').classList.remove('active');
        keyActiva = '';
    }

    function actualizarChat() {
        if(!keyActiva) return;
        const box = document.getElementById('mensajes-box');
        const data = JSON.parse(localStorage.getItem(keyActiva)) || [];
        box.innerHTML = data.map(m => `
            <div class="msg ${m.emisor}">${m.texto}</div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    function enviarMensaje() {
        const input = document.getElementById('mensajeInput');
        if(!input.value.trim()) return;
        const msgs = JSON.parse(localStorage.getItem(keyActiva)) || [];
        msgs.push({ emisor: 'pro', texto: input.value });
        localStorage.setItem(keyActiva, JSON.stringify(msgs));
        input.value = '';
        actualizarChat();
    }

    // Enter para enviar
    document.getElementById('mensajeInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') enviarMensaje();
    });

    // Cerrar menús al hacer clic fuera
    document.addEventListener('click', () => {
        document.getElementById('clipMenu').classList.remove('active');
    });
    // Revisa mensajes nuevos cada 2 segundos automáticamente
setInterval(() => {
    // Solo actualiza si el chat está abierto (puedes ajustar el ID según tu HTML)
    const modal = document.getElementById('chatModal') || document.getElementById('mChat');
    if (modal && modal.style.display === 'flex') {
        // Llama a tu función de cargar mensajes (cargarM o actualizarChat)
        if (typeof cargarM === "function") cargarM();
        if (typeof actualizarChat === "function") actualizarChat();
    }
}, 2000);
</script>

</body>
</html>

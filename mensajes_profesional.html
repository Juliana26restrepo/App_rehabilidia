<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajería REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --p-blue: #103A57; --t-blue: #307B8E; --bg-chat: #e5ddd5; 
            --white: #ffffff; --green-msg: #DCF8C6; 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #F0F2F5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER ESTILO WHATSAPP */
        header { background: var(--p-blue); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .btn-volver { color: white; text-decoration: none; font-size: 1.2rem; cursor: pointer; }

        .main-container { flex: 1; position: relative; overflow: hidden; }

        /* LISTA DE PACIENTES */
        #lista-chats { width: 100%; height: 100%; overflow-y: auto; background: white; }
        .chat-item { 
            display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f2f2f2; cursor: pointer;
        }
        .chat-item:active { background: #f5f5f5; }
        .avatar { width: 50px; height: 50px; background: #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; }
        .chat-details { flex: 1; margin-left: 15px; border-bottom: 1px solid #f2f2f2; padding-bottom: 10px; }
        .chat-details h4 { margin: 0; font-size: 1rem; color: #000; }
        .chat-details p { margin: 5px 0 0; font-size: 0.85rem; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* VENTANA DE CHAT TIPO WHATSAPP */
        #ventana-chat { 
            position: absolute; top: 0; left: 100%; width: 100%; height: 100%; 
            background: var(--bg-chat); background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            display: flex; flex-direction: column; transition: 0.3s ease; z-index: 100;
        }
        #ventana-chat.active { left: 0; }

        .chat-header { background: var(--p-blue); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }

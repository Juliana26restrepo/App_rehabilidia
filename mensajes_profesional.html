<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajería REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --bg: #F4F7F9; }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); overflow: hidden; }

        /* HEADER */
        header { background: var(--p-blue); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }

        /* LISTA DE PACIENTES */
        .pacientes-container { padding: 15px; max-width: 600px; margin: auto; }
        .paciente-card { 
            background: white; padding: 15px; border-radius: 12px; display: flex; align-items: center; 
            gap: 15px; margin-bottom: 10px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* FONDO OSCURO DEL POP-UP (OVERLAY) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100;
        }

        /* CAJA DEL CHAT (IGUAL A LA HISTORIA CLÍNICA) */
        .chat-modal {
            background: white; width: 90%; max-width: 450px; height: 80vh;
            border-radius: 20px; display: flex; flex-direction: column; position: relative;
            overflow: hidden; animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* HEADER DEL CHAT */
        .chat-header { 
            padding: 15px; background: white; border-bottom: 1px solid #eee;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* CUERPO DE MENSAJES */
        #mensajes-box { 
            flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9;
            display: flex; flex-direction: column; gap: 10px; padding-bottom: 70px;
        }

        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 0.9rem; }
        .msg.pro { align-self: flex-end; background: var(--p-blue); color: white; border-bottom-right-radius: 2px; }
        .msg.paciente { align-self: flex-start; background: #e0e0e0; color: #333; border-bottom-left-radius: 2px; }

        /* BARRA DE ESCRIBIR (ANCLADA AL FONDO DEL MODAL) */
        .input-chat {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: white; padding: 10px; border-top: 1px solid #eee;
            display: flex; align-items: center; gap: 10px;
        }

        .input-chat input {
            flex: 1; border: none; background: #f0f2f5; padding: 10px 15px;
            border-radius: 20px; outline: none;
        }

        .btn-send { 
            background: var(--t-blue); color: white; border: none; 
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <a href="perfil_neuropsicologo.html" style="color:white;"><i class="fas fa-arrow-left"></i></a>
    <span style="font-weight: bold; margin-left:10px;">Mensajería Profesional</span>
</header>

<div class="pacientes-container">
    <div class="paciente-card" onclick="abrirChat('Juan Pérez', 'chat_juan')">
        <div style="width:50px; height:50px; background:var(--t-blue); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white;">JP</div>
        <div>
            <strong style="display:block;">Juan Pérez</strong>
            <span style="font-size:0.8rem; color:#888;">Toca para hablar</span>
        </div>
    </div>
</div>

<div id="chatModal" class="modal-overlay">
    <div class="chat-modal">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:35px; height:35px; background:var(--p-blue); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:0.8rem;">JP</div>
                <strong id="nombreChat">Nombre</strong>
            </div>
            <i class="fas fa-times" onclick="cerrarChat()" style="cursor:pointer; color:#888;"></i>
        </div>

        <div id="mensajes-box"></div>

        <div class="input-chat">
            <input type="text" id="mensajeInput" placeholder="Escribe un mensaje...">
            <button class="btn-send" onclick="enviarMensaje()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
    let chatKey = '';

    function abrirChat(nombre, key) {
        chatKey = key;
        document.getElementById('nombreChat').innerText = nombre;
        document.getElementById('chatModal').style.display = 'flex';
        cargarMensajes();
    }

    function cerrarChat() {
        document.getElementById('chatModal').style.display = 'none';
    }

    function cargarMensajes() {
        const box = document.getElementById('mensajes-box');
        const msgs = JSON.parse(localStorage.getItem(chatKey)) || [];
        box.innerHTML = msgs.map(m => `
            <div class="msg ${m.emisor}">${m.texto}</div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    function enviarMensaje() {
        const input = document.getElementById('mensajeInput');
        if(!input.value.trim()) return;

        const msgs = JSON.parse(localStorage.getItem(chatKey)) || [];
        msgs.push({ emisor: 'pro', texto: input.value });
        localStorage.setItem(chatKey, JSON.stringify(msgs));
        
        input.value = '';
        cargarMensajes();
    }

    // Permitir enviar con Enter
    document.getElementById('mensajeInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') enviarMensaje();
    });
</script>

</body>
</html>

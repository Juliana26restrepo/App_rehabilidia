<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sesión 5: Clasificación de Lavandería - REHABILIDIA</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --bg-gray: #f8f9fa; --success: #16a34a; --gold: #FFD700; }
        
        * { box-sizing: border-box; touch-action: none; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--bg-gray); /* Fondo original restaurado */
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }
        
        #viewport {
            width: 100vw;
            height: 100vh;
            max-width: 1024px;
            max-height: 768px;
            background: var(--bg-gray);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header { 
            width: 100%; padding: 10px 20px; background: var(--p-blue); 
            color: white; display: flex; justify-content: space-between; 
            z-index: 10; font-weight: bold; border-bottom: 3px solid var(--gold);
        }

        #guia-box { 
            width: 95%; margin: 10px auto; background: white; border: 3px solid var(--t-blue); 
            border-radius: 12px; padding: 10px; display: flex; align-items: center; 
            min-height: 70px; z-index: 20; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; border: 2px solid var(--t-blue); }
        #texto-guia { font-size: 0.9rem; font-weight: bold; color: var(--p-blue); margin: 0; flex: 1; }

        #zona-cestos { 
            display: flex; justify-content: space-around; align-items: flex-end; 
            width: 100%; height: 35%; 
            background: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3)), url('Img5/fondo_lavanderia.png') no-repeat center; 
            background-size: cover; border-bottom: 4px solid #ddd; position: relative;
            padding-bottom: 20px;
        }
        
        /* Cesto con área de interacción mejorada */
        .cesto { 
            width: 25%; text-align: center; position: relative; 
            padding: 10px; border-radius: 15px;
        }
        .cesto img { width: 100%; max-width: 120px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        .cesto b { 
            display: block; color: white; text-transform: uppercase; font-size: 0.7rem; 
            margin-top: 5px; background: var(--p-blue); border-radius: 10px; padding: 2px 5px;
        }

        #panel-objetos { 
            flex: 1; background: rgba(255, 255, 255, 0.7); 
            border: 3px dashed var(--t-blue); border-radius: 20px; 
            margin: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
            gap: 15px; padding: 20px; align-content: start; justify-items: center;
        }

        .prenda { 
            width: 70px; height: 70px; cursor: grab; 
            object-fit: contain; z-index: 100; touch-action: none;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
            user-select: none;
        }
        
        .dragging { 
            position: fixed !important; 
            width: 85px !important; height: 85px !important; 
            z-index: 5000 !important; 
            pointer-events: none; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }

        #mosca { position: absolute; width: 40px; display: none; z-index: 500; pointer-events: none; }
        @keyframes volar { 0% {top:15%; left:5%;} 50% {top:45%; left:85%;} 100% {top:15%; left:5%;} }

        #modal-resultados {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999; display: none;
            justify-content: center; align-items: center;
        }
        .resumen-card {
            background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px;
            text-align: center; color: var(--p-blue);
        }
    </style>
</head>
<body>

<div id="viewport">
    <header>
        <div id="nivel-text">NIVEL: 1</div>
        <div id="progreso-text">ACIERTOS: 0/6</div>
    </header>

    <div id="guia-box" onclick="iniciarSesion()">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Juan, toca aquí para empezar a clasificar la ropa.</p>
    </div>

    <div id="zona-cestos">
        <img src="img/D_mosca.png" id="mosca">
    </div>
    
    <div id="panel-objetos"></div>

    <div id="modal-resultados">
        <div class="resumen-card">
            <h2 style="margin:0; color: var(--t-blue)">¡SESIÓN COMPLETADA!</h2>
            <div id="stats-finales" style="text-align: left; margin: 20px 0; font-size: 1.1rem; border-top: 1px solid #eee; padding-top: 15px;"></div>
            <button onclick="location.reload()" style="width:100%; padding:15px; background:var(--p-blue); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">REPETIR</button>
            <button onclick="irAlMenu()" style="width:100%; padding:15px; background:var(--t-blue); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px; cursor:pointer;">CONTINUAR</button>
        </div>
    </div>
</div>

<script>
    let nivelActual = 1, aciertosTotales = 0, erroresTotales = 0, aciertosEnNivel = 0, totalNivel = 0, iniciado = false;
    
    const sonidos = { exito: new Audio("https://actions.google.com/sounds/v1/cartoon/toy_honk.ogg") };

    function hablar(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        msg.rate = 0.95;
        window.speechSynthesis.speak(msg);
        document.getElementById('texto-guia').innerText = txt;
    }

    function iniciarSesion() { if (!iniciado) { iniciado = true; cargarNivel(); } }

    function cargarNivel() {
        const panel = document.getElementById('panel-objetos');
        const zona = document.getElementById('zona-cestos');
        const mosca = document.getElementById('mosca');
        panel.innerHTML = "";
        zona.querySelectorAll('.cesto').forEach(c => c.remove());
        aciertosEnNivel = 0;
        mosca.style.display = 'none';

        let items = [];
        if(nivelActual === 1) {
            totalNivel = 6;
            hablar("Clasifica la ropa blanca y de color.");
            crearCesto('B', 'cesto_blanco.png', 'Blanca');
            crearCesto('C', 'cesto_color.png', 'Color');
            for(let i=1; i<=3; i++) { items.push({img: `b${i}.png`, tipo: 'B'}); items.push({img: `color${i}.png`, tipo: 'C'}); }
        } else if(nivelActual === 2) {
            totalNivel = 6;
            hablar("Nivel 2. Separa blanco y color. Ignora los distractores.");
            crearCesto('B', 'cesto_blanco.png', 'Blanca');
            crearCesto('C', 'cesto_color.png', 'Color');
            for(let i=4; i<=6; i++) { items.push({img: `b${i}.png`, tipo: 'B'}); items.push({img: `color${i}.png`, tipo: 'C'}); }
            for(let i=1; i<=3; i++) items.push({img: `dis${i}.png`, tipo: 'D'});
        } else {
            totalNivel = 9;
            hablar("Nivel final. Usa los tres cestos.");
            mosca.style.display = 'block'; mosca.style.animation = "volar 4s infinite linear";
            crearCesto('B', 'cesto_blanco.png', 'Blanca');
            crearCesto('C', 'cesto_color.png', 'Color');
            crearCesto('T', 'cesto_toallas.png', 'Toallas');
            for(let i=1; i<=3; i++) { items.push({img: `b${i}.png`, tipo: 'B'}); items.push({img: `color${i}.png`, tipo: 'C'}); items.push({img: `to${i}.png`, tipo: 'T'}); }
            for(let i=1; i<=4; i++) items.push({img: `dis${i}.png`, tipo: 'D'});
        }

        document.getElementById('nivel-text').innerText = `NIVEL: ${nivelActual}`;
        document.getElementById('progreso-text').innerText = `ACIERTOS: 0/${totalNivel}`;

        items.sort(() => Math.random() - 0.5).forEach(item => {
            const img = document.createElement('img');
            img.src = `Img5/${item.img}`;
            img.className = 'prenda';
            img.dataset.tipo = item.tipo;
            img.onpointerdown = startDrag;
            panel.appendChild(img);
        });
    }

    function crearCesto(tipo, file, label) {
        const d = document.createElement('div');
        d.className = 'cesto';
        d.id = `cesto-${tipo}`;
        d.innerHTML = `<img src="Img5/${file}"><b>${label}</b>`;
        document.getElementById('zona-cestos').appendChild(d);
    }

    function startDrag(e) {
        const el = e.target;
        const rect = el.getBoundingClientRect();
        const offsetX = (e.clientX || e.touches[0].clientX) - rect.left;
        const offsetY = (e.clientY || e.touches[0].clientY) - rect.top;

        el.classList.add('dragging');

        const moveDrag = (me) => {
            const clientX = me.clientX || (me.touches ? me.touches[0].clientX : 0);
            const clientY = me.clientY || (me.touches ? me.touches[0].clientY : 0);
            el.style.left = (clientX - offsetX) + 'px';
            el.style.top = (clientY - offsetY) + 'px';
        };

        const stopDrag = (se) => {
            el.classList.remove('dragging');
            document.removeEventListener('pointermove', moveDrag);
            document.removeEventListener('pointerup', stopDrag);

            const pRect = el.getBoundingClientRect();
            const centerX = pRect.left + (pRect.width / 2);
            const centerY = pRect.top + (pRect.height / 2);

            const cestoCorrecto = document.getElementById(`cesto-${el.dataset.tipo}`);
            let acierto = false;

            // Si el objeto es ropa (no distractor) y hay un cesto destino
            if (el.dataset.tipo !== 'D' && cestoCorrecto) {
                const cRect = cestoCorrecto.getBoundingClientRect();
                // DETECCIÓN AMPLIA: Si el centro de la prenda entra en el área del cesto (con margen de 50px extra)
                if (centerX > cRect.left - 50 && centerX < cRect.right + 50 &&
                    centerY > cRect.top - 50 && centerY < cRect.bottom + 80) {
                    acierto = true;
                }
            }

            if (acierto) {
                el.remove();
                aciertosEnNivel++;
                aciertosTotales++;
                sonidos.exito.play();
                document.getElementById('progreso-text').innerText = `ACIERTOS: ${aciertosEnNivel}/${totalNivel}`;
                if(aciertosEnNivel === totalNivel) setTimeout(pasarNivel, 1000);
            } else {
                erroresTotales++;
                hablar(el.dataset.tipo === 'D' ? "Eso no es ropa." : "Esa prenda no va ahí.");
                el.style.position = 'static';
            }
        };

        document.addEventListener('pointermove', moveDrag);
        document.addEventListener('pointerup', stopDrag);
    }

    function pasarNivel() { if(nivelActual < 3) { nivelActual++; cargarNivel(); } else { finalizarSesion(); } }

    function finalizarSesion() {
        const eficacia = Math.round((aciertosTotales / (aciertosTotales + erroresTotales)) * 100) || 0;
        const data = { fecha: new Date().toLocaleDateString(), modulo: "Atención", id_sesion: 5, aciertos: aciertosTotales, errores: erroresTotales, eficacia: eficacia + "%" };
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(data));
        document.getElementById('stats-finales').innerHTML = `<b>Aciertos:</b> ${aciertosTotales}<br><b>Errores:</b> ${erroresTotales}<br><b>Eficacia:</b> ${eficacia}%`;
        document.getElementById('modal-resultados').style.display = 'flex';
        hablar("¡Excelente trabajo!");
    }

    function irAlMenu() { window.location.href = "atencion_sesiones.html"; }
</script>
</body>
</html>

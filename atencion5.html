<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 5 - Rehabilitación Cognitiva</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --bg-gray: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-gray); overflow: hidden; touch-action: none; }
        
        #main-stage { display: flex; flex-direction: column; align-items: center; height: 100vh; }
        header { width: 100%; padding: 10px 20px; background: var(--p-blue); color: white; display: flex; justify-content: space-between; box-sizing: border-box; z-index: 10; }

        #guia-box { width: 90%; max-width: 850px; background: white; border: 3px solid var(--t-blue); border-radius: 15px; padding: 12px; display: flex; align-items: center; margin: 10px 0; min-height: 80px; cursor: pointer; z-index: 20; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #avatar { width: 60px; height: 60px; border-radius: 50%; margin-right: 20px; }
        #texto-guia { font-size: 1.1rem; font-weight: bold; color: var(--p-blue); margin: 0; }

        /* ZONA SUPERIOR: FONDO CORREGIDO A Img5 */
        #zona-cestos { 
            display: flex; justify-content: space-around; align-items: flex-end; 
            width: 95%; height: 260px; margin-top: 5px; 
            background: url('Img5/fondo_lavanderia.png') no-repeat center; 
            background-size: cover; border-bottom: 5px solid #ccc; position: relative; border-radius: 15px;
        }
        .cesto { width: 150px; text-align: center; position: relative; padding-bottom: 10px; }
        .cesto img { width: 100%; pointer-events: none; }
        .cesto b { display: block; color: var(--p-blue); text-transform: uppercase; font-size: 0.8rem; margin-top: 5px; background: rgba(255,255,255,0.8); border-radius: 4px; padding: 2px; }

        /* PANEL INFERIOR */
        #panel-objetos { 
            width: 92%; flex-grow: 1; background: #ffffff; border: 4px dashed var(--t-blue); 
            border-radius: 20px; margin: 15px 0 20px 0; display: flex; flex-wrap: wrap; 
            justify-content: center; align-content: center; gap: 15px; padding: 15px;
        }

        .prenda { width: 80px; height: 80px; cursor: grab; object-fit: contain; z-index: 1000; touch-action: none; }
        
        #mosca { position: absolute; width: 50px; display: none; z-index: 500; pointer-events: none; }
        @keyframes volar { 0% {top:10%; left:0%;} 50% {top:60%; left:80%;} 100% {top:10%; left:0%;} }
    </style>
</head>
<body onclick="iniciarSesion()">

<header>
    <div id="nivel-text">NIVEL: 1</div>
    <div id="progreso-text">ACIERTOS: 0/6</div>
</header>

<div id="main-stage">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar" onerror="this.src='https://via.placeholder.com/60'">
        <p id="texto-guia">¡Toca aquí para iniciar la Sesión 5!</p>
    </div>

    <div id="zona-cestos">
        <img src="img/D_mosca.png" id="mosca">
    </div>
    
    <div id="panel-objetos"></div>
</div>

<script>
    let nivelActual = 1, aciertos = 0, totalNivel = 0, iniciado = false;
    
    const sonidos = {
        perro: new Audio("https://actions.google.com/sounds/v1/animals/dog_barking.ogg"),
        ambulancia: new Audio("https://actions.google.com/sounds/v1/emergency/ambulance_siren_distant.ogg"),
        personas: new Audio("https://actions.google.com/sounds/v1/human_voices/crowd_talking.ogg"),
        lavadora: new Audio("https://actions.google.com/sounds/v1/household/washing_machine_cycle.ogg"),
        exito: new Audio("https://actions.google.com/sounds/v1/cartoon/toy_honk.ogg")
    };

    function hablar(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES'; msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
        document.getElementById('texto-guia').innerText = txt;
    }

    function pararAudios() {
        Object.values(sonidos).forEach(s => { s.pause(); s.currentTime = 0; });
    }

    function iniciarSesion() {
        if (!iniciado) { iniciado = true; cargarNivel(); }
    }

    function cargarNivel() {
        const panel = document.getElementById('panel-objetos');
        const zona = document.getElementById('zona-cestos');
        const mosca = document.getElementById('mosca');
        
        panel.innerHTML = "";
        zona.querySelectorAll('.cesto').forEach(c => c.remove());
        pararAudios();
        aciertos = 0;
        mosca.style.display = 'none';

        let items = [];

        // RUTA CORREGIDA A: Img5/ (Con I mayúscula)
        if(nivelActual === 1) {
            totalNivel = 6;
            hablar("Nivel 1: Clasifica ropa blanca y de color. Ignora al perro.");
            sonidos.perro.loop = true; sonidos.perro.play();
            crearCesto('B', 'cesto_blanco.png', 'Blanca');
            crearCesto('C', 'cesto_color.png', 'Color');
            for(let i=1; i<=3; i++) {
                items.push({img: `b${i}.png`, tipo: 'B'});
                items.push({img: `color${i}.png`, tipo: 'C'});
            }
        } 
        else if(nivelActual === 2) {
            totalNivel = 6;
            hablar("Nivel 2: Ignora el perro, la ambulancia y las voces.");
            sonidos.perro.loop = true; sonidos.perro.play();
            sonidos.ambulancia.loop = true; sonidos.ambulancia.play();
            sonidos.personas.loop = true; sonidos.personas.play();
            crearCesto('B', 'cesto_blanco.png', 'Blanca');
            crearCesto('C', 'cesto_color.png', 'Color');
            for(let i=4; i<=6; i++) {
                items.push({img: `b${i}.png`, tipo: 'B'});
                items.push({img: `color${i}.png`, tipo: 'C'});
            }
            for(let i=1; i<=3; i++) items.push({img: `dis${i}.png`, tipo: 'D'});
        }
        else if(nivelActual === 3) {
            totalNivel = 9;
            hablar("Nivel 3: Ignora todos los ruidos y la mosca.");
            sonidos.perro.loop = true; sonidos.perro.play();
            sonidos.ambulancia.loop = true; sonidos.ambulancia.play();
            sonidos.personas.loop = true; sonidos.personas.play();
            sonidos.lavadora.loop = true; sonidos.lavadora.play();
            mosca.style.display = 'block';
            mosca.style.animation = "volar 4s infinite linear";
            crearCesto('B', 'cesto_blanco.png', 'Blanca');
            crearCesto('C', 'cesto_color.png', 'Color');
            crearCesto('T', 'cesto_toallas.png', 'Toallas');
            for(let i=1; i<=3; i++) {
                items.push({img: `b${i}.png`, tipo: 'B'});
                items.push({img: `color${i}.png`, tipo: 'C'});
                items.push({img: `to${i}.png`, tipo: 'T'});
            }
            for(let i=4; i<=8; i++) items.push({img: `dis${i}.png`, tipo: 'D'});
        }

        document.getElementById('nivel-text').innerText = `NIVEL: ${nivelActual}`;
        document.getElementById('progreso-text').innerText = `ACIERTOS: 0/${totalNivel}`;

        items.sort(() => Math.random() - 0.5).forEach(item => {
            const el = document.createElement('img');
            el.src = `Img5/${item.img}`; 
            el.className = 'prenda';
            el.dataset.tipo = item.tipo;
            configurarDrag(el);
            panel.appendChild(el);
        });
    }

    function crearCesto(tipo, file, label) {
        const d = document.createElement('div');
        d.className = 'cesto';
        d.id = `target-${tipo}`;
        d.innerHTML = `<img src="Img5/${file}"><b>${label}</b>`;
        document.getElementById('zona-cestos').appendChild(d);
    }

    function configurarDrag(el) {
        el.ontouchstart = (e) => {
            const parent = el.parentNode;
            el.style.position = 'fixed';
            el.style.zIndex = 2000;

            const move = (me) => {
                let t = me.touches[0];
                el.style.left = (t.clientX - 40) + 'px';
                el.style.top = (t.clientY - 40) + 'px';
            };

            const stop = (se) => {
                document.removeEventListener('touchmove', move);
                document.removeEventListener('touchend', stop);
                let t = se.changedTouches[0];
                
                if(el.dataset.tipo === 'D') {
                    hablar("Eso no es ropa.");
                    reset(); return;
                }

                const target = document.getElementById(`target-${el.dataset.tipo}`);
                if(target) {
                    const r = target.getBoundingClientRect();
                    if(t.clientX > r.left && t.clientX < r.right && t.clientY > r.top && t.clientY < r.bottom) {
                        el.remove();
                        aciertos++;
                        sonidos.exito.play();
                        document.getElementById('progreso-text').innerText = `ACIERTOS: ${aciertos}/${totalNivel}`;
                        if(aciertos === totalNivel) {
                            hablar("¡Nivel superado!");
                            setTimeout(() => {
                                if(nivelActual < 3) { nivelActual++; cargarNivel(); }
                                else { pararAudios(); hablar("Sesión 5 completada."); }
                            }, 2000);
                        }
                        return;
                    }
                }
                reset();
            };

            function reset() { el.style.position = 'static'; parent.appendChild(el); }
            document.addEventListener('touchmove', move);
            document.addEventListener('touchend', stop);
        };
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulos de Entrenamiento - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --prussian-blue: #103A57; --mughal-green: #366B2B; --light-silver: #CEE5D6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light-silver); margin: 0; }
        header { background: var(--prussian-blue); color: white; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .modulo-btn { 
            background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 15px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 8px solid var(--mughal-green);
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" style="color: white; float: left; text-decoration: none;">← Volver</a>
        <strong>Módulos de Entrenamiento</strong>
    </header>
    <div class="container">
        <div class="modulo-btn"><i class="fas fa-eye"></i> Atención (10 Ejercicios)</div>
        <div class="modulo-btn"><i class="fas fa-brain"></i> Memoria (10 Ejercicios)</div>
        <div class="modulo-btn"><i class="fas fa-puzzle-piece"></i> Funciones Ejecutivas (10 Ejercicios)</div>
    </div>
</body>
</html>

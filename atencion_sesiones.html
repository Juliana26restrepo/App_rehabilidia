<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesiones de Atención - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57; --teal-blue: #307B8E; --light-silver: #CEE5D6;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); }
        header { background-color: var(--prussian-blue); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .btn-volver { color: white; text-decoration: none; font-size: 0.9rem; }
        .container { padding: 30px 20px; max-width: 600px; margin: auto; }

        .sesion-card {
            background: white; border-radius: 15px; padding: 18px 25px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 10px solid var(--teal-blue); transition: 0.3s;
        }
        .sesion-card:active { transform: scale(0.98); }
        .sesion-card span { font-weight: bold; font-size: 1rem; color: #333; }

        /* Contenedor de niveles oculto por defecto */
        .niveles-container {
            display: none; background: rgba(255,255,255,0.5); 
            border-radius: 0 0 15px 15px; margin-top: -10px; margin-bottom: 15px; 
            padding: 15px; border: 1px solid #ccc;
        }
        .btn-nivel {
            display: block; width: 100%; padding: 12px; margin-bottom: 8px;
            border-radius: 10px; border: none; font-weight: bold; cursor: pointer;
            text-align: center; text-decoration: none; font-size: 0.9rem;
        }
        .n-bajo { background-color: #366B2B; color: white; }
        .n-medio { background-color: #E67E22; color: white; }
        .n-alto { background-color: #C0392B; color: white; }
        
        .bloqueada { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <a href="ejercicios.html" class="btn-volver">← Volver</a>
    <span style="font-weight: bold; margin-left: 10px;">SESIONES DE ATENCIÓN</span>
</header>

<div class="container">
    
    <div class="sesion-card" onclick="toggleNiveles()">
        <span>SESIÓN 1</span>
        <i id="icono-flecha" class="fas fa-chevron-down" style="color: var(--teal-blue);"></i>
    </div>

    <div id="niveles-1" class="niveles-container">
        <p style="font-size: 0.8rem; margin-bottom: 10px; text-align: center;">Selecciona la dificultad:</p>
        <button class="btn-nivel n-bajo" onclick="location.href='atencion1.html?nivel=bajo'">NIVEL BAJO</button>
        <button class="btn-nivel n-medio" onclick="location.href='atencion1.html?nivel=medio'">NIVEL MEDIO</button>
        <button class="btn-nivel n-alto" onclick="location.href='atencion1.html?nivel=alto'">NIVEL ALTO</button>
    </div>

    <script>
        for(let i=2; i<=10; i++) {
            document.write(`
                <div class="sesion-card bloqueada">
                    <span>SESIÓN ${i}</span>
                    <i class="fas fa-lock" style="color: #999;"></i>
                </div>
            `);
        }
    </script>
</div>

<script>
function toggleNiveles() {
    var x = document.getElementById("niveles-1");
    var icono = document.getElementById("icono-flecha");
    if (x.style.display === "none" || x.style.display === "") {
        x.style.display = "block";
        icono.classList.replace("fa-chevron-down", "fa-chevron-up");
    } else {
        x.style.display = "none";
        icono.classList.replace("fa-chevron-up", "fa-chevron-down");
    }
}
</script>

</body>
</html>

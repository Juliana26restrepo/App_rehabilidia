<div class="container">
    
    <div class="sesion-card" onclick="toggleNiveles()">
        <span>SESIÓN 1</span>
        <i class="fas fa-chevron-down"></i>
    </div>

    <div id="menu-niveles" style="display:none; margin-bottom: 20px; padding-left: 20px;">
        <button onclick="location.href='atencion1.html?nivel=bajo'" style="width:100%; margin-bottom:5px; padding:10px; border:2px solid #366B2B; border-radius:10px; background:white;">Nivel Bajo</button>
        <button onclick="location.href='atencion1.html?nivel=medio'" style="width:100%; margin-bottom:5px; padding:10px; border:2px solid #E67E22; border-radius:10px; background:white;">Nivel Medio</button>
        <button onclick="location.href='atencion1.html?nivel=alto'" style="width:100%; margin-bottom:5px; padding:10px; border:2px solid #C0392B; border-radius:10px; background:white;">Nivel Alto</button>

    <div class="sesion-card bloqueada"><span>SESIÓN 2</span><i class="fas fa-lock"></i></div>
    </div>

<script>
function toggleNiveles() {
    var x = document.getElementById("menu-niveles");
    if (x.style.display === "none") {
        x.style.display = "block";
    } else {
        x.style.display = "none";
    }
}
</script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memoria 6 - Juan (Reconocimiento Verbal)</title>
    <style>
        :root {
            --baby-blue: #E1F5FE;
            --ocean: #0288D1;
            --deep-blue: #01579B;
            --gold: #FFD700;
            --success: #43A047;
            --error: #E53935;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; overflow: hidden; 
            background: var(--baby-blue); 
            text-align: center; color: #2C3E50; 
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        #contenedor-proporcional {
            width: 100vw; height: 100vh;
            max-width: 1200px; max-height: 800px;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        #cabecera { 
            background: rgba(255, 255, 255, 0.7); height: 10%; 
            display: flex; align-items: center; justify-content: center; 
            padding: 0 15px; border-bottom: 3px solid var(--gold); flex-shrink: 0; 
        }

        #instruccion-box { 
            background: white; padding: 10px 20px; border-radius: 30px; 
            color: var(--ocean); display: flex; align-items: center; 
            font-weight: bold; width: 90%; max-width: 650px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-size: clamp(0.8rem, 2.5vw, 1.1rem);
        }
        #instruccion-box img { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; }

        #contenedor-juego { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; width: 100%; padding: 15px; 
        }

        #palabra-display { 
            font-size: clamp(2.5rem, 8vw, 5rem); font-weight: bold; color: var(--deep-blue); 
            background: white; padding: 30px 60px; border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 6px solid var(--ocean); 
            display: none; margin-bottom: 20px; text-transform: uppercase; 
        }

        #ensalada-container { 
            display: none; grid-template-columns: repeat(4, 1fr); 
            gap: 12px; width: 95%; max-width: 1000px; 
        }

        .word-card { 
            background: white; padding: 15px; border-radius: 12px; 
            font-size: clamp(1rem, 2.5vw, 1.4rem); font-weight: bold; 
            cursor: pointer; border: 4px solid #CFD8DC; color: var(--deep-blue); 
            transition: 0.2s; touch-action: manipulation;
        }

        .word-card.correct-hit { background: #C8E6C9 !important; border-color: var(--success) !important; color: #1B5E20; pointer-events: none; }
        .word-card.error-hit { background: #FFCDD2 !important; border-color: var(--error) !important; }

        #pantalla-transicion, #overlay-final { 
            display: none; position: absolute; top:0; left:0; width:100%; height:100%; 
            z-index:2000; flex-direction:column; justify-content:center; align-items:center; color: white; 
        }
        #pantalla-transicion { background: var(--ocean); }
        #overlay-final { background: rgba(1, 87, 155, 0.98); overflow-y: auto; padding: 20px; }

        .cuadro-resultados {
            background: white; color: #2C3E50; padding: 20px; border-radius: 20px;
            width: 95%; max-width: 550px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); text-align: center;
        }

        .tabla-resultados { 
            width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 1.1rem; 
        }
        .tabla-resultados th { background: var(--gold); color: var(--deep-blue); padding: 10px; border: 1px solid #ddd; }
        .tabla-resultados td { padding: 10px; border: 1px solid #ddd; text-align: center; }

        .btn-accion {
            padding: 15px 40px; background: var(--gold); color: var(--deep-blue); 
            border-radius: 20px; font-size: 1.4rem; cursor: pointer; 
            font-weight: bold; border: none; transition: 0.3s; width: 100%;
        }
    </style>
</head>
<body onload="iniciarEntrenamiento()">

<div id="contenedor-proporcional">
    <div id="cabecera">
        <div id="instruccion-box">
            <img src="COTERAPEUTA.JPG">
            <span id="label-guia">Cargando...</span>
        </div>
    </div>

    <div id="contenedor-juego">
        <div id="palabra-display"></div>
        <div id="ensalada-container"></div>
    </div>

    <div id="pantalla-transicion">
        <h1 id="txt-nivel-tit" style="background: var(--gold); color: var(--deep-blue); padding: 10px 40px; border-radius: 50px;"></h1>
        <h2 id="txt-nivel-desc" style="margin-top: 20px;"></h2>
    </div>

    <div id="overlay-final">
        <div class="cuadro-resultados">
            <h1 style="color: var(--ocean); margin-top: 0;">¡SESIÓN FINALIZADA!</h1>
            <table class="tabla-resultados">
                <thead>
                    <tr><th>Nivel</th><th>Aciertos</th><th>Errores</th></tr>
                </thead>
                <tbody id="cuerpo-tabla"></tbody>
            </table>
            <div id="resumen-final-texto"></div>
            <button class="btn-accion" onpointerdown="irAlMenu()">GUARDAR Y FINALIZAR</button>
        </div>
    </div>
</div>

<script>
    const lista = ["Casa", "Perro", "Gato", "Mesa", "Silla", "Agua", "Pan", "Sol", "Luna", "Flor", "Árbol", "Cielo", "Mar", "Río", "Libro", "Lápiz", "Zapato", "Camisa", "Puerta", "Ventana", "Niño", "Niña", "Mamá", "Papá", "Abuelo", "Abuela", "Amigo", "Comida", "Fruta", "Leche", "Queso", "Huevo", "Café", "Té", "Azúcar", "Sal", "Dulce", "Frío", "Calor", "Viento", "Lluvia", "Nube", "Rayo", "Trueno", "Montaña", "Playa", "Isla", "Barco", "Carro", "Moto", "Bus", "Calle", "Camino", "Parque", "Jardín", "Escuela", "Clase", "Tarea", "Juego", "Pelota", "Muñeca", "Robot", "Caja", "Bolsa", "Llave", "Reloj", "Teléfono", "Foto", "Música", "Canción", "Baile", "Risa", "Llanto", "Voz", "Mano", "Pie", "Cabeza", "Ojo", "Boca", "Nariz", "Oreja", "Pelo", "Cara", "Cuerpo", "Salud", "Médico", "Pastilla", "Hospital", "Dolor", "Sueño", "Cama", "Almohada", "Sábana", "Luz", "Oscuro", "Día", "Noche", "Mañana", "Tarde", "Tiempo", "Hora", "Minuto", "Segundo", "Número", "Color", "Rojo", "Azul", "Verde", "Amarillo", "Negro", "Blanco", "Gris", "Rosa", "Morado", "Naranja", "Feliz", "Triste", "Enojado", "Miedo", "Amor", "Paz", "Guerra", "Trabajo", "Dinero", "Banco", "Compra", "Venta", "Mercado", "Tienda", "Precio", "Regalo", "Sorpresa", "Fiesta", "Cumpleaños", "Navidad", "Viaje", "Maleta", "Avión", "Hotel", "Playa", "Campo", "Ciudad", "Pueblo", "Vecino", "Familia", "Historia", "Cuento", "Palabra", "Idioma", "Letra", "Número", "Forma", "Línea", "Punto", "Dibujo", "Pintura", "Arte", "Imagen", "Pantalla", "Computador", "Internet", "Video", "Cámara", "Radio", "Televisión", "Control", "Botón", "Puente", "Torre", "Castillo", "Rey", "Reina", "Príncipe", "Dragón", "Espada", "Escudo", "Héroe", "Villano", "Aventura", "Misterio", "Secreto", "Camino", "Meta", "Sueño", "Idea", "Pensamiento", "Recuerdo", "Olvido", "Atención", "Memoria", "Aprender", "Enseñar", "Escuchar", "Hablar", "Mirar", "Sentir", "Tocar", "Probar", "Oler", "Vivir"];

    let nivel = 1, ronda = 1, objetivo = [], encontrados = 0;
    let aciertosGlobales = 0, erroresGlobales = 0;
    let stats = { 1: { a: 0, e: 0 }, 2: { a: 0, e: 0 }, 3: { a: 0, e: 0 } };

    const config = { 
        1: { n: "Bajo", c: 3, e: 8, r: 3 }, 
        2: { n: "Medio", c: 6, e: 12, r: 3 }, 
        3: { n: "Alto", c: 10, e: 16, r: 3 } 
    };

    function hablar(t, cb) { 
        window.speechSynthesis.cancel(); 
        const m = new SpeechSynthesisUtterance(t); 
        m.lang = 'es-ES'; 
        if(cb) m.onend = cb; 
        window.speechSynthesis.speak(m); 
    }

    function iniciarEntrenamiento() { 
        nivel = 1; ronda = 1; 
        aciertosGlobales = 0; erroresGlobales = 0;
        prepararNivel(); 
    }

    function prepararNivel() { 
        const c = config[nivel]; 
        document.getElementById('txt-nivel-tit').innerText = "NIVEL " + c.n.toUpperCase(); 
        document.getElementById('txt-nivel-desc').innerText = "Memoriza estas " + c.c + " palabras."; 
        document.getElementById('pantalla-transicion').style.display = 'flex'; 
        hablar("Juan, Nivel " + c.n + ". Memoriza las palabras.", () => { 
            setTimeout(() => { 
                document.getElementById('pantalla-transicion').style.display = 'none'; 
                nuevaRonda(); 
            }, 2000); 
        }); 
    }

    function nuevaRonda() { 
        objetivo = []; encontrados = 0; 
        document.getElementById('ensalada-container').style.display = 'none'; 
        let b = [...lista].sort(() => 0.5 - Math.random()); 
        objetivo = b.slice(0, config[nivel].c); 
        mostrarSecuencia(0); 
    }

    function mostrarSecuencia(i) { 
        const d = document.getElementById('palabra-display'); 
        if(i < objetivo.length) { 
            d.innerText = objetivo[i]; d.style.display = 'block'; 
            document.getElementById('label-guia').innerText = "Palabra " + (i+1) + " de " + objetivo.length; 
            hablar(objetivo[i], () => { 
                setTimeout(() => { d.style.display = 'none'; setTimeout(() => mostrarSecuencia(i+1), 400); }, 1200); 
            }); 
        } else { generarEnsalada(); } 
    }

    function generarEnsalada() { 
        const container = document.getElementById('ensalada-container'); 
        container.innerHTML = ""; container.style.display = 'grid'; 
        document.getElementById('label-guia').innerText = "¿Cuáles palabras memorizaste?"; 
        let distractores = lista.filter(p => !objetivo.includes(p)).sort(() => 0.5 - Math.random()).slice(0, config[nivel].e - objetivo.length); 
        let mix = [...objetivo, ...distractores].sort(() => 0.5 - Math.random()); 
        mix.forEach(p => { 
            const card = document.createElement('div'); 
            card.className = 'word-card'; card.innerText = p; 
            card.onpointerdown = () => verificar(p, card); 
            container.appendChild(card); 
        }); 
        hablar("¿Cuáles palabras estaban?");
    }

    function verificar(p, card) {
        if(card.classList.contains('correct-hit') || card.classList.contains('error-hit')) return;
        if(objetivo.includes(p)) {
            card.classList.add('correct-hit');
            encontrados++; aciertosGlobales++; stats[nivel].a++;
            hablar("Bien.");
            if(encontrados === objetivo.length) setTimeout(saltarARonda, 1000); 
        } else {
            card.classList.add('error-hit');
            erroresGlobales++; stats[nivel].e++;
            hablar("No.");
            setTimeout(() => card.classList.remove('error-hit'), 800);
        }
    }

    function saltarARonda() {
        if(ronda < config[nivel].r) { ronda++; nuevaRonda(); } 
        else {
            if(nivel < 3) { nivel++; ronda = 1; prepararNivel(); } 
            else { mostrarResultados(); }
        }
    }

    function mostrarResultados() { 
        const cuerpo = document.getElementById('cuerpo-tabla');
        cuerpo.innerHTML = "";
        for(let n in stats) {
            cuerpo.innerHTML += `<tr><td>${config[n].n}</td><td>${stats[n].a}</td><td>${stats[n].e}</td></tr>`;
        }
        const eficacia = Math.round((aciertosGlobales / (aciertosGlobales + erroresGlobales || 1)) * 100);
        document.getElementById('resumen-final-texto').innerHTML = `<h2 style="color:var(--ocean)">Eficacia: ${eficacia}%</h2>`;
        document.getElementById('overlay-final').style.display = 'flex'; 
        hablar("Muy bien Juan, hemos terminado."); 
    }

    function irAlMenu() {
        const total = aciertosGlobales + erroresGlobales;
        const ef = Math.round((aciertosGlobales / (total || 1)) * 100);
        
        const datosSesion = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Memoria",
            id_sesion: 6,       
            aciertos: aciertosGlobales,
            errores: erroresGlobales,
            eficacia: ef + "%"
        };

        let historial = JSON.parse(localStorage.getItem('sesiones_rehabilitidia')) || []; 
        historial.push(datosSesion); 
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(historial)); 

        window.location.href = "memoria_sesiones.html";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memoria 6 - Juan: Memoria de Trabajo - REHABILIDIA</title>
    <style>
        :root {
            --primary: #5D4037;
            --secondary: #8D6E63;
            --accent: #FFD700;
            --bg: #EFEBE9;
            --success: #2E7D32;
            --error: #C62828;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; 
            background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        
        #contenedor-proporcional {
            width: 100vw; height: 100vh; max-width: 1200px; max-height: 800px;
            background: white; position: relative; display: flex; flex-direction: column; overflow: hidden;
        }

        #cabecera { 
            background: var(--primary); color: white; height: 12%; 
            display: flex; align-items: center; padding: 0 20px; border-bottom: 4px solid var(--accent);
        }

        #instruccion-box { 
            background: white; padding: 10px 25px; border-radius: 30px; 
            color: var(--primary); display: flex; align-items: center; 
            font-weight: bold; font-size: clamp(0.8rem, 2.5vw, 1.2rem);
        }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

        /* Estilos de Juego */
        #display-memorizar { display: none; font-size: 8rem; font-weight: bold; color: var(--primary); }
        
        #panel-reto { display: none; width: 100%; flex-direction: column; align-items: center; }
        
        #teclado { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        
        .btn-num { 
            width: 80px; height: 80px; background: white; border: 4px solid var(--primary);
            border-radius: 15px; font-size: 2rem; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-num:active { transform: scale(0.9); background: var(--accent); }

        #overlay-final { 
            display: none; position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(93, 64, 55, 0.98); 
            z-index: 5000; flex-direction: column; justify-content: center; align-items: center; color: white; 
        }

        .cuadro-resultados {
            background: white; color: var(--primary); padding: 30px; 
            border-radius: 20px; border: 5px solid var(--accent); width: 80%; max-width: 400px; text-align: center;
        }

        .btn-finalizar {
            padding: 15px 40px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-size: 1.4rem; cursor: pointer; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body onload="iniciarSesion()">

<div id="contenedor-proporcional">
    <div id="cabecera">
        <div id="instruccion-box">
            <img src="COTERAPEUTA.JPG">
            <span id="label-guia">Juan, memoriza los números...</span>
        </div>
    </div>

    <div id="contenedor-juego">
        <div id="display-memorizar"></div>
        
        <div id="panel-reto">
            <div id="input-display" style="font-size: 3rem; background: #eee; width: 300px; height: 80px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border: 2px solid var(--primary);"></div>
            <div id="teclado">
                <button class="btn-num" onpointerdown="presionarTecla(1)">1</button>
                <button class="btn-num" onpointerdown="presionarTecla(2)">2</button>
                <button class="btn-num" onpointerdown="presionarTecla(3)">3</button>
                <button class="btn-num" onpointerdown="presionarTecla(4)">4</button>
                <button class="btn-num" onpointerdown="presionarTecla(5)">5</button>
                <button class="btn-num" onpointerdown="presionarTecla(6)">6</button>
                <button class="btn-num" onpointerdown="presionarTecla(7)">7</button>
                <button class="btn-num" onpointerdown="presionarTecla(8)">8</button>
                <button class="btn-num" onpointerdown="presionarTecla(9)">9</button>
                <button class="btn-num" onpointerdown="borrar()">←</button>
                <button class="btn-num" onpointerdown="presionarTecla(0)">0</button>
                <button class="btn-num" onpointerdown="verificarRespuesta()" style="background: var(--success); color: white; border-color: white;">✓</button>
            </div>
        </div>
    </div>

    <div id="overlay-final">
        <div class="cuadro-resultados">
            <h1 style="margin-top: 0;">¡Sesión Exitosa!</h1>
            <div id="resumen-lista" style="font-size: 1.2rem; margin-bottom: 20px;"></div>
            <button class="btn-finalizar" onpointerdown="irAlMenu()">FINALIZAR Y VOLVER</button>
        </div>
    </div>
</div>

<script>
    let secuencia = [];
    let entradaUsuario = "";
    let nivelActual = 2; // Cantidad de números inicial
    let aciertos = 0;
    let errores = 0;
    let intentosPorNivel = 0;

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        if(callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function iniciarSesion() {
        hablar("Juan, observa los números y luego escríbelos.", () => {
            setTimeout(generarSecuencia, 1000);
        });
    }

    function generarSecuencia() {
        secuencia = [];
        entradaUsuario = "";
        actualizarDisplayInput();
        document.getElementById('panel-reto').style.display = 'none';
        document.getElementById('display-memorizar').style.display = 'block';
        
        for(let i=0; i < nivelActual; i++) {
            secuencia.push(Math.floor(Math.random() * 10));
        }
        
        mostrarNumero(0);
    }

    function mostrarNumero(idx) {
        if(idx < secuencia.length) {
            const display = document.getElementById('display-memorizar');
            display.innerText = secuencia[idx];
            
            // Sonar el número
            const audio = new SpeechSynthesisUtterance(secuencia[idx]);
            audio.lang = 'es-ES';
            window.speechSynthesis.speak(audio);

            setTimeout(() => {
                display.innerText = "";
                setTimeout(() => mostrarNumero(idx + 1), 500);
            }, 1000);
        } else {
            prepararInput();
        }
    }

    function prepararInput() {
        document.getElementById('display-memorizar').style.display = 'none';
        document.getElementById('panel-reto').style.display = 'flex';
        hablar("¿Qué números viste?");
    }

    function presionarTecla(n) {
        if(entradaUsuario.length < secuencia.length) {
            entradaUsuario += n;
            actualizarDisplayInput();
        }
    }

    function borrar() {
        entradaUsuario = entradaUsuario.slice(0, -1);
        actualizarDisplayInput();
    }

    function actualizarDisplayInput() {
        document.getElementById('input-display').innerText = entradaUsuario;
    }

    function verificarRespuesta() {
        const respuestaCorrecta = secuencia.join("");
        if(entradaUsuario === respuestaCorrecta) {
            aciertos++;
            hablar("¡Muy bien!");
            subirDificultad();
        } else {
            errores++;
            hablar("No era ese. Intenta con otros números.");
            setTimeout(generarSecuencia, 1500);
        }
    }

    function subirDificultad() {
        intentosPorNivel++;
        if(intentosPorNivel >= 2) { // Cada 2 aciertos sube un número la carga
            nivelActual++;
            intentosPorNivel = 0;
        }
        
        if(nivelActual > 6) { // Finaliza al llegar a 6 números
            finalizar();
        } else {
            setTimeout(generarSecuencia, 1500);
        }
    }

    function finalizar() {
        const ef = Math.round((aciertos / (aciertos + errores || 1)) * 100);
        document.getElementById('resumen-lista').innerHTML = `
            Aciertos: ${aciertos}<br>
            Errores: ${errores}<br>
            Eficacia: ${ef}%
        `;
        document.getElementById('overlay-final').style.display = 'flex';
        hablar("Excelente Juan, hemos terminado por hoy.");
    }

    function irAlMenu() {
        const ef = Math.round((aciertos / (aciertos + errores || 1)) * 100);
        const datos = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Memoria", 
            id_sesion: 6,       
            aciertos: aciertos,
            errores: errores,
            eficacia: ef + "%"
        };

        let historial = JSON.parse(localStorage.getItem('sesiones_rehabilitidia')) || []; 
        historial.push(datos); 
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(historial)); 

        window.location.href = "memoria_sesiones.html";
    }
</script>
</body>
</html>

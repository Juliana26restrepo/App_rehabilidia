<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 6 - Cocina</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --bg-blue: #0A253A; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: white; overflow: hidden; touch-action: none; display: flex; flex-direction: column; height: 100vh; }
        
        #cabecera { background-color: var(--bg-blue); width: 100%; padding: 10px 0; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #guia-box { width: 90%; max-width: 800px; background: white; border: 3px solid var(--t-blue); border-radius: 10px; padding: 10px; display: flex; align-items: center; cursor: pointer; }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; }
        #texto-guia { font-size: 1rem; font-weight: bold; color: var(--p-blue); margin: 0; }
        header { width: 100%; padding: 5px 20px; color: white; display: flex; justify-content: space-between; font-size: 0.8rem; }

        #zona-juego { flex-grow: 1; display: flex; justify-content: space-evenly; align-items: center; padding: 20px; position: relative; }
        .panel { width: 45%; height: 85%; background: white; border: 3px solid #ccc; border-radius: 15px; position: relative; box-shadow: 0 6px 10px rgba(0,0,0,0.1); }

        #panel-mesa { background: url('img6/mesa_plato.png') no-repeat center; background-size: cover; display: flex; justify-content: center; align-items: center; }
        #area-plato { width: 160px; height: 160px; position: relative; border-radius: 50%; }

        .ing-final { position: absolute; width: 65px; height: 65px; object-fit: contain; transform: translate(-50%, -50%); z-index: 30; }

        #panel-ingredientes { display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 15px; padding: 15px; }
        .item { width: 80px; height: 80px; cursor: grab; object-fit: contain; touch-action: none; z-index: 50; }

        .mosca { position: absolute; width: 45px; height: 45px; z-index: 200; pointer-events: none; transition: all 1.2s linear; }
    </style>
</head>
<body onclick="iniciarConAudio()">

<div id="cabecera">
    <header>
        <div id="nivel-text">NIVEL: 1</div>
        <div id="progreso-text">RECETA: 0/3</div>
    </header>
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar" onerror="this.src='https://via.placeholder.com/60'">
        <p id="texto-guia">Toca cualquier parte para iniciar la sesión.</p>
    </div>
</div>

<div id="zona-juego">
    <div class="panel" id="panel-mesa"><div id="area-plato"></div></div>
    <div class="panel" id="panel-ingredientes"></div>
</div>

<script>
    let nivelActual = 1, aciertos = 0, totalObjetivos = 0, iniciado = false;
    let recetaDelDia = [];
    
    // Coordenadas fijas para que NO se apilen
    const posPlato = [
        {t: '50%', l: '50%'}, {t: '30%', l: '50%'}, {t: '70%', l: '50%'}, 
        {t: '50%', l: '30%'}, {t: '50%', l: '70%'}
    ];

    // SONIDOS CON CARGA FORZADA
    const sonidos = {
        bien: new Audio("https://actions.google.com/sounds/v1/household/microwave_done.ogg"),
        mal: new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg"),
        temp: new Audio("https://actions.google.com/sounds/v1/household/kitchen_timer_ticking.ogg"),
        licuadora: new Audio("https://actions.google.com/sounds/v1/household/blender_running.ogg"),
        grito: new Audio("https://actions.google.com/sounds/v1/human_voices/man_short_scream.ogg")
    };

    function hablar(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES'; msg.rate = 0.9;
        document.getElementById('texto-guia').innerText = txt;
        window.speechSynthesis.speak(msg);
    }

    // FUNCIÓN CLAVE: Se activa al primer toque del usuario
    function iniciarConAudio() {
        if (iniciado) return;
        iniciado = true;
        
        // Desbloquear todos los audios simultáneamente
        Object.values(sonidos).forEach(s => {
            s.play(); s.pause(); s.currentTime = 0;
        });
        
        cargarNivel();
    }

    function cargarNivel() {
        const panel = document.getElementById('panel-ingredientes');
        const plato = document.getElementById('area-plato');
        panel.innerHTML = ""; plato.innerHTML = "";
        aciertos = 0;
        
        // Detener bucles de audio
        sonidos.temp.pause(); sonidos.licuadora.pause();
        sonidos.temp.loop = true; sonidos.licuadora.loop = true;

        let pool = [];
        if(nivelActual === 1) {
            totalObjetivos = 3;
            recetaDelDia = ['pan_blanco.png', 'jamon.png', 'queso.png'];
            hablar("¡Hola! Vamos a cocinar. Para esta receta busca: Pan blanco, Jamón y Queso.");
            sonidos.temp.play(); 
            pool = [...recetaDelDia, 'manzana.png', 'platano.png', 'uva.png'];
        } 
        else if(nivelActual === 2) {
            totalObjetivos = 4;
            recetaDelDia = ['pan_integral.png', 'pollo.png', 'tomate.png', 'sal.png'];
            hablar("Nivel 2. Busca estos ingredientes: Pan integral, Pollo, Tomate y Sal.");
            sonidos.temp.play(); sonidos.licuadora.play();
            pool = [...recetaDelDia, 'terrone_azucar.png', 'bicarbonato.png', 'jabon.png', 'pila.png'];
        }
        else if(nivelActual === 3) {
            totalObjetivos = 5;
            recetaDelDia = ['arepa.png', 'huevo.png', 'atun.png', 'aguacate.png', 'cebolla.png'];
            hablar("Nivel final. Busca: Arepa, Huevo, Atún, Aguacate y Cebolla.");
            sonidos.temp.play(); sonidos.licuadora.play();
            setInterval(() => { if(nivelActual === 3) sonidos.grito.play(); }, 8000);
            pool = [...recetaDelDia, 'esponja.png', 'moneda.png', 'fresa.png', 'jabon.png', 'pepino.png'];
            crearMoscas();
        }

        document.getElementById('nivel-text').innerText = `NIVEL: ${nivelActual}`;
        document.getElementById('progreso-text').innerText = `RECETA: 0/${totalObjetivos}`;

        pool.sort(() => Math.random() - 0.5).forEach(img => {
            const el = document.createElement('img');
            el.src = `img6/${img}`; el.className = 'item'; el.dataset.name = img;
            el.ontouchstart = iniciarDrag;
            panel.appendChild(el);
        });
    }

    function iniciarDrag(e) {
        const el = e.target;
        el.style.position = 'fixed';
        const mover = (me) => {
            let t = me.touches[0];
            el.style.left = (t.clientX - 40) + 'px';
            el.style.top = (t.clientY - 40) + 'px';
        };
        const soltar = (se) => {
            document.removeEventListener('touchmove', mover);
            document.removeEventListener('touchend', soltar);
            const t = se.changedTouches[0];
            const pRect = document.getElementById('area-plato').getBoundingClientRect();
            
            if(t.clientX > pRect.left && t.clientX < pRect.right && t.clientY > pRect.top && t.clientY < pRect.bottom) {
                if(recetaDelDia.includes(el.dataset.name)) {
                    sonidos.bien.play(); // Retroalimentación POSITIVA
                    const img = document.createElement('img');
                    img.src = el.src; img.className = 'ing-final';
                    const pos = posPlato[aciertos];
                    img.style.top = pos.t; img.style.left = pos.l;
                    document.getElementById('area-plato').appendChild(img);
                    el.remove(); aciertos++;
                    document.getElementById('progreso-text').innerText = `RECETA: ${aciertos}/${totalObjetivos}`;
                    if(aciertos === totalObjetivos) {
                        setTimeout(() => {
                            if(nivelActual < 3) { nivelActual++; cargarNivel(); }
                            else { hablar("¡Felicidades! Has terminado toda la sesión."); }
                        }, 2000);
                    }
                } else {
                    sonidos.mal.play(); // Retroalimentación NEGATIVA
                    el.style.position = 'static';
                }
            } else { el.style.position = 'static'; }
        };
        document.addEventListener('touchmove', mover);
        document.addEventListener('touchend', soltar);
    }

    function crearMoscas() {
        for(let i=0; i<3; i++) {
            const m = document.createElement('img');
            m.src = 'img6/mosca.png'; m.className = 'mosca';
            m.style.left = '50%'; m.style.top = '50%';
            document.body.appendChild(m);
            setInterval(() => { m.style.left = Math.random()*90+'vw'; m.style.top = Math.random()*90+'vh'; }, 1500);
        }
    }
</script>
</body>
</html>

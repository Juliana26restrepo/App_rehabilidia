<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sesión 6 - Cocina Terapéutica - REHABILIDIA</title>
    <style>
        :root { --p-blue: #0A253A; --t-blue: #307B8E; --bg-light: #eef2f5; --gold: #FFD700; }
        
        * { box-sizing: border-box; touch-action: none; }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; background: var(--bg-light); 
            overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh;
        }

        header { 
            background: var(--p-blue); color: white; padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid var(--gold);
        }

        #guia-box { 
            background: white; width: 95%; max-width: 800px;
            border-radius: 15px; padding: 10px; display: flex; align-items: center; 
            border: 3px solid var(--t-blue); margin: 8px auto; cursor: pointer;
        }
        
        #avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }
        #texto-guia { font-size: 0.9rem; font-weight: bold; color: var(--p-blue); margin: 0; flex: 1; }

        #zona-juego { 
            flex: 1; display: flex; padding: 10px; gap: 10px; height: calc(100vh - 160px);
        }

        .panel { 
            height: 100%; border-radius: 20px; background: white;
            border: 2px solid #cbd5e1; position: relative;
        }

        #panel-mesa { 
            flex: 1.2; 
            background: #ffffff url('img6/mesa_plato.png') no-repeat center center; 
            background-size: contain; 
            display: flex; justify-content: center; align-items: center; 
        }

        #objetivo { 
            width: 220px; height: 220px;
            border: 4px dashed rgba(48, 123, 142, 0.2); border-radius: 50%; 
            position: absolute;
        }

        .ing-plato { position: absolute; width: 75px; height: 75px; transform: translate(-50%, -50%); z-index: 10; }

        #panel-ingredientes { 
            flex: 0.8; display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; padding: 15px; overflow-y: auto; align-content: start; 
        }

        .item { 
            width: 100%; max-width: 85px; aspect-ratio: 1;
            cursor: grab; object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            margin: auto;
        }

        .dragging { 
            position: fixed !important; z-index: 5000 !important; 
            width: 90px !important; height: 90px !important;
            pointer-events: none;
        }

        #modal-resultados {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .cuadro-resumen {
            background: white; padding: 30px; border-radius: 20px; text-align: center;
            max-width: 400px; width: 85%; border: 5px solid var(--t-blue);
        }
    </style>
</head>
<body>

<header>
    <div id="status-nivel">Nivel 1</div>
    <div id="status-puntos">Aciertos: 0</div>
</header>

<div id="guia-box" onclick="iniciarJuego()">
    <img src="COTERAPEUTA.JPG" id="avatar">
    <p id="texto-guia">Juan, toca aquí para empezar a cocinar.</p>
</div>

<div id="zona-juego">
    <div class="panel" id="panel-mesa">
        <div id="objetivo"></div>
        <div id="plato-capa" style="position:absolute; width:100%; height:100%; pointer-events:none;"></div>
    </div>
    <div class="panel" id="panel-ingredientes"></div>
</div>

<div id="modal-resultados">
    <div class="cuadro-resumen">
        <h2 style="color: var(--p-blue)">¡Cocina Terminada!</h2>
        <div id="stats-finales" style="font-size: 1.2rem; margin: 20px 0;"></div>
        <button onclick="location.reload()" style="padding:12px 25px; background:var(--t-blue); color:white; border:none; border-radius:20px; cursor:pointer; font-weight:bold;">REPETIR</button>
    </div>
</div>

<script>
    let nivel = 1, aciertosNivel = 0, totalAciertos = 0, totalErrores = 0, receta = [];
    const posiciones = [{t:'50%',l:'50%'}, {t:'35%',l:'40%'}, {t:'35%',l:'60%'}, {t:'65%',l:'40%'}, {t:'65%',l:'60%'}, {t:'50%',l:'70%'}];
    let iniciado = false;

    function hablar(mensaje) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(mensaje);
        msg.lang = 'es-ES';
        msg.rate = 0.9;
        document.getElementById('texto-guia').innerText = mensaje;
        window.speechSynthesis.speak(msg);
    }

    function iniciarJuego() { if(!iniciado) { iniciado = true; cargarNivel(); } }

    function cargarNivel() {
        const pI = document.getElementById('panel-ingredientes');
        document.getElementById('plato-capa').innerHTML = "";
        pI.innerHTML = ""; aciertosNivel = 0;
        document.getElementById('status-nivel').innerText = `Nivel ${nivel}`;

        let pool = [];
        // Ingredientes según lógica original
        const todasBases = ['pan_blanco.png', 'pan_integral.png', 'galleta.png', 'arepa.png'];
        const todasPros = ['jamon.png', 'queso.png', 'huevo.png', 'pollo.png', 'atun.png'];
        const todosNoCom = ['jabon.png', 'esponja.png', 'moneda.png', 'pila.png'];

        if(nivel === 1) {
            receta = ['pan_blanco.png', 'jamon.png', 'queso.png'];
            hablar("Nivel 1: Haz un sándwich con Pan blanco, Jamón y Queso.");
            pool = [...receta, 'jabon.png', 'manzana.png', 'sal.png'];
        } else if(nivel === 2) {
            receta = ['galleta.png', 'atun.png', 'pepino.png', 'tomate.png'];
            hablar("Nivel 2: Haz galletas con Atún, Pepino y Tomate.");
            pool = [...receta, 'salami.png', 'lechuga.png', 'pila.png', 'moneda.png'];
        } else {
            // NIVEL 3: TODA LA CARGA DE ATENCIÓN
            receta = ['arepa.png', 'huevo.png', 'pollo.png', 'aguacate.png', 'cebolla.png', 'sal.png'];
            hablar("Nivel Final: Arepa completa. ¡Cuidado con lo que no se come!");
            pool = [...todasBases, ...todasPros, ...todosNoCom, 'cebolla.png', 'aguacate.png', 'sal.png', 'tomate.png'];
        }

        // Barajar y mostrar
        [...new Set(pool)].sort(() => Math.random() - 0.5).forEach(img => {
            const el = document.createElement('img');
            el.src = `img6/${img}`; el.className = 'item'; el.dataset.id = img;
            el.onpointerdown = startDrag;
            pI.appendChild(el);
        });
    }

    function startDrag(e) {
        const el = e.target;
        const rect = el.getBoundingClientRect();
        const offsetX = (e.clientX || e.touches[0].clientX) - rect.left;
        const offsetY = (e.clientY || e.touches[0].clientY) - rect.top;

        el.classList.add('dragging');

        const moveDrag = (me) => {
            const cx = me.clientX || me.touches[0].clientX;
            const cy = me.clientY || me.touches[0].clientY;
            el.style.left = (cx - offsetX) + 'px';
            el.style.top = (cy - offsetY) + 'px';
        };

        const stopDrag = (se) => {
            el.classList.remove('dragging');
            window.removeEventListener('pointermove', moveDrag);
            window.removeEventListener('pointerup', stopDrag);

            const fx = se.clientX || (se.changedTouches ? se.changedTouches[0].clientX : 0);
            const fy = se.clientY || (se.changedTouches ? se.changedTouches[0].clientY : 0);
            
            const obj = document.getElementById('objetivo').getBoundingClientRect();

            if(fx > obj.left && fx < obj.right && fy > obj.top && fy < obj.bottom) {
                if(receta.includes(el.dataset.id)) {
                    totalAciertos++; aciertosNivel++;
                    document.getElementById('status-puntos').innerText = `Aciertos: ${totalAciertos}`;
                    
                    const n = document.createElement('img');
                    n.src = el.src; n.className = 'ing-plato';
                    n.style.top = posiciones[aciertosNivel-1].t; n.style.left = posiciones[aciertosNivel-1].l;
                    document.getElementById('plato-capa').appendChild(n);
                    el.remove();

                    if(aciertosNivel === receta.length) {
                        setTimeout(() => { 
                            if(nivel < 3) { nivel++; cargarNivel(); } 
                            else { finalizarSesion(); }
                        }, 1000);
                    }
                } else {
                    totalErrores++;
                    hablar("¡Cuidado Juan! Eso no va en la receta.");
                    el.style.position = 'static';
                }
            } else {
                el.style.position = 'static';
            }
        };

        window.addEventListener('pointermove', moveDrag);
        window.addEventListener('pointerup', stopDrag);
    }

    function finalizarSesion() {
        const eficacia = Math.round((totalAciertos / (totalAciertos + totalErrores)) * 100) || 0;
        document.getElementById('stats-finales').innerHTML = `
            Aciertos: <b>${totalAciertos}</b><br>
            Errores: <b>${totalErrores}</b><br>
            Eficacia: <b>${eficacia}%</b>
        `;
        document.getElementById('modal-resultados').style.display = 'flex';
        hablar("¡Excelente trabajo, Juan! Has completado todas las recetas.");
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sesión 6 - Cocina Terapéutica - REHABILIDIA</title>
    <style>
        :root { --p-blue: #0A253A; --t-blue: #307B8E; --bg-light: #eef2f5; }
        
        * { box-sizing: border-box; touch-action: none; }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; background: var(--bg-light); 
            overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh;
        }

        header { 
            background: var(--p-blue); color: white; padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid #FFD700;
        }

        #guia-box { 
            background: white; width: 95%; max-width: 800px;
            border-radius: 15px; padding: 10px; display: flex; align-items: center; 
            border: 3px solid var(--t-blue); margin: 8px auto;
        }
        
        #avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }
        #texto-guia { font-size: 0.9rem; font-weight: bold; color: var(--p-blue); margin: 0; flex: 1; }

        #zona-juego { 
            flex: 1; display: flex; padding: 10px; gap: 10px; height: calc(100vh - 150px);
        }

        .panel { 
            height: 100%; border-radius: 20px; background: white;
            border: 2px solid #cbd5e1; position: relative;
        }

        #panel-mesa { 
            flex: 1.2; 
            background: #ffffff url('img6/mesa_plato.png') no-repeat center center; 
            background-size: contain; 
            display: flex; justify-content: center; align-items: center; 
        }

        /* Área donde se deben soltar los ingredientes */
        #objetivo { 
            width: 200px; height: 200px;
            border: 4px dashed rgba(48, 123, 142, 0.3); border-radius: 50%; 
            position: absolute;
        }

        .ing-plato { position: absolute; width: 70px; height: 70px; transform: translate(-50%, -50%); z-index: 10; }

        #panel-ingredientes { 
            flex: 0.8; display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; padding: 15px; overflow-y: auto; align-content: start; 
        }

        .item { 
            width: 100%; max-width: 80px; aspect-ratio: 1;
            cursor: grab; object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            margin: auto;
        }

        .dragging { 
            position: fixed !important; z-index: 5000 !important; 
            width: 80px !important; height: 80px !important;
            pointer-events: none;
        }

        #modal-resultados {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .cuadro-resumen {
            background: white; padding: 30px; border-radius: 20px; text-align: center;
            max-width: 400px; width: 80%; border: 5px solid var(--t-blue);
        }
    </style>
</head>
<body>

<header>
    <div>Sesión 6 - Cocina</div>
    <div id="status-puntos">Aciertos: 0</div>
</header>

<div id="guia-box" onclick="iniciarJuego()">
    <img src="COTERAPEUTA.JPG" id="avatar">
    <p id="texto-guia">Juan, toca aquí para empezar a cocinar.</p>
</div>

<div id="zona-juego">
    <div class="panel" id="panel-mesa">
        <div id="objetivo"></div>
        <div id="plato-capa" style="position:absolute; width:100%; height:100%; pointer-events:none;"></div>
    </div>
    <div class="panel" id="panel-ingredientes"></div>
</div>

<div id="modal-resultados">
    <div class="cuadro-resumen">
        <h2>¡Sesión Completada!</h2>
        <div id="stats-finales"></div>
        <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer;">REPETIR</button>
    </div>
</div>

<script>
    let nivel = 1, aciertosNivel = 0, totalAciertos = 0, totalErrores = 0, receta = [];
    const posiciones = [{t:'50%',l:'50%'}, {t:'40%',l:'45%'}, {t:'40%',l:'55%'}, {t:'60%',l:'45%'}, {t:'60%',l:'55%'}, {t:'50%',l:'60%'}];
    let iniciado = false;

    function hablar(mensaje) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(mensaje);
        msg.lang = 'es-ES';
        document.getElementById('texto-guia').innerText = mensaje;
        window.speechSynthesis.speak(msg);
    }

    function iniciarJuego() {
        if(!iniciado) { iniciado = true; cargarNivel(); }
    }

    function cargarNivel() {
        const pI = document.getElementById('panel-ingredientes');
        document.getElementById('plato-capa').innerHTML = "";
        pI.innerHTML = ""; aciertosNivel = 0;

        let pool = [];
        if(nivel === 1) {
            receta = ['pan_blanco.png', 'jamon.png', 'queso.png'];
            hablar("Nivel 1: Pon Pan blanco, Jamón y Queso en el plato.");
            pool = [...receta, 'jabon.png', 'sal.png'];
        } else if(nivel === 2) {
            receta = ['galleta.png', 'atun.png', 'tomate.png'];
            hablar("Nivel 2: Pon Galleta, Atún y Tomate.");
            pool = [...receta, 'pila.png', 'moneda.png'];
        } else {
            receta = ['arepa.png', 'huevo.png', 'pollo.png', 'aguacate.png'];
            hablar("Nivel Final: Haz la arepa completa.");
            pool = ['arepa.png', 'huevo.png', 'pollo.png', 'aguacate.png', 'jabon.png', 'esponja.png'];
        }

        pool.sort(() => Math.random() - 0.5).forEach(img => {
            const el = document.createElement('img');
            el.src = `img6/${img}`; el.className = 'item'; el.dataset.id = img;
            el.onpointerdown = startDrag;
            pI.appendChild(el);
        });
    }

    function startDrag(e) {
        const el = e.target;
        const rect = el.getBoundingClientRect();
        const offsetX = e.clientX - rect.left;
        const offsetY = e.clientY - rect.top;

        el.classList.add('dragging');
        el.style.left = (e.clientX - offsetX) + 'px';
        el.style.top = (e.clientY - offsetY) + 'px';

        function moveDrag(me) {
            el.style.left = (me.clientX - offsetX) + 'px';
            el.style.top = (me.clientY - offsetY) + 'px';
        }

        function stopDrag(se) {
            el.classList.remove('dragging');
            window.removeEventListener('pointermove', moveDrag);
            window.removeEventListener('pointerup', stopDrag);

            const obj = document.getElementById('objetivo').getBoundingClientRect();
            // Verificamos si se soltó sobre el plato
            if(se.clientX > obj.left && se.clientX < obj.right && se.clientY > obj.top && se.clientY < obj.bottom) {
                if(receta.includes(el.dataset.id)) {
                    totalAciertos++; aciertosNivel++;
                    document.getElementById('status-puntos').innerText = `Aciertos: ${totalAciertos}`;
                    
                    const n = document.createElement('img');
                    n.src = el.src; n.className = 'ing-plato';
                    n.style.top = posiciones[aciertosNivel-1].t; n.style.left = posiciones[aciertosNivel-1].l;
                    document.getElementById('plato-capa').appendChild(n);
                    el.remove();

                    if(aciertosNivel === receta.length) {
                        setTimeout(() => { 
                            if(nivel < 3) { nivel++; cargarNivel(); } 
                            else { finalizarSesion(); }
                        }, 1000);
                    }
                } else {
                    totalErrores++;
                    hablar("Ese no es un ingrediente de la receta.");
                    el.style.position = 'static';
                }
            } else {
                el.style.position = 'static';
            }
        }

        window.addEventListener('pointermove', moveDrag);
        window.addEventListener('pointerup', stopDrag);
    }

    function finalizarSesion() {
        const eficacia = Math.round((totalAciertos / (totalAciertos + totalErrores)) * 100) || 0;
        document.getElementById('stats-finales').innerHTML = `Aciertos: ${totalAciertos}<br>Errores: ${totalErrores}<br>Eficacia: ${eficacia}%`;
        document.getElementById('modal-resultados').style.display = 'flex';
        hablar("¡Excelente Juan! El plato está listo.");
    }
</script>
</body>
</html>

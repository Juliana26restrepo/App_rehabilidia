<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 6 - Cocina Final</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; overflow: hidden; touch-action: none; display: flex; flex-direction: column; height: 100vh; }
        #cabecera { background: #0A253A; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #guia-box { background: white; color: #103A57; width: 90%; border-radius: 10px; padding: 12px; display: flex; align-items: center; border: 4px solid #307B8E; }
        #avatar { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; }
        #texto-guia { font-size: 1.1rem; font-weight: bold; margin: 0; }
        #zona-juego { flex-grow: 1; display: flex; justify-content: space-around; align-items: center; padding: 10px; }
        .panel { width: 46%; height: 85%; border: 3px solid #ccc; position: relative; border-radius: 20px; overflow: hidden; }
        #panel-mesa { background: url('img6/mesa_plato.png') no-repeat center; background-size: cover; display: flex; justify-content: center; align-items: center; }
        #objetivo { width: 160px; height: 160px; border: 6px dashed #00FFFF; border-radius: 50%; position: absolute; pointer-events: none; }
        .ing-plato { position: absolute; width: 85px; height: 85px; transform: translate(-50%, -50%); z-index: 10; }
        #panel-ingredientes { display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 12px; }
        .item { width: 95px; height: 95px; touch-action: none; z-index: 100; cursor: grab; }
        .mosca { position: absolute; width: 40px; height: 40px; z-index: 500; pointer-events: none; transition: all 1s linear; }
    </style>
</head>
<body onload="cargarNivel()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Toca un ingrediente para iniciar.</p>
    </div>
</div>

<div id="zona-juego">
    <div class="panel" id="panel-mesa">
        <div id="objetivo"></div>
        <div id="plato-capa" style="position:absolute; width:100%; height:100%;"></div>
    </div>
    <div class="panel" id="panel-ingredientes"></div>
</div>

<script>
    let nivel = 1, aciertos = 0, receta = [];
    const posiciones = [{t:'50%',l:'50%'}, {t:'35%',l:'40%'}, {t:'35%',l:'60%'}, {t:'65%',l:'40%'}, {t:'65%',l:'60%'}];
    
    const frasesCorrecto = ["¡Bien! Ese era", "Correcto", "¡Muy bien!", "Ese es el ingrediente"];
    const frasesIncorrecto = ["No, ese no es", "Incorrecto", "Prueba con otro", "Ese no va en la receta"];

    // --- AUDIOS LOCALES CON VOLUMEN REGULADO (15-20%) ---
    const sonidosDistractores = {
        reloj: new Audio("img6/reloj.mp3"),
        licuadora: new Audio("img6/licuadora.mp3"),
        grito: new Audio("img6/grito.mp3"),
        moscas: new Audio("img6/moscas.mp3")
    };

    // Configuración de volumen solicitada
    sonidosDistractores.reloj.volume = 0.15;
    sonidosDistractores.licuadora.volume = 0.15;
    sonidosDistractores.moscas.volume = 0.15;
    sonidosDistractores.grito.volume = 0.20; // Ligeramente más alto por ser un pico de sonido

    let ruidosIniciados = false;

    function hablar(mensaje) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(mensaje);
        msg.lang = 'es-ES';
        msg.rate = 1.0;
        msg.volume = 1.0; 
        document.getElementById('texto-guia').innerText = mensaje;
        window.speechSynthesis.speak(msg);
    }

    function gestionarRuidos() {
        Object.values(sonidosDistractores).forEach(s => { s.pause(); s.currentTime = 0; s.loop = true; });

        if (nivel === 1) {
            sonidosDistractores.reloj.play();
        } else if (nivel === 2) {
            sonidosDistractores.reloj.play();
            sonidosDistractores.licuadora.play();
        } else if (nivel === 3) {
            sonidosDistractores.reloj.play();
            sonidosDistractores.licuadora.play();
            sonidosDistractores.moscas.play();
            if(!window.intGrito) window.intGrito = setInterval(() => { if(nivel === 3) sonidosDistractores.grito.play(); }, 12000);
            crearMoscasVisuales();
        }
    }

    function crearMoscasVisuales() {
        for(let i=0; i<4; i++) {
            const m = document.createElement('img');
            m.src = 'img6/mosca.png'; m.className = 'mosca';
            m.style.left = Math.random()*80+'%'; m.style.top = Math.random()*80+'%';
            document.body.appendChild(m);
            setInterval(() => { 
                m.style.left = Math.random()*90+'%'; 
                m.style.top = Math.random()*90+'%'; 
            }, 1500);
        }
    }

    function cargarNivel() {
        const pI = document.getElementById('panel-ingredientes');
        document.getElementById('plato-capa').innerHTML = "";
        pI.innerHTML = "";
        aciertos = 0;
        document.querySelectorAll('.mosca').forEach(m => m.remove());

        let pool = [];
        if(nivel === 1) {
            receta = ['pan_blanco.png', 'jamon.png', 'queso.png'];
            hablar("Busca: Pan blanco, Jamón y Queso.");
            pool = [...receta, 'manzana.png', 'platano.png'];
        } else if(nivel === 2) {
            receta = ['pan_integral.png', 'pollo.png', 'tomate.png', 'sal.png'];
            hablar("Busca: Pan integral, Pollo, Tomate y Sal.");
            pool = [...receta, 'jabon.png', 'pila.png'];
        } else {
            receta = ['arepa.png', 'huevo.png', 'atun.png', 'aguacate.png', 'cebolla.png'];
            hablar("Busca: Arepa, Huevo, Atún, Aguacate y Cebolla.");
            pool = [...receta, 'moneda.png', 'fresa.png'];
        }

        if(ruidosIniciados) gestionarRuidos();

        pool.sort(() => Math.random() - 0.5).forEach(img => {
            const el = document.createElement('img');
            el.src = `img6/${img}`; el.className = 'item'; el.dataset.id = img;
            el.ontouchstart = drag;
            pI.appendChild(el);
        });
    }

    function drag(e) {
        if(!ruidosIniciados) {
            ruidosIniciados = true;
            gestionarRuidos();
        }

        const el = e.target;
        el.style.position = 'fixed';
        const mover = (me) => {
            el.style.left = (me.touches[0].clientX - 45) + 'px';
            el.style.top = (me.touches[0].clientY - 45) + 'px';
        };
        const soltar = (se) => {
            document.removeEventListener('touchmove', mover);
            document.removeEventListener('touchend', soltar);
            const t = se.changedTouches[0];
            const obj = document.getElementById('objetivo').getBoundingClientRect();

            if(t.clientX > obj.left && t.clientX < obj.right && t.clientY > obj.top && t.clientY < obj.bottom) {
                if(receta.includes(el.dataset.id)) {
                    hablar(frasesCorrecto[Math.floor(Math.random() * frasesCorrecto.length)]);
                    const n = document.createElement('img');
                    n.src = el.src; n.className = 'ing-plato';
                    n.style.top = posiciones[aciertos].t; n.style.left = posiciones[aciertos].l;
                    document.getElementById('plato-capa').appendChild(n);
                    el.remove(); aciertos++;
                    if(aciertos === receta.length) {
                        setTimeout(() => { if(nivel < 3) { nivel++; cargarNivel(); } else hablar("¡Excelente, terminaste!"); }, 2000);
                    }
                } else {
                    hablar(frasesIncorrecto[Math.floor(Math.random() * frasesIncorrecto.length)]);
                    el.style.position = 'static';
                }
            } else { el.style.position = 'static'; }
        };
        document.addEventListener('touchmove', mover);
        document.addEventListener('touchend', soltar);
    }
</script>
</body>
</html>

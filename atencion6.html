<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 6 - Cocina Terapéutica</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --bg-blue: #0A253A; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: white; overflow: hidden; touch-action: none; display: flex; flex-direction: column; height: 100vh; }
        
        #cabecera { background-color: var(--bg-blue); width: 100%; padding: 10px 0; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #guia-box { width: 90%; max-width: 800px; background: white; border: 3px solid var(--t-blue); border-radius: 10px; padding: 10px; display: flex; align-items: center; cursor: pointer; }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; }
        #texto-guia { font-size: 1rem; font-weight: bold; color: var(--p-blue); margin: 0; }
        header { width: 100%; padding: 5px 20px; color: white; display: flex; justify-content: space-between; font-size: 0.8rem; }

        #zona-juego { flex-grow: 1; display: flex; justify-content: space-evenly; align-items: center; padding: 20px; background-color: white; position: relative; }
        .panel { width: 45%; height: 85%; background: white; border: 3px solid #ccc; border-radius: 15px; display: flex; justify-content: center; align-items: center; position: relative; box-shadow: 0 6px 10px rgba(0,0,0,0.1); overflow: hidden; }

        #panel-mesa { background-image: url('img6/mesa_plato.png'); background-size: cover; background-position: center; }
        
        /* MARCA VISUAL CENTRADA */
        #area-plato { 
            width: 150px; height: 150px; border-radius: 50%; 
            background: rgba(0, 255, 255, 0.05); 
            border: 3px dashed rgba(0, 255, 255, 0.4); 
            position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5; pointer-events: none;
        }

        #contenedor-comida { position: absolute; width: 150px; height: 150px; top: 52%; left: 50%; transform: translate(-50%, -50%); z-index: 20; pointer-events: none; }
        .ing-final { position: absolute; width: 65px; height: 65px; object-fit: contain; transform: translate(-50%, -50%); transition: all 0.3s ease-out; }

        #panel-ingredientes { display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 12px; padding: 15px; }
        .item { width: 75px; height: 75px; cursor: grab; object-fit: contain; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1)); touch-action: none; z-index: 50; }

        .mosca { position: absolute; width: 45px; height: 45px; z-index: 200; pointer-events: none; transition: all 1.2s linear; }
    </style>
</head>
<body onclick="iniciarApp()">

<div id="cabecera">
    <header>
        <div id="nivel-text">NIVEL: 1</div>
        <div id="progreso-text">RECETA: 0/3</div>
    </header>
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar" onerror="this.src='https://via.placeholder.com/60'">
        <p id="texto-guia">Toca aquí para que el terapeuta te dé la receta.</p>
    </div>
</div>

<div id="zona-juego">
    <div class="panel" id="panel-mesa">
        <div id="area-plato"></div>
        <div id="contenedor-comida"></div>
    </div>
    <div class="panel" id="panel-ingredientes"></div>
</div>

<script>
    let nivelActual = 1, aciertos = 0, totalObjetivos = 0, appIniciada = false;
    let recetaDelDia = [];
    
    // Coordenadas para distribuir ingredientes en el plato (formato % dentro del contenedor-comida)
    const puntosDistribucion = [
        {x: 50, y: 50}, // Centro
        {x: 30, y: 40}, // Superior Izquierda
        {x: 70, y: 40}, // Superior Derecha
        {x: 35, y: 70}, // Inferior Izquierda
        {x: 65, y: 70}  // Inferior Derecha
    ];

    const sonidos = {
        exito: new Audio("https://actions.google.com/sounds/v1/household/microwave_done.ogg"),
        error: new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg"),
        temporizador: new Audio("https://actions.google.com/sounds/v1/household/kitchen_timer_ticking.ogg"),
        licuadora: new Audio("https://actions.google.com/sounds/v1/household/blender_running.ogg"),
        grito: new Audio("https://actions.google.com/sounds/v1/human_voices/man_short_scream.ogg")
    };

    function hablar(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES'; msg.rate = 0.95;
        window.speechSynthesis.speak(msg);
        document.getElementById('texto-guia').innerText = txt;
    }

    function pararAudios() { Object.values(sonidos).forEach(s => { s.pause(); s.currentTime = 0; }); }

    function iniciarApp() { 
        if (!appIniciada) { 
            appIniciada = true;
            // Forzar carga/desbloqueo de sonidos
            Object.values(sonidos).forEach(s => { s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {}); });
            cargarNivel(); 
        } 
    }

    function cargarNivel() {
        const panelIngredientes = document.getElementById('panel-ingredientes');
        document.getElementById('contenedor-comida').innerHTML = "";
        panelIngredientes.innerHTML = "";
        document.querySelectorAll('.mosca').forEach(m => m.remove());
        aciertos = 0;
        pararAudios();

        let poolVisual = [];

        if(nivelActual === 1) {
            totalObjetivos = 3;
            recetaDelDia = ['pan_blanco.png', 'jamon.png', 'queso.png'];
            hablar("¡Hola! Vamos a cocinar. Para esta receta busca: Pan blanco, Jamón y Queso.");
            sonidos.temporizador.loop = true; setTimeout(() => sonidos.temporizador.play(), 500);
            poolVisual = [...recetaDelDia, 'manzana.png', 'platano.png', 'uva.png'];
        } 
        else if(nivelActual === 2) {
            totalObjetivos = 4;
            recetaDelDia = ['pan_integral.png', 'pollo.png', 'tomate.png', 'sal.png'];
            hablar("Bienvenido al nivel 2. Necesito que busques: Pan integral, Pollo, Tomate y Sal.");
            sonidos.temporizador.loop = true; sonidos.temporizador.play();
            sonidos.licuadora.loop = true; setTimeout(() => sonidos.licuadora.play(), 1000);
            poolVisual = [...recetaDelDia, 'terrone_azucar.png', 'bicarbonato.png', 'jabon.png', 'pila.png'];
        }
        else if(nivelActual === 3) {
            totalObjetivos = 5;
            recetaDelDia = ['arepa.png', 'huevo.png', 'atun.png', 'aguacate.png', 'cebolla.png'];
            hablar("Nivel final. Por favor, busca estos ingredientes: Arepa, Huevo, Atún, Aguacate y Cebolla.");
            sonidos.temporizador.loop = true; sonidos.temporizador.play();
            sonidos.licuadora.loop = true; sonidos.licuadora.play();
            // El grito sonará aleatoriamente para asustar/distraer
            setInterval(() => { if(nivelActual === 3) sonidos.grito.play(); }, 8000);
            poolVisual = [...recetaDelDia, 'esponja.png', 'moneda.png', 'fresa.png', 'jabon.png', 'pepino.png'];
            crearMoscas();
        }

        document.getElementById('nivel-text').innerText = `NIVEL: ${nivelActual}`;
        document.getElementById('progreso-text').innerText = `RECETA: 0/${totalObjetivos}`;

        poolVisual.sort(() => Math.random() - 0.5).forEach(imgName => {
            const img = document.createElement('img');
            img.src = `img6/${imgName}`; img.className = 'item'; img.dataset.name = imgName;
            drag(img);
            panelIngredientes.appendChild(img);
        });
    }

    function crearMoscas() {
        for(let i=0; i<3; i++) {
            const m = document.createElement('img');
            m.src = 'img6/mosca.png'; m.className = 'mosca';
            m.style.left = '50%'; m.style.top = '50%';
            document.getElementById('zona-juego').appendChild(m);
            moverMosca(m);
        }
    }

    function moverMosca(m) {
        setInterval(() => { m.style.left = Math.random() * 85 + 'vw'; m.style.top = Math.random() * 85 + 'vh'; }, 1200);
    }

    function drag(el) {
        el.ontouchstart = (e) => {
            el.style.position = 'fixed'; el.style.zIndex = 1000;
            const move = (me) => {
                let t = me.touches[0];
                el.style.left = (t.clientX - 35) + 'px'; el.style.top = (t.clientY - 35) + 'px';
            };
            const stop = (se) => {
                document.removeEventListener('touchmove', move);
                document.removeEventListener('touchend', stop);
                let t = se.changedTouches[0];
                const meta = document.getElementById('area-plato').getBoundingClientRect();
                
                if(t.clientX > meta.left && t.clientX < meta.right && t.clientY > meta.top && t.clientY < meta.bottom) {
                    if(recetaDelDia.includes(el.dataset.name)) {
                        colocarOrganizado(el.src);
                        el.remove(); aciertos++; sonidos.exito.play();
                        document.getElementById('progreso-text').innerText = `RECETA: ${aciertos}/${totalObjetivos}`;
                        if(aciertos === totalObjetivos) {
                            hablar("¡Excelente receta! Has trabajado muy bien.");
                            setTimeout(() => { if(nivelActual < 3) { nivelActual++; cargarNivel(); } }, 2500);
                        }
                    } else { sonidos.error.play(); reset(); }
                } else { reset(); }
            };
            function reset() { el.style.position = 'static'; document.getElementById('panel-ingredientes').appendChild(el); }
            document.addEventListener('touchmove', move);
            document.addEventListener('touchend', stop);
        };
    }

    function colocarOrganizado(src) {
        const img = document.createElement('img');
        img.src = src;
        img.className = 'ing-final';
        // Usar un punto de distribución basado en cuántos ingredientes ya hay
        const punto = puntosDistribucion[aciertos] || puntosDistribucion[0];
        img.style.left = punto.x + "%";
        img.style.top = punto.y + "%";
        document.getElementById('contenedor-comida').appendChild(img);
    }
</script>
</body>
</html>

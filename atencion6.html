<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 6 - Cocina Terapéutica</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --bg-blue: #0A253A; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f0f0f0; overflow: hidden; touch-action: none; display: flex; flex-direction: column; height: 100vh; }
        
        /* PANTALLA DE INICIO PARA ACTIVAR AUDIO */
        #overlay-inicio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-blue); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        #btn-comenzar { background: #ff9800; border: none; padding: 20px 40px; border-radius: 10px; color: white; font-size: 1.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        #cabecera { background-color: var(--bg-blue); width: 100%; padding: 10px 0; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #guia-box { width: 90%; max-width: 800px; background: white; border: 3px solid var(--t-blue); border-radius: 10px; padding: 10px; display: flex; align-items: center; }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; }
        #texto-guia { font-size: 1.1rem; font-weight: bold; color: var(--p-blue); margin: 0; }
        header { width: 100%; padding: 5px 20px; color: white; display: flex; justify-content: space-between; font-size: 0.9rem; }

        #zona-juego { flex-grow: 1; display: flex; justify-content: space-evenly; align-items: center; padding: 20px; position: relative; }
        .panel { width: 45%; height: 85%; background: white; border: 3px solid #ccc; border-radius: 15px; position: relative; box-shadow: 0 6px 10px rgba(0,0,0,0.1); overflow: hidden; }

        #panel-mesa { background-image: url('img6/mesa_plato.png'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; }
        
        /* ÁREA DEL PLATO Y CONTENEDOR DE INGREDIENTES */
        #area-plato { width: 180px; height: 180px; position: relative; border-radius: 50%; border: 2px dashed rgba(0, 255, 255, 0.5); }
        .ing-final { position: absolute; width: 65px; height: 65px; object-fit: contain; transform: translate(-50%, -50%); transition: all 0.5s ease; z-index: 30; }

        #panel-ingredientes { display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 15px; padding: 15px; }
        .item { width: 80px; height: 80px; cursor: grab; object-fit: contain; touch-action: none; z-index: 50; }

        .mosca { position: absolute; width: 45px; height: 45px; z-index: 200; pointer-events: none; }
    </style>
</head>
<body>

<div id="overlay-inicio">
    <h1 style="margin-bottom: 20px;">Sesión 6: Atención en la Cocina</h1>
    <button id="btn-comenzar" onclick="activarYEmpezar()">EMPEZAR SESIÓN</button>
    <p style="margin-top: 20px; font-size: 0.9rem;">(Esto activa los sonidos de la terapia)</p>
</div>

<div id="cabecera">
    <header>
        <div id="nivel-text">NIVEL: 1</div>
        <div id="progreso-text">RECETA: 0/3</div>
    </header>
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar" onerror="this.src='https://via.placeholder.com/60'">
        <p id="texto-guia">Cargando instrucciones...</p>
    </div>
</div>

<div id="zona-juego">
    <div class="panel" id="panel-mesa">
        <div id="area-plato"></div>
    </div>
    <div class="panel" id="panel-ingredientes"></div>
</div>

<script>
    let nivelActual = 1, aciertos = 0, totalObjetivos = 0;
    let recetaDelDia = [];
    
    // Coordenadas fijas en el plato para evitar que se junten (x, y en %)
    const posicionesFijas = [
        {x: 50, y: 50}, // Centro
        {x: 50, y: 25}, // Arriba
        {x: 50, y: 75}, // Abajo
        {x: 25, y: 50}, // Izquierda
        {x: 75, y: 50}  // Derecha
    ];

    const sonidos = {
        exito: new Audio("https://actions.google.com/sounds/v1/household/microwave_done.ogg"),
        error: new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg"),
        temporizador: new Audio("https://actions.google.com/sounds/v1/household/kitchen_timer_ticking.ogg"),
        licuadora: new Audio("https://actions.google.com/sounds/v1/household/blender_running.ogg"),
        grito: new Audio("https://actions.google.com/sounds/v1/human_voices/man_short_scream.ogg")
    };

    function hablar(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES'; msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
        document.getElementById('texto-guia').innerText = txt;
    }

    function activarYEmpezar() {
        document.getElementById('overlay-inicio').style.display = 'none';
        // Desbloqueo forzado de todos los audios
        for (let s in sonidos) {
            sonidos[s].play().then(() => { sonidos[s].pause(); sonidos[s].currentTime = 0; }).catch(() => {});
        }
        cargarNivel();
    }

    function cargarNivel() {
        const panel = document.getElementById('panel-ingredientes');
        const plato = document.getElementById('area-plato');
        panel.innerHTML = "";
        plato.innerHTML = "";
        document.querySelectorAll('.mosca').forEach(m => m.remove());
        aciertos = 0;
        
        // Detener sonidos previos
        sonidos.temporizador.pause(); sonidos.licuadora.pause();

        let pool = [];
        if(nivelActual === 1) {
            totalObjetivos = 3;
            recetaDelDia = ['pan_blanco.png', 'jamon.png', 'queso.png'];
            hablar("¡Hola! Vamos a cocinar. Pon en el plato: Pan blanco, Jamón y Queso.");
            sonidos.temporizador.loop = true; sonidos.temporizador.play();
            pool = [...recetaDelDia, 'manzana.png', 'platano.png', 'uva.png'];
        } 
        else if(nivelActual === 2) {
            totalObjetivos = 4;
            recetaDelDia = ['pan_integral.png', 'pollo.png', 'tomate.png', 'sal.png'];
            hablar("Nivel 2. Por favor, busca: Pan integral, Pollo, Tomate y Sal.");
            sonidos.temporizador.loop = true; sonidos.temporizador.play();
            sonidos.licuadora.loop = true; sonidos.licuadora.play();
            pool = [...recetaDelDia, 'terrone_azucar.png', 'bicarbonato.png', 'jabon.png', 'pila.png'];
        }
        else if(nivelActual === 3) {
            totalObjetivos = 5;
            recetaDelDia = ['arepa.png', 'huevo.png', 'atun.png', 'aguacate.png', 'cebolla.png'];
            hablar("Nivel 3. Busca estos ingredientes: Arepa, Huevo, Atún, Aguacate y Cebolla.");
            sonidos.temporizador.loop = true; sonidos.temporizador.play();
            sonidos.licuadora.loop = true; sonidos.licuadora.play();
            setInterval(() => { if(nivelActual === 3) sonidos.grito.play(); }, 10000);
            pool = [...recetaDelDia, 'esponja.png', 'moneda.png', 'fresa.png', 'jabon.png', 'pepino.png'];
            crearMoscas();
        }

        document.getElementById('nivel-text').innerText = `NIVEL: ${nivelActual}`;
        document.getElementById('progreso-text').innerText = `RECETA: 0/${totalObjetivos}`;

        pool.sort(() => Math.random() - 0.5).forEach(img => {
            const el = document.createElement('img');
            el.src = `img6/${img}`; el.className = 'item'; el.dataset.name = img;
            configurarDrag(el);
            panel.appendChild(el);
        });
    }

    function configurarDrag(el) {
        el.ontouchstart = (e) => {
            el.style.position = 'fixed'; el.style.zIndex = 1000;
            const mover = (me) => {
                let t = me.touches[0];
                el.style.left = (t.clientX - 40) + 'px'; el.style.top = (t.clientY - 40) + 'px';
            };
            const soltar = (se) => {
                document.removeEventListener('touchmove', mover);
                document.removeEventListener('touchend', soltar);
                const t = se.changedTouches[0];
                const platoRect = document.getElementById('area-plato').getBoundingClientRect();
                
                if(t.clientX > platoRect.left && t.clientX < platoRect.right && t.clientY > platoRect.top && t.clientY < platoRect.bottom) {
                    if(recetaDelDia.includes(el.dataset.name)) {
                        colocarFijo(el.src);
                        el.remove(); aciertos++; sonidos.exito.play();
                        document.getElementById('progreso-text').innerText = `RECETA: ${aciertos}/${totalObjetivos}`;
                        if(aciertos === totalObjetivos) {
                            hablar("¡Excelente! Has terminado la receta.");
                            setTimeout(() => { if(nivelActual < 3) { nivelActual++; cargarNivel(); } }, 3000);
                        }
                    } else { sonidos.error.play(); resetPos(); }
                } else { resetPos(); }
            };
            function resetPos() { el.style.position = 'static'; document.getElementById('panel-ingredientes').appendChild(el); }
            document.addEventListener('touchmove', mover);
            document.addEventListener('touchend', soltar);
        };
    }

    function colocarFijo(src) {
        const img = document.createElement('img');
        img.src = src;
        img.className = 'ing-final';
        // Asignar una de las 5 posiciones fijas para que no se amontonen
        const pos = posicionesFijas[aciertos % posicionesFijas.length];
        img.style.left = pos.x + '%';
        img.style.top = pos.y + '%';
        document.getElementById('area-plato').appendChild(img);
    }

    function crearMoscas() {
        for(let i=0; i<3; i++) {
            const m = document.createElement('img');
            m.src = 'img6/mosca.png'; m.className = 'mosca';
            m.style.left = '50%'; m.style.top = '50%';
            document.body.appendChild(m);
            setInterval(() => { m.style.left = Math.random()*90+'vw'; m.style.top = Math.random()*90+'vh'; }, 1500);
        }
    }
</script>
</body>
</html>

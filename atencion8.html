<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nivel 8 - Atención Alternante Doméstica</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; overflow: hidden; touch-action: none; display: flex; flex-direction: column; height: 100vh; }
        #cabecera { background: #0A253A; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #guia-box { background: white; color: #103A57; width: 90%; border-radius: 10px; padding: 12px; display: flex; align-items: center; border: 3px solid #307B8E; }
        #avatar { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; }
        #escenario { flex-grow: 1; display: flex; background: url('img8/habitacion_fondo8.jpg') no-repeat center; background-size: cover; position: relative; padding: 10px; gap: 15px; }
        
        /* Armario con Puntos de Ubicación siguiendo el boceto */
        #contenedor-armario { width: 45%; height: 90%; position: relative; border: 4px solid #0A253A; border-radius: 20px; background: rgba(255,255,255,0.2); }
        #armario_img { width: 100%; height: 100%; object-fit: contain; }
        
        .punto-ubicacion { position: absolute; width: 45px; height: 45px; background: rgba(48, 123, 142, 0.9); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid white; z-index: 10; font-size: 1.2rem; }
        #punto1 { top: 20%; left: 45%; } /* Zona 1: Colgar */
        #punto2 { top: 50%; left: 45%; } /* Zona 2: Estantes */
        #punto3 { top: 80%; left: 45%; } /* Zona 3: Suelo/Zapatos */

        #despensa-prendas { width: 55%; background: rgba(255,255,255,0.9); border-radius: 20px; border: 3px solid #0A253A; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; overflow-y: auto; }
        .item { width: 80px; height: 80px; object-fit: contain; cursor: grab; touch-action: none; }

        /* Notificación Flotante Estilo Pop-up */
        #notificacion { display: none; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: #FFD700; border: 5px solid #0A253A; border-radius: 15px; padding: 20px; text-align: center; z-index: 2000; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .btn-notif { padding: 12px; margin: 10px 5px; width: 110px; border-radius: 10px; border: 2px solid #0A253A; font-weight: bold; cursor: pointer; font-size: 1rem; }

        #modal-cierre { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body onload="iniciarSesion8()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Iniciando sesión de atención...</p>
    </div>
</div>

<div id="escenario">
    <div id="contenedor-armario">
        <img src="img8/armario.png" id="armario_img">
        <div class="punto-ubicacion" id="punto1">1</div>
        <div class="punto-ubicacion" id="punto2">2</div>
        <div class="punto-ubicacion" id="punto3">3</div>
    </div>
    <div id="despensa-prendas"></div>
</div>

<div id="notificacion">
    <p id="pregunta-txt" style="font-size: 1.1rem; color: #0A253A;"></p>
    <button class="btn-notif" id="btnA" style="background: #307B8E; color: white;"></button>
    <button class="btn-notif" id="btnB" style="background: #307B8E; color: white;"></button>
</div>

<div id="modal-cierre">
    <h2 id="msg-final"></h2>
    <p id="stats" style="font-size: 1.5rem; margin: 20px 0;"></p>
    <button onclick="location.reload()" style="padding: 15px 30px; font-size: 1.2rem; border-radius: 10px; background: #307B8E; color: white; border: none; cursor: pointer;">Repetir Ejercicio</button>
</div>

<script>
    let aciertos = 0, totalNotif = 0, aciertosNotif = 0;
    const alarma = new Audio('img8/alarma.mp3');
    const exito = new Audio('img8/exito.mp3');

    // Categorización según el boceto
    const categorias = {
        1: ['chaqueta.png', 'camisa_polo.png', 'camisa_verde.png', 'vestido.png'],
        2: ['pijama.png', 'saco.png', 'sueter.png', 'gafas.png', 'gorro.png', 'bufanda.png'],
        3: ['bota.png', 'pantalones.png', 'pantalones_cortos.png', 'bermudas.png', 'tacones.png', 'zapato1.png']
    };

    const trivias = [
        { q: "¿El cielo es verde?", a: "No", b: "Sí", c: "A" },
        { q: "¿Usas calcetines en los pies?", a: "Sí", b: "No", c: "A" },
        { q: "¿2 + 2 es 4?", a: "Verdad", b: "Falso", c: "A" }
    ];

    function hablar(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        document.getElementById('texto-guia').innerText = txt;
        window.speechSynthesis.speak(msg);
    }

    function iniciarSesion8() {
        hablar("Organiza la ropa en el armario usando los puntos 1, 2 y 3. Atiende las notificaciones cuando aparezcan.");
        const d = document.getElementById('despensa-prendas');
        let lista = [];
        
        // Cargar estímulos desde la carpeta img8
        Object.keys(categorias).forEach(zona => {
            categorias[zona].slice(0, 3).forEach(img => lista.push({src: img, zona: zona}));
        });
        
        // Añadir distractores
        ['balon.png', 'cafe.png', 'martillo.png'].forEach(img => lista.push({src: img, zona: 0}));

        lista.sort(() => Math.random() - 0.5).forEach(p => {
            const img = document.createElement('img');
            img.src = `img8/${p.src}`;
            img.className = 'item';
            img.dataset.zona = p.zona;
            img.ontouchstart = drag8;
            d.appendChild(img);
        });

        setTimeout(lanzarNotificacion, 10000);
    }

    function drag8(e) {
        const el = e.target;
        el.style.position = 'fixed';
        const mover = (me) => {
            el.style.left = (me.touches[0].clientX - 40) + 'px';
            el.style.top = (me.touches[0].clientY - 40) + 'px';
        };
        const soltar = (se) => {
            document.removeEventListener('touchmove', mover);
            document.removeEventListener('touchend', soltar);
            const t = se.changedTouches[0];
            const destino = document.elementFromPoint(t.clientX, t.clientY);
            
            if(destino && destino.id === 'punto' + el.dataset.zona) {
                aciertos++;
                exito.play();
                hablar("¡Excelente organización!");
                el.remove();
                if(aciertos >= 6) finalizarSesion8();
            } else {
                hablar("Ese objeto no va en ese punto del armario.");
                el.style.position = 'static';
            }
        };
        document.addEventListener('touchmove', mover);
        document.addEventListener('touchend', soltar);
    }

    function lanzarNotificacion() {
        if(aciertos < 6) {
            totalNotif++;
            alarma.play();
            const n = document.getElementById('notificacion');
            const trivia = trivias[Math.floor(Math.random() * trivias.length)];
            
            document.getElementById('pregunta-txt').innerText = trivia.q;
            document.getElementById('btnA').innerText = trivia.a;
            document.getElementById('btnB').innerText = trivia.b;
            n.style.display = 'block';

            const responder = (v) => {
                if(v === trivia.c) { aciertosNotif++; hablar("Muy bien, continúa organizando."); }
                else { hablar("Respuesta incorrecta, concéntrate."); }
                n.style.display = 'none';
                setTimeout(lanzarNotificacion, 18000);
            };

            document.getElementById('btnA').onclick = () => responder("A");
            document.getElementById('btnB').onclick = () => responder("B");
        }
    }

    function finalizarSesion8() {
        const modal = document.getElementById('modal-cierre');
        modal.style.display = 'flex';
        const mensaje = "Tu capacidad para adaptarte a varias demandas está mejorando cada día.";
        document.getElementById('msg-final').innerText = mensaje;
        document.getElementById('stats').innerText = `Ropa: ${aciertos}/6 | Notificaciones: ${aciertosNotif}/${totalNotif}`;
        hablar(mensaje);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nivel 8 - Atención Alternante Doméstica</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; overflow: hidden; touch-action: none; display: flex; flex-direction: column; height: 100vh; }
        #cabecera { background: #0A253A; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        #guia-box { background: white; color: #103A57; width: 90%; border-radius: 10px; padding: 12px; display: flex; align-items: center; border: 4px solid #307B8E; }
        #avatar { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; }
        
        #escenario { flex-grow: 1; display: flex; background: url('img8/habitacion_fondo8.jpg') no-repeat center; background-size: cover; position: relative; padding: 10px; gap: 15px; }
        
        /* Armario con Puntos de Ubicación */
        #contenedor-armario { width: 45%; height: 90%; position: relative; border: 4px solid #0A253A; border-radius: 20px; background: rgba(255,255,255,0.2); }
        #armario_img { width: 100%; height: 100%; object-fit: contain; }
        
        .punto-ubicacion { position: absolute; width: 40px; height: 40px; background: rgba(48, 123, 142, 0.8); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; z-index: 10; }
        #punto1 { top: 20%; left: 45%; } /* Colgar */
        #punto2 { top: 50%; left: 45%; } /* Estantes */
        #punto3 { top: 80%; left: 45%; } /* Suelo */

        #despensa-prendas { width: 55%; background: rgba(255,255,255,0.9); border-radius: 20px; border: 3px solid #0A253A; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; overflow-y: auto; }
        
        .item { width: 80px; height: 80px; object-fit: contain; cursor: grab; touch-action: none; }

        /* Notificación */
        #notificacion { display: none; position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: #FFD700; border: 4px solid #0A253A; border-radius: 15px; padding: 20px; text-align: center; z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .btn-notif { padding: 10px; margin: 10px 5px; width: 100px; border-radius: 8px; border: 2px solid #0A253A; font-weight: bold; cursor: pointer; }

        #modal-cierre { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body onload="iniciarJuego()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Cargando instrucciones...</p>
    </div>
</div>

<div id="escenario">
    <div id="contenedor-armario">
        <img src="img8/armario.png" id="armario_img">
        <div class="punto-ubicacion" id="punto1">1</div>
        <div class="punto-ubicacion" id="punto2">2</div>
        <div class="punto-ubicacion" id="punto3">3</div>
    </div>
    <div id="despensa-prendas"></div>
</div>

<div id="notificacion">
    <p id="pregunta-txt" style="font-weight: bold;"></p>
    <button class="btn-notif" id="btnA" style="background: #307B8E; color: white;"></button>
    <button class="btn-notif" id="btnB" style="background: #307B8E; color: white;"></button>
</div>

<div id="modal-cierre">
    <h2 id="msg-final"></h2>
    <p id="stats" style="font-size: 1.5rem;"></p>
    <button onclick="location.reload()" style="padding: 15px; margin-top: 20px; border-radius: 10px; cursor: pointer;">Siguiente Tarea</button>
</div>

<script>
    let nivel = 1, aciertos = 0, totalLlamadas = 0, aciertosLlamadas = 0;
    const audioAlarma = new Audio('img8/alarma.mp3');
    const audioExito = new Audio('img8/exito.mp3');

    const prendas = {
        1: ['chaqueta.png', 'camisa_polo.png', 'camisa_verde.png', 'vestido.png'],
        2: ['pijama.png', 'saco.png', 'sueter.png', 'gafas.png', 'gorro.png', 'bufanda.png'],
        3: ['bota.png', 'pantalones.png', 'pantalones_cortos.png', 'bermudas.png', 'tacones.png', 'zapato1.png']
    };

    const preguntas = [
        { q: "¿La vaca hace miau?", a: "Sí", b: "No", c: "B" },
        { q: "¿El sol es caliente?", a: "Sí", b: "No", c: "A" },
        { q: "¿Usas zapatos en las manos?", a: "Sí", b: "No", c: "B" }
    ];

    function hablar(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        document.getElementById('texto-guia').innerText = txt;
        window.speechSynthesis.speak(msg);
    }

    function iniciarJuego() {
        hablar("Organiza la ropa en el armario. Usa los puntos 1, 2 y 3 para ubicar cada prenda correctamente.");
        generarPrendas();
        setTimeout(lanzarNotificacion, 12000);
    }

    function generarPrendas() {
        const d = document.getElementById('despensa-prendas');
        let lista = [];
        // Mezclar algunas prendas de cada categoría
        for(let i=1; i<=3; i++) {
            prendas[i].slice(0, 3).forEach(p => lista.push({img: p, zona: i}));
        }
        // Mezclar distractores
        ['balon.png', 'cafe.png', 'martillo.png'].forEach(p => lista.push({img: p, zona: 0}));

        lista.sort(() => Math.random() - 0.5).forEach(p => {
            const img = document.createElement('img');
            img.src = `img8/${p.img}`;
            img.className = 'item';
            img.dataset.zona = p.zona;
            img.ontouchstart = drag;
            d.appendChild(img);
        });
    }

    function drag(e) {
        const el = e.target;
        el.style.position = 'fixed';
        const mover = (me) => {
            el.style.left = (me.touches[0].clientX - 40) + 'px';
            el.style.top = (me.touches[0].clientY - 40) + 'px';
        };
        const soltar = (se) => {
            document.removeEventListener('touchmove', mover);
            document.removeEventListener('touchend', soltar);
            const t = se.changedTouches[0];
            const zonaDestino = document.elementFromPoint(t.clientX, t.clientY);
            
            if(zonaDestino && zonaDestino.id.includes('punto' + el.dataset.zona)) {
                aciertos++;
                audioExito.play();
                hablar("¡Muy bien ubicado!");
                el.remove();
                if(aciertos >= 6) finalizar();
            } else {
                hablar("Ese no es su lugar, intenta de nuevo.");
                el.style.position = 'static';
            }
        };
        document.addEventListener('touchmove', mover);
        document.addEventListener('touchend', soltar);
    }

    function lanzarNotificacion() {
        if(aciertos < 6) {
            totalLlamadas++;
            audioAlarma.play();
            const n = document.getElementById('notificacion');
            const p = preguntas[Math.floor(Math.random() * preguntas.length)];
            
            document.getElementById('pregunta-txt').innerText = p.q;
            document.getElementById('btnA').innerText = p.a;
            document.getElementById('btnB').innerText = p.b;
            n.style.display = 'block';

            const responder = (res) => {
                if(res === p.c) { aciertosLlamadas++; hablar("Respuesta correcta."); }
                else { hablar("Respuesta incorrecta."); }
                n.style.display = 'none';
                setTimeout(lanzarNotificacion, 15000);
            };

            document.getElementById('btnA').onclick = () => responder("A");
            document.getElementById('btnB').onclick = () => responder("B");
        }
    }

    function finalizar() {
        document.getElementById('modal-cierre').style.display = 'flex';
        const msg = "Tu capacidad para adaptarte a varias demandas está mejorando cada día.";
        document.getElementById('msg-final').innerText = msg;
        document.getElementById('stats').innerText = `Aciertos: ${aciertos} | Notificaciones: ${aciertosLlamadas}/${totalLlamadas}`;
        hablar(msg);
    }
</script>
</body>
</html>

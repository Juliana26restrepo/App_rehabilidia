<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nivel 8 - Organización y Alternancia</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f0f0; overflow: hidden; touch-action: none; display: flex; flex-direction: column; height: 100vh; }
        #cabecera { background: #0A253A; color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        #guia-box { background: white; color: #103A57; width: 90%; border-radius: 10px; padding: 12px; display: flex; align-items: center; border: 3px solid #307B8E; }
        #avatar { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; }
        
        #escenario { flex-grow: 1; display: flex; background: url('img8/habitacion_fondo8.jpg') no-repeat center; background-size: cover; position: relative; padding: 15px; gap: 15px; }
        
        #contenedor-armario { width: 45%; height: 95%; position: relative; border: 4px solid #0A253A; border-radius: 20px; background: rgba(255,255,255,0.3); }
        #armario_img { width: 100%; height: 100%; object-fit: contain; }
        
        /* Puntos de soltado */
        .punto-ubicacion { position: absolute; width: 60px; height: 60px; background: rgba(48, 123, 142, 0.8); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid white; z-index: 20; font-size: 1.5rem; }
        
        /* IMPORTANTE: pointer-events: none para que no bloqueen el clic */
        .etiqueta-zona { position: absolute; background: #0A253A; color: white; padding: 4px 12px; border-radius: 8px; font-size: 0.9rem; font-weight: bold; z-index: 25; pointer-events: none; white-space: nowrap; }
        
        #punto1 { top: 15%; left: 42%; } #label1 { top: 9%; left: 42%; }
        #punto2 { top: 48%; left: 42%; } #label2 { top: 42%; left: 42%; }
        #punto3 { top: 82%; left: 42%; } #label3 { top: 76%; left: 42%; }

        #despensa-prendas { width: 55%; background: rgba(255,255,255,0.9); border-radius: 20px; border: 3px solid #0A253A; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; overflow-y: auto; align-content: start; }
        .item { width: 85px; height: 85px; object-fit: contain; cursor: grab; touch-action: none; z-index: 100; position: relative; }

        #notificacion { display: none; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 340px; background: #FFD700; border: 6px solid #0A253A; border-radius: 20px; padding: 25px; text-align: center; z-index: 2000; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .btn-notif { padding: 15px; margin: 10px 8px; width: 120px; border-radius: 12px; border: 3px solid #0A253A; font-weight: bold; cursor: pointer; font-size: 1.1rem; background: #307B8E; color: white; }

        #modal-cierre { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body onload="cargarDificultad()">

<div id="cabecera">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Selecciona el nivel para comenzar...</p>
    </div>
</div>

<div id="escenario">
    <div id="contenedor-armario">
        <img src="img8/armario.png" id="armario_img">
        <div class="etiqueta-zona" id="label1">1. COLGAR</div>
        <div class="punto-ubicacion" id="punto1" data-zona="1">1</div>
        <div class="etiqueta-zona" id="label2">2. DOBLAR</div>
        <div class="punto-ubicacion" id="punto2" data-zona="2">2</div>
        <div class="etiqueta-zona" id="label3">3. ZAPATOS</div>
        <div class="punto-ubicacion" id="punto3" data-zona="3">3</div>
    </div>
    <div id="despensa-prendas"></div>
</div>

<div id="notificacion">
    <p id="pregunta-txt"></p>
    <button class="btn-notif" id="btnA"></button>
    <button class="btn-notif" id="btnB"></button>
</div>

<div id="modal-cierre">
    <h2 id="msg-final"></h2>
    <p id="stats" style="font-size: 1.6rem; margin: 20px 0; color: #FFD700;"></p>
    <button onclick="location.reload()" style="padding: 15px 30px; font-size: 1.2rem; border-radius: 10px; cursor: pointer;">Siguiente Tarea</button>
</div>

<script>
    let nivelActual = "bajo", aciertos = 0, totalAciertosNecesarios = 0, totalNotif = 0, aciertosNotif = 0;
    const alarma = new Audio('img8/alarma.mp3');
    const exito = new Audio('img8/exito.mp3');

    const categorias = {
        1: ['chaqueta.png', 'camisa_polo.png', 'camisa_verde.png', 'vestido.png'],
        2: ['pijama.png', 'saco.png', 'sueter.png', 'gafas.png', 'gorro.png', 'bufanda.png'],
        3: ['bota.png', 'pantalones.png', 'pantalones_cortos.png', 'bermudas.png', 'tacones.png', 'zapato1.png']
    };
    const distractores = ['balon.png', 'cafe.png', 'martillo.png', 'cepillo.png', 'libro.png'];
    const trivias = [{q:"¿El hielo quema?", a:"No", b:"Sí", c:"A"}, {q:"¿El sol brilla?", a:"Sí", b:"No", c:"A"}, {q:"¿2+2 son 4?", a:"Sí", b:"No", c:"A"}];

    function hablar(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        document.getElementById('texto-guia').innerText = txt;
        window.speechSynthesis.speak(msg);
    }

    function cargarDificultad() {
        const urlParams = new URLSearchParams(window.location.search);
        nivelActual = urlParams.get('nivel') || 'bajo';
        iniciarJuego();
    }

    function iniciarJuego() {
        let itemsParaCargar = [];
        let numDistractores = 0;
        let frecuenciaNotif = 15000;

        if (nivelActual === "bajo") {
            totalAciertosNecesarios = 4;
            itemsParaCargar = [categorias[1][0], categorias[1][1], categorias[2][0], categorias[3][0]];
            hablar("Nivel Bajo: Organiza estas 4 prendas. 1 para colgar, 2 doblar y 3 zapatos.");
        } else if (nivelActual === "medio") {
            totalAciertosNecesarios = 7;
            itemsParaCargar = [categorias[1][0], categorias[1][2], categorias[2][1], categorias[2][2], categorias[3][1], categorias[3][2], categorias[2][3]];
            numDistractores = 2;
            frecuenciaNotif = 12000;
            hablar("Nivel Medio: Más prendas y notificaciones. ¡Cuidado con los distractores!");
        } else {
            totalAciertosNecesarios = 10;
            itemsParaCargar = [...categorias[1], ...categorias[2].slice(0,3), ...categorias[3].slice(0,3)];
            numDistractores = 4;
            frecuenciaNotif = 8000;
            hablar("Nivel Alto: Máxima concentración. Cambia rápido entre el armario y las notificaciones.");
        }

        const d = document.getElementById('despensa-prendas');
        d.innerHTML = "";
        
        let listaFinal = itemsParaCargar.map(img => ({src: img, zona: buscarZona(img)}));
        distractores.slice(0, numDistractores).forEach(img => listaFinal.push({src: img, zona: 0}));

        listaFinal.sort(() => Math.random() - 0.5).forEach(p => {
            const img = document.createElement('img');
            img.src = `img8/${p.src}`;
            img.className = 'item';
            img.dataset.zona = p.zona;
            img.onmousedown = img.ontouchstart = dragStart;
            d.appendChild(img);
        });

        setTimeout(lanzarNotificacion, frecuenciaNotif);
    }

    function buscarZona(img) {
        for (let z in categorias) if (categorias[z].includes(img)) return z;
        return 0;
    }

    function dragStart(e) {
        e.preventDefault();
        const el = e.target;
        const touch = e.type === 'touchstart' ? e.touches[0] : e;
        let offsetX = touch.clientX - el.getBoundingClientRect().left;
        let offsetY = touch.clientY - el.getBoundingClientRect().top;

        el.style.position = 'fixed';
        el.style.width = '70px';

        const move = (me) => {
            const mtouch = me.type === 'touchmove' ? me.touches[0] : me;
            el.style.left = (mtouch.clientX - offsetX) + 'px';
            el.style.top = (mtouch.clientY - offsetY) + 'px';
        };

        const stop = (se) => {
            document.removeEventListener('mousemove', move);
            document.removeEventListener('mouseup', stop);
            document.removeEventListener('touchmove', move);
            document.removeEventListener('touchend', stop);

            const stouch = se.type === 'touchend' ? se.changedTouches[0] : se;
            el.style.display = 'none';
            const debajo = document.elementFromPoint(stouch.clientX, stouch.clientY);
            el.style.display = 'block';

            if (debajo && debajo.classList.contains('punto-ubicacion') && debajo.dataset.zona == el.dataset.zona) {
                aciertos++;
                exito.play();
                hablar("¡Muy bien!");
                el.remove();
                if (aciertos >= totalAciertosNecesarios) finalizar();
            } else {
                hablar(el.dataset.zona == 0 ? "Eso es un distractor." : "Ese no es su lugar.");
                el.style.position = 'relative';
                el.style.left = 'auto'; el.style.top = 'auto';
            }
        };

        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', stop);
        document.addEventListener('touchmove', move, {passive: false});
        document.addEventListener('touchend', stop);
    }

    function lanzarNotificacion() {
        if (aciertos < totalAciertosNecesarios) {
            totalNotif++;
            alarma.play();
            const n = document.getElementById('notificacion');
            const t = trivias[Math.floor(Math.random() * trivias.length)];
            document.getElementById('pregunta-txt').innerText = t.q;
            document.getElementById('btnA').innerText = t.a;
            document.getElementById('btnB').innerText = t.b;
            n.style.display = 'block';

            const responder = (v) => {
                if(v === t.c) { aciertosNotif++; hablar("Correcto, sigue."); }
                else hablar("Incorrecto.");
                n.style.display = 'none';
                let freq = nivelActual === 'alto' ? 8000 : 15000;
                setTimeout(lanzarNotificacion, freq);
            };
            document.getElementById('btnA').onclick = () => responder("A");
            document.getElementById('btnB').onclick = () => responder("B");
        }
    }

    function finalizar() {
        document.getElementById('modal-cierre').style.display = 'flex';
        const m = "Tu capacidad para adaptarte a varias demandas está mejorando cada día.";
        document.getElementById('msg-final').innerText = m;
        document.getElementById('stats').innerText = `Completado: ${nivelActual.toUpperCase()} | Notif: ${aciertosNotif}/${totalNotif}`;
        hablar(m);
    }
</script>
</body>
</html>

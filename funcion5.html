<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 5: Organización y Dinero - REHABILIDIA</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #E3F2FD; --gold: #FFD700; --navy: #103A57; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px; font-weight: bold; }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        
        /* Ajuste Nivel 2: Estructura Vertical */
        .layout-vertical { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }

        .panel-instruccion { background: white; padding: 15px; border-radius: 15px; border: 3px solid var(--p-purple); width: 90%; max-width: 450px; font-weight: bold; font-size: 1.2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .zona-dinero { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 100%; max-width: 650px; padding: 10px; }
        .dinero-img { width: 160px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2)); border-radius: 8px; }
        .moneda-img { width: 85px; }
        .clickable { cursor: pointer; transition: 0.2s; }
        .clickable:active { transform: scale(0.9); }

        .zona-botones { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 90%; max-width: 500px; }

        #pago-actual { background: var(--gold); padding: 10px 20px; border-radius: 15px; font-size: 1.6rem; font-weight: bold; margin-top: 10px; border: 2px solid var(--p-purple); display: none; }

        /* Área del Asistente mejorada */
        .area-asistente { width: 100%; background: white; padding: 10px; display: flex; align-items: center; gap: 15px; border-top: 4px solid var(--p-purple); height: 110px; box-sizing: border-box; margin-top: auto; }
        .avatar-img { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--p-purple); overflow: hidden; flex-shrink: 0; background: #fff; position: relative; }
        .avatar-img img { width: 100%; height: 100%; object-fit: cover; }
        .burbuja { background: #F5F5F5; padding: 10px; border-radius: 12px; font-size: 0.9rem; flex: 1; text-align: left; border: 1px solid #ddd; height: 75px; overflow-y: auto; }

        #overlay-nivel, #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index: 3000; padding: 20px; text-align: center; }
        #overlay-nivel { background: rgba(74, 20, 140, 0.98); color: white; }
        #overlay-final { background: rgba(16, 58, 87, 0.98); color: white; }
        
        .btn-grande { background: var(--gold); border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1rem; color: var(--navy); border-bottom: 4px solid #b7950b; }
        .btn-finalizar { background: var(--gold); border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; color: var(--navy); font-size: 1.2rem; }
    </style>
</head>
<body onload="iniciarSesion()">

<header>SESIÓN 5: ORGANIZACIÓN Y DINERO</header>

<div id="contenedor-juego">
    <div id="panel-instruccion" class="panel-instruccion">¡PREPARADOS!</div>
    
    <div id="pantalla-principal" class="layout-vertical">
        <div id="pantalla-juego" class="zona-dinero"></div>
        <div id="pantalla-respuestas" class="zona-botones"></div>
    </div>

    <div id="pago-actual">Pagas: $<span id="suma-pago">0</span></div>
</div>

<div class="area-asistente">
    <div class="avatar-img" id="contenedor-avatar">
        <img src="COTERAPEUTA.JPG" id="img-asistente" onerror="this.src='https://raw.githubusercontent.com/Anmameche/Rehabilidia/main/coterapeuta.png';">
    </div>
    <div class="burbuja" id="texto-asistente">Hola Juan, vamos a administrar bien el dinero hoy.</div>
</div>

<div id="overlay-nivel">
    <h1 id="lvl-titulo" style="color: var(--gold); font-size: 3rem;">¡NIVEL 1!</h1>
    <p id="lvl-mensaje" style="font-size: 1.5rem;"></p>
</div>

<div id="overlay-final">
    <h1 style="color: var(--gold);">RESUMEN DE SESIÓN</h1>
    <table class="tabla-stats" style="width: 100%; max-width: 300px; margin: 20px auto; color: white; border-collapse: collapse;">
        <thead><tr style="color: var(--gold); border-bottom: 2px solid white;"><th>Nivel</th><th>A/E</th></tr></thead>
        <tbody id="cuerpo-tabla"></tbody>
    </table>
    <p style="font-size: 1.2rem; font-weight: bold; margin: 15px;">"Tomar buenas decisiones te dan libertad."</p>
    <button class="btn-finalizar" onclick="window.location.href='funcion_sesiones.html'">FINALIZAR</button>
</div>

<script>
    const billetes = [
        { v: 2000, f: "billete2.png", t: "Dos Mil" },
        { v: 5000, f: "billete5.png", t: "Cinco Mil" },
        { v: 10000, f: "billete10.png", t: "Diez Mil" },
        { v: 20000, f: "billete20.png", t: "Veinte Mil" },
        { v: 50000, f: "billete50.png", t: "Cincuenta Mil" },
        { v: 100000, f: "billete100.png", t: "Cien Mil" }
    ];
    const monedas = [
        { v: 50, f: "moneda50.png", t: "Cincuenta" },
        { v: 100, f: "moneda100.png", t: "Cien" },
        { v: 200, f: "moneda200.png", t: "Doscientos" },
        { v: 500, f: "moneda500.png", t: "Quinientos" },
        { v: 1000, f: "moneda1000.png", t: "Mil" }
    ];

    let nivel = 1, ronda = 1, sumaActual = 0, objetivoPago = 0;
    let usadosEnNivel = [];
    let stats = { 1: {a:0, e:0}, 2: {a:0, e:0}, 3: {a:0, e:0} };

    function formatear(n) { return n.toLocaleString('es-CO'); }

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 0.9;
        window.speechSynthesis.speak(m);
        document.getElementById('texto-asistente').innerText = t;
    }

    function iniciarSesion() {
        hablar("Hola Juan, hoy vamos a practicar cómo manejar nuestro dinero. Empecemos.");
        cargarRonda();
    }

    function cargarRonda() {
        const pantallaDinero = document.getElementById('pantalla-juego');
        const pantallaRespuestas = document.getElementById('pantalla-respuestas');
        const instruccion = document.getElementById('panel-instruccion');
        const displayPago = document.getElementById('pago-actual');
        
        pantallaDinero.innerHTML = "";
        pantallaRespuestas.innerHTML = "";
        displayPago.style.display = "none";
        sumaActual = 0;

        if (nivel === 1) {
            const target = billetes[Math.floor(Math.random() * billetes.length)];
            objetivoPago = target.v;
            instruccion.innerHTML = `Busca el Billete de $${formatear(target.v)}`;
            hablar(`Juan, busca el billete de ${target.t} pesos.`);
            
            let opciones = [target, ...billetes.filter(b => b.v !== target.v).sort(()=>Math.random()-0.5).slice(0, 3)];
            opciones.sort(()=>Math.random()-0.5).forEach(b => {
                const img = crearImg(b);
                img.classList.add('clickable');
                img.onclick = () => {
                    if(b.v === objetivoPago) { stats[1].a++; avanzar(); }
                    else { stats[1].e++; hablar("Ese no es. Intenta de nuevo."); }
                };
                pantallaDinero.appendChild(img);
            });
        } 
        else if (nivel === 2) {
            let todo = [...billetes, ...monedas];
            const target = todo[Math.floor(Math.random() * todo.length)];
            objetivoPago = target.v;

            instruccion.innerHTML = `¿Cuánto vale este dinero?`;
            hablar(`Juan, ¿qué valor tiene el dinero que ves en pantalla?`);
            
            // Billete en el centro
            pantallaDinero.appendChild(crearImg(target));
            
            // Botones debajo
            let opcs = [target, ...todo.filter(d => d.v !== objetivoPago).sort(()=>Math.random()-0.5).slice(0, 3)].sort(()=>Math.random()-0.5);
            opcs.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-grande";
                btn.innerHTML = `$${formatear(opt.v)}<br><small>${opt.t}</small>`;
                btn.onclick = () => {
                    if(opt.v === objetivoPago) { stats[2].a++; avanzar(); }
                    else { stats[2].e++; hablar("No es ese valor."); }
                };
                pantallaRespuestas.appendChild(btn);
            });
        }
        else if (nivel === 3) {
            const precios = [3500, 7200, 12600, 21100, 50500, 1500];
            objetivoPago = precios[ronda - 1];
            
            instruccion.innerHTML = `Debes pagar exactamente: $${formatear(objetivoPago)}`;
            hablar(`Juan, paga ${formatear(objetivoPago)} pesos.`);
            displayPago.style.display = "block";
            document.getElementById('suma-pago').innerText = "0";

            // Mix incluyendo la moneda de 100
            const mix = [billetes[0], billetes[1], billetes[2], billetes[3], monedas[3], monedas[2], monedas[4], monedas[1]]; 
            mix.forEach(data => {
                const img = crearImg(data);
                img.classList.add('clickable');
                img.onclick = () => {
                    sumaActual += data.v;
                    document.getElementById('suma-pago').innerText = formatear(sumaActual);
                    if(sumaActual === objetivoPago) { stats[3].a++; avanzar(); }
                    else if(sumaActual > objetivoPago) { 
                        stats[3].e++; 
                        hablar("Te pasaste. Inténtalo de nuevo."); 
                        setTimeout(cargarRonda, 1000); 
                    }
                };
                pantallaDinero.appendChild(img);
            });
        }
    }

    function crearImg(data) {
        const img = document.createElement('img');
        img.src = `./fun5/${data.f}`;
        img.className = data.v < 2000 ? 'dinero-img moneda-img' : 'dinero-img';
        img.onerror = function() { this.src = 'https://via.placeholder.com/150?text=Dinero'; };
        return img;
    }

    function avanzar() {
        const rondasMax = (nivel === 3) ? 6 : 3;
        if (ronda < rondasMax) {
            ronda++;
            hablar("¡Muy bien!");
            setTimeout(cargarRonda, 1000);
        } else {
            if (nivel < 3) {
                nivel++; ronda = 1;
                mostrarCambioNivel();
            } else {
                finalizar();
            }
        }
    }

    function mostrarCambioNivel() {
        const overlay = document.getElementById('overlay-nivel');
        document.getElementById('lvl-titulo').innerText = "NIVEL " + nivel;
        overlay.style.display = 'flex';
        hablar("Cambiamos de nivel.");
        setTimeout(() => { overlay.style.display = 'none'; cargarRonda(); }, 3000);
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        const cuerpo = document.getElementById('cuerpo-tabla');
        cuerpo.innerHTML = `
            <tr><td>Nivel 1</td><td>${stats[1].a}/${stats[1].e}</td></tr>
            <tr><td>Nivel 2</td><td>${stats[2].a}/${stats[2].e}</td></tr>
            <tr><td>Nivel 3</td><td>${stats[3].a}/${stats[3].e}</td></tr>
        `;
        hablar("¡Excelente trabajo Juan! Tomar buenas decisiones te dan libertad.");
    }
</script>
</body>
</html>

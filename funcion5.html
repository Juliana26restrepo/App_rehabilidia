<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sesión 5: Organización y Dinero - REHABILIDIA</title>
    <style>
        :root { 
            --p-purple: #4A148C; 
            --bg: #E3F2FD; 
            --gold: #FFD700; 
            --navy: #103A57; 
            --white: #ffffff;
        }

        /* UNIVERSAL ZOOM & RESET */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #1a1a1a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        #viewport-container {
            width: 100vw;
            height: 100vh;
            max-width: 1024px;
            max-height: 768px;
            background: var(--bg);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        header { 
            background: var(--navy); 
            color: white; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            flex-shrink: 0;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
        }

        #contenedor-juego { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; 
        }
        
        .panel-instruccion { 
            background: var(--white); 
            padding: 15px; 
            border-radius: 20px; 
            border: 3px solid var(--p-purple); 
            width: 90%; 
            max-width: 500px; 
            margin-bottom: 10px; 
            font-weight: bold; 
            font-size: clamp(1rem, 4vw, 1.3rem); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        .zona-dinero { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 12px; 
            width: 100%; 
            max-width: 800px; 
            padding: 15px; 
            overflow-y: auto; 
            max-height: 55vh; 
        }

        .dinero-img { 
            width: clamp(100px, 18vw, 150px); 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); 
            border-radius: 8px; 
            cursor: pointer;
            transition: transform 0.1s;
        }

        .moneda-img { width: clamp(60px, 12vw, 85px); }
        .clickable:active { transform: scale(0.9); }

        .zona-botones { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            width: 90%; 
            max-width: 500px; 
            margin-top: 15px;
        }

        #pago-actual { 
            background: var(--gold); 
            padding: 12px 25px; 
            border-radius: 15px; 
            font-size: 1.6rem; 
            font-weight: bold; 
            margin: 10px 0; 
            border: 3px solid var(--p-purple); 
            display: none; 
            color: var(--navy); 
            animation: bounce 0.5s;
        }

        .area-asistente { 
            width: 100%; 
            background: var(--white); 
            padding: 10px 20px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-top: 4px solid var(--p-purple); 
            height: 110px; 
            flex-shrink: 0;
        }

        .avatar-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--p-purple); overflow: hidden; background: #fff; }
        .burbuja { background: #F5F5F5; padding: 10px; border-radius: 12px; font-size: 0.9rem; flex: 1; text-align: left; border: 1px solid #ddd; height: 75px; overflow-y: auto; color: var(--navy); }

        /* OVERLAYS */
        #overlay-nivel, #overlay-final { position: absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index: 3000; padding: 20px; text-align: center; }
        #overlay-nivel { background: rgba(74, 20, 140, 0.98); color: white; }
        #overlay-final { background: rgba(16, 58, 87, 0.98); color: white; }
        
        .cuadro-resultados { background: white; color: var(--navy); padding: 30px; border-radius: 25px; width: 90%; max-width: 450px; border: 5px solid var(--gold); }
        .tabla-stats { width: 100%; margin: 20px 0; border-collapse: collapse; }
        .tabla-stats th { border-bottom: 2px solid var(--p-purple); padding: 10px; color: var(--p-purple); }
        .tabla-stats td { padding: 10px; border-bottom: 1px solid #eee; font-weight: bold; }

        .btn-grande { background: var(--gold); border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1rem; color: var(--navy); border-bottom: 4px solid #b7950b; }
        .btn-finalizar { background: var(--gold); border: none; padding: 18px 40px; border-radius: 35px; font-weight: bold; cursor: pointer; margin-top: 20px; color: var(--navy); font-size: 1.3rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        @keyframes bounce { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
    </style>
</head>
<body onload="iniciarSesion()">

<div id="viewport-container">
    <header>MÓDULO: FUNCIONES EJECUTIVAS - SESIÓN 5</header>

    <div id="contenedor-juego">
        <div id="panel-instruccion" class="panel-instruccion">¡PREPARADOS!</div>
        <div id="pantalla-juego" class="zona-dinero"></div>
        <div id="pago-actual">Llevas: $<span id="suma-pago">0</span></div>
    </div>

    <div class="area-asistente">
        <div class="avatar-img">
            <img src="https://raw.githubusercontent.com/Anmameche/Rehabilidia/main/coterapeuta.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div class="burbuja" id="texto-asistente">Juan, manejar bien el dinero es clave para tu independencia.</div>
    </div>

    <div id="overlay-nivel">
        <h1 id="lvl-titulo" style="color: var(--gold); font-size: 3.5rem; margin:0;">NIVEL 1</h1>
        <p id="lvl-mensaje" style="font-size: 1.8rem;"></p>
    </div>

    <div id="overlay-final">
        <div class="cuadro-resultados">
            <h1 style="color: var(--p-purple); margin: 0;">SESIÓN COMPLETADA</h1>
            <table class="tabla-stats">
                <thead><tr style="color: var(--p-purple);"><th>Nivel</th><th>Aciertos</th><th>Eficacia</th></tr></thead>
                <tbody id="cuerpo-tabla"></tbody>
            </table>
            <p style="font-weight: bold; font-size: 1.1rem; color: #555;">"Tomar buenas decisiones te da libertad, Juan."</p>
            <button class="btn-finalizar" onpointerdown="guardarYSalir()">FINALIZAR</button>
        </div>
    </div>
</div>

<script>
    const billetes = [
        { v: 2000, f: "billete2.png", t: "Dos Mil" },
        { v: 5000, f: "billete5.png", t: "Cinco Mil" },
        { v: 10000, f: "billete10.png", t: "Diez Mil" },
        { v: 20000, f: "billete20.png", t: "Veinte Mil" },
        { v: 50000, f: "billete50.png", t: "Cincuenta Mil" },
        { v: 100000, f: "billete100.png", t: "Cien Mil" }
    ];
    const monedas = [
        { v: 50, f: "moneda50.png", t: "Cincuenta" },
        { v: 100, f: "moneda100.png", t: "Cien" },
        { v: 200, f: "moneda200.png", t: "Doscientos" },
        { v: 500, f: "moneda500.png", t: "Quinientos" },
        { v: 1000, f: "moneda1000.png", t: "Mil" }
    ];

    let nivel = 1, ronda = 1, sumaActual = 0, objetivoPago = 0;
    let usadosEnNivel = [];
    let aciertosTotales = 0, erroresTotales = 0;
    let statsNivel = { 1: {a:0, e:0}, 2: {a:0, e:0}, 3: {a:0, e:0} };

    function formatear(n) { return n.toLocaleString('es-CO'); }

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); 
        m.lang = 'es-ES'; 
        m.rate = 0.9;
        window.speechSynthesis.speak(m);
        document.getElementById('texto-asistente').innerText = t;
    }

    function iniciarSesion() {
        hablar("Hola Juan, hoy vamos a practicar cómo manejar nuestro dinero. Empecemos.");
        cargarRonda();
    }

    function cargarRonda() {
        const pantalla = document.getElementById('pantalla-juego');
        const instruccion = document.getElementById('panel-instruccion');
        const displayPago = document.getElementById('pago-actual');
        
        pantalla.innerHTML = "";
        displayPago.style.display = "none";
        sumaActual = 0;

        if (nivel === 1) {
            let pool = billetes.filter(b => !usadosEnNivel.includes(b.v));
            if(pool.length === 0) pool = billetes;
            const target = pool[Math.floor(Math.random() * pool.length)];
            objetivoPago = target.v;
            usadosEnNivel.push(target.v);

            instruccion.innerHTML = `Busca el Billete de $${formatear(target.v)} <br><small style="color:var(--p-purple)">(${target.t} Pesos)</small>`;
            hablar(`Juan, busca el billete de ${target.t} pesos.`);
            
            let opciones = [target, ...billetes.filter(b => b.v !== target.v).sort(()=>0.5-Math.random()).slice(0, 3)].sort(()=>0.5-Math.random());
            
            opciones.forEach(b => {
                const img = crearImg(b);
                img.classList.add('clickable');
                img.onpointerdown = (e) => {
                    e.preventDefault();
                    if(b.v === objetivoPago) { 
                        aciertosTotales++; statsNivel[1].a++; avanzar(); 
                    } else { 
                        erroresTotales++; statsNivel[1].e++; hablar("Ese no es. Busca el de " + target.t); 
                    }
                };
                pantalla.appendChild(img);
            });
        } 
        else if (nivel === 2) {
            let todo = [...billetes, ...monedas];
            let target = todo[Math.floor(Math.random() * todo.length)];
            objetivoPago = target.v;

            instruccion.innerHTML = `¿Cuánto vale este dinero Juan?`;
            hablar(`¿Cuánto dinero ves en pantalla?`);
            
            const contenedorCol = document.createElement('div');
            contenedorCol.style.cssText = "display:flex; flex-direction:column; align-items:center; width:100%";
            
            const imgPrincipal = crearImg(target);
            imgPrincipal.style.width = "180px";
            contenedorCol.appendChild(imgPrincipal);
            
            const zonaBtn = document.createElement('div');
            zonaBtn.className = "zona-botones";
            
            let opcs = [target, ...todo.filter(d => d.v !== objetivoPago).sort(()=>Math.random()-0.5).slice(0, 3)].sort(()=>Math.random()-0.5);

            opcs.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-grande";
                btn.innerHTML = `$${formatear(opt.v)}<br><small>${opt.t}</small>`;
                btn.onpointerdown = (e) => {
                    e.preventDefault();
                    if(opt.v === objetivoPago) { 
                        aciertosTotales++; statsNivel[2].a++; avanzar(); 
                    } else { 
                        erroresTotales++; statsNivel[2].e++; hablar("No. Ese es el de " + opt.t); 
                    }
                };
                zonaBtn.appendChild(btn);
            });
            contenedorCol.appendChild(zonaBtn);
            pantalla.appendChild(contenedorCol);
        }
        else if (nivel === 3) {
            const precios = [3500, 7200, 12500, 21100, 50550, 1600];
            objetivoPago = precios[ronda - 1];
            
            instruccion.innerHTML = `Paga exactamente: <span style="color:red">$${formatear(objetivoPago)}</span>`;
            hablar(`Juan, paga ${formatear(objetivoPago)} pesos.`);
            displayPago.style.display = "block";
            document.getElementById('suma-pago').innerText = "0";

            const todoElDinero = [...billetes, ...monedas].sort((a,b) => b.v - a.v);
            todoElDinero.forEach(data => {
                const img = crearImg(data);
                img.classList.add('clickable');
                img.onpointerdown = (e) => {
                    e.preventDefault();
                    sumaActual += data.v;
                    document.getElementById('suma-pago').innerText = formatear(sumaActual);
                    if(sumaActual === objetivoPago) { 
                        aciertosTotales++; statsNivel[3].a++; avanzar(); 
                    } else if(sumaActual > objetivoPago) { 
                        erroresTotales++; statsNivel[3].e++;
                        hablar("Te pasaste. Vamos a intentar este pago de nuevo."); 
                        setTimeout(cargarRonda, 1200); 
                    }
                };
                pantalla.appendChild(img);
            });
        }
    }

    function crearImg(data) {
        const img = document.createElement('img');
        img.src = `./fun5/${data.f}`;
        img.className = data.v < 2000 ? 'dinero-img moneda-img' : 'dinero-img';
        img.onerror = function() { this.src = 'https://via.placeholder.com/150x80?text=$'+data.v; };
        return img;
    }

    function avanzar() {
        const rondasMaximas = (nivel === 3) ? 6 : 3;
        if (ronda < rondasMaximas) {
            ronda++;
            hablar("¡Muy bien hecho!");
            setTimeout(cargarRonda, 1200);
        } else {
            if (nivel < 3) {
                nivel++; ronda = 1; usadosEnNivel = [];
                mostrarCambioNivel();
            } else {
                finalizar();
            }
        }
    }

    function mostrarCambioNivel() {
        const overlay = document.getElementById('overlay-nivel');
        const msj = nivel === 2 ? "Ahora reconoce el valor numérico del dinero." : "Nivel final: Haz pagos exactos combinando dinero.";
        document.getElementById('lvl-titulo').innerText = "NIVEL " + nivel;
        document.getElementById('lvl-mensaje').innerText = msj;
        overlay.style.display = 'flex';
        hablar(msj);
        setTimeout(() => { overlay.style.display = 'none'; cargarRonda(); }, 4000);
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        const cuerpo = document.getElementById('cuerpo-tabla');
        cuerpo.innerHTML = "";
        for (let i = 1; i <= 3; i++) {
            let totalItems = statsNivel[i].a + statsNivel[i].e;
            let efic = totalItems > 0 ? Math.round((statsNivel[i].a / totalItems)*100) : 0;
            cuerpo.innerHTML += `<tr><td>Nivel ${i}</td><td>${statsNivel[i].a}</td><td>${efic}%</td></tr>`;
        }
        hablar("Sesión completada Juan. Administrar bien tu dinero es un gran paso hacia tu independencia.");
    }

    function guardarYSalir() {
        const totalSesion = aciertosTotales + erroresTotales;
        const eficaciaTotal = totalSesion > 0 ? Math.round((aciertosTotales / totalSesion) * 100) : 0;
        
        const dataLog = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Funciones Ejecutivas",
            id_sesion: 5,
            aciertos: aciertosTotales,
            errores: erroresTotales,
            eficacia: eficaciaTotal + "%"
        };

        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(dataLog));
        window.location.href = 'funcion_sesiones.html';
    }
</script>
</body>
</html>

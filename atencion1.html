<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sesión 1: Atención Selectiva - REHABILIDIA</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    
    <style>
        #interfaz-guia {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 18px; border-radius: 20px;
            text-align: center; font-family: 'Segoe UI', sans-serif; z-index: 100;
            border: 4px solid #307B8E; width: 380px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #avatar-guia { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #307B8E; object-fit: cover; }
        .texto-instruccion { flex: 1; text-align: left; }
        .btn-volver {
            position: absolute; bottom: 20px; left: 20px; z-index: 100;
            padding: 12px 25px; background: #103A57; color: white; border-radius: 12px; 
            text-decoration: none; font-family: sans-serif; font-weight: bold; font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div id="interfaz-guia">
        <img id="avatar-guia" src="COTERAPEUTA.JPG" alt="Coterapeuta">
        <div class="texto-instruccion">
            <h2 id="instruccion" style="margin:0; font-size: 1.2rem; color: #103A57;">Cargando ejercicio...</h2>
            <p id="info-nivel" style="margin:3px 0 0; color:#307B8E; font-size: 0.9rem; font-weight:bold;"></p>
        </div>
    </div>

    <a href="atencion_sesiones.html" class="btn-volver">← Salir</a>

    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable" device-orientation-permission-ui="enabled: false">
        
        <a-sky src="habitacion_animada.png" rotation="0 -90 0"></a-sky>
        
        <a-camera look-controls></a-camera>

        <a-entity id="contenedor-objetos"></a-entity>
    </a-scene>

    <script>
        // --- 1. CONFIGURACIÓN DEL SISTEMA DE NIVELES ---
        const urlParams = new URLSearchParams(window.location.search);
        const nivelActual = urlParams.get('nivel') || 'bajo';
        
        const config = {
            'bajo': { objetos: 5, siguiente: 'medio', texto: 'Nivel 1: Inicial' },
            'medio': { objetos: 12, siguiente: 'alto', texto: 'Nivel 2: Intermedio' },
            'alto': { objetos: 20, siguiente: 'final', texto: 'Nivel 3: Avanzado' }
        };

        const nombres = ["", "Reloj", "Gafas", "Celular", "Libro", "Vaso", "Llaves", "Lámpara", "Gorra", "Peine", "Botella", "Control", "Planta", "Zapato", "Almohada", "Monedas", "Cuadro", "Audífonos", "Fruta", "Billetera", "Lapicero"];
        
        // --- 2. SELECCIÓN DE OBJETIVO (El objeto que Juan debe buscar) ---
        const idObjetivo = Math.floor(Math.random() * 20) + 1; // Un ID al azar entre obj1 y obj20
        document.getElementById('instruccion').innerText = "Juan, busca: " + nombres[idObjetivo];
        document.getElementById('info-nivel').innerText = config[nivelActual].texto;

        const contenedor = document.getElementById('contenedor-objetos');
        const avatar = document.getElementById('avatar-guia');
        const posicionesUsadas = []; // Para verificar distancias

        // --- 3. FUNCIÓN PARA HABLAR (TTS) ---
        function hablar(mensaje) {
            window.speechSynthesis.cancel();
            const voz = new SpeechSynthesisUtterance(mensaje);
            voz.lang = 'es-ES';
            voz.rate = 0.85; 
            window.speechSynthesis.speak(voz);
        }

        // El coterapeuta explica al cargar
        setTimeout(() => hablar("Juan, para este ejercicio busca el objeto " + nombres[idObjetivo]), 1000);

        // --- 4. FUNCIÓN DE CREACIÓN PERFECTA (obj1.png, obj2.png...) ---
        function crearEstímulo(id, esObjetivo) {
            const entidad = document.createElement('a-image');
            entidad.setAttribute('src', 'obj' + id + '.png');
            
            // Clase clickable para el cursor y look-at para mirar a Juan
            entidad.setAttribute('class', 'clickable');
            entidad.setAttribute('look-at', '[camera]');
            
            // Escala intermiedia perfecta para no verse 'mocho' (image_11.png)
            entidad.setAttribute('scale', '0.7 0.7 0.7'); 

            // --- DISPERSIÓN ESFÉRICA FORZADA (Adiós amontonamiento y ocultación) ---
            let x, y, z, posicionValida = false;
            let intentos = 0;

            while (!posicionValida && intentos < 100) {
                // Generamos coordenadas esféricas aleatorias alrededor de Juan (360°)
                const theta = Math.random() * Math.PI * 2; // Ángulo horizontal (0 a 360°)
                const phi = Math.acos((Math.random() * 2) - 1); // Ángulo vertical (Arriba/Abajo)
                const radio = 4.5; // Distancia fija cómoda para Juan

                x = radio * Math.sin(phi) * Math.cos(theta);
                y = Math.max(0.3, radio * Math.sin(phi) * Math.sin(theta)); // Evitamos que aparezcan bajo el suelo
                z = radio * Math.cos(phi);

                // Verificamos que no esté muy cerca de otro objeto ya creado (mínimo 1.5m)
                // Usamos la fórmula de distancia 3D: sqrt((x2-x1)^2 + (y2-y1)^2 + (z2-z1)^2)
                posicionValida = !posicionesUsadas.some(p => {
                    const distancia = Math.sqrt((p.x - x)**2 + (p.y - y)**2 + (p.z - z)**2);
                    return distancia < 1.5; // Distancia mínima de seguridad (muy importante)
                });
                intentos++;
            }

            // Si es el objetivo, forzamos que aparezca en el semicírculo frontal (más fácil)
            if (esObjetivo) {
                // Ajustamos Z para que siempre sea negativo (frente a la cámara inicial)
                if (z > 0) z = -z;
            }

            posicionesUsadas.push({x, y, z});
            entidad.setAttribute('position', `${x} ${y} ${z}`);

            // --- LÓGICA DEL CLIC ---
            entidad.addEventListener('click', function() {
                if (esObjetivo) {
                    avatar.src = "COTERAPEUTA_FELIZ.JPG";
                    const sig = config[nivelActual].siguiente;
                    if(sig === 'final') {
                        const textoFinal = "Cuidar de tus objetos personales requiere atención, lo lograste.";
                        hablar(textoFinal);
                        alert(textoFinal);
                        window.location.href = 'atencion_sesiones.html';
                    } else {
                        hablar("¡Excelente Juan! Pasamos automáticamente al siguiente nivel.");
                        // Cambio automático de nivel con delay para la voz
                        setTimeout(() => window.location.href = `atencion1.html?nivel=${sig}`, 2200);
                    }
                } else {
                    avatar.src = "COTERAPEUTA_PENSATIVO.JPG";
                    hablar("No te preocupes Juan, concéntrate y sigue buscando.");
                    // Vuelve a imagen normal después de la voz
                    setTimeout(() => { avatar.src = "COTERAPEUTA.JPG"; }, 2500);
                }
            });
            contenedor.appendChild(entidad);
        }

        // --- 5. GENERAR ELEMENTOS SIN REPETICIÓN (Y asegurando el objetivo) ---
        // CREAR EL OBJETIVO PRIMERO (Asegura su espacio y su ID)
        crearEstímulo(idObjetivo, true);

        // Luego creamos los distractores hasta completar la meta del nivel actual
        let distractoresCreados = 0;
        const totalDistractoresMeta = config[nivelActual].objetos - 1;
        const idsUsados = new Set([idObjetivo]); // Para evitar repetir objetos

        while(distractoresCreados < totalDistractoresMeta && distractoresCreados < 24) {
            let idAzar = Math.floor(Math.random() * 20) + 1;
            
            // Evitamos repetir el objetivo o distraer con el mismo objeto repetido
            if(!idsUsados.has(idAzar)) {
                crearEstímulo(idAzar, false);
                idsUsados.add(idAzar); // Añadimos el ID al set de usados
                distractoresCreados++;
            }
        }
    </script>
</body>
</html>

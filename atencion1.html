<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sesión 1: Atención - REHABILIDIA</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <style>
        #interfaz-guia {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 15px;
            text-align: center; font-family: 'Segoe UI', sans-serif; z-index: 100;
            border: 4px solid #307B8E; width: 380px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #avatar-guia { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #307B8E; object-fit: cover; }
        .texto-instruccion { flex: 1; text-align: left; }
        .btn-volver {
            position: absolute; bottom: 20px; left: 20px; z-index: 100;
            padding: 12px 20px; background: #103A57; color: white; border-radius: 10px; 
            text-decoration: none; font-family: sans-serif; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="interfaz-guia">
        <img id="avatar-guia" src="COTERAPEUTA.JPG" alt="Coterapeuta">
        <div class="texto-instruccion">
            <h2 id="instruccion" style="margin:0; font-size: 1.1rem; color: #103A57;">Cargando ejercicio...</h2>
            <p id="info-nivel" style="margin:2px 0 0; color:#307B8E; font-size: 0.85rem; font-weight:bold;"></p>
        </div>
    </div>

    <a href="atencion_sesiones.html" class="btn-volver">← Salir</a>

    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable">
        <a-sky src="habitacion_animada.png" rotation="0 -90 0"></a-sky>
        <a-camera look-controls></a-camera>
        <a-entity id="contenedor-objetos"></a-entity>
    </a-scene>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const nivelActual = urlParams.get('nivel') || 'bajo';
    
    const config = {
        'bajo': { objetos: 5, siguiente: 'medio', texto: 'Nivel 1: Inicial' },
        'medio': { objetos: 12, siguiente: 'alto', texto: 'Nivel 2: Intermedio' },
        'alto': { objetos: 20, siguiente: 'final', texto: 'Nivel 3: Avanzado' }
    };

    const nombres = ["", "Reloj", "Gafas", "Celular", "Libro", "Vaso", "Llaves", "Lámpara", "Gorra", "Peine", "Botella", "Control", "Planta", "Zapato", "Almohada", "Monedas", "Cuadro", "Audífonos", "Fruta", "Billetera", "Lapicero"];
    const idObjetivo = Math.floor(Math.random() * 20) + 1;
    const avatar = document.getElementById('avatar-guia');

    // --- COORDENADAS FIJAS PARA EVITAR AMONTONAMIENTO ---
    // Estas posiciones están repartidas por toda la habitación (X, Y, Z)
    const posicionesFijas = [
        {x: -3, y: 0.5, z: -3}, {x: 0, y: 1.8, z: -4},  {x: 3, y: 0.8, z: -3},
        {x: -4, y: 2.2, z: 0},  {x: 4, y: 0.3, z: 0},   {x: -3, y: 1.2, z: 3},
        {x: 0, y: 0.4, z: 4},   {x: 3, y: 2.5, z: 3},   {x: -2, y: 0.7, z: -4},
        {x: 2, y: 1.5, z: -4},  {x: -4, y: 0.5, z: -2}, {x: 4, y: 1.8, z: -2},
        {x: -4, y: 1.0, z: 2},  {x: 4, y: 0.6, z: 2},   {x: -1.5, y: 2.8, z: 0},
        {x: 1.5, y: 0.2, z: 0}, {x: 0, y: 3.0, z: -2},  {x: -2.5, y: 0.4, z: 2.5},
        {x: 2.5, y: 1.1, z: 3.5},{x: 0, y: 0.3, z: -3.5}
    ];

    // Desordenamos las posiciones para que no siempre sea igual
    posicionesFijas.sort(() => Math.random() - 0.5);

    function hablar(mensaje) {
        window.speechSynthesis.cancel();
        const voz = new SpeechSynthesisUtterance(mensaje);
        voz.lang = 'es-ES';
        voz.rate = 0.85; 
        window.speechSynthesis.speak(voz);
    }

    document.getElementById('instruccion').innerText = "Juan, busca: " + nombres[idObjetivo];
    document.getElementById('info-nivel').innerText = config[nivelActual].texto;
    setTimeout(() => hablar("Juan, busca el objeto " + nombres[idObjetivo]), 1000);

    const contenedor = document.getElementById('contenedor-objetos');
    let indicePos = 0;

    function crearObjeto(id, esObjetivo) {
        if (indicePos >= posicionesFijas.length) return;

        const pos = posicionesFijas[indicePos];
        indicePos++;

        const entidad = document.createElement('a-image');
        entidad.setAttribute('src', 'obj' + id + '.png');
        entidad.setAttribute('class', 'clickable');
        entidad.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
        entidad.setAttribute('scale', '0.7 0.7 0.7');
        entidad.setAttribute('look-at', '[camera]');

        entidad.addEventListener('click', function() {
            if (esObjetivo) {
                avatar.src = "COTERAPEUTA_FELIZ.JPG";
                const sig = config[nivelActual].siguiente;
                if(sig === 'final') {
                    const textoFinal = "Cuidar de tus objetos personales requiere atención, lo lograste.";
                    hablar(textoFinal);
                    alert(textoFinal);
                    window.location.href = 'atencion_sesiones.html';
                } else {
                    hablar("¡Excelente Juan! Pasamos al siguiente nivel.");
                    setTimeout(() => window.location.href = `atencion1.html?nivel=${sig}`, 2000);
                }
            } else {
                avatar.src = "COTERAPEUTA_PENSATIVO.JPG";
                hablar("No te preocupes Juan, ese no es. Sigue buscando.");
                setTimeout(() => { avatar.src = "COTERAPEUTA.JPG"; }, 2500);
            }
        });
        contenedor.appendChild(entidad);
    }

    // Primero el objetivo
    crearObjeto(idObjetivo, true);

    // Luego los distractores
    let creados = 0;
    const totalDistractores = config[nivelActual].objetos - 1;
    while(creados < totalDistractores) {
        let idAzar = Math.floor(Math.random() * 20) + 1;
        if(idAzar !== idObjetivo) {
            crearObjeto(idAzar, false);
            creados++;
        }
    }
</script>

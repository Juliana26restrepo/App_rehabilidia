<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motoruta: Control Numérico Avanzado</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: #1e3a8a; color: white; width: 100%; padding: 15px; text-align: center; font-weight: bold; font-size: 1.4rem; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .info-bar { background: #fff; width: 100%; display: flex; justify-content: center; gap: 50px; padding: 12px; border-bottom: 2px solid #e2e8f0; font-weight: bold; color: #1e3a8a; }
        
        .main-layout { display: flex; flex-direction: row; justify-content: center; align-items: flex-start; gap: 40px; padding: 30px; width: 95%; }
        
        /* Contenedor del Juego */
        #viewport { position: relative; border: 4px solid #1e3a8a; background: #fff; border-radius: 4px; overflow: hidden; }
        #grid { display: grid; gap: 1px; background: #cbd5e1; }
        .cell { background: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .wall { background: #334155 !important; }
        .goal { background: #fef08a !important; }
        .house { background: #dbeafe !important; border: 1px dashed #3b82f6; }
        
        #moto { 
            position: absolute; z-index: 100; transition: all 0.25s linear;
            display: flex; align-items: center; justify-content: center; pointer-events: none;
        }

        /* Panel de Control Numérico */
        .control-panel { width: 400px; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; background: #f1f5f9; padding: 10px; border-radius: 8px; }
        .input-group label { font-weight: bold; color: #475569; font-size: 0.9rem; }
        
        /* Flechas para pacientes sin teclado */
        input[type=number] {
            width: 80px; height: 45px; font-size: 1.5rem; text-align: center; font-weight: bold;
            border: 2px solid #cbd5e1; border-radius: 6px; color: #1e3a8a;
        }

        .btn-action { width: 100%; padding: 18px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .btn-go { background: #22c55e; color: white; border-bottom: 4px solid #16a34a; }
        .btn-go:active { border-bottom: 0; transform: translateY(4px); }
        .btn-reset { background: #ef4444; color: white; margin-top: 15px; }
    </style>
</head>
<body>

<header>MOTORUTA: PLANIFICACIÓN POR COORDENADAS</header>
<div class="info-bar">
    <span>NIVEL: <span id="txt-lvl">1</span>/3</span>
    <span>EJERCICIO: <span id="txt-ex">1</span>/3</span>
</div>

<div class="main-layout">
    <div id="viewport">
        <div id="moto">🏍️</div>
        <div id="grid"></div>
    </div>

    <div class="control-panel">
        <h3 style="margin:0 0 20px 0; color:#1e3a8a; border-bottom: 2px solid #f1f5f9; padding-bottom:10px;">Indica el movimiento:</h3>
        
        <div class="input-group">
            <label>Casillas a la DERECHA ➡</label>
            <input type="number" id="in-der" value="0" min="0" max="15">
        </div>
        <div class="input-group">
            <label>Casillas hacia ABAJO ⬇</label>
            <input type="number" id="in-aba" value="0" min="0" max="15">
        </div>
        <div class="input-group">
            <label>Casillas a la IZQUIERDA ⬅</label>
            <input type="number" id="in-izq" value="0" min="0" max="15">
        </div>
        <div class="input-group">
            <label>Casillas hacia ARRIBA ⬆</label>
            <input type="number" id="in-arr" value="0" min="0" max="15">
        </div>

        <button class="btn-action btn-go" onclick="runMoto()">ARRANCAR MOTO 🏍️</button>
        <button class="btn-action btn-reset" onclick="resetPosition()">REINICIAR POSICIÓN</button>
    </div>
</div>

<script>
    let currentLvl = 1, currentEx = 1, active = false;
    let pos = {x: 0, y: 0}, cellSize = 0;
    let houseReached = false;

    // Configuración de los 9 ejercicios
    const LEVELS = {
        1: { size: 8,  exs: [{h:[7,0], g:[7,7], w:[[2,2],[3,2],[4,2],[2,5],[3,5],[4,5]]}, {h:[4,4], g:[7,0], w:[[1,1],[2,2]]}, {h:[2,2], g:[7,7], w:[]}] },
        2: { size: 12, exs: [{h:[11,0], g:[11,11], w:[[5,5],[5,6],[5,7]]}, {h:[0,11], g:[11,5], w:[]}, {h:[6,6], g:[11,0], w:[]}] },
        3: { size: 16, exs: [{h:[15,0], g:[15,15], w:[[8,8],[8,9]]}, {h:[0,15], g:[15,0], w:[]}, {h:[1,1], g:[14,14], w:[]}] }
    };

    function speak(msg) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
    }

    function initGame() {
        const config = LEVELS[currentLvl];
        const exercise = config.exs[currentEx-1];
        const grid = document.getElementById('grid');
        
        // Ajustar tamaño visual según rejilla
        const viewSize = 500; 
        cellSize = Math.floor(viewSize / config.size);
        
        grid.style.gridTemplateColumns = `repeat(${config.size}, ${cellSize}px)`;
        grid.innerHTML = '';

        for(let y=0; y < config.size; y++) {
            for(let x=0; x < config.size; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.width = cellSize + 'px';
                cell.style.height = cellSize + 'px';
                
                if (exercise.w.some(w => w[0] === x && w[1] === y)) cell.classList.add('wall');
                if (x === exercise.g[0] && y === exercise.g[1]) { cell.classList.add('goal'); cell.innerText = '🏁'; }
                if (x === exercise.h[0] && y === exercise.h[1]) { cell.classList.add('house'); cell.innerText = '🏠'; }
                
                grid.appendChild(cell);
            }
        }
        
        pos = {x: 0, y: 0};
        houseReached = false;
        drawMoto();
        speak(`Nivel ${currentLvl}. Ejercicio ${currentEx}. Primero pasa por la casa y luego a la meta.`);
    }

    function drawMoto() {
        const m = document.getElementById('moto');
        m.style.width = cellSize + 'px';
        m.style.height = cellSize + 'px';
        m.style.fontSize = (cellSize * 0.7) + 'px';
        // Cálculo exacto de posición
        m.style.left = (pos.x * cellSize + pos.x) + 'px';
        m.style.top = (pos.y * cellSize + pos.y) + 'px';
    }

    async function runMoto() {
        if (active) return;
        active = true;
        
        const commands = [
            { dx: 1, dy: 0, val: parseInt(document.getElementById('in-der').value) },
            { dx: 0, dy: 1, val: parseInt(document.getElementById('in-aba').value) },
            { dx: -1, dy: 0, val: parseInt(document.getElementById('in-izq').value) },
            { dx: 0, dy: -1, val: parseInt(document.getElementById('in-arr').value) }
        ];

        const config = LEVELS[currentLvl];
        const exercise = config.exs[currentEx-1];

        for (let cmd of commands) {
            for (let i = 0; i < cmd.val; i++) {
                let nextX = pos.x + cmd.dx;
                let nextY = pos.y + cmd.dy;

                // Validar colisión o límites
                if (nextX < 0 || nextX >= config.size || nextY < 0 || nextY >= config.size || 
                    exercise.w.some(w => w[0] === nextX && w[1] === nextY)) {
                    speak("¡Choque! Revisa tus cálculos.");
                    active = false;
                    return;
                }

                pos.x = nextX;
                pos.y = nextY;
                
                if (pos.x === exercise.h[0] && pos.y === exercise.h[1]) {
                    houseReached = true;
                    speak("Casa alcanzada.");
                }

                drawMoto();
                await new Promise(r => setTimeout(r, 300)); // Pausa para ver el movimiento
            }
        }

        // Verificar resultado final
        if (pos.x === exercise.g[0] && pos.y === exercise.g[1]) {
            if (houseReached) {
                speak("¡Excelente trabajo! Siguiente ejercicio.");
                setTimeout(nextExercise, 1500);
            } else {
                speak("Llegaste a la meta, pero no pasaste por la casa. Intenta de nuevo.");
                active = false;
            }
        } else {
            speak("No llegaste a la bandera. Ajusta los números.");
            active = false;
        }
    }

    function nextExercise() {
        if (currentEx < 3) {
            currentEx++;
        } else if (currentLvl < 3) {
            currentLvl++;
            currentEx = 1;
        } else {
            speak("¡Has completado todo el protocolo de rehabilitación estratégica!");
            return;
        }
        document.getElementById('txt-lvl').innerText = currentLvl;
        document.getElementById('txt-ex').innerText = currentEx;
        resetInputs();
        initGame();
        active = false;
    }

    function resetInputs() {
        document.getElementById('in-der').value = 0;
        document.getElementById('in-aba').value = 0;
        document.getElementById('in-izq').value = 0;
        document.getElementById('in-arr').value = 0;
    }

    function resetPosition() {
        if (active) return;
        pos = {x: 0, y: 0};
        houseReached = false;
        drawMoto();
        resetInputs();
    }

    window.onload = initGame;
</script>
</body>
</html>

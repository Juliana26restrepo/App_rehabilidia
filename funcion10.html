<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motoruta Final: El Desafío de Hierro</title>
    <style>
        body { font-family: sans-serif; background: #ffffff; color: #333; margin: 0; display: flex; flex-direction: column; height: 100vh; align-items: center; }
        header { background: #1a365d; color: white; width: 100%; padding: 15px; text-align: center; font-weight: bold; }
        
        .game-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; width: 100%; max-width: 1000px; }
        
        /* Tablero visible y claro */
        #board-container { position: relative; border: 5px solid #1a365d; background: #e2e8f0; }
        #grid { display: grid; gap: 2px; }
        .cell { width: 50px; height: 50px; background: #f8fafc; display: flex; align-items: center; justify-content: center; }
        .wall { background: #334155; }
        .goal { background: #fbbf24; font-size: 24px; }
        
        #moto { 
            position: absolute; width: 50px; height: 50px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 30px; z-index: 10; transition: all 0.3s linear;
            pointer-events: none;
        }

        /* Controles */
        .controls { width: 320px; display: flex; flex-direction: column; gap: 10px; }
        #route-box { min-height: 80px; border: 2px solid #cbd5e1; background: #f1f5f9; padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
        .step { background: #1e40af; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        
        .btn { padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; font-size: 16px; }
        .btn-blue { background: #3b82f6; }
        .btn-green { background: #22c55e; border-bottom: 5px solid #16a34a; font-size: 18px; }
        .btn-red { background: #ef4444; }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<header>MOTORUTA: DESAFÍO DE INGENIERÍA (NIVEL 3)</header>

<div class="game-area">
    <div id="board-container">
        <div id="moto">🏍️</div>
        <div id="grid"></div>
    </div>

    <div class="controls">
        <div id="route-box"></div>
        <div class="grid-btns">
            <button class="btn btn-blue" onclick="add('↑')">ARRIBA</button>
            <button class="btn btn-blue" onclick="add('↓')">ABAJO</button>
            <button class="btn btn-blue" onclick="add('←')">IZQUIERDA</button>
            <button class="btn btn-blue" onclick="add('→')">DERECHA</button>
        </div>
        <button class="btn btn-green" id="start-btn" onclick="run()">¡ARRANCAR AHORA! 🏁</button>
        <button class="btn btn-red" onclick="resetRoute()">BORRAR RUTA</button>
    </div>
</div>

<script>
    // Configuración de Laberinto Extremo (Ruta única)
    const size = 10;
    const walls = [
        [1,1],[2,1],[3,1],[4,1],[5,1],[6,1],[7,1],[8,1],
        [1,3],[2,3],[3,3],[5,3],[6,3],[7,3],[8,3],[9,3],
        [0,5],[1,5],[2,5],[4,5],[5,5],[7,5],[8,5],[9,5],
        [1,7],[2,7],[3,7],[4,7],[6,7],[7,7],[8,7],[9,7],
        [0,9],[2,9],[3,9],[4,9],[5,9],[6,9],[8,9]
    ];
    const startPos = {x: 0, y: 0};
    const goalPos = {x: 9, y: 9};
    
    let currentPos = {...startPos};
    let route = [];
    let moving = false;

    // Generar tablero
    const gridEl = document.getElementById('grid');
    gridEl.style.gridTemplateColumns = `repeat(${size}, 50px)`;
    
    function build() {
        gridEl.innerHTML = '';
        for(let y=0; y<size; y++) {
            for(let x=0; x<size; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (walls.some(w => w[0] === x && w[1] === y)) cell.className += ' wall';
                if (x === goalPos.x && y === goalPos.y) {
                    cell.className += ' goal';
                    cell.innerHTML = '🏁';
                }
                gridEl.appendChild(cell);
            }
        }
        draw();
    }

    function draw() {
        const m = document.getElementById('moto');
        m.style.left = (currentPos.x * 52) + 'px';
        m.style.top = (currentPos.y * 52) + 'px';
    }

    function add(dir) {
        if(moving) return;
        route.push(dir);
        const span = document.createElement('span');
        span.className = 'step';
        span.innerText = dir;
        document.getElementById('route-box').appendChild(span);
    }

    function resetRoute() {
        if(moving) return;
        route = [];
        document.getElementById('route-box').innerHTML = '';
        currentPos = {...startPos};
        draw();
    }

    // FUNCIÓN DE ARRANQUE GARANTIZADA
    async function run() {
        if (moving || route.length === 0) return;
        
        console.log("Iniciando secuencia de movimiento...");
        moving = true;
        document.getElementById('start-btn').innerText = "EN MARCHA...";
        
        // Reset a posición inicial antes de mover
        currentPos = {...startPos};
        draw();
        await new Promise(r => setTimeout(r, 500));

        for (const step of route) {
            let nextX = currentPos.x;
            let nextY = currentPos.y;

            if (step === '↑') nextY--;
            if (step === '↓') nextY++;
            if (step === '←') nextX--;
            if (step === '→') nextX++;

            // Validar límites y muros
            if (nextX < 0 || nextX >= size || nextY < 0 || nextY >= size || 
                walls.some(w => w[0] === nextX && w[1] === nextY)) {
                alert("¡CHOCASTE! Intenta una ruta diferente.");
                break;
            }

            currentPos.x = nextX;
            currentPos.y = nextY;
            draw();
            
            // Pausa entre movimientos
            await new Promise(r => setTimeout(r, 400));
        }

        if (currentPos.x === goalPos.x && currentPos.y === goalPos.y) {
            alert("¡LO LOGRASTE! Eres un genio de la ingeniería.");
        }

        moving = false;
        document.getElementById('start-btn').innerText = "¡ARRANCAR AHORA! 🏁";
    }

    window.onload = build;
</script>
</body>
</html>

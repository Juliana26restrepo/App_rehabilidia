<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motoruta Pro: Planificación Libre V7</title>
    <style>
        :root { --primary: #1e3a8a; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; --accent: #3b82f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--primary); color: white; width: 100%; padding: 15px; text-align: center; font-size: 1.5rem; font-weight: bold; }
        
        .main-content { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; padding: 20px; width: 100%; max-width: 1200px; }
        
        /* Área del Juego */
        #game-window { position: relative; border: 5px solid var(--primary); background: #fff; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; height: fit-content; }
        #grid { display: grid; gap: 1px; background: #cbd5e1; }
        .cell { background: #fff; display: flex; align-items: center; justify-content: center; }
        .wall { background: #334155 !important; color: white; font-size: 0.8rem; }
        .goal { background: #fef08a !important; border: 2px solid #eab308; }
        .house { background: #dbeafe !important; border: 2px dashed #3b82f6; }
        
        #moto { 
            position: absolute; z-index: 100; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; pointer-events: none;
        }

        /* Panel de Comandos */
        .controls { width: 450px; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* La "Cola" de movimientos */
        .command-list { 
            background: #f1f5f9; border: 2px dashed #cbd5e1; min-height: 80px; 
            margin-bottom: 20px; border-radius: 8px; display: flex; flex-wrap: wrap; 
            gap: 8px; padding: 10px; align-content: flex-start;
        }
        .cmd-badge { 
            background: var(--accent); color: white; padding: 5px 10px; 
            border-radius: 5px; font-weight: bold; display: flex; align-items: center; gap: 5px;
            animation: popIn 0.2s ease;
        }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        .dir-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-dir { 
            padding: 15px; border: none; border-radius: 8px; background: #e2e8f0; 
            font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s;
        }
        .btn-dir:hover { background: #cbd5e1; }
        .btn-dir:active { background: var(--accent); color: white; }

        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
        .btn-run { background: var(--success); color: white; border-bottom: 4px solid #16a34a; }
        .btn-clear { background: var(--danger); color: white; }
    </style>
</head>
<body>

<header>MOTORUTA V7: PLANIFICACIÓN POR SECUENCIA LIBRE</header>

<div class="main-content">
    <div id="game-window">
        <div id="moto">🏍️</div>
        <div id="grid"></div>
    </div>

    <div class="controls">
        <h3 style="margin-top:0; color: var(--primary);">Tu Ruta Programada:</h3>
        <div id="route-display" class="command-list">
            </div>

        <div class="dir-buttons">
            <button class="btn-dir" onclick="addMove('UP')">⬆ ARRIBA</button>
            <button class="btn-dir" onclick="addMove('DOWN')">⬇ ABAJO</button>
            <button class="btn-dir" onclick="addMove('LEFT')">⬅ IZQUIERDA</button>
            <button class="btn-dir" onclick="addMove('RIGHT')">➡ DERECHA</button>
        </div>

        <button class="btn-main btn-run" onclick="executeRoute()">EJECUTAR SECUENCIA 🏁</button>
        <button class="btn-main btn-clear" onclick="clearRoute()">BORRAR TODO</button>
    </div>
</div>

<script>
    let lvl = 1, ex = 1, active = false;
    let pos = {x: 0, y: 0}, cSize = 0;
    let targetMet = false;
    let sequence = []; // Aquí guardamos el orden exacto de clics

    const CONFIG = {
        1: { size: 8, exs: [
            {h:[7,0], g:[7,7], w:[[2,0],[2,1],[2,2],[3,2],[4,2],[5,2],[5,3],[5,4],[5,5]]}
        ]}
    };

    function addMove(dir) {
        if(active) return;
        sequence.push(dir);
        updateDisplay();
    }

    function updateDisplay() {
        const container = document.getElementById('route-display');
        container.innerHTML = '';
        const icons = { UP:'⬆', DOWN:'⬇', LEFT:'⬅', RIGHT:'➡' };
        sequence.forEach((step, idx) => {
            const span = document.createElement('span');
            span.className = 'cmd-badge';
            span.innerHTML = `${icons[step]}`;
            container.appendChild(span);
        });
    }

    function clearRoute() {
        if(active) return;
        sequence = [];
        updateDisplay();
        resetPosition();
    }

    function resetPosition() {
        pos = {x:0, y:0};
        targetMet = false;
        renderMoto();
    }

    function build() {
        const c = CONFIG[lvl];
        const e = c.exs[ex-1];
        const grid = document.getElementById('grid');
        const boardSize = 560;
        cSize = Math.floor(boardSize / c.size);

        grid.style.gridTemplateColumns = `repeat(${c.size}, ${cSize}px)`;
        grid.innerHTML = '';
        
        for(let y=0; y<c.size; y++){
            for(let x=0; x<c.size; x++){
                const div = document.createElement('div');
                div.className = 'cell';
                div.style.width = div.style.height = cSize + 'px';
                if(e.w.some(w => w[0]===x && w[1]===y)) {
                    div.classList.add('wall');
                    div.innerText = '✖';
                }
                if(x===e.g[0] && y===e.g[1]) { div.classList.add('goal'); div.innerText='🏁'; }
                if(x===e.h[0] && y===e.h[1]) { div.classList.add('house'); div.innerText='🏠'; }
                grid.appendChild(div);
            }
        }
        resetPosition();
    }

    function renderMoto() {
        const m = document.getElementById('moto');
        m.style.width = m.style.height = cSize + 'px';
        m.style.fontSize = (cSize * 0.7) + 'px';
        m.style.transform = `translate(${pos.x * cSize}px, ${pos.y * cSize}px)`;
    }

    async function executeRoute() {
        if(active || sequence.length === 0) return;
        active = true;
        const c = CONFIG[lvl];
        const e = c.exs[ex-1];

        for(let step of sequence) {
            let dx = 0, dy = 0;
            if(step === 'UP') dy = -1;
            if(step === 'DOWN') dy = 1;
            if(step === 'LEFT') dx = -1;
            if(step === 'RIGHT') dx = 1;

            let nx = pos.x + dx;
            let ny = pos.y + dy;

            if(nx < 0 || nx >= c.size || ny < 0 || ny >= c.size || e.w.some(w => w[0]===nx && w[1]===ny)) {
                alert("¡CRASH! Chocaste contra un muro o el borde.");
                clearRoute();
                active = false;
                return;
            }

            pos.x = nx; pos.y = ny;
            if(pos.x === e.h[0] && pos.y === e.h[1]) targetMet = true;
            
            renderMoto();
            await new Promise(r => setTimeout(r, 400));
        }

        if(pos.x === e.g[0] && pos.y === e.g[1] && targetMet) {
            alert("¡EXCELENTE! Ruta completada con éxito.");
        } else {
            alert(targetMet ? "No llegaste a la meta final." : "Olvidaste pasar por la casa 🏠.");
        }
        active = false;
    }

    window.onload = build;
</script>
</body>
</html>

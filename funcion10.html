<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motoruta Pro: 9 Desafíos de Planificación</title>
    <style>
        :root { --navy: #103A57; --gold: #FFD700; --bg: #F0F4F8; --white: #FFFFFF; --green: #2ECC71; --red: #E74C3C; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; }
        header { background: var(--navy); color: white; padding: 10px; font-weight: bold; text-align: center; font-size: 1.2rem; }
        .stats-bar { display: flex; justify-content: center; gap: 30px; padding: 10px; font-weight: bold; background: #e2e8f0; border-bottom: 2px solid var(--navy); }
        .game-container { display: flex; flex: 1; padding: 15px; gap: 20px; justify-content: center; align-items: center; flex-wrap: wrap; }
        
        #grid { display: grid; gap: 4px; background: #64748b; padding: 8px; border-radius: 8px; border: 4px solid var(--navy); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .cell { background: #e2e8f0; border-radius: 3px; display: flex; align-items: center; justify-content: center; position: relative; font-size: 1.8rem; }
        .wall { background: #1e293b; border: 1px solid #000; }
        .goal { background: var(--gold); border: 2px solid #b45309; }
        .moto { font-size: 2.2rem; z-index: 10; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .controls { display: flex; flex-direction: column; gap: 10px; width: 320px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .btn-dir { padding: 18px; font-size: 1.3rem; font-weight: bold; cursor: pointer; border: 2px solid var(--navy); border-radius: 10px; background: white; transition: 0.1s; }
        .btn-dir:active { background: #cbd5e1; transform: scale(0.95); }
        .btn-action { padding: 18px; font-weight: bold; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1.1rem; }
        #btn-go { background: var(--green); box-shadow: 0 5px 0 #166534; }
        #btn-go:active { transform: translateY(3px); box-shadow: 0 2px 0 #166534; }
        #btn-reset { background: var(--red); opacity: 0.9; margin-top: 5px; }

        #sequence-display { display: flex; flex-wrap: wrap; gap: 4px; min-height: 70px; border: 2px dashed #94a3b8; padding: 10px; border-radius: 8px; background: #f1f5f9; overflow-y: auto; max-height: 120px; }
        .command-icon { background: var(--navy); color: white; padding: 4px 8px; border-radius: 4px; font-size: 1rem; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.98); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 30px; }
        .btn-start { padding: 18px 50px; font-size: 1.3rem; cursor: pointer; background: var(--gold); border: none; border-radius: 40px; font-weight: bold; color: var(--navy); margin-top: 25px; }
    </style>
</head>
<body>

<header>MOTORUTA: ENTRENAMIENTO DE PLANIFICACIÓN</header>
<div class="stats-bar">
    <span>NIVEL: <span id="txt-nivel">1</span>/3</span>
    <span>EJERCICIO: <span id="txt-ejercicio">1</span>/3</span>
</div>

<div class="game-container">
    <div id="grid"></div>
    <div class="controls">
        <div id="sequence-display"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-dir" onclick="addCommand('UP')">⬆️</button>
            <button class="btn-dir" onclick="addCommand('DOWN')">⬇️</button>
            <button class="btn-dir" onclick="addCommand('LEFT')">⬅️</button>
            <button class="btn-dir" onclick="addCommand('RIGHT')">➡️</button>
        </div>
        <button id="btn-go" class="btn-action" onclick="runSequence()">ARRANCAR MOTO 🏍️</button>
        <button id="btn-reset" class="btn-action" onclick="resetSequence()">BORRAR RUTA</button>
    </div>
</div>

<div id="overlay" class="overlay">
    <h1 id="ov-title" style="color: var(--gold); font-size: 2.5rem;"></h1>
    <p id="ov-text" style="font-size: 1.5rem; max-width: 700px; line-height: 1.6;"></p>
    <button class="btn-start" onclick="closeOverlay()">¡ENTENDIDO!</button>
</div>

<script>
    let nivel = 1, ejercicio = 1, sequence = [], isMoving = false, playerPos = { x: 0, y: 0 };

    const dbMapas = {
        1: [
            { size: 4, walls: [[1,0],[1,1],[1,2]], goal: [3,1], start: [0,0] },
            { size: 4, walls: [[2,1],[2,2],[2,3],[0,2]], goal: [3,3], start: [0,0] },
            { size: 4, walls: [[1,1],[1,2],[1,3],[2,1]], goal: [3,0], start: [0,3] }
        ],
        2: [
            { size: 5, walls: [[1,1],[2,1],[3,1],[3,2],[3,3],[1,3]], goal: [2,2], start: [0,0] },
            { size: 5, walls: [[0,2],[1,2],[2,2],[3,2],[3,3],[3,4]], goal: [4,0], start: [4,4] },
            { size: 5, walls: [[1,0],[1,1],[1,2],[1,3],[3,1],[3,2],[3,3],[3,4]], goal: [4,2], start: [0,2] }
        ],
        3: [
            { size: 6, walls: [[1,0],[1,1],[1,2],[1,3],[1,4],[3,1],[3,2],[3,3],[3,4],[3,5],[5,0],[5,1],[5,2],[5,3],[5,4]], goal: [4,5], start: [0,0] },
            { size: 6, walls: [[0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[0,4],[1,4],[2,4],[3,4],[4,4],[5,4]], goal: [5,5], start: [0,0] },
            { size: 6, walls: [[1,1],[2,1],[3,1],[4,1],[1,2],[4,2],[1,3],[4,3],[1,4],[2,4],[3,4],[4,4]], goal: [2,2], start: [0,0] }
        ]
    };

    function speak(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        window.speechSynthesis.speak(m);
    }

    function initGame() {
        const c = dbMapas[nivel][ejercicio - 1];
        const grid = document.getElementById('grid');
        const availableHeight = window.innerHeight - 300;
        const cellSize = Math.min(Math.floor(availableHeight / c.size), 80);
        
        grid.style.gridTemplateColumns = `repeat(${c.size}, ${cellSize}px)`;
        grid.style.gridTemplateRows = `repeat(${c.size}, ${cellSize}px)`;
        grid.innerHTML = '';
        playerPos = { ...c.start };
        
        for (let y = 0; y < c.size; y++) {
            for (let x = 0; x < c.size; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${x}-${y}`;
                if (x === c.goal[0] && y === c.goal[1]) {
                    cell.classList.add('goal');
                    cell.innerHTML = '🏁';
                }
                if (c.walls.some(w => w[0] === x && w[1] === y)) cell.classList.add('wall');
                grid.appendChild(cell);
            }
        }
        updatePlayerUI();
    }

    function updatePlayerUI() {
        document.querySelectorAll('.moto').forEach(m => m.remove());
        const target = document.getElementById(`cell-${playerPos.x}-${playerPos.y}`);
        if(target) {
            const moto = document.createElement('div');
            moto.className = 'moto';
            moto.innerText = '🏍️';
            target.appendChild(moto);
        }
    }

    function addCommand(dir) {
        if(isMoving) return;
        sequence.push(dir);
        renderSequence();
    }

    window.addEventListener('keydown', (e) => {
        if(e.key === "ArrowUp") addCommand('UP');
        if(e.key === "ArrowDown") addCommand('DOWN');
        if(e.key === "ArrowLeft") addCommand('LEFT');
        if(e.key === "ArrowRight") addCommand('RIGHT');
        if(e.key === "Enter") runSequence();
    });

    function renderSequence() {
        const display = document.getElementById('sequence-display');
        display.innerHTML = '';
        const icons = { 'UP': '⬆️', 'DOWN': '⬇️', 'LEFT': '⬅️', 'RIGHT': '➡️' };
        sequence.forEach(cmd => {
            const span = document.createElement('span');
            span.className = 'command-icon';
            span.innerText = icons[cmd];
            display.appendChild(span);
        });
        display.scrollTop = display.scrollHeight;
    }

    function resetSequence() {
        if(isMoving) return;
        sequence = [];
        const c = dbMapas[nivel][ejercicio - 1];
        playerPos = { ...c.start };
        renderSequence();
        updatePlayerUI();
    }

    async function runSequence() {
        if(isMoving || sequence.length === 0) return;
        isMoving = true;
        const c = dbMapas[nivel][ejercicio - 1];

        for (let cmd of sequence) {
            let nX = playerPos.x, nY = playerPos.y;
            if (cmd === 'UP') nY--; if (cmd === 'DOWN') nY++;
            if (cmd === 'LEFT') nX--; if (cmd === 'RIGHT') nX++;

            if (nX < 0 || nX >= c.size || nY < 0 || nY >= c.size || c.walls.some(w => w[0] === nX && w[1] === nY)) {
                speak("¡Choqué! Revisa tu ruta.");
                setTimeout(resetSequence, 600);
                isMoving = false;
                return;
            }
            playerPos = { x: nX, y: nY };
            updatePlayerUI();
            await new Promise(r => setTimeout(r, 300));
        }

        if (playerPos.x === c.goal[0] && playerPos.y === c.goal[1]) {
            speak("¡Excelente ruta!");
            setTimeout(nextStep, 800);
        } else {
            speak("No llegaste a la bandera.");
            isMoving = false;
        }
    }

    function nextStep() {
        isMoving = false;
        if (ejercicio < 3) {
            ejercicio++;
            document.getElementById('txt-ejercicio').innerText = ejercicio;
            resetSequence();
            initGame();
        } else if (nivel < 3) {
            nivel++; ejercicio = 1;
            document.getElementById('txt-nivel').innerText = nivel;
            document.getElementById('txt-ejercicio').innerText = ejercicio;
            showLevelIntro();
        } else {
            mostrarOverlay("¡MAESTRO DE LA PLANIFICACIÓN!", "Has superado los 9 desafíos con éxito. ¡Tu cerebro está en su mejor forma!");
        }
    }

    function showLevelIntro() {
        let t = `NIVEL ${nivel}`;
        let m = nivel === 1 ? "Observa el mapa. Planifica con las flechas cada paso de la moto hasta la bandera. ¡Tienes 3 ejercicios por delante!" : 
                nivel === 2 ? "¡Muy bien! Los mapas ahora son más grandes. Tienes que pensar más pasos antes de arrancar." : 
                "¡ZONA DE EXPERTOS! Laberintos complejos. Si logras estos 3 ejercicios, habrás completado el protocolo.";
        mostrarOverlay(t, m);
    }

    function mostrarOverlay(t, m) {
        document.getElementById('ov-title').innerText = t;
        document.getElementById('ov-text').innerText = m;
        document.getElementById('overlay').style.display = 'flex';
        speak(t + ". " + m);
    }

    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        initGame();
    }

    window.onload = showLevelIntro;
</script>
</body>
</html>

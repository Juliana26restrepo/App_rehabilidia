<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motoruta Pro: Rehabilitación Juan</title>
    <style>
        :root { --primary: #1e3a8a; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--primary); color: white; width: 100%; padding: 15px; text-align: center; font-size: 1.5rem; font-weight: bold; }
        .stats { background: #fff; width: 100%; display: flex; justify-content: center; gap: 30px; padding: 10px; border-bottom: 2px solid #e2e8f0; font-weight: bold; color: var(--primary); }
        .main-content { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; width: 100%; max-width: 1200px; }
        #game-window { position: relative; border: 5px solid var(--primary); background: #fff; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        #grid { display: grid; gap: 1px; background: #cbd5e1; }
        .cell { background: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .wall { background: #334155 !important; }
        .goal { background: #fef08a !important; border: 2px solid #eab308; }
        .house { background: #dbeafe !important; border: 2px dashed #3b82f6; }
        #moto { position: absolute; z-index: 100; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .controls { width: 400px; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        #route-list { min-height: 60px; max-height: 120px; overflow-y: auto; background: #f1f5f9; border: 2px dashed #cbd5e1; border-radius: 8px; padding: 10px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 5px; }
        .step-tag { background: var(--primary); color: white; padding: 4px 10px; border-radius: 15px; font-size: 0.85rem; font-weight: bold; }
        .input-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-card { background: #f8fafc; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; text-align: center; }
        .btn-mini { width: 28px; height: 28px; border: none; border-radius: 50%; background: #64748b; color: white; cursor: pointer; }
        .btn-add { width: 100%; background: var(--primary); color: white; border: none; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; margin-top: 5px; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn-run { background: var(--success); color: white; }
        .btn-clear { background: var(--danger); color: white; }
        #hint-box { margin-top: 10px; padding: 10px; background: #fffbeb; border: 1px solid #fef3c7; color: #92400e; border-radius: 8px; display: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>MOTORUTA: ENTRENAMIENTO PARA JUAN</header>
<div class="stats">
    <span>NIVEL: <span id="lvl-txt">1</span>/3</span>
    <span>EJERCICIO: <span id="ex-txt">1</span>/3</span>
    <span>FALLOS: <span id="fail-txt">0</span></span>
</div>

<div class="main-content">
    <div id="game-window">
        <div id="moto">🏍️</div>
        <div id="grid"></div>
    </div>

    <div class="controls">
        <div id="route-list"></div>
        <div class="input-zone">
            <div class="input-card"><label>ARRIBA</label><div class="stepper"><button class="btn-mini" onclick="mod('arr',-1)">-</button> <span id="tmp-arr">1</span> <button class="btn-mini" onclick="mod('arr',1)">+</button></div><button class="btn-add" onclick="addStep('arr')">AÑADIR</button></div>
            <div class="input-card"><label>ABAJO</label><div class="stepper"><button class="btn-mini" onclick="mod('aba',-1)">-</button> <span id="tmp-aba">1</span> <button class="btn-mini" onclick="mod('aba',1)">+</button></div><button class="btn-add" onclick="addStep('aba')">AÑADIR</button></div>
            <div class="input-card"><label>IZQ</label><div class="stepper"><button class="btn-mini" onclick="mod('izq',-1)">-</button> <span id="tmp-izq">1</span> <button class="btn-mini" onclick="mod('izq',1)">+</button></div><button class="btn-add" onclick="addStep('izq')">AÑADIR</button></div>
            <div class="input-card"><label>DER</label><div class="stepper"><button class="btn-mini" onclick="mod('der',-1)">-</button> <span id="tmp-der">1</span> <button class="btn-mini" onclick="mod('der',1)">+</button></div><button class="btn-add" onclick="addStep('der')">AÑADIR</button></div>
        </div>
        <div id="hint-box"></div>
        <button class="btn-main btn-run" onclick="execute()">INICIAR RUTA 🏁</button>
        <button class="btn-main btn-clear" onclick="clearRoute()">BORRAR PROGRAMACIÓN</button>
    </div>
</div>

<script>
    let lvl = 1, ex = 1, fails = 0, totalAttempts = 0, totalSuccess = 0;
    let active = false, pos = {x:0, y:0}, targetMet = false, program = [];
    let tmpVals = { arr: 1, aba: 1, izq: 1, der: 1 };

    // CONFIGURACIÓN AJUSTADA FIELMENTE A LAS FOTOS (Eje Y corregido)
    const CONFIG = {
        1: { size: 8, exs: [
            {i:[0,7], g:[3,3], h:[6,2], w:[[1,7],[1,6],[3,2],[4,2],[3,4],[4,4],[1,1],[1,2],[0,3],[6,6],[7,6],[0,5]], hint: "Juan, primero sube un poco y luego gira a la derecha para evitar los muros de abajo."},
            {i:[7,7], g:[3,0], h:[1,3], w:[[6,7],[5,7],[4,7],[1,1],[3,2],[6,2],[0,4],[3,4],[4,4],[5,6]], hint: "Empieza moviéndote hacia la izquierda, Juan. Hay muchos muros en el centro."},
            {i:[3,3], g:[7,6], h:[1,1], w:[[2,3],[4,3],[3,2],[3,4],[0,0],[5,0],[2,1],[6,1],[4,2],[0,4],[1,5],[5,5]], hint: "La casa está arriba a la izquierda, debes rodear el centro."}
        ]},
        2: { size: 12, exs: [
            {i:[2,9], g:[1,4], h:[11,10], w:[[1,9],[3,9],[2,8],[2,10],[0,0],[4,0],[11,0],[3,1],[8,2],[10,4],[6,5],[11,7]], hint: "Ve primero hacia la casa que está en la esquina inferior derecha."},
            {i:[1,1], g:[11,3], h:[6,8], w:[[3,0],[7,0],[0,2],[5,2],[10,2],[4,4],[8,4],[1,6],[6,6],[11,6]], hint: "Cuidado con los muros en forma de pasillo, Juan."},
            {i:[10,1], g:[6,11], h:[2,7], w:[[0,0],[6,0],[1,2],[8,2],[4,4],[11,4],[2,6],[9,6],[0,8],[6,8]], hint: "Cruza el tablero hacia la izquierda para buscar la casa primero."}
        ]},
        3: { size: 16, exs: [
            {i:[7,8], g:[0,0], h:[3,5], w:[[2,2],[8,2],[14,2],[4,4],[10,4],[6,6],[12,6],[2,10],[8,10],[14,10],[4,12],[10,12]], hint: "En este tablero grande, cuenta bien los cuadros uno a uno."},
            {i:[15,15], g:[0,0], h:[5,5], w:[[1,1],[3,3],[5,1],[7,3],[9,1],[11,3],[13,1],[1,7],[3,9],[5,7],[7,9]], hint: "La meta está en la esquina opuesta, planea una ruta larga."},
            {i:[0,15], g:[15,0], h:[8,8], w:[[2,0],[2,2],[4,4],[6,6],[8,10],[10,12],[12,14],[14,2],[0,8],[4,8],[12,8]], hint: "Pasa por el centro para visitar la casa antes de subir a la meta."}
        ]}
    };

    function speak(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; window.speechSynthesis.speak(m); }
    function mod(d, v) { tmpVals[d] = Math.max(1, Math.min(15, tmpVals[d] + v)); document.getElementById(`tmp-${d}`).innerText = tmpVals[d]; }
    function addStep(dir) { if(active) return; program.push({ dir, n: tmpVals[dir] }); updateRouteUI(); }

    function updateRouteUI() {
        const l = document.getElementById('route-list'); l.innerHTML = '';
        const ns = { arr:'⬆', aba:'⬇', izq:'⬅', der:'➡' };
        program.forEach(p => { const s = document.createElement('span'); s.className = 'step-tag'; s.innerHTML = `${ns[p.dir]} ${p.n}`; l.appendChild(s); });
    }

    function build() {
        active = false;
        const c = CONFIG[lvl], e = c.exs[ex-1];
        const g = document.getElementById('grid');
        const boardSize = 550;
        cSize = Math.floor(boardSize / c.size);
        g.style.gridTemplateColumns = `repeat(${c.size}, ${cSize}px)`;
        g.innerHTML = '';
        
        for(let y=0; y<c.size; y++){
            for(let x=0; x<c.size; x++){
                const d = document.createElement('div'); d.className = 'cell';
                d.style.width = d.style.height = cSize + 'px';
                if(e.w.some(w => w[0]===x && w[1]===y)) d.classList.add('wall');
                if(x===e.g[0] && y===e.g[1]) { d.classList.add('goal'); d.innerText='🏁'; }
                if(x===e.h[0] && y===e.h[1]) { d.classList.add('house'); d.innerText='🏠'; }
                g.appendChild(d);
            }
        }
        pos = {x: e.i[0], y: e.i[1]};
        targetMet = false;
        renderMoto();
        document.getElementById('hint-box').style.display = 'none';
        speak("Juan vamos a realizar la ruta, debes de ir contando los cuadros y sumándolos con los botones, cuando creas que ya tienes la ruta completa le das iniciar ruta");
    }

    function renderMoto() {
        const m = document.getElementById('moto');
        m.style.width = m.style.height = cSize + 'px';
        m.style.fontSize = (cSize * 0.7) + 'px';
        m.style.transform = `translate(${pos.x * cSize}px, ${pos.y * cSize}px)`;
    }

    async function execute() {
        if(active || program.length === 0) return;
        active = true; totalAttempts++;
        const c = CONFIG[lvl], e = c.exs[ex-1];
        const ds = { der:{x:1,y:0}, izq:{x:-1,y:0}, aba:{x:0,y:1}, arr:{x:0,y:-1} };

        for(let s of program) {
            const d = ds[s.dir];
            for(let i=0; i<s.n; i++) {
                let nx = pos.x + d.x, ny = pos.y + d.y;
                if(nx < 0 || nx >= c.size || ny < 0 || ny >= c.size || e.w.some(w => w[0]===nx && w[1]===ny)) {
                    fails++; document.getElementById('fail-txt').innerText = fails;
                    speak("¡Choque Juan! Vuelve a intentarlo.");
                    if(fails % 2 === 0) {
                        document.getElementById('hint-box').innerText = "PISTA: " + e.hint;
                        document.getElementById('hint-box').style.display = 'block';
                        speak("Mira la pista que apareció en pantalla.");
                    }
                    resetCurrent(); return;
                }
                pos.x = nx; pos.y = ny;
                if(pos.x === e.h[0] && pos.y === e.h[1]) { targetMet = true; speak("¡Pasaste por la casa!"); }
                renderMoto();
                await new Promise(r => setTimeout(r, 350));
            }
        }

        if(pos.x === e.g[0] && pos.y === e.g[1] && targetMet) {
            totalSuccess++; speak("¡Excelente Juan! Lo lograste.");
            setTimeout(next, 1500);
        } else {
            speak(targetMet ? "Juan, no llegaste a la meta." : "Juan, olvidaste pasar por la casa.");
            active = false;
        }
    }

    function resetCurrent() { active = false; const e = CONFIG[lvl].exs[ex-1]; pos = {x: e.i[0], y: e.i[1]}; renderMoto(); }
    function clearRoute() { program = []; updateRouteUI(); resetCurrent(); }

    function next() {
        if(ex < 3) ex++; else { lvl++; ex = 1; }
        if(lvl > 3) {
            let score = Math.round((totalSuccess / totalAttempts) * 100);
            speak(`Juan, has terminado. Tu precisión fue del ${score} por ciento.`);
            alert(`RESULTADOS FINALES\nPrecisión: ${score}%\nFallos totales: ${fails}`);
            lvl=1; ex=1; fails=0; totalAttempts=0; totalSuccess=0;
        }
        document.getElementById('lvl-txt').innerText = lvl;
        document.getElementById('ex-txt').innerText = ex;
        document.getElementById('size-txt').innerText = `${CONFIG[lvl].size}x${CONFIG[lvl].size}`;
        program = []; updateRouteUI(); build();
    }

    window.onload = build;
</script>
</body>
</html>

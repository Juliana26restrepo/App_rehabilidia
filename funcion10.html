<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motoruta Juan - Rehabilitación Cognitiva v2</title>
    <style>
        :root { 
            --primary: #1e3a8a; 
            --success: #22c55e; 
            --danger: #ef4444; 
            --bg: #f8fafc; 
            --orange: #fb923c; 
            --slate: #334155;
        }

        * { box-sizing: border-box; touch-action: manipulation; }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #1e1e1e; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Sistema Universal Zoom */
        #main-container {
            width: 100vw;
            height: 100vh;
            max-width: 1100px;
            max-height: 800px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        header { 
            background: var(--primary); 
            color: white; 
            padding: 10px; 
            text-align: center; 
            font-size: clamp(1rem, 4vw, 1.3rem); 
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .instruction-banner { 
            background: #fff7ed; border: 2px solid var(--orange); color: #9a3412; 
            padding: 8px 15px; margin: 10px; border-radius: 8px; 
            font-weight: bold; text-align: center; font-size: clamp(0.8rem, 3vw, 1rem);
            flex-shrink: 0;
        }

        .stats { 
            background: #fff; display: flex; justify-content: center; gap: 20px; 
            padding: 8px; border-bottom: 1px solid #cbd5e1; font-weight: bold;
            font-size: 0.9rem;
        }

        .main-content { 
            flex: 1;
            display: flex; 
            flex-wrap: nowrap; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            padding: 10px; 
            overflow: hidden;
        }
        
        #game-window { 
            position: relative; 
            border: 4px solid var(--primary); 
            background: #fff; 
            border-radius: 8px; 
            overflow: hidden;
            flex-shrink: 0;
        }

        #grid { display: grid; background: #cbd5e1; gap: 1px; }
        
        .cell { 
            background: #fff; display: flex; align-items: center; 
            justify-content: center; font-size: clamp(0.7rem, 2vw, 1.2rem); 
        }
        .wall { background: var(--slate) !important; }
        .goal { background: #fef08a !important; }
        .house { background: #dbeafe !important; border: 1px solid #3b82f6; }
        
        #moto { 
            position: absolute; z-index: 100; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; align-items: center; justify-content: center; 
            pointer-events: none; 
        }
        
        .controls { 
            width: 320px; background: #fff; padding: 15px; 
            border-radius: 12px; border: 1px solid #cbd5e1;
            display: flex; flex-direction: column; height: 100%;
            max-height: 550px;
        }

        #route-list { 
            flex: 1; min-height: 60px; overflow-y: auto; 
            background: #f1f5f9; border: 2px dashed #94a3b8; 
            border-radius: 8px; padding: 8px; margin-bottom: 10px; 
            display: flex; flex-wrap: wrap; gap: 5px; align-content: flex-start;
        }

        .step-tag { 
            background: var(--primary); color: white; padding: 4px 10px; 
            border-radius: 15px; font-size: 0.85rem; font-weight: bold; 
        }
        
        .input-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-card { 
            background: #f8fafc; padding: 8px; border: 1px solid #e2e8f0; 
            border-radius: 8px; text-align: center; font-weight: bold; font-size: 0.75rem;
        }

        .btn-mini { 
            width: 28px; height: 28px; border: none; border-radius: 50%; 
            background: #64748b; color: white; cursor: pointer; 
        }
        .btn-add { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 8px; border-radius: 5px; cursor: pointer; margin-top: 5px; font-size: 0.75rem;
        }
        .btn-run { 
            background: var(--success); color: white; border: none; 
            padding: 12px; border-radius: 8px; font-weight: bold; 
            cursor: pointer; margin-top: 10px; font-size: 1.1rem;
        }

        /* Modal de Resultados */
        .modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000;
            display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px; text-align: center;
            max-width: 400px; width: 90%;
        }

        @media (max-width: 800px) {
            .main-content { flex-direction: column; overflow-y: auto; }
            .controls { width: 100%; max-height: none; }
            #main-container { height: auto; min-height: 100vh; overflow-y: auto; }
        }
    </style>
</head>
<body>

<div id="main-container">
    <header>MOTORUTA: ENTRENAMIENTO DE JUAN</header>

    <div class="instruction-banner" id="main-inst">Cargando nivel...</div>

    <div class="stats">
        <span>NIVEL: <span id="lvl-txt">1</span></span>
        <span>EJERCICIO: <span id="ex-txt">1</span></span>
        <span>ERRORES: <span id="fail-txt">0</span></span>
    </div>

    <div class="main-content">
        <div id="game-window">
            <div id="moto">🏍️</div>
            <div id="grid"></div>
        </div>

        <div class="controls">
            <div id="route-list"></div>
            <div class="input-zone">
                <div class="input-card">⬆ SUBIR<br><button class="btn-mini" onpointerdown="m('arr',-1)">-</button> <span id="t-arr">1</span> <button class="btn-mini" onpointerdown="m('arr',1)">+</button><button class="btn-add" onpointerdown="add('arr')">AÑADIR</button></div>
                <div class="input-card">⬇ BAJAR<br><button class="btn-mini" onpointerdown="m('aba',-1)">-</button> <span id="t-aba">1</span> <button class="btn-mini" onpointerdown="m('aba',1)">+</button><button class="btn-add" onpointerdown="add('aba')">AÑADIR</button></div>
                <div class="input-card">⬅ IZQ<br><button class="btn-mini" onpointerdown="m('izq',-1)">-</button> <span id="t-izq">1</span> <button class="btn-mini" onpointerdown="m('izq',1)">+</button><button class="btn-add" onpointerdown="add('izq')">AÑADIR</button></div>
                <div class="input-card">➡ DER<br><button class="btn-mini" onpointerdown="m('der',-1)">-</button> <span id="t-der">1</span> <button class="btn-mini" onpointerdown="m('der',1)">+</button><button class="btn-add" onpointerdown="add('der')">AÑADIR</button></div>
            </div>
            <button class="btn-run" onpointerdown="execute()">INICIAR RUTA 🏁</button>
            <button onpointerdown="clearR()" style="margin-top:10px; border:none; background:none; color:var(--danger); cursor:pointer; text-decoration: underline; font-size: 0.8rem;">BORRAR RUTA</button>
        </div>
    </div>

    <div id="result-modal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--primary)">Resumen de Sesión</h2>
            <div id="resumen-final" style="text-align: left; margin: 20px 0; line-height: 1.8;"></div>
            <button class="btn-run" style="width: 100%" onpointerdown="guardarYSalir()">GUARDAR Y SALIR</button>
        </div>
    </div>
</div>

<script>
    let lvl = 1, ex = 1, fails = 0, totalSuccess = 0, prog = [], active = false, pos = {x:0, y:0};
    let st = { perro: false, gato: false, parque: false, casa: false };
    let tmp = { arr: 1, aba: 1, izq: 1, der: 1 };
    const TOTAL_EJERCICIOS = 9;

    const DB = {
        1: { s: 8, exs: [
            {i:[0,0], g:[4,4], h:[5,6], w:[[1,0],[1,1],[1,2],[1,3],[2,5],[3,5],[4,5],[5,4],[6,7]], ex:[]},
            {i:[0,7], g:[7,4], h:[4,0], w:[[1,7],[3,6],[4,6],[6,1],[6,2],[2,2],[3,2]], ex:[]},
            {i:[4,3], g:[2,7], h:[6,0], w:[[0,0],[1,0],[0,1],[6,1],[7,1],[2,2],[4,2],[3,4],[4,4],[7,6],[7,7]], ex:[]}
        ]},
        2: { s: 12, exs: [
            {i:[2,4], g:[6,1], h:[1,11], w:[[0,0],[1,0],[2,0],[3,0],[0,1],[0,2],[0,3],[4,2],[5,2],[6,2],[8,4],[8,5],[8,6],[4,7],[4,8],[10,10]], ex:[{x:4,y:9,id:'perro',img:'🐶'}]},
            {i:[10,1], g:[6,10], h:[3,7], w:[[0,4],[1,4],[2,4],[4,4],[2,5],[2,6],[2,8],[1,8],[6,1],[6,2],[6,3],[7,3],[8,3],[10,8],[9,8]], ex:[{x:5,y:3,id:'perro',img:'🐶'}]},
            {i:[5,5], g:[11,0], h:[8,8], w:[[2,1],[2,2],[3,2],[6,2],[7,2],[10,2],[1,4],[2,4],[6,4],[10,5],[10,6],[3,8],[4,8],[7,10],[1,10]], ex:[{x:1,y:11,id:'perro',img:'🐶'}]}
        ]},
        3: { s: 16, exs: [
            {i:[8,6], g:[15,15], h:[11,10], w:[[2,2],[3,2],[4,2],[6,2],[10,2],[12,2],[2,4],[2,6],[2,8],[6,8],[8,8],[10,8],[12,8],[14,8],[6,10],[6,12],[10,12]], ex:[{x:1,y:1,id:'perro',img:'🐶'},{x:14,y:1,id:'gato',img:'🐱'},{x:1,y:11,id:'parque',img:'🌳'}]}, 
            {i:[0,0], g:[15,15], h:[0,15], w:[[1,1],[1,2],[1,3],[3,1],[4,1],[5,1],[7,5],[8,5],[9,5],[11,11],[12,11],[5,10],[6,10],[7,10]], ex:[{x:8,y:8,id:'perro',img:'🐶'},{x:15,y:0,id:'gato',img:'🐱'},{x:7,y:11,id:'parque',img:'🌳'}]},
            {i:[7,2], g:[0,0], h:[7,8], w:[[0,2],[1,2],[3,2],[10,5],[11,5],[12,5],[5,10],[5,11],[5,12],[14,14],[13,14],[12,14]], ex:[{x:13,y:2,id:'perro',img:'🐶'},{x:7,y:14,id:'gato',img:'🐱'},{x:1,y:9,id:'parque',img:'🌳'}]}
        ]}
    };

    function getInstruccion() {
        if(lvl === 1) return "Juan: Cuenta los cuadros. Ve primero a la CASA y luego a la META.";
        if(lvl === 2) return "Juan: Recoge al PERRO, llévalo a la CASA y luego ve a la META.";
        if(lvl === 3) return "Juan: Recoge PERRO y GATO, ve al ÁRBOL, luego a la CASA y a la META.";
    }

    function speak(t) { 
        window.speechSynthesis.cancel(); 
        const m = new SpeechSynthesisUtterance(t); 
        m.lang = 'es-ES'; m.rate = 0.95;
        window.speechSynthesis.speak(m); 
    }

    function m(d, v) { tmp[d] = Math.max(1, Math.min(15, tmp[d] + v)); document.getElementById('t-'+d).innerText = tmp[d]; }
    function add(d) { if(active) return; prog.push({d, n: tmp[d]}); updateUI(); }
    function clearR() { if(active) return; prog = []; updateUI(); resetM(); }

    function updateUI() {
        const l = document.getElementById('route-list'); l.innerHTML = '';
        const icon = { arr:'⬆', aba:'⬇', izq:'⬅', der:'➡' };
        prog.forEach(p => { 
            const s = document.createElement('span'); s.className = 'step-tag'; 
            s.innerText = `${icon[p.d]} ${p.n}`; l.appendChild(s); 
        });
        document.getElementById('main-inst').innerText = getInstruccion();
        document.getElementById('lvl-txt').innerText = lvl;
        document.getElementById('ex-txt').innerText = ex;
    }

    function build() {
        const c = DB[lvl], e = c.exs[ex-1];
        const g = document.getElementById('grid');
        
        // Cálculo de tamaño responsivo manteniendo el grid visible
        const winH = window.innerHeight;
        const headerH = 150;
        const availableH = winH - headerH - 100;
        const availableW = window.innerWidth > 800 ? window.innerWidth - 400 : window.innerWidth - 40;
        const dimension = Math.min(availableW, availableH, 550);
        
        const sz = Math.floor(dimension / c.s);
        g.style.gridTemplateColumns = `repeat(${c.s}, ${sz}px)`;
        g.innerHTML = '';
        st = { perro: false, gato: false, parque: false, casa: false };

        for(let y=0; y<c.s; y++) {
            for(let x=0; x<c.s; x++) {
                const d = document.createElement('div'); d.className = 'cell';
                d.style.width = d.style.height = sz + 'px';
                if(e.w.some(w => w[0]==x && w[1]==y)) d.classList.add('wall');
                if(x==e.g[0] && y==e.g[1]) { d.className += ' goal'; d.innerText='🏁'; }
                if(x==e.h[0] && y==e.h[1]) { d.className += ' house'; d.innerText='🏠'; }
                const item = e.ex.find(o => o.x==x && o.y==y);
                if(item) { d.innerText = item.img; d.id = 'o-'+item.id; }
                g.appendChild(d);
            }
        }
        pos = {x: e.i[0], y: e.i[1]};
        const mNode = document.getElementById('moto'); 
        mNode.style.width = mNode.style.height = sz+'px'; 
        mNode.style.fontSize = (sz * 0.7)+'px';
        renderM(); updateUI();
        speak(getInstruccion());
    }

    function renderM() {
        const sz = document.querySelector('.cell').offsetWidth;
        document.getElementById('moto').style.transform = `translate(${pos.x * sz}px, ${pos.y * sz}px)`;
    }

    async function execute() {
        if(active || prog.length == 0) return;
        active = true;
        const e = DB[lvl].exs[ex-1];
        const moves = { der:{x:1,y:0}, izq:{x:-1,y:0}, aba:{x:0,y:1}, arr:{x:0,y:-1} };

        for(let step of prog) {
            for(let i=0; i<step.n; i++) {
                let nx = pos.x + moves[step.d].x, ny = pos.y + moves[step.d].y;
                if(nx<0 || nx>=DB[lvl].s || ny<0 || ny>=DB[lvl].s || e.w.some(w => w[0]==nx && w[1]==ny)) {
                    fails++; document.getElementById('fail-txt').innerText = fails;
                    speak("¡Cuidado Juan, chocaste! Revisa tu ruta.");
                    resetM(); active = false; return;
                }
                pos.x = nx; pos.y = ny; renderM();
                checkLogic(e);
                await new Promise(r => setTimeout(r, 300));
            }
        }

        if(pos.x == e.g[0] && pos.y == e.g[1] && st.casa) {
            totalSuccess++;
            speak("¡Excelente trabajo Juan!");
            setTimeout(() => { 
                ex++; 
                if(ex > 3){ lvl++; ex = 1; } 
                if(lvl > 3){ finalizarSesion(); return; }
                prog = [];
                build(); 
                active = false; 
            }, 1500);
        } else {
            speak("No has completado todos los pasos de la instrucción. Revisa la ruta.");
            active = false;
        }
    }

    function checkLogic(e) {
        e.ex.forEach(o => {
            if(pos.x == o.x && pos.y == o.y) {
                st[o.id] = true;
                const el = document.getElementById('o-'+o.id);
                if(el) el.style.opacity = "0.3";
            }
        });
        if(pos.x == e.h[0] && pos.y == e.h[1]) {
            if(lvl==1) st.casa = true;
            if(lvl==2 && st.perro) st.casa = true;
            if(lvl==3 && st.perro && st.gato && st.parque) st.casa = true;
        }
    }

    function resetM() { 
        const e = DB[lvl].exs[ex-1];
        pos = {x: e.i[0], y: e.i[1]}; 
        renderM(); 
    }

    function finalizarSesion() {
        const eficacia = ((totalSuccess / TOTAL_EJERCICIOS) * 100).toFixed(0);
        const resumen = `
            <strong>Aciertos:</strong> ${totalSuccess} / ${TOTAL_EJERCICIOS}<br>
            <strong>Errores (Choques):</strong> ${fails}<br>
            <strong>Eficacia:</strong> ${eficacia}%
        `;
        document.getElementById('resumen-final').innerHTML = resumen;
        document.getElementById('result-modal').style.display = 'flex';
        speak("Sesión completada. Mira tus resultados.");
    }

    function guardarYSalir() {
        const eficacia = ((totalSuccess / TOTAL_EJERCICIOS) * 100).toFixed(0);
        const data = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Funciones Ejecutivas",
            id_sesion: 10,
            aciertos: totalSuccess,
            errores: fails,
            eficacia: eficacia + "%"
        };
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(data));
        window.location.href = 'menu.html'; // O la ruta correspondiente
    }

    window.addEventListener('resize', renderM);
    window.onload = build;
    // --- ESTA FUNCIÓN GUARDA SIN BORRAR LO ANTERIOR ---
    function irAlMenu() {
        const ef = Math.round((aciertos / (aciertos + errores)) * 100) || 0;
        
        const datosSesion = {
            fecha: new Date().toLocaleDateString(),
            modulo: "funcion ejecutiva", 
            id_sesion: 10,       
            aciertos: aciertos,
            errores: errores,
            eficacia: ef + "%"
        };

        let historial = JSON.parse(localStorage.getItem('sesiones_rehabilitidia')) || []; 
        if (!Array.isArray(historial)) historial = []; 
        historial.push(datosSesion); 
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(historial)); 

        window.location.href = "atencion_sesiones.html";
    }

    // --- TRUCO FINAL: ESTO CONECTA EL BOTÓN AUTOMÁTICAMENTE ---
    // Busca cualquier botón que diga "FINALIZAR" y le pone la función
    document.querySelectorAll('button').forEach(boton => {
        if(boton.innerText.includes("FINALIZAR")) {
            boton.onclick = irAlMenu;
        }
    });
</script>
</body>
</html>

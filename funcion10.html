<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logística de Colores - REHABILIDIA</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --gold: #FFD700; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; background-color: #FDF5E6; touch-action: none; }
        
        #overlay-inicio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.95); z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; cursor: pointer; }
        
        #guia { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: white; padding: 10px; border-radius: 15px; border: 3px solid var(--t-blue); width: 90%; max-width: 400px; display: flex; align-items: center; gap: 10px; z-index: 100; }
        #guia img { width: 45px; height: 45px; border-radius: 50%; }

        #escenario { width: 100vw; height: 100vh; position: relative; background: #eee; overflow: hidden; border-left: 20vw solid #ddd; border-right: 20vw solid #ddd; box-sizing: border-box; }
        
        .casa { position: absolute; font-size: 4rem; top: 5%; }
        .casa-roja { left: 5%; }
        .casa-azul { right: 5%; }

        .carrito { position: absolute; font-size: 3.5rem; cursor: pointer; z-index: 10; transition: left 0.2s ease; bottom: -10%; }

        #info-nivel { position: fixed; bottom: 10px; left: 10px; background: white; padding: 5px 10px; border-radius: 8px; font-weight: bold; color: var(--p-blue); z-index: 100; }

        #modal-resultados { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 300; display: none; justify-content: center; align-items: center; color: white; }
        .card-final { background: white; color: var(--p-blue); padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 350px; }
        .btn-final { background: var(--t-blue); color: white; border: none; padding: 15px; border-radius: 10px; margin-top: 20px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div id="overlay-inicio" onclick="comenzar()">
    <h1 id="titulo-inicio">Cargando Nivel...</h1>
    <p>Toca para iniciar los 3 ejercicios</p>
</div>

<div id="guia">
    <img src="COTERAPEUTA.JPG">
    <p id="texto-instruccion">Juan, guía los carros a su color.</p>
</div>

<div id="escenario">
    <div class="casa casa-roja">🏠🔴</div>
    <div class="casa casa-azul">🏠🔵</div>
    <div id="info-nivel">Ejercicio: 1/3 | Carros: 0</div>
</div>

<div id="modal-resultados">
    <div class="card-final">
        <h2>¡Nivel Completado!</h2>
        <div id="detalles-puntos"></div>
        <button class="btn-final" onclick="irAlMenu()">GUARDAR Y CONTINUAR</button>
    </div>
</div>

<script>
    // ==========================================
    // CONFIGURACIÓN DEL NIVEL (EDITA ESTO)
    // ==========================================
    const dificultadActual = "basico"; // Opciones: "basico", "medio", "superior"
    const idSesion = 10; 
    // ==========================================

    const config = {
        "basico": { carrosPorEjercicio: 4, velocidad: 1.2 },
        "medio": { carrosPorEjercicio: 6, velocidad: 1.6 },
        "superior": { carrosPorEjercicio: 10, velocidad: 2.1 }
    };

    let aciertos = 0, errores = 0, ejercicioActual = 1, carrosLanzadosEnRonda = 0, carrosFinalizadosEnRonda = 0;
    const totalEjercicios = 3;
    const settings = config[dificultadActual];

    document.getElementById('titulo-inicio').innerText = `Nivel ${idSesion}: ${dificultadActual.toUpperCase()}`;

    function hablar(m) {
        window.speechSynthesis.cancel();
        const v = new SpeechSynthesisUtterance(m);
        v.lang = 'es-ES'; v.rate = 0.9;
        window.speechSynthesis.speak(v);
    }

    function comenzar() {
        document.getElementById('overlay-inicio').style.display = 'none';
        iniciarEjercicio();
    }

    function iniciarEjercicio() {
        carrosLanzadosEnRonda = 0;
        carrosFinalizadosEnRonda = 0;
        actualizarMarcador();
        hablar(`Ejercicio ${ejercicioActual}. Guía los ${settings.carrosPorEjercicio} carros.`);
        proximoCarro();
    }

    function actualizarMarcador() {
        document.getElementById('info-nivel').innerText = `Ejercicio: ${ejercicioActual}/3 | Carros: ${carrosFinalizadosEnRonda}/${settings.carrosPorEjercicio}`;
    }

    function proximoCarro() {
        if (carrosLanzadosEnRonda < settings.carrosPorEjercicio) {
            crearCarrito();
            carrosLanzadosEnRonda++;
            // Lanzar el siguiente carro con un pequeño retraso para que no salgan todos juntos
            setTimeout(proximoCarro, 3000); 
        }
    }

    function crearCarrito() {
        const car = document.createElement('div');
        const esRojo = Math.random() > 0.5;
        let enIzquierda = Math.random() > 0.5;

        car.className = 'carrito';
        car.innerHTML = esRojo ? "🚗" : "🚙";
        car.style.left = enIzquierda ? "15%" : "70%";
        document.getElementById('escenario').appendChild(car);

        car.onclick = () => {
            enIzquierda = !enIzquierda;
            car.style.left = enIzquierda ? "15%" : "70%";
        };

        let pos = -10;
        const anim = setInterval(() => {
            pos += settings.velocidad;
            car.style.bottom = pos + "%";

            if (pos >= 85) {
                clearInterval(anim);
                const correcto = (esRojo && enIzquierda) || (!esRojo && !enIzquierda);
                if (correcto) { aciertos++; } else { errores++; }
                
                car.remove();
                carrosFinalizadosEnRonda++;
                actualizarMarcador();

                if (carrosFinalizadosEnRonda === settings.carrosPorEjercicio) {
                    if (ejercicioActual < totalEjercicios) {
                        ejercicioActual++;
                        setTimeout(iniciarEjercicio, 2000);
                    } else {
                        finalizarTodo();
                    }
                }
            }
        }, 50);
    }

    function finalizarTodo() {
        const totalCarros = totalEjercicios * settings.carrosPorEjercicio;
        const ef = Math.round((aciertos / totalCarros) * 100);
        document.getElementById('detalles-puntos').innerHTML = `
            <b>Ejercicios:</b> 3 de 3<br>
            <b>Aciertos Totales:</b> ${aciertos}<br>
            <b>Eficacia:</b> ${ef}%
        `;
        document.getElementById('modal-resultados').style.display = 'flex';
        hablar("Muy bien Juan. Has completado los tres ejercicios del nivel.");
    }

    function irAlMenu() {
        const totalCarros = totalEjercicios * settings.carrosPorEjercicio;
        const ef = Math.round((aciertos / totalCarros) * 100);
        
        const datosSesion = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Atención",
            id_sesion: idSesion,
            aciertos: aciertos,
            errores: errores,
            eficacia: ef + "%"
        };

        let historial = JSON.parse(localStorage.getItem('sesiones_rehabilitidia')) || [];
        if (!Array.isArray(historial)) historial = [];
        historial.push(datosSesion);
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(historial));

        window.location.href = "atencion_sesiones.html";
    }
</script>
</body>
</html>

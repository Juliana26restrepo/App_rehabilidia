<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MOTORUTA EXTREMA: GENERADOR DINÁMICO</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #1a1a1a; color: #00ff00; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: #000; width: 100%; padding: 20px; text-align: center; border-bottom: 3px solid #00ff00; font-size: 1.8rem; text-shadow: 2px 2px #ff0000; }
        .hud { display: flex; gap: 30px; padding: 15px; font-size: 1.2rem; background: #222; width: 100%; justify-content: center; }
        
        #game-board { position: relative; margin: 20px; border: 4px solid #555; background: #333; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        .grid { display: grid; gap: 1px; background: #444; }
        .cell { width: 50px; height: 50px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #000; }
        .wall { background: #111 !important; }
        .goal { background: #ffcc00 !important; }
        .obj { background: #e3f2fd !important; border: 2px dashed #2196f3; }
        
        #moto { 
            position: absolute; z-index: 100; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; pointer-events: none;
        }

        .panel { width: 400px; background: #222; padding: 20px; border-radius: 10px; border: 1px solid #00ff00; }
        #log { min-height: 60px; background: #000; border: 1px solid #555; margin-bottom: 15px; padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
        .step { background: #00ff00; color: #000; padding: 4px 8px; border-radius: 3px; font-weight: bold; }

        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-m { background: #444; color: #fff; }
        .btn-m:hover { background: #666; }
        .btn-go { background: #008800; color: #fff; grid-column: span 2; font-size: 1.4rem; border-bottom: 4px solid #004400; }
        .btn-go:active { border-bottom: none; transform: translateY(4px); }
        .btn-clr { background: #880000; color: #fff; grid-column: span 2; }
    </style>
</head>
<body>

<header>SISTEMA MOTORUTA V4.0: DESAFÍO REAL</header>
<div class="hud">
    <span>NIVEL: <span id="n-lvl">1</span></span>
    <span>DIFICULTAD: <span id="n-diff">BAJA</span></span>
    <span>OBJETIVO: <span id="n-obj">CASA</span></span>
</div>

<div id="game-board">
    <div id="moto">🏍️</div>
    <div id="grid" class="grid"></div>
</div>

<div class="panel">
    <div id="log"></div>
    <div class="grid-btns">
        <button class="btn-m" onclick="add('ARRIBA')">↑ Arriba</button>
        <button class="btn-m" onclick="add('ABAJO')">↓ Abajo</button>
        <button class="btn-m" onclick="add('IZQUIERDA')">← Izq</button>
        <button class="btn-m" onclick="add('DERECHA')">→ Der</button>
        <button class="btn-go" onclick="runSequence()">EJECUTAR MOVIMIENTO 🏁</button>
        <button class="btn-clr" onclick="resetLevel()">REINICIAR TODO</button>
    </div>
</div>

<script>
    let level = 1, moves = [], isRunning = false;
    let config = { size: 5, pos: {x:0, y:0}, goal: {x:4, y:4}, target: {x:2, y:0}, walls: [], hasTarget: false };

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'es-ES';
        window.speechSynthesis.speak(msg);
    }

    function init() {
        // Aumento de dificultad según nivel
        config.size = Math.min(5 + Math.floor(level/2), 12);
        config.pos = {x: 0, y: 0};
        config.goal = {x: config.size - 1, y: config.size - 1};
        config.hasTarget = false;
        
        // Colocar objetivo intermedio aleatorio
        config.target = {
            x: Math.floor(Math.random() * (config.size - 2)) + 1,
            y: Math.floor(Math.random() * (config.size - 2))
        };

        // Generar muros aleatorios (30% de las celdas)
        config.walls = [];
        for(let i=0; i < (config.size * config.size * 0.3); i++) {
            let wx = Math.floor(Math.random() * config.size);
            let wy = Math.floor(Math.random() * config.size);
            // No poner muros sobre inicio, meta u objetivo
            if ((wx==0 && wy==0) || (wx==config.goal.x && wy==config.goal.y) || (wx==config.target.x && wy==config.target.y)) continue;
            config.walls.push(`${wx},${wy}`);
        }

        render();
        speak(`Nivel ${level}. Instrucción: Primero debes pasar por la casa y luego llegar a la meta.`);
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${config.size}, 50px)`;
        grid.innerHTML = '';

        for(let y=0; y < config.size; y++) {
            for(let x=0; x < config.size; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (config.walls.includes(`${x},${y}`)) cell.className += ' wall';
                if (x === config.goal.x && y === config.goal.y) { cell.className += ' goal'; cell.innerText = '🏁'; }
                if (x === config.target.x && y === config.target.y) { cell.className += ' obj'; cell.innerText = '🏠'; }
                grid.appendChild(cell);
            }
        }
        updateMoto();
    }

    function updateMoto() {
        const m = document.getElementById('moto');
        m.style.left = (config.pos.x * 51) + 'px';
        m.style.top = (config.pos.y * 51) + 'px';
    }

    function add(dir) {
        if(isRunning) return;
        moves.push(dir);
        const log = document.getElementById('log');
        const span = document.createElement('span');
        span.className = 'step';
        span.innerText = dir[0];
        log.appendChild(span);
        speak(dir);
    }

    async function runSequence() {
        if(isRunning || moves.length === 0) return;
        isRunning = true;
        
        for (let m of moves) {
            let nextX = config.pos.x;
            let nextY = config.pos.y;

            if (m === 'ARRIBA') nextY--;
            if (m === 'ABAJO') nextY++;
            if (m === 'IZQUIERDA') nextX--;
            if (m === 'DERECHA') nextX++;

            // Colisión
            if (nextX < 0 || nextX >= config.size || nextY < 0 || nextY >= config.size || config.walls.includes(`${nextX},${nextY}`)) {
                speak("¡Crash! Chocaste con un obstáculo.");
                isRunning = false;
                return;
            }

            config.pos = {x: nextX, y: nextY};
            if (config.pos.x === config.target.x && config.pos.y === config.target.y) {
                config.hasTarget = true;
                speak("Objetivo casa recolectado.");
            }
            
            updateMoto();
            await new Promise(r => setTimeout(r, 400));
        }

        // Finalización
        if (config.pos.x === config.goal.x && config.pos.y === config.goal.y) {
            if (config.hasTarget) {
                speak("¡Excelente! Secuencia completada. Siguiente nivel.");
                level++;
                document.getElementById('n-lvl').innerText = level;
                setTimeout(resetLevel, 1000);
            } else {
                speak("Llegaste a la meta, pero no pasaste por la casa. Inténtalo de nuevo.");
            }
        } else {
            speak("No llegaste a la bandera.");
        }
        isRunning = false;
    }

    function resetLevel() {
        moves = [];
        document.getElementById('log').innerHTML = '';
        init();
    }

    window.onload = init;
</script>
</body>
</html>

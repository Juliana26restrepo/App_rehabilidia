<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sesión Final: Flexibilidad Metacognitiva</title>
    <style>
        :root { --navy: #103A57; --gold: #FFD700; --bg: #F0F4F8; --white: #FFFFFF; --green: #2ECC71; --red: #E74C3C; }
        
        /* Evitamos que el cuerpo permita scroll innecesario */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--navy); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        header { background: var(--navy); color: white; padding: 10px; font-weight: bold; text-align: center; }
        
        .stats-bar { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            padding: 8px; 
            font-weight: bold; 
            background: #e2e8f0; 
            font-size: 0.9rem;
            border-bottom: 2px solid #cbd5e1;
        }

        /* Contenedor principal que ocupa todo el espacio sobrante */
        #zona-juego { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; /* Centra todo verticalmente */
            padding: 10px;
        }

        #feedback { font-size: 1.8rem; font-weight: 900; height: 35px; margin-bottom: 10px; }

        /* Contenedor de cartas más compacto */
        .tablero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* Espacio reducido entre filas */
        }

        .contenedor-referencia { display: flex; gap: 10px; justify-content: center; }
        
        /* Cartas más pequeñas para asegurar que quepan */
        .carta { 
            width: 85px; 
            height: 125px; 
            background: white; 
            border: 3px solid var(--navy); 
            border-radius: 10px; 
            display: flex; 
            flex-wrap: wrap; 
            align-items: center; 
            justify-content: center; 
            padding: 5px; 
            cursor: pointer; 
            transition: 0.2s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .carta:hover { border-color: var(--gold); transform: translateY(-2px); }

        /* Carta Objetivo */
        #carta-objetivo { 
            width: 100px; 
            height: 145px; 
            border: 4px solid var(--gold); 
            cursor: default; 
            pointer-events: none; 
        }

        .figura { width: 20px; height: 20px; margin: 2px; }
        .circulo { border-radius: 50%; }
        .cuadrado { border-radius: 3px; }
        .estrella { clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        .triangulo { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.98); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; text-align: center; }
        .btn-ready { background: var(--gold); border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; color: var(--navy); margin-top: 15px; }
    </style>
</head>
<body>

<header>PROTOCOLO DE FLEXIBILIDAD Y ESTRATEGIA</header>

<div class="stats-bar">
    <span>NIVEL: <span id="txt-nivel">1</span>/3</span>
    <span>EJERCICIO: <span id="txt-ronda">1</span>/3</span>
    <span>ACIERTOS: <span id="txt-aciertos">0</span>/10</span>
</div>

<div id="zona-juego">
    <div id="feedback"></div>

    <div class="tablero">
        <div class="contenedor-referencia" id="referencias">
            </div>

        <div style="text-align: center;">
            <p style="margin: 5px; font-size: 0.85rem; font-weight: bold; color: #64748b;">CLASIFICA ESTA CARTA:</p>
            <div id="carta-objetivo" class="carta"></div>
        </div>
    </div>
</div>

<div id="overlay-msg" class="overlay">
    <h1 id="msg-titulo" style="color: var(--gold);"></h1>
    <p id="msg-cuerpo"></p>
    <button class="btn-ready" onclick="cerrarOverlay()">COMENZAR</button>
</div>

<script>
    const COLORES = ['#E74C3C', '#3498DB', '#2ECC71', '#F1C40F'];
    const FORMAS = ['circulo', 'cuadrado', 'estrella', 'triangulo'];
    const NUMEROS = [1, 2, 3, 4];
    
    let nivel = 1, ronda = 1, aciertos = 0;
    let reglaActual = 'color';
    let cartaActual = {}, bloqueado = false;

    const cartasRef = [
        { color: COLORES[0], forma: FORMAS[0], numero: 1 },
        { color: COLORES[1], forma: FORMAS[1], numero: 2 },
        { color: COLORES[2], forma: FORMAS[2], numero: 3 },
        { color: COLORES[3], forma: FORMAS[3], numero: 4 }
    ];

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        window.speechSynthesis.speak(m);
    }

    function mostrarOverlay(tit, msj) {
        document.getElementById('msg-titulo').innerText = tit;
        document.getElementById('msg-cuerpo').innerText = msj;
        document.getElementById('overlay-msg').style.display = 'flex';
        hablar(tit + ". " + msj);
    }

    function cerrarOverlay() {
        document.getElementById('overlay-msg').style.display = 'none';
        if(document.getElementById('referencias').innerHTML === "") iniciarEstructura();
        generarCartaObjetivo();
    }

    function crearVisualCarta(datos, elementoId) {
        const contenedor = (typeof elementoId === 'string') ? document.getElementById(elementoId) : elementoId;
        contenedor.innerHTML = '';
        for(let i=0; i < datos.numero; i++) {
            const div = document.createElement('div');
            div.className = `figura ${datos.forma}`;
            div.style.backgroundColor = datos.color;
            contenedor.appendChild(div);
        }
    }

    function iniciarEstructura() {
        const refDiv = document.getElementById('referencias');
        refDiv.innerHTML = '';
        cartasRef.forEach((datos, index) => {
            const div = document.createElement('div');
            div.className = 'carta';
            div.onclick = () => procesarIntento(index);
            crearVisualCarta(datos, div);
            refDiv.appendChild(div);
        });
    }

    function generarCartaObjetivo() {
        cartaActual = {
            color: COLORES[Math.floor(Math.random()*4)],
            forma: FORMAS[Math.floor(Math.random()*4)],
            numero: NUMEROS[Math.floor(Math.random()*4)]
        };
        crearVisualCarta(cartaActual, 'carta-objetivo');
        bloqueado = false;
    }

    function procesarIntento(idx) {
        if(bloqueado) return;
        bloqueado = true;
        const elegido = cartasRef[idx];
        const fb = document.getElementById('feedback');
        
        let ok = (reglaActual === 'color' && elegido.color === cartaActual.color) ||
                 (reglaActual === 'forma' && elegido.forma === cartaActual.forma) ||
                 (reglaActual === 'numero' && elegido.numero === cartaActual.numero);

        if(ok) {
            fb.innerText = "¡CORRECTO!"; fb.style.color = "var(--green)";
            hablar("Correcto");
            aciertos++;
            document.getElementById('txt-aciertos').innerText = aciertos;
            if(nivel === 3) cambiarRegla();
        } else {
            fb.innerText = "INCORRECTO"; fb.style.color = "var(--red)";
            hablar("Incorrecto");
            if(nivel >= 2) cambiarRegla();
        }

        setTimeout(() => {
            fb.innerText = "";
            if(aciertos >= 10) gestionarProgreso();
            else generarCartaObjetivo();
        }, 1000);
    }

    function cambiarRegla() {
        const reglas = ['color', 'forma', 'numero'];
        let n; do { n = reglas[Math.floor(Math.random()*3)]; } while(n === reglaActual);
        reglaActual = n;
    }

    function gestionarProgreso() {
        aciertos = 0;
        document.getElementById('txt-aciertos').innerText = "0";
        if(ronda < 3) {
            ronda++;
            document.getElementById('txt-ronda').innerText = ronda;
            mostrarOverlay(`EJERCICIO ${ronda}`, `Excelente. Siguiente ejercicio del nivel ${nivel}.`);
        } else if(nivel < 3) {
            nivel++; ronda = 1;
            document.getElementById('txt-nivel').innerText = nivel;
            document.getElementById('txt-ronda').innerText = "1";
            mostrarOverlay(`NIVEL ${nivel}`, `Subiendo dificultad.`);
        } else {
            mostrarOverlay("FINALIZADO", "¡Has completado el protocolo con éxito!");
        }
    }

    window.onload = () => {
        mostrarOverlay("PROTOCOLO FINAL", "Clasifica la carta de abajo con las de arriba. Logra 10 aciertos por ejercicio.");
    };
</script>
</body>
</html>

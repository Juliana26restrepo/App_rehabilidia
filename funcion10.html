<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sesión Final: Flexibilidad Metacognitiva</title>
    <style>
        :root { --navy: #103A57; --gold: #FFD700; --bg: #F0F4F8; --white: #FFFFFF; --green: #2ECC71; --red: #E74C3C; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; text-align: center; }
        
        header { background: var(--navy); color: white; padding: 15px; font-weight: bold; font-size: 1.2rem; }
        
        .stats-bar { display: flex; justify-content: center; gap: 20px; padding: 10px; font-weight: bold; background: #e2e8f0; }

        #zona-juego { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px; }

        /* Cartas de Referencia */
        .contenedor-referencia { display: flex; gap: 15px; justify-content: center; width: 100%; }
        .carta { width: 110px; height: 160px; background: white; border: 3px solid var(--navy); border-radius: 12px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; padding: 10px; cursor: pointer; transition: 0.2s; position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .carta:hover { transform: translateY(-5px); border-color: var(--gold); }
        
        /* Estilos de las figuras dentro de las cartas */
        .figura { width: 30px; height: 30px; margin: 5px; }
        .circulo { border-radius: 50%; }
        .cuadrado { border-radius: 4px; }
        .estrella { clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        .triangulo { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }

        /* Carta Objetivo */
        #contenedor-objetivo { margin-top: 30px; border-top: 2px dashed #cbd5e1; padding-top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        #carta-objetivo { width: 130px; height: 180px; border: 4px solid var(--gold); cursor: default; }
        #carta-objetivo:hover { transform: none; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.95); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 30px; }
        .btn-ready { background: var(--gold); border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.3rem; color: var(--navy); margin-top: 20px; }
        
        #feedback { font-size: 2rem; font-weight: 900; margin-top: 10px; height: 40px; }
    </style>
</head>
<body>

<header>ESTRATEGIA Y FLEXIBILIDAD COGNITIVA</header>

<div class="stats-bar">
    <span>NIVEL: <span id="txt-nivel">1</span>/3</span>
    <span>ACIERTOS: <span id="txt-aciertos">0</span>/10</span>
    <span>REGLA: <span id="txt-regla">?</span></span>
</div>

<div id="zona-juego">
    <div class="contenedor-referencia" id="referencias">
        </div>

    <div id="feedback"></div>

    <div id="contenedor-objetivo">
        <p>CLASIFICA ESTA CARTA:</p>
        <div id="carta-objetivo" class="carta"></div>
        <p style="font-size: 0.9rem; color: #64748b;">Toca la carta de arriba que creas que coincide con la regla actual</p>
    </div>
</div>

<div id="overlay-msg" class="overlay">
    <h1 id="msg-titulo" style="color: var(--gold);"></h1>
    <p id="msg-cuerpo" style="font-size: 1.4rem; max-width: 700px; line-height: 1.5;"></p>
    <button class="btn-ready" onclick="cerrarOverlay()">ENTENDIDO</button>
</div>

<script>
    const COLORES = ['#E74C3C', '#3498DB', '#2ECC71', '#F1C40F']; // Rojo, Azul, Verde, Amarillo
    const FORMAS = ['circulo', 'cuadrado', 'estrella', 'triangulo'];
    const NUMEROS = [1, 2, 3, 4];
    
    let reglaActual = 'color'; // color, forma o numero
    let nivel = 1, aciertosSeguidos = 0, totalAciertos = 0;
    let cartaActual = {};
    let bloqueado = false;

    // Cartas fijas de referencia (una de cada cosa para que siempre haya opción)
    const cartasRef = [
        { color: COLORES[0], forma: FORMAS[0], numero: 1 }, // 1 Círculo Rojo
        { color: COLORES[1], forma: FORMAS[1], numero: 2 }, // 2 Cuadrados Azules
        { color: COLORES[2], forma: FORMAS[2], numero: 3 }, // 3 Estrellas Verdes
        { color: COLORES[3], forma: FORMAS[3], numero: 4 }  // 4 Triángulos Amarillos
    ];

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        m.rate = 0.9;
        if(callback) m.onend = callback;
        window.speechSynthesis.speak(m);
    }

    function mostrarOverlay(tit, msj) {
        document.getElementById('msg-titulo').innerText = tit;
        document.getElementById('msg-cuerpo').innerText = msj;
        document.getElementById('overlay-msg').style.display = 'flex';
        hablar(tit + ". " + msj);
    }

    function cerrarOverlay() {
        document.getElementById('overlay-msg').style.display = 'none';
        iniciarJuego();
    }

    function crearVisualCarta(datos, elementoId) {
        const contenedor = (typeof elementoId === 'string') ? document.getElementById(elementoId) : elementoId;
        contenedor.innerHTML = '';
        for(let i=0; i < datos.numero; i++) {
            const div = document.createElement('div');
            div.className = `figura ${datos.forma}`;
            div.style.backgroundColor = datos.color;
            contenedor.appendChild(div);
        }
    }

    function generarCartaObjetivo() {
        cartaActual = {
            color: COLORES[Math.floor(Math.random()*4)],
            forma: FORMAS[Math.floor(Math.random()*4)],
            numero: NUMEROS[Math.floor(Math.random()*4)]
        };
        crearVisualCarta(cartaActual, 'carta-objetivo');
        bloqueado = false;
    }

    function iniciarJuego() {
        const refDiv = document.getElementById('referencias');
        refDiv.innerHTML = '';
        cartasRef.forEach((datos, index) => {
            const div = document.createElement('div');
            div.className = 'carta';
            div.onclick = () => procesarIntento(index);
            crearVisualCarta(datos, div);
            refDiv.appendChild(div);
        });
        
        reglaActual = 'color';
        aciertosSeguidos = 0;
        totalAciertos = 0;
        document.getElementById('txt-regla').innerText = "?";
        generarCartaObjetivo();
    }

    function procesarIntento(indexElegido) {
        if(bloqueado) return;
        bloqueado = true;
        const elegido = cartasRef[indexElegido];
        const feedback = document.getElementById('feedback');
        
        let correcto = false;
        if(reglaActual === 'color' && elegido.color === cartaActual.color) correcto = true;
        if(reglaActual === 'forma' && elegido.forma === cartaActual.forma) correcto = true;
        if(reglaActual === 'numero' && elegido.numero === cartaActual.numero) correcto = true;

        if(correcto) {
            feedback.innerText = "¡CORRECTO!";
            feedback.style.color = "var(--green)";
            aciertosSeguidos++;
            totalAciertos++;
            document.getElementById('txt-aciertos').innerText = totalAciertos;
            verificarCambioRegla();
        } else {
            feedback.innerText = "INCORRECTO";
            feedback.style.color = "var(--red)";
            if(nivel > 1) aciertosSeguidos = 0; // En nivel medio/alto, el error reinicia el contador de cambio
        }

        setTimeout(() => {
            feedback.innerText = "";
            if(totalAciertos >= 10 && nivel === 1) gestionarSubidaNivel();
            else if(totalAciertos >= 20 && nivel === 2) gestionarSubidaNivel();
            else if(totalAciertos >= 30 && nivel === 3) finalizarSesion();
            else generarCartaObjetivo();
        }, 1000);
    }

    function verificarCambioRegla() {
        // NIVEL 1: No cambia la regla (Color siempre)
        if(nivel === 1) return;

        // NIVEL 2: Cambia cada 5 aciertos
        if(nivel === 2 && aciertosSeguidos >= 5) {
            cambiarReglaAleatoria();
        }
        
        // NIVEL 3: Cambia de forma impredecible entre 3 y 5 aciertos
        let umbralCualquiera = Math.floor(Math.random() * 3) + 3;
        if(nivel === 3 && aciertosSeguidos >= umbralCualquiera) {
            cambiarReglaAleatoria();
        }
    }

    function cambiarReglaAleatoria() {
        const reglas = ['color', 'forma', 'numero'];
        const vieja = reglaActual;
        while(reglaActual === vieja) {
            reglaActual = reglas[Math.floor(Math.random()*reglas.length)];
        }
        aciertosSeguidos = 0;
        // El paciente no sabe que cambió, solo lo notará al fallar.
    }

    function gestionarSubidaNivel() {
        nivel++;
        document.getElementById('txt-nivel').innerText = nivel;
        if(nivel === 2) {
            mostrarOverlay("NIVEL 2: FLEXIBILIDAD", "Atención: La regla puede cambiar sin aviso. Si de repente algo que era correcto ahora es incorrecto, ¡debes buscar una nueva estrategia!");
        } else if(nivel === 3) {
            mostrarOverlay("NIVEL 3: MONITOREO CONSTANTE", "La complejidad aumenta. Las reglas cambiarán más rápido y de forma aleatoria. ¡Mantente alerta a cada respuesta!");
        }
    }

    function finalizarSesion() {
        mostrarOverlay("¡EXCELENTE TRABAJO!", "Reconocer tus errores y ajustar tu estrategia es la clave para aprender. Has completado el protocolo de rehabilitación ejecutiva.");
    }

    window.onload = () => {
        mostrarOverlay("PROTOCOLO METACOGNITIVO", "Tu objetivo es clasificar la carta de abajo con una de las 4 de arriba. Al principio no sabrás la regla, así que prueba. La aplicación solo te dirá si es Correcto o Incorrecto. ¡Analiza tus errores para ganar!");
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motoruta Pro: Secuencia Lógica Juan</title>
    <style>
        :root { --primary: #1e3a8a; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--primary); color: white; width: 100%; padding: 15px; text-align: center; font-size: 1.5rem; font-weight: bold; }
        .stats { background: #fff; width: 100%; display: flex; justify-content: center; gap: 20px; padding: 10px; border-bottom: 2px solid #e2e8f0; font-weight: bold; color: var(--primary); font-size: 0.9rem; }
        .main-content { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; width: 100%; max-width: 1200px; }
        #game-window { position: relative; border: 5px solid var(--primary); background: #fff; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        #grid { display: grid; gap: 1px; background: #cbd5e1; }
        .cell { background: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .wall { background: #334155 !important; }
        .goal { border: 3px solid #eab308; background: #fef08a !important; }
        .house { border: 3px dashed #3b82f6; background: #dbeafe !important; }
        #moto { position: absolute; z-index: 100; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .controls { width: 380px; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        #route-list { min-height: 50px; max-height: 100px; overflow-y: auto; background: #f1f5f9; border: 2px dashed #cbd5e1; border-radius: 8px; padding: 10px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 5px; }
        .step-tag { background: var(--primary); color: white; padding: 4px 8px; border-radius: 10px; font-size: 0.8rem; }
        .input-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-card { background: #f8fafc; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; text-align: center; }
        .btn-mini { width: 25px; height: 25px; border: none; border-radius: 50%; background: #64748b; color: white; cursor: pointer; }
        .btn-add { width: 100%; background: var(--primary); color: white; border: none; padding: 5px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; margin-top: 5px; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn-run { background: var(--success); color: white; }
        #hint-box { margin-top: 10px; padding: 10px; background: #fffbeb; border: 1px solid #fef3c7; color: #92400e; border-radius: 8px; display: none; font-size: 0.85rem; }
        .objective-status { font-size: 0.8rem; color: #475569; margin-bottom: 10px; padding: 5px; background: #f8fafc; border-radius: 5px; }
    </style>
</head>
<body>

<header>MOTORUTA: REHABILITACIÓN COGNITIVA</header>
<div class="stats">
    <span>NIVEL: <span id="lvl-txt">1</span></span>
    <span>EJERCICIO: <span id="ex-txt">1</span></span>
    <span>PRECISIÓN: <span id="prec-txt">0</span>%</span>
</div>

<div class="main-content">
    <div id="game-window">
        <div id="moto">🏍️</div>
        <div id="grid"></div>
    </div>

    <div class="controls">
        <div class="objective-status" id="obj-status">Objetivo: Ir a la casa 🏠</div>
        <div id="route-list"></div>
        <div class="input-zone">
            <div class="input-card"><label>SUBIR ⬆</label><br><button class="btn-mini" onclick="mod('arr',-1)">-</button> <span id="tmp-arr">1</span> <button class="btn-mini" onclick="mod('arr',1)">+</button><button class="btn-add" onclick="addStep('arr')">AÑADIR</button></div>
            <div class="input-card"><label>BAJAR ⬇</label><br><button class="btn-mini" onclick="mod('aba',-1)">-</button> <span id="tmp-aba">1</span> <button class="btn-mini" onclick="mod('aba',1)">+</button><button class="btn-add" onclick="addStep('aba')">AÑADIR</button></div>
            <div class="input-card"><label>IZQ ⬅</label><br><button class="btn-mini" onclick="mod('izq',-1)">-</button> <span id="tmp-izq">1</span> <button class="btn-mini" onclick="mod('izq',1)">+</button><button class="btn-add" onclick="addStep('izq')">AÑADIR</button></div>
            <div class="input-card"><label>DER ➡</label><br><button class="btn-mini" onclick="mod('der',-1)">-</button> <span id="tmp-der">1</span> <button class="btn-mini" onclick="mod('der',1)">+</button><button class="btn-add" onclick="addStep('der')">AÑADIR</button></div>
        </div>
        <div id="hint-box"></div>
        <button class="btn-main btn-run" onclick="execute()">INICIAR RUTA 🏁</button>
        <button class="btn-main" style="background:#64748b; color:white;" onclick="clearRoute()">BORRAR</button>
    </div>
</div>

<script>
    let lvl = 1, ex = 1, fails = 0, totalAttempts = 0, totalSuccess = 0;
    let active = false, pos = {x:0, y:0}, program = [];
    let state = { perro: false, gato: false, casa: false, meta: false, parque: false };
    let tmpVals = { arr: 1, aba: 1, izq: 1, der: 1 };

    const CONFIG = {
        1: { size: 8, exs: [
            {i:[0,7], g:[3,3], h:[6,2], w:[[1,2],[1,3],[2,3],[4,4],[5,4],[6,4]], extra: [], hint: "Juan, primero ve a la casa azul y luego a la meta amarilla."},
            {i:[7,7], g:[3,0], h:[1,3], w:[[6,6],[5,6],[0,3],[0,4],[3,4]], extra: [], hint: "Recuerda: Casa y luego Meta."},
            {i:[3,3], g:[7,6], h:[1,1], w:[[2,1],[4,1],[3,4],[5,4]], extra: [], hint: "Sube a la casa y luego baja a la meta."}
        ]},
        2: { size: 12, exs: [
            {i:[2,9], g:[1,4], h:[11,10], w:[[1,8],[3,8]], extra: [{x:5,y:5,id:'perro',img:'🐶'}], hint: "Recoge al perro, llévalo a la casa y termina en la meta."},
            {i:[1,1], g:[11,3], h:[6,8], w:[[3,2],[4,5]], extra: [{x:8,y:2,id:'perro',img:'🐶'}], hint: "Busca al perro primero."},
            {i:[10,1], g:[6,11], h:[2,7], w:[[9,2],[5,6]], extra: [{x:5,y:10,id:'perro',img:'🐶'}], hint: "Secuencia: Perro -> Casa -> Meta."}
        ]},
        3: { size: 16, exs: [
            {i:[7,8], g:[0,0], h:[3,5], w:[[5,5]], extra: [{x:10,y:10,id:'perro',img:'🐶'},{x:12,y:2,id:'gato',img:'🐱'},{x:2,y:2,id:'parque',img:'🌳'}], hint: "Orden: Perro y Gato, luego al Parque (árbol), luego Casa y Meta."},
            {i:[15,15], g:[0,0], h:[5,5], w:[], extra: [{x:8,y:8,id:'perro',img:'🐶'},{x:2,y:10,id:'gato',img:'🐱'},{x:4,y:12,id:'parque',img:'🌳'}], hint: "No olvides pasar por el árbol después de los animales."},
            {i:[0,15], g:[15,0], h:[8,8], w:[], extra: [{x:12,y:12,id:'perro',img:'🐶'},{x:2,y:2,id:'gato',img:'🐱'},{x:14,y:14,id:'parque',img:'🌳'}], hint: "Perro+Gato -> Árbol -> Casa -> Meta."}
        ]}
    };

    function speak(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; window.speechSynthesis.speak(m); }
    function mod(d, v) { tmpVals[d] = Math.max(1, Math.min(15, tmpVals[d] + v)); document.getElementById(`tmp-${d}`).innerText = tmpVals[d]; }
    function addStep(dir) { if(active) return; program.push({ dir, n: tmpVals[dir] }); updateUI(); }

    function updateUI() {
        const l = document.getElementById('route-list'); l.innerHTML = '';
        const ns = { arr:'⬆', aba:'⬇', izq:'⬅', der:'➡' };
        program.forEach(p => { const s = document.createElement('span'); s.className = 'step-tag'; s.innerHTML = `${ns[p.dir]} ${p.n}`; l.appendChild(s); });
        
        let msg = "";
        if (lvl === 1) msg = !state.casa ? "Objetivo: Ir a la casa 🏠" : "Objetivo: Ir a la meta 🏁";
        if (lvl === 2) msg = !state.perro ? "Objetivo: Recoger al perro 🐶" : (!state.casa ? "Objetivo: Llevarlo a la casa 🏠" : "Objetivo: Ir a la meta 🏁");
        if (lvl === 3) msg = (!state.perro || !state.gato) ? "Objetivo: Recoger perro 🐶 y gato 🐱" : (!state.parque ? "Objetivo: Ir al parque (árbol) 🌳" : (!state.casa ? "Objetivo: Ir a la casa 🏠" : "Objetivo: Ir a la meta 🏁"));
        document.getElementById('obj-status').innerText = msg;
    }

    function build() {
        active = false; state = { perro: false, gato: false, casa: false, meta: false, parque: false };
        const c = CONFIG[lvl], e = c.exs[ex-1];
        const g = document.getElementById('grid');
        const cSize = Math.floor(550 / c.size);
        g.style.gridTemplateColumns = `repeat(${c.size}, ${cSize}px)`;
        g.innerHTML = '';
        
        for(let y=0; y<c.size; y++){
            for(let x=0; x<c.size; x++){
                const d = document.createElement('div'); d.className = 'cell';
                d.style.width = d.style.height = cSize + 'px';
                if(e.w.some(w => w[0]===x && w[1]===y)) d.classList.add('wall');
                if(x===e.g[0] && y===e.g[1]) { d.classList.add('goal'); d.innerText='🏁'; }
                if(x===e.h[0] && y===e.h[1]) { d.classList.add('house'); d.innerText='🏠'; }
                const exObj = e.extra.find(o => o.x === x && o.y === y);
                if(exObj) { d.innerText = exObj.img; d.id = `obj-${exObj.id}`; }
                g.appendChild(d);
            }
        }
        pos = {x: e.i[0], y: e.i[1]}; renderMoto(cSize); updateUI();
        speak("Juan vamos a realizar la ruta, debes de ir contando los cuadros y sumándolos, con los botones, cuando creas que ya tienes la ruta completa le das iniciar ruta");
    }

    function renderMoto(sz) {
        const m = document.getElementById('moto');
        m.style.width = m.style.height = sz + 'px';
        m.style.fontSize = (sz * 0.7) + 'px';
        m.style.transform = `translate(${pos.x * sz}px, ${pos.y * sz}px)`;
    }

    async function execute() {
        if(active || program.length === 0) return;
        active = true; totalAttempts++;
        const c = CONFIG[lvl], e = c.exs[ex-1];
        const ds = { der:{x:1,y:0}, izq:{x:-1,y:0}, aba:{x:0,y:1}, arr:{x:0,y:-1} };
        const cSize = Math.floor(550 / c.size);

        for(let s of program) {
            for(let i=0; i<s.n; i++) {
                let nx = pos.x + ds[s.dir].x, ny = pos.y + ds[s.dir].y;
                if(nx < 0 || nx >= c.size || ny < 0 || ny >= c.size || e.w.some(w => w[0]===nx && w[1]===ny)) {
                    fails++; speak("¡Choque Juan! Inténtalo de nuevo.");
                    if(fails % 2 === 0) { document.getElementById('hint-box').innerText = "AYUDA: " + e.hint; document.getElementById('hint-box').style.display = 'block'; }
                    resetCurrent(); return;
                }
                pos.x = nx; pos.y = ny; renderMoto(cSize);
                
                // Lógica de objetivos
                if (pos.x === e.h[0] && pos.y === e.h[1]) {
                    if (lvl === 1) state.casa = true;
                    if (lvl === 2 && state.perro) state.casa = true;
                    if (lvl === 3 && state.perro && state.gato && state.parque) state.casa = true;
                    if(state.casa) speak("¡En la casa!");
                }
                e.extra.forEach(obj => {
                    if(pos.x === obj.x && pos.y === obj.y) {
                        state[obj.id] = true;
                        speak("¡Recogido!");
                        document.getElementById(`obj-${obj.id}`).style.opacity = "0.3";
                    }
                });
                updateUI();
                await new Promise(r => setTimeout(r, 300));
            }
        }

        if(pos.x === e.g[0] && pos.y === e.g[1] && state.casa) {
            totalSuccess++; 
            document.getElementById('prec-txt').innerText = Math.round((totalSuccess / totalAttempts) * 100);
            speak("¡Lo lograste Juan!"); setTimeout(next, 1500);
        } else {
            speak("Ruta incompleta. Revisa el orden de los objetivos.");
            active = false;
        }
    }

    function resetCurrent() { active = false; const e = CONFIG[lvl].exs[ex-1]; pos = {x: e.i[0], y: e.i[1]}; renderMoto(Math.floor(550/CONFIG[lvl].size)); }
    function clearRoute() { program = []; updateUI(); resetCurrent(); }

    function next() {
        if(ex < 3) ex++; else { lvl++; ex = 1; }
        if(lvl > 3) { alert("¡Fin del entrenamiento!"); lvl=1; ex=1; totalAttempts=0; totalSuccess=0; }
        document.getElementById('lvl-txt').innerText = lvl;
        document.getElementById('ex-txt').innerText = ex;
        program = []; build();
    }
    window.onload = build;
</script>
</body>
</html>

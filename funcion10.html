<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motoruta Juan - Entrenamiento de Planificación</title>
    <style>
        :root { --primary: #1e3a8a; --success: #22c55e; --danger: #ef4444; --bg: #f1f5f9; --orange: #fb923c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--primary); color: white; width: 100%; padding: 15px; text-align: center; font-size: 1.5rem; font-weight: bold; }
        
        /* Banner de Instrucción Limpio */
        .instruction-banner { 
            background: #fff7ed; border: 2px solid var(--orange); color: #9a3412; 
            padding: 20px; margin: 15px; border-radius: 12px; width: 90%; max-width: 1000px; 
            font-weight: bold; text-align: center; font-size: 1.2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }

        .stats { background: #fff; width: 100%; display: flex; justify-content: center; gap: 30px; padding: 12px; border-bottom: 2px solid #cbd5e1; font-weight: bold; }
        .main-content { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 20px; width: 100%; max-width: 1300px; }
        
        #game-window { position: relative; border: 5px solid var(--primary); background: #fff; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        #grid { display: grid; background: #e2e8f0; gap: 1px; }
        .cell { background: #fff; display: flex; align-items: center; justify-content: center; }
        .wall { background: #334155 !important; } /* Los muros */
        .goal { background: #fef08a !important; border: 2px solid #eab308; }
        .house { background: #dbeafe !important; border: 2px dashed #3b82f6; }
        
        #moto { position: absolute; z-index: 100; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; pointer-events: none; }
        
        .controls { width: 400px; background: #fff; padding: 25px; border-radius: 15px; border: 1px solid #cbd5e1; }
        #route-list { min-height: 60px; max-height: 120px; overflow-y: auto; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 10px; padding: 12px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 8px; }
        .step-tag { background: var(--primary); color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; }
        
        .input-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-card { background: #f8fafc; padding: 15px; border: 1px solid #e2e8f0; border-radius: 10px; text-align: center; }
        .btn-mini { width: 30px; height: 30px; border: none; border-radius: 50%; background: #94a3b8; color: white; cursor: pointer; font-size: 1.1rem; }
        .btn-add { width: 100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; margin-top: 8px; font-weight: bold; }
        .btn-run { width: 100%; background: var(--success); color: white; border: none; padding: 18px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1.2rem; transition: transform 0.2s; }
        .btn-run:active { transform: scale(0.98); }
    </style>
</head>
<body>

<header>MOTORUTA: ENTRENAMIENTO DE JUAN</header>

<div class="instruction-banner" id="main-inst">Cargando instrucciones...</div>

<div class="stats">
    <span>NIVEL: <span id="lvl-txt">1</span>/3</span>
    <span>EJERCICIO: <span id="ex-txt">1</span>/3</span>
    <span>ERRORES: <span id="fail-txt">0</span></span>
</div>

<div class="main-content">
    <div id="game-window">
        <div id="moto">🏍️</div>
        <div id="grid"></div>
    </div>

    <div class="controls">
        <div id="route-list"></div>
        <div class="input-zone">
            <div class="input-card">⬆ SUBIR<br><button class="btn-mini" onclick="m('arr',-1)">-</button> <span id="t-arr">1</span> <button class="btn-mini" onclick="m('arr',1)">+</button><button class="btn-add" onclick="add('arr')">AÑADIR</button></div>
            <div class="input-card">⬇ BAJAR<br><button class="btn-mini" onclick="m('aba',-1)">-</button> <span id="t-aba">1</span> <button class="btn-mini" onclick="m('aba',1)">+</button><button class="btn-add" onclick="add('aba')">AÑADIR</button></div>
            <div class="input-card">⬅ IZQ<br><button class="btn-mini" onclick="m('izq',-1)">-</button> <span id="t-izq">1</span> <button class="btn-mini" onclick="m('izq',1)">+</button><button class="btn-add" onclick="add('izq')">AÑADIR</button></div>
            <div class="input-card">➡ DER<br><button class="btn-mini" onclick="m('der',-1)">-</button> <span id="t-der">1</span> <button class="btn-mini" onclick="m('der',1)">+</button><button class="btn-add" onclick="add('der')">AÑADIR</button></div>
        </div>
        <button class="btn-run" onclick="execute()">INICIAR RUTA 🏁</button>
        <button onclick="clearR()" style="width:100%; margin-top:15px; border:none; background:none; color:var(--danger); cursor:pointer; font-size:0.9rem; text-decoration: underline;">BORRAR TODO</button>
    </div>
</div>

<script>
    let lvl = 1, ex = 1, fails = 0, prog = [], active = false, pos = {x:0, y:0};
    let st = { perro: false, gato: false, parque: false, casa: false };
    let tmp = { arr: 1, aba: 1, izq: 1, der: 1 };

    // Base de datos con MUROS añadidos en Nivel 2 y 3
    const DB = {
        1: { s: 8, exs: [
            {i:[0,7], g:[3,3], h:[6,2], w:[[1,2],[1,3],[2,3],[4,4],[5,4],[6,4],[3,5],[3,6]], ex: []}
        ]},
        2: { s: 12, exs: [
            {i:[2,9], g:[1,4], h:[11,10], w:[[1,8],[3,8],[5,9],[9,10],[6,4],[6,5],[6,6],[3,2],[4,2],[5,2]], ex: [{x:5,y:5,id:'perro',img:'🐶'}]}
        ]},
        3: { s: 16, exs: [
            {i:[7,8], g:[0,0], h:[3,5], w:[[5,5],[8,8],[2,4],[2,5],[2,6],[4,4],[6,4],[10,2],[10,3],[10,4],[5,12],[6,12],[7,12],[12,12],[12,11]], ex: [{x:10,y:10,id:'perro',img:'🐶'},{x:12,y:2,id:'gato',img:'🐱'},{x:2,y:2,id:'parque',img:'🌳'}]}
        ]
    };

    function getInstruccionTexto() {
        if(lvl === 1) return "Juan: Cuenta los cuadros blancos. Ve primero a la CASA y luego a la META.";
        if(lvl === 2) return "Juan: Cuenta los cuadros. Recoge primero al PERRO, llévalo a la CASA y luego ve a la META.";
        if(lvl === 3) return "Juan: Cuenta los cuadros. Recoge al PERRO y al GATO, ve al ÁRBOL, luego a la CASA y finalmente a la META.";
    }

    function speak(t) { 
        window.speechSynthesis.cancel(); 
        const m = new SpeechSynthesisUtterance(t); 
        m.lang = 'es-ES'; m.rate = 0.9;
        window.speechSynthesis.speak(m); 
    }

    function m(d, v) { tmp[d] = Math.max(1, Math.min(15, tmp[d] + v)); document.getElementById('t-'+d).innerText = tmp[d]; }
    function add(d) { if(active) return; prog.push({d, n: tmp[d]}); updateUI(); }
    function clearR() { prog = []; updateUI(); resetM(); }

    function updateUI() {
        const l = document.getElementById('route-list'); l.innerHTML = '';
        const icon = { arr:'⬆', aba:'⬇', izq:'⬅', der:'➡' };
        prog.forEach(p => { 
            const s = document.createElement('span'); s.className = 'step-tag'; 
            s.innerText = `${icon[p.d]} ${p.n}`; l.appendChild(s); 
        });
        document.getElementById('main-inst').innerText = getInstruccionTexto();
    }

    function build() {
        const c = DB[lvl], e = c.exs[0]; // Simplificado a un ejercicio por nivel para el ejemplo
        const g = document.getElementById('grid');
        const availableWidth = Math.min(window.innerWidth - 40, 600);
        const sz = Math.floor(availableWidth / c.s);
        
        g.style.gridTemplateColumns = `repeat(${c.s}, ${sz}px)`;
        g.innerHTML = '';
        st = { perro: false, gato: false, parque: false, casa: false };

        for(let y=0; y<c.s; y++) {
            for(let x=0; x<c.s; x++) {
                const d = document.createElement('div'); d.className = 'cell';
                d.style.width = d.style.height = sz + 'px';
                if(e.w.some(w => w[0]==x && w[1]==y)) d.classList.add('wall');
                if(x==e.g[0] && y==e.g[1]) { d.classList.add('goal'); d.innerText='🏁'; }
                if(x==e.h[0] && y==e.h[1]) { d.classList.add('house'); d.innerText='🏠'; }
                const item = e.ex.find(o => o.x==x && o.y==y);
                if(item) { d.innerText = item.img; d.id = 'o-'+item.id; }
                g.appendChild(d);
            }
        }
        pos = {x: e.i[0], y: e.i[1]};
        const mNode = document.getElementById('moto'); 
        mNode.style.width = mNode.style.height = sz+'px'; 
        mNode.style.fontSize = sz*0.7+'px';
        renderM(); updateUI();
        speak(getInstruccionTexto());
    }

    function renderM() {
        const sz = Math.floor(document.getElementById('grid').offsetWidth / DB[lvl].s);
        document.getElementById('moto').style.transform = `translate(${pos.x * sz}px, ${pos.y * sz}px)`;
    }

    async function execute() {
        if(active || prog.length == 0) return;
        active = true;
        const e = DB[lvl].exs[0];
        const moves = { der:{x:1,y:0}, izq:{x:-1,y:0}, aba:{x:0,y:1}, arr:{x:0,y:-1} };

        for(let step of prog) {
            for(let i=0; i<step.n; i++) {
                let nx = pos.x + moves[step.d].x, ny = pos.y + moves[step.d].y;
                if(nx<0 || nx>=DB[lvl].s || ny<0 || ny>=DB[lvl].s || e.w.some(w => w[0]==nx && w[1]==ny)) {
                    fails++; document.getElementById('fail-txt').innerText = fails;
                    speak("¡Cuidado Juan, chocaste con un muro! Intenta contar otra vez.");
                    resetM(); active = false; return;
                }
                pos.x = nx; pos.y = ny; renderM();
                checkLogic(e);
                await new Promise(r => setTimeout(r, 400));
            }
        }

        if(pos.x == e.g[0] && pos.y == e.g[1] && st.casa) {
            speak("¡Excelente Juan! Has completado el recorrido perfectamente.");
            setTimeout(() => { if(lvl<3){lvl++; build();} else {alert("¡Fin del Entrenamiento!");} }, 2000);
        } else {
            speak("Llegaste a la meta, pero no seguiste el orden de la instrucción. Inténtalo de nuevo.");
            active = false;
        }
    }

    function checkLogic(e) {
        e.ex.forEach(o => {
            if(pos.x == o.x && pos.y == o.y) {
                st[o.id] = true;
                const el = document.getElementById('o-'+o.id);
                if(el) el.style.opacity = "0.3";
            }
        });
        if(pos.x == e.h[0] && pos.y == e.h[1]) {
            if(lvl==1) st.casa = true;
            if(lvl==2 && st.perro) st.casa = true;
            if(lvl==3 && st.perro && st.gato && st.parque) st.casa = true;
        }
    }

    function resetM() { 
        const e = DB[lvl].exs[0];
        pos = {x: e.i[0], y: e.i[1]}; 
        renderM(); 
    }

    window.onload = build;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motoruta Master: Desafío de Laberinto Extremo</title>
    <style>
        :root { --navy: #0f172a; --gold: #fbbf24; --bg: #f8fafc; --green: #16a34a; --red: #dc2626; --slate: #334155; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 15px; text-align: center; font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; }
        .stats { display: flex; justify-content: center; gap: 50px; padding: 10px; background: #e2e8f0; font-weight: bold; border-bottom: 3px solid var(--navy); }
        
        .main-game { display: flex; flex: 1; justify-content: center; align-items: center; gap: 40px; padding: 20px; }
        
        /* Contenedor del Tablero con Moto fija */
        #grid-container { position: relative; background: var(--slate); padding: 12px; border-radius: 12px; border: 6px solid var(--navy); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        #grid { display: grid; gap: 4px; }
        .cell { background: #f1f5f9; border-radius: 4px; display: flex; align-items: center; justify-content: center; position: relative; }
        .wall { background: var(--navy); box-shadow: inset 0 0 15px rgba(255,255,255,0.1); }
        .goal { background: var(--gold); border: 2px solid #92400e; box-shadow: 0 0 15px var(--gold); }
        
        /* La Moto: Forzamos su visibilidad */
        #moto-player { 
            position: absolute; 
            z-index: 999; 
            font-size: 2.8rem; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        /* Panel Lateral */
        .panel { width: 360px; display: flex; flex-direction: column; gap: 15px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #sequence-view { 
            height: 120px; border: 3px dashed #cbd5e1; border-radius: 12px; background: #f8fafc; 
            padding: 10px; display: flex; flex-wrap: wrap; gap: 6px; overflow-y: auto; align-content: flex-start;
        }
        .cmd-chip { background: var(--navy); color: white; padding: 8px 12px; border-radius: 8px; font-weight: 900; font-size: 1.1rem; }
        
        .controls-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .btn { padding: 18px; font-size: 1.5rem; font-weight: bold; border-radius: 12px; border: 2px solid var(--navy); background: white; cursor: pointer; transition: 0.1s; }
        .btn:active { transform: scale(0.95); background: #f1f5f9; }
        
        .btn-run { background: var(--green) !important; color: white !important; border: none !important; padding: 20px; font-size: 1.3rem; border-bottom: 6px solid #14532d; }
        .btn-clear { background: var(--red) !important; color: white !important; border: none !important; border-bottom: 6px solid #7f1d1d; }
        
        /* Mensajes */
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; text-align: center; }
        .btn-start { margin-top: 25px; padding: 20px 60px; font-size: 1.5rem; background: var(--gold); border: none; border-radius: 50px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<header>MOTORUTA EXPERTO: LABERINTO SIN SALIDA</header>
<div class="stats">
    <div>NIVEL: <span id="lvl-txt">1</span>/3</div>
    <div>EJERCICIO: <span id="ex-txt">1</span>/3</div>
</div>

<div class="main-game">
    <div id="grid-container">
        <div id="moto-player">🏍️</div>
        <div id="grid"></div>
    </div>

    <div class="panel">
        <div id="sequence-view"></div>
        <div class="controls-grid">
            <button class="btn" onclick="pushCmd('UP')">⬆️</button>
            <button class="btn" onclick="pushCmd('DOWN')">⬇️</button>
            <button class="btn" onclick="pushCmd('LEFT')">⬅️</button>
            <button class="btn" onclick="pushCmd('RIGHT')">➡️</button>
        </div>
        <button class="btn btn-run" onclick="executeRuta()">ARRANCAR MOTORES 🏁</button>
        <button class="btn btn-clear" onclick="limpiarRuta()">BORRAR TODO</button>
    </div>
</div>

<div id="msg-box" class="overlay">
    <h1 id="msg-tit" style="font-size: 3.5rem; color: var(--gold);"></h1>
    <p id="msg-body" style="font-size: 1.8rem; max-width: 800px;"></p>
    <button class="btn-start" onclick="closeMsg()">CONTINUAR</button>
</div>

<script>
    let currentLvl = 1, currentEx = 1, ruta = [], activo = false;
    let pPos = { x: 0, y: 0 }, cellSize = 0;

    // MAPAS DE ALTA DIFICULTAD (Diseñados para ser frustrantes)
    const mapas = {
        1: [
            { s: 5, w: [[1,0],[1,1],[1,2],[3,2],[3,3],[3,4]], g: [4,0], st: [0,4] },
            { s: 5, w: [[0,1],[1,1],[2,1],[3,1],[1,3],[2,3],[3,3],[4,3],[2,2]], g: [4,0], st: [0,4] },
            { s: 5, w: [[2,0],[2,1],[2,2],[2,3],[0,2],[1,2],[3,3],[4,3]], g: [4,4], st: [0,0] }
        ],
        2: [
            { s: 6, w: [[1,1],[2,1],[3,1],[4,1],[1,3],[2,3],[3,3],[4,3],[5,3],[1,5],[2,5],[3,5],[4,5]], g: [5,4], st: [0,0] },
            { s: 6, w: [[0,2],[1,2],[2,2],[3,2],[5,2],[1,4],[2,4],[3,4],[4,4],[5,4],[3,3]], g: [4,3], st: [0,0] },
            { s: 6, w: [[1,0],[1,1],[1,2],[1,4],[1,5],[3,1],[3,2],[3,3],[3,4],[5,1],[5,2],[5,3],[5,4],[5,5]], g: [4,0], st: [0,5] }
        ],
        3: [
            { s: 8, w: [[1,1],[1,2],[1,3],[1,4],[1,5],[1,6],[3,0],[3,1],[3,2],[3,3],[3,4],[3,5],[5,2],[5,3],[5,4],[5,5],[5,6],[5,7],[7,1],[7,2],[7,3]], g: [7,7], st: [0,0] },
            { s: 8, w: [[0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],[6,3],[6,4],[6,5],[6,6],[4,4],[4,5],[4,6],[2,4],[2,5],[2,6],[0,6],[1,6]], g: [3,5], st: [0,0] },
            { s: 8, w: [[1,1],[2,1],[3,1],[4,1],[5,1],[6,1],[6,2],[6,3],[6,4],[6,5],[6,6],[6,7],[4,7],[4,6],[4,5],[4,4],[4,3],[2,3],[2,4],[2,5],[2,6],[2,7],[0,5]], g: [1,2], st: [0,0] }
        ]
    };

    function speak(m) {
        window.speechSynthesis.cancel();
        const s = new SpeechSynthesisUtterance(m);
        s.lang = 'es-ES';
        window.speechSynthesis.speak(s);
    }

    function init() {
        const c = mapas[currentLvl][currentEx - 1];
        const g = document.getElementById('grid');
        const container = document.getElementById('grid-container');
        
        const availableH = window.innerHeight - 350;
        cellSize = Math.min(Math.floor(availableH / c.s), 70);
        
        g.style.gridTemplateColumns = `repeat(${c.s}, ${cellSize}px)`;
        g.style.gridTemplateRows = `repeat(${c.s}, ${cellSize}px)`;
        g.innerHTML = '';
        
        pPos = { ...c.st };
        
        for (let y = 0; y < c.s; y++) {
            for (let x = 0; x < c.s; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `c-${x}-${y}`;
                cell.style.width = cellSize + 'px';
                cell.style.height = cellSize + 'px';
                
                if (x === c.g[0] && y === c.g[1]) {
                    cell.classList.add('goal');
                    cell.innerHTML = '🏁';
                }
                if (c.w.some(w => w[0] === x && w[1] === y)) cell.classList.add('wall');
                g.appendChild(cell);
            }
        }
        
        const moto = document.getElementById('moto-player');
        moto.style.width = cellSize + 'px';
        moto.style.height = cellSize + 'px';
        moto.style.fontSize = (cellSize * 0.7) + 'px';
        drawMoto();
    }

    function drawMoto() {
        const moto = document.getElementById('moto-player');
        // El offset de 12px es por el padding del contenedor
        moto.style.left = (pPos.x * (cellSize + 4) + 12) + 'px';
        moto.style.top = (pPos.y * (cellSize + 4) + 12) + 'px';
    }

    function pushCmd(d) {
        if(activo) return;
        ruta.push(d);
        const v = document.getElementById('sequence-view');
        const span = document.createElement('span');
        span.className = 'cmd-chip';
        const icons = { UP:'⬆️', DOWN:'⬇️', LEFT:'⬅️', RIGHT:'➡️' };
        span.innerText = icons[d];
        v.appendChild(span);
        v.scrollTop = v.scrollHeight;
        speak(d === 'UP' ? 'Arriba' : d === 'DOWN' ? 'Abajo' : d === 'LEFT' ? 'Izquierda' : 'Derecha');
    }

    function limpiarRuta() {
        if(activo) return;
        ruta = [];
        document.getElementById('sequence-view').innerHTML = '';
        const c = mapas[currentLvl][currentEx - 1];
        pPos = { ...c.st };
        drawMoto();
    }

    async function executeRuta() {
        if(activo || ruta.length === 0) return;
        activo = true;
        const c = mapas[currentLvl][currentEx - 1];
        
        pPos = { ...c.st };
        drawMoto();
        await new Promise(r => setTimeout(r, 500));

        for (let step of ruta) {
            let nextX = pPos.x, nextY = pPos.y;
            if(step === 'UP') nextY--;
            if(step === 'DOWN') nextY++;
            if(step === 'LEFT') nextX--;
            if(step === 'RIGHT') nextX++;

            if(nextX < 0 || nextX >= c.s || nextY < 0 || nextY >= c.s || c.w.some(w => w[0] === nextX && w[1] === nextY)) {
                speak("¡Choque! Calcula mejor tu ruta.");
                activo = false;
                return;
            }

            pPos = { x: nextX, y: nextY };
            drawMoto();
            await new Promise(r => setTimeout(r, 300));
        }

        if(pPos.x === c.g[0] && pPos.y === c.g[1]) {
            speak("¡Lo lograste! Eres un maestro.");
            setTimeout(nextStep, 1000);
        } else {
            speak("Te quedaste corto, no llegaste a la meta.");
            activo = false;
        }
    }

    function nextStep() {
        activo = false;
        if(currentEx < 3) {
            currentEx++;
            document.getElementById('ex-txt').innerText = currentEx;
        } else if(currentLvl < 3) {
            currentLvl++;
            currentEx = 1;
            document.getElementById('lvl-txt').innerText = currentLvl;
            document.getElementById('ex-txt').innerText = currentEx;
            showIntro();
            return;
        } else {
            popMsg("¡LEYENDA!", "Has superado los laberintos más difíciles del sistema. ¡Tu cerebro es una supercomputadora!");
            return;
        }
        limpiarRuta();
        init();
    }

    function showIntro() {
        const msgs = {
            1: ["NIVEL 1: CALENTAMIENTO", "Cuidado con los muros negros. No puedes atravesarlos."],
            2: ["NIVEL 2: ZONA PELIGROSA", "Los pasillos se estrechan. Un error y tendrás que empezar de cero."],
            3: ["NIVEL 3: IMPOSIBLE", "Laberintos gigantes. Tienes que planificar más de 15 pasos con exactitud."]
        };
        popMsg(msgs[currentLvl][0], msgs[currentLvl][1]);
    }

    function popMsg(t, b) {
        document.getElementById('msg-tit').innerText = t;
        document.getElementById('msg-body').innerText = b;
        document.getElementById('msg-box').style.display = 'flex';
        speak(t + ". " + b);
    }

    function closeMsg() {
        document.getElementById('msg-box').style.display = 'none';
        limpiarRuta();
        init();
    }

    window.onload = showIntro;
</script>
</body>
</html>

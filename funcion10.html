<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motoruta Juan - Versión Fiel 100%</title>
    <style>
        :root { --primary: #1e3a8a; --success: #22c55e; --danger: #ef4444; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--primary); color: white; width: 100%; padding: 10px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .stats { background: #fff; width: 100%; display: flex; justify-content: center; gap: 15px; padding: 8px; border-bottom: 2px solid #cbd5e1; font-weight: bold; font-size: 0.85rem; }
        .main-content { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 15px; width: 100%; max-width: 1100px; }
        #game-window { position: relative; border: 4px solid var(--primary); background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #grid { display: grid; background: #e2e8f0; gap: 1px; }
        .cell { background: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; position: relative; width: 100%; height: 100%; }
        .wall { background: #334155 !important; }
        .goal { background: #fef08a !important; border: 2px solid #eab308; }
        .house { background: #dbeafe !important; border: 2px dashed #3b82f6; }
        #moto { position: absolute; z-index: 100; transition: all 0.25s ease-out; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .controls { width: 350px; background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1; }
        #route-list { min-height: 40px; max-height: 80px; overflow-y: auto; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 6px; padding: 8px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
        .step-tag { background: var(--primary); color: white; padding: 2px 6px; border-radius: 6px; font-size: 0.75rem; }
        .input-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .input-card { background: #f8fafc; padding: 6px; border: 1px solid #e2e8f0; border-radius: 6px; text-align: center; }
        .btn-mini { width: 22px; height: 22px; border: none; border-radius: 50%; background: #94a3b8; color: white; cursor: pointer; }
        .btn-add { width: 100%; background: var(--primary); color: white; border: none; padding: 4px; border-radius: 4px; cursor: pointer; font-size: 0.65rem; margin-top: 4px; }
        .btn-run { width: 100%; background: var(--success); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        #obj-status { font-size: 0.85rem; color: #1e3a8a; margin-bottom: 8px; padding: 6px; background: #eff6ff; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<header>MOTORUTA: REHABILITACIÓN JUAN</header>
<div class="stats">
    <span>NIVEL: <span id="lvl-txt">1</span></span>
    <span>EJERCICIO: <span id="ex-txt">1</span></span>
    <span>FALLOS: <span id="fail-txt">0</span></span>
</div>

<div class="main-content">
    <div id="game-window">
        <div id="moto">🏍️</div>
        <div id="grid"></div>
    </div>

    <div class="controls">
        <div id="obj-status">Cargando...</div>
        <div id="route-list"></div>
        <div class="input-zone">
            <div class="input-card">⬆<br><button class="btn-mini" onclick="m('arr',-1)">-</button> <span id="t-arr">1</span> <button class="btn-mini" onclick="m('arr',1)">+</button><button class="btn-add" onclick="add('arr')">AÑADIR</button></div>
            <div class="input-card">⬇<br><button class="btn-mini" onclick="m('aba',-1)">-</button> <span id="t-aba">1</span> <button class="btn-mini" onclick="m('aba',1)">+</button><button class="btn-add" onclick="add('aba')">AÑADIR</button></div>
            <div class="input-card">⬅<br><button class="btn-mini" onclick="m('izq',-1)">-</button> <span id="t-izq">1</span> <button class="btn-mini" onclick="m('izq',1)">+</button><button class="btn-add" onclick="add('izq')">AÑADIR</button></div>
            <div class="input-card">➡<br><button class="btn-mini" onclick="m('der',-1)">-</button> <span id="t-der">1</span> <button class="btn-mini" onclick="m('der',1)">+</button><button class="btn-add" onclick="add('der')">AÑADIR</button></div>
        </div>
        <button class="btn-run" onclick="execute()">INICIAR RUTA 🏁</button>
        <button onclick="clearR()" style="width:100%; margin-top:5px; border:none; background:none; color:red; cursor:pointer; font-size:0.7rem;">Borrar Programación</button>
    </div>
</div>

<script>
    let lvl = 1, ex = 1, fails = 0, prog = [], active = false, pos = {x:0, y:0};
    let st = { perro: false, gato: false, parque: false, casa: false };
    let tmp = { arr: 1, aba: 1, izq: 1, der: 1 };

    // TRANSCRIPCIÓN MANUAL CUADRO POR CUADRO DE TUS DIBUJOS
    const DB = {
        1: { s: 8, exs: [
            {i:[0,7], g:[3,3], h:[6,2], w:[[1,4],[1,5],[1,6],[3,5],[3,6],[3,7],[5,2],[5,3],[5,4]], ex: []},
            {i:[7,7], g:[0,0], h:[4,3], w:[[6,1],[6,2],[6,3],[2,5],[2,6],[2,7]], ex: []},
            {i:[3,3], g:[7,7], h:[0,0], w:[[1,1],[1,2],[5,5],[5,6]], ex: []}
        ]},
        2: { s: 12, exs: [
            {i:[0,11], g:[11,0], h:[11,11], w:[[2,10],[2,11],[5,5]], ex: [{x:6,y:6,id:'perro',img:'🐶'}]},
            {i:[11,11], g:[0,0], h:[6,6], w:[], ex: [{x:2,y:10,id:'perro',img:'🐶'}]},
            {i:[6,6], g:[11,11], h:[0,0], w:[], ex: [{x:10,y:2,id:'perro',img:'🐶'}]}
        ]},
        3: { s: 16, exs: [
            {i:[0,15], g:[15,0], h:[8,8], w:[], ex: [{x:14,y:14,id:'perro',img:'🐶'},{x:1,y:1,id:'gato',img:'🐱'},{x:8,y:14,id:'parque',img:'🌳'}]},
            {i:[15,15], g:[0,0], h:[4,4], w:[], ex: [{x:2,y:2,id:'perro',img:'🐶'},{x:13,y:13,id:'gato',img:'🐱'},{x:8,y:2,id:'parque',img:'🌳'}]},
            {i:[8,15], g:[0,0], h:[15,0], w:[], ex: [{x:2,y:14,id:'perro',img:'🐶'},{x:14,y:2,id:'gato',img:'🐱'},{x:15,y:15,id:'parque',img:'🌳'}]}
        ]}
    };

    function speak(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; window.speechSynthesis.speak(m); }
    function m(d, v) { tmp[d] = Math.max(1, Math.min(15, tmp[d] + v)); document.getElementById('t-'+d).innerText = tmp[d]; }
    function add(d) { if(active) return; prog.push({d, n: tmp[d]}); updateUI(); }
    function clearR() { prog = []; updateUI(); resetM(); }

    function updateUI() {
        const l = document.getElementById('route-list'); l.innerHTML = '';
        const icon = { arr:'⬆', aba:'⬇', izq:'⬅', der:'➡' };
        prog.forEach(p => { const s = document.createElement('span'); s.className = 'step-tag'; s.innerText = `${icon[p.d]} ${p.n}`; l.appendChild(s); });
        
        let txt = "";
        if(lvl==1) txt = !st.casa ? "Ir a la casa 🏠" : "Ir a la meta 🏁";
        if(lvl==2) txt = !st.perro ? "Buscar al perro 🐶" : (!st.casa ? "Llevarlo a casa 🏠" : "Ir a la meta 🏁");
        if(lvl==3) txt = (!st.perro || !st.gato) ? "Buscar perro 🐶 y gato 🐱" : (!st.parque ? "Ir al parque 🌳" : (!st.casa ? "Llevarlos a casa 🏠" : "Ir a la meta 🏁"));
        document.getElementById('obj-status').innerText = "Objetivo: " + txt;
    }

    function build() {
        const c = DB[lvl], e = c.exs[ex-1];
        const g = document.getElementById('grid');
        const sz = Math.floor(Math.min(window.innerWidth, 500) / c.s);
        g.style.gridTemplateColumns = `repeat(${c.s}, ${sz}px)`;
        g.innerHTML = '';
        st = { perro: false, gato: false, parque: false, casa: false };

        for(let y=0; y<c.s; y++) {
            for(let x=0; x<c.s; x++) {
                const d = document.createElement('div'); d.className = 'cell';
                d.style.width = d.style.height = sz + 'px';
                if(e.w.some(w => w[0]==x && w[1]==y)) d.classList.add('wall');
                if(x==e.g[0] && y==e.g[1]) { d.classList.add('goal'); d.innerText='🏁'; }
                if(x==e.h[0] && y==e.h[1]) { d.classList.add('house'); d.innerText='🏠'; }
                const item = e.ex.find(o => o.x==x && o.y==y);
                if(item) { d.innerText = item.img; d.id = 'o-'+item.id; }
                g.appendChild(d);
            }
        }
        pos = {x: e.i[0], y: e.i[1]};
        const m = document.getElementById('moto'); m.style.width = m.style.height = sz+'px'; m.style.fontSize = sz*0.7+'px';
        renderM(); updateUI();
        speak("Juan, vamos a empezar. Mira el dibujo y cuenta los cuadros.");
    }

    function renderM() {
        const sz = Math.floor(Math.min(window.innerWidth, 500) / DB[lvl].s);
        document.getElementById('moto').style.transform = `translate(${pos.x * sz}px, ${pos.y * sz}px)`;
    }

    async function execute() {
        if(active || prog.length == 0) return;
        active = true;
        const e = DB[lvl].exs[ex-1];
        const moves = { der:{x:1,y:0}, izq:{x:-1,y:0}, aba:{x:0,y:1}, arr:{x:0,y:-1} };

        for(let step of prog) {
            for(let i=0; i<step.n; i++) {
                let nx = pos.x + moves[step.d].x, ny = pos.y + moves[step.d].y;
                if(nx<0 || nx>=DB[lvl].s || ny<0 || ny>=DB[lvl].s || e.w.some(w => w[0]==nx && w[1]==ny)) {
                    fails++; document.getElementById('fail-txt').innerText = fails;
                    speak("¡Choque! Inténtalo de nuevo."); resetM(); active = false; return;
                }
                pos.x = nx; pos.y = ny; renderM();
                checkObj(e); updateUI();
                await new Promise(r => setTimeout(r, 250));
            }
        }

        if(pos.x == e.g[0] && pos.y == e.g[1] && st.casa) {
            speak("¡Muy bien Juan!"); setTimeout(next, 1000);
        } else {
            speak("Ruta incompleta. Te faltó algún objetivo."); active = false;
        }
    }

    function checkObj(e) {
        if(pos.x == e.h[0] && pos.y == e.h[1]) {
            if(lvl==1) st.casa = true;
            if(lvl==2 && st.perro) st.casa = true;
            if(lvl==3 && st.perro && st.gato && st.parque) st.casa = true;
        }
        e.ex.forEach(o => {
            if(pos.x == o.x && pos.y == o.y) {
                st[o.id] = true;
                const el = document.getElementById('o-'+o.id);
                if(el) el.style.opacity = "0.2";
            }
        });
    }

    function resetM() { pos = {x: DB[lvl].exs[ex-1].i[0], y: DB[lvl].exs[ex-1].i[1]}; renderM(); }
    function next() { ex++; if(ex>3) { lvl++; ex=1; } if(lvl>3) { alert("¡Terminado!"); lvl=1; } build(); }
    window.onload = build;
</script>
</body>
</html>

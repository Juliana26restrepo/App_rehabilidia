<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MOTORUTA JUAN - DISEÑOS ORIGINALES</title>
    <style>
        :root { --primary: #1e3a8a; --success: #22c55e; --danger: #ef4444; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--primary); color: white; width: 100%; padding: 15px; text-align: center; font-size: 1.5rem; font-weight: bold; }
        .instruction-banner { background: #ffedd5; border: 2px solid #fb923c; color: #9a3412; padding: 15px; margin: 10px; border-radius: 8px; width: 90%; max-width: 1000px; font-weight: bold; text-align: center; font-size: 1.1rem; }
        .stats { background: #fff; width: 100%; display: flex; justify-content: center; gap: 20px; padding: 10px; border-bottom: 2px solid #cbd5e1; font-weight: bold; }
        .main-content { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 15px; width: 100%; max-width: 1200px; }
        #game-window { position: relative; border: 4px solid var(--primary); background: #fff; border-radius: 8px; overflow: hidden; }
        #grid { display: grid; background: #e2e8f0; gap: 1px; }
        .cell { background: #fff; display: flex; align-items: center; justify-content: center; position: relative; font-weight: bold; }
        .wall { background: #334155 !important; }
        .goal { background: #fef08a !important; border: 2px solid #eab308; }
        .house { background: #dbeafe !important; border: 2px dashed #3b82f6; }
        #moto { position: absolute; z-index: 100; transition: all 0.25s ease-out; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .controls { width: 380px; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #cbd5e1; }
        #route-list { min-height: 50px; max-height: 100px; overflow-y: auto; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 8px; padding: 10px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 5px; }
        .step-tag { background: var(--primary); color: white; padding: 4px 8px; border-radius: 10px; font-size: 0.8rem; }
        .input-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-card { background: #f8fafc; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; }
        .btn-mini { width: 25px; height: 25px; border: none; border-radius: 50%; background: #94a3b8; color: white; cursor: pointer; }
        .btn-add { width: 100%; background: var(--primary); color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-top: 5px; font-weight: bold; }
        .btn-run { width: 100%; background: var(--success); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1rem; }
    </style>
</head>
<body>

<header>MOTORUTA: ENTRENAMIENTO DE JUAN</header>

<div class="instruction-banner" id="main-inst">Cargando instrucción...</div>

<div class="stats">
    <span>NIVEL: <span id="lvl-txt">1</span></span>
    <span>EJERCICIO: <span id="ex-txt">1</span></span>
    <span>ERRORES: <span id="fail-txt">0</span></span>
</div>

<div class="main-content">
    <div id="game-window">
        <div id="moto">🏍️</div>
        <div id="grid"></div>
    </div>

    <div class="controls">
        <div id="route-list"></div>
        <div class="input-zone">
            <div class="input-card">⬆ ARRIBA<br><button class="btn-mini" onclick="m('arr',-1)">-</button> <span id="t-arr">1</span> <button class="btn-mini" onclick="m('arr',1)">+</button><button class="btn-add" onclick="add('arr')">AÑADIR</button></div>
            <div class="input-card">⬇ ABAJO<br><button class="btn-mini" onclick="m('aba',-1)">-</button> <span id="t-aba">1</span> <button class="btn-mini" onclick="m('aba',1)">+</button><button class="btn-add" onclick="add('aba')">AÑADIR</button></div>
            <div class="input-card">⬅ IZQUIERDA<br><button class="btn-mini" onclick="m('izq',-1)">-</button> <span id="t-izq">1</span> <button class="btn-mini" onclick="m('izq',1)">+</button><button class="btn-add" onclick="add('izq')">AÑADIR</button></div>
            <div class="input-card">➡ DERECHA<br><button class="btn-mini" onclick="m('der',-1)">-</button> <span id="t-der">1</span> <button class="btn-mini" onclick="m('der',1)">+</button><button class="btn-add" onclick="add('der')">AÑADIR</button></div>
        </div>
        <button class="btn-run" onclick="execute()">INICIAR RUTA 🏁</button>
        <button onclick="clearR()" style="width:100%; margin-top:10px; border:none; background:none; color:red; cursor:pointer; font-size:0.8rem;">BORRAR TODO</button>
    </div>
</div>

<script>
    let lvl = 1, ex = 1, fails = 0, prog = [], active = false, pos = {x:0, y:0};
    let st = { perro: false, gato: false, parque: false, casa: false };
    let tmp = { arr: 1, aba: 1, izq: 1, der: 1 };

    // MAPAS CALCADOS DE TUS DIBUJOS
    const DB = {
        1: { s: 8, exs: [
            {i:[0,0], m:[4,4], c:[5,6], w:[[1,0],[1,1],[1,2],[1,3],[1,4],[5,4],[6,4],[0,7],[5,7],[7,0]]}, // Dibujo Ej 1 Nivel 1
            {i:[0,7], m:[7,4], c:[3,0], w:[[3,1],[4,1],[6,1],[1,2],[1,3],[1,4],[5,5],[6,6],[0,6]]}, // Dibujo Ej 2 Nivel 1
            {i:[4,3], m:[2,7], c:[5,0], w:[[0,0],[0,1],[1,0],[7,0],[7,1],[3,2],[4,4],[7,6],[7,7]]}  // Dibujo Ej 3 Nivel 1
        ]},
        2: { s: 12, exs: [
            {i:[2,4], m:[6,1], c:[1,10], ex:[{x:4,y:8,id:'perro',img:'🐶'}], w:[[0,0],[1,0],[2,0]]},
            {i:[10,1], m:[6,10], c:[3,7], ex:[{x:5,y:2,id:'perro',img:'🐶'}], w:[]}
        ]},
        3: { s: 16, exs: [
            {i:[7,8], m:[14,14], c:[11,10], ex:[{x:1,y:1,id:'perro',img:'🐶'},{x:14,y:1,id:'gato',img:'🐱'},{x:1,y:10,id:'parque',img:'🌳'}], w:[]}
        ]}
    };

    function getInstruccion() {
        let t = "Juan: Cuenta los cuadros blancos, ve sumándolos. ";
        if(lvl==1) t += "ORDEN: Pasa por la CASA 🏠 y luego a la META 🏁.";
        if(lvl==2) t += "ORDEN: Recoge al PERRO 🐶, llévalo a la CASA 🏠 y ve a la META 🏁.";
        if(lvl==3) t += "ORDEN: Recoge PERRO 🐶 y GATO 🐱, ve al ÁRBOL 🌳, luego CASA 🏠 y META 🏁.";
        return t;
    }

    function speak(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; window.speechSynthesis.speak(m); }
    function m(d, v) { tmp[d] = Math.max(1, Math.min(15, tmp[d] + v)); document.getElementById('t-'+d).innerText = tmp[d]; }
    function add(d) { if(active) return; prog.push({d, n: tmp[d]}); updateUI(); }
    function clearR() { prog = []; updateUI(); resetM(); }

    function updateUI() {
        const l = document.getElementById('route-list'); l.innerHTML = '';
        const icon = { arr:'⬆', aba:'⬇', izq:'⬅', der:'➡' };
        prog.forEach(p => { const s = document.createElement('span'); s.className = 'step-tag'; s.innerText = `${icon[p.d]} ${p.n}`; l.appendChild(s); });
        document.getElementById('main-inst').innerText = getInstruccion();
        document.getElementById('lvl-txt').innerText = lvl;
        document.getElementById('ex-txt').innerText = ex;
    }

    function build() {
        const c = DB[lvl], e = c.exs[ex-1];
        const g = document.getElementById('grid');
        const sz = Math.floor(Math.min(window.innerWidth - 40, 500) / c.s);
        g.style.gridTemplateColumns = `repeat(${c.s}, ${sz}px)`;
        g.innerHTML = '';
        st = { perro: false, gato: false, parque: false, casa: false };

        for(let y=0; y<c.s; y++) {
            for(let x=0; x<c.s; x++) {
                const d = document.createElement('div'); d.className = 'cell';
                d.style.width = d.style.height = sz + 'px';
                if(e.w.some(w => w[0]==x && w[1]==y)) d.classList.add('wall');
                if(x==e.m[0] && y==e.m[1]) { d.classList.add('goal'); d.innerText='🏁'; }
                if(x==e.c[0] && y==e.c[1]) { d.classList.add('house'); d.innerText='🏠'; }
                if(e.ex) {
                    const item = e.ex.find(o => o.x==x && o.y==y);
                    if(item) { d.innerText = item.img; d.id = 'o-'+item.id; }
                }
                g.appendChild(d);
            }
        }
        pos = {x: e.i[0], y: e.i[1]};
        const mNode = document.getElementById('moto'); 
        mNode.style.width = mNode.style.height = sz+'px'; 
        mNode.style.fontSize = sz*0.7+'px';
        renderM(); updateUI();
        speak(getInstruccion());
    }

    function renderM() {
        const sz = Math.floor(Math.min(window.innerWidth - 40, 500) / DB[lvl].s);
        document.getElementById('moto').style.transform = `translate(${pos.x * sz}px, ${pos.y * sz}px)`;
    }

    async function execute() {
        if(active || prog.length == 0) return;
        active = true;
        const e = DB[lvl].exs[ex-1];
        const moves = { der:{x:1,y:0}, izq:{x:-1,y:0}, aba:{x:0,y:1}, arr:{x:0,y:-1} };

        for(let step of prog) {
            for(let i=0; i<step.n; i++) {
                let nx = pos.x + moves[step.d].x, ny = pos.y + moves[step.d].y;
                if(nx<0 || nx>=DB[lvl].s || ny<0 || ny>=DB[lvl].s || e.w.some(w => w[0]==nx && w[1]==ny)) {
                    fails++; document.getElementById('fail-txt').innerText = fails;
                    speak("¡Choque Juan! Cuenta de nuevo."); resetM(); active = false; return;
                }
                pos.x = nx; pos.y = ny; renderM();
                checkLogic(e);
                await new Promise(r => setTimeout(r, 300));
            }
        }

        if(pos.x == e.m[0] && pos.y == e.m[1] && st.casa) {
            speak("¡Excelente!"); setTimeout(next, 1000);
        } else {
            speak("No seguiste el orden. Intenta otra vez."); active = false;
        }
    }

    function checkLogic(e) {
        if(e.ex) {
            e.ex.forEach(o => {
                if(pos.x == o.x && pos.y == o.y) {
                    st[o.id] = true;
                    document.getElementById('o-'+o.id).style.opacity = "0.2";
                }
            });
        }
        if(pos.x == e.c[0] && pos.y == e.c[1]) {
            if(lvl==1) st.casa = true;
            if(lvl==2 && st.perro) st.casa = true;
            if(lvl==3 && st.perro && st.gato && st.parque) st.casa = true;
        }
    }

    function resetM() { pos = {x: DB[lvl].exs[ex-1].i[0], y: DB[lvl].exs[ex-1].i[1]}; renderM(); }
    function next() { ex++; if(ex > DB[lvl].exs.length) { lvl++; ex=1; } if(lvl>3) { lvl=1; } build(); active=false; prog=[]; }
    window.onload = build;
</script>
</body>
</html>

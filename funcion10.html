<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motoruta: Planificación Progresiva</title>
    <style>
        :root { --navy: #103A57; --gold: #FFD700; --bg: #F0F4F8; --white: #FFFFFF; --green: #2ECC71; --red: #E74C3C; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; }
        header { background: var(--navy); color: white; padding: 10px; font-weight: bold; text-align: center; }
        .stats-bar { display: flex; justify-content: center; gap: 30px; padding: 10px; font-weight: bold; background: #e2e8f0; border-bottom: 2px solid var(--navy); }
        .game-container { display: flex; flex: 1; padding: 15px; gap: 20px; justify-content: center; align-items: center; flex-wrap: wrap; }
        
        #grid { display: grid; gap: 5px; background: #94a3b8; padding: 10px; border-radius: 8px; border: 4px solid var(--navy); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .cell { background: #cbd5e1; border-radius: 4px; display: flex; align-items: center; justify-content: center; position: relative; }
        .wall { background: #334155; }
        .goal { background: var(--gold); }
        .moto { font-size: 2.2rem; z-index: 10; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .controls { display: flex; flex-direction: column; gap: 10px; width: 300px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-dir { padding: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border: 2px solid var(--navy); border-radius: 8px; background: white; -webkit-tap-highlight-color: transparent; }
        .btn-dir:active { background: #cbd5e1; }
        .btn-action { padding: 18px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; }
        #btn-go { background: var(--green); box-shadow: 0 4px 0 #27ae60; }
        #btn-reset { background: var(--red); margin-top: 5px; }

        #sequence-display { display: flex; flex-wrap: wrap; gap: 5px; min-height: 60px; border: 2px dashed #cbd5e1; padding: 10px; border-radius: 8px; background: #f8fafc; overflow-y: auto; max-height: 100px; }
        .command-icon { background: var(--navy); color: white; padding: 5px 10px; border-radius: 4px; font-size: 1rem; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.98); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<header>MOTORUTA: DESAFÍO DE ESTRATEGIA</header>
<div class="stats-bar">
    <span>NIVEL: <span id="txt-nivel">1</span>/3</span>
    <span>EJERCICIO: <span id="txt-ejercicio">1</span>/3</span>
</div>

<div class="game-container">
    <div id="grid"></div>
    <div class="controls">
        <div id="sequence-display"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-dir" onclick="addCommand('UP')">⬆️ Subir</button>
            <button class="btn-dir" onclick="addCommand('DOWN')">⬇️ Bajar</button>
            <button class="btn-dir" onclick="addCommand('LEFT')">⬅️ Izq</button>
            <button class="btn-dir" onclick="addCommand('RIGHT')">➡️ Der</button>
        </div>
        <button id="btn-go" class="btn-action" onclick="runSequence()">ARRANCAR MOTO 🏍️</button>
        <button id="btn-reset" class="btn-action" onclick="resetSequence()">BORRAR RUTA</button>
    </div>
</div>

<div id="overlay" class="overlay">
    <h1 id="ov-title" style="color: var(--gold);"></h1>
    <p id="ov-text" style="font-size: 1.4rem; max-width: 600px;"></p>
    <button onclick="closeOverlay()" style="padding: 15px 40px; font-size: 1.2rem; cursor: pointer; background: var(--gold); border: none; border-radius: 30px; font-weight: bold; margin-top: 20px;">¡VAMOS!</button>
</div>

<script>
    let nivel = 1, ejercicio = 1, sequence = [], isMoving = false, playerPos = { x: 0, y: 0 };
    
    // Mapas variados por nivel [size, walls, goal]
    const mapas = {
        1: [
            { size: 4, walls: [[1,0], [1,1], [1,2]], goal: [3,1] },
            { size: 4, walls: [[0,1], [2,1], [2,2]], goal: [3,3] },
            { size: 4, walls: [[1,1], [2,1], [3,1]], goal: [2,2] }
        ],
        2: [
            { size: 5, walls: [[1,1], [2,1], [3,1], [1,3], [2,3], [3,3]], goal: [4,2] },
            { size: 5, walls: [[0,2], [1,2], [2,2], [3,2], [3,3], [3,4]], goal: [4,4] },
            { size: 5, walls: [[1,0], [1,1], [1,2], [3,2], [3,3], [3,4]], goal: [4,0] }
        ],
        3: [
            { size: 6, walls: [[1,1],[1,2],[1,3],[1,4],[3,1],[3,2],[3,3],[3,4],[4,4]], goal: [5,5] },
            { size: 6, walls: [[0,1],[1,1],[2,1],[3,1],[4,1], [1,3],[2,3],[3,3],[4,3],[5,3]], goal: [5,5] },
            { size: 6, walls: [[2,0],[2,1],[2,2],[2,3],[2,4], [4,1],[4,2],[4,3],[4,4],[4,5]], goal: [5,0] }
        ]
    };

    function speak(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        window.speechSynthesis.speak(m);
    }

    function initGame() {
        const c = mapas[nivel][ejercicio - 1];
        const grid = document.getElementById('grid');
        const cellSize = window.innerHeight < 600 ? 50 : 70;
        grid.style.gridTemplateColumns = `repeat(${c.size}, ${cellSize}px)`;
        grid.style.gridTemplateRows = `repeat(${c.size}, ${cellSize}px)`;
        grid.innerHTML = '';
        playerPos = { x: 0, y: 0 };
        
        for (let y = 0; y < c.size; y++) {
            for (let x = 0; x < c.size; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${x}-${y}`;
                if (x === c.goal[0] && y === c.goal[1]) {
                    cell.classList.add('goal');
                    cell.innerHTML = '🏁';
                }
                if (c.walls.some(w => w[0] === x && w[1] === y)) cell.classList.add('wall');
                grid.appendChild(cell);
            }
        }
        updatePlayerUI();
    }

    function updatePlayerUI() {
        document.querySelectorAll('.moto').forEach(m => m.remove());
        const target = document.getElementById(`cell-${playerPos.x}-${playerPos.y}`);
        const moto = document.createElement('div');
        moto.className = 'moto';
        moto.innerText = '🏍️';
        target.appendChild(moto);
    }

    function addCommand(dir) {
        if(isMoving || sequence.length > 20) return;
        sequence.push(dir);
        renderSequence();
    }

    // Soporte Teclado
    window.addEventListener('keydown', (e) => {
        if(e.key === "ArrowUp") addCommand('UP');
        if(e.key === "ArrowDown") addCommand('DOWN');
        if(e.key === "ArrowLeft") addCommand('LEFT');
        if(e.key === "ArrowRight") addCommand('RIGHT');
        if(e.key === "Enter") runSequence();
    });

    function renderSequence() {
        const display = document.getElementById('sequence-display');
        display.innerHTML = '';
        const icons = { 'UP': '⬆️', 'DOWN': '⬇️', 'LEFT': '⬅️', 'RIGHT': '➡️' };
        sequence.forEach(cmd => {
            const span = document.createElement('span');
            span.className = 'command-icon';
            span.innerText = icons[cmd];
            display.appendChild(span);
        });
    }

    function resetSequence() {
        if(isMoving) return;
        sequence = [];
        playerPos = { x: 0, y: 0 };
        renderSequence();
        updatePlayerUI();
    }

    async function runSequence() {
        if(isMoving || sequence.length === 0) return;
        isMoving = true;
        const c = mapas[nivel][ejercicio - 1];

        for (let cmd of sequence) {
            let nX = playerPos.x, nY = playerPos.y;
            if (cmd === 'UP') nY--; if (cmd === 'DOWN') nY++;
            if (cmd === 'LEFT') nX--; if (cmd === 'RIGHT') nX++;

            if (nX < 0 || nX >= c.size || nY < 0 || nY >= c.size || c.walls.some(w => w[0] === nX && w[1] === nY)) {
                speak("¡Choqué! Intenta otra ruta.");
                setTimeout(resetSequence, 600);
                isMoving = false;
                return;
            }
            playerPos = { x: nX, y: nY };
            updatePlayerUI();
            await new Promise(r => setTimeout(r, 350));
        }

        if (playerPos.x === c.goal[0] && playerPos.y === c.goal[1]) {
            speak("¡Lo lograste!");
            setTimeout(nextStep, 800);
        } else {
            speak("No llegamos a la meta.");
            isMoving = false;
        }
    }

    function nextStep() {
        isMoving = false;
        if (ejercicio < 3) {
            ejercicio++;
            document.getElementById('txt-ejercicio').innerText = ejercicio;
            resetSequence();
            initGame();
        } else if (nivel < 3) {
            nivel++; ejercicio = 1;
            document.getElementById('txt-nivel').innerText = nivel;
            document.getElementById('txt-ejercicio').innerText = ejercicio;
            showLevelIntro();
        } else {
            mostrarOverlay("¡MISIÓN CUMPLIDA!", "Eres un experto en rutas. ¡Excelente trabajo!");
        }
    }

    function showLevelIntro() {
        let t = `NIVEL ${nivel}`;
        let m = nivel === 1 ? "Usa las flechas para planear tu ruta hacia la bandera. Luego presiona Arrancar." : 
                nivel === 2 ? "¡Bien! Los obstáculos ahora son más difíciles. Planifica con cuidado." : 
                "Dificultad máxima. Tienes que rodear muchas paredes para llegar.";
        mostrarOverlay(t, m);
    }

    function mostrarOverlay(t, m) {
        document.getElementById('ov-title').innerText = t;
        document.getElementById('ov-text').innerText = m;
        document.getElementById('overlay').style.display = 'flex';
        speak(t + ". " + m);
    }

    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        initGame();
    }

    window.onload = showLevelIntro;
</script>
</body>
</html>

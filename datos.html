<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estadísticas - REHABILIDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --m-green: #366B2B; --silver: #CEE5D6; }
        body { font-family: sans-serif; margin: 0; background: var(--silver); color: var(--p-blue); }
        header { background: var(--p-blue); color: white; padding: 15px; text-align: center; font-weight: bold; display: flex; align-items: center; justify-content: center; position: relative; }
        .btn-retroceder { position: absolute; left: 15px; color: white; text-decoration: none; font-size: 1.5rem; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: #abc; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--t-blue); color: white; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item { border-bottom: 1px solid #eee; padding: 12px 0; font-size: 0.9rem; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; color: white; margin-bottom: 5px; }
        .tag-atencion { background: #e11d48; }
        .tag-memoria { background: #2563eb; }
        .tag-ejecutiva { background: #16a34a; }
        .hidden { display: none; }
        .fecha-historial { float: right; font-size: 0.75rem; color: #666; }
    </style>
</head>
<body>

<header>
    <a href="perfil_paciente.html" class="btn-retroceder">❮</a>
    CENTRAL DE DATOS
</header>

<div class="container">
    <div class="tabs">
        <button id="bt1" class="tab-btn active" onclick="ver('d')">Diario</button>
        <button id="bt2" class="tab-btn" onclick="ver('s')">Sesiones</button>
    </div>

    <div id="sd">
        <div class="card"><h3>Energía</h3><canvas id="graf"></canvas></div>
        <div class="card"><h3>Historial Diario</h3><div id="listD"></div></div>
    </div>

    <div id="ss" class="hidden">
        <div class="card"><h3>Progreso de Ejercicios</h3><div id="listS"></div></div>
    </div>
</div>

<script>
    function ver(t) {
        document.getElementById('sd').classList.toggle('hidden', t !== 'd');
        document.getElementById('ss').classList.toggle('hidden', t !== 's');
        document.getElementById('bt1').classList.toggle('active', t === 'd');
        document.getElementById('bt2').classList.toggle('active', t === 's');
    }

    window.onload = function() {
        try {
            // Cargar datos de LocalStorage
            const historialDiario = JSON.parse(localStorage.getItem('diario_juan')) || [];
            const sesiones = JSON.parse(localStorage.getItem('sesiones_rehabilitidia')) || [];
            
            // --- LÓGICA DEL DIARIO ---
            const ld = document.getElementById('listD');
            if(historialDiario.length > 0) {
                // Gráfico de Energía
                new Chart(document.getElementById('graf'), {
                    type: 'line',
                    data: {
                        labels: historialDiario.map(r => r.fecha.split(',')[0]),
                        datasets: [{ label: 'Energía', data: historialDiario.map(r => r.energia), borderColor: '#307B8E', tension: 0.3, fill: false }]
                    }
                });
                // Lista de historial diario
                [...historialDiario].reverse().forEach(r => {
                    ld.innerHTML += `
                        <div class="item">
                            <span class="fecha-historial">${r.fecha.split(',')[0]}</span>
                            <b>Estado: ${r.emocion}</b><br>
                            <small>Energía: ${r.energia}/10 | Sueño: ${r.horasSueño}h</small>
                        </div>`;
                });
            } else {
                ld.innerHTML = "No hay registros en el diario aún.";
            }

            // --- LÓGICA DE LAS SESIONES ---
            const ls = document.getElementById('listS');
            if(sesiones.length > 0) {
                [...sesiones].reverse().forEach(s => {
                    // Si la sesión no tiene fecha guardada, ponemos la de hoy por defecto
                    let fechaSesion = s.fecha ? s.fecha : new Date().toLocaleDateString();
                    
                    // Determinar color de etiqueta por módulo
                    let clase = "tag-atencion";
                    if(s.modulo && s.modulo.includes("Memoria")) clase = "tag-memoria";
                    if(s.modulo && s.modulo.includes("Ejecutiva")) clase = "tag-ejecutiva";

                    ls.innerHTML += `
                        <div class="item">
                            <span class="fecha-historial">${fechaSesion}</span>
                            <span class="tag ${clase}">${s.modulo || "Atención"}</span><br>
                            <b>Sesión ${s.id_sesion || s.sesion || "?"}</b> - ${s.eficacia}
                            <br><small>Aciertos: ${s.aciertos} | Errores: ${s.errores}</small>
                        </div>`;
                });
            } else { 
                ls.innerHTML = "<p style='text-align:center; padding:20px;'>Aún no has completado ninguna sesión.</p>"; 
            }
        } catch (e) { 
            console.error("Error al cargar datos:", e); 
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memoria 1 - Juan: Retención Espacial</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; background: url('mem1/fondo.jpg') no-repeat center center fixed; background-size: cover; height: 100vh; }
        #cabecera { background: rgba(108, 91, 123, 0.95); color: white; height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 4px solid #307B8E; z-index: 1000; position: relative; }
        #instruccion-box { background: white; padding: 10px 20px; border-radius: 20px; color: #103A57; display: flex; align-items: center; border: 3px solid #6C5B7B; font-weight: bold; max-width: 70%; }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }
        #panel-objetos { width: 170px; background: rgba(255,255,255,0.9); border-right: 4px solid #6C5B7B; display: none; flex-direction: column; gap: 10px; padding: 15px; align-items: center; overflow-y: auto; height: calc(100vh - 84px); float: left; z-index: 100; }
        .draggable { width: 85px; height: 85px; object-fit: contain; cursor: grab; }
        #escena-central { margin-left: 0; height: calc(100vh - 84px); position: relative; transition: margin 0.3s; }
        #habitacion-area { position: relative; width: 100%; height: 100%; }
        .pieza { position: absolute; width: 100px; transform: translate(-50%, -50%); z-index: 10; }
        .guia-sombra { position: absolute; width: 105px; height: 105px; border: 3px dashed rgba(108, 91, 123, 0.5); border-radius: 15px; background: rgba(255,255,255,0.15); transform: translate(-50%, -50%); display: none; z-index: 5; }
        #timer-box { position: absolute; top: 20px; right: 20px; background: #E67E22; color: white; padding: 12px 25px; border-radius: 15px; font-size: 1.8rem; font-weight: bold; display: none; z-index: 2000; }
        #overlay-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.98); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; }
    </style>
</head>
<body onload="prepararSesion()">

<div id="cabecera">
    <div id="instruccion-box"><img src="COTERAPEUTA.JPG"><span id="label-guia">Cargando...</span></div>
    <div id="timer-box">00:00</div>
</div>

<div id="panel-objetos"></div>

<div id="escena-central">
    <div id="habitacion-area">
        <div id="guias-contenedor"></div>
        <div id="objetos-memorizar"></div>
        <div id="objetos-evocar"></div>
    </div>
</div>

<div id="overlay-final">
    <h1 style="font-size: 3.5rem; color: #FFD700;">¡MUY BIEN HECHO!</h1>
    <p id="resumen-final" style="font-size: 1.8rem; margin: 20px 0;"></p>
    <blockquote style="font-style: italic; color: #CEE5D6; font-size: 1.4rem;">"Lo estás logrando, el éxito es la respuesta de un esfuerzo constante"</blockquote>
    <button onclick="window.location.href='memoria_sesiones.html'" style="padding: 15px 40px; font-size: 1.2rem; border-radius: 10px; background: #366B2B; color: white; border: none; cursor: pointer; font-weight: bold;">CONTINUAR</button>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const nivelActual = params.get('nivel') || 'bajo';

    let objetosReto = [];
    let intentosHechos = 0;
    let aciertos = 0;

    // COORDENADAS DISPERSAS POR TODA LA HABITACIÓN
    const db = {
        "billetera": { nom: "la billetera", x: 300, y: 250 },
        "camisa": { nom: "la camisa", x: 850, y: 600 },
        "celular": { nom: "el celular", x: 700, y: 220 },
        "crema_dental": { nom: "la crema dental", x: 250, y: 700 },
        "frasco_gotas": { nom: "el frasco de gotas", x: 900, y: 150 },
        "gafas": { nom: "las gafas", x: 500, y: 180 },
        "libro": { nom: "el libro", x: 820, y: 420 },
        "pantalon": { nom: "el pantalón", x: 450, y: 650 },
        "pastillero": { nom: "el pastillero", x: 920, y: 350 },
        "reloj": { nom: "el reloj", x: 550, y: 400 },
        "toalla_manos": { nom: "la toalla", x: 150, y: 400 },
        "vaso": { nom: "el vaso", x: 650, y: 550 }
    };

    const config = {
        'bajo': { cant: 2, tiempo: 12, distractoresSennal: 2 },
        'medio': { cant: 4, tiempo: 18, distractoresSennal: 4 },
        'alto': { cant: 6, tiempo: 25, distractoresSennal: 6 }
    };

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        document.getElementById('label-guia').innerText = t;
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        msg.onend = () => { if(callback) callback(); };
        window.speechSynthesis.speak(msg);
    }

    function prepararSesion() {
        const c = config[nivelActual];
        const keys = Object.keys(db).sort(() => Math.random() - 0.5);
        objetosReto = keys.slice(0, c.cant);

        hablar(`Juan, memoriza estos ${c.cant} objetos y su lugar. Fíjate bien en las señales.`, () => {
            mostrarEstimulos();
        });
    }

    function mostrarEstimulos() {
        const c = config[nivelActual];
        const contenedor = document.getElementById('objetos-memorizar');
        const guias = document.getElementById('guias-contenedor');

        objetosReto.forEach(id => {
            const img = document.createElement('img');
            img.src = `mem1/${id}.png`;
            img.className = 'pieza';
            img.style.left = db[id].x + 'px'; img.style.top = db[id].y + 'px';
            contenedor.appendChild(img);

            const guia = document.createElement('div');
            guia.className = 'guia-sombra';
            guia.style.display = 'block';
            guia.style.left = db[id].x + 'px'; guia.style.top = db[id].y + 'px';
            guias.appendChild(guia);
        });

        iniciarContador(c.tiempo);
    }

    function iniciarContador(s) {
        const timer = document.getElementById('timer-box');
        timer.style.display = 'block';
        const interval = setInterval(() => {
            s--;
            timer.innerText = `00:${s < 10 ? '0'+s : s}`;
            if(s <= 0) {
                clearInterval(interval);
                timer.style.display = 'none';
                faseRecuerdo();
            }
        }, 1000);
    }

    function faseRecuerdo() {
        document.getElementById('objetos-memorizar').innerHTML = "";
        document.getElementById('panel-objetos').style.display = 'flex';
        document.getElementById('escena-central').style.marginLeft = '174px';
        
        // AGREGAR SEÑALES DISTRACTORAS (Marcas donde NO había nada)
        const c = config[nivelActual];
        const disponibles = Object.keys(db).filter(k => !objetosReto.includes(k));
        const distractores = disponibles.sort(() => Math.random() - 0.5).slice(0, c.distractoresSennal);
        
        distractores.forEach(id => {
            const guiaExtra = document.createElement('div');
            guiaExtra.className = 'guia-sombra';
            guiaExtra.style.display = 'block';
            guiaExtra.style.left = db[id].x + 'px'; guiaExtra.style.top = db[id].y + 'px';
            document.getElementById('guias-contenedor').appendChild(guiaExtra);
        });

        hablar("Ahora Juan, coloca cada objeto en la marca donde lo viste originalmente.");

        const poolPanel = [...objetosReto].sort(() => Math.random() - 0.5);
        const panel = document.getElementById('panel-objetos');
        poolPanel.forEach(id => {
            const img = document.createElement('img');
            img.src = `mem1/${id}.png`;
            img.className = 'draggable';
            img.dataset.id = id;
            img.onmousedown = img.ontouchstart = drag;
            panel.appendChild(img);
        });
    }

    function drag(e) {
        const el = e.target;
        const t = e.type.includes('touch') ? e.touches[0] : e;
        let sx = t.clientX - el.getBoundingClientRect().left;
        let sy = t.clientY - el.getBoundingClientRect().top;
        el.style.position = 'fixed'; el.style.zIndex = 1000;

        function mover(me) {
            const mt = me.type.includes('touch') ? me.touches[0] : me;
            el.style.left = (mt.clientX - sx) + 'px'; el.style.top = (mt.clientY - sy) + 'px';
        }

        function soltar(se) {
            document.removeEventListener('mousemove', mover); document.removeEventListener('mouseup', soltar);
            document.removeEventListener('touchmove', mover); document.removeEventListener('touchend', soltar);
            
            const st = se.type.includes('touch') ? se.changedTouches[0] : se;
            const id = el.dataset.id;
            const area = document.getElementById('habitacion-area').getBoundingClientRect();
            const posX = st.clientX - area.left;
            const posY = st.clientY - area.top;

            // Validación de distancia a su marca correcta
            const dist = Math.sqrt(Math.pow(posX - db[id].x, 2) + Math.pow(posY - db[id].y, 2));
            
            intentosHechos++;
            if (dist < 80) {
                aciertos++;
                hablar("¡Bien hecho!");
                const fija = document.createElement('img');
                fija.src = el.src; fija.className = 'pieza';
                fija.style.left = db[id].x + 'px'; fija.style.top = db[id].y + 'px';
                document.getElementById('objetos-evocar').appendChild(fija);
                el.style.visibility = 'hidden';
            } else {
                hablar("Lo registramos.");
                el.style.position = 'static'; // Regresa al panel para que el nivel no se bloquee
            }

            if (aciertos === objetosReto.length) setTimeout(finalizar, 1000);
        }
        document.addEventListener('mousemove', mover); document.addEventListener('mouseup', soltar);
        document.addEventListener('touchmove', mover, {passive:false}); document.addEventListener('touchend', soltar);
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        // El porcentaje se basa en cuántos intentos necesitó vs cuántos eran correctos
        const precision = Math.round((objetosReto.length / intentosHechos) * 100);
        document.getElementById('resumen-final').innerText = `Aciertos: ${aciertos} | Retención: ${precision}%`;
        hablar("¡Excelente Juan! Has completado tu entrenamiento de memoria. Lo estás logrando.");
    }
</script>
</body>
</html>

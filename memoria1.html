<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memoria 1 - Juan: Entrenamiento Total</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; background: url('mem1/fondo.jpg') no-repeat center center fixed; background-size: cover; height: 100vh; }
        #cabecera { background: rgba(108, 91, 123, 0.95); color: white; height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 4px solid #307B8E; z-index: 1000; position: relative; }
        #instruccion-box { background: white; padding: 10px 20px; border-radius: 20px; color: #103A57; display: flex; align-items: center; border: 3px solid #6C5B7B; font-weight: bold; max-width: 70%; }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }
        #panel-objetos { width: 170px; background: rgba(255,255,255,0.9); border-right: 4px solid #6C5B7B; display: none; flex-direction: column; gap: 10px; padding: 15px; align-items: center; overflow-y: auto; height: calc(100vh - 84px); float: left; z-index: 100; }
        .draggable { width: 85px; height: 85px; object-fit: contain; cursor: grab; margin-bottom: 10px; }
        #escena-central { margin-left: 0; height: calc(100vh - 84px); position: relative; transition: margin 0.3s; }
        #habitacion-area { position: relative; width: 100%; height: 100%; }
        .pieza { position: absolute; width: 100px; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; }
        .guia-sombra { position: absolute; width: 110px; height: 110px; border: 3px dashed rgba(108, 91, 123, 0.5); border-radius: 15px; background: rgba(255,255,255,0.15); transform: translate(-50%, -50%); display: none; z-index: 5; }
        #timer-box { position: absolute; top: 20px; right: 20px; background: #E67E22; color: white; padding: 12px 25px; border-radius: 15px; font-size: 1.8rem; font-weight: bold; display: none; z-index: 2000; }
        #overlay-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.98); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; }
    </style>
</head>
<body onload="iniciarJuego()">

<div id="cabecera">
    <div id="instruccion-box"><img src="COTERAPEUTA.JPG"><span id="label-guia">Cargando...</span></div>
    <div id="timer-box">00:00</div>
</div>

<div id="panel-objetos"></div>
<div id="escena-central"><div id="habitacion-area"><div id="guias-contenedor"></div><div id="objetos-memorizar"></div><div id="objetos-evocar"></div></div></div>

<div id="overlay-final">
    <h1 style="font-size: 3.5rem; color: #FFD700;">¡ENTRENAMIENTO COMPLETADO!</h1>
    <p id="resumen-final" style="font-size: 1.8rem; margin: 20px 0;"></p>
    <button onclick="window.location.href='memoria_sesiones.html'" style="padding: 15px 40px; font-size: 1.2rem; border-radius: 10px; background: #366B2B; color: white; border: none; cursor: pointer;">VOLVER AL MENÚ</button>
</div>

<script>
    let nivelActual = 'bajo';
    let objetosReto = [];
    let colocadasEnNivel = 0;
    let erroresTotales = 0;
    let aciertosTotales = 0;

    // PUNTOS DE GRILLA FIJOS (Aseguran que no se tapen)
    const puntosGrilla = [
        {x: 250, y: 200}, {x: 550, y: 200}, {x: 850, y: 200},
        {x: 250, y: 450}, {x: 550, y: 450}, {x: 850, y: 450},
        {x: 400, y: 700}, {x: 700, y: 700}
    ];

    const itemsRepo = ["billetera", "camisa", "celular", "crema_dental", "frasco_gotas", "gafas", "libro", "pantalon", "pastillero", "reloj", "toalla_manos", "vaso"];

    const config = {
        'bajo': { cant: 2, tiempo: 10, distractores: 2, next: 'medio' },
        'medio': { cant: 4, tiempo: 15, distractores: 3, next: 'alto' },
        'alto': { cant: 6, tiempo: 20, distractores: 2, next: 'fin' }
    };

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        document.getElementById('label-guia').innerText = t;
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        msg.onend = () => { if(callback) callback(); };
        window.speechSynthesis.speak(msg);
    }

    function iniciarJuego() { prepararNivel(); }

    function prepararNivel() {
        document.getElementById('guias-contenedor').innerHTML = "";
        document.getElementById('objetos-memorizar').innerHTML = "";
        document.getElementById('objetos-evocar').innerHTML = "";
        document.getElementById('panel-objetos').innerHTML = "";
        document.getElementById('panel-objetos').style.display = 'none';
        document.getElementById('escena-central').style.marginLeft = '0';
        colocadasEnNivel = 0;

        const c = config[nivelActual];
        // Seleccionar objetos y asignarles puntos de grilla únicos
        const itemsSorteados = [...itemsRepo].sort(() => Math.random() - 0.5).slice(0, c.cant);
        const puntosSorteados = [...puntosGrilla].sort(() => Math.random() - 0.5);

        objetosReto = itemsSorteados.map((id, index) => ({
            id: id,
            x: puntosSorteados[index].x,
            y: puntosSorteados[index].y
        }));

        hablar(`Juan, memoriza estos ${c.cant} objetos.`, () => {
            const contenedor = document.getElementById('objetos-memorizar');
            const guias = document.getElementById('guias-contenedor');

            objetosReto.forEach(obj => {
                const img = document.createElement('img');
                img.src = `mem1/${obj.id}.png`;
                img.className = 'pieza';
                img.style.left = obj.x + 'px'; img.style.top = obj.y + 'px';
                contenedor.appendChild(img);

                const guia = document.createElement('div');
                guia.className = 'guia-sombra';
                guia.style.display = 'block';
                guia.style.left = obj.x + 'px'; guia.style.top = obj.y + 'px';
                guias.appendChild(guia);
            });
            iniciarContador(c.tiempo);
        });
    }

    function iniciarContador(s) {
        const timer = document.getElementById('timer-box');
        timer.style.display = 'block';
        const interval = setInterval(() => {
            s--; timer.innerText = `00:${s < 10 ? '0'+s : s}`;
            if(s <= 0) { clearInterval(interval); timer.style.display = 'none'; faseEvocacion(); }
        }, 1000);
    }

    function faseEvocacion() {
        document.getElementById('objetos-memorizar').innerHTML = "";
        document.getElementById('panel-objetos').style.display = 'flex';
        document.getElementById('escena-central').style.marginLeft = '174px';
        
        const c = config[nivelActual];
        // Añadir guías distractoras vacías
        const puntosUsados = objetosReto.length;
        const puntosLibres = puntosGrilla.filter(p => !objetosReto.some(o => o.x === p.x && o.y === p.y));
        puntosLibres.slice(0, c.distractores).forEach(p => {
            const guiaExtra = document.createElement('div');
            guiaExtra.className = 'guia-sombra';
            guiaExtra.style.display = 'block';
            guiaExtra.style.left = p.x + 'px'; guiaExtra.style.top = p.y + 'px';
            document.getElementById('guias-contenedor').appendChild(guiaExtra);
        });

        hablar("Coloca cada objeto en su marca.");
        const panel = document.getElementById('panel-objetos');
        [...objetosReto].sort(() => Math.random() - 0.5).forEach(obj => {
            const img = document.createElement('img');
            img.src = `mem1/${obj.id}.png`;
            img.className = 'draggable';
            img.dataset.id = obj.id;
            img.onmousedown = img.ontouchstart = drag;
            panel.appendChild(img);
        });
    }

    function drag(e) {
        const el = e.target;
        const t = e.type.includes('touch') ? e.touches[0] : e;
        let sx = t.clientX - el.getBoundingClientRect().left;
        let sy = t.clientY - el.getBoundingClientRect().top;
        el.style.position = 'fixed'; el.style.zIndex = 1000;

        function mover(me) {
            const mt = me.type.includes('touch') ? me.touches[0] : me;
            el.style.left = (mt.clientX - sx) + 'px'; el.style.top = (mt.clientY - sy) + 'px';
        }

        function soltar(se) {
            document.removeEventListener('mousemove', mover); document.removeEventListener('mouseup', soltar);
            document.removeEventListener('touchmove', mover); document.removeEventListener('touchend', soltar);
            const st = se.type.includes('touch') ? se.changedTouches[0] : se;
            const area = document.getElementById('habitacion-area').getBoundingClientRect();
            const posX = st.clientX - area.left; const posY = st.clientY - area.top;
            
            const objInfo = objetosReto.find(o => o.id === el.dataset.id);
            const dist = Math.sqrt(Math.pow(posX - objInfo.x, 2) + Math.pow(posY - objInfo.y, 2));
            
            if (dist < 90) {
                aciertosTotales++; colocadasEnNivel++;
                hablar("¡Muy bien!");
                const fija = document.createElement('img');
                fija.src = el.src; fija.className = 'pieza';
                fija.style.left = objInfo.x + 'px'; fija.style.top = objInfo.y + 'px';
                document.getElementById('objetos-evocar').appendChild(fija);
                el.style.visibility = 'hidden';
                if (colocadasEnNivel === objetosReto.length) setTimeout(verificarProgresion, 1200);
            } else {
                erroresTotales++;
                hablar("Ese no es su lugar.");
                el.style.position = 'static';
            }
        }
        document.addEventListener('mousemove', mover); document.addEventListener('mouseup', soltar);
        document.addEventListener('touchmove', mover, {passive:false}); document.addEventListener('touchend', soltar);
    }

    function verificarProgresion() {
        const proximo = config[nivelActual].next;
        if (proximo === 'fin') {
            document.getElementById('overlay-final').style.display = 'flex';
            const total = aciertosTotales + erroresTotales;
            document.getElementById('resumen-final').innerText = `Retención: ${Math.round((aciertosTotales/total)*100)}% | Errores: ${erroresTotales}`;
            hablar("¡Entrenamiento finalizado con éxito!");
        } else {
            nivelActual = proximo; prepararNivel();
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memoria 1 - Juan: Malla Compacta</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; background: #333; height: 100vh; }
        #escena-total { width: 100vw; height: 100vh; background: url('mem1/fondo.jpg') no-repeat center center; background-size: cover; position: relative; }
        #cabecera { background: rgba(108, 91, 123, 0.95); color: white; height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 4px solid #307B8E; position: relative; z-index: 1000; }
        #instruccion-box { background: white; padding: 10px 20px; border-radius: 20px; color: #103A57; display: flex; align-items: center; border: 3px solid #6C5B7B; font-weight: bold; }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }
        #panel-objetos { width: 150px; background: rgba(255,255,255,0.92); border-right: 4px solid #6C5B7B; display: none; flex-direction: column; gap: 12px; padding: 15px; align-items: center; overflow-y: auto; height: calc(100vh - 84px); float: left; z-index: 500; }
        .draggable { width: 75px; height: 75px; object-fit: contain; cursor: grab; }
        #zona-juego { position: relative; height: calc(100vh - 84px); overflow: hidden; }
        .pieza { position: absolute; width: 85px; transform: translate(-50%, -50%); z-index: 20; pointer-events: none; }
        .guia-sombra { position: absolute; width: 90px; height: 90px; border: 3px dashed rgba(108, 91, 123, 0.8); border-radius: 12px; background: rgba(255,255,255,0.3); transform: translate(-50%, -50%); display: none; z-index: 10; }
        #timer-box { background: #E67E22; color: white; padding: 8px 20px; border-radius: 12px; font-size: 1.5rem; font-weight: bold; display: none; }
        #overlay-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.98); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
    </style>
</head>
<body onload="iniciarEntrenamiento()">

<div id="escena-total">
    <div id="cabecera">
        <div id="instruccion-box"><img src="COTERAPEUTA.JPG"><span id="label-guia">Cargando...</span></div>
        <div id="timer-box">00:00</div>
    </div>

    <div id="panel-objetos"></div>
    <div id="zona-juego">
        <div id="guias-layer"></div>
        <div id="objetos-layer"></div>
    </div>
</div>

<div id="overlay-final">
    <h1 style="font-size: 3rem; color: #FFD700;">¡COMPLETADO!</h1>
    <p id="resumen-final" style="font-size: 1.8rem; margin: 20px 0;"></p>
    <button onclick="window.location.reload()" style="padding: 15px 40px; font-size: 1.2rem; border-radius: 10px; background: #366B2B; color: white; border: none; cursor: pointer;">REINTENTAR</button>
</div>

<script>
    let nivelActual = 1;
    let objetosReto = [];
    let colocadasEnNivel = 0;
    let erroresGlobales = 0;
    let aciertosGlobales = 0;

    // MALLA COMPACTA Y CENTRADA (Margen de 30% a 70% para que no sea tan ancha)
    const cuadricula = [
        {x: 35, y: 30}, {x: 45, y: 30}, {x: 55, y: 30}, {x: 65, y: 30},
        {x: 35, y: 50}, {x: 45, y: 50}, {x: 55, y: 50}, {x: 65, y: 50},
        {x: 35, y: 70}, {x: 45, y: 70}, {x: 55, y: 70}, {x: 65, y: 70}
    ];

    const repo = ["billetera", "camisa", "celular", "crema_dental", "frasco_gotas", "gafas", "libro", "pantalon", "pastillero", "reloj", "toalla_manos", "vaso"];

    const niveles = {
        1: { memoriza: 2, distractores: 4, tiempo: 12 },
        2: { memoriza: 4, distractores: 4, tiempo: 18 },
        3: { memoriza: 6, distractores: 6, tiempo: 25 }
    };

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        document.getElementById('label-guia').innerText = t;
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        if(callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function iniciarEntrenamiento() { prepararSesion(); }

    function prepararSesion() {
        const c = niveles[nivelActual];
        const puntos = [...cuadricula].sort(() => Math.random() - 0.5);
        const items = [...repo].sort(() => Math.random() - 0.5).slice(0, c.memoriza);
        
        objetosReto = items.map((id, i) => ({ id: id, x: puntos[i].x, y: puntos[i].y }));
        colocadasEnNivel = 0;
        
        document.getElementById('guias-layer').innerHTML = "";
        document.getElementById('objetos-layer').innerHTML = "";
        document.getElementById('panel-objetos').style.display = 'none';

        hablar(`Juan, memoriza estos ${c.memoriza} objetos.`, () => {
            objetosReto.forEach(obj => {
                const img = document.createElement('img');
                img.src = `mem1/${obj.id}.png`; img.className = 'pieza';
                img.style.left = obj.x + '%'; img.style.top = obj.y + '%';
                document.getElementById('objetos-layer').appendChild(img);
            });
            iniciarReloj(c.tiempo);
        });
    }

    function iniciarReloj(s) {
        const box = document.getElementById('timer-box');
        box.style.display = 'block';
        const t = setInterval(() => {
            s--; box.innerText = `00:${s<10?'0'+s:s}`;
            if(s<=0) { clearInterval(t); box.style.display='none'; faseReconocimiento(); }
        }, 1000);
    }

    function faseReconocimiento() {
        document.getElementById('objetos-layer').innerHTML = "";
        const panel = document.getElementById('panel-objetos');
        panel.style.display = 'flex';
        panel.innerHTML = "";
        
        const c = niveles[nivelActual];
        const puntosUsados = objetosReto.map(o => o.x + '-' + o.y);
        const puntosLibres = cuadricula.filter(p => !puntosUsados.includes(p.x + '-' + p.y))
                                       .sort(() => Math.random() - 0.5);
        
        objetosReto.forEach(obj => crearGuia(obj.x, obj.y));
        puntosLibres.slice(0, c.distractores).forEach(p => crearGuia(p.x, p.y));

        hablar("Ahora Juan, colócalos en sus marcas correspondientes.");

        [...objetosReto].sort(() => Math.random() - 0.5).forEach(obj => {
            const img = document.createElement('img');
            img.src = `mem1/${obj.id}.png`; img.className = 'draggable';
            img.dataset.id = obj.id;
            img.onmousedown = img.ontouchstart = drag;
            panel.appendChild(img);
        });
    }

    function crearGuia(x, y) {
        const g = document.createElement('div');
        g.className = 'guia-sombra'; g.style.display = 'block';
        g.style.left = x + '%'; g.style.top = y + '%';
        document.getElementById('guias-layer').appendChild(g);
    }

    function drag(e) {
        const el = e.target;
        const t = e.type.includes('touch') ? e.touches[0] : e;
        let sx = t.clientX - el.getBoundingClientRect().left;
        let sy = t.clientY - el.getBoundingClientRect().top;
        el.style.position = 'fixed'; el.style.zIndex = 2000;

        function mover(me) {
            const mt = me.type.includes('touch') ? me.touches[0] : me;
            el.style.left = (mt.clientX - sx) + 'px'; el.style.top = (mt.clientY - sy) + 'px';
        }

        function soltar(se) {
            document.removeEventListener('mousemove', mover); document.removeEventListener('mouseup', soltar);
            document.removeEventListener('touchmove', mover); document.removeEventListener('touchend', soltar);
            
            const st = se.type.includes('touch') ? se.changedTouches[0] : se;
            const objInfo = objetosReto.find(o => o.id === el.dataset.id);
            const area = document.getElementById('zona-juego').getBoundingClientRect();
            
            const pctX = ((st.clientX - area.left) / area.width) * 100;
            const pctY = ((st.clientY - area.top) / area.height) * 100;
            
            const dist = Math.sqrt(Math.pow(pctX - objInfo.x, 2) + Math.pow(pctY - objInfo.y, 2));

            if(dist < 7) {
                aciertosGlobales++; colocadasEnNivel++;
                hablar("¡Muy bien!");
                const fija = document.createElement('img');
                fija.src = el.src; fija.className = 'pieza';
                fija.style.left = objInfo.x + '%'; fija.style.top = objInfo.y + '%';
                document.getElementById('objetos-layer').appendChild(fija);
                el.style.visibility = 'hidden';
                if(colocadasEnNivel === objetosReto.length) setTimeout(siguiente, 1200);
            } else {
                erroresGlobales++;
                hablar("Prueba en otra marca.");
                el.style.position = 'static';
            }
        }
        document.addEventListener('mousemove', mover); document.addEventListener('mouseup', soltar);
        document.addEventListener('touchmove', mover, {passive:false}); document.addEventListener('touchend', soltar);
    }

    function siguiente() {
        if(nivelActual < 3) { nivelActual++; prepararSesion(); }
        else {
            document.getElementById('overlay-final').style.display = 'flex';
            const total = aciertosGlobales + erroresGlobales;
            document.getElementById('resumen-final').innerText = `Precisión: ${Math.round((aciertosGlobales/total)*100)}% | Errores: ${erroresGlobales}`;
            hablar("¡Excelente trabajo Juan! Has terminado por hoy.");
        }
    }
</script>
</body>
</html>

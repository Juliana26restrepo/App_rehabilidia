<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 4: Memoria de Trabajo - REHABILIDIA</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #E8F5E9; --gold: #FFD700; --navy: #103A57; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px; font-weight: bold; }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .panel-lista { background: white; padding: 20px; border-radius: 20px; border: 4px dashed var(--p-purple); min-width: 280px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .item-lista { font-size: 1.8rem; font-weight: bold; color: var(--p-purple); margin: 10px 0; display: block; }

        #zona-mercado { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 500px; display: none; }
        .producto { background: white; border: 2px solid var(--navy); padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .producto.selected { background: var(--gold); border-color: var(--p-purple); }

        /* Coterapeuta Simple */
        .area-asistente { width: 100%; background: white; padding: 10px; display: flex; align-items: center; gap: 15px; border-top: 3px solid var(--p-purple); margin-top: auto; }
        .avatar-img { width: 60px; height: 60px; border-radius: 50%; background: var(--p-purple); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; }
        .avatar-img img { width: 100%; height: 100%; object-fit: cover; }
        .burbuja { background: #F5F5F5; padding: 10px; border-radius: 12px; font-size: 0.9rem; flex: 1; text-align: left; border: 1px solid #ddd; }

        #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; background: rgba(16, 58, 87, 0.98); color: white; z-index: 1000; }
        .btn-accion { background: var(--gold); border: none; padding: 15px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 20px; }
    </style>
</head>
<body onload="iniciarSesion()">

<header>SESIÓN 4: LISTA DE MERCADO</header>

<div id="contenedor-juego">
    <h2 id="instruccion-pantalla">MEMORIZA LA LISTA</h2>
    
    <div id="pantalla-memorizar" class="panel-lista">
        <div id="lista-items"></div>
        <button class="btn-accion" onclick="comenzarSeleccion()">¡LISTO!</button>
    </div>

    <div id="zona-mercado"></div>
</div>

<div class="area-asistente">
    <div class="avatar-img">
        <img src="https://raw.githubusercontent.com/Anmameche/Rehabilidia/main/coterapeuta.png" onerror="this.style.display='none'; this.parentElement.innerText='C'">
    </div>
    <div class="burbuja" id="texto-asistente">¡Hola Juan! Vamos a ver qué tal está tu memoria hoy.</div>
</div>

<div id="overlay-final">
    <h1 style="color: var(--gold);">¡SESIÓN COMPLETADA!</h1>
    <p id="stats" style="font-size: 1.3rem;"></p>
    <p style="font-style: italic; margin: 20px; color: #CEE5D6;">"Recordar para actuar te hace más independiente"</p>
    <button class="btn-accion" onclick="window.location.href='funcion_sesiones.html'">VOLVER</button>
</div>

<script>
    const bancoProductos = ["PAN", "LECHE", "HUEVOS", "ARROZ", "CAFÉ", "SAL", "TOMATE", "QUESO", "POLLO", "AGUA", "ACEITE", "PAPAS"];
    let nivel = 1, aciertos = 0, total = 0, listaActual = [], seleccionados = [];

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 0.9;
        window.speechSynthesis.speak(m);
        document.getElementById('texto-asistente').innerText = t;
    }

    function iniciarSesion() {
        hablar("Juan, memoriza estos productos. Luego deberás marcarlos en el orden inverso, del último al primero.");
        generarRonda();
    }

    function generarRonda() {
        document.getElementById('pantalla-memorizar').style.display = 'block';
        document.getElementById('zona-mercado').style.display = 'none';
        document.getElementById('instruccion-pantalla').innerText = "MEMORIZA LA LISTA";
        
        let cant = nivel === 1 ? 3 : (nivel === 2 ? 4 : 5);
        listaActual = [...bancoProductos].sort(() => 0.5 - Math.random()).slice(0, cant);
        
        // Nivel Alto: Instrucción Dual (Lógica extra)
        if(nivel === 3) {
            hablar("Atento Juan: compra estos productos, pero si hay LECHE, elévela primero.");
        }

        const contenedor = document.getElementById('lista-items');
        contenedor.innerHTML = listaActual.map(item => `<span class="item-lista">${item}</span>`).join('');
    }

    function comenzarSeleccion() {
        document.getElementById('pantalla-memorizar').style.display = 'none';
        document.getElementById('zona-mercado').style.display = 'grid';
        document.getElementById('instruccion-pantalla').innerText = "MÁRCALOS EN ORDEN INVERSO";
        hablar("Ahora, selecciona los productos empezando por el último que aparecía en la lista.");
        
        seleccionados = [];
        const mercado = document.getElementById('zona-mercado');
        mercado.innerHTML = "";
        
        // Mostrar todos los productos del banco como opciones
        let opciones = [...bancoProductos].sort(() => 0.5 - Math.random());
        
        opciones.forEach(prod => {
            const div = document.createElement('div');
            div.className = 'producto';
            div.innerText = prod;
            div.onclick = () => validar(prod, div);
            mercado.appendChild(div);
        });
    }

    function validar(prod, el) {
        if(el.classList.contains('selected')) return;
        
        // El orden inverso:
        let objetivoIndex = (listaActual.length - 1) - seleccionados.length;
        let objetivo = listaActual[objetivoIndex];

        if(prod === objetivo) {
            el.classList.add('selected');
            seleccionados.push(prod);
            aciertos++;
            if(seleccionados.length === listaActual.length) {
                proximoNivel();
            }
        } else {
            hablar("Ese no era el siguiente en orden inverso. Intenta recordar.");
            el.style.borderColor = "red";
            setTimeout(() => el.style.borderColor = "var(--navy)", 500);
        }
    }

    function proximoNivel() {
        if(nivel < 3) {
            nivel++;
            hablar("¡Muy bien! Vamos a aumentar la dificultad.");
            setTimeout(generarRonda, 2000);
        } else {
            finalizar();
        }
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        document.getElementById('stats').innerText = `Aciertos: ${aciertos} | Nivel alcanzado: ${nivel}`;
        hablar("Excelente Juan. Recordar para actuar te hace más independiente.");
    }
</script>
</body>
</html>

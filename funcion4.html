<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 4: Memoria de Trabajo - REHABILIDIA</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #E8F5E9; --gold: #FFD700; --navy: #103A57; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px; font-weight: bold; }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .progreso-txt { font-weight: bold; color: var(--p-purple); margin-bottom: 5px; }
        
        .panel-lista { background: white; padding: 20px; border-radius: 20px; border: 4px dashed var(--p-purple); width: 80%; max-width: 350px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .item-lista { font-size: 1.6rem; font-weight: bold; color: var(--p-purple); margin: 10px 0; display: block; text-transform: uppercase; }

        #zona-mercado { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 500px; display: none; padding: 10px; }
        .producto { background: white; border: 2px solid var(--navy); padding: 12px 5px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; display: flex; align-items: center; justify-content: center; min-height: 55px; }
        .producto.selected { background: var(--gold); border-color: var(--p-purple); }

        .area-asistente { width: 100%; background: white; padding: 10px; display: flex; align-items: center; gap: 15px; border-top: 4px solid var(--p-purple); height: 100px; box-sizing: border-box; margin-top: auto; }
        .avatar-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--p-purple); overflow: hidden; flex-shrink: 0; background: #eee; }
        .burbuja { background: #F5F5F5; padding: 10px; border-radius: 12px; font-size: 0.85rem; flex: 1; text-align: left; border: 1px solid #ddd; height: 65px; overflow-y: auto; }

        #overlay-nivel, #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index: 3000; padding: 20px; }
        #overlay-nivel { background: rgba(74, 20, 140, 0.98); color: white; text-align: center; }
        #overlay-final { background: rgba(16, 58, 87, 0.98); color: white; overflow-y: auto; }

        .tabla-stats { width: 100%; max-width: 300px; margin: 20px 0; border-collapse: collapse; background: rgba(255,255,255,0.1); border-radius: 10px; }
        .tabla-stats th, .tabla-stats td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); font-size: 0.9rem; }
        
        .btn-accion { background: var(--gold); border: none; padding: 15px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 1.2rem; margin-top: 10px; color: var(--p-purple); }
    </style>
</head>
<body onload="iniciarSesion()">

<header>SESIÓN 4: MEMORIA DE TRABAJO</header>

<div id="contenedor-juego">
    <div class="progreso-txt" id="info-progreso">Nivel 1 - Ronda 1 de 3</div>
    <h2 id="instruccion-pantalla" style="font-size: 1.1rem;">MEMORIZA LA LISTA</h2>
    
    <div id="pantalla-memorizar" class="panel-lista">
        <div id="lista-items"></div>
        <button class="btn-accion" onclick="comenzarSeleccion()">¡YA ME LO SÉ!</button>
    </div>

    <div id="zona-mercado"></div>
</div>

<div class="area-asistente">
    <div class="avatar-img">
        <img src="COTERAPEUTA.JPG" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='https://raw.githubusercontent.com/Anmameche/Rehabilidia/main/coterapeuta.png';">
    </div>
    <div class="burbuja" id="texto-asistente">¡Hola Juan! Vamos a entrenar la memoria.</div>
</div>

<div id="overlay-nivel">
    <h1 id="lvl-titulo" style="color: var(--gold); font-size: 3rem;">¡NIVEL 2!</h1>
    <p id="lvl-mensaje" style="font-size: 1.5rem;"></p>
</div>

<div id="overlay-final">
    <h1 style="color: var(--gold); margin-bottom: 5px;">¡SESIÓN FINALIZADA!</h1>
    <p style="font-style: italic; color: #CEE5D6; margin-bottom: 10px;">"Recordar para actuar te hace más independiente"</p>
    
    <table class="tabla-stats" id="tabla-resultados">
        <thead>
            <tr style="color: var(--gold);">
                <th>Nivel</th>
                <th>A/E</th>
                <th>%</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla"></tbody>
    </table>

    <button class="btn-accion" onclick="window.location.href='funcion_sesiones.html'">FINALIZAR</button>
</div>

<script>
    const bancoProductos = ["Arroz", "frijoles", "lentejas", "pasta", "harina", "azúcar", "sal", "aceite", "mantequilla", "huevos", "leche", "queso", "yogur", "pan", "café", "chocolate", "atún", "pollo", "carne", "pescado", "jamón", "salchichas", "tomates", "cebolla", "ajo", "zanahoria", "papa", "yuca", "plátano", "banano", "manzana", "pera", "uvas", "naranja", "limón", "piña", "mango", "fresa", "lechuga", "espinaca", "pepino", "pimentón", "brócoli", "coliflor", "maíz", "avena", "cereal", "galletas", "miel", "mermelada", "mayonesa", "mostaza", "salsa de tomate", "vinagre", "caldo", "sopa instantánea", "jugo", "gaseosa", "agua", "té", "cerveza", "vino", "papel higiénico", "servilletas", "toallas de papel", "jabón", "shampoo", "acondicionador", "crema dental", "cepillo de dientes", "desodorante", "detergente", "suavizante", "cloro", "esponjas", "bolsas de basura", "aluminio", "plástico", "fósforos", "velas", "pilas", "encendedor", "azúcar morena", "panela", "coco", "almendras", "nueces", "pasas", "gelatina", "flan", "helado", "tortillas", "arepas", "queso crema", "crema de leche", "salsa soya", "pimienta", "comino", "orégano", "laurel"];

    let nivel = 1, ronda = 1, listaActual = [], seleccionados = [];
    
    // Contadores por nivel
    let stats = {
        1: { aciertos: 0, errores: 0 },
        2: { aciertos: 0, errores: 0 },
        3: { aciertos: 0, errores: 0 }
    };

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 0.95;
        window.speechSynthesis.speak(m);
        document.getElementById('texto-asistente').innerText = t;
    }

    function iniciarSesion() {
        hablar("Juan, memoriza esta lista. Luego deberás marcarlos en orden inverso.");
        generarRonda();
    }

    function generarRonda() {
        document.getElementById('pantalla-memorizar').style.display = 'block';
        document.getElementById('zona-mercado').style.display = 'none';
        document.getElementById('info-progreso').innerText = `Nivel ${nivel} - Ronda ${ronda} de 3`;
        
        let cant = nivel === 1 ? 3 : (nivel === 2 ? 4 : 5);
        listaActual = [...bancoProductos].sort(() => 0.5 - Math.random()).slice(0, cant);
        
        const contenedor = document.getElementById('lista-items');
        contenedor.innerHTML = listaActual.map(item => `<span class="item-lista">${item}</span>`).join('');
    }

    function comenzarSeleccion() {
        document.getElementById('pantalla-memorizar').style.display = 'none';
        document.getElementById('zona-mercado').style.display = 'grid';
        document.getElementById('instruccion-pantalla').innerText = "¿CUÁL ERA EL ÚLTIMO?";
        hablar("Dime los productos desde el final hacia el inicio.");
        
        seleccionados = [];
        const mercado = document.getElementById('zona-mercado');
        mercado.innerHTML = "";
        
        let distractores = bancoProductos.filter(p => !listaActual.includes(p)).sort(() => 0.5 - Math.random()).slice(0, 9 - listaActual.length);
        let opciones = [...listaActual, ...distractores].sort(() => 0.5 - Math.random());
        
        opciones.forEach(prod => {
            const div = document.createElement('div');
            div.className = 'producto';
            div.innerText = prod;
            div.onclick = () => validar(prod, div);
            mercado.appendChild(div);
        });
    }

    function validar(prod, el) {
        if(el.classList.contains('selected')) return;
        let objetivo = listaActual[(listaActual.length - 1) - seleccionados.length];

        if(prod.toLowerCase() === objetivo.toLowerCase()) {
            el.classList.add('selected');
            seleccionados.push(prod);
            stats[nivel].aciertos++;
            if(seleccionados.length === listaActual.length) {
                manejarProgreso();
            } else {
                hablar("Bien. ¿Cuál iba antes?");
            }
        } else {
            stats[nivel].errores++;
            hablar("Ese no sigue el orden.");
            el.style.backgroundColor = "#FFCDD2";
            setTimeout(() => el.style.backgroundColor = "white", 500);
        }
    }

    function manejarProgreso() {
        if (ronda < 3) {
            ronda++;
            hablar("¡Muy bien! Siguiente lista.");
            setTimeout(generarRonda, 1500);
        } else {
            if (nivel < 3) {
                nivel++;
                ronda = 1;
                mostrarCambioNivel();
            } else {
                finalizar();
            }
        }
    }

    function mostrarCambioNivel() {
        const overlay = document.getElementById('overlay-nivel');
        const msj = nivel === 2 ? "¡Nivel Medio! Listas de 4 productos." : "¡Nivel Alto! Listas de 5 productos.";
        document.getElementById('lvl-titulo').innerText = "¡NIVEL " + nivel + "!";
        document.getElementById('lvl-mensaje').innerText = msj;
        overlay.style.display = 'flex';
        hablar(msj);
        setTimeout(() => {
            overlay.style.display = 'none';
            generarRonda();
        }, 3500);
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        const cuerpo = document.getElementById('cuerpo-tabla');
        cuerpo.innerHTML = "";

        for (let i = 1; i <= 3; i++) {
            let s = stats[i];
            let total = s.aciertos + s.errores;
            let perc = total > 0 ? Math.round((s.aciertos / total) * 100) : 0;
            let fila = `<tr>
                <td>Nivel ${i}</td>
                <td>${s.aciertos}/${s.errores}</td>
                <td>${perc}%</td>
            </tr>`;
            cuerpo.innerHTML += fila;
        }
        hablar("¡Terminamos Juan! Mira tus resultados de hoy.");
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sesión 4: Memoria de Trabajo - REHABILIDIA</title>
    <style>
        :root { 
            --p-purple: #4A148C; 
            --bg: #E8F5E9; 
            --gold: #FFD700; 
            --navy: #103A57; 
            --white: #ffffff;
        }

        /* UNIVERSAL ZOOM & RESET */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #121212; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        #viewport-container {
            width: 100vw;
            height: 100vh;
            max-width: 1024px;
            max-height: 768px;
            background: var(--bg);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        header { 
            background: var(--navy); 
            color: white; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            flex-shrink: 0;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
        }

        #contenedor-juego { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; 
            position: relative;
        }

        .progreso-txt { font-weight: bold; color: var(--p-purple); margin-bottom: 5px; font-size: 1rem; }
        
        .panel-lista { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            border: 4px dashed var(--p-purple); 
            width: 90%; 
            max-width: 400px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            animation: fadeIn 0.5s;
        }
        
        .item-lista { 
            font-size: clamp(1.2rem, 5vw, 1.8rem); 
            font-weight: bold; 
            color: var(--p-purple); 
            margin: 8px 0; 
            display: block; 
            text-transform: uppercase; 
        }

        #zona-mercado { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            width: 95%; 
            max-width: 600px; 
            display: none; 
            padding: 10px; 
        }

        .producto { 
            background: white; 
            border: 3px solid var(--navy); 
            padding: 12px 5px; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: clamp(0.7rem, 2.5vw, 0.9rem); 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 60px; 
            box-shadow: 0 4px 0 var(--navy);
            transition: 0.1s;
        }

        .producto:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--navy); }
        .producto.selected { background: var(--gold); border-color: var(--p-purple); pointer-events: none; opacity: 0.6; }

        .area-asistente { 
            width: 100%; 
            background: white; 
            padding: 10px 20px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-top: 4px solid var(--p-purple); 
            height: 110px; 
            flex-shrink: 0;
        }
        
        .avatar-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--p-purple); overflow: hidden; background: #eee; }
        
        .burbuja { 
            background: #F5F5F5; 
            padding: 12px; 
            border-radius: 15px; 
            font-size: 0.9rem; 
            flex: 1; 
            text-align: left; 
            border: 1px solid #ddd; 
            height: 75px; 
            overflow-y: auto; 
            color: var(--navy);
        }

        /* OVERLAYS */
        #overlay-nivel, #overlay-final { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            display:none; flex-direction:column; justify-content:center; 
            align-items:center; z-index: 3000; padding: 20px; 
        }
        #overlay-nivel { background: rgba(74, 20, 140, 0.98); color: white; text-align: center; }
        #overlay-final { background: rgba(16, 58, 87, 0.98); color: white; }

        .cuadro-resultados {
            background: white;
            color: var(--navy);
            padding: 25px;
            border-radius: 25px;
            width: 90%;
            max-width: 450px;
            border: 5px solid var(--gold);
            text-align: center;
        }

        .tabla-stats { width: 100%; margin: 15px 0; border-collapse: collapse; }
        .tabla-stats th { border-bottom: 2px solid var(--p-purple); padding: 8px; color: var(--p-purple); }
        .tabla-stats td { padding: 8px; border-bottom: 1px solid #eee; font-weight: bold; }
        
        .btn-accion { 
            background: var(--gold); 
            border: none; 
            padding: 15px 35px; 
            border-radius: 30px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.2rem; 
            color: var(--p-purple);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="iniciarSesion()">

<div id="viewport-container">
    <header>MÓDULO 3: MEMORIA DE TRABAJO (INVERSA)</header>

    <div id="contenedor-juego">
        <div class="progreso-txt" id="info-progreso">Cargando nivel...</div>
        <h2 id="instruccion-pantalla" style="font-size: 1.2rem; margin: 10px 0;">MEMORIZA LA LISTA</h2>
        
        <div id="pantalla-memorizar" class="panel-lista">
            <div id="lista-items"></div>
            <button class="btn-accion" style="margin-top:20px;" onpointerdown="comenzarSeleccion()">¡LISTO!</button>
        </div>

        <div id="zona-mercado"></div>
    </div>

    <div class="area-asistente">
        <div class="avatar-img">
            <img src="https://raw.githubusercontent.com/Anmameche/Rehabilidia/main/coterapeuta.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div class="burbuja" id="texto-asistente">¡Hola Juan! Vamos a entrenar tu memoria de trabajo.</div>
    </div>

    <div id="overlay-nivel">
        <h1 id="lvl-titulo" style="color: var(--gold); font-size: 3.5rem; margin:0;">¡NIVEL 2!</h1>
        <p id="lvl-mensaje" style="font-size: 1.8rem;"></p>
    </div>

    <div id="overlay-final">
        <div class="cuadro-resultados">
            <h1 style="color: var(--p-purple); margin: 0;">¡SESIÓN COMPLETADA!</h1>
            <p style="margin: 10px 0;">Juan, este es tu resumen de hoy:</p>
            
            <table class="tabla-stats">
                <thead>
                    <tr>
                        <th>Nivel</th>
                        <th>Aciertos</th>
                        <th>Errores</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla"></tbody>
            </table>

            <div id="resumen-global" style="font-weight: bold; font-size: 1.2rem; margin-bottom: 20px;"></div>

            <button class="btn-accion" onpointerdown="guardarYSalir()">FINALIZAR</button>
        </div>
    </div>
</div>

<script>
    const bancoProductos = ["Arroz", "Frijoles", "Lentejas", "Pasta", "Harina", "Azúcar", "Sal", "Aceite", "Mantequilla", "Huevos", "Leche", "Queso", "Yogur", "Pan", "Café", "Chocolate", "Atún", "Pollo", "Carne", "Pescado", "Tomates", "Cebolla", "Ajo", "Zanahoria", "Papa", "Yuca", "Plátano", "Banano", "Manzana", "Pera", "Limón", "Piña", "Mango", "Fresa", "Lechuga", "Espinaca", "Pepino", "Maíz", "Avena", "Cereal", "Galletas", "Miel", "Mermelada", "Jugo", "Agua", "Té"];

    let nivel = 1, ronda = 1, listaActual = [], seleccionados = [];
    let aciertosTotales = 0, erroresTotales = 0;
    
    // Métricas por nivel para el cuadro visual
    let statsNivel = {
        1: { aciertos: 0, errores: 0 },
        2: { aciertos: 0, errores: 0 },
        3: { aciertos: 0, errores: 0 }
    };

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); 
        m.lang = 'es-ES'; 
        m.rate = 0.9;
        window.speechSynthesis.speak(m);
        document.getElementById('texto-asistente').innerText = t;
    }

    function iniciarSesion() {
        hablar("Juan, memoriza esta lista. Luego deberás seleccionarlos en orden inverso, del último al primero.");
        generarRonda();
    }

    function generarRonda() {
        document.getElementById('pantalla-memorizar').style.display = 'block';
        document.getElementById('zona-mercado').style.display = 'none';
        document.getElementById('instruccion-pantalla').innerText = "MEMORIZA LA LISTA";
        document.getElementById('info-progreso').innerText = `Nivel ${nivel} - Ronda ${ronda} de 3`;
        
        let cant = nivel === 1 ? 3 : (nivel === 2 ? 4 : 5);
        listaActual = [...bancoProductos].sort(() => 0.5 - Math.random()).slice(0, cant);
        
        const contenedor = document.getElementById('lista-items');
        contenedor.innerHTML = listaActual.map(item => `<span class="item-lista">${item}</span>`).join('');
    }

    function comenzarSeleccion() {
        document.getElementById('pantalla-memorizar').style.display = 'none';
        document.getElementById('zona-mercado').style.display = 'grid';
        document.getElementById('instruccion-pantalla').innerText = "¿CUÁL ERA EL ÚLTIMO?";
        hablar("Dime los productos desde el final hacia el inicio.");
        
        seleccionados = [];
        const mercado = document.getElementById('zona-mercado');
        mercado.innerHTML = "";
        
        let distractores = bancoProductos.filter(p => !listaActual.includes(p)).sort(() => 0.5 - Math.random()).slice(0, 9 - listaActual.length);
        let opciones = [...listaActual, ...distractores].sort(() => 0.5 - Math.random());
        
        opciones.forEach(prod => {
            const div = document.createElement('div');
            div.className = 'producto';
            div.innerText = prod;
            div.onpointerdown = (e) => {
                e.preventDefault();
                validar(prod, div);
            };
            mercado.appendChild(div);
        });
    }

    function validar(prod, el) {
        if(el.classList.contains('selected')) return;
        let indiceObjetivo = (listaActual.length - 1) - seleccionados.length;
        let objetivo = listaActual[indiceObjetivo];

        if(prod.toLowerCase() === objetivo.toLowerCase()) {
            el.classList.add('selected');
            seleccionados.push(prod);
            aciertosTotales++;
            statsNivel[nivel].aciertos++;
            
            if(seleccionados.length === listaActual.length) {
                manejarProgreso();
            } else {
                hablar("Correcto. ¿Cuál iba antes?");
            }
        } else {
            erroresTotales++;
            statsNivel[nivel].errores++;
            hablar("Ese no sigue el orden inverso, Juan. Intenta recordar el anterior.");
            el.style.backgroundColor = "#FFCDD2";
            setTimeout(() => { if(!el.classList.contains('selected')) el.style.backgroundColor = "white"; }, 500);
        }
    }

    function manejarProgreso() {
        if (ronda < 3) {
            ronda++;
            hablar("¡Excelente memoria! Vamos con la siguiente lista.");
            setTimeout(generarRonda, 1500);
        } else {
            if (nivel < 3) {
                nivel++;
                ronda = 1;
                mostrarCambioNivel();
            } else {
                finalizar();
            }
        }
    }

    function mostrarCambioNivel() {
        const overlay = document.getElementById('overlay-nivel');
        const msj = nivel === 2 ? "Listas de 4 productos." : "¡Nivel Máximo! 5 productos para recordar.";
        document.getElementById('lvl-titulo').innerText = "¡NIVEL " + nivel + "!";
        document.getElementById('lvl-mensaje').innerText = msj;
        overlay.style.display = 'flex';
        hablar(msj);
        setTimeout(() => {
            overlay.style.display = 'none';
            generarRonda();
        }, 3500);
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        const cuerpo = document.getElementById('cuerpo-tabla');
        cuerpo.innerHTML = "";

        let totalRetos = 0;
        for (let i = 1; i <= 3; i++) {
            totalRetos += (i === 1 ? 3*3 : i === 2 ? 4*3 : 5*3); // Total de items a recordar
            cuerpo.innerHTML += `<tr>
                <td>Nivel ${i}</td>
                <td>${statsNivel[i].aciertos}</td>
                <td>${statsNivel[i].errores}</td>
            </tr>`;
        }

        const eficacia = Math.round((aciertosTotales / (aciertosTotales + erroresTotales)) * 100);
        document.getElementById('resumen-global').innerText = `Eficacia Total: ${eficacia}%`;
        
        hablar("¡Muy bien Juan! Has terminado tu entrenamiento de memoria de trabajo.");
    }

    function guardarYSalir() {
        const eficacia = Math.round((aciertosTotales / (aciertosTotales + erroresTotales)) * 100);
        const dataLog = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Funciones Ejecutivas",
            id_sesion: 4,
            aciertos: aciertosTotales,
            errores: erroresTotales,
            eficacia: eficacia + "%"
        };

        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(dataLog));
        window.location.href = 'funcion_sesiones.html';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Planificación - REHABILIDIA</title>
    <style>
        :root { 
            --p-purple: #4A148C; 
            --s-purple: #AB47BC; 
            --bg: #CEE5D6; 
            --gold: #FFD700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; background: #1a1a1a; 
            text-align: center; color: var(--p-purple); height: 100vh; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
        }

        #viewport-container {
            width: 100vw; height: 100vh;
            max-width: 1200px; max-height: 800px;
            background: var(--bg);
            position: relative; display: flex; flex-direction: column;
            overflow: hidden;
        }

        header { 
            background: #103A57; height: 8%; display: flex; 
            align-items: center; justify-content: center; color: white; flex-shrink: 0; 
        }
        
        #contenedor-principal { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; padding: 10px; overflow-y: auto;
            padding-bottom: 110px; /* Espacio para que el botón no tape nada */
        }

        .instruccion-reto { 
            font-size: 1.1rem; font-weight: bold; margin: 10px 0; 
            color: white; background: var(--p-purple); padding: 12px; 
            border-radius: 15px; width: 95%; 
        }
        
        #area-opciones { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 8px; margin-bottom: 15px; width: 100%;
        }

        .tarjeta { 
            width: 110px; padding: 10px; 
            background: white; border: 3px solid var(--s-purple); 
            border-radius: 15px; cursor: pointer; display: flex; 
            flex-direction: column; align-items: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s;
        }
        .tarjeta .emoji { font-size: 1.8rem; }
        .tarjeta .texto { font-size: 0.75rem; font-weight: bold; margin-top: 5px; }
        .tarjeta.seleccionada { opacity: 0.3; pointer-events: none; }
        .tarjeta.error-distractor { animation: shake 0.4s; border-color: #f44336; }
        
        #area-secuencia { 
            display: flex; flex-direction: column; align-items: center; 
            gap: 5px; padding: 10px; background: rgba(255,255,255,0.7); 
            border: 3px dashed var(--s-purple); border-radius: 20px; 
            width: 95%; min-height: 80px;
        }

        .item-ordenado { 
            width: 100%; display: flex; align-items: center; 
            background: white; padding: 10px; border-radius: 10px; 
            border: 2px solid var(--p-purple); animation: slideIn 0.3s;
        }

        .num-orden { 
            background: var(--p-purple); color: white; width: 24px; height: 24px; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; margin-right: 10px; font-weight: bold; font-size: 0.8rem;
        }

        /* BOTÓN FIXED: Siempre visible sobre el contenido */
        #btn-verificar { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; padding: 18px; font-size: 1.4rem; 
            background: #2E7D32; color: white; border: none; border-radius: 50px; 
            cursor: pointer; display: none; font-weight: bold; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.3); z-index: 100;
        }

        #pantalla-transicion, #overlay-final { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            display:none; flex-direction:column; justify-content:center; 
            align-items:center; z-index:1000; padding: 20px; background: var(--p-purple); color: white;
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body onload="iniciarEjercicio()">

<div id="viewport-container">
    <header><span style="font-weight:bold;">PLANIFICACIÓN: PASO A PASO</span></header>

    <div id="contenedor-principal">
        <div id="reto-texto" class="instruccion-reto">Cargando...</div>
        <div id="area-opciones"></div>
        <div id="area-secuencia"></div>
    </div>

    <button id="btn-verificar" onpointerdown="verificarSecuencia()">COMPROBAR ORDEN</button>

    <div id="pantalla-transicion">
        <h1 id="tit-nivel" style="background:var(--gold); color:var(--p-purple); padding:10px 30px; border-radius:30px;"></h1>
        <p id="desc-nivel" style="font-size:1.5rem;"></p>
    </div>

    <div id="overlay-final">
        <div style="background:white; color:var(--p-purple); padding:30px; border-radius:25px; width:90%;">
            <h1>¡SESIÓN TERMINADA!</h1>
            <div id="stats-visual" style="font-size:1.2rem; margin:20px 0;"></div>
            <button onpointerdown="location.reload()" style="padding:15px 30px; background:var(--p-purple); color:white; border-radius:50px; border:none; font-weight:bold;">REPETIR</button>
        </div>
    </div>
</div>

<script>
    let totalAciertos = 0, totalErrores = 0, nivelActual = 1, intentoEnNivel = 1;
    let secuenciaUsuario = [], retoActual = null, retosVistos = [];

    const banco = {
        1: [
            { t: "Beber agua", pasos: [{e:"🥛", p:"Coger vaso"}, {e:"🚰", p:"Llenar agua"}, {e:"😋", p:"Beber"}], dist: [] }
        ],
        2: [
            { 
                t: "Sacar al Perro", 
                pasos: [
                    {e:"📢", p:"Llamar al perro"}, 
                    {e:"🐕", p:"Poner collar"}, 
                    {e:"🦮", p:"Poner correa"}, 
                    {e:"🛍️", p:"Coger bolsas de desechos"}, 
                    {e:"🚪", p:"Abrir puerta"}, 
                    {e:"🌳", p:"Ir al parque"}, 
                    {e:"🏠", p:"Regresar"}
                ], 
                dist: [{e:"🍳", p:"Hacer huevo"}] 
            }
        ],
        3: [
            { t: "Enviar Carta", pasos: [{e:"📝", p:"Escribir nota"}, {e:"✉️", p:"Meter en sobre"}, {e:"✍️", p:"Poner dirección"}, {e:"📮", p:"Pegar sello"}, {e:"🚶", p:"Ir al correo"}, {e:"📬", p:"Depositar"}], dist: [{e:"🍕", p:"Pedir pizza"}] }
        ]
    };

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 0.9;
        window.speechSynthesis.speak(m);
    }

    function iniciarEjercicio() {
        secuenciaUsuario = [];
        document.getElementById('area-secuencia').innerHTML = "";
        document.getElementById('btn-verificar').style.display = "none";

        retoActual = banco[nivelActual][0]; // Simplificado para este ejemplo
        
        const textoNivel = nivelActual === 1 ? "BAJO" : (nivelActual === 2 ? "MEDIO" : "ALTO");
        document.getElementById('tit-nivel').innerText = `NIVEL ${textoNivel}`;
        document.getElementById('desc-nivel').innerText = `Tarea: ${retoActual.t}`;
        document.getElementById('pantalla-transicion').style.display = 'flex';

        hablar(`Juan, vamos a planificar como ${retoActual.t}`);
        setTimeout(() => { 
            document.getElementById('pantalla-transicion').style.display = 'none'; 
            dibujarTarjetas(); 
        }, 3000);
    }

    function dibujarTarjetas() {
        document.getElementById('reto-texto').innerText = "Actividad: " + retoActual.t;
        const area = document.getElementById('area-opciones');
        area.innerHTML = "";
        let todas = [...retoActual.pasos, ...retoActual.dist].sort(() => Math.random() - 0.5);
        
        todas.forEach(obj => {
            const div = document.createElement('div');
            div.className = 'tarjeta';
            div.innerHTML = `<span class="emoji">${obj.e}</span><span class="texto">${obj.p}</span>`;
            div.onpointerdown = (e) => {
                if(retoActual.dist.some(d => d.p === obj.p)) {
                    totalErrores++;
                    div.classList.add('error-distractor');
                    hablar("Eso no pertenece a esta tarea.");
                    setTimeout(() => div.classList.remove('error-distractor'), 500);
                    return;
                }
                div.classList.add('seleccionada');
                secuenciaUsuario.push(obj.p);
                actualizarUI(obj);
            };
            area.appendChild(div);
        });
    }

    function actualizarUI(obj) {
        const item = document.createElement('div');
        item.className = 'item-ordenado';
        item.innerHTML = `<div class="num-orden">${secuenciaUsuario.length}</div> <strong>${obj.e} ${obj.p}</strong>`;
        document.getElementById('area-secuencia').appendChild(item);
        
        if(secuenciaUsuario.length === retoActual.pasos.length) {
            document.getElementById('btn-verificar').style.display = "block";
        }
    }

    function verificarSecuencia() {
        let correcto = true;
        for(let i=0; i<secuenciaUsuario.length; i++) {
            if(secuenciaUsuario[i] !== retoActual.pasos[i].p) { correcto = false; break; }
        }

        if(correcto) {
            totalAciertos++;
            hablar("¡Excelente orden!");
            setTimeout(() => {
                if(nivelActual < 3) { nivelActual++; iniciarEjercicio(); }
                else { finalizarSesion(); }
            }, 1500);
        } else {
            totalErrores++;
            hablar("El orden no es correcto. Intenta de nuevo.");
            setTimeout(() => {
                secuenciaUsuario = [];
                document.getElementById('area-secuencia').innerHTML = "";
                document.getElementById('btn-verificar').style.display = "none";
                document.querySelectorAll('.tarjeta').forEach(t => t.classList.remove('seleccionada'));
            }, 1500);
        }
    }

    function finalizarSesion() {
        document.getElementById('stats-visual').innerHTML = `Aciertos: ${totalAciertos}<br>Errores: ${totalErrores}`;
        document.getElementById('overlay-final').style.display = "flex";
        hablar("¡Muy buen trabajo Juan!");
    }
</script>
</body>
</html>

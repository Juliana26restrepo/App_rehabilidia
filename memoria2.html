<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memoria 2 - Juan: Desempeño Detallado</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; text-align: center; height: 100vh; }
        
        /* Fondo de la habitación */
        #escena-total { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('mem1/fondo.jpg') no-repeat center center; 
            background-size: cover; z-index: -1; 
        }

        /* Cabecera Estilo Juan */
        #cabecera { background: rgba(54, 107, 43, 0.95); color: white; height: 80px; display: flex; align-items: center; padding: 0 20px; border-bottom: 4px solid #28521f; }
        #instruccion-box { background: white; padding: 10px 20px; border-radius: 20px; color: #103A57; display: flex; align-items: center; border: 3px solid #6C5B7B; font-weight: bold; }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }

        #contenedor-principal { height: calc(100vh - 84px); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; }

        /* Fase 1: Lista Visual Acumulativa */
        #lista-visual { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 80%; }
        .palabra-item { background: rgba(255, 255, 255, 0.95); padding: 15px 30px; border-radius: 15px; border: 4px solid #366B2B; font-size: 2.2rem; font-weight: bold; color: #333; box-shadow: 0 6px 15px rgba(0,0,0,0.3); animation: aparecer 0.5s ease-out; }
        
        /* Fase 2: Reconocimiento */
        #zona-reconocimiento { display: none; width: 100%; }
        .botones-par { display: flex; justify-content: center; gap: 40px; margin-top: 30px; }
        .btn-opcion { padding: 35px 60px; font-size: 2.8rem; cursor: pointer; border-radius: 25px; border: 6px solid #103A57; background: white; font-weight: bold; min-width: 300px; box-shadow: 0 12px 24px rgba(0,0,0,0.3); transition: 0.2s; color: #333; }
        .btn-opcion:active { transform: scale(0.9); }

        #timer-box { font-size: 2.2rem; color: #E67E22; font-weight: bold; margin-top: 40px; background: white; padding: 10px 40px; border-radius: 50px; display: none; border: 4px solid #E67E22; }

        /* Pantalla Final con Resultados por Nivel */
        #overlay-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.98); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .tabla-resultados { margin: 25px 0; font-size: 1.8rem; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.3); }
        .linea-resumen { margin: 10px 0; display: flex; justify-content: space-between; width: 350px; }

        @keyframes aparecer { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="iniciarNivel()">

<div id="escena-total"></div>

<div id="cabecera">
    <div id="instruccion-box">
        <img src="COTERAPEUTA.JPG">
        <span id="label-guia">Juan, memoriza esta lista.</span>
    </div>
</div>

<div id="contenedor-principal">
    <div id="fase-codificacion">
        <div id="lista-visual"></div>
        <div id="timer-box">Memoriza: <span id="segundos">15</span>s</div>
    </div>

    <div id="zona-reconocimiento">
        <h2 style="font-size: 2.5rem; color: #103A57; background: rgba(255,255,255,0.8); display: inline-block; padding: 10px 30px; border-radius: 15px; margin-bottom: 20px;">¿Cuál estaba en la lista?</h2>
        <div class="botones-par">
            <button class="btn-opcion" id="btn-a" onclick="verificar(this.innerText)"></button>
            <button class="btn-opcion" id="btn-b" onclick="verificar(this.innerText)"></button>
        </div>
    </div>
</div>

<div id="overlay-final">
    <h1 style="font-size: 3.5rem; color: #FFD700;">¡MUY BIEN HECHO!</h1>
    
    <div class="tabla-resultados" id="detalle-niveles">
        </div>

    <p style="font-style: italic; font-size: 1.5rem; margin-top: 10px;">"Cada palabra que recuerdas es un gran avance"</p>
    <button onclick="location.reload()" style="padding: 15px 40px; font-size: 1.5rem; background: #366B2B; color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 25px;">REINTENTAR</button>
</div>

<script>
    const mercado = ["Arroz", "Pasta", "Lentejas", "Frijoles", "Aceite", "Sal", "Azúcar", "Café", "Leche", "Huevos", "Pan", "Queso", "Pollo", "Carne", "Atún", "Tomate", "Cebolla", "Ajo", "Papa", "Zanahoria", "Lechuga", "Manzana", "Banano", "Naranja", "Limón", "Yogur", "Mantequilla", "Harina", "Galletas", "Chocolate"];
    const distNeutros = ["Silencio", "Tormenta", "Espejo", "Camino", "Nube", "Arena", "Bosque", "Puerta", "Sombra", "Fuego", "Río", "Estrella", "Viento", "Libro", "Cielo", "Piedra", "Puente", "Luz", "Jardín", "Mariposa", "Tren", "Isla", "Luna", "Globo", "Torre", "Laberinto", "Horizonte"];
    const distFoneticos = ["Aro", "Raza", "Lente", "Flecos", "Aseito", "Sol", "Azafrán", "Cafeto", "Lecho", "Huesos", "Pana", "Caso", "Poyo", "Marte", "Atajo", "Tomar", "Sebolla", "Agro", "Mapa", "Santana", "Lechuza", "Montana", "Verano", "Noriega", "Limbo", "Yugo", "Mantilla", "Montaña", "Reloj", "Ventana"];

    let nivelActual = 1;
    let palabrasReto = [];
    let indicePregunta = 0;
    
    // Almacén de aciertos por nivel
    let aciertosPorNivel = { 1: 0, 2: 0, 3: 0 };
    const metasPorNivel = { 1: 6, 2: 10, 3: 15 };

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        msg.rate = 0.85;
        if(callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function iniciarNivel() {
        const cantidad = metasPorNivel[nivelActual];
        palabrasReto = [...mercado].sort(() => 0.5 - Math.random()).slice(0, cantidad);
        
        document.getElementById('lista-visual').innerHTML = "";
        document.getElementById('fase-codificacion').style.display = 'block';
        document.getElementById('zona-reconocimiento').style.display = 'none';
        document.getElementById('timer-box').style.display = 'none';
        document.getElementById('label-guia').innerText = "Memoriza la lista, Juan";

        hablar(`Juan, memoriza estas ${cantidad} palabras.`, () => {
            mostrarPalabrasAcumuladas(0);
        });
    }

    function mostrarPalabrasAcumuladas(idx) {
        if (idx < palabrasReto.length) {
            const div = document.createElement('div');
            div.className = 'palabra-item';
            div.innerText = palabrasReto[idx];
            document.getElementById('lista-visual').appendChild(div);
            hablar(palabrasReto[idx], () => {
                setTimeout(() => mostrarPalabrasAcumuladas(idx + 1), 700);
            });
        } else {
            const box = document.getElementById('timer-box');
            box.style.display = 'inline-block';
            let segundos = 15;
            const countdown = setInterval(() => {
                segundos--;
                document.getElementById('segundos').innerText = segundos;
                if (segundos <= 0) {
                    clearInterval(countdown);
                    faseReconocimiento();
                }
            }, 1000);
        }
    }

    function faseReconocimiento() {
        document.getElementById('fase-codificacion').style.display = 'none';
        document.getElementById('zona-reconocimiento').style.display = 'block';
        document.getElementById('label-guia').innerText = "Fase 2: ¿Cuáles recuerdas?";
        indicePregunta = 0;
        presentarPregunta();
    }

    function presentarPregunta() {
        if (indicePregunta < palabrasReto.length) {
            const correcta = palabrasReto[indicePregunta];
            let dist;
            if (nivelActual === 1) dist = distNeutros[Math.floor(Math.random()*distNeutros.length)];
            else if (nivelActual === 3) dist = distFoneticos[mercado.indexOf(correcta)] || distNeutros[0];
            else dist = Math.random() > 0.5 ? distNeutros[Math.floor(Math.random()*distNeutros.length)] : distFoneticos[mercado.indexOf(correcta)] || distNeutros[0];

            const opciones = [correcta, dist].sort(() => 0.5 - Math.random());
            document.getElementById('btn-a').innerText = opciones[0];
            document.getElementById('btn-b').innerText = opciones[1];
            hablar(`¿Cuál estaba en la lista, ${opciones[0]} o ${opciones[1]}?`);
        } else {
            if (nivelActual < 3) {
                nivelActual++;
                hablar(`Nivel completado. Vamos al siguiente.`, iniciarNivel);
            } else {
                finalizarTodo();
            }
        }
    }

    function verificar(elegida) {
        if (elegida === palabrasReto[indicePregunta]) {
            aciertosPorNivel[nivelActual]++;
            hablar("¡Muy bien!");
        } else {
            hablar("Esa no estaba.");
        }
        indicePregunta++;
        setTimeout(presentarPregunta, 1300);
    }

    function finalizarTodo() {
        document.getElementById('zona-reconocimiento').style.display = 'none';
        const contenedorResultados = document.getElementById('detalle-niveles');
        
        // Crear resumen visual desglosado
        contenedorResultados.innerHTML = `
            <div class="linea-resumen"><span>Nivel Bajo:</span> <b>${aciertosPorNivel[1]} / 6</b></div>
            <div class="linea-resumen"><span>Nivel Medio:</span> <b>${aciertosPorNivel[2]} / 10</b></div>
            <div class="linea-resumen"><span>Nivel Alto:</span> <b>${aciertosPorNivel[3]} / 15</b></div>
            <hr style="border: 0; border-top: 1px solid white; margin: 15px 0;">
            <div class="linea-resumen" style="color: #FFD700;"><span>Total Aciertos:</span> <b>${aciertosPorNivel[1]+aciertosPorNivel[2]+aciertosPorNivel[3]} / 31</b></div>
        `;

        document.getElementById('overlay-final').style.display = 'flex';
        hablar("¡Excelente Juan! Has terminado todo el entrenamiento del mercado. Mira tus resultados.");
    }
</script>
</body>
</html>

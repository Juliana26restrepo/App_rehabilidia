<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memoria 2 - Juan: Reconocimiento Auditivo-Visual</title>
    <style>
        :root { --primary: #366B2B; --secondary: #103A57; --accent: #E67E22; --gold: #FFD700; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; background: #2c3e50; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; }
        #main-app { width: 100%; height: 100%; background: #fdfcf0; position: relative; display: flex; flex-direction: column; }
        #cabecera { background: rgba(54, 107, 43, 0.95); color: white; height: 12vh; display: flex; align-items: center; padding: 0 20px; border-bottom: 4px solid #28521f; flex-shrink: 0; box-sizing: border-box; }
        #instruccion-box { background: white; padding: 8px 20px; border-radius: 40px; color: #103A57; display: flex; align-items: center; border: 3px solid var(--secondary); font-weight: bold; font-size: clamp(0.9rem, 2vw, 1.3rem); }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }
        #contenedor-principal { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2vh; overflow: hidden; }
        #lista-visual { display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 12px; width: 95%; max-height: 65vh; overflow-y: auto; padding: 10px; }
        .palabra-item { background: white; padding: 12px 20px; border-radius: 15px; border: 3px solid var(--primary); font-size: clamp(1.1rem, 3.5vw, 1.8rem); font-weight: bold; color: #333; box-shadow: 0 4px 8px rgba(0,0,0,0.15); animation: aparecer 0.4s ease-out; }
        #zona-reconocimiento { display: none; width: 100%; text-align: center; }
        .botones-par { display: flex; justify-content: center; gap: 4vw; margin-top: 30px; }
        .btn-opcion { padding: 30px 40px; font-size: clamp(1.4rem, 4vw, 2.2rem); cursor: pointer; border-radius: 25px; border: 5px solid var(--secondary); background: white; font-weight: bold; min-width: 280px; box-shadow: 0 8px 0px #0a2639; transition: 0.1s; color: #333; touch-action: manipulation; }
        .btn-opcion:active { transform: translateY(4px); box-shadow: 0 4px 0px #0a2639; }
        #timer-box { font-size: 1.8rem; color: var(--accent); font-weight: bold; margin-top: 20px; background: white; padding: 8px 30px; border-radius: 50px; display: none; border: 3px solid var(--accent); }
        #overlay-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.98); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .card-resultados { background: white; color: var(--secondary); padding: 35px; border-radius: 30px; border: 8px solid var(--gold); width: 90%; max-width: 450px; text-align: center; }
        @keyframes aparecer { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="iniciarNivel()">

<div id="main-app">
    <div id="cabecera">
        <div id="instruccion-box"><img src="COTERAPEUTA.JPG"><span id="label-guia">Juan, memoriza esta lista.</span></div>
        <div style="color:white; font-weight:bold; margin-left: auto;">Nivel: <span id="num-nivel">1</span></div>
    </div>

    <div id="contenedor-principal">
        <div id="fase-codificacion">
            <div id="lista-visual"></div>
            <center><div id="timer-box">Memoriza en: <span id="segundos">15</span>s</div></center>
        </div>

        <div id="zona-reconocimiento">
            <div style="background: white; padding: 15px 40px; border-radius: 20px; border: 3px solid var(--secondary); margin-bottom: 20px; display: inline-block;">
                <h2 style="font-size: 1.8rem; color: var(--secondary); margin: 0;">¿Cuál estaba en la lista?</h2>
            </div>
            <div class="botones-par">
                <button class="btn-opcion" id="btn-a" onpointerdown="verificar(this.innerText, this)"></button>
                <button class="btn-opcion" id="btn-b" onpointerdown="verificar(this.innerText, this)"></button>
            </div>
        </div>
    </div>
</div>

<div id="overlay-final">
    <div class="card-resultados">
        <h1>¡SESIÓN COMPLETADA!</h1>
        <div id="detalle-niveles" style="text-align: left; font-size: 1.3rem;"></div>
        <button onpointerdown="finalizarYSalir()" style="padding: 18px 50px; width:100%; font-size: 1.5rem; background: var(--accent); color: white; border: none; border-radius: 50px; cursor: pointer; margin-top: 25px; font-weight: bold;">FINALIZAR</button>
    </div>
</div>

<script>
    const mercado = ["Arroz", "Pasta", "Lentejas", "Frijoles", "Aceite", "Sal", "Azúcar", "Café", "Leche", "Huevos", "Pan", "Queso", "Pollo", "Carne", "Atún", "Tomate", "Cebolla", "Ajo", "Papa", "Zanahoria", "Lechuga", "Manzana", "Banano", "Naranja", "Limón", "Yogur", "Mantequilla", "Harina", "Galletas", "Chocolate"];
    const distNeutros = ["Silencio", "Tormenta", "Espejo", "Camino", "Nube", "Arena", "Bosque", "Puerta", "Sombra", "Fuego", "Río", "Estrella", "Viento", "Libro", "Cielo", "Piedra", "Puente", "Luz", "Jardín", "Mariposa", "Tren", "Isla", "Luna", "Globo", "Torre", "Laberinto", "Horizonte"];
    const distFoneticos = ["Aro", "Raza", "Lente", "Flecos", "Aseito", "Sol", "Azafrán", "Cafeto", "Lecho", "Huesos", "Pana", "Caso", "Poyo", "Marte", "Atajo", "Tomar", "Sebolla", "Agro", "Mapa", "Santana", "Lechuza", "Montana", "Verano", "Noriega", "Limbo", "Yugo", "Mantilla", "Montaña", "Reloj", "Ventana"];

    let nivelActual = 1, palabrasReto = [], indicePregunta = 0, totalAciertos = 0, totalErrores = 0;
    let aciertosPorNivel = { 1: 0, 2: 0, 3: 0 };
    const metasPorNivel = { 1: 6, 2: 8, 3: 10 };

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        msg.rate = 0.85;
        if(callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function iniciarNivel() {
        document.getElementById('num-nivel').innerText = nivelActual;
        palabrasReto = [...mercado].sort(() => 0.5 - Math.random()).slice(0, metasPorNivel[nivelActual]);
        document.getElementById('lista-visual').innerHTML = "";
        document.getElementById('fase-codificacion').style.display = 'block';
        document.getElementById('zona-reconocimiento').style.display = 'none';
        document.getElementById('timer-box').style.display = 'none';
        
        hablar(`Juan, memoriza esta lista.`, () => mostrarPalabrasAcumuladas(0));
    }

    function mostrarPalabrasAcumuladas(idx) {
        if (idx < palabrasReto.length) {
            const div = document.createElement('div');
            div.className = 'palabra-item';
            div.innerText = palabrasReto[idx];
            document.getElementById('lista-visual').appendChild(div);
            hablar(palabrasReto[idx], () => setTimeout(() => mostrarPalabrasAcumuladas(idx + 1), 400));
        } else {
            document.getElementById('timer-box').style.display = 'inline-block';
            let seg = 15;
            const timer = setInterval(() => {
                seg--; document.getElementById('segundos').innerText = seg;
                if(seg <= 0) { clearInterval(timer); faseReconocimiento(); }
            }, 1000);
        }
    }

    function faseReconocimiento() {
        document.getElementById('fase-codificacion').style.display = 'none';
        document.getElementById('zona-reconocimiento').style.display = 'block';
        indicePregunta = 0;
        presentarPregunta();
    }

    function presentarPregunta() {
        if (indicePregunta < palabrasReto.length) {
            const correcta = palabrasReto[indicePregunta];
            let dist;
            if (nivelActual === 1) dist = distNeutros[Math.floor(Math.random()*distNeutros.length)];
            else {
                let fon = distFoneticos[mercado.indexOf(correcta)];
                dist = fon ? fon : distNeutros[Math.floor(Math.random()*distNeutros.length)];
            }
            const opciones = [correcta, dist].sort(() => 0.5 - Math.random());
            document.getElementById('btn-a').innerText = opciones[0];
            document.getElementById('btn-b').innerText = opciones[1];
            document.getElementById('btn-a').style.background = "white";
            document.getElementById('btn-b').style.background = "white";
            hablar(`¿Cuál estaba en la lista? ¿${opciones[0]} o ${opciones[1]}?`);
        } else {
            if (nivelActual < 3) { nivelActual++; iniciarNivel(); }
            else finalizarTodo();
        }
    }

    function verificar(elegida, btn) {
        if (elegida === palabrasReto[indicePregunta]) {
            aciertosPorNivel[nivelActual]++; totalAciertos++;
            btn.style.background = "#d4edda";
        } else {
            totalErrores++; btn.style.background = "#f8d7da";
        }
        indicePregunta++;
        setTimeout(presentarPregunta, 1200);
    }

    function finalizarTodo() {
        const total = metasPorNivel[1] + metasPorNivel[2] + metasPorNivel[3];
        const ef = Math.round((totalAciertos / total) * 100);
        document.getElementById('zona-reconocimiento').style.display = 'none';
        document.getElementById('detalle-niveles').innerHTML = `
            Nivel 1: ${aciertosPorNivel[1]} aciertos<br>
            Nivel 2: ${aciertosPorNivel[2]} aciertos<br>
            Nivel 3: ${aciertosPorNivel[3]} aciertos<br><br>
            <strong>Eficacia Total: ${ef}%</strong>`;
        document.getElementById('overlay-final').style.display = 'flex';
        hablar("¡Muy bien Juan! Has terminado el ejercicio de memoria.");
    }

    // CORRECCIÓN: FUNCIÓN DE GUARDADO Y SALIDA
    function finalizarYSalir() {
        const total = metasPorNivel[1] + metasPorNivel[2] + metasPorNivel[3];
        const ef = Math.round((totalAciertos / total) * 100) || 0;
        
        const datosSesion = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Memoria", 
            id_sesion: 2,       
            aciertos: totalAciertos,
            errores: totalErrores,
            eficacia: ef + "%"
        };

        let historial = JSON.parse(localStorage.getItem('sesiones_rehabilitidia')) || []; 
        historial.push(datosSesion); 
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(historial)); 

        // REDIRECCIÓN CORREGIDA
        window.location.href = "memoria_sesiones.html";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atención 4 - Mesa Horizontal Forzada</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; background: #000; 
            overflow: hidden; touch-action: none;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        #game-container {
            position: relative;
            /* FORZAMOS LA ORIENTACIÓN AQUÍ */
            width: 100vh; /* El ancho del juego será el alto de la pantalla */
            height: 100vw; /* El alto del juego será el ancho de la pantalla */
            transform: rotate(-90deg); /* Rotamos el contenedor completo */
            transform-origin: center;
            
            background: url('img4/fondo_mesa.jpg') no-repeat center center;
            background-size: cover; 
            z-index: 1;
        }

        /* Ajuste para que los elementos no salgan rotados respecto al usuario */
        header { 
            position: absolute; top: 0; width: 100%; padding: 10px; 
            background: rgba(16, 58, 87, 0.9); color: white; 
            display: flex; justify-content: space-between; z-index: 3000; box-sizing: border-box;
        }

        #guia-box {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; background: white;
            border: 3px solid var(--t-blue); border-radius: 40px;
            padding: 8px 15px; width: 80%; z-index: 1000;
        }

        #avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 10px; }
        #texto-guia { font-size: 0.9rem; font-weight: bold; color: var(--p-blue); margin: 0; }

        /* METAS AJUSTADAS A LA ROTACIÓN */
        .meta-invisible { position: absolute; z-index: 5; /* border: 1px solid red; */ }

        #contenedor-objetos {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; display: flex; flex-direction: row;
            gap: 15px; align-items: center; justify-content: center; z-index: 20;
            background: rgba(255,255,255,0.3); border-radius: 15px; padding: 10px;
        }

        .draggable { width: 65px; height: 65px; cursor: grab; touch-action: none; z-index: 21; }
        
        /* OBJETOS COLOCADOS */
        .colocado-p { position: absolute !important; width: 150px; height: 150px; transform: translate(-50%, -50%) rotate(90deg); }
        .colocado-v { position: absolute !important; width: 55px; height: 55px; transform: translate(-50%, -50%) rotate(90deg); }
        .colocado-t { position: absolute !important; width: 45px; height: 110px; transform: translate(-50%, -50%) rotate(90deg); }
        .colocado-c { position: absolute !important; width: 45px; height: 110px; transform: translate(-50%, -50%) rotate(90deg); }
    </style>
</head>
<body>

    <div id="game-container">
        <header>
            <div>Sesión 4 - Preparar la Mesa</div>
            <div id="puntos">PASO: 1/4</div>
        </header>

        <div id="guia-box">
            <img src="COTERAPEUTA.JPG" id="avatar">
            <p id="texto-guia">Cargando...</p>
        </div>

        <div id="target-p" class="meta-invisible" style="width: 160px; height: 160px; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
        <div id="target-v" class="meta-invisible" style="width: 70px; height: 70px; top: 30%; left: 65%;"></div>
        <div id="target-t" class="meta-invisible" style="width: 60px; height: 130px; top: 50%; left: 35%;"></div>
        <div id="target-c" class="meta-invisible" style="width: 60px; height: 130px; top: 50%; left: 65%;"></div>

        <div id="contenedor-objetos"></div>
    </div>

<script>
    let nivel = 1; let pasoActual = 0;
    const secuencia = ['p', 'v', 't', 'c'];
    const nombresPasos = ["el plato", "el vaso", "el tenedor", "el cuchillo"];

    function hablar(msg) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
        document.getElementById('texto-guia').innerText = msg;
    }

    function cargarNivel() {
        const div = document.getElementById('contenedor-objetos');
        div.innerHTML = ""; pasoActual = 0;
        let items = [];
        secuencia.forEach(tipo => {
            items.push({tipo: tipo, img: `${tipo}${Math.floor(Math.random()*3)+1}.png`});
        });
        items.sort(() => Math.random() - 0.5).forEach(item => {
            const img = document.createElement('img');
            img.src = `img4/${item.img}`; img.className = 'draggable';
            img.dataset.tipo = item.tipo;
            // Rotamos los iconos en la barra para que el usuario los vea "derechos"
            img.style.transform = "rotate(90deg)"; 
            activarDrag(img);
            div.appendChild(img);
        });
        document.getElementById('puntos').innerText = `PASO: 1/4`;
        hablar("¡Hola! Primero, coloca el plato en el centro.");
    }

    function activarDrag(el) {
        el.addEventListener('touchstart', (e) => {
            el.style.position = 'fixed'; el.style.zIndex = 5000;
            const mover = (me) => {
                const mt = me.touches[0];
                el.style.left = (mt.clientX - 32) + 'px';
                el.style.top = (mt.clientY - 32) + 'px';
            };
            const soltar = (se) => {
                document.removeEventListener('touchmove', mover);
                document.removeEventListener('touchend', soltar);
                verificar(el, se.changedTouches[0]);
            };
            document.addEventListener('touchmove', mover);
            document.addEventListener('touchend', soltar);
        });
    }

    function verificar(el, pos) {
        const tipoMeta = secuencia[pasoActual];
        const metaElem = document.getElementById(`target-${tipoMeta}`);
        const r = metaElem.getBoundingClientRect();
        
        // Verificación de colisión
        const enMeta = (pos.clientX > r.left && pos.clientX < r.right && pos.clientY > r.top && pos.clientY < r.bottom);

        if (enMeta && el.dataset.tipo === tipoMeta) {
            el.className = `colocado-${tipoMeta}`;
            el.style.left = (r.left + r.width/2) + 'px';
            el.style.top = (r.top + r.height/2) + 'px';
            el.style.position = 'absolute';
            document.getElementById('game-container').appendChild(el);
            pasoActual++;
            if (pasoActual < secuencia.length) {
                document.getElementById('puntos').innerText = `PASO: ${pasoActual + 1}/4`;
                hablar(`Bien. Ahora el ${nombresPasos[pasoActual]}.`);
            } else {
                hablar("¡Excelente! Mesa lista.");
                setTimeout(() => { nivel++; cargarNivel(); }, 3000);
            }
        } else {
            el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0';
        }
    }
    window.onload = cargarNivel;
</script>
</body>
</html>

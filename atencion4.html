<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 4 - Mesa Proporcional</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --bg-gray: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-gray); overflow: hidden; touch-action: none; }
        
        #main-stage { display: flex; flex-direction: column; align-items: center; height: 100vh; padding-top: 10px; box-sizing: border-box; }

        header { width: 100%; padding: 8px 20px; background: var(--p-blue); color: white; display: flex; justify-content: space-between; position: fixed; top: 0; z-index: 100; font-size: 0.9rem; }

        #guia-box { 
            width: 85%; max-width: 800px; background: white; border: 3px solid var(--t-blue); 
            border-radius: 15px; padding: 10px; display: flex; align-items: center; margin-top: 45px; 
            min-height: 70px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; }
        #texto-guia { font-size: 1rem; font-weight: bold; color: var(--p-blue); margin: 0; }

        #game-area { display: flex; width: 98%; justify-content: center; align-items: center; gap: 20px; margin-top: 15px; flex-grow: 1; }

        /* MESA MÁS GRANDE Y VISIBLE */
        #mesa-container { 
            width: 750px; height: 450px; background: url('img4/fondo_mesa.jpg') no-repeat center; 
            background-size: contain; position: relative; border-radius: 20px;
        }

        /* Puntos Guía ajustados a las sillas */
        .punto-guia { 
            position: absolute; width: 60px; height: 60px; border: 3px dashed rgba(48, 123, 142, 0.4); 
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 5;
        }

        #panel-objetos { 
            width: 130px; height: 480px; background: white; border: 2px solid var(--t-blue); 
            border-radius: 15px; display: flex; flex-direction: column; align-items: center; 
            padding: 10px; gap: 10px; overflow-y: auto;
        }
        .draggable { width: 70px; height: 70px; cursor: grab; z-index: 50; transition: transform 0.2s; }

        /* CORRECCIÓN: Tamaño fijo para que no se vuelvan gigantes */
        .colocado-p { position: absolute !important; width: 110px !important; height: 110px !important; transform: translate(-50%, -50%) !important; pointer-events: none; z-index: 10; }
        .colocado-v { position: absolute !important; width: 50px !important; height: 50px !important; transform: translate(-50%, -50%) !important; pointer-events: none; z-index: 11; }
        .colocado-t { position: absolute !important; width: 40px !important; height: 90px !important; transform: translate(-50%, -50%) !important; pointer-events: none; z-index: 11; }
    </style>
</head>
<body>

<header>
    <div id="nivel-text">NIVEL: 1</div>
    <div id="progreso-text">PLATOS: 0/6</div>
</header>

<div id="main-stage">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Cargando...</p>
    </div>

    <div id="game-area">
        <div id="mesa-container" id="mesa"></div>
        <div id="panel-objetos" id="inventario"></div>
    </div>
</div>

<script>
    let nivelActual = 1;
    let aciertosNivel = 0;
    
    // Coordenadas revisadas para las sillas (3 arriba, 3 abajo)
    const puestos = [
        {x: 34, y: 35}, {x: 50, y: 35}, {x: 66, y: 35}, // Fila superior
        {x: 34, y: 72}, {x: 50, y: 72}, {x: 66, y: 72}  // Fila inferior
    ];

    const configNiveles = {
        1: { tipo: 'p', clase: 'colocado-p', nombre: "platos", instruccion: "Coloca los 6 platos en los puntos marcados frente a cada silla." },
        2: { tipo: 'v', clase: 'colocado-v', nombre: "vasos", instruccion: "Ahora coloca los 6 vasos." },
        3: { tipo: 't', clase: 'colocado-t', nombre: "tenedores", instruccion: "Por último, pon los 6 tenedores." }
    };

    function hablar(msg) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
        document.getElementById('texto-guia').innerText = msg;
    }

    function iniciarNivel() {
        aciertosNivel = 0;
        const mesa = document.getElementById('mesa-container');
        const panel = document.getElementById('panel-objetos');
        const config = configNiveles[nivelActual];
        
        document.getElementById('nivel-text').innerText = `NIVEL: ${nivelActual}`;
        document.getElementById('progreso-text').innerText = `${config.nombre.toUpperCase()}: 0/6`;
        
        mesa.innerHTML = ""; // Limpiar mesa
        panel.innerHTML = "";

        puestos.forEach((p, index) => {
            const punto = document.createElement('div');
            punto.className = 'punto-guia';
            punto.style.left = p.x + "%";
            punto.style.top = p.y + "%";
            mesa.appendChild(punto);

            const obj = document.createElement('img');
            obj.src = `img4/${config.tipo}1.png`;
            obj.className = 'draggable';
            obj.dataset.tipo = config.tipo;
            activarDrag(obj);
            panel.appendChild(obj);
        });

        hablar(config.instruccion);
    }

    function activarDrag(el) {
        el.ontouchstart = (e) => {
            el.style.position = 'fixed';
            el.style.zIndex = 1000;
            const mover = (me) => {
                const t = me.touches[0];
                el.style.left = (t.clientX - 35) + 'px';
                el.style.top = (t.clientY - 35) + 'px';
            };
            const soltar = (se) => {
                document.removeEventListener('touchmove', mover);
                document.removeEventListener('touchend', soltar);
                const touch = se.changedTouches[0];
                let exito = false;

                document.querySelectorAll('.punto-guia').forEach(meta => {
                    const rect = meta.getBoundingClientRect();
                    if (touch.clientX > rect.left && touch.clientX < rect.right && 
                        touch.clientY > rect.top && touch.clientY < rect.bottom && !meta.dataset.ocupado) {
                        
                        exito = true;
                        meta.dataset.ocupado = "true";
                        el.className = configNiveles[nivelActual].clase;
                        el.style.left = (rect.left + rect.width/2) + 'px';
                        el.style.top = (rect.top + rect.height/2) + 'px';
                        document.body.appendChild(el);
                        
                        aciertosNivel++;
                        document.getElementById('progreso-text').innerText = `${configNiveles[nivelActual].nombre.toUpperCase()}: ${aciertosNivel}/6`;
                        
                        if (aciertosNivel === 6) {
                            hablar("¡Excelente! Nivel completado.");
                            setTimeout(siguienteNivel, 1500);
                        } else hablar("¡Muy bien!");
                    }
                });

                if (!exito) {
                    hablar("Intenta ponerlo en el punto marcado.");
                    el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0';
                }
            };
            document.addEventListener('touchmove', mover);
            document.addEventListener('touchend', soltar);
        };
    }

    function siguienteNivel() {
        if (nivelActual < 3) {
            nivelActual++;
            document.querySelectorAll('[class^="colocado-"]').forEach(c => c.remove());
            iniciarNivel();
        } else hablar("¡Felicidades! Has preparado toda la mesa.");
    }

    window.onload = iniciarNivel;
</script>
</body>
</html>

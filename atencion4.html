<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesión 4 - Rehabilitación Cognitiva</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --bg-gray: #f0f0f0; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-gray); overflow: hidden; touch-action: none; }
        
        /* Contenedor tipo boceto */
        #main-stage { display: flex; flex-direction: column; align-items: center; height: 100vh; padding-top: 20px; box-sizing: border-box; }

        header { width: 100%; padding: 10px 20px; background: var(--p-blue); color: white; display: flex; justify-content: space-between; position: fixed; top: 0; z-index: 100; }

        /* Caja del Coterapeuta según dibujo */
        #guia-box { 
            width: 80%; max-width: 700px; background: white; border: 3px solid var(--t-blue); 
            border-radius: 15px; padding: 10px; display: flex; align-items: center; margin-top: 50px; 
            min-height: 80px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #avatar { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; }
        #texto-guia { font-size: 1.1rem; font-weight: bold; color: var(--p-blue); margin: 0; }

        /* Área de Juego: Mesa y Panel de Objetos */
        #game-area { display: flex; width: 95%; justify-content: space-around; align-items: center; margin-top: 20px; }

        #mesa-container { 
            width: 600px; height: 350px; background: url('img4/fondo_mesa.jpg') no-repeat center; 
            background-size: contain; position: relative; border: 2px solid #ccc; border-radius: 20px;
        }

        /* Puntos Guía en la mesa */
        .punto-guia { 
            position: absolute; width: 40px; height: 40px; border: 3px dashed rgba(48, 123, 142, 0.5); 
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 5;
        }

        /* Panel de Objetos según dibujo */
        #panel-objetos { 
            width: 150px; height: 400px; background: white; border: 2px solid var(--t-blue); 
            border-radius: 15px; display: flex; flex-direction: column; align-items: center; 
            padding: 15px; gap: 15px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }
        .draggable { width: 60px; height: 60px; cursor: grab; z-index: 50; }

        /* Clases de colocación */
        .colocado { position: absolute !important; transform: translate(-50%, -50%) !important; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <div id="nivel-text">NIVEL: 1</div>
    <div id="progreso-text">PLATOS: 0/6</div>
</header>

<div id="main-stage">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Cargando instrucciones...</p>
    </div>

    <div id="game-area">
        <div id="mesa-container" id="mesa">
            </div>

        <div id="panel-objetos" id="inventario">
            </div>
    </div>
</div>

<script>
    let nivelActual = 1;
    let aciertosNivel = 0;
    const totalPuestos = 6;
    
    // Coordenadas de los 6 puestos (x, y en porcentaje)
    const puestos = [
        {x: 20, y: 30}, {x: 50, y: 30}, {x: 80, y: 30},
        {x: 20, y: 70}, {x: 50, y: 70}, {x: 80, y: 70}
    ];

    const configNiveles = {
        1: { tipo: 'p', nombre: "platos", instruccion: "Coloca los 6 platos en los puntos marcados." },
        2: { tipo: 'v', nombre: "vasos", instruccion: "¡Muy bien! Ahora coloca los 6 vasos arriba de cada plato." },
        3: { tipo: 't', nombre: "tenedores", instruccion: "Excelente. Por último, pon los 6 tenedores a la izquierda." }
    };

    function hablar(msg) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
        document.getElementById('texto-guia').innerText = msg;
    }

    function iniciarNivel() {
        aciertosNivel = 0;
        const mesa = document.getElementById('mesa-container');
        const panel = document.getElementById('panel-objetos');
        const config = configNiveles[nivelActual];
        
        document.getElementById('nivel-text').innerText = `NIVEL: ${nivelActual}`;
        document.getElementById('progreso-text').innerText = `${config.nombre.toUpperCase()}: 0/6`;
        
        // Limpiar
        mesa.querySelectorAll('.punto-guia').forEach(p => p.remove());
        panel.innerHTML = "";

        // Crear Puntos Guía
        puestos.forEach((p, index) => {
            const punto = document.createElement('div');
            punto.className = 'punto-guia';
            punto.id = `meta-${index}`;
            punto.style.left = p.x + "%";
            punto.style.top = p.y + "%";
            mesa.appendChild(punto);

            // Crear Objeto en panel
            const obj = document.createElement('img');
            obj.src = `img4/${config.tipo}1.png`; // Usa la variante 1
            obj.className = 'draggable';
            obj.dataset.tipo = config.tipo;
            activarDrag(obj);
            panel.appendChild(obj);
        });

        hablar(config.instruccion);
    }

    function activarDrag(el) {
        el.ontouchstart = (e) => {
            const startX = el.offsetLeft;
            const startY = el.offsetTop;
            el.style.position = 'fixed';
            el.style.zIndex = 1000;

            const mover = (me) => {
                const t = me.touches[0];
                el.style.left = (t.clientX - 30) + 'px';
                el.style.top = (t.clientY - 30) + 'px';
            };

            const soltar = (se) => {
                document.removeEventListener('touchmove', mover);
                document.removeEventListener('touchend', soltar);
                
                const touch = se.changedTouches[0];
                let exito = false;

                document.querySelectorAll('.punto-guia').forEach(meta => {
                    const rect = meta.getBoundingClientRect();
                    if (touch.clientX > rect.left && touch.clientX < rect.right && 
                        touch.clientY > rect.top && touch.clientY < rect.bottom && !meta.dataset.ocupado) {
                        
                        // ACIERTO
                        exito = true;
                        meta.dataset.ocupado = "true";
                        meta.style.border = "none";
                        el.className = 'colocado';
                        el.style.left = (rect.left + rect.width/2) + 'px';
                        el.style.top = (rect.top + rect.height/2) + 'px';
                        document.body.appendChild(el);
                        
                        aciertosNivel++;
                        document.getElementById('progreso-text').innerText = `${configNiveles[nivelActual].nombre.toUpperCase()}: ${aciertosNivel}/6`;
                        
                        if (aciertosNivel === 6) {
                            hablar("¡Excelente trabajo! Has completado este grupo.");
                            setTimeout(siguienteNivel, 2000);
                        } else {
                            hablar("¡Bien hecho!", "FELIZ");
                        }
                    }
                });

                if (!exito) {
                    hablar("Ese no es el lugar, intenta de nuevo.");
                    el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0';
                }
            };

            document.addEventListener('touchmove', mover);
            document.addEventListener('touchend', soltar);
        };
    }

    function siguienteNivel() {
        if (nivelActual < 3) {
            nivelActual++;
            // Limpiar objetos colocados
            document.querySelectorAll('.colocado').forEach(c => c.remove());
            iniciarNivel();
        } else {
            hablar("Felicidades, has preparado la mesa perfectamente para los seis invitados.");
        }
    }

    window.onload = iniciarNivel;
</script>
</body>
</html>

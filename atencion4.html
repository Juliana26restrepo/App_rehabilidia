<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atención 4 - Preparar la Mesa</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; overflow: hidden; touch-action: none; }
        
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: url('img4/fondo_mesa.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        header { position: fixed; top: 0; width: 100%; padding: 15px; background: rgba(16, 58, 87, 0.9); color: white; display: flex; justify-content: space-between; z-index: 3000; box-sizing: border-box; }

        /* COTERAPEUTA */
        #guia-box {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; background: white;
            border: 4px solid var(--t-blue); border-radius: 50px;
            padding: 10px 20px; width: 85%; max-width: 650px; z-index: 1000;
        }
        #avatar { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--t-blue); margin-right: 15px; }
        #texto-guia { font-size: 1.1rem; font-weight: bold; color: var(--p-blue); margin: 0; line-height: 1.2; }

        /* METAS INVISIBLES EN LA MESA */
        .meta-invisible { position: absolute; z-index: 5; }

        /* CONTENEDOR DE OBJETOS (DERECHA) */
        #contenedor-objetos {
            position: absolute; top: 160px; right: 20px; bottom: 20px;
            width: 140px; display: flex; flex-direction: column;
            gap: 15px; align-items: center; z-index: 20;
            background: rgba(255,255,255,0.2); border-radius: 20px; padding: 15px;
        }
        .draggable { width: 100px; height: 100px; cursor: grab; touch-action: none; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
        
        /* ESTILO PARA OBJETOS COLOCADOS */
        .colocado { position: absolute !important; pointer-events: none; z-index: 10; width: 150px; height: 150px; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold;">Sesión 4 - Preparar la Mesa</div>
    <div id="puntos" style="font-size: 1.3rem; font-weight: bold;">PASO: 1/4</div>
</header>

<div id="game-container">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">Cargando...</p>
    </div>

    <div id="target-p" class="meta-invisible" style="width: 250px; height: 250px; top: 55%; left: 50%; transform: translate(-50%, -50%);"></div> <div id="target-v" class="meta-invisible" style="width: 120px; height: 120px; top: 35%; left: 65%;"></div> <div id="target-t" class="meta-invisible" style="width: 100px; height: 180px; top: 45%; left: 30%;"></div> <div id="target-c" class="meta-invisible" style="width: 100px; height: 180px; top: 45%; left: 62%;"></div> <div id="contenedor-objetos"></div>
</div>

<script>
    let nivel = 1; 
    let pasoActual = 0;
    const secuencia = ['p', 'v', 't', 'c']; 
    const nombresPasos = ["el plato en el centro", "el vaso arriba a la derecha", "el tenedor a la izquierda", "el cuchillo a la derecha"];

    function hablar(msg, emocion = 'NORMAL') {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
        document.getElementById('texto-guia').innerText = msg;
        const img = document.getElementById('avatar');
        img.src = emocion === 'FELIZ' ? "COTERAPEUTA_FELIZ.JPG" : (emocion === 'PENSATIVO' ? "COTERAPEUTA_PENSATIVO.JPG" : "COTERAPEUTA.JPG");
    }

    function cargarNivel() {
        const div = document.getElementById('contenedor-objetos');
        div.innerHTML = ""; 
        pasoActual = 0;
        let items = [];

        // Cargamos 1 de cada tipo de la secuencia (p, v, t, c) desde img4/
        secuencia.forEach(tipo => {
            items.push({tipo: tipo, img: `${tipo}${Math.floor(Math.random()*3)+1}.png`});
        });

        // Añadir distractores (d1, d2...) según nivel
        if(nivel > 1) {
            let numD = (nivel === 2) ? 2 : 4;
            for(let i=1; i<=numD; i++) items.push({tipo: 'd', img: `d${i}.png`});
        }

        items.sort(() => Math.random() - 0.5).forEach(item => {
            const img = document.createElement('img');
            img.src = `img4/${item.img}`; 
            img.className = 'draggable'; 
            img.dataset.tipo = item.tipo;
            activarDrag(img);
            div.appendChild(img);
        });

        document.getElementById('puntos').innerText = `PASO: 1/4`;
        hablar("¡Hola! Vamos a preparar la mesa. Primero, coloca el plato en el centro.");
    }

    function activarDrag(el) {
        el.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            el.style.position = 'fixed'; el.style.zIndex = 5000;
            const mover = (me) => {
                me.preventDefault();
                const mt = me.touches[0];
                el.style.left = (mt.clientX - 50) + 'px';
                el.style.top = (mt.clientY - 50) + 'px';
            };
            const soltar = (se) => {
                document.removeEventListener('touchmove', mover);
                document.removeEventListener('touchend', soltar);
                verificar(el, se.changedTouches[0]);
            };
            document.addEventListener('touchmove', mover, {passive: false});
            document.addEventListener('touchend', soltar);
        });
    }

    function verificar(el, pos) {
        const tipoMeta = secuencia[pasoActual];
        const metaElem = document.getElementById(`target-${tipoMeta}`);
        const r = metaElem.getBoundingClientRect();

        const enMeta = (pos.clientX > r.left && pos.clientX < r.right && pos.clientY > r.top && pos.clientY < r.bottom);

        if (enMeta && el.dataset.tipo === tipoMeta) {
            el.className = 'colocado';
            el.style.left = (r.left + r.width/2) + 'px';
            el.style.top = (r.top + r.height/2) + 'px';
            document.getElementById('game-container').appendChild(el);
            
            pasoActual++;
            if (pasoActual < secuencia.length) {
                document.getElementById('puntos').innerText = `PASO: ${pasoActual + 1}/4`;
                hablar(`¡Muy bien! Ahora coloca ${nombresPasos[pasoActual]}.`, "FELIZ");
            } else {
                hablar("¡Excelente! La mesa está lista. Tu capacidad para enfocarte está avanzando.", "FELIZ");
                setTimeout(() => { 
                    if(nivel < 3) { 
                        nivel++; 
                        // Limpiar mesa para el siguiente nivel
                        document.querySelectorAll('.colocado').forEach(c => c.remove());
                        cargarNivel(); 
                    } else { 
                        hablar("Has completado todos los niveles. ¡Gran trabajo!"); 
                    }
                }, 4000);
            }
        } else {
            if (el.dataset.tipo === 'd') {
                hablar("Ese objeto no va en la mesa.", "PENSATIVO");
            } else if (el.dataset.tipo !== tipoMeta) {
                hablar(`Ese no es el orden correcto. Pon primero ${nombresPasos[pasoActual]}.`, "PENSATIVO");
            }
            el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0'; el.style.zIndex = 20;
        }
    }

    window.onload = cargarNivel;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atención 4 - Mesa Horizontal</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; background: #000; 
            overflow: hidden; touch-action: none;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
        }

        /* ESTA ES LA CLAVE: Rotamos todo el juego si la pantalla está en vertical */
        #orientacion-wrapper {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        @media screen and (orientation: portrait) {
            #game-container {
                width: 100vh; height: 100vw;
                transform: rotate(90deg);
            }
        }

        @media screen and (orientation: landscape) {
            #game-container {
                width: 100vw; height: 100vh;
            }
        }

        #game-container {
            position: relative;
            background: url('img4/fondo_mesa.jpg') no-repeat center center;
            background-size: cover; /* Mantiene la proporción sin deformar */
            z-index: 1; overflow: hidden;
        }

        header { 
            position: absolute; top: 0; width: 100%; padding: 10px; 
            background: rgba(16, 58, 87, 0.9); color: white; 
            display: flex; justify-content: space-between; z-index: 3000; box-sizing: border-box;
        }

        #guia-box {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; background: white;
            border: 3px solid var(--t-blue); border-radius: 40px;
            padding: 8px 15px; width: 70%; z-index: 1000;
        }

        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 10px; }
        #texto-guia { font-size: 1rem; font-weight: bold; color: var(--p-blue); margin: 0; }

        .meta-invisible { position: absolute; z-index: 5; }

        /* OBJETOS EN COLUMNA DERECHA */
        #contenedor-objetos {
            position: absolute; top: 100px; right: 20px; bottom: 20px;
            width: 100px; display: flex; flex-direction: column;
            gap: 15px; align-items: center; z-index: 20;
            background: rgba(255,255,255,0.2); border-radius: 15px; padding: 10px;
        }

        .draggable { width: 70px; height: 70px; cursor: grab; touch-action: none; z-index: 21; }
        
        /* CLASES PARA OBJETOS SOLTADOS */
        .colocado-p { position: absolute !important; width: 180px; height: 180px; transform: translate(-50%, -50%); z-index: 10; }
        .colocado-v { position: absolute !important; width: 60px; height: 60px; transform: translate(-50%, -50%); z-index: 11; }
        .colocado-t { position: absolute !important; width: 50px; height: 130px; transform: translate(-50%, -50%); z-index: 11; }
        .colocado-c { position: absolute !important; width: 50px; height: 130px; transform: translate(-50%, -50%); z-index: 11; }
    </style>
</head>
<body>

<div id="orientacion-wrapper">
    <div id="game-container">
        <header>
            <div style="font-weight:bold;">Sesión 4 - Preparar la Mesa</div>
            <div id="puntos" style="font-size: 1rem;">PASO: 1/4</div>
        </header>

        <div id="guia-box">
            <img src="COTERAPEUTA.JPG" id="avatar">
            <p id="texto-guia">Cargando...</p>
        </div>

        <div id="target-p" class="meta-invisible" style="width: 200px; height: 200px; top: 60%; left: 45%;"></div>
        <div id="target-v" class="meta-invisible" style="width: 80px; height: 80px; top: 40%; left: 55%;"></div>
        <div id="target-t" class="meta-invisible" style="width: 80px; height: 150px; top: 55%; left: 30%;"></div>
        <div id="target-c" class="meta-invisible" style="width: 80px; height: 150px; top: 55%; left: 55%;"></div>

        <div id="contenedor-objetos"></div>
    </div>
</div>

<script>
    let nivel = 1; let pasoActual = 0;
    const secuencia = ['p', 'v', 't', 'c'];
    const nombresPasos = ["el plato", "el vaso", "el tenedor", "el cuchillo"];

    function hablar(msg, emocion = 'NORMAL') {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
        document.getElementById('texto-guia').innerText = msg;
    }

    function cargarNivel() {
        const div = document.getElementById('contenedor-objetos');
        div.innerHTML = ""; pasoActual = 0;
        let items = [];
        secuencia.forEach(tipo => {
            items.push({tipo: tipo, img: `${tipo}${Math.floor(Math.random()*3)+1}.png`});
        });
        if(nivel > 1) {
            for(let i=1; i<=2; i++) items.push({tipo: 'd', img: `d${i}.png`});
        }
        items.sort(() => Math.random() - 0.5).forEach(item => {
            const img = document.createElement('img');
            img.src = `img4/${item.img}`; img.className = 'draggable';
            img.dataset.tipo = item.tipo;
            activarDrag(img);
            div.appendChild(img);
        });
        document.getElementById('puntos').innerText = `PASO: 1/4`;
        hablar("¡Hola! Primero, coloca el plato en el centro.");
    }

    function activarDrag(el) {
        el.addEventListener('touchstart', (e) => {
            el.style.position = 'fixed'; el.style.zIndex = 5000;
            const mover = (me) => {
                const mt = me.touches[0];
                el.style.left = (mt.clientX - 35) + 'px';
                el.style.top = (mt.clientY - 35) + 'px';
            };
            const soltar = (se) => {
                document.removeEventListener('touchmove', mover);
                document.removeEventListener('touchend', soltar);
                verificar(el, se.changedTouches[0]);
            };
            document.addEventListener('touchmove', mover);
            document.addEventListener('touchend', soltar);
        });
    }

    function verificar(el, pos) {
        const tipoMeta = secuencia[pasoActual];
        const metaElem = document.getElementById(`target-${tipoMeta}`);
        const r = metaElem.getBoundingClientRect();
        const enMeta = (pos.clientX > r.left && pos.clientX < r.right && pos.clientY > r.top && pos.clientY < r.bottom);

        if (enMeta && el.dataset.tipo === tipoMeta) {
            el.className = `colocado-${tipoMeta}`;
            el.style.left = (r.left + r.width/2) + 'px';
            el.style.top = (r.top + r.height/2) + 'px';
            el.style.position = 'absolute';
            document.getElementById('game-container').appendChild(el);
            pasoActual++;
            if (pasoActual < secuencia.length) {
                document.getElementById('puntos').innerText = `PASO: ${pasoActual + 1}/4`;
                hablar(`Bien. Ahora coloca ${nombresPasos[pasoActual]}.`);
            } else {
                hablar("¡Excelente! Mesa lista.");
                setTimeout(() => { nivel++; cargarNivel(); }, 3000);
            }
        } else {
            el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0';
        }
    }
    window.onload = cargarNivel;
</script>
</body>
</html>

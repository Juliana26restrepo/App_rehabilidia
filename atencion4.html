<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atención 4 - Mesa Corregida</title>
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --bg-gray: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-gray); overflow: hidden; touch-action: none; }
        
        #main-stage { display: flex; flex-direction: column; align-items: center; height: 100vh; padding-top: 5px; }
        header { width: 100%; padding: 10px 20px; background: var(--p-blue); color: white; display: flex; justify-content: space-between; box-sizing: border-box; z-index: 100; }

        #guia-box { 
            width: 90%; max-width: 900px; background: white; border: 3px solid var(--t-blue); 
            border-radius: 15px; padding: 12px; display: flex; align-items: center; margin-top: 10px; min-height: 60px;
        }
        #avatar { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; }
        #texto-guia { font-size: 1.1rem; font-weight: bold; color: var(--p-blue); margin: 0; }

        #game-area { display: flex; width: 100%; justify-content: space-evenly; align-items: center; flex-grow: 1; padding: 10px; }

        /* MESA MÁS GRANDE */
        #mesa-container { 
            width: 850px; height: 500px; background: url('img4/fondo_mesa.jpg') no-repeat center; 
            background-size: contain; position: relative; border-radius: 20px;
        }

        .punto-guia { 
            position: absolute; width: 75px; height: 75px; border: 4px dashed rgba(48, 123, 142, 0.6); 
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 5;
        }

        #panel-objetos { 
            width: 150px; height: 500px; background: white; border: 2px solid var(--t-blue); 
            border-radius: 15px; display: flex; flex-direction: column; align-items: center; 
            padding: 15px; gap: 15px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }
        .draggable { width: 80px; height: 80px; cursor: grab; z-index: 50; }

        /* TAMAÑOS FIJOS PARA QUE SE QUEDEN EN LA MESA */
        .colocado-p { position: absolute !important; width: 110px !important; height: 110px !important; transform: translate(-50%, -50%) !important; pointer-events: none; z-index: 10; }
        .colocado-v { position: absolute !important; width: 55px !important; height: 55px !important; transform: translate(-50%, -50%) !important; pointer-events: none; z-index: 15; }
        .colocado-t { position: absolute !important; width: 40px !important; height: 100px !important; transform: translate(-50%, -50%) !important; pointer-events: none; z-index: 15; }

        /* MOSCA ANIMADA */
        #mosca { position: absolute; width: 60px; z-index: 2000; display: none; pointer-events: none; }
        @keyframes volarMosca {
            0% { top: 10%; left: 10%; } 25% { top: 70%; left: 80%; } 50% { top: 40%; left: 30%; } 75% { top: 80%; left: 10%; } 100% { top: 10%; left: 10%; }
        }
    </style>
</head>
<body>

<header>
    <div id="nivel-text">NIVEL: 1</div>
    <div id="progreso-text">PLATOS: 0/6</div>
</header>

<div id="main-stage">
    <div id="guia-box">
        <img src="COTERAPEUTA.JPG" id="avatar">
        <p id="texto-guia">¡Cargando!</p>
    </div>

    <div id="game-area">
        <div id="mesa-container">
            <img src="img/D_mosca.png" id="mosca">
        </div>
        <div id="panel-objetos"></div>
    </div>
</div>

<script>
    let nivelActual = 1;
    let aciertosNivel = 0;
    const audioPerro = new Audio("https://www.myinstants.com/media/sounds/dog-bark.mp3");

    // COORDENADAS PRECISAS SOBRE LA MESA (3 Arriba, 3 Abajo)
    const puestosPlato = [
        {x: 35, y: 35}, {x: 50, y: 35}, {x: 65, y: 35},
        {x: 35, y: 70}, {x: 50, y: 70}, {x: 65, y: 70}
    ];
    const puestosVaso = [
        {x: 40, y: 28}, {x: 55, y: 28}, {x: 70, y: 28},
        {x: 40, y: 62}, {x: 55, y: 62}, {x: 70, y: 62}
    ];
    const puestosTenedor = [
        {x: 28, y: 35}, {x: 43, y: 35}, {x: 58, y: 35},
        {x: 28, y: 70}, {x: 43, y: 70}, {x: 58, y: 70}
    ];

    const configNiveles = {
        1: { tipo: 'p', clase: 'colocado-p', coords: puestosPlato, msg: "Coloca los 6 platos en los círculos." },
        2: { tipo: 'v', clase: 'colocado-v', coords: puestosVaso, msg: "¡Bien! Pon los vasos. No te distraigas con el perro." },
        3: { tipo: 't', clase: 'colocado-t', coords: puestosTenedor, msg: "¡Cuidado con la mosca! Pon los tenedores." }
    };

    function hablar(msg) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
        document.getElementById('texto-guia').innerText = msg;
    }

    function iniciarNivel() {
        aciertosNivel = 0;
        const config = configNiveles[nivelActual];
        const mesa = document.getElementById('mesa-container');
        const panel = document.getElementById('panel-objetos');

        document.getElementById('nivel-text').innerText = `NIVEL: ${nivelActual}`;
        document.getElementById('progreso-text').innerText = `${nivelActual==1?'PLATOS':nivelActual==2?'VASOS':'TENEDORES'}: 0/6`;
        
        mesa.querySelectorAll('.punto-guia').forEach(p => p.remove());
        panel.innerHTML = "";

        if(nivelActual === 2) setInterval(() => audioPerro.play(), 6000);
        if(nivelActual === 3) {
            const m = document.getElementById('mosca');
            m.style.display = 'block';
            m.style.animation = "volarMosca 5s infinite linear";
        }

        config.coords.forEach((p) => {
            const punto = document.createElement('div');
            punto.className = 'punto-guia';
            punto.style.left = p.x + "%"; punto.style.top = p.y + "%";
            mesa.appendChild(punto);

            const obj = document.createElement('img');
            obj.src = `img4/${config.tipo}1.png`;
            obj.className = 'draggable';
            obj.dataset.tipo = config.tipo;
            activarDrag(obj);
            panel.appendChild(obj);
        });
        hablar(config.msg);
    }

    function activarDrag(el) {
        el.ontouchstart = (e) => {
            el.style.position = 'fixed'; el.style.zIndex = 1000;
            const mover = (me) => {
                const t = me.touches[0];
                el.style.left = (t.clientX - 40) + 'px'; el.style.top = (t.clientY - 40) + 'px';
            };
            const soltar = (se) => {
                document.removeEventListener('touchmove', mover);
                document.removeEventListener('touchend', soltar);
                const touch = se.changedTouches[0];
                let exito = false;

                document.querySelectorAll('.punto-guia').forEach(meta => {
                    const r = meta.getBoundingClientRect();
                    if (touch.clientX > r.left && touch.clientX < r.right && touch.clientY > r.top && touch.clientY < r.bottom && !meta.dataset.ocupado) {
                        exito = true; meta.dataset.ocupado = "true";
                        el.className = configNiveles[nivelActual].clase;
                        el.style.position = 'absolute';
                        el.style.left = meta.style.left;
                        el.style.top = meta.style.top;
                        document.getElementById('mesa-container').appendChild(el);
                        
                        aciertosNivel++;
                        document.getElementById('progreso-text').innerText = `${configNiveles[nivelActual].tipo=='p'?'PLATOS':nivelActual==2?'VASOS':'TENEDORES'}: ${aciertosNivel}/6`;
                        
                        if (aciertosNivel === 6) { hablar("¡Excelente!"); setTimeout(siguienteNivel, 1500); }
                        else hablar("¡Bien hecho!");
                    }
                });
                if (!exito) { hablar("Ponlo dentro del círculo."); el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0'; }
            };
            document.addEventListener('touchmove', mover); document.addEventListener('touchend', soltar);
        };
    }

    function siguienteNivel() {
        if (nivelActual < 3) { nivelActual++; iniciarNivel(); }
        else hablar("¡Felicidades! Has terminado el ejercicio.");
    }
    window.onload = iniciarNivel;
</script>
</body>
</html>

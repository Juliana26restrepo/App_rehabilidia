<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Videos - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57; --teal-blue: #307B8E; --mughal-green: #366B2B;
            --pastel-blue: #A9D3C5; --light-silver: #CEE5D6; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); }
        
        /* Header corregido para navegación interna */
        header { 
            background-color: var(--prussian-blue); 
            color: var(--white); 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .btn-volver { color: white; text-decoration: none; font-size: 1.2rem; display: flex; align-items: center; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        
        .guia-videos { background: white; border-radius: 15px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .guia-videos img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }

        .video-card { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        
        .video-wrapper { position: relative; padding-bottom: 177.77%; height: 0; overflow: hidden; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .video-info { padding: 15px; border-top: 5px solid var(--mughal-green); }
        .video-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: var(--prussian-blue); }
        .video-info p { margin: 0; font-size: 0.9rem; color: #666; line-height: 1.4; }
    </style>
</head>
<body>

<header>
    <a href="perfil_paciente.html" class="btn-volver"><i class="fas fa-chevron-left"></i></a>
    <span style="font-weight: bold;">BIBLIOTECA PSICOEDUCATIVA</span>
</header>

<div class="container">
    <div class="guia-videos">
        <img src="COTERAPEUTA_FELIZ.JPG" alt="Guía">
        <div><strong>¡Excelente, Juan!</strong> Estos 9 videos te ayudarán en tu recuperación paso a paso.</div>
    </div>

    <div id="lista-videos"></div>
</div>

<script>
    const misVideos = [
        { id: "Il7bFjCy-Q8", titulo: "1. ¿Que es el traumatismo craneoencefalico?", desc: "No todos los golpes son iguales. Entiende que es un TEC y por que es importante prestarle atencion." },
        { id: "luL8ziTLTmU", titulo: "2. ¿Que pasa en tu cabeza?", desc: "Despues de un golpe, tu cerero camia. Aqui te explico que ocurre y por que no te sientes igual." },
        { id: "THl4KmcJBnU", titulo: "3. ¿Que cambios pueden aparecer?", desc: "Olvidos, distracciones o cambios emocionales... no es casualidad, es parte del proceso." },
        { id: "LGPpjxyFevU", titulo: "4. Rehabilitacion neuropsicologica", desc: "El cerebro puede recuperarse, pero necesita guia, la rehabilitacion hace la diferencia." },
        { id: "oyCQfAh_hiY", titulo: "5. Atencion y memoria", desc: "Sin atencion no hay memoria. Sin memoria no hay aprendizaje. Aqui empieza todo." },
        { id: "AES8a-GPow8", titulo: "6. Estrategias y habitos que fortalecen el cerebro", desc: "Pequeños cambios diarios pueden tener un gran impacto en tu recuperacion." },
        { id: "EQBKJXSQAtY", titulo: "7. La familia", desc: "No solo es el paciente: el entorno tambien influye en como se recupera el cerebro." },
        { id: "lS0K4I4CiQM", titulo: "8. Afrontar los cambios", desc: "No solo cambia lo cognitivo, tambien lo emocional, y aprender a manejarlo es clave." },
        { id: "AKPXLI4it14", titulo: "9. Mirando al Futuro", desc: "Reconectar contigo mismo tambien hace parte del proceso de sanar." }
    ];

    const contenedor = document.getElementById('lista-videos');

    misVideos.forEach(vid => {
        contenedor.innerHTML += `
            <div class="video-card">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/${vid.id}" allowfullscreen></iframe>
                </div>
                <div class="video-info">
                    <h3>${vid.titulo}</h3>
                    <p>${vid.desc}</p>
                </div>
            </div>
        `;
    });
</script>
    
<script src="logica_rehabilitacion.js"></script>
    
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memoria 8 - Juan: Reconocimiento y Evocación</title>
    <style>
        :root {
            --primary-bg: #F3E5F5;
            --deep-purple: #4A148C;
            --accent-purple: #7B1FA2;
            --gold: #FFD700;
            --success: #4CAF50;
            --error: #F44336;
        }

        /* Sistema Universal Zoom */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; 
            background: #1a1a1a; /* Fondo externo para foco */
            text-align: center; color: var(--deep-purple); 
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        #contenedor-proporcional {
            width: 100vw; height: 100vh;
            max-width: 1280px; max-height: 800px;
            background: var(--primary-bg);
            position: relative; display: flex; flex-direction: column;
            overflow: hidden;
        }

        #cabecera { 
            background: white; height: 12%; display: flex; 
            align-items: center; justify-content: center; 
            border-bottom: 4px solid var(--gold); flex-shrink: 0; 
        }
        
        #instruccion-box { 
            display: flex; align-items: center; font-weight: bold; 
            font-size: clamp(0.9rem, 2.5vw, 1.3rem); color: var(--accent-purple); 
        }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; border: 2px solid var(--accent-purple); }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }

        #rostro-individual { 
            width: clamp(200px, 40vh, 320px); 
            aspect-ratio: 1/1.1;
            background: white; border: 8px solid var(--accent-purple); 
            border-radius: 20px; display: none; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }
        #rostro-individual img { width: 100%; height: 100%; object-fit: cover; }

        #rejilla-reconocimiento { 
            display: none; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; width: 98%; height: 90%;
        }
        
        .cara-card { 
            background: white; border-radius: 12px; border: 4px solid #CE93D8; 
            overflow: hidden; cursor: pointer; transition: 0.2s; 
            touch-action: none; position: relative;
        }
        .cara-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .cara-card.correct { border-color: var(--success); background: #C8E6C9; pointer-events: none; transform: scale(0.92); opacity: 0.7; }
        .cara-card.error { border-color: var(--error); background: #FFCDD2; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* Capas de Pantalla */
        #pantalla-transicion, #overlay-final { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            display:none; flex-direction:column; justify-content:center; 
            align-items:center; z-index:1000; padding: 20px;
        }
        #pantalla-transicion { background: var(--accent-purple); color: white; }
        #overlay-final { background: rgba(74, 20, 140, 0.98); color: white; }

        .cuadro-resultados {
            background: white; color: var(--deep-purple); padding: 30px; 
            border-radius: 25px; border: 6px solid var(--gold);
            width: 90%; max-width: 550px; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-box { background: #F3E5F5; padding: 15px; border-radius: 15px; font-weight: bold; }
        .stat-val { font-size: 2rem; display: block; color: var(--accent-purple); }

        .btn-principal {
            padding: 18px 50px; background: var(--gold); color: var(--deep-purple); 
            border-radius: 20px; font-size: 1.6rem; border:none; cursor:pointer; font-weight:bold;
            transition: 0.3s; width: 100%;
        }
    </style>
</head>
<body onload="iniciarJuego()">

<div id="contenedor-proporcional">
    <div id="cabecera">
        <div id="instruccion-box">
            <img src="COTERAPEUTA.JPG" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1041/1041916.png'">
            <span id="label-guia">Juan, prepárate...</span>
        </div>
    </div>

    <div id="contenedor-juego">
        <div id="rostro-individual"><img id="img-target" src=""></div>
        <div id="rejilla-reconocimiento"></div>
    </div>

    <div id="pantalla-transicion">
        <h1 id="tit-nivel" style="font-size: clamp(2rem, 8vw, 4rem); background: var(--gold); color: var(--deep-purple); padding: 10px 50px; border-radius: 50px;"></h1>
        <p id="desc-nivel" style="font-size: clamp(1.2rem, 4vw, 2.2rem); margin-top: 20px; width: 85%;"></p>
    </div>

    <div id="overlay-final">
        <div class="cuadro-resultados">
            <h1 style="color: var(--accent-purple); margin: 0; font-size: 2.2rem;">¡RESULTADOS DE HOY!</h1>
            <div class="stat-grid">
                <div class="stat-box">ACIERTOS<span id="res-aciertos" class="stat-val">0</span></div>
                <div class="stat-box">ERRORES<span id="res-errores" class="stat-val">0</span></div>
            </div>
            <div class="stat-box" style="margin-bottom: 20px;">PRECISIÓN TOTAL<span id="res-eficacia" class="stat-val">0%</span></div>
            <p style="font-size: 1.2rem; font-weight: bold; margin-bottom: 25px;">“Juan, reconocer es recordar y recordar te conecta”</p>
            <button class="btn-principal" onpointerdown="location.reload()">REPETIR SESIÓN</button>
        </div>
    </div>
</div>

<script>
    let nivel = 1, ronda = 1, aciertosGlobal = 0, erroresGlobal = 0;
    let rostrosRonda1 = [], objetivosActuales = [];
    let totalRetos = 0;
    
    const pool = Array.from({length: 55}, (_, i) => `rostro${i + 1}.png`);

    const config = {
        1: { n: "Bajo", cant: 3, ensalada: 10 },
        2: { n: "Medio", cant: 5, ensalada: 15 },
        3: { n: "Alto", cant: 7, ensalada: 20 }
    };

    function hablar(t, cb) { 
        window.speechSynthesis.cancel(); 
        const m = new SpeechSynthesisUtterance(t); 
        m.lang = 'es-ES'; m.rate = 0.9; 
        if(cb) m.onend = cb; 
        window.speechSynthesis.speak(m); 
    }

    function iniciarJuego() { prepararNivel(); }

    function prepararNivel() {
        ronda = 1; rostrosRonda1 = [];
        const c = config[nivel];
        document.getElementById('tit-nivel').innerText = "NIVEL " + c.n.toUpperCase();
        document.getElementById('desc-nivel').innerText = "Juan, mira estos rostros. Intenta guardarlos en tu memoria.";
        document.getElementById('pantalla-transicion').style.display = 'flex';
        
        hablar(`Juan, iniciamos el Nivel ${c.n}. Observa bien los rostros.`, () => {
            setTimeout(() => { 
                document.getElementById('pantalla-transicion').style.display = 'none'; 
                flujoRondas(); 
            }, 2000);
        });
    }

    function flujoRondas() {
        let shuffle = [...pool].sort(() => 0.5 - Math.random());
        document.getElementById('rejilla-reconocimiento').style.display = 'none';
        
        if (ronda === 1) {
            objetivosActuales = shuffle.slice(0, config[nivel].cant);
            rostrosRonda1 = [...objetivosActuales];
            mostrarSecuencia(0);
        } else if (ronda === 2) {
            objetivosActuales = shuffle.filter(r => !rostrosRonda1.includes(r)).slice(0, config[nivel].cant);
            mostrarSecuencia(0);
        } else if (ronda === 3) {
            objetivosActuales = [...rostrosRonda1];
            preguntaEvocacion();
        }
        totalRetos += objetivosActuales.length;
    }

    function mostrarSecuencia(idx) {
        if (idx < objetivosActuales.length) {
            const img = document.getElementById('img-target');
            img.src = `mem8/${objetivosActuales[idx]}`;
            document.getElementById('rostro-individual').style.display = 'block';
            document.getElementById('label-guia').innerText = "Memoriza este rostro (" + (idx + 1) + "/" + objetivosActuales.length + ")";
            
            setTimeout(() => {
                document.getElementById('rostro-individual').style.display = 'none';
                setTimeout(() => mostrarSecuencia(idx + 1), 600);
            }, 2500);
        } else {
            faseReconocimiento();
        }
    }

    function faseReconocimiento() {
        document.getElementById('rejilla-reconocimiento').style.display = 'grid';
        document.getElementById('label-guia').innerText = "Juan, ¿cuáles rostros acabas de ver?";
        let distractores = pool.filter(r => !objetivosActuales.includes(r))
                            .sort(() => 0.5 - Math.random())
                            .slice(0, config[nivel].ensalada - objetivosActuales.length);
        generarRejilla([...objetivosActuales, ...distractores]);
        hablar("Marca con tu dedo los rostros que te mostré hace un momento.");
    }

    function preguntaEvocacion() {
        document.getElementById('rejilla-reconocimiento').style.display = 'grid';
        document.getElementById('label-guia').innerText = "¿Cuáles rostros viste en la PRIMERA ronda?";
        let distractores = pool.filter(r => !rostrosRonda1.includes(r))
                            .sort(() => 0.5 - Math.random())
                            .slice(0, config[nivel].ensalada - rostrosRonda1.length);
        generarRejilla([...rostrosRonda1, ...distractores]);
        hablar("Juan, ahora un reto mayor. ¿Cuáles fueron los rostros de la primera ronda?");
    }

    function generarRejilla(lista) {
        const rejilla = document.getElementById('rejilla-reconocimiento');
        rejilla.innerHTML = "";
        let encontradosEnRonda = 0;
        
        lista.sort(() => 0.5 - Math.random()).forEach(src => {
            const card = document.createElement('div');
            card.className = 'cara-card';
            card.innerHTML = `<img src="mem8/${src}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1160/1160358.png'">`;
            
            card.onpointerdown = (e) => {
                e.preventDefault();
                if (objetivosActuales.includes(src)) {
                    if (!card.classList.contains('correct')) {
                        card.classList.add('correct');
                        aciertosGlobal++; encontradosEnRonda++;
                        hablar("¡Muy bien!");
                        if (encontradosEnRonda === objetivosActuales.length) finalizarRonda();
                    }
                } else {
                    if (!card.classList.contains('error')) {
                        card.classList.add('error'); erroresGlobal++;
                        hablar("Ese no era.");
                        setTimeout(() => card.classList.remove('error'), 800);
                    }
                }
            };
            rejilla.appendChild(card);
        });
    }

    function finalizarRonda() {
        setTimeout(() => {
            if (ronda < 3) { ronda++; flujoRondas(); }
            else {
                if (nivel < 3) { nivel++; prepararNivel(); }
                else { mostrarCierre(); }
            }
        }, 1200);
    }

    function mostrarCierre() {
        const eficacia = Math.round((aciertosGlobal / (aciertosGlobal + erroresGlobal)) * 100) || 0;
        
        // Almacenamiento Centralizado
        const dataLog = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Memoria",
            id_sesion: 8,
            aciertos: aciertosGlobal,
            errores: erroresGlobal,
            eficacia: eficacia + "%"
        };
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(dataLog));

        // UI Final
        document.getElementById('res-aciertos').innerText = aciertosGlobal;
        document.getElementById('res-errores').innerText = erroresGlobal;
        document.getElementById('res-eficacia').innerText = eficacia + "%";
        
        document.getElementById('overlay-final').style.display = 'flex';
        hablar("¡Objetivo logrado, Juan! Has hecho un excelente trabajo reconociendo a estas personas.");
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexibilidad Cognitiva - REHABILIDIA</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #CEE5D6; --gold: #FFD700; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: #103A57; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #103A57; height: 50px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        
        #contenedor-juego { flex-grow: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .panel-regla { width: 90%; background: var(--p-purple); color: white; padding: 15px; border-radius: 15px; font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; border: 4px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        #zona-objetos { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 600px; width: 100%; }
        .grid-nivel3 { grid-template-columns: repeat(5, 1fr) !important; }

        .objeto { background: white; border-radius: 12px; padding: 8px; cursor: pointer; border: 3px solid transparent; display: flex; align-items: center; justify-content: center; aspect-ratio: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .objeto img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .seleccionado { opacity: 0.1; pointer-events: none; transform: scale(0.8); }

        /* COTERAPEUTA ESTABLE */
        .area-asistente { width: 100%; background: white; padding: 10px; display: flex; align-items: center; gap: 15px; border-top: 4px solid var(--p-purple); height: 100px; box-sizing: border-box; }
        .avatar-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--p-purple); }
        .burbuja { background: #f0f0f0; padding: 10px; border-radius: 15px; font-size: 1rem; flex: 1; text-align: left; border: 1px solid #ddd; height: 60px; overflow: hidden; }

        #overlay-transicion, #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index:2000; background: rgba(16, 58, 87, 0.98); color: white; padding: 20px; }
        .btn-fin { padding: 15px 40px; background: var(--gold); border:none; border-radius:30px; font-weight:bold; cursor:pointer; font-size: 1.2rem; margin-top: 20px; color: var(--p-purple); }
    </style>
</head>
<body onload="iniciarSesion()">

<header>SESIÓN 2: FLEXIBILIDAD COGNITIVA</header>

<div id="contenedor-juego">
    <div id="panel-regla" class="panel-regla">CARGANDO...</div>
    <div id="zona-objetos"></div>
</div>

<div class="area-asistente">
    <img src="coterapeuta.png" class="avatar-img" onerror="this.src='https://via.placeholder.com/70?text=Asistente'">
    <div class="burbuja" id="texto-asistente">¡Hola Juan! Vamos a empezar.</div>
</div>

<div id="overlay-transicion">
    <h1 style="color: var(--gold); font-size: 3rem;">¡CAMBIO!</h1>
    <p style="font-size: 1.5rem;">Atento Juan, olvida la regla anterior.</p>
</div>

<div id="overlay-final">
    <h1 style="color: var(--gold); font-size: 2.5rem;">¡EXCELENTE!</h1>
    <p id="stats" style="font-size: 1.4rem;"></p>
    <button class="btn-fin" onclick="window.location.href='funcion_sesiones.html'">FINALIZAR</button>
</div>

<script>
    // Configuración
    const niveles = { 1: {est: 12, camb: 2}, 2: {est: 16, camb: 3}, 3: {est: 20, camb: 4} };
    let nivelActual = 1, cambiosRealizados = 0, totalAciertos = 0, totalErrores = 0;
    let reglaK = "", reglaV = "", aciertosEnEstaRegla = 0;

    // Banco de datos (usando tus nombres de archivos exactos)
    const banco = [
        { f: "alicate.png", c: "rojo", t: "herramienta" }, { f: "arandanos.png", c: "azul", t: "fruta" }, { f: "avion.png", c: "gris", t: "transporte" },
        { f: "banano.png", c: "amarillo", t: "fruta" }, { f: "barco.png", c: "blanco", t: "transporte" }, { f: "bate.png", c: "cafe", t: "deporte" },
        { f: "bicicleta.png", c: "rojo", t: "transporte" }, { f: "calcetines.png", c: "blanco", t: "ropa" }, { f: "camion.png", c: "blanco", t: "transporte" },
        { f: "camiseta.png", c: "azul", t: "ropa" }, { f: "cereza.png", c: "rojo", t: "fruta" }, { f: "corazon.png", c: "rojo", t: "forma" },
        { f: "destornillador.png", c: "amarillo", t: "herramienta" }, { f: "elefante.png", c: "gris", t: "animal" }, { f: "extintor.png", c: "rojo", t: "seguridad" },
        { f: "falda.png", c: "azul", t: "ropa" }, { f: "fresa.png", c: "rojo", t: "fruta" }, { f: "gato.png", c: "gris", t: "animal" },
        { f: "globo_azul.png", c: "azul", t: "forma" }, { f: "guitarra.png", c: "cafe", t: "instrumento" }, { f: "martillo.png", c: "cafe", t: "herramienta" },
        { f: "pajaro.png", c: "azul", t: "animal" }, { f: "perro.png", c: "cafe", t: "animal" }, { f: "pina.png", c: "amarillo", t: "fruta" },
        { f: "sandia.png", c: "verde", t: "fruta" }, { f: "tren.png", c: "azul", t: "transporte" }, { f: "uva.png", c: "morado", t: "fruta" }
    ];

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 0.9;
        window.speechSynthesis.speak(m);
        document.getElementById('texto-asistente').innerText = t;
    }

    function iniciarSesion() {
        hablar("Juan, busca lo que te pida. Si cambio la regla, adáptate rápido.");
        setTimeout(cambiarInstruccion, 2500);
    }

    function cambiarInstruccion() {
        document.getElementById('overlay-transicion').style.display = 'none';
        aciertosEnEstaRegla = 0;
        
        const opciones = [
            {n: "cosas rojas", k: "c", v: "rojo"}, {n: "animales", k: "t", v: "animal"},
            {n: "transporte", k: "t", v: "transporte"}, {n: "frutas", k: "t", v: "fruta"},
            {n: "herramientas", k: "t", v: "herramienta"}, {n: "cosas azules", k: "c", v: "azul"}
        ];

        const sel = opciones[Math.floor(Math.random() * opciones.length)];
        reglaK = sel.k; reglaV = sel.v;
        
        document.getElementById('panel-regla').innerText = "BUSCA: " + sel.n.toUpperCase();
        hablar("Ahora busca " + sel.n);
        
        // Si es el inicio del nivel, pintamos. Si es un cambio de regla interno, solo habilitamos.
        if (cambiosRealizados === 0) pintarTablero();
    }

    function pintarTablero() {
        const zona = document.getElementById('zona-objetos');
        zona.innerHTML = "";
        const config = niveles[nivelActual];
        if (nivelActual === 3) zona.classList.add('grid-nivel3');

        // Seleccionamos 5 objetivos y completamos con distractores
        let objs = banco.filter(b => b[reglaK] === reglaV).sort(() => 0.5 - Math.random()).slice(0, 5);
        let dist = banco.filter(b => b[reglaK] !== reglaV).sort(() => 0.5 - Math.random()).slice(0, config.est - objs.length);
        let mezcla = objs.concat(dist).sort(() => 0.5 - Math.random());

        mezcla.forEach(item => {
            const div = document.createElement('div');
            div.className = 'objeto';
            div.innerHTML = `<img src="./fun2/${item.f}" onerror="this.src='https://via.placeholder.com/80?text=IMG'">`;
            div.onclick = () => {
                if (item[reglaK] === reglaV) {
                    totalAciertos++; aciertosEnEstaRegla++;
                    div.classList.add('seleccionado');
                    
                    // Lógica de cambio: a los 2 aciertos, si hay cambios pendientes, cambiamos regla
                    if (aciertosEnEstaRegla === 2 && cambiosRealizados < niveles[nivelActual].camb) {
                        cambiosRealizados++;
                        document.getElementById('overlay-transicion').style.display = 'flex';
                        setTimeout(cambiarInstruccion, 2500);
                    } else {
                        verificarLimpieza();
                    }
                } else {
                    totalErrores++;
                    div.style.borderColor = "red";
                    hablar("Ese no es, intenta con otro.");
                    setTimeout(() => div.style.borderColor = "transparent", 500);
                }
            };
            zona.appendChild(div);
        });
    }

    function verificarLimpieza() {
        // Miramos si quedan objetivos en la pantalla que no estén seleccionados
        const restantes = Array.from(document.querySelectorAll('.objeto:not(.seleccionado)')).filter(div => {
            const imgPath = div.querySelector('img').src.split('/').pop();
            const dato = banco.find(b => b.f === imgPath);
            return dato && dato[reglaK] === reglaV;
        });

        if (restantes.length === 0) {
            if (nivelActual < 3) {
                nivelActual++; cambiosRealizados = 0;
                hablar("¡Bien hecho Juan! Subimos de nivel.");
                setTimeout(cambiarInstruccion, 2000);
            } else {
                document.getElementById('overlay-final').style.display = 'flex';
                document.getElementById('stats').innerText = `Aciertos: ${totalAciertos} | Errores: ${totalErrores}`;
                hablar("Entrenamiento completado. ¡Eres muy flexible!");
            }
        }
    }
</script>
</body>
</html>

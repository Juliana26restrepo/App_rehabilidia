<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexibilidad Avanzada - REHABILIDIA</title>
    <style>
        :root { --p-purple: #4A148C; --s-purple: #AB47BC; --bg: #CEE5D6; --gold: #FFD700; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: #103A57; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #103A57; height: 60px; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; }
        
        #contenedor-juego { flex-grow: 1; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .panel-regla { width: 90%; background: var(--p-purple); color: white; padding: 15px; border-radius: 20px; font-size: 1.4rem; font-weight: bold; margin-bottom: 20px; border: 4px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        #zona-objetos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 450px; width: 100%; }
        
        .objeto { background: white; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; border: 3px solid transparent; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .objeto .emoji { font-size: 3.2rem; }
        .objeto .nombre { font-size: 0.85rem; font-weight: bold; margin-top: 5px; color: #333; }
        .seleccionado { opacity: 0.1; pointer-events: none; transform: scale(0.8); }

        #overlay-transicion, #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index:2000; text-align: center; padding: 25px; }
        #overlay-transicion { background: rgba(74, 20, 140, 0.95); color: white; }
        #overlay-final { background: rgba(16, 58, 87, 0.98); color: white; }
        
        .btn-grande { padding: 18px 45px; background: var(--gold); color: var(--p-purple); border-radius: 50px; font-size: 1.3rem; border:none; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body onload="iniciarJuego()">

<header><span style="font-weight:bold;">SESIÓN 2: FLEXIBILIDAD COGNITIVA</span></header>

<div id="contenedor-juego">
    <div id="panel-regla" class="panel-regla">ESPERA...</div>
    <div id="zona-objetos"></div>
</div>

<div id="overlay-transicion">
    <h1 style="color: var(--gold);">¡CAMBIO DE REGLA!</h1>
    <p style="font-size: 1.5rem;">Juan, respira y prepárate para el siguiente grupo.</p>
</div>

<div id="overlay-final">
    <h1 style="color: var(--gold); font-size: 2.5rem;">ENTRENAMIENTO COMPLETADO</h1>
    <div id="stats" style="font-size: 1.5rem; margin: 20px 0;"></div>
    <p style="font-style: italic; font-size: 1.4rem; color: #CEE5D6;">"Cambiar de plan también es avanzar"</p>
    <button class="btn-grande" onclick="window.location.href='funcion_sesiones.html'">VOLVER AL MENÚ</button>
</div>

<script>
    let aciertos = 0, errores = 0, rondaActual = 1;
    let reglaActual = "", valorObjetivo = "";

    // Banco de datos con categorías LÓGICAS y CLARAS
    const banco = [
        { e: "🍎", n: "Manzana", c: "rojo", t: "Fruta", z: "pequeño" },
        { e: "🍌", n: "Plátano", c: "amarillo", t: "Fruta", z: "pequeño" },
        { e: "🍇", n: "Uvas", c: "morado", t: "Fruta", z: "pequeño" },
        { e: "👕", n: "Camisa", c: "azul", t: "Ropa", z: "grande" },
        { e: "👖", n: "Pantalón", c: "azul", t: "Ropa", z: "grande" },
        { e: "👗", n: "Vestido", c: "rosa", t: "Ropa", z: "grande" },
        { e: "👞", n: "Zapato", c: "cafe", t: "Ropa", z: "pequeño" },
        { e: "🚖", n: "Taxi", c: "amarillo", t: "Vehículo", z: "grande" },
        { e: "🚲", n: "Bici", c: "rojo", t: "Vehículo", z: "grande" },
        { e: "✈️", n: "Avión", c: "blanco", t: "Vehículo", z: "grande" },
        { e: "🧸", n: "Oso", c: "cafe", t: "Juguete", z: "pequeño" },
        { e: "⚽", n: "Balón", c: "blanco", t: "Juguete", z: "grande" },
        { e: "🥄", n: "Cuchara", c: "gris", t: "Cubierto", z: "pequeño" },
        { e: "🔪", n: "Cuchillo", c: "gris", t: "Cubierto", z: "pequeño" },
        { e: "🍴", n: "Tenedor", c: "gris", t: "Cubierto", z: "pequeño" }
    ];

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 0.85;
        window.speechSynthesis.speak(m);
    }

    function iniciarJuego() {
        hablar("Juan, vamos a clasificar objetos por grupos. Presta atención a la regla.");
        setTimeout(lanzarRonda, 2000);
    }

    function lanzarRonda() {
        document.getElementById('overlay-transicion').style.display = 'none';
        
        // Seleccionar regla lógica (Tipo o Color)
        const tiposRegla = ["t", "c"];
        const tipoElegido = tiposRegla[Math.floor(Math.random() * tiposRegla.length)];
        const objetoRef = banco[Math.floor(Math.random() * banco.length)];
        
        reglaActual = tipoElegido;
        valorObjetivo = objetoRef[tipoElegido];

        let nombreRegra = tipoElegido === "t" ? "el grupo: " + valorObjetivo : "el color: " + valorObjetivo;
        document.getElementById('panel-regla').innerText = "BUSCA " + nombreRegra.toUpperCase();
        
        hablar("Ahora busca todos los del " + nombreRegra);
        generarTablero();
    }

    function generarTablero() {
        const zona = document.getElementById('zona-objetos');
        zona.innerHTML = "";
        
        // Mezclamos y sacamos 9 objetos asegurando que haya objetivos y distractores
        let baraja = [...banco].sort(() => Math.random() - 0.5).slice(0, 9);
        
        // Validación: que al menos existan 2 objetivos en pantalla
        const objetivos = baraja.filter(o => o[reglaActual] === valorObjetivo);
        if(objetivos.length < 2) return generarTablero();

        baraja.forEach(obj => {
            const div = document.createElement('div');
            div.className = 'objeto';
            div.innerHTML = `<span class="emoji">${obj.e}</span><span class="nombre">${obj.n}</span>`;
            div.onclick = () => comprobar(obj, div);
            zona.appendChild(div);
        });
    }

    function comprobar(obj, elemento) {
        if(obj[reglaActual] === valorObjetivo) {
            aciertos++;
            elemento.classList.add('seleccionado');
            
            // ¿Quedan más objetivos?
            const faltan = [...document.querySelectorAll('.objeto:not(.seleccionado)')]
                .some(el => {
                    const nombre = el.querySelector('.nombre').innerText;
                    return banco.find(b => b.n === nombre)[reglaActual] === valorObjetivo;
                });

            if(!faltan) {
                rondaActual++;
                if(rondaActual > 5) {
                    finalizar();
                } else {
                    document.getElementById('overlay-transicion').style.display = 'flex';
                    hablar("¡Excelente! Prepárate para el cambio.");
                    setTimeout(lanzarRonda, 3000);
                }
            }
        } else {
            errores++;
            elemento.style.borderColor = "red";
            hablar("Ese no pertenece al grupo, Juan. Sigue buscando.");
            setTimeout(() => elemento.style.borderColor = "transparent", 800);
        }
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        const porc = Math.round((aciertos / (aciertos + errores)) * 100);
        document.getElementById('stats').innerHTML = `Aciertos: ${aciertos} <br> Precisión: ${porc}%`;
        hablar("Muy bien Juan. Has demostrado una gran flexibilidad hoy.");
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexibilidad Cognitiva - REHABILIDIA</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #CEE5D6; --gold: #FFD700; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: #103A57; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #103A57; height: 50px; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; }
        #contenedor-juego { flex-grow: 1; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .panel-regla { width: 90%; background: var(--p-purple); color: white; padding: 15px; border-radius: 15px; font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; border: 4px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #zona-objetos { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 650px; width: 100%; }
        .objeto { background: white; border-radius: 15px; padding: 8px; cursor: pointer; border: 3px solid transparent; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; aspect-ratio: 1; }
        .objeto img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .seleccionado { opacity: 0.1; pointer-events: none; transform: scale(0.8); transition: 0.3s; }
        #overlay-transicion, #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index:2000; background: rgba(16, 58, 87, 0.98); color: white; padding: 20px; }
    </style>
</head>
<body onload="iniciar()">

<header><b>MÓDULO 3: FLEXIBILIDAD COGNITIVA</b></header>

<div id="contenedor-juego">
    <div id="panel-regla" class="panel-regla">PREPARANDO...</div>
    <div id="zona-objetos"></div>
</div>

<div id="overlay-transicion">
    <h1 style="color: var(--gold); font-size: 2.5rem;">¡CAMBIO!</h1>
    <p style="font-size: 1.5rem;">Atento a la nueva instrucción...</p>
</div>

<div id="overlay-final">
    <h1 style="color: var(--gold); font-size: 2.5rem;">¡META CUMPLIDA!</h1>
    <div id="stats" style="font-size: 1.4rem; margin: 20px 0;"></div>
    <button onclick="window.location.href='funcion_sesiones.html'" style="padding: 15px 40px; background: var(--gold); border:none; border-radius:30px; font-weight:bold; cursor:pointer;">FINALIZAR</button>
</div>

<script>
    let aciertos = 0, errores = 0, ronda = 1, cambios = 0;
    let reglaActual = "", valorObjetivo = "", encontradosEnRonda = 0;

    // Base de datos ajustada a tus archivos en /fun2/
    const banco = [
        { f: "fresa.png", c: "rojo", t: "fruta" }, { f: "corazon.png", c: "rojo", t: "forma" }, { f: "extintor.png", c: "rojo", t: "seguridad" },
        { f: "avion.png", c: "blanco", t: "transporte" }, { f: "barco.png", c: "blanco", t: "transporte" }, { f: "tren.png", c: "azul", t: "transporte" },
        { f: "camiseta.png", c: "azul", t: "ropa" }, { f: "pantalones.png", c: "azul", t: "ropa" }, { f: "calcetines.png", c: "blanco", t: "ropa" },
        { f: "cucharon.png", c: "gris", t: "cocina" }, { f: "tenedor.png", c: "gris", t: "cocina" }, { f: "cuchillo.png", c: "gris", t: "cocina" }, { f: "olla.png", c: "gris", t: "cocina" },
        { f: "martillo.png", c: "cafe", t: "herramienta" }, { f: "serrucho.png", c: "gris", t: "herramienta" }, { f: "alicate.png", c: "rojo", t: "herramienta" },
        { f: "perro.png", c: "cafe", t: "animal" }, { f: "gato.png", c: "gris", t: "animal" }, { f: "pajaro.png", c: "azul", t: "animal" },
        { f: "arandanos.png", c: "azul", t: "fruta" }, { f: "mar.png", c: "azul", t: "forma" }, { f: "globo_azul.png", c: "azul", t: "forma" }
    ];

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 0.9;
        window.speechSynthesis.speak(m);
    }

    function iniciar() {
        hablar("Juan, nivel final. Busca los grupos que te pida.");
        setTimeout(nuevaRegla, 2000);
    }

    function nuevaRegla() {
        document.getElementById('overlay-transicion').style.display = 'none';
        encontradosEnRonda = 0;

        const opciones = [
            {n: "utensilios de cocina", k: "t", v: "cocina"},
            {n: "cosas azules", k: "c", v: "azul"},
            {n: "prendas de vestir", k: "t", v: "ropa"},
            {n: "cosas rojas", k: "c", v: "rojo"},
            {n: "animales", k: "t", v: "animal"}
        ];

        let sel = opciones[Math.floor(Math.random() * opciones.length)];
        reglaActual = sel.k;
        valorObjetivo = sel.v;

        document.getElementById('panel-regla').innerText = "BUSCA: " + sel.n.toUpperCase();
        hablar("Ahora busca " + sel.n);
        
        generarTablero();
    }

    function generarTablero() {
        const zona = document.getElementById('zona-objetos');
        zona.innerHTML = "";
        
        // 1. Filtrar los que CUMPLEN la regla
        let correctos = banco.filter(o => o[reglaActual] === valorObjetivo);
        // 2. Mezclarlos y tomar 5 para asegurar que haya bastantes
        correctos = correctos.sort(() => Math.random() - 0.5).slice(0, 5);
        
        // 3. Rellenar con distractores hasta llegar a 16 (nivel difícil)
        let incorrectos = banco.filter(o => o[reglaActual] !== valorObjetivo)
                               .sort(() => Math.random() - 0.5).slice(0, 11);
        
        let mazo = [...correctos, ...incorrectos].sort(() => Math.random() - 0.5);

        mazo.forEach(obj => {
            const div = document.createElement('div');
            div.className = 'objeto';
            div.innerHTML = `<img src="./fun2/${obj.f}">`;
            div.onclick = () => {
                if(obj[reglaActual] === valorObjetivo) {
                    aciertos++;
                    encontradosEnRonda++;
                    div.classList.add('seleccionado');
                    
                    // A los 3 aciertos, forzamos cambio de regla (Flexibilidad)
                    if(encontradosEnRonda === 3 && cambios < 6) {
                        cambios++;
                        document.getElementById('overlay-transicion').style.display = 'flex';
                        setTimeout(nuevaRegla, 2500);
                    }
                } else {
                    errores++;
                    div.style.borderColor = "red";
                    hablar("Ese no es del grupo.");
                    setTimeout(() => div.style.borderColor = "transparent", 600);
                }
            };
            zona.appendChild(div);
        });
    }
</script>
</body>
</html>

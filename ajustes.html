<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes Detallados - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57; --teal-blue: #307B8E; --mughal-green: #366B2B;
            --light-silver: #CEE5D6; --white: #ffffff; --error-red: #d9534f;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); transition: 0.3s; }
        header { background-color: var(--prussian-blue); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .btn-volver { color: white; text-decoration: none; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; padding-bottom: 60px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        h3 { font-size: 0.8rem; margin: 0 0 10px 0; color: var(--teal-blue); text-transform: uppercase; letter-spacing: 1px; }
        .label-txt { font-weight: bold; display: block; margin-bottom: 10px; font-size: 0.95rem; }
        
        input[type="range"] { width: 100%; accent-color: var(--teal-blue); cursor: pointer; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-opt { flex: 1; padding: 12px; border: 2px solid var(--teal-blue); background: white; color: var(--teal-blue); border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-opt.active { background: var(--teal-blue); color: white; }

        /* Estilo especial para botón restaurar */
        .btn-restore { border: 2px solid var(--error-red); color: var(--error-red); background: #fff5f5; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-restore:active { background: var(--error-red); color: white; }

        .item-gestion { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-sw { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider-sw:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider-sw { background-color: var(--mughal-green); }
        input:checked + .slider-sw:before { transform: translateX(22px); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="btn-volver"><i class="fas fa-chevron-left"></i></a>
    <span style="font-weight: bold;">AJUSTES PERSONALIZADOS</span>
</header>

<div class="container" id="app-body">

    <div class="card">
        <span class="label-txt">Tamaño de letra</span>
        <div class="btn-group">
            <button class="btn-opt" id="btn-normal" onclick="setLetra('normal')">Normal</button>
            <button class="btn-opt" id="btn-grande" onclick="setLetra('grande')">Grande</button>
        </div>
    </div>

    <div class="card">
        <span class="label-txt">Brillo de pantalla</span>
        <input type="range" id="range-brillo" min="40" max="150" value="100" oninput="updateFiltros()">
    </div>

    <div class="card">
        <span class="label-txt">Contraste visual</span>
        <input type="range" id="range-contraste" min="50" max="200" value="100" oninput="updateFiltros()">
    </div>

    <div class="card">
        <span class="label-txt">Velocidad de voz</span>
        <div class="btn-group">
            <button class="btn-opt" id="btn-v-lenta" onclick="setVoz('0.6')">Lenta</button>
            <button class="btn-opt" id="btn-v-normal" onclick="setVoz('1.0')">Normal</button>
        </div>
    </div>

    <div class="card">
        <span class="label-txt">Saturación de color</span>
        <input type="range" id="range-saturacion" min="0" max="200" value="100" oninput="updateFiltros()">
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="label-txt" style="margin:0;">Resaltar Texto (Negrilla)</span>
            <label class="switch">
                <input type="checkbox" id="check-negrilla" onchange="setNegrilla(this.checked)">
                <span class="slider-sw"></span>
            </label>
        </div>
    </div>

    <div class="card" style="background: transparent; box-shadow: none; padding: 0;">
        <button class="btn-restore" onclick="restaurarTodo()">
            <i class="fas fa-trash-arrow-up"></i> RESTAURAR CONFIGURACIÓN
        </button>
    </div>

    <div class="card">
        <h3>Gestión y Seguridad</h3>
        <div class="item-gestion">
            <div><i class="fas fa-bell"></i> Notificaciones</div>
            <label class="switch"><input type="checkbox" checked><span class="slider-sw"></span></label>
        </div>
        <div class="item-gestion" onclick="alert('Datos protegidos')">
            <div><i class="fas fa-lock"></i> Privacidad</div>
            <i class="fas fa-chevron-right" style="font-size:0.8rem; color:#ccc;"></i>
        </div>
    </div>

</div>

<script>
    function setLetra(valor) {
        localStorage.setItem('config_tamaño', valor);
        actualizarUI();
    }

    function setVoz(valor) {
        localStorage.setItem('config_voz', valor);
        actualizarUI();
    }

    function setNegrilla(valor) {
        localStorage.setItem('config_negrilla', valor ? 'activo' : 'inactivo');
        actualizarUI();
    }

    function updateFiltros() {
        const b = document.getElementById('range-brillo').value;
        const c = document.getElementById('range-contraste').value;
        const s = document.getElementById('range-saturacion').value;
        
        localStorage.setItem('config_brillo', b);
        localStorage.setItem('config_contraste', c);
        localStorage.setItem('config_saturacion', s);
        
        document.body.style.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
    }

    function restaurarTodo() {
        if(confirm("¿Restablecer todos los ajustes visuales y de voz?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function actualizarUI() {
        const tamaño = localStorage.getItem('config_tamaño') || 'normal';
        const voz = localStorage.getItem('config_voz') || '1.0';
        const negrilla = localStorage.getItem('config_negrilla') || 'inactivo';

        document.getElementById('btn-normal').classList.toggle('active', tamaño === 'normal');
        document.getElementById('btn-grande').classList.toggle('active', tamaño === 'grande');
        document.body.style.fontSize = (tamaño === 'grande') ? '1.2rem' : '1rem';

        document.getElementById('btn-v-lenta').classList.toggle('active', voz === '0.6');
        document.getElementById('btn-v-normal').classList.toggle('active', voz === '1.0');

        const checkN = document.getElementById('check-negrilla');
        checkN.checked = (negrilla === 'activo');
        document.body.style.fontWeight = (negrilla === 'activo') ? 'bold' : 'normal';

        const b = localStorage.getItem('config_brillo') || 100;
        const c = localStorage.getItem('config_contraste') || 100;
        const s = localStorage.getItem('config_saturacion') || 100;
        
        document.getElementById('range-brillo').value = b;
        document.getElementById('range-contraste').value = c;
        document.getElementById('range-saturacion').value = s;
        document.body.style.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
    }

    document.addEventListener('DOMContentLoaded', actualizarUI);
</script>

</body>
</html>

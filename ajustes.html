<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes de Accesibilidad - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57; --teal-blue: #307B8E; --mughal-green: #366B2B;
            --light-silver: #CEE5D6; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); transition: 0.3s; }
        header { background-color: var(--prussian-blue); color: var(--white); padding: 15px; display: flex; align-items: center; gap: 15px; }
        .btn-volver { color: white; text-decoration: none; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; padding-bottom: 50px; }
        
        .card-ajuste { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .titulo-seccion { font-weight: bold; font-size: 0.9rem; color: var(--teal-blue); margin-bottom: 15px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .control-row span { font-size: 0.95rem; font-weight: 500; }

        /* Estilo para botones de opción */
        .btn-group { display: flex; gap: 5px; }
        .btn-group button { border: 1px solid var(--teal-blue); background: white; padding: 5px 12px; border-radius: 8px; cursor: pointer; color: var(--teal-blue); font-weight: bold; }
        .btn-group button.active { background: var(--teal-blue); color: white; }

        /* Estilo para deslizadores (Sliders) */
        input[type="range"] { width: 100%; accent-color: var(--mughal-green); margin-top: 10px; }

        .preview-text { margin-top: 10px; padding: 10px; background: #f9f9f9; border-radius: 10px; text-align: center; border: 1px dashed #ccc; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="btn-volver"><i class="fas fa-chevron-left"></i></a>
    <span style="font-weight: bold;">AJUSTES DE ACCESIBILIDAD</span>
</header>

<div class="container" id="main-container">

    <div class="card-ajuste">
        <span class="titulo-seccion"><i class="fas fa-font"></i> VISUALIZACIÓN Y TEXTO</span>
        
        <div class="control-row">
            <span>Tamaño de letra</span>
            <div class="btn-group">
                <button onclick="ajustarTexto('normal')" id="btn-n">Normal</button>
                <button onclick="ajustarTexto('grande')" id="btn-g">Grande</button>
            </div>
        </div>

        <div class="control-row">
            <span>Espaciado de texto</span>
            <input type="range" min="1" max="5" value="1" oninput="ajustarEspacio(this.value)">
        </div>

        <div class="control-row">
            <span>Resaltar texto</span>
            <input type="checkbox" onchange="resaltarTexto(this.checked)" style="width:20px; height:20px;">
        </div>
    </div>

    <div class="card-ajuste">
        <span class="titulo-seccion"><i class="fas fa-eye"></i> PANTALLA Y SENSIBILIDAD</span>
        
        <div class="control-row">
            <span>Contraste</span>
            <input type="range" min="50" max="200" value="100" oninput="ajustarContraste(this.value)">
        </div>

        <div class="control-row">
            <span>Saturación</span>
            <input type="range" min="0" max="200" value="100" oninput="ajustarSaturacion(this.value)">
        </div>

        <div class="control-row">
            <span>Brillo (Simulado)</span>
            <input type="range" min="30" max="100" value="100" oninput="ajustarBrillo(this.value)">
        </div>
    </div>

    <div class="card-ajuste">
        <span class="titulo-seccion"><i class="fas fa-comment-dots"></i> VOZ DEL COTERAPEUTA</span>
        
        <div class="control-row">
            <span>Volumen</span>
            <input type="range" min="0" max="100" value="80">
        </div>

        <div class="control-row">
            <span>Velocidad de voz</span>
            <div class="btn-group">
                <button onclick="alert('Voz Lenta activada')">Lenta</button>
                <button class="active">Normal</button>
            </div>
        </div>
    </div>

    <div class="preview-text" id="ejemplo-texto">
        Texto de ejemplo para verificar los ajustes.
    </div>

</div>

<script>
    function ajustarTexto(tipo) {
        if(tipo === 'grande') {
            document.body.style.fontSize = "1.3rem";
            document.getElementById('btn-g').classList.add('active');
            document.getElementById('btn-n').classList.remove('active');
        } else {
            document.body.style.fontSize = "1rem";
            document.getElementById('btn-n').classList.add('active');
            document.getElementById('btn-g').classList.remove('active');
        }
    }

    function ajustarEspacio(val) {
        document.body.style.letterSpacing = val + "px";
        document.body.style.lineHeight = (1.5 + val/10);
    }

    function resaltarTexto(check) {
        const ejemplo = document.getElementById('ejemplo-texto');
        if(check) {
            ejemplo.style.fontWeight = "bold";
            ejemplo.style.backgroundColor = "#ffff00"; // Resaltado amarillo
            ejemplo.style.color = "black";
        } else {
            ejemplo.style.fontWeight = "normal";
            ejemplo.style.backgroundColor = "#f9f9f9";
            ejemplo.style.color = "var(--prussian-blue)";
        }
    }

    function ajustarContraste(val) {
        document.body.style.filter = `contrast(${val}%)`;
    }

    function ajustarSaturacion(val) {
        // Esto cambia la saturación de toda la app (útil para hipersensibilidad)
        document.getElementById('main-container').style.filter = `saturate(${val}%)`;
    }

    function ajustarBrillo(val) {
        // Simulación de brillo mediante opacidad del contenedor
        document.getElementById('main-container').style.opacity = val / 100;
    }
</script>

</body>
</html>

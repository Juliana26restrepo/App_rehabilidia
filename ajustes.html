<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes Completos - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57; --teal-blue: #307B8E; --mughal-green: #366B2B;
            --light-silver: #CEE5D6; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); }
        header { background-color: var(--prussian-blue); color: var(--white); padding: 15px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .btn-volver { color: white; text-decoration: none; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; padding-bottom: 60px; }
        .card-ajuste { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        h3 { font-size: 0.9rem; margin: 0 0 15px 0; color: var(--teal-blue); border-bottom: 1px solid #eee; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .control-item { margin-bottom: 18px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: 600; font-size: 0.95rem; }
        
        input[type="range"] { width: 100%; accent-color: var(--teal-blue); cursor: pointer; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn-toggle { flex: 1; padding: 10px; border: 2px solid var(--teal-blue); background: white; color: var(--teal-blue); border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .btn-toggle.active { background: var(--teal-blue); color: white; }

        /* Estilo para links de gestión */
        .link-opcion { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5; cursor: pointer; text-decoration: none; color: inherit; }
        .link-opcion:last-child { border-bottom: none; }
        .link-opcion i.icon-main { width: 25px; color: var(--teal-blue); }
        .flecha { color: #ccc; font-size: 0.8rem; }

        /* Switch */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--mughal-green); }
        input:checked + .slider:before { transform: translateX(22px); }

        .btn-salir { text-align: center; margin-top: 20px; color: #d9534f; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="btn-volver"><i class="fas fa-chevron-left"></i></a>
    <span style="font-weight: bold;">AJUSTES Y CUENTA</span>
</header>

<div class="container" id="global-container">

    <div class="card-ajuste">
        <h3><i class="fas fa-universal-access"></i> Adaptación Visual</h3>
        
        <div class="control-item">
            <div class="label-row"><span>Tamaño de letra</span></div>
            <div class="btn-group">
                <button class="btn-toggle active" id="btnN" onclick="setLetra('normal')">Normal</button>
                <button class="btn-toggle" id="btnG" onclick="setLetra('grande')">Grande</button>
            </div>
        </div>

        <div class="control-item">
            <div class="label-row"><span>Espacio del texto</span></div>
            <input type="range" min="1" max="5" value="1" oninput="setEspacio(this.value)">
        </div>

        <div class="control-item">
            <div class="label-row"><span>Resaltar texto importante</span>
                <label class="switch"><input type="checkbox" onchange="setResaltado(this.checked)"><span class="slider"></span></label>
            </div>
        </div>

        <div class="control-item">
            <div class="label-row"><span>Contraste / Saturación / Brillo</span></div>
            <input type="range" min="50" max="150" value="100" oninput="setFiltros(this.value)" id="sliderFiltros">
            <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#888;">
                <span>Suave</span><span>Intenso</span>
            </div>
        </div>
    </div>

    <div class="card-ajuste">
        <h3><i class="fas fa-headphones"></i> Coterapeuta</h3>
        <div class="control-item">
            <div class="label-row"><span>Volumen de voz</span></div>
            <input type="range" min="0" max="100" value="80">
        </div>
        <div class="control-item">
            <div class="label-row"><span>Velocidad de voz</span></div>
            <div class="btn-group">
                <button class="btn-toggle" onclick="alert('Voz Lenta')">Lenta</button>
                <button class="btn-toggle active" onclick="alert('Voz Normal')">Normal</button>
            </div>
        </div>
    </div>

    <div class="card-ajuste">
        <h3><i class="fas fa-tasks"></i> Gestión de App</h3>
        
        <div class="link-opcion">
            <div style="display:flex; align-items:center;">
                <i class="fas fa-bell icon-main"></i>
                <span>Notificaciones Diarias</span>
            </div>
            <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
        </div>

        <a href="#" class="link-opcion" onclick="alert('Política de Privacidad de Datos REHABILIDIA v1.0')">
            <div><i class="fas fa-lock icon-main"></i><span>Privacidad de datos</span></div>
            <i class="fas fa-chevron-right flecha"></i>
        </a>

        <a href="#" class="link-opcion" onclick="alert('Soporte técnico: rehabilitidia@tesis.com')">
            <div><i class="fas fa-question-circle icon-main"></i><span>Ayuda y Soporte</span></div>
            <i class="fas fa-chevron-right flecha"></i>
        </a>
    </div>

    <div class="btn-salir" onclick="location.href='index.html'"><i class="fas fa-sign-out-alt"></i> CERRAR SESIÓN</div>
</div>

<script>
    const body = document.body;
    const container = document.getElementById('global-container');

    function setLetra(tipo) {
        body.style.fontSize = (tipo === 'grande') ? "1.25rem" : "1rem";
        document.getElementById('btnG').classList.toggle('active', tipo === 'grande');
        document.getElementById('btnN').classList.toggle('active', tipo === 'normal');
    }

    function setEspacio(val) {
        body.style.letterSpacing = (val - 1) + "px";
        body.style.lineHeight = 1.2 + (val * 0.2);
    }

    function setResaltado(checked) {
        body.style.fontWeight = checked ? "700" : "400";
    }

    function setFiltros(val) {
        // Aplica contraste y saturación simultáneamente para simplificar al paciente
        container.style.filter = `contrast(${val}%) saturate(${val}%) brightness(${val/10 + 90}%)`;
    }
</script>

</body>
</html>

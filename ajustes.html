<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57; --teal-blue: #307B8E; --mughal-green: #366B2B;
            --light-silver: #CEE5D6; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); }
        header { background-color: var(--prussian-blue); color: var(--white); padding: 15px; display: flex; align-items: center; gap: 15px; }
        .btn-volver { color: white; text-decoration: none; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; padding-bottom: 50px; }
        .card-ajuste { background: white; border-radius: 15px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        h3 { font-size: 1rem; margin-bottom: 15px; border-bottom: 2px solid var(--light-silver); padding-bottom: 8px; color: var(--teal-blue); }
        
        .control-item { margin-bottom: 20px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        
        /* Controles */
        input[type="range"] { width: 100%; accent-color: var(--teal-blue); cursor: pointer; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-toggle { flex: 1; padding: 10px; border: 2px solid var(--teal-blue); background: white; color: var(--teal-blue); border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-toggle.active { background: var(--teal-blue); color: white; }

        /* Switch */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--mughal-green); }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="btn-volver"><i class="fas fa-chevron-left"></i></a>
    <span style="font-weight: bold;">CONFIGURACIÓN DE APOYO</span>
</header>

<div class="container" id="app-container">

    <div class="card-ajuste">
        <h3><i class="fas fa-font"></i> TEXTO Y LECTURA</h3>
        
        <div class="control-item">
            <div class="label-row"><span>Tamaño de letra</span></div>
            <div class="btn-group">
                <button class="btn-toggle active" id="btnNormal" onclick="setLetra('normal')">Normal</button>
                <button class="btn-toggle" id="btnGrande" onclick="setLetra('grande')">Grande</button>
            </div>
        </div>

        <div class="control-item">
            <div class="label-row"><span>Espacio del texto (Interlineado)</span></div>
            <input type="range" min="1" max="5" value="1" oninput="setEspacio(this.value)">
        </div>

        <div class="control-item">
            <div class="label-row"><span>Resaltar texto importante</span>
                <label class="switch">
                    <input type="checkbox" onchange="setResaltado(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <div class="card-ajuste">
        <h3><i class="fas fa-eye"></i> PANTALLA</h3>
        
        <div class="control-item">
            <div class="label-row"><span>Brillo de pantalla</span></div>
            <input type="range" min="40" max="100" value="100" oninput="setBrillo(this.value)">
        </div>

        <div class="control-item">
            <div class="label-row"><span>Contraste visual</span></div>
            <input type="range" min="50" max="150" value="100" oninput="setContraste(this.value)">
        </div>

        <div class="control-item">
            <div class="label-row"><span>Saturación de color</span></div>
            <input type="range" min="0" max="200" value="100" oninput="setSaturacion(this.value)">
        </div>
    </div>

    <div class="card-ajuste">
        <h3><i class="fas fa-volume-up"></i> COTERAPEUTA (VOZ)</h3>
        
        <div class="control-item">
            <div class="label-row"><span>Volumen del Coterapeuta</span></div>
            <input type="range" min="0" max="100" value="80">
        </div>

        <div class="control-item">
            <div class="label-row"><span>Velocidad de voz</span></div>
            <div class="btn-group">
                <button class="btn-toggle" onclick="alert('Voz Lenta')">Lenta</button>
                <button class="btn-toggle active" onclick="alert('Voz Normal')">Normal</button>
            </div>
        </div>
    </div>

</div>

<script>
    const root = document.getElementById('app-container');

    function setLetra(tipo) {
        if(tipo === 'grande') {
            document.body.style.fontSize = "1.3rem";
            document.getElementById('btnGrande').classList.add('active');
            document.getElementById('btnNormal').classList.remove('active');
        } else {
            document.body.style.fontSize = "1rem";
            document.getElementById('btnNormal').classList.add('active');
            document.getElementById('btnGrande').classList.remove('active');
        }
    }

    function setEspacio(val) {
        document.body.style.lineHeight = 1 + (val * 0.3);
        document.body.style.letterSpacing = (val - 1) + "px";
    }

    function setResaltado(checked) {
        document.body.style.fontWeight = checked ? "bold" : "normal";
    }

    function setBrillo(val) {
        root.style.filter = `brightness(${val}%)`;
    }

    function setContraste(val) {
        document.body.style.filter = `contrast(${val}%)`;
    }

    function setSaturacion(val) {
        root.style.filter = root.style.filter + ` saturate(${val}%)`;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes Personalizados - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57; --teal-blue: #307B8E; --mughal-green: #366B2B;
            --light-silver: #CEE5D6; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); transition: 0.3s; }
        header { background-color: var(--prussian-blue); color: var(--white); padding: 15px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .btn-volver { color: white; text-decoration: none; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; padding-bottom: 60px; }
        .card-ajuste { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        h3 { font-size: 0.85rem; margin: 0 0 15px 0; color: var(--teal-blue); border-bottom: 1px solid #eee; padding-bottom: 5px; text-transform: uppercase; }
        
        .control-item { margin-bottom: 20px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        
        input[type="range"] { width: 100%; accent-color: var(--teal-blue); cursor: pointer; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn-toggle { flex: 1; padding: 10px; border: 2px solid var(--teal-blue); background: white; color: var(--teal-blue); border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-toggle.active { background: var(--teal-blue); color: white; }

        .link-opcion { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5; cursor: pointer; text-decoration: none; color: inherit; }
        .icon-main { width: 25px; color: var(--teal-blue); }

        /* Switch */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--mughal-green); }
        input:checked + .slider:before { transform: translateX(22px); }

        .btn-salir { text-align: center; margin-top: 10px; color: #d9534f; font-weight: bold; cursor: pointer; font-size: 0.9rem; padding: 20px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="btn-volver"><i class="fas fa-chevron-left"></i></a>
    <span style="font-weight: bold;">AJUSTES PERSONALIZADOS</span>
</header>

<div class="container" id="global-container">

    <div class="card-ajuste">
        <h3><i class="fas fa-eye"></i> Pantalla y Visión</h3>
        
        <div class="control-item">
            <div class="label-row"><span>Brillo de pantalla</span></div>
            <input type="range" min="40" max="100" value="100" oninput="setBrillo(this.value)">
        </div>

        <div class="control-item">
            <div class="label-row"><span>Contraste</span></div>
            <input type="range" min="50" max="150" value="100" oninput="setContraste(this.value)">
        </div>

        <div class="control-item">
            <div class="label-row"><span>Saturación</span></div>
            <input type="range" min="0" max="200" value="100" oninput="setSaturacion(this.value)">
        </div>
    </div>

    <div class="card-ajuste">
        <h3><i class="fas fa-cog"></i> Configuración de App</h3>
        
        <div class="link-opcion">
            <div style="display:flex; align-items:center;">
                <i class="fas fa-bell icon-main"></i>
                <span>Notificaciones</span>
            </div>
            <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
        </div>

        <div class="link-opcion" onclick="alert('Tus datos están protegidos bajo la ley de ética profesional.')">
            <div style="display:flex; align-items:center;">
                <i class="fas fa-lock icon-main"></i>
                <span>Privacidad de datos</span>
            </div>
            <i class="fas fa-chevron-right" style="color:#ccc;"></i>
        </div>

        <div class="link-opcion" onclick="alert('Soporte: Escribe a contacto@rehabilitidia.com')">
            <div style="display:flex; align-items:center;">
                <i class="fas fa-question-circle icon-main"></i>
                <span>Ayuda / Soporte</span>
            </div>
            <i class="fas fa-chevron-right" style="color:#ccc;"></i>
        </div>
    </div>

    <div class="btn-salir" onclick="location.href='index.html'"><i class="fas fa-sign-out-alt"></i> CERRAR SESIÓN</div>
</div>

<script>
    // Funciones funcionales para los cambios en tiempo real
    function setBrillo(val) {
        document.getElementById('global-container').style.filter = `brightness(${val}%)`;
    }

    function setContraste(val) {
        document.body.style.filter = `contrast(${val}%)`;
    }

    function setSaturacion(val) {
        document.getElementById('global-container').style.filter = `saturate(${val}%)`;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes Detallados - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57; --teal-blue: #307B8E; --mughal-green: #366B2B;
            --light-silver: #CEE5D6; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); }
        header { background-color: var(--prussian-blue); color: var(--white); padding: 15px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .btn-volver { color: white; text-decoration: none; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; padding-bottom: 60px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        h3 { font-size: 0.8rem; margin: 0 0 10px 0; color: var(--teal-blue); text-transform: uppercase; letter-spacing: 1px; }
        .label-txt { font-weight: bold; display: block; margin-bottom: 10px; font-size: 0.95rem; }
        
        /* Controles */
        input[type="range"] { width: 100%; accent-color: var(--teal-blue); cursor: pointer; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-opt { flex: 1; padding: 12px; border: 2px solid var(--teal-blue); background: white; color: var(--teal-blue); border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-opt.active { background: var(--teal-blue); color: white; }

        /* Estilo para Gestión */
        .item-gestion { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .item-gestion:last-child { border-bottom: none; }
        .item-gestion i { color: var(--teal-blue); width: 25px; }

        /* Switch */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-sw { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider-sw:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider-sw { background-color: var(--mughal-green); }
        input:checked + .slider-sw:before { transform: translateX(22px); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="btn-volver"><i class="fas fa-chevron-left"></i></a>
    <span style="font-weight: bold;">AJUSTES PERSONALIZADOS</span>
</header>

<div class="container" id="app-body">

    <div class="card">
        <span class="label-txt">Tamaño de letra</span>
        <div class="btn-group">
            <button class="btn-opt active" id="btnN" onclick="setLetra('normal')">Normal</button>
            <button class="btn-opt" id="btnG" onclick="setLetra('grande')">Grande</button>
        </div>
    </div>

    <div class="card">
        <span class="label-txt">Volumen del Coterapeuta</span>
        <input type="range" min="0" max="100" value="80">
    </div>

    <div class="card">
        <span class="label-txt">Brillo de pantalla</span>
        <input type="range" min="40" max="100" value="100" oninput="setBrillo(this.value)">
    </div>

    <div class="card">
        <span class="label-txt">Contraste visual</span>
        <input type="range" min="50" max="150" value="100" oninput="setContraste(this.value)">
    </div>

    <div class="card">
        <span class="label-txt">Velocidad de voz</span>
        <div class="btn-group">
            <button class="btn-opt" onclick="alert('Voz Lenta')">Lenta</button>
            <button class="btn-opt active" onclick="alert('Voz Normal')">Normal</button>
        </div>
    </div>

    <div class="card">
        <span class="label-txt">Saturación de color</span>
        <input type="range" min="0" max="200" value="100" oninput="setSaturacion(this.value)">
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="label-txt" style="margin:0;">Resaltar Texto</span>
            <label class="switch"><input type="checkbox" onchange="setResaltado(this.checked)"><span class="slider-sw"></span></label>
        </div>
    </div>

    <div class="card">
        <span class="label-txt">Espacio del Texto</span>
        <input type="range" min="1" max="5" value="1" oninput="setEspacio(this.value)">
    </div>

    <div class="card">
        <h3>Gestión y Seguridad</h3>
        <div class="item-gestion">
            <div><i class="fas fa-bell"></i> Notificaciones</div>
            <label class="switch"><input type="checkbox" checked><span class="slider-sw"></span></label>
        </div>
        <div class="item-gestion" onclick="alert('Tus datos están seguros.')">
            <div><i class="fas fa-lock"></i> Privacidad de datos</div>
            <i class="fas fa-chevron-right" style="font-size:0.8rem; color:#ccc;"></i>
        </div>
        <div class="item-gestion" onclick="alert('Contacto: soporte@rehabilitidia.com')">
            <div><i class="fas fa-question-circle"></i> Ayuda / Soporte</div>
            <i class="fas fa-chevron-right" style="font-size:0.8rem; color:#ccc;"></i>
        </div>
    </div>

</div>

<script>
    function setLetra(t) {
        document.body.style.fontSize = (t === 'grande') ? "1.3rem" : "1rem";
        document.getElementById('btnG').classList.toggle('active', t === 'grande');
        document.getElementById('btnN').classList.toggle('active', t === 'normal');
    }
    function setBrillo(v) { document.getElementById('app-body').style.opacity = v/100; }
    function setContraste(v) { document.body.style.filter = `contrast(${v}%)`; }
    function setSaturacion(v) { document.getElementById('app-body').style.filter = `saturate(${v}%)`; }
    function setResaltado(c) { document.body.style.fontWeight = c ? "bold" : "normal"; }
    function setEspacio(v) { 
        document.body.style.letterSpacing = (v-1)+"px"; 
        document.body.style.lineHeight = 1.2 + (v*0.2);
    }
</script>

</body>
</html>

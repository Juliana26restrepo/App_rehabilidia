<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REHABILIDIA - Panel de Control</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57; --teal-blue: #307B8E; --mughal-green: #366B2B;
            --pastel-blue: #A9D3C5; --light-silver: #CEE5D6; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); }
        
        header { 
            background-color: var(--prussian-blue); color: var(--white); 
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; 
        }
        .paciente-info { text-align: left; font-size: 0.9rem; }
        .paciente-info strong { font-size: 1.2rem; display: block; color: var(--pastel-blue); }
        
        .logo-box img { height: 50px; background: white; padding: 5px; border-radius: 8px; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }

        .guia-card { 
            background: white; border-radius: 20px; padding: 20px; 
            display: flex; align-items: center; gap: 20px; 
            margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .guia-card img { width: 100px; height: auto; }
        .burbuja-texto { background: var(--light-silver); padding: 15px; border-radius: 15px; flex: 1; font-size: 1rem; }

        .grid-dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .btn-card {
            background: white; border-radius: 20px; padding: 35px 10px;
            text-align: center; text-decoration: none; color: var(--prussian-blue);
            font-weight: bold; transition: 0.3s; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 6px solid var(--pastel-blue);
        }
        .btn-card i { font-size: 2.3rem; margin-bottom: 12px; color: var(--teal-blue); }
        .btn-large { grid-column: span 2; background-color: var(--mughal-green); color: white; border-bottom-color: rgba(255,255,255,0.3); }
        .btn-large i { color: white; }
        .btn-card:hover { transform: translateY(-5px); border-bottom-color: var(--teal-blue); }

        /* --- BURBUJA FLOTANTE DE CHAT --- */
        .chat-bubble-float {
            position: fixed; bottom: 30px; right: 25px;
            width: 65px; height: 65px; background: var(--prussian-blue);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.8rem; cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 999;
            transition: 0.3s; border: 3px solid var(--white);
        }
        .chat-bubble-float:active { transform: scale(0.9); }

        /* --- MODAL DEL CHAT --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .chat-modal {
            background: white; width: 92%; max-width: 400px; height: 80vh;
            border-radius: 25px; display: flex; flex-direction: column; position: relative;
            overflow: hidden; animation: popUp 0.3s ease;
        }
        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .chat-header { padding: 12px 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
        #mensajes-box { flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; padding-bottom: 75px; }
        
        /* Mensajes: Juan (Paciente) es Azul, Doctora es Gris */
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 0.9rem; }
        .msg.paciente { align-self: flex-end; background: var(--prussian-blue); color: white; border-bottom-right-radius: 2px; }
        .msg.pro { align-self: flex-start; background: #e0e0e0; color: #333; border-bottom-left-radius: 2px; }

        .input-chat { position: absolute; bottom: 0; width: 100%; background: white; padding: 10px 15px; border-top: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
        .input-pill { flex: 1; background: #f0f2f5; border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; }
        #mensajeInput { flex: 1; border: none; background: transparent; outline: none; }
        .btn-send { background: var(--teal-blue); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        .clip-pop { position: absolute; top: 55px; right: 15px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: none; flex-direction: column; z-index: 100; border: 1px solid #eee; }
        .clip-pop.active { display: flex; }
        .clip-item { padding: 10px 15px; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #f9f9f9; }
    </style>
</head>
<body>

<header>
    <div class="paciente-info">
        <strong>Juan Pérez</strong>
        <span id="txt-fecha">Cargando...</span> | <span id="txt-hora">00:00</span><br>
        📍 Medellín, Colombia
    </div>
    <div class="logo-box">
        <img src="logo.jpg" alt="Logo">
    </div>
</header>

<div class="container">
    <div class="guia-card">
        <img src="COTERAPEUTA.JPG" alt="Coterapeuta">
        <div class="burbuja-texto">¡Hola Juan! ¿cómo te sientes? Cada pequeño esfuerzo cuenta. Empecemos juntos con las actividades de hoy..</div>
    </div>
    <div class="grid-dashboard">
        <a href="ejercicios.html" class="btn-card btn-large"><i class="fas fa-brain"></i> EJERCICIOS</a>
        <a href="videos.html" class="btn-card"><i class="fas fa-play-circle"></i> VIDEOS</a>
        <a href="diario.html" class="btn-card"><i class="fas fa-book-medical"></i> MI DIARIO</a>
        <a href="datos.html" class="btn-card"><i class="fas fa-chart-bar"></i> MIS DATOS</a>
        <a href="ajustes.html" class="btn-card"><i class="fas fa-sliders-h"></i> AJUSTES</a>
    </div>
</div>

<div class="chat-bubble-float" onclick="abrirChat()">
    <i class="fas fa-comment-dots"></i>
</div>

<div id="chatModal" class="modal-overlay">
    <div class="chat-modal">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:10px; flex:1">
                <div style="width:35px; height:35px; background:var(--teal-blue); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white;"><i class="fas fa-user-md"></i></div>
                <strong>Dra. Valderrama</strong>
            </div>
            <div style="display:flex; gap:15px; color:var(--prussian-blue); cursor:pointer;">
                <i class="fas fa-paperclip" onclick="toggleClip(event)"></i>
                <i class="fas fa-times" onclick="cerrarChat()" style="color:#aaa;"></i>
            </div>
        </div>

        <div id="clipMenu" class="clip-pop">
            <div class="clip-item" onclick="alert('Cámara')"><i class="fas fa-camera"></i> Foto</div>
            <div class="clip-item" onclick="alert('Documentos')"><i class="fas fa-file-pdf"></i> Tareas</div>
        </div>

        <div id="mensajes-box"></div>

        <div class="input-chat">
            <i class="fas fa-microphone" style="color:#888; cursor:pointer;" onclick="alert('Grabando...')"></i>
            <div class="input-pill">
                <input type="text" id="mensajeInput" placeholder="Escribe a tu doctora..." autocomplete="off">
            </div>
            <button class="btn-send" onclick="enviarMensaje()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
    const CHAT_KEY = 'chat_rehabilitidia_juan';

    function actualizarReloj() {
        const ahora = new Date();
        document.getElementById('txt-fecha').textContent = ahora.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });
        document.getElementById('txt-hora').textContent = ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(actualizarReloj, 1000);
    actualizarReloj();

    // Lógica del Chat
    function toggleClip(e) {
        e.stopPropagation();
        document.getElementById('clipMenu').classList.toggle('active');
    }

    function abrirChat() {
        document.getElementById('chatModal').style.display = 'flex';
        cargarMensajes();
    }

    function cerrarChat() {
        document.getElementById('chatModal').style.display = 'none';
        document.getElementById('clipMenu').classList.remove('active');
    }

    function cargarMensajes() {
        const box = document.getElementById('mensajes-box');
        const data = JSON.parse(localStorage.getItem(CHAT_KEY)) || [];
        box.innerHTML = data.map(m => `<div class="msg ${m.emisor}">${m.texto}</div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    function enviarMensaje() {
        const input = document.getElementById('mensajeInput');
        if(!input.value.trim()) return;
        const data = JSON.parse(localStorage.getItem(CHAT_KEY)) || [];
        data.push({ emisor: 'paciente', texto: input.value });
        localStorage.setItem(CHAT_KEY, JSON.stringify(data));
        input.value = '';
        cargarMensajes();
    }

    document.getElementById('mensajeInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviarMensaje(); });
    document.addEventListener('click', () => { document.getElementById('clipMenu').classList.remove('active'); });
</script>

<script src="logica_rehabilitacion.js"></script>
</body>
</html>

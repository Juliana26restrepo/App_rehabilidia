<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Diario - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57; --teal-blue: #307B8E; --mughal-green: #366B2B;
            --pastel-blue: #A9D3C5; --light-silver: #CEE5D6; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); }
        header { background-color: var(--prussian-blue); color: var(--white); padding: 15px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .btn-volver { color: white; text-decoration: none; font-size: 1.2rem; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { margin-top: 0; font-size: 1.1rem; color: var(--prussian-blue); text-align: center; }

        .emociones { display: flex; justify-content: space-around; margin: 20px 0; }
        .emocion-btn { 
            border: 2px solid transparent; background: #f8f9fa; border-radius: 15px; 
            padding: 10px; font-size: 2rem; cursor: pointer; transition: 0.3s; 
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .emocion-btn span { font-size: 0.7rem; font-weight: bold; color: #666; }
        .emocion-btn:hover { transform: translateY(-5px); background: var(--pastel-blue); }
        .emocion-btn.active { background: var(--teal-blue); border-color: var(--prussian-blue); }
        .emocion-btn.active span { color: white; }

        textarea { 
            width: 100%; border: 2px solid var(--light-silver); border-radius: 15px; 
            padding: 15px; font-family: inherit; font-size: 1rem; box-sizing: border-box; 
            margin-top: 10px; resize: none; outline: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--teal-blue); }

        .btn-guardar { 
            background: var(--mughal-green); color: white; border: none; 
            width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; 
            font-size: 1.1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(54, 107, 43, 0.3);
        }
        .btn-guardar:active { transform: scale(0.98); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="btn-volver"><i class="fas fa-chevron-left"></i></a>
    <span style="font-weight: bold;">REGISTRO DIARIO</span>
</header>

<div class="container">
    <div class="card">
        <h3>¿Cómo te sientes en este momento?</h3>
        <div class="emociones">
            <button class="emocion-btn" onclick="seleccionar(this)"><span>Muy bien</span>😊</button>
            <button class="emocion-btn" onclick="seleccionar(this)"><span>Normal</span>😐</button>
            <button class="emocion-btn" onclick="seleccionar(this)"><span>Triste</span>😔</button>
            <button class="emocion-btn" onclick="seleccionar(this)"><span>Cansado</span>😫</button>
        </div>
    </div>

    <div class="card">
        <h3>¿Alguna nota sobre hoy?</h3>
        <textarea id="nota" rows="5" placeholder="Escribe aquí si algo te costó trabajo o si lograste algo nuevo..."></textarea>
        <button class="btn-guardar" onclick="guardarDato()">
            <i class="fas fa-save"></i> GUARDAR MI PROGRESO
        </button>
    </div>
</div>

<script>
    function seleccionar(btn) {
        // Quita la selección de los otros botones
        document.querySelectorAll('.emocion-btn').forEach(b => b.classList.remove('active'));
        // Marca el actual
        btn.classList.add('active');
    }

    function guardarDato() {
        // Animación de guardado para la tesis
        const nota = document.getElementById('nota').value;
        alert("¡Registro guardado con éxito! Sigue así, Juan.");
        window.location.href = "index.html";
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario Clínico - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --prussian-blue: #103A57; --teal-blue: #307B8E; --mughal-green: #366B2B; --pastel-blue: #A9D3C5; --light-silver: #CEE5D6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); }
        header { background-color: var(--prussian-blue); color: var(--white); padding: 15px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .btn-volver { color: white; text-decoration: none; font-size: 1.2rem; }
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; padding-bottom: 40px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { margin-top: 0; font-size: 1.1rem; border-bottom: 2px solid var(--light-silver); padding-bottom: 10px; margin-bottom: 15px; color: var(--prussian-blue); }
        .emociones { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .emocion-btn { border: 2px solid #eee; background: none; border-radius: 15px; padding: 10px; font-size: 1.8rem; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; margin: 0 5px; }
        .emocion-btn span { font-size: 0.6rem; font-weight: bold; color: #666; text-transform: uppercase; }
        .emocion-btn.active { background: var(--pastel-blue); border-color: var(--teal-blue); transform: scale(1.05); }
        .sintomas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sintoma-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: #f9f9f9; border-radius: 10px; cursor: pointer; font-size: 0.85rem; border: 1px solid #eee; }
        .sintoma-item input { accent-color: var(--mughal-green); width: 18px; height: 18px; }
        .energia-range { width: 100%; margin: 15px 0; accent-color: var(--teal-blue); cursor: pointer; }
        .labels-energia { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: bold; color: #555; }
        textarea { width: 100%; border: 2px solid var(--light-silver); border-radius: 15px; padding: 15px; font-family: inherit; font-size: 1rem; box-sizing: border-box; resize: none; outline: none; margin-top: 5px; }
        .btn-guardar { background: var(--mughal-green); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 10px rgba(54, 107, 43, 0.3); transition: 0.3s; }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="btn-volver"><i class="fas fa-chevron-left"></i></a>
    <span style="font-weight: bold;">SEGUIMIENTO DIARIO</span>
</header>
<div class="container">
    <div class="card">
        <h3>1. ¿Cómo te sientes hoy?</h3>
        <div class="emociones">
            <button class="emocion-btn" onclick="seleccionar(this)">😊<span>Excelente</span></button>
            <button class="emocion-btn" onclick="seleccionar(this)">😐<span>Bien</span></button>
            <button class="emocion-btn" onclick="seleccionar(this)">😔<span>Bajo</span></button>
            <button class="emocion-btn" onclick="seleccionar(this)">😫<span>Mal</span></button>
        </div>
    </div>
    <div class="card">
        <h3>2. Nivel de energía / Fatiga</h3>
        <div class="labels-energia"><span>Baja</span><span>Alta</span></div>
        <input type="range" class="energia-range" min="1" max="10" value="5" id="rangoEnergia">
        <div id="valorEnergia" style="text-align: center; font-weight: bold; color: var(--teal-blue);">Nivel: 5</div>
    </div>
    <div class="card">
        <h3>3. ¿Has sentido hoy...?</h3>
        <div class="sintomas-grid" id="listaSintomas">
            <label class="sintoma-item"><input type="checkbox" value="Dolor de cabeza"> Dolor de cabeza</label>
            <label class="sintoma-item"><input type="checkbox" value="Mareo"> Mareo</label>
            <label class="sintoma-item"><input type="checkbox" value="Mucho sueño"> Mucho sueño</label>
            <label class="sintoma-item"><input type="checkbox" value="Olvidos"> Olvidos</label>
            <label class="sintoma-item"><input type="checkbox" value="Irritabilidad"> Irritabilidad</label>
            <label class="sintoma-item"><input type="checkbox" value="Ruido molesto"> Ruido molesto</label>
        </div>
    </div>
    <div class="card">
        <h3>4. Notas del paciente</h3>
        <textarea id="nota" rows="4" placeholder="Escribe aquí tus observaciones..."></textarea>
        <br><br>
        <button class="btn-guardar" onclick="finalizarRegistro()">GUARDAR REGISTRO</button>
    </div>
</div>
<script>
    const range = document.getElementById('rangoEnergia');
    range.oninput = function() { document.getElementById('valorEnergia').innerHTML = "Nivel: " + this.value; }

    function seleccionar(btn) {
        document.querySelectorAll('.emocion-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function finalizarRegistro() {
        const emocionActiva = document.querySelector('.emocion-btn.active span')?.innerText || "Normal";
        const nivelEnergia = document.getElementById('rangoEnergia').value;
        const sintomas = Array.from(document.querySelectorAll('#listaSintomas input:checked')).map(cb => cb.value);
        const nota = document.getElementById('nota').value;

        const nuevoRegistro = {
            fecha: new Date().toLocaleString(),
            emocion: emocionActiva,
            energia: nivelEnergia,
            sintomas: sintomas,
            nota: nota
        };

        let historial = JSON.parse(localStorage.getItem('historial_rehabilitidia')) || [];
        historial.push(nuevoRegistro);
        localStorage.setItem('historial_rehabilitidia', JSON.stringify(historial));

        alert("¡Guardado correctamente!");
        window.location.href = "index.html";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sesión 7: Control Inhibitorio - Versión Final</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #F0F4F8; --gold: #FFD700; --navy: #103A57; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px; font-weight: bold; }
        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .panel-superior { display: flex; width: 95%; max-width: 850px; gap: 15px; margin-bottom: 10px; }
        .panel-instruccion { background: white; padding: 15px; border-radius: 15px; border: 4px solid var(--p-purple); flex-grow: 2; font-weight: bold; font-size: 1.3rem; display: flex; align-items: center; justify-content: center; min-height: 100px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #reloj-contenedor { background: #FFF; border: 4px solid var(--navy); border-radius: 15px; width: 80px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; color: #D32F2F; font-weight: 900; }
        .zona-tokens { display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 15px; width: 95%; max-width: 950px; margin: auto; padding: 25px; background: white; border-radius: 20px; min-height: 450px; border: 2px solid #B0BEC5; }
        .token { cursor: pointer; transition: transform 0.2s; position: relative; }
        .circulo { border-radius: 50%; }
        .cuadrado { border-radius: 6px; }
        .triangulo { width: 0 !important; height: 0 !important; background: none !important; border-left: solid transparent; border-right: solid transparent; border-bottom: solid; }
        .grande { width: 75px; height: 75px; }
        .pequeno { width: 42px; height: 42px; }
        .triangulo.grande { border-left-width: 37px; border-right-width: 37px; border-bottom-width: 75px; }
        .triangulo.pequeno { border-left-width: 21px; border-right-width: 21px; border-bottom-width: 42px; }
        .marcado { filter: grayscale(1) opacity(0.3); pointer-events: none; transform: scale(0.8); }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index: 5000; text-align: center; }
        #overlay-nivel { background: var(--p-purple); color: white; }
        #overlay-final { background: var(--navy); color: white; }
        .btn-ready { background: var(--gold); border: none; padding: 18px 45px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.4rem; color: var(--navy); margin-top: 20px; }
    </style>
</head>
<body onload="iniciarSesion()">

<header>SESIÓN 7: REHABILITACIÓN COGNITIVA</header>

<div id="contenedor-juego">
    <div class="panel-superior">
        <div id="panel-instruccion" class="panel-instruccion">Esperando instrucción...</div>
        <div id="reloj-contenedor">10</div>
    </div>
    <div id="status-ronda" style="font-weight: bold; margin: 5px;"></div>
    <div id="pantalla-juego" class="zona-tokens"></div>
</div>

<div id="overlay-nivel" class="overlay">
    <h1 id="lvl-titulo" style="font-size: 4rem; color: var(--gold);"></h1>
    <p id="lvl-mensaje" style="font-size: 1.8rem;"></p>
    <button class="btn-ready" onclick="cerrarOverlay()">¡EMPEZAR!</button>
</div>

<div id="overlay-final" class="overlay">
    <h1 style="color: var(--gold); font-size: 3rem;">SESIÓN COMPLETADA</h1>
    <div id="resumen-stats" style="font-size: 2rem; margin: 15px;"></div>
    <div id="porcentaje-caja" style="font-size: 4rem; font-weight: 900; color: var(--gold); border: 5px solid var(--gold); padding: 10px 40px; border-radius: 20px;">0%</div>
    <button class="btn-ready" onclick="window.location.reload()">REPETIR</button>
</div>

<script>
    const colores = [
        {n: "Rojo", c: "#FF0000"}, {n: "Azul", c: "#0000FF"}, {n: "Verde", c: "#008000"},
        {n: "Amarillo", c: "#FFFF00"}, {n: "Morado", c: "#800080"}, {n: "Naranja", c: "#FFA500"},
        {n: "Café", c: "#8B4513"}, {n: "Rosado", c: "#FFC0CB"}, {n: "Negro", c: "#000000"}
    ];

    let nivel = 1, ronda = 1, aciertosTotales = 0, erroresTotales = 0;
    let objetivosIds = [], timer = null, segundos = 10, inhibicionActiva = false;

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        if (callback) m.onend = callback;
        window.speechSynthesis.speak(m);
    }

    function iniciarSesion() { mostrarOverlay("NIVEL 1", "Toca las figuras indicadas."); }

    function mostrarOverlay(tit, msj) {
        document.getElementById('lvl-titulo').innerText = tit;
        document.getElementById('lvl-mensaje').innerText = msj;
        document.getElementById('overlay-nivel').style.display = 'flex';
        hablar(tit + ". " + msj);
    }

    function cerrarOverlay() {
        document.getElementById('overlay-nivel').style.display = 'none';
        cargarRonda();
    }

    function iniciarTiempo() {
        clearInterval(timer);
        segundos = 10;
        document.getElementById('reloj-contenedor').innerText = segundos;
        timer = setInterval(() => {
            segundos--;
            document.getElementById('reloj-contenedor').innerText = segundos;
            if(segundos <= 0) {
                if(inhibicionActiva) aciertosTotales++;
                else erroresTotales += objetivosIds.length;
                avanzar();
            }
        }, 1000);
    }

    function cargarRonda() {
        clearInterval(timer);
        const pantalla = document.getElementById('pantalla-juego');
        pantalla.innerHTML = "";
        let pool = [];
        let numTotal = (nivel === 1) ? 14 : (nivel === 2) ? 20 : 30;
        let maxRondas = (nivel === 3) ? 6 : 3;
        let textoRegla = "";

        // Nivel 1: Color y Forma
        if(nivel === 1) {
            let fLabel = Math.random() > 0.5 ? "cuadrados" : "círculos";
            let fKey = fLabel === "cuadrados" ? "cuadrado" : "circulo";
            let c1 = colores[Math.floor(Math.random()*4)];
            let c2 = colores[4 + Math.floor(Math.random()*4)];
            textoRegla = `Toca los ${fLabel} ${c1.n}s y los ${fLabel} ${c2.n}s.`;
            for(let i=0; i<3; i++) pool.push({id: Math.random(), forma: fKey, color: c1, tamano: 'grande', target: true});
            for(let i=0; i<3; i++) pool.push({id: Math.random(), forma: fKey, color: c2, tamano: 'pequeno', target: true});
        } 
        // Nivel 2: Condicional e Inhibición
        else if(nivel === 2) {
            if(ronda === 2) {
                textoRegla = "¡ATENCIÓN! Si hay un triángulo Negro, NO TOQUES NADA.";
                pool.push({id: 99, forma: 'triangulo', color: colores.find(c=>c.n==='Negro'), tamano: 'grande', target: false});
                inhibicionActiva = true;
            } else {
                let cAccion = colores[Math.floor(Math.random()*colores.length)];
                textoRegla = `Si hay un triángulo café, toca todos los círculos ${cAccion.n}s.`;
                pool.push({id: 98, forma: 'triangulo', color: colores.find(c=>c.n==='Café'), tamano: 'grande', target: false});
                for(let i=0; i<4; i++) pool.push({id: Math.random(), forma: 'circulo', color: cAccion, tamano: 'grande', target: true});
            }
        } 
        // Nivel 3: Mixto
        else {
            let rIdx = ronda % 3;
            if(rIdx === 1) {
                textoRegla = "Toca los cuadrados verdes GRANDES, círculos naranjas PEQUEÑOS y triángulos amarillos.";
                for(let i=0; i<3; i++) pool.push({id: Math.random(), forma: 'cuadrado', color: colores.find(c=>c.n==='Verde'), tamano: 'grande', target: true});
                for(let i=0; i<3; i++) pool.push({id: Math.random(), forma: 'circulo', color: colores.find(c=>c.n==='Naranja'), tamano: 'pequeno', target: true});
                for(let i=0; i<3; i++) pool.push({id: Math.random(), forma: 'triangulo', color: colores.find(c=>c.n==='Amarillo'), tamano: 'grande', target: true});
            } else if(rIdx === 2) {
                textoRegla = "Si hay triángulos azules, NO TOQUES los círculos verdes.";
                pool.push({id: 97, forma: 'triangulo', color: colores.find(c=>c.n==='Azul'), tamano: 'grande', target: false});
                for(let i=0; i<4; i++) pool.push({id: Math.random(), forma: 'circulo', color: colores.find(c=>c.n==='Verde'), tamano: 'grande', target: false});
                inhibicionActiva = true;
            } else {
                textoRegla = "Toca solo los triángulos pequeños rosados y los cuadrados grandes negros.";
                for(let i=0; i<3; i++) pool.push({id: Math.random(), forma: 'triangulo', color: colores.find(c=>c.n==='Rosado'), tamano: 'pequeno', target: true});
                for(let i=0; i<3; i++) pool.push({id: Math.random(), forma: 'cuadrado', color: colores.find(c=>c.n==='Negro'), tamano: 'grande', target: true});
            }
        }

        // Rellenar tablero
        while(pool.length < numTotal) {
            pool.push({id: Math.random(), forma: ['circulo','cuadrado','triangulo'][Math.floor(Math.random()*3)], color: colores[Math.floor(Math.random()*colores.length)], tamano: Math.random() > 0.5 ? 'grande' : 'pequeno', target: false});
        }

        // ESCANEO DE SEGURIDAD: Validar cada pieza contra la regla
        pool.forEach(p => {
            if(nivel === 1) {
                let fLabel = textoRegla.includes("cuadrados") ? "cuadrado" : "circulo";
                if(p.forma === fLabel && (textoRegla.includes(p.color.n))) p.target = true;
            } else if(nivel === 2 && !inhibicionActiva) {
                let colorAcc = textoRegla.split(" ").pop().replace("s.","");
                if(p.forma === 'circulo' && p.color.n === colorAcc) p.target = true;
            } else if(nivel === 3 && !inhibicionActiva) {
                if(textoRegla.includes("verdes GRANDES")) {
                   if((p.forma==='cuadrado' && p.color.n==='Verde' && p.tamano==='grande') || (p.forma==='circulo' && p.color.n==='Naranja' && p.tamano==='pequeno') || (p.forma==='triangulo' && p.color.n==='Amarillo')) p.target = true;
                } else {
                   if((p.forma==='triangulo' && p.color.n==='Rosado' && p.tamano==='pequeno') || (p.forma==='cuadrado' && p.color.n==='Negro' && p.tamano==='grande')) p.target = true;
                }
            }
        });

        pool.sort(() => Math.random() - 0.5);
        objetivosIds = pool.filter(p => p.target).map(p => p.id);
        
        document.getElementById('panel-instruccion').innerText = textoRegla;
        document.getElementById('status-ronda').innerText = `Nivel ${nivel} - Intento ${ronda}/${maxRondas}`;

        pool.forEach(f => {
            const div = document.createElement('div');
            div.className = `token ${f.forma} ${f.tamano}`;
            if(f.forma === 'triangulo') div.style.borderBottomColor = f.color.c;
            else div.style.backgroundColor = f.color.c;
            div.onclick = () => {
                if(inhibicionActiva) {
                    if(nivel === 2 || (nivel === 3 && f.color.n === 'Verde')) {
                        erroresTotales++; hablar("¡No debías tocar!"); avanzar();
                    } else { div.classList.add('marcado'); }
                } else if(objetivosIds.includes(f.id)) {
                    div.classList.add('marcado');
                    objetivosIds = objetivosIds.filter(id => id !== f.id);
                    aciertosTotales++;
                    if(objetivosIds.length === 0) avanzar();
                } else { erroresTotales++; hablar("Esa no."); }
            };
            pantalla.appendChild(div);
        });

        // REGLA DE TIEMPO: Hablar primero, cronómetro después
        hablar(textoRegla, iniciarTiempo);
    }

    function avanzar() {
        clearInterval(timer);
        let maxRondas = (nivel === 3) ? 6 : 3;
        if(ronda < maxRondas) { ronda++; setTimeout(cargarRonda, 1000); }
        else if(nivel < 3) { nivel++; ronda = 1; mostrarOverlay("NIVEL " + nivel, "Siguiente fase."); }
        else { finalizar(); }
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        let total = aciertosTotales + erroresTotales;
        let porc = total > 0 ? Math.round((aciertosTotales/total)*100) : 0;
        document.getElementById('resumen-stats').innerText = `Aciertos: ${aciertosTotales} | Errores: ${erroresTotales}`;
        document.getElementById('porcentaje-caja').innerText = porc + "%";
        hablar("Sesión terminada.");
    }
</script>
</body>
</html>

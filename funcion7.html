<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 7: Token Test e Inhibición - REHABILIDIA</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #F8F9FA; --navy: #103A57; --gold: #FFD700; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px; font-weight: bold; }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 10px; }
        
        .panel-instruccion { background: white; padding: 15px; border-radius: 15px; border: 4px solid var(--p-purple); width: 90%; max-width: 700px; margin-bottom: 10px; font-weight: bold; font-size: 1.2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); min-height: 60px; display: flex; align-items: center; justify-content: center; }

        .zona-tokens { 
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
            gap: 15px; width: 95%; max-width: 900px; margin: auto; padding: 20px;
            background: #ffffff; border-radius: 20px; min-height: 400px; border: 2px dashed #ccc;
        }

        /* Figuras */
        .token { cursor: pointer; transition: transform 0.2s; position: relative; box-sizing: border-box; }
        .token:active { transform: scale(0.9); }
        .circulo { border-radius: 50%; }
        .cuadrado { border-radius: 5px; }
        .triangulo { 
            width: 0; height: 0; background: none !important;
            border-left: solid transparent; border-right: solid transparent;
            border-bottom: solid; 
        }
        
        /* Tamaños */
        .grande { width: 70px; height: 70px; }
        .pequeno { width: 35px; height: 35px; }
        .triangulo.grande { border-left-width: 35px; border-right-width: 35px; border-bottom-width: 70px; }
        .triangulo.pequeno { border-left-width: 18px; border-right-width: 18px; border-bottom-width: 35px; }

        .marcado { filter: brightness(0.4); border: 4px solid var(--gold); pointer-events: none; }

        #overlay-nivel, #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index: 3000; padding: 20px; text-align: center; }
        #overlay-nivel { background: rgba(74, 20, 140, 0.98); color: white; }
        #overlay-final { background: rgba(16, 58, 87, 0.98); color: white; }
        .btn-finalizar { background: var(--gold); border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; color: var(--navy); font-size: 1.2rem; }
    </style>
</head>
<body onload="iniciarSesion()">

<header>SESIÓN 7: CONTROL INHIBITORIO (TOKEN TEST)</header>

<div id="contenedor-juego">
    <div id="panel-instruccion" class="panel-instruccion">Cargando...</div>
    <div id="status-ronda" style="font-weight: bold; margin: 5px;"></div>
    <div id="pantalla-juego" class="zona-tokens"></div>
</div>

<div id="overlay-nivel">
    <h1 id="lvl-titulo" style="color: var(--gold); font-size: 3rem;">NIVEL 1</h1>
    <p id="lvl-mensaje" style="font-size: 1.5rem;"></p>
</div>

<div id="overlay-final">
    <h1 style="color: var(--gold);">RESULTADOS</h1>
    <div id="resumen-stats" style="font-size: 1.2rem; color: white; line-height: 1.6;"></div>
    <p style="font-size: 1.3rem; font-weight: bold; margin: 20px;">"Controlar tus impulsos te hace dueño de tus decisiones."</p>
    <button class="btn-finalizar" onclick="window.location.href='funcion_sesiones.html'">VOLVER</button>
</div>

<script>
    const misColores = [
        {n:"Rojo", c:"#FF0000"}, {n:"Verde", c:"#008000"}, {n:"Azul", c:"#0000FF"}, {n:"Amarillo", c:"#FFFF00"}, {n:"Naranja", c:"#FFA500"},
        {n:"Morado", c:"#800080"}, {n:"Rosa", c:"#FFC0CB"}, {n:"Negro", c:"#000000"}, {n:"Blanco", c:"#FFFFFF"}, {n:"Gris", c:"#808080"},
        {n:"Turquesa", c:"#40E0D0"}, {n:"Celeste", c:"#87CEEB"}, {n:"Azul marino", c:"#000080"}, {n:"Verde oliva", c:"#808000"}, {n:"Mostaza", c:"#FFDB58"},
        {n:"Coral", c:"#FF7F50"}, {n:"Salmón", c:"#FA8072"}, {n:"Beige", c:"#F5F5DC"}, {n:"Lavanda", c:"#E6E6FA"}, {n:"Fucsia", c:"#FF00FF"},
        {n:"Dorado", c:"#FFD700"}, {n:"Plateado", c:"#C0C0C0"}, {n:"Marrón", c:"#8B4513"}, {n:"Vino tinto", c:"#800000"}, {n:"Verde menta", c:"#98FF98"},
        {n:"Azul petróleo", c:"#003366"}, {n:"Lila", c:"#C8A2C8"}, {n:"Terracota", c:"#E2725B"}, {n:"Verde esmeralda", c:"#50C878"}, {n:"Azul cielo", c:"#00BFFF"}
    ];

    let nivel = 1, ronda = 1;
    let aciertos = 0, errores = 0;
    let objetivosActuales = [];

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 0.85;
        window.speechSynthesis.speak(m);
    }

    function iniciarSesion() {
        hablar("Bienvenido Juan. Escucha con atención y toca solo lo que se te pida. No te apresures.");
        cargarRonda();
    }

    function cargarRonda() {
        const pantalla = document.getElementById('pantalla-juego');
        const instruccion = document.getElementById('panel-instruccion');
        pantalla.innerHTML = "";
        objetivosActuales = [];

        let numFiguras = (nivel === 1) ? 10 : (nivel === 2) ? 15 : 20;
        let pool = [];

        // Crear figuras
        for(let i=0; i<numFiguras; i++) {
            let color = misColores[Math.floor(Math.random()*misColores.length)];
            let forma = (nivel === 1) ? (Math.random()>0.5 ? 'circulo':'cuadrado') : (['circulo','cuadrado','triangulo'][Math.floor(Math.random()*3)]);
            let tamano = (nivel < 3) ? 'grande' : (Math.random()>0.5 ? 'grande' : 'pequeno');
            pool.push({id: i, color: color, forma: forma, tamano: tamano});
        }

        // Definir Regla
        let textoRegla = "";
        let targets = [];

        if (nivel === 1) {
            let c = pool[Math.floor(Math.random()*pool.length)];
            textoRegla = `Toca todos los ${c.forma === 'circulo' ? 'círculos' : 'cuadrados'} de color ${c.color.n}.`;
            targets = pool.filter(f => f.forma === c.forma && f.color.n === c.color.n);
        } else if (nivel === 2) {
            let hayTriangulo = pool.some(f => f.forma === 'triangulo' && f.color.n === 'Verde');
            if (hayTriangulo) {
                textoRegla = "Como hay un triángulo verde, toca los círculos amarillos.";
                targets = pool.filter(f => f.forma === 'circulo' && f.color.n === 'Amarillo');
            } else {
                textoRegla = "No hay triángulos verdes, toca los cuadrados azules.";
                targets = pool.filter(f => f.forma === 'cuadrado' && f.color.n === 'Azul');
            }
        } else {
            // Nivel 3: Tamaño e inhibición
            textoRegla = "Toca los círculos pequeños, pero solo si NO hay triángulos negros.";
            let hayTriNegro = pool.some(f => f.forma === 'triangulo' && f.color.n === 'Negro');
            if (hayTriNegro) {
                textoRegla = "Hay triángulos negros, así que toca solo los cuadrados grandes rojos.";
                targets = pool.filter(f => f.forma === 'cuadrado' && f.tamano === 'grande' && f.color.n === 'Rojo');
            } else {
                targets = pool.filter(f => f.forma === 'circulo' && f.tamano === 'pequeno');
            }
        }

        // Si no hay targets por azar, reintentar generación
        if (targets.length === 0) { cargarRonda(); return; }

        instruccion.innerText = textoRegla;
        hablar(textoRegla);
        objetivosActuales = targets.map(t => t.id);
        document.getElementById('status-ronda').innerText = `Ronda ${ronda}/3 - Nivel ${nivel}`;

        pool.forEach(f => {
            const el = document.createElement('div');
            el.className = `token ${f.forma} ${f.tamano}`;
            if(f.forma === 'triangulo') el.style.borderBottomColor = f.color.c;
            else el.style.backgroundColor = f.color.c;

            el.onclick = () => {
                if(objetivosActuales.includes(f.id)) {
                    el.classList.add('marcado');
                    objetivosActuales = objetivosActuales.filter(id => id !== f.id);
                    aciertos++;
                    if(objetivosActuales.length === 0) avanzar();
                } else {
                    errores++;
                    hablar("Esa no es. Escucha la regla de nuevo.");
                }
            };
            pantalla.appendChild(el);
        });
    }

    function avanzar() {
        if (ronda < 3) {
            ronda++;
            hablar("¡Muy bien!");
            setTimeout(cargarRonda, 1500);
        } else if (nivel < 3) {
            nivel++; ronda = 1;
            mostrarCambioNivel();
        } else {
            finalizar();
        }
    }

    function mostrarCambioNivel() {
        const overlay = document.getElementById('overlay-nivel');
        document.getElementById('lvl-titulo').innerText = "NIVEL " + nivel;
        document.getElementById('lvl-mensaje').innerText = nivel === 2 ? "Aparecen triángulos y condiciones." : "Cuidado con los tamaños y las trampas.";
        overlay.style.display = 'flex';
        hablar(document.getElementById('lvl-mensaje').innerText);
        setTimeout(() => { overlay.style.display = 'none'; cargarRonda(); }, 3500);
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        let total = aciertos + errores;
        let porc = Math.round((aciertos / total) * 100) || 0;
        document.getElementById('resumen-stats').innerHTML = `Aciertos: ${aciertos}<br>Errores: ${errores}<br>Precisión: ${porc}%`;
        hablar("Excelente trabajo Juan. Controlar tus impulsos te hace dueño de tus decisiones.");
    }
</script>
</body>
</html>

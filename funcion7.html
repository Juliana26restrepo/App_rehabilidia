<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 7: Control Inhibitorio Pro</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #F0F4F8; --gold: #FFD700; --navy: #103A57; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px; font-weight: bold; }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 15px; }
        .panel-superior { display: flex; width: 95%; max-width: 850px; gap: 15px; margin-bottom: 10px; }
        .panel-instruccion { background: white; padding: 15px; border-radius: 15px; border: 4px solid var(--p-purple); flex-grow: 2; font-weight: bold; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; min-height: 95px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        #reloj-contenedor { background: #FFF; border: 4px solid var(--navy); border-radius: 15px; width: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #tiempo-texto { font-size: 2.2rem; color: #D32F2F; font-weight: 900; }

        .zona-tokens { 
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
            gap: 15px; width: 95%; max-width: 950px; margin: auto; padding: 25px;
            background: white; border-radius: 20px; min-height: 450px; border: 2px solid #B0BEC5;
        }

        .token { cursor: pointer; transition: transform 0.2s; position: relative; }
        .token:active { transform: scale(0.9); }
        .circulo { border-radius: 50%; }
        .cuadrado { border-radius: 6px; }
        
        /* Triángulo Real */
        .triangulo { 
            width: 0; height: 0; background: none !important; 
            border-left: solid transparent; border-right: solid transparent; border-bottom: solid; 
        }
        .grande { width: 80px; height: 80px; }
        .pequeno { width: 45px; height: 45px; }
        .triangulo.grande { border-left-width: 40px; border-right-width: 40px; border-bottom-width: 80px; }
        .triangulo.pequeno { border-left-width: 22px; border-right-width: 22px; border-bottom-width: 45px; }

        .marcado { filter: grayscale(1) brightness(0.3); opacity: 0.4; pointer-events: none; transform: scale(0.8); }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index: 5000; text-align: center; }
        #overlay-nivel { background: var(--p-purple); color: white; }
        #overlay-final { background: var(--navy); color: white; }
        .lvl-banner { font-size: 5rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 4px 4px 0px #000; }
        .btn-ready { background: var(--gold); border: none; padding: 20px 50px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.5rem; color: var(--navy); margin-top: 20px; }
    </style>
</head>
<body onload="iniciarSesion()">

<header>SESIÓN 7: CONTROL INHIBITORIO</header>

<div id="contenedor-juego">
    <div class="panel-superior">
        <div id="panel-instruccion" class="panel-instruccion">Cargando...</div>
        <div id="reloj-contenedor">
            <span style="font-size: 0.7rem; font-weight: 900;">TIEMPO</span>
            <span id="tiempo-texto">10</span>
        </div>
    </div>
    <div id="status-ronda" style="font-weight: bold; margin: 5px; font-size: 1.2rem;"></div>
    <div id="pantalla-juego" class="zona-tokens"></div>
</div>

<div id="overlay-nivel" class="overlay">
    <h1 class="lvl-banner" id="lvl-titulo">NIVEL 1</h1>
    <p id="lvl-mensaje" style="font-size: 1.8rem; max-width: 80%;"></p>
    <button class="btn-ready" onclick="cerrarOverlay()">¡EMPEZAR!</button>
</div>

<div id="overlay-final" class="overlay">
    <h1 style="color: var(--gold); font-size: 3rem;">RESULTADOS TOTALES</h1>
    <div id="resumen-stats" style="font-size: 2rem; margin: 15px;"></div>
    <div id="porcentaje-caja" style="font-size: 4rem; font-weight: 900; color: var(--gold); border: 5px solid var(--gold); padding: 10px 30px; border-radius: 20px;">0%</div>
    <button class="btn-ready" onclick="window.location.reload()">REPETIR SESIÓN</button>
</div>

<script>
    const colores = [
        {n: "Amarillo", c: "#FFFF00"}, {n: "Morado", c: "#800080"}, {n: "Azul", c: "#0000FF"},
        {n: "Rojo", c: "#FF0000"}, {n: "Verde", c: "#008000"}, {n: "Negro", c: "#000000"},
        {n: "Café", c: "#8B4513"}, {n: "Rosado", c: "#FFC0CB"}, {n: "Naranja", c: "#FFA500"}
    ];

    let nivel = 1, ronda = 1;
    let aciertos = 0, errores = 0, totalPuntosPosibles = 0;
    let objetivosActuales = [];
    let timer = null, segundos = 10, inhibicionActiva = false;
    let ultimaRegla = "";

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 1.0;
        window.speechSynthesis.speak(m);
    }

    function iniciarSesion() {
        mostrarOverlay("NIVEL 1", "Toca las figuras que te pida lo más rápido posible.");
    }

    function mostrarOverlay(tit, msj) {
        document.getElementById('lvl-titulo').innerText = tit;
        document.getElementById('lvl-mensaje').innerText = msj;
        document.getElementById('overlay-nivel').style.display = 'flex';
        hablar(tit + ". " + msj);
    }

    function cerrarOverlay() {
        document.getElementById('overlay-nivel').style.display = 'none';
        cargarRonda();
    }

    function cargarRonda() {
        clearInterval(timer);
        segundos = 10;
        inhibicionActiva = false;
        document.getElementById('tiempo-texto').innerText = segundos;
        const pantalla = document.getElementById('pantalla-juego');
        pantalla.innerHTML = "";

        let pool = [];
        let numFigs = (nivel === 1) ? 12 : (nivel === 2) ? 18 : 24;
        let maxRondas = (nivel === 3) ? 6 : 3;

        // Generar pool base
        for(let i=0; i<numFigs; i++){
            pool.push({
                id: i,
                color: colores[Math.floor(Math.random()*colores.length)],
                forma: (['circulo','cuadrado','triangulo'][Math.floor(Math.random()*3)]),
                tamano: (nivel < 3) ? 'grande' : (Math.random() > 0.5 ? 'grande' : 'pequeno')
            });
        }

        let textoRegla = "";
        let targets = [];

        // LÓGICA DE NIVELES PEDIDA
        if(nivel === 1) {
            let col1 = colores[Math.floor(Math.random()*colores.length)];
            let col2 = colores[(colores.indexOf(col1)+2)%colores.length];
            let f1 = ['cuadrado','circulo'][Math.floor(Math.random()*2)];
            // Asegurar piezas
            for(let k=0; k<3; k++){ pool[k].forma = f1; pool[k].color = col1; pool[k+3].forma = f1; pool[k+3].color = col2; }
            textoRegla = `Toca todos los ${f1}s ${col1.n}s y ${col2.n}s.`;
            targets = pool.filter(f => f.forma === f1 && (f.color.n === col1.n || f.color.n === col2.n));
        } 
        else if(nivel === 2) {
            // Reglas condicionales que no se repitan
            let reglasN2 = [
                {t: "Si hay un triángulo Amarillo, toca los cuadrados Azules.", f: (p)=>{
                    p[0].forma='triangulo'; p[0].color=colores.find(c=>c.n==="Amarillo");
                    for(let k=1; k<4; k++){ p[k].forma='cuadrado'; p[k].color=colores.find(c=>c.n==="Azul"); }
                    return p.filter(f => f.forma==='cuadrado' && f.color.n==='Azul');
                }},
                {t: "Si NO hay círculos negros, toca los cuadrados verdes.", f: (p)=>{
                    p = p.filter(f => !(f.forma==='circulo' && f.color.n==='Negro'));
                    for(let k=0; k<4; k++){ p[k].forma='cuadrado'; p[k].color=colores.find(c=>c.n==="Verde"); }
                    return p.filter(f => f.forma==='cuadrado' && f.color.n==='Verde');
                }},
                {t: "Si hay un cuadrado Rojo, NO TOQUES NADA por 10 segundos.", f: (p)=>{
                    p[0].forma='cuadrado'; p[0].color=colores.find(c=>c.n==="Rojo");
                    inhibicionActiva = true; return [];
                }}
            ];
            let rIdx; do { rIdx = Math.floor(Math.random()*reglasN2.length); } while(reglasN2[rIdx].t === ultimaRegla);
            ultimaRegla = reglasN2[rIdx].t;
            textoRegla = reglasN2[rIdx].t;
            targets = reglasN2[rIdx].f(pool);
        } 
        else {
            // Nivel 3 - Combinación Grande/Pequeño
            let tamBusq = Math.random() > 0.5 ? 'grande' : 'pequeno';
            let colBusq = colores[Math.floor(Math.random()*colores.length)];
            textoRegla = `Toca solo los ${tamBusq}s de color ${colBusq.n}.`;
            targets = pool.filter(f => f.tamano === tamBusq && f.color.n === colBusq.n);
            // Si el azar no creó objetivos, forzar 3
            if(targets.length === 0){
                for(let k=0; k<3; k++){ pool[k].tamano = tamBusq; pool[k].color = colBusq; }
                targets = pool.filter(f => f.tamano === tamBusq && f.color.n === colBusq.n);
            }
        }

        totalPuntosPosibles += (inhibicionActiva ? 1 : targets.length);
        pool.sort(() => Math.random() - 0.5);
        document.getElementById('panel-instruccion').innerText = textoRegla;
        hablar(textoRegla);
        objetivosActuales = targets.map(t => t.id);
        document.getElementById('status-ronda').innerText = `Nivel ${nivel} - Intento ${ronda}/${maxRondas}`;

        pool.forEach(f => {
            const div = document.createElement('div');
            div.className = `token ${f.forma} ${f.tamano}`;
            if(f.forma === 'triangulo') div.style.borderBottomColor = f.color.c;
            else div.style.backgroundColor = f.color.c;

            div.onclick = () => {
                if(inhibicionActiva) {
                    errores++; hablar("¡Era no tocar!"); avanzar();
                } else if(objetivosActuales.includes(f.id)) {
                    div.classList.add('marcado');
                    objetivosActuales = objetivosActuales.filter(id => id !== f.id);
                    aciertos++;
                    if(objetivosActuales.length === 0) avanzar();
                } else {
                    errores++; hablar("Error");
                }
            };
            pantalla.appendChild(div);
        });

        timer = setInterval(() => {
            segundos--;
            document.getElementById('tiempo-texto').innerText = segundos;
            if(segundos <= 0) {
                clearInterval(timer);
                if(inhibicionActiva) { aciertos++; hablar("¡Bien!"); }
                else if(objetivosActuales.length > 0) { errores += objetivosActuales.length; }
                avanzar();
            }
        }, 1000);
    }

    function avanzar() {
        clearInterval(timer);
        let maxRondas = (nivel === 3) ? 6 : 3;
        if(ronda < maxRondas) {
            ronda++;
            setTimeout(cargarRonda, 1000);
        } else if(nivel < 3) {
            nivel++; ronda = 1;
            mostrarOverlay("NIVEL " + nivel, (nivel===2) ? "Ahora usa la lógica: Si pasa algo, haz otra cosa." : "Máxima dificultad: Tamaños y colores.");
        } else {
            finalizar();
        }
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        let porc = Math.round((aciertos / (aciertos + errores)) * 100) || 0;
        document.getElementById('resumen-stats').innerHTML = `Aciertos: ${aciertos}<br>Errores: ${errores}`;
        document.getElementById('porcentaje-caja').innerText = porc + "%";
        hablar(`Terminado. Tu efectividad fue del ${porc} por ciento.`);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 7: Control Inhibitorio Extremo</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #F0F4F8; --gold: #FFD700; --navy: #103A57; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px; font-weight: bold; }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 15px; }
        
        .panel-superior { display: flex; width: 95%; max-width: 850px; gap: 15px; margin-bottom: 10px; }
        
        .panel-instruccion { background: white; padding: 15px; border-radius: 15px; border: 4px solid var(--p-purple); flex-grow: 2; font-weight: bold; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; min-height: 100px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        #reloj-contenedor { background: #FFF; border: 4px solid var(--navy); border-radius: 15px; width: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #tiempo-texto { font-size: 2.2rem; color: #D32F2F; font-weight: 900; }

        .zona-tokens { 
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
            gap: 15px; width: 95%; max-width: 950px; margin: auto; padding: 25px;
            background: white; border-radius: 20px; min-height: 450px; border: 2px solid #B0BEC5;
        }

        /* TRIÁNGULOS REALES */
        .token { cursor: pointer; transition: transform 0.2s; position: relative; display: inline-block; }
        .token:active { transform: scale(0.9); }
        .circulo { border-radius: 50%; }
        .cuadrado { border-radius: 6px; }
        
        .triangulo { 
            width: 0; height: 0; 
            background: none !important; 
            border-left: solid transparent; 
            border-right: solid transparent; 
            border-bottom: solid; 
        }
        
        .grande { width: 80px; height: 80px; }
        .pequeno { width: 45px; height: 45px; }
        
        .triangulo.grande { border-left-width: 40px; border-right-width: 40px; border-bottom-width: 80px; }
        .triangulo.pequeno { border-left-width: 22px; border-right-width: 22px; border-bottom-width: 45px; }

        .marcado { filter: grayscale(1) brightness(0.3); opacity: 0.4; pointer-events: none; transform: scale(0.8); }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index: 5000; text-align: center; }
        #overlay-nivel { background: var(--p-purple); color: white; }
        #overlay-final { background: var(--navy); color: white; }
        
        .lvl-banner { font-size: 6rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 4px 4px 0px #000; }
        .btn-ready { background: var(--gold); border: none; padding: 20px 50px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.5rem; color: var(--navy); margin-top: 20px; }
    </style>
</head>
<body onload="iniciarSesion()">

<header>SESIÓN 7: CONTROL INHIBITORIO AVANZADO</header>

<div id="contenedor-juego">
    <div class="panel-superior">
        <div id="panel-instruccion" class="panel-instruccion">Cargando regla...</div>
        <div id="reloj-contenedor">
            <span style="font-size: 0.7rem; font-weight: 900;">TIEMPO</span>
            <span id="tiempo-texto">10</span>
        </div>
    </div>
    <div id="status-ronda" style="font-weight: bold; margin: 5px; font-size: 1.2rem;"></div>
    <div id="pantalla-juego" class="zona-tokens"></div>
</div>

<div id="overlay-nivel" class="overlay">
    <h1 class="lvl-banner" id="lvl-titulo">NIVEL 1</h1>
    <p id="lvl-mensaje" style="font-size: 2rem;"></p>
    <button class="btn-ready" onclick="cerrarOverlay()">¡LISTO!</button>
</div>

<div id="overlay-final" class="overlay">
    <h1 style="color: var(--gold); font-size: 3.5rem;">SESIÓN FINALIZADA</h1>
    <div id="resumen-stats" style="font-size: 2.2rem; margin: 15px;"></div>
    <div id="porcentaje-final" style="font-size: 5rem; font-weight: 900; color: var(--gold); background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; border: 4px solid var(--gold);">0%</div>
    <button class="btn-ready" onclick="window.location.reload()">REPETIR TODO</button>
</div>

<script>
    const colores = [
        {n: "Amarillo", c: "#FFFF00"}, {n: "Morado", c: "#800080"}, {n: "Azul", c: "#0000FF"},
        {n: "Rojo", c: "#FF0000"}, {n: "Verde", c: "#008000"}, {n: "Negro", c: "#000000"},
        {n: "Café", c: "#8B4513"}, {n: "Rosado", c: "#FFC0CB"}, {n: "Naranja", c: "#FFA500"}
    ];

    let nivel = 1, ronda = 1, aciertos = 0, errores = 0, targetsCount = 0;
    let objetivosActuales = [], timer = null, segundos = 10, inhibicionActiva = false;

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 1.0;
        window.speechSynthesis.speak(m);
    }

    function iniciarSesion() { mostrarOverlay("NIVEL 1", "Escucha las reglas de 'Si hay... entonces haz...'."); }

    function mostrarOverlay(tit, msj) {
        document.getElementById('lvl-titulo').innerText = tit;
        document.getElementById('lvl-mensaje').innerText = msj;
        document.getElementById('overlay-nivel').style.display = 'flex';
        hablar(tit + ". " + msj);
    }

    function cerrarOverlay() { document.getElementById('overlay-nivel').style.display = 'none'; cargarRonda(); }

    function cargarRonda() {
        clearInterval(timer);
        segundos = 10;
        inhibicionActiva = false;
        document.getElementById('tiempo-texto').innerText = segundos;
        const pantalla = document.getElementById('pantalla-juego');
        pantalla.innerHTML = "";

        let pool = [];
        let numFigs = (nivel === 1) ? 14 : (nivel === 2) ? 20 : 30;
        let maxR = (nivel === 3) ? 6 : 3;

        // Generar pool de figuras aleatorias
        for(let i=0; i<numFigs; i++){
            pool.push({
                id: i,
                color: colores[Math.floor(Math.random()*colores.length)],
                forma: (nivel === 1) ? (Math.random() > 0.5 ? 'circulo' : 'cuadrado') : (['circulo','cuadrado','triangulo'][Math.floor(Math.random()*3)]),
                tamano: (nivel < 3) ? 'grande' : (Math.random() > 0.5 ? 'grande' : 'pequeno')
            });
        }

        let textoRegla = "";
        let targets = [];

        // LÓGICA DE REGLAS SEGÚN EL NIVEL
        if(nivel === 1) {
            let col1 = colores[Math.floor(Math.random()*colores.length)];
            let col2 = colores[(colores.indexOf(col1)+2)%colores.length];
            pool[0].forma = 'circulo'; pool[0].color = col1; // Asegurar condición
            for(let k=1; k<5; k++){ pool[k].forma='cuadrado'; pool[k].color=col2; }
            textoRegla = `Si hay un círculo ${col1.n}, entonces toca los cuadrados ${col2.n}s.`;
            targets = pool.filter(f => f.forma === 'cuadrado' && f.color.n === col2.n);
        } 
        else if(nivel === 2) {
            if(ronda % 2 === 0) {
                pool[0].forma = 'triangulo'; pool[0].color = colores.find(c=>c.n==="Negro");
                textoRegla = "¡ATENCIÓN! Si hay un triángulo Negro, NO TOQUES NADA.";
                inhibicionActiva = true;
            } else {
                pool = pool.filter(f => f.forma !== 'triangulo');
                for(let k=0; k<5; k++){ pool[k].forma='circulo'; pool[k].color=colores.find(c=>c.n==="Azul"); }
                textoRegla = "Si NO hay triángulos, toca todos los círculos Azules.";
                targets = pool.filter(f => f.forma === 'circulo' && f.color.n === "Azul");
            }
        } 
        else {
            // NIVEL 3: REGLAS DE ALTA COMPLEJIDAD (6 RONDAS)
            const reglasN3 = [
                () => {
                    textoRegla = "Toca los cuadrados verdes grandes y los círculos azules pequeños.";
                    for(let k=0; k<3; k++){ pool[k]={id:k, forma:'cuadrado', color:colores.find(c=>c.n==="Verde"), tamano:'grande'}; }
                    for(let k=3; k<6; k++){ pool[k]={id:k, forma:'circulo', color:colores.find(c=>c.n==="Azul"), tamano:'pequeno'}; }
                    targets = pool.filter(f => (f.forma==='cuadrado'&&f.color.n==="Verde"&&f.tamano==='grande') || (f.forma==='circulo'&&f.color.n==="Azul"&&f.tamano==='pequeno'));
                },
                () => {
                    textoRegla = "Si hay cuadrados pequeños verdes, NO TOQUES las figuras azules.";
                    pool[0]={id:0, forma:'cuadrado', color:colores.find(c=>c.n==="Verde"), tamano:'pequeno'};
                    for(let k=1; k<6; k++){ pool[k].color=colores.find(c=>c.n==="Azul"); }
                    inhibicionActiva = "azules"; // Regla especial
                },
                () => {
                    textoRegla = "Toca los triángulos amarillos grandes, pero solo si no hay círculos negros.";
                    let hayCircNegro = pool.some(f => f.forma==='circulo' && f.color.n==="Negro");
                    if(hayCircNegro) { inhibicionActiva = true; targets = []; }
                    else { 
                        for(let k=0; k<4; k++){ pool[k]={id:k, forma:'triangulo', color:colores.find(c=>c.n==="Amarillo"), tamano:'grande'}; }
                        targets = pool.filter(f => f.forma==='triangulo' && f.color.n==="Amarillo" && f.tamano==='grande');
                    }
                }
            ];
            reglasN3[ronda % reglasN3.length]();
        }

        pool.sort(() => Math.random() - 0.5);
        document.getElementById('panel-instruccion').innerText = textoRegla;
        hablar(textoRegla);
        objetivosActuales = targets.map(t => t.id);
        targetsCount += targets.length || 1; // Para el porcentaje
        document.getElementById('status-ronda').innerText = `Nivel ${nivel} - Intento ${ronda}/${maxR}`;

        pool.forEach(f => {
            const div = document.createElement('div');
            div.className = `token ${f.forma} ${f.tamano}`;
            if(f.forma === 'triangulo') div.style.borderBottomColor = f.color.c;
            else div.style.backgroundColor = f.color.c;

            div.onclick = () => {
                if(inhibicionActiva === true) { errores++; hablar("¡No debías tocar!"); avanzar(); }
                else if(inhibicionActiva === "azules" && f.color.n === "Azul") { errores++; hablar("¡Los azules están prohibidos!"); }
                else if(objetivosActuales.includes(f.id)) {
                    div.classList.add('marcado');
                    objetivosActuales = objetivosActuales.filter(id => id !== f.id);
                    aciertos++;
                    if(objetivosActuales.length === 0 && !inhibicionActiva) avanzar();
                } else { errores++; hablar("Incorrecto."); }
            };
            pantalla.appendChild(div);
        });

        timer = setInterval(() => {
            segundos--;
            document.getElementById('tiempo-texto').innerText = segundos;
            if(segundos <= 0) {
                clearInterval(timer);
                if(inhibicionActiva) { aciertos++; hablar("¡Control perfecto!"); }
                else if(objetivosActuales.length > 0) { errores += objetivosActuales.length; }
                avanzar();
            }
        }, 1000);
    }

    function avanzar() {
        clearInterval(timer);
        let maxR = (nivel === 3) ? 6 : 3;
        if(ronda < maxR) { ronda++; setTimeout(cargarRonda, 1200); }
        else if(nivel < 3) { nivel++; ronda = 1; mostrarOverlay("NIVEL " + nivel, "Reglas combinadas y más figuras."); }
        else { finalizar(); }
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        let totalAcciones = aciertos + errores;
        let porc = totalAcciones > 0 ? Math.round((aciertos / totalAcciones) * 100) : 0;
        document.getElementById('resumen-stats').innerHTML = `Aciertos: ${aciertos} | Errores: ${errores}`;
        document.getElementById('porcentaje-final').innerText = porc + "%";
        hablar(`Sesión completa Juan. Tu efectividad fue del ${porc} por ciento.`);
    }
</script>
</body>
</html>

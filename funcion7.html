<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 7: Control Inhibitorio Pro - REHABILIDIA</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #E3F2FD; --gold: #FFD700; --navy: #103A57; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px; font-weight: bold; }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 15px; }
        
        .panel-superior { display: flex; width: 95%; max-width: 850px; gap: 15px; margin-bottom: 10px; }
        
        .panel-instruccion { background: white; padding: 15px; border-radius: 15px; border: 4px solid var(--p-purple); flex-grow: 2; font-weight: bold; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; min-height: 85px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        #reloj-contenedor { background: #FFF; border: 4px solid var(--navy); border-radius: 15px; width: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #tiempo-texto { font-size: 2.2rem; color: #D32F2F; font-weight: 900; }

        .zona-tokens { 
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
            gap: 15px; width: 95%; max-width: 950px; margin: auto; padding: 25px;
            background: white; border-radius: 20px; min-height: 450px; border: 2px solid #B0BEC5;
        }

        .token { cursor: pointer; transition: transform 0.2s; position: relative; }
        .token:active { transform: scale(0.9); }
        .circulo { border-radius: 50%; }
        .cuadrado { border-radius: 6px; }
        .triangulo { width: 0; height: 0; background: none !important; border-left: solid transparent; border-right: solid transparent; border-bottom: solid; }
        
        .grande { width: 80px; height: 80px; }
        .pequeno { width: 45px; height: 45px; }
        .triangulo.grande { border-left-width: 40px; border-right-width: 40px; border-bottom-width: 80px; }
        .triangulo.pequeno { border-left-width: 22px; border-right-width: 22px; border-bottom-width: 45px; }

        .marcado { filter: grayscale(1) brightness(0.3); opacity: 0.4; pointer-events: none; transform: scale(0.8); }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index: 5000; text-align: center; }
        #overlay-nivel { background: var(--p-purple); color: white; }
        #overlay-final { background: var(--navy); color: white; }
        
        .lvl-banner { font-size: 6rem; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 4px 4px 0px #000; }
        .btn-ready { background: var(--gold); border: none; padding: 20px 50px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.5rem; color: var(--navy); margin-top: 20px; }
    </style>
</head>
<body onload="iniciarSesion()">

<header>SESIÓN 7: CONTROL INHIBITORIO Y TIEMPO</header>

<div id="contenedor-juego">
    <div class="panel-superior">
        <div id="panel-instruccion" class="panel-instruccion">Cargando...</div>
        <div id="reloj-contenedor">
            <span style="font-size: 0.7rem; font-weight: 900;">TIEMPO</span>
            <span id="tiempo-texto">10</span>
        </div>
    </div>
    <div id="status-ronda" style="font-weight: bold; margin: 5px; font-size: 1.2rem; color: var(--navy);"></div>
    <div id="pantalla-juego" class="zona-tokens"></div>
</div>

<div id="overlay-nivel" class="overlay">
    <h1 class="lvl-banner" id="lvl-titulo">NIVEL 1</h1>
    <p id="lvl-mensaje" style="font-size: 2rem;"></p>
    <button class="btn-ready" onclick="cerrarOverlay()">¡EMPEZAR!</button>
</div>

<div id="overlay-final" class="overlay">
    <h1 style="color: var(--gold); font-size: 3.5rem;">SESIÓN FINALIZADA</h1>
    <div id="resumen-stats" style="font-size: 2.5rem; margin: 20px;"></div>
    <button class="btn-ready" onclick="window.location.reload()">REINTENTAR</button>
</div>

<script>
    // Corrección de escritura y colores
    const colores = [
        {n: "Amarillo", c: "#FFFF00"}, {n: "Morado", c: "#800080"}, {n: "Azul", c: "#0000FF"},
        {n: "Rojo", c: "#FF0000"}, {n: "Verde", c: "#008000"}, {n: "Negro", c: "#000000"},
        {n: "Café", c: "#8B4513"}, {n: "Rosado", c: "#FFC0CB"}, {n: "Naranja", c: "#FFA500"}
    ];

    let nivel = 1, ronda = 1;
    let aciertos = 0, errores = 0;
    let objetivosActuales = [];
    let timer = null;
    let segundos = 10;
    let inhibicionActiva = false;
    let ultimaPregunta = ""; // Para evitar que se repita la misma pregunta

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 1.0;
        window.speechSynthesis.speak(m);
    }

    function iniciarSesion() {
        mostrarOverlay("NIVEL 1", "Toca las formas indicadas rápidamente.");
    }

    function mostrarOverlay(tit, msj) {
        document.getElementById('lvl-titulo').innerText = tit;
        document.getElementById('lvl-mensaje').innerText = msj;
        document.getElementById('overlay-nivel').style.display = 'flex';
        hablar(tit + ". " + msj);
    }

    function cerrarOverlay() {
        document.getElementById('overlay-nivel').style.display = 'none';
        cargarRonda();
    }

    function cargarRonda() {
        clearInterval(timer);
        segundos = 10;
        inhibicionActiva = false;
        document.getElementById('tiempo-texto').innerText = segundos;
        const pantalla = document.getElementById('pantalla-juego');
        pantalla.innerHTML = "";

        // Generar pool de figuras dinámico
        let pool = [];
        let numFigs = (nivel === 1) ? 15 : (nivel === 2) ? 20 : 25;

        for(let i=0; i<numFigs; i++){
            pool.push({
                id: i,
                color: colores[Math.floor(Math.random()*colores.length)],
                forma: (nivel === 1) ? (Math.random() > 0.5 ? 'circulo' : 'cuadrado') : (['circulo','cuadrado','triangulo'][Math.floor(Math.random()*3)]),
                tamano: (nivel < 3) ? 'grande' : (Math.random() > 0.5 ? 'grande' : 'pequeno')
            });
        }

        let textoRegla = "";
        let targets = [];

        // LÓGICA DE NIVELES CON ASEGURAMIENTO DE OBJETIVOS
        if(nivel === 1) {
            let col1 = colores[Math.floor(Math.random()*colores.length)];
            let col2;
            do { col2 = colores[Math.floor(Math.random()*colores.length)]; } while(col1.n === col2.n);
            
            let forma1 = Math.random() > 0.5 ? 'circulo' : 'cuadrado';
            let forma2 = Math.random() > 0.5 ? 'circulo' : 'cuadrado';

            // Forzar que existan al menos 3 de cada uno en el pool
            for(let j=0; j<3; j++) {
                pool[j].color = col1; pool[j].forma = forma1;
                pool[j+3].color = col2; pool[j+3].forma = forma2;
            }
            
            textoRegla = `Toca los ${forma1}s ${col1.n}s y los ${forma2}s ${col2.n}s.`;
            targets = pool.filter(f => (f.forma === forma1 && f.color.n === col1.n) || (f.forma === forma2 && f.color.n === col2.n));
        } 
        else if(nivel === 2) {
            // Alternar entre inhibición y búsqueda para que no siempre sea la misma pregunta
            let tipoRonda = Math.random() > 0.5;
            if(tipoRonda && ultimaPregunta !== "inhibicion") {
                textoRegla = "¡ATENCIÓN! Si hay triángulos negros, NO TOQUES NADA.";
                // Asegurar que hay un triángulo negro para que deba inhibir
                pool[0].forma = 'triangulo'; pool[0].color = colores.find(c => c.n === 'Negro');
                inhibicionActiva = true;
                ultimaPregunta = "inhibicion";
            } else {
                let colBusqueda = colores[Math.floor(Math.random()*colores.length)];
                // Asegurar presencia del color
                for(let j=0; j<4; j++) { pool[j].color = colBusqueda; pool[j].forma = 'circulo'; }
                textoRegla = `Toca todos los círculos ${colBusqueda.n}s rápidamente.`;
                targets = pool.filter(f => f.forma === 'circulo' && f.color.n === colBusqueda.n);
                ultimaPregunta = colBusqueda.n;
            }
        } 
        else {
            // Nivel 3: Mezcla total
            let tamSel = Math.random() > 0.5 ? 'grande' : 'pequeno';
            let colSel = colores[Math.floor(Math.random()*colores.length)];
            // Asegurar presencia
            for(let j=0; j<4; j++) { pool[j].tamano = tamSel; pool[j].color = colSel; pool[j].forma = 'cuadrado'; }
            
            textoRegla = `Toca solo los cuadrados ${tamSel === 'grande' ? 'grandes' : 'pequeños'} de color ${colSel.n}.`;
            targets = pool.filter(f => f.forma === 'cuadrado' && f.tamano === tamSel && f.color.n === colSel.n);
        }

        // Mezclar el pool para que los objetos forzados no estén siempre al principio
        pool.sort(() => Math.random() - 0.5);

        document.getElementById('panel-instruccion').innerText = textoRegla;
        hablar(textoRegla);
        objetivosActuales = targets.map(t => t.id);
        document.getElementById('status-ronda').innerText = `Nivel ${nivel} - Intento ${ronda}/3`;

        // Dibujar figuras
        pool.forEach(f => {
            const div = document.createElement('div');
            div.className = `token ${f.forma} ${f.tamano}`;
            if(f.forma === 'triangulo') div.style.borderBottomColor = f.color.c;
            else div.style.backgroundColor = f.color.c;

            div.onclick = () => {
                if(inhibicionActiva) {
                    errores++; hablar("¡No debías tocar!");
                    avanzar();
                } else if(objetivosActuales.includes(f.id)) {
                    div.classList.add('marcado');
                    objetivosActuales = objetivosActuales.filter(id => id !== f.id);
                    aciertos++;
                    if(objetivosActuales.length === 0) avanzar();
                } else {
                    errores++; hablar("Esa no.");
                }
            };
            pantalla.appendChild(div);
        });

        timer = setInterval(() => {
            segundos--;
            document.getElementById('tiempo-texto').innerText = segundos;
            if(segundos <= 0) {
                clearInterval(timer);
                if(inhibicionActiva) { aciertos++; hablar("¡Excelente control!"); }
                else if(objetivosActuales.length > 0) { errores += objetivosActuales.length; hablar("Tiempo agotado."); }
                avanzar();
            }
        }, 1000);
    }

    function avanzar() {
        clearInterval(timer);
        if(ronda < 3) {
            ronda++;
            setTimeout(cargarRonda, 1200);
        } else if(nivel < 3) {
            nivel++; ronda = 1;
            mostrarOverlay("NIVEL " + nivel, "Las reglas cambian. ¡Escucha bien!");
        } else {
            finalizar();
        }
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        document.getElementById('resumen-stats').innerHTML = `Aciertos: <span style="color:#4CAF50">${aciertos}</span><br>Errores: <span style="color:#F44336">${errores}</span>`;
        hablar("Sesión terminada. ¡Buen trabajo!");
    }
</script>
</body>
</html>

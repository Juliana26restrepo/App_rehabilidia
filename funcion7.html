<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 7: Control Inhibitorio Final</title>
    <style>
        :root { --navy: #103A57; --p-purple: #4A148C; --gold: #FFD700; --bg: #F0F4F8; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { background: var(--navy); color: white; padding: 10px; font-weight: bold; }
        
        #contenedor-juego { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .panel-superior { display: flex; width: 90%; max-width: 800px; gap: 20px; margin-bottom: 15px; }
        .panel-instruccion { background: white; padding: 20px; border-radius: 15px; border: 4px solid var(--p-purple); flex-grow: 1; font-size: 1.4rem; font-weight: bold; display: flex; align-items: center; justify-content: center; min-height: 100px; }
        
        #reloj { background: white; border: 4px solid var(--navy); border-radius: 15px; width: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #tiempo-num { font-size: 2.5rem; color: #D32F2F; font-weight: bold; }

        .zona-tokens { 
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
            gap: 20px; width: 95%; max-width: 900px; min-height: 400px; padding: 30px;
            background: white; border-radius: 20px; border: 2px solid #CCC;
        }

        /* FIGURAS REALES */
        .token { cursor: pointer; transition: 0.2s; position: relative; }
        .circulo { border-radius: 50%; }
        .cuadrado { border-radius: 4px; }
        
        /* Triángulo Matemático (Bordes para evitar trapecio) */
        .triangulo { 
            width: 0 !important; height: 0 !important; 
            background-color: transparent !important;
            border-left: solid transparent; 
            border-right: solid transparent; 
            border-bottom: solid; 
        }
        
        .grande { width: 80px; height: 80px; }
        .pequeno { width: 45px; height: 45px; }
        
        .triangulo.grande { border-left-width: 40px; border-right-width: 40px; border-bottom-width: 80px; }
        .triangulo.pequeno { border-left-width: 22.5px; border-right-width: 22.5px; border-bottom-width: 45px; }

        .marcado { filter: grayscale(1) opacity(0.3); transform: scale(0.8); pointer-events: none; }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index: 100; text-align: center; }
        #overlay-inicio { background: var(--p-purple); color: white; }
        #overlay-final { background: var(--navy); color: white; }
        .btn { background: var(--gold); border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.5rem; font-weight: bold; cursor: pointer; margin-top: 20px; color: var(--navy); }
    </style>
</head>
<body onload="iniciarJuego()">

<header>SESIÓN 7: CONTROL INHIBITORIO</header>

<div id="contenedor-juego">
    <div class="panel-superior">
        <div id="texto-instruccion" class="panel-instruccion">Cargando...</div>
        <div id="reloj">
            <span style="font-size: 0.8rem;">TIEMPO</span>
            <div id="tiempo-num">10</div>
        </div>
    </div>
    <div id="status" style="margin-bottom: 10px; font-weight: bold;"></div>
    <div id="pantalla" class="zona-tokens"></div>
</div>

<div id="overlay-inicio" class="overlay">
    <h1 id="lvl-tit" style="font-size: 4rem; color: var(--gold);">NIVEL 1</h1>
    <p id="lvl-txt" style="font-size: 1.8rem;"></p>
    <button class="btn" onclick="cerrarOverlay()">EMPEZAR</button>
</div>

<div id="overlay-final" class="overlay">
    <h1 style="color: var(--gold); font-size: 3rem;">RESULTADOS</h1>
    <div id="stats" style="font-size: 2rem; margin: 20px;"></div>
    <div id="porcentaje" style="font-size: 5rem; font-weight: bold; color: var(--gold);"></div>
    <button class="btn" onclick="location.reload()">REINTENTAR</button>
</div>

<script>
    const colores = [
        {n:"Rojo", c:"#FF0000"}, {n:"Verde", c:"#008000"}, {n:"Azul", c:"#0000FF"},
        {n:"Amarillo", c:"#FFFF00"}, {n:"Morado", c:"#800080"}, {n:"Café", c:"#8B4513"},
        {n:"Negro", c:"#000000"}, {n:"Rosado", c:"#FFC0CB"}, {n:"Naranja", c:"#FFA500"}
    ];

    let nivel = 1, ronda = 1, aciertos = 0, errores = 0, timer = null, segundos = 10;
    let objetivos = [], prohibidos = [], inhibicionTotal = false;

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES';
        window.speechSynthesis.speak(m);
    }

    function iniciarJuego() { mostrarOverlay("NIVEL 1", "Toca los colores y formas que se te piden."); }

    function mostrarOverlay(tit, txt) {
        document.getElementById('lvl-tit').innerText = tit;
        document.getElementById('lvl-txt').innerText = txt;
        document.getElementById('overlay-inicio').style.display = 'flex';
        hablar(tit + ". " + txt);
    }

    function cerrarOverlay() {
        document.getElementById('overlay-inicio').style.display = 'none';
        cargarRonda();
    }

    function cargarRonda() {
        clearInterval(timer);
        segundos = 10;
        document.getElementById('tiempo-num').innerText = segundos;
        const pantalla = document.getElementById('pantalla');
        pantalla.innerHTML = "";
        objetivos = []; prohibidos = []; inhibicionTotal = false;

        let numFigs = (nivel === 1) ? 12 : (nivel === 2) ? 18 : 28;
        let pool = [];

        for(let i=0; i<numFigs; i++) {
            pool.push({
                id: i,
                color: colores[Math.floor(Math.random()*colores.length)],
                forma: ['circulo','cuadrado','triangulo'][Math.floor(Math.random()*3)],
                tamano: (nivel === 3) ? (Math.random() > 0.5 ? 'grande' : 'pequeno') : 'grande'
            });
        }

        let msg = "";
        // NIVEL 1: Simple (Sin condicionales "Si hay")
        if(nivel === 1) {
            let c = colores[Math.floor(Math.random()*colores.length)];
            msg = `Toca todos los círculos de color ${c.n}.`;
            for(let j=0; j<4; j++){ pool[j].forma = 'circulo'; pool[j].color = c; }
            objetivos = pool.filter(f => f.forma === 'circulo' && f.color.n === c.n).map(f => f.id);
        }
        // NIVEL 2: Inhibición y contradicción
        else if(nivel === 2) {
            if(ronda === 1) {
                msg = "Toca solo los triángulos, pero si hay algo Negro, NO TOQUES NADA.";
                pool[0].color = colores.find(c=>c.n==="Negro"); pool[0].forma="cuadrado";
                inhibicionTotal = true;
            } else {
                msg = "Toca todos los cuadrados, excepto los que sean de color Rojo.";
                for(let j=0; j<5; j++) pool[j].forma = 'cuadrado';
                objetivos = pool.filter(f => f.forma === 'cuadrado' && f.color.n !== "Rojo").map(f => f.id);
                prohibidos = pool.filter(f => f.forma === 'cuadrado' && f.color.n === "Rojo").map(f => f.id);
            }
        }
        // NIVEL 3: Complejidad solicitada (6 Intentos)
        else {
            const reglas = [
                () => {
                    msg = "Toca los cuadrados verdes grandes y los azules pequeños.";
                    pool[0]={id:0, forma:'cuadrado', color:colores.find(c=>c.n==="Verde"), tamano:'grande'};
                    pool[1]={id:1, forma:'cuadrado', color:colores.find(c=>c.n==="Azul"), tamano:'pequeno'};
                    objetivos = pool.filter(f => (f.forma==='cuadrado'&&f.color.n==="Verde"&&f.tamano==='grande') || (f.forma==='cuadrado'&&f.color.n==="Azul"&&f.tamano==='pequeno')).map(f=>f.id);
                },
                () => {
                    msg = "Si hay círculos verdes, no toques ninguna figura azul.";
                    pool[0]={id:0, forma:'circulo', color:colores.find(c=>c.n==="Verde"), tamano:'grande'};
                    prohibidos = pool.filter(f => f.color.n === "Azul").map(f=>f.id);
                },
                () => {
                    msg = "Toca solo los triángulos amarillos, pero si ves un cuadrado negro, no toques nada.";
                    pool[0]={id:0, forma:'cuadrado', color:colores.find(c=>c.n==="Negro"), tamano:'grande'};
                    inhibicionTotal = true;
                }
            ];
            reglas[ronda % 3]();
        }

        pool.sort(() => Math.random() - 0.5);
        document.getElementById('texto-instruccion').innerText = msg;
        hablar(msg);
        document.getElementById('status').innerText = `Nivel ${nivel} - Intento ${ronda}/${(nivel===3?6:3)}`;

        pool.forEach(f => {
            const div = document.createElement('div');
            div.className = `token ${f.forma} ${f.tamano}`;
            if(f.forma === 'triangulo') div.style.borderBottomColor = f.color.c;
            else div.style.backgroundColor = f.color.c;

            div.onclick = () => {
                if(inhibicionTotal) { errores++; hablar("¡No!"); avanzar(); }
                else if(prohibidos.includes(f.id)) { errores++; hablar("Ese no"); }
                else if(objetivos.includes(f.id)) {
                    div.classList.add('marcado');
                    objetivos = objetivos.filter(id => id !== f.id);
                    aciertos++;
                    if(objetivos.length === 0 && prohibidos.length === 0) avanzar();
                } else { errores++; }
            };
            pantalla.appendChild(div);
        });

        timer = setInterval(() => {
            segundos--;
            document.getElementById('tiempo-num').innerText = segundos;
            if(segundos <= 0) {
                if(inhibicionTotal || (objetivos.length === 0 && prohibidos.length >= 0)) aciertos++;
                avanzar();
            }
        }, 1000);
    }

    function avanzar() {
        clearInterval(timer);
        let maxR = (nivel === 3) ? 6 : 3;
        if(ronda < maxR) { ronda++; setTimeout(cargarRonda, 1000); }
        else if(nivel < 3) { nivel++; ronda = 1; mostrarOverlay("NIVEL " + nivel, "Atención a las nuevas reglas."); }
        else { finalizar(); }
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        let total = aciertos + errores;
        let porc = total > 0 ? Math.round((aciertos / total) * 100) : 0;
        document.getElementById('stats').innerHTML = `Aciertos: ${aciertos} | Errores: ${errores}`;
        document.getElementById('porcentaje').innerText = porc + "%";
        hablar("Sesión terminada. Tu efectividad fue del " + porc + " por ciento.");
    }
</script>
</body>
</html>

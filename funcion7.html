<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión 7: Control Inhibitorio - REHABILIDIA</title>
    <style>
        :root { --p-purple: #4A148C; --bg: #F0F4F8; --navy: #103A57; --gold: #FFD700; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 12px; font-weight: bold; }

        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 10px; }
        
        .panel-instruccion { background: white; padding: 20px; border-radius: 15px; border: 4px solid var(--p-purple); width: 90%; max-width: 700px; margin-bottom: 10px; font-weight: bold; font-size: 1.3rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        #barra-tiempo { width: 100%; height: 8px; background: #ddd; margin-top: 10px; border-radius: 4px; overflow: hidden; display: none; }
        #progreso-tiempo { width: 0%; height: 100%; background: var(--p-purple); transition: width 0.1s linear; }

        .zona-tokens { 
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
            gap: 20px; width: 95%; max-width: 900px; margin: auto; padding: 20px;
            background: white; border-radius: 20px; min-height: 400px; border: 2px solid #D1D9E6;
        }

        .token { cursor: pointer; transition: transform 0.2s; position: relative; }
        .token:active { transform: scale(0.9); }
        .circulo { border-radius: 50%; }
        .cuadrado { border-radius: 5px; }
        .triangulo { width: 0; height: 0; background: none !important; border-left: solid transparent; border-right: solid transparent; border-bottom: solid; }
        
        .grande { width: 80px; height: 80px; }
        .pequeno { width: 45px; height: 45px; }
        .triangulo.grande { border-left-width: 40px; border-right-width: 40px; border-bottom-width: 80px; }
        .triangulo.pequeno { border-left-width: 22px; border-right-width: 22px; border-bottom-width: 45px; }

        .marcado { filter: grayscale(1) opacity(0.3); pointer-events: none; }

        #overlay-nivel, #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index: 3000; padding: 20px; text-align: center; }
        #overlay-nivel { background: rgba(74, 20, 140, 0.95); color: white; }
        #overlay-final { background: rgba(16, 58, 87, 0.98); color: white; }
        .btn-finalizar { background: var(--gold); border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; color: var(--navy); font-size: 1.2rem; }
    </style>
</head>
<body onload="iniciarSesion()">

<header>SESIÓN 7: CONTROL INHIBITORIO</header>

<div id="contenedor-juego">
    <div id="panel-instruccion" class="panel-instruccion">
        <div id="texto-instruccion">Cargando...</div>
        <div id="barra-tiempo"><div id="progreso-tiempo"></div></div>
    </div>
    <div id="status-ronda" style="font-weight: bold; margin: 5px; color: var(--p-purple);"></div>
    <div id="pantalla-juego" class="zona-tokens"></div>
</div>

<div id="overlay-nivel">
    <h1 id="lvl-titulo" style="color: var(--gold); font-size: 3rem;">NIVEL 1</h1>
    <p id="lvl-mensaje" style="font-size: 1.5rem;"></p>
</div>

<div id="overlay-final">
    <h1 style="color: var(--gold);">RESULTADOS</h1>
    <div id="resumen-stats" style="font-size: 1.2rem; color: white;"></div>
    <p style="font-size: 1.3rem; font-weight: bold; margin: 20px;">"Controlar tus impulsos te hace dueño de tus decisiones."</p>
    <button class="btn-finalizar" onclick="window.location.href='funcion_sesiones.html'">VOLVER</button>
</div>

<script>
    // Agrupación de colores para evitar confusión
    const familiasColores = [
        { nombre: "Rojo", codigos: ["#FF0000", "#FF7F50", "#FA8072", "#800000", "#E2725B"] },
        { nombre: "Azul", codigos: ["#0000FF", "#000080", "#003366", "#00BFFF", "#87CEEB", "#40E0D0"] },
        { nombre: "Verde", codigos: ["#008000", "#808000", "#98FF98", "#50C878"] },
        { nombre: "Amarillo", codigos: ["#FFFF00", "#FFDB58", "#FFD700"] },
        { nombre: "Morado", codigos: ["#800080", "#E6E6FA", "#FF00FF", "#C8A2C8"] }
    ];

    let nivel = 1, ronda = 1;
    let aciertos = 0, errores = 0;
    let objetivosActuales = [];
    let timerInhibicion = null;

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 0.9;
        window.speechSynthesis.speak(m);
    }

    function iniciarSesion() {
        hablar("Juan, escucha la regla. A veces la mejor respuesta es no hacer nada.");
        cargarRonda();
    }

    function cargarRonda() {
        const pantalla = document.getElementById('pantalla-juego');
        const instruccion = document.getElementById('texto-instruccion');
        const barra = document.getElementById('barra-tiempo');
        pantalla.innerHTML = "";
        barra.style.display = "none";
        if(timerInhibicion) clearInterval(timerInhibicion);

        let numFiguras = (nivel === 1) ? 8 : (nivel === 2) ? 12 : 16;
        let pool = [];

        for(let i=0; i<numFiguras; i++) {
            let familia = familiasColores[Math.floor(Math.random()*familiasColores.length)];
            let colorCod = familia.codigos[Math.floor(Math.random()*familia.codigos.length)];
            let forma = (nivel === 1) ? (Math.random()>0.5 ? 'circulo':'cuadrado') : (['circulo','cuadrado','triangulo'][Math.floor(Math.random()*3)]);
            let tamano = (nivel < 3) ? 'grande' : (Math.random()>0.5 ? 'grande' : 'pequeno');
            pool.push({id: i, familia: familia.nombre, color: colorCod, forma: forma, tamano: tamano});
        }

        let textoRegla = "";
        let targets = [];
        let modoInhibicionPura = false;

        if (nivel === 1) {
            let f = pool[Math.floor(Math.random()*pool.length)];
            textoRegla = `Toca todos los ${f.forma}s de color ${f.familia}.`;
            targets = pool.filter(fig => fig.forma === f.forma && fig.familia === f.familia);
        } else if (nivel === 2) {
            let hayTriVerde = pool.some(fig => fig.forma === 'triangulo' && fig.familia === 'Verde');
            if (hayTriVerde) {
                textoRegla = "Hay un triángulo verde: NO TOQUES NADA por 10 segundos.";
                modoInhibicionPura = true;
                targets = []; 
            } else {
                textoRegla = "No hay triángulos verdes, toca los cuadrados azules.";
                targets = pool.filter(fig => fig.forma === 'cuadrado' && fig.familia === 'Azul');
            }
        } else {
            // Nivel 3: Complejidad alta
            let hayCirculoRojo = pool.some(fig => fig.forma === 'circulo' && fig.familia === 'Rojo');
            if (hayCirculoRojo) {
                textoRegla = "Si ves un círculo rojo, toca solo los triángulos pequeños.";
                targets = pool.filter(fig => fig.forma === 'triangulo' && fig.tamano === 'pequeno');
            } else {
                textoRegla = "No hay círculos rojos: NO TOQUES NADA por 10 segundos.";
                modoInhibicionPura = true;
                targets = [];
            }
        }

        instruccion.innerText = textoRegla;
        hablar(textoRegla);
        objetivosActuales = targets.map(t => t.id);
        document.getElementById('status-ronda').innerText = `Ronda ${ronda}/3 - Nivel ${nivel}`;

        if(modoInhibicionPura) {
            iniciarConteoInhibicion();
        }

        pool.forEach(f => {
            const el = document.createElement('div');
            el.className = `token ${f.forma} ${f.tamano}`;
            if(f.forma === 'triangulo') el.style.borderBottomColor = f.color;
            else el.style.backgroundColor = f.color;

            el.onclick = () => {
                if(modoInhibicionPura) {
                    errores++;
                    hablar("¡No! La regla decía no tocar nada.");
                    clearInterval(timerInhibicion);
                    setTimeout(cargarRonda, 2000);
                } else if(objetivosActuales.includes(f.id)) {
                    el.classList.add('marcado');
                    objetivosActuales = objetivosActuales.filter(id => id !== f.id);
                    aciertos++;
                    if(objetivosActuales.length === 0) avanzar();
                } else {
                    errores++;
                    hablar("Esa no es la figura.");
                }
            };
            pantalla.appendChild(el);
        });
    }

    function iniciarConteoInhibicion() {
        const barra = document.getElementById('barra-tiempo');
        const progreso = document.getElementById('progreso-tiempo');
        barra.style.display = "block";
        let tiempo = 0;
        progreso.style.width = "0%";

        timerInhibicion = setInterval(() => {
            tiempo += 100;
            progreso.style.width = (tiempo / 10000 * 100) + "%";
            if(tiempo >= 10000) {
                clearInterval(timerInhibicion);
                aciertos++;
                hablar("¡Excelente autocontrol!");
                avanzar();
            }
        }, 100);
    }

    function avanzar() {
        if (ronda < 3) {
            ronda++;
            setTimeout(cargarRonda, 1500);
        } else if (nivel < 3) {
            nivel++; ronda = 1;
            mostrarCambioNivel();
        } else {
            finalizar();
        }
    }

    function mostrarCambioNivel() {
        const overlay = document.getElementById('overlay-nivel');
        document.getElementById('lvl-titulo').innerText = "NIVEL " + nivel;
        document.getElementById('lvl-mensaje').innerText = "Prepárate para reglas más difíciles.";
        overlay.style.display = 'flex';
        setTimeout(() => { overlay.style.display = 'none'; cargarRonda(); }, 3000);
    }

    function finalizar() {
        document.getElementById('overlay-final').style.display = 'flex';
        document.getElementById('resumen-stats').innerHTML = `Aciertos: ${aciertos}<br>Errores: ${errores}`;
        hablar("Sesión terminada Juan. Controlar tus impulsos te hace dueño de tus decisiones.");
    }
</script>
</body>
</html>

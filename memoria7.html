<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memoria 7 - Concéntrese Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; background: #E1F5FE; text-align: center; color: #01579B; height: 100vh; display: flex; flex-direction: column; }
        #cabecera { background: white; height: 75px; display: flex; align-items: center; justify-content: center; border-bottom: 4px solid #FFD700; flex-shrink: 0; }
        #instruccion-box { display: flex; align-items: center; font-weight: bold; font-size: 1.3rem; color: #0288D1; }
        #instruccion-box img { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; border: 2px solid #0288D1; }

        #tablero-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        
        /* Ajuste: Siempre 3 filas, ancho automático para que se vea mejor */
        #tablero { 
            display: grid; 
            grid-template-rows: repeat(3, 1fr); 
            grid-auto-flow: column; /* Esto hace que se llene por columnas manteniendo 3 filas */
            gap: 15px; 
            justify-content: center; 
            align-content: center;
        }

        .carta { width: 130px; aspect-ratio: 3/4; position: relative; cursor: pointer; transform-style: preserve-3d; transition: transform 0.4s; }
        .carta.flipped { transform: rotateY(180deg); }
        
        .cara { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; border: 3px solid #0288D1; background: white; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .atras { background: #0288D1; color: white; font-size: 3rem; font-weight: bold; }
        .frente { transform: rotateY(180deg); }
        .frente img { width: 94%; height: 94%; object-fit: cover; border-radius: 8px; }

        .matched { visibility: hidden; opacity: 0; transition: 0.6s; pointer-events: none; }

        #pantalla-transicion, #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index:1000; }
        #pantalla-transicion { background: #0288D1; color: white; }
        #overlay-final { background: rgba(1, 87, 155, 0.98); color: white; }
        
        .stat-box { display: flex; gap: 20px; margin-top: 20px; justify-content: center; }
        .stat-item { background: rgba(255,255,255,0.2); padding: 15px 25px; border-radius: 15px; font-weight: bold; font-size: 1.8rem; }
    </style>
</head>
<body onload="iniciarJuego()">

<div id="cabecera">
    <div id="instruccion-box">
        <img src="COTERAPEUTA.JPG" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1041/1041916.png'">
        <span id="label-guia">Memoriza la ubicación de las fichas</span>
    </div>
</div>

<div id="tablero-container">
    <div id="tablero"></div>
</div>

<div id="pantalla-transicion">
    <h1 id="tit-nivel" style="font-size: 4rem; margin: 0; background: #FFD700; color: #0288D1; padding: 10px 50px; border-radius: 50px;"></h1>
    <h2 id="tit-ronda" style="font-size: 2.5rem; margin-top: 15px;"></h2>
    <p id="desc-nivel" style="font-size: 2rem; margin-top: 10px;"></p>
</div>

<div id="overlay-final">
    <h1 style="color: #FFD700; font-size: 3.5rem;">¡OBJETIVO LOGRADO!</h1>
    <div id="resumen-stats"></div>
    <p style="font-size: 2.2rem; width: 80%; font-weight: bold; margin-top: 30px; line-height: 1.4;">“Recordar los detalles hacen más fácil tu día, sigue así”</p>
    <button onclick="location.reload()" style="padding: 20px 60px; background: #FFD700; color: #01579B; border-radius: 20px; font-size: 2rem; cursor: pointer; font-weight: bold; border:none; margin-top: 25px;">REPETIR</button>
</div>

<script>
    let nivel = 1, ronda = 1, cartasVolteadas = [], parejasEncontradas = 0, intentosTotal = 0, erroresTotal = 0, bloqueado = true;
    const pool = Array.from({length: 70}, (_, i) => `escena${i + 1}.png`);
    const config = { 1: { n: "Bajo", p: 6 }, 2: { n: "Medio", p: 9 }, 3: { n: "Alto", p: 12 } }; // Ajustados para que sean múltiplos de 3 si es posible

    function hablar(t, cb) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; m.rate = 0.95; if(cb) m.onend = cb; window.speechSynthesis.speak(m); }

    function iniciarJuego() { prepararNivel(); }

    function prepararNivel() {
        const c = config[nivel];
        bloqueado = true;
        document.getElementById('tablero').innerHTML = "";
        document.getElementById('pantalla-transicion').style.display = 'flex';
        document.getElementById('tit-nivel').innerText = "NIVEL " + c.n.toUpperCase();
        document.getElementById('tit-ronda').innerText = "Ronda " + ronda + " de 3";
        document.getElementById('desc-nivel').innerText = "Observa las fichas por 5 segundos.";
        
        hablar("Juan, Nivel " + c.n + ", Ronda " + ronda + ". Observa las fichas.", () => {
            setTimeout(() => {
                document.getElementById('pantalla-transicion').style.display = 'none';
                crearTablero();
            }, 2000);
        });
    }

    function crearTablero() {
        const c = config[nivel];
        const tablero = document.getElementById('tablero');
        parejasEncontradas = 0;
        
        let seleccion = [...pool].sort(() => 0.5 - Math.random()).slice(0, c.p);
        let mazo = [...seleccion, ...seleccion].sort(() => 0.5 - Math.random());

        mazo.forEach(img => {
            const card = document.createElement('div');
            card.className = 'carta flipped'; // Empiezan volteadas mostrando la imagen
            card.dataset.v = img;
            card.innerHTML = `<div class="cara atras">?</div><div class="cara frente"><img src="mem5/${img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1160/1160358.png'"></div>`;
            card.onclick = () => {
                if(bloqueado || card.classList.contains('flipped') || card.classList.contains('matched')) return;
                card.classList.add('flipped');
                cartasVolteadas.push(card);
                if(cartasVolteadas.length === 2) {
                    bloqueado = true;
                    intentosTotal++;
                    setTimeout(chequear, 700);
                }
            };
            tablero.appendChild(card);
        });

        // 5 segundos de visualización
        setTimeout(() => {
            document.querySelectorAll('.carta').forEach(k => k.classList.remove('flipped'));
            bloqueado = false;
            hablar("¿Dónde están los pares?");
            document.getElementById('label-guia').innerText = "Encuentra las fichas pares";
        }, 5000);
    }

    function chequear() {
        const [a, b] = cartasVolteadas;
        if(a.dataset.v === b.dataset.v) {
            parejasEncontradas++;
            hablar("¡Es correcto!");
            a.classList.add('matched'); b.classList.add('matched');
            if(parejasEncontradas === config[nivel].p) {
                setTimeout(avanzar, 1000);
            }
        } else {
            erroresTotal++;
            hablar("Es incorrecto.");
            setTimeout(() => {
                a.classList.remove('flipped'); 
                b.classList.remove('flipped');
            }, 400);
        }
        cartasVolteadas = [];
        bloqueado = false;
    }

    function avanzar() {
        if(ronda < 3) {
            ronda++;
            prepararNivel();
        } else if(nivel < 3) {
            nivel++;
            ronda = 1;
            prepararNivel();
        } else {
            mostrarCierre();
        }
    }

    function mostrarCierre() {
        const totalAciertos = (6*3) + (9*3) + (12*3); // Basado en los pares por ronda
        const porc = Math.round((totalAciertos / intentosTotal) * 100);
        document.getElementById('resumen-stats').innerHTML = `
            <div class="stat-box">
                <div class="stat-item" style="color:#FFF;">Aciertos: ${totalAciertos}</div>
                <div class="stat-item" style="color:#FFD700;">Errores: ${erroresTotal}</div>
            </div>
            <p style="font-size: 2.8rem; margin-top: 30px; color: #FFD700;">Precisión: ${porc}%</p>
        `;
        document.getElementById('overlay-final').style.display = 'flex';
        hablar("Recordar los detalles hacen más fácil tu día, sigue así");
    }
</script>
</body>
</html>

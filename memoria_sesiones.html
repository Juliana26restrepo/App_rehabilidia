<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memoria 2 - Juan: Reconocimiento Auditivo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; text-align: center; height: 100vh; display: flex; flex-direction: column; }
        
        /* Fondo de la habitación (Desenfoque ligero para lectura) */
        #escena-total { flex: 1; background: url('mem1/fondo.jpg') no-repeat center center fixed; background-size: cover; filter: blur(2px); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        #contenido { flex: 1; position: relative; z-index: 10; display: flex; flex-direction: column; }

        /* Cabecera con Coterapeuta (Estilo image_0.png) */
        #cabecera { background: rgba(54, 107, 43, 0.9); color: white; height: 80px; display: flex; align-items: center; justify-content: start; padding: 0 20px; border-bottom: 4px solid #28521f; }
        #instruccion-box { background: white; padding: 8px 18px; border-radius: 20px; color: #103A57; display: flex; align-items: center; border: 3px solid #6C5B7B; font-weight: bold; font-size: 1.1rem; }
        #instruccion-box img { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; }

        /* Zona de Reconocimiento (Central) */
        #contenedor-central { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        /* Botones de Opción Estilizados (Estilo image_5.png) */
        .botones-par { display: flex; justify-content: center; gap: 40px; margin-top: 20px; }
        .btn-opcion { padding: 25px 50px; font-size: 2.5rem; cursor: pointer; border-radius: 20px; border: 5px solid #103A57; background: rgba(255, 255, 255, 0.95); transition: 0.3s; font-weight: bold; min-width: 250px; color: #333; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-opcion:active { transform: scale(0.95); box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
        .btn-opcion:hover { background: white; border-color: #366B2B; }

        /* Overlay Final */
        #overlay-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.98); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
    </style>
</head>
<body onload="prepararFaseReconocimiento()">

<div id="escena-total"></div>

<div id="contenido">
    <div id="cabecera">
        <div id="instruccion-box">
            <img src="COTERAPEUTA.JPG">
            <span id="label-guia">Fase 2: ¿Cuáles recuerdas?</span>
        </div>
    </div>

    <div id="contenedor-central">
        <div class="botones-par">
            <button class="btn-opcion" id="opcion-a" onclick="verificar(this.innerText)"></button>
            <button class="btn-opcion" id="opcion-b" onclick="verificar(this.innerText)"></button>
        </div>
    </div>
</div>

<div id="overlay-final">
    <h1 style="font-size: 3.5rem; color: #FFD700;">¡ENTRENAMIENTO COMPLETADO!</h1>
    <p id="resumen-final" style="font-size: 2rem; margin: 20px 0;"></p>
    <p style="font-style: italic; font-size: 1.5rem;">"Recordar cada palabra es un avance"</p>
    <button onclick="window.location.reload()" style="padding: 15px 40px; font-size: 1.2rem; border-radius: 10px; background: #366B2B; color: white; border: none; cursor: pointer; margin-top: 20px;">REPETIR NIVEL</button>
</div>

<script>
    // Banco de datos (Mercado y Distractores según image_4.png)
    const mercado = ["Arroz", "Pasta", "Lentejas", "Frijoles", "Aceite", "Sal", "Azúcar", "Café", "Leche", "Huevos", "Pan", "Queso", "Pollo", "Carne", "Atún", "Tomate", "Cebolla", "Ajo", "Papa", "Zanahoria", "Lechuga", "Manzana", "Banano", "Naranja", "Limón", "Yogur", "Mantequilla", "Harina", "Galletas", "Chocolate"];
    const distNeutros = ["Silencio", "Tormenta", "Espejo", "Camino", "Nube", "Arena", "Bosque", "Puerta", "Sombra", "Fuego", "Río", "Estrella", "Viento", "Libro", "Cielo", "Piedra", "Puente", "Luz", "Jardín", "Mariposa", "Tren", "Isla", "Luna", "Globo", "Torre", "Laberinto", "Horizonte"];
    const distFoneticos = ["Aro", "Raza", "Lente", "Flecos", "Aseito", "Sol", "Azafrán", "Cafeto", "Lecho", "Huesos", "Pana", "Caso", "Poyo", "Marte", "Atajo", "Tomar", "Sebolla", "Agro", "Mapa", "Santana", "Lechuza", "Montana", "Verano", "Noriega", "Limbo", "Yugo", "Mantilla", "Montaña", "Reloj", "Ventana"];

    // Variables de estado (Simulación de Fase 1 para prueba)
    let nivel = 1; // Nivel 1 = 6 palabras. Nivel 3 = 15.
    let palabrasReto = ["Tomate", "Arroz", "Leche", "Queso", "Sal", "Pan"]; 
    let indicePregunta = 0;
    let aciertos = 0;

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'es-ES';
        msg.rate = 0.95; // Velocidad cómoda
        if(callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function prepararFaseReconocimiento() {
        // En producción, aquí se recibirían las palabras memorizadas en Fase 1
        aciertos = 0;
        indicePregunta = 0;
        presentarPar();
    }

    function presentarPar() {
        if (indicePregunta < palabrasReto.length) {
            const correcta = palabrasReto[indicePregunta];
            let distractor;

            // Lógica de dificultad por nivel
            if (nivel === 1) {
                distractor = distNeutros[Math.floor(Math.random() * distNeutros.length)];
            } else if (nivel === 3) {
                const idxMercado = mercado.indexOf(correcta);
                distractor = distFoneticos[idxMercado] || distNeutros[0];
            } else { // Nivel 2: Mezcla
                distractor = Math.random() > 0.5 ? distNeutros[Math.floor(Math.random() * distNeutros.length)] : distFoneticos[mercado.indexOf(correcta)] || distNeutros[0];
            }

            const opciones = [correcta, distractor].sort(() => 0.5 - Math.random());
            
            const btnA = document.getElementById('opcion-a');
            const btnB = document.getElementById('opcion-b');
            btnA.innerText = opciones[0];
            btnB.innerText = opciones[1];
            btnA.style.borderColor = "#103A57"; btnB.style.borderColor = "#103A57"; // Reset colores

            // AUDIO COMPLETO: ¿Cuál estaba en la lista, Río o Tomate?
            hablar(`Juan, ¿cuál estaba en la lista, ${opciones[0]} o ${opciones[1]}?`);
        } else {
            finalizarNivel();
        }
    }

    function verificar(elegida) {
        const correcta = palabrasReto[indicePregunta];
        const btnCorrecto = Array.from(document.getElementsByClassName('btn-opcion')).find(b => b.innerText === correcta);
        const btnElegido = Array.from(document.getElementsByClassName('btn-opcion')).find(b => b.innerText === elegida);

        if (elegida === correcta) {
            aciertos++;
            hablar("¡Correcto!");
            btnCorrecto.style.borderColor = "#366B2B"; // Verde
        } else {
            hablar("Esa no estaba.");
            btnElegido.style.borderColor = "#E67E22"; // Naranja (Error)
            btnCorrecto.style.borderColor = "#366B2B"; // Muestra la correcta
        }

        indicePregunta++;
        setTimeout(presentarPar, 1500); // Pausa para feedback visual y de audio
    }

    function finalizarNivel() {
        document.getElementById('overlay-final').style.display = 'flex';
        const pct = Math.round((aciertos / palabrasReto.length) * 100);
        document.getElementById('resumen-final').innerText = `Aciertos: ${aciertos} de ${palabrasReto.length} | Precisión: ${pct}%`;
        hablar(`¡Muy bien Juan! Has fortalecido tu memoria hoy con ${aciertos} aciertos.`);
    }
</script>
</body>
</html>

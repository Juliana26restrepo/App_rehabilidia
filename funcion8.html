<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sesión 8: Planificación Extrema - REHABILIDIA</title>
    <style>
        :root { 
            --navy: #103A57; 
            --gold: #FFD700; 
            --bg: #F0F4F8; 
            --wall: #1A262C; 
            --path: #FFFFFF; 
            --p-purple: #4A148C;
        }

        /* RESET & UNIVERSAL ZOOM */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #1a1a1a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        #viewport-container {
            width: 100vw;
            height: 100vh;
            max-width: 1024px;
            max-height: 768px;
            background: var(--bg);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        header { 
            background: var(--navy); 
            color: white; 
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: clamp(0.8rem, 2.5vw, 1.1rem);
            flex-shrink: 0;
            z-index: 5;
        }

        .stats-bar { 
            display: flex; 
            justify-content: center;
            gap: 20px; 
            font-weight: bold; 
            background: white; 
            padding: 8px; 
            border-bottom: 2px solid var(--navy); 
            z-index: 5; 
            font-size: 0.9rem; 
        }

        #zona-de-trabajo { 
            flex: 1; 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: center; 
            gap: 20px; 
            padding: 10px; 
            overflow: hidden;
        }

        #canvas-contenedor { 
            background: var(--wall); 
            padding: 5px; 
            border-radius: 8px; 
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 70%;
            max-height: 90%;
        }

        canvas { 
            max-width: 100%; 
            max-height: 100%; 
            background: var(--path); 
            image-rendering: pixelated;
        }

        .panel-derecho { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: white; 
            padding: 15px; 
            border-radius: 20px; 
            border: 3px solid var(--navy); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .controles-grid { display: grid; grid-template-areas: ". up ." "left down right"; gap: 8px; }
        
        .btn-dir { 
            width: clamp(50px, 12vw, 65px); 
            height: clamp(50px, 12vw, 65px); 
            background: white; 
            border: 3px solid var(--navy); 
            border-radius: 50%; 
            font-size: 1.5rem; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.1s; 
            box-shadow: 0 4px 0 var(--navy); 
            user-select: none;
        }

        .btn-dir:active { background: var(--gold); transform: translateY(3px); box-shadow: 0 1px 0 var(--navy); }

        /* OVERLAYS */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.98); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; }
        
        .cuadro-final {
            background: white;
            color: var(--navy);
            padding: 25px;
            border-radius: 25px;
            border: 5px solid var(--gold);
            width: 90%;
            max-width: 400px;
        }

        .btn-ready { background: var(--gold); border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.2rem; color: var(--navy); margin-top: 15px; }

        @media (max-width: 600px) {
            #zona-de-trabajo { flex-direction: column; }
            #canvas-contenedor { max-width: 95%; }
        }
    </style>
</head>
<body onload="iniciarApp()">

<div id="viewport-container">
    <header>SESIÓN 8: PLANIFICACIÓN Y CONTROL</header>

    <div class="stats-bar">
        <span id="txt-nivel">Nivel: 1</span>
        <span id="txt-intento">Laberinto: 1 / 3</span>
        <span id="txt-errores" style="color: #D32F2F;">Errores: 0</span>
    </div>

    <div id="zona-de-trabajo">
        <div id="canvas-contenedor">
            <canvas id="laberintoCanvas"></canvas>
        </div>

        <div class="panel-derecho">
            <div style="margin-bottom:8px; font-size:0.8rem; font-weight:bold; color: var(--navy);">PLANIFICA TU RUTA</div>
            <div class="controles-grid">
                <button class="btn-dir" style="grid-area: up" onpointerdown="iniciarMovimiento('up')" onpointerup="pararMovimiento()" onpointerleave="pararMovimiento()">↑</button>
                <button class="btn-dir" style="grid-area: left" onpointerdown="iniciarMovimiento('left')" onpointerup="pararMovimiento()" onpointerleave="pararMovimiento()">←</button>
                <button class="btn-dir" style="grid-area: down" onpointerdown="iniciarMovimiento('down')" onpointerup="pararMovimiento()" onpointerleave="pararMovimiento()">↓</button>
                <button class="btn-dir" style="grid-area: right" onpointerdown="iniciarMovimiento('right')" onpointerup="pararMovimiento()" onpointerleave="pararMovimiento()">→</button>
            </div>
        </div>
    </div>

    <div id="overlay-msg" class="overlay">
        <h1 id="msg-titulo" style="color: var(--gold); margin: 0;"></h1>
        <p id="msg-cuerpo" style="font-size: 1.2rem; max-width: 80%;"></p>
        <button class="btn-ready" onpointerdown="cerrarOverlay()">COMENZAR</button>
    </div>

    <div id="overlay-final" class="overlay">
        <div class="cuadro-final">
            <h2 style="color: var(--p-purple); margin-top: 0;">¡SESIÓN COMPLETADA!</h2>
            <div id="stats-resumen" style="font-size: 1.1rem; margin: 15px 0; line-height: 1.6;"></div>
            <button class="btn-ready" onpointerdown="guardarYSalir()">FINALIZAR</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('laberintoCanvas');
    const ctx = canvas.getContext('2d');
    
    // Métricas
    let nivel = 1, intento = 1, aciertos = 0, errores = 0;
    const totalRetos = 9; // 3 laberintos por cada uno de los 3 niveles

    let jugador = { x: 1, y: 1 }, mapa = [];
    let tamañoCelda = 20; 
    let filas, columnas, tieneLlave = false;
    let intervaloMovimiento = null;

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        m.rate = 0.9;
        window.speechSynthesis.speak(m);
    }

    function iniciarApp() {
        mostrarOverlay("SESIÓN 8: PLANIFICACIÓN", "Juan, planifica bien tus movimientos. Supera los laberintos sin chocar con las paredes.");
    }

    function mostrarOverlay(tit, msj) {
        document.getElementById('msg-titulo').innerText = tit;
        document.getElementById('msg-cuerpo').innerText = msj;
        document.getElementById('overlay-msg').style.display = 'flex';
        hablar(tit + ". " + msj);
    }

    function cerrarOverlay() {
        document.getElementById('overlay-msg').style.display = 'none';
        generarNuevoLaberinto();
    }

    function generarNuevoLaberinto() {
        if(nivel === 1) { filas = 13; columnas = 13; tamañoCelda = 24; }
        else if(nivel === 2) { filas = 19; columnas = 19; tamañoCelda = 18; }
        else { filas = 25; columnas = 25; tamañoCelda = 14; }

        canvas.width = columnas * tamañoCelda;
        canvas.height = filas * tamañoCelda;
        
        tieneLlave = (nivel < 3);
        mapa = Array.from({ length: filas }, () => Array(columnas).fill(1));
        
        function excavar(x, y) {
            mapa[y][x] = 0;
            const dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
            for(let [dx, dy] of dirs) {
                let nx = x + dx, ny = y + dy;
                if(nx > 0 && nx < columnas-1 && ny > 0 && ny < filas-1 && mapa[ny][nx] === 1) {
                    mapa[y + dy/2][x + dx/2] = 0;
                    excavar(nx, ny);
                }
            }
        }
        excavar(1, 1);

        mapa[filas-2][columnas-2] = 2; // Meta

        if(nivel === 3) {
            // Colocar llave en un lugar distante (esquinas o aleatorio profundo)
            mapa[1][columnas-2] = 3; 
        }

        jugador = { x: 1, y: 1 };
        actualizarUI();
        dibujar();
    }

    function actualizarUI() {
        document.getElementById('txt-nivel').innerText = `Nivel: ${nivel}`;
        document.getElementById('txt-intento').innerText = `Laberinto: ${intento} / 3`;
        document.getElementById('txt-errores').innerText = `Errores: ${errores}`;
    }

    function dibujar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(let r=0; r<filas; r++) {
            for(let c=0; c<columnas; c++) {
                if(mapa[r][c] === 1) {
                    ctx.fillStyle = "#1A262C";
                    ctx.fillRect(c*tamañoCelda, r*tamañoCelda, tamañoCelda, tamañoCelda);
                } else if(mapa[r][c] === 2) {
                    ctx.fillStyle = tieneLlave ? "#4CAF50" : "#546E7A";
                    ctx.fillRect(c*tamañoCelda, r*tamañoCelda, tamañoCelda, tamañoCelda);
                } else if(mapa[r][c] === 3) {
                    ctx.fillStyle = "#FFD700";
                    ctx.beginPath();
                    ctx.arc(c*tamañoCelda+tamañoCelda/2, r*tamañoCelda+tamañoCelda/2, tamañoCelda/3, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }
        // Jugador
        ctx.fillStyle = "#D32F2F";
        ctx.beginPath();
        ctx.arc(jugador.x*tamañoCelda+tamañoCelda/2, jugador.y*tamañoCelda+tamañoCelda/2, tamañoCelda/2.5, 0, Math.PI*2);
        ctx.fill();
    }

    function iniciarMovimiento(dir) {
        if(intervaloMovimiento) return;
        mover(dir);
        intervaloMovimiento = setInterval(() => mover(dir), 150);
    }

    function pararMovimiento() {
        clearInterval(intervaloMovimiento);
        intervaloMovimiento = null;
    }

    function mover(dir) {
        let nx = jugador.x, ny = jugador.y;
        if(dir === 'up') ny--; if(dir === 'down') ny++; if(dir === 'left') nx--; if(dir === 'right') nx++;

        if(ny >= 0 && ny < filas && nx >= 0 && nx < columnas) {
            if(mapa[ny][nx] === 1) {
                errores++;
                actualizarUI();
                return; // Choca con pared
            }
            
            if(mapa[ny][nx] === 3) {
                tieneLlave = true; 
                mapa[ny][nx] = 0;
                hablar("¡Llave conseguida!");
            }
            
            if(mapa[ny][nx] === 2) {
                if(!tieneLlave) { 
                    hablar("Busca primero la llave dorada."); 
                    return; 
                }
                gestionarVictoria();
                return;
            }
            
            jugador.x = nx; 
            jugador.y = ny; 
            dibujar();
        }
    }

    function gestionarVictoria() {
        pararMovimiento();
        aciertos++;
        if(intento < 3) {
            intento++; 
            hablar("¡Excelente planificación!"); 
            generarNuevoLaberinto();
        } else if(nivel < 3) {
            nivel++; 
            intento = 1;
            let m = nivel === 3 ? "NIVEL FINAL: Recoge el objeto dorado antes de ir a la salida." : "Nivel superado. El laberinto es ahora más complejo.";
            mostrarOverlay(`NIVEL ${nivel-1} COMPLETADO`, m);
        } else {
            finalizarSesion();
        }
    }

    function finalizarSesion() {
        const eficacia = Math.round((aciertos / totalRetos) * 100);
        document.getElementById('stats-resumen').innerHTML = `
            <strong>Aciertos:</strong> ${aciertos} / ${totalRetos}<br>
            <strong>Errores (Choques):</strong> ${errores}<br>
            <strong>Eficacia:</strong> ${eficacia}%
        `;
        document.getElementById('overlay-final').style.display = 'flex';
        hablar("Juan, has completado todos los laberintos. Tu capacidad de planificación ha mejorado.");
    }

    function guardarYSalir() {
        const eficacia = Math.round((aciertos / totalRetos) * 100);
        const dataLog = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Funciones Ejecutivas",
            id_sesion: 8,
            aciertos: aciertos,
            errores: errores,
            eficacia: eficacia + "%"
        };
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(dataLog));
        window.location.href = 'funcion_sesiones.html';
    }

    // Teclado para PC
    window.addEventListener('keydown', (e) => {
        if(e.key === "ArrowUp") mover('up');
        if(e.key === "ArrowDown") mover('down');
        if(e.key === "ArrowLeft") mover('left');
        if(e.key === "ArrowRight") mover('right');
    });
    // --- ESTA FUNCIÓN GUARDA SIN BORRAR LO ANTERIOR ---
    function irAlMenu() {
        const ef = Math.round((aciertos / (aciertos + errores)) * 100) || 0;
        
        const datosSesion = {
            fecha: new Date().toLocaleDateString(),
            modulo: "funcion ejecutiva", 
            id_sesion: 8,      
            aciertos: aciertos,
            errores: errores,
            eficacia: ef + "%"
        };

        let historial = JSON.parse(localStorage.getItem('sesiones_rehabilitidia')) || []; 
        if (!Array.isArray(historial)) historial = []; 
        historial.push(datosSesion); 
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(historial)); 

        window.location.href = "atencion_sesiones.html";
    }

    // --- TRUCO FINAL: ESTO CONECTA EL BOTÓN AUTOMÁTICAMENTE ---
    // Busca cualquier botón que diga "FINALIZAR" y le pone la función
    document.querySelectorAll('button').forEach(boton => {
        if(boton.innerText.includes("FINALIZAR")) {
            boton.onclick = irAlMenu;
        }
    });
</script>
</body>
</html>

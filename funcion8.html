<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sesión 8: Planificación Extrema v2</title>
    <style>
        :root { --navy: #103A57; --gold: #FFD700; --bg: #F0F4F8; --wall: #1A262C; --path: #FFFFFF; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--navy); color: white; padding: 10px; font-weight: bold; text-align: center; font-size: 1.1rem; }

        #zona-de-trabajo { display: flex; flex: 1; align-items: center; justify-content: center; gap: 30px; padding: 10px; }

        .stats-bar { position: absolute; top: 55px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; font-weight: bold; background: white; padding: 5px 20px; border-radius: 50px; border: 2px solid var(--navy); z-index: 10; font-size: 0.9rem; }

        #canvas-contenedor { background: var(--wall); padding: 8px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        canvas { display: block; background: var(--path); border-radius: 3px; }

        .panel-derecho { display: flex; flex-direction: column; align-items: center; background: white; padding: 20px; border-radius: 20px; border: 3px solid var(--navy); min-width: 200px; }
        .controles-grid { display: grid; grid-template-areas: ". up ." "left down right"; gap: 10px; }
        .btn-dir { width: 65px; height: 65px; background: white; border: 3px solid var(--navy); border-radius: 50%; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.1s; box-shadow: 0 4px 0 var(--navy); outline: none; }
        .btn-dir:active { background: var(--gold); transform: translateY(3px); box-shadow: 0 1px 0 var(--navy); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.98); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; }
        .btn-ready { background: var(--gold); border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.3rem; color: var(--navy); margin-top: 20px; }
    </style>
</head>
<body>

<header>SESIÓN 8: CONTROL IMPULSIVO Y PLANIFICACIÓN (FINAL)</header>

<div class="stats-bar">
    <span id="txt-nivel">Nivel: 1</span>
    <span id="txt-intento">Laberinto: 1 / 3</span>
</div>

<div id="zona-de-trabajo">
    <div id="canvas-contenedor">
        <canvas id="laberintoCanvas"></canvas>
    </div>

    <div class="panel-derecho">
        <div style="margin-bottom:10px; font-size:0.8rem; font-weight:bold;">CONTROLES</div>
        <div class="controles-grid">
            <button class="btn-dir" style="grid-area: up" onmousedown="mover('up')" ontouchstart="mover('up')">↑</button>
            <button class="btn-dir" style="grid-area: left" onmousedown="mover('left')" ontouchstart="mover('left')">←</button>
            <button class="btn-dir" style="grid-area: down" onmousedown="mover('down')" ontouchstart="mover('down')">↓</button>
            <button class="btn-dir" style="grid-area: right" onmousedown="mover('right')" ontouchstart="mover('right')">→</button>
        </div>
    </div>
</div>

<div id="overlay-msg" class="overlay">
    <h1 id="msg-titulo" style="color: var(--gold);"></h1>
    <p id="msg-cuerpo" style="font-size: 1.3rem; max-width: 600px;"></p>
    <button class="btn-ready" onclick="cerrarOverlay()">COMENZAR</button>
</div>

<script>
    const canvas = document.getElementById('laberintoCanvas');
    const ctx = canvas.getContext('2d');
    
    let nivel = 1, intento = 1;
    let jugador = { x: 1, y: 1 }, mapa = [];
    let tamañoCelda = 18; 
    let filas, columnas, tieneLlave = false;

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        window.speechSynthesis.speak(m);
    }

    function mostrarOverlay(tit, msj) {
        document.getElementById('msg-titulo').innerText = tit;
        document.getElementById('msg-cuerpo').innerText = msj;
        document.getElementById('overlay-msg').style.display = 'flex';
        hablar(tit + ". " + msj);
    }

    function cerrarOverlay() {
        document.getElementById('overlay-msg').style.display = 'none';
        generarNuevoLaberinto();
    }

    function generarNuevoLaberinto() {
        if(nivel === 1) { filas = 15; columnas = 15; }
        else if(nivel === 2) { filas = 25; columnas = 25; }
        else { filas = 31; columnas = 31; }

        canvas.width = columnas * tamañoCelda;
        canvas.height = filas * tamañoCelda;
        
        // En nivel 1 y 2 no hace falta llave, en nivel 3 sí
        tieneLlave = (nivel < 3);

        mapa = Array.from({ length: filas }, () => Array(columnas).fill(1));
        let celdasVisitadas = [];

        function excavar(x, y) {
            mapa[y][x] = 0;
            celdasVisitadas.push({x, y});
            const dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
            for(let [dx, dy] of dirs) {
                let nx = x + dx, ny = y + dy;
                if(nx > 0 && nx < columnas-1 && ny > 0 && ny < filas-1 && mapa[ny][nx] === 1) {
                    mapa[y + dy/2][x + dx/2] = 0;
                    excavar(nx, ny);
                }
            }
        }
        excavar(1, 1);

        mapa[filas-2][columnas-2] = 2; 

        if(nivel === 3) {
            let puntoValido = celdasVisitadas[Math.floor(celdasVisitadas.length * 0.7)]; 
            mapa[puntoValido.y][puntoValido.x] = 3;
        }

        jugador = { x: 1, y: 1 };
        document.getElementById('txt-nivel').innerText = `Nivel: ${nivel}`;
        document.getElementById('txt-intento').innerText = `Laberinto: ${intento} / 3`;
        dibujar();
    }

    function dibujar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(let r=0; r<filas; r++) {
            for(let c=0; c<columnas; c++) {
                if(mapa[r][c] === 1) {
                    ctx.fillStyle = "#1A262C";
                    ctx.fillRect(c*tamañoCelda, r*tamañoCelda, tamañoCelda, tamañoCelda);
                } else if(mapa[r][c] === 2) {
                    ctx.fillStyle = tieneLlave ? "#4CAF50" : "#546E7A";
                    ctx.fillRect(c*tamañoCelda, r*tamañoCelda, tamañoCelda, tamañoCelda);
                } else if(mapa[r][c] === 3) {
                    ctx.fillStyle = "#FFD700";
                    ctx.beginPath();
                    ctx.arc(c*tamañoCelda+tamañoCelda/2, r*tamañoCelda+tamañoCelda/2, tamañoCelda/3, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }
        ctx.fillStyle = "#D32F2F";
        ctx.beginPath();
        ctx.arc(jugador.x*tamañoCelda+tamañoCelda/2, jugador.y*tamañoCelda+tamañoCelda/2, tamañoCelda/2.8, 0, Math.PI*2);
        ctx.fill();
    }

    function mover(dir) {
        let nx = jugador.x, ny = jugador.y;
        if(dir === 'up') ny--; if(dir === 'down') ny++; if(dir === 'left') nx--; if(dir === 'right') nx++;

        if(ny >= 0 && ny < filas && nx >= 0 && nx < columnas && mapa[ny][nx] !== 1) {
            if(mapa[ny][nx] === 3) {
                tieneLlave = true; mapa[ny][nx] = 0;
                hablar("¡Punto dorado recogido!");
            }
            if(mapa[ny][nx] === 2) {
                if(!tieneLlave) { hablar("Coge el punto dorado primero."); return; }
                gestionarVictoria(); return;
            }
            jugador.x = nx; jugador.y = ny; dibujar();
        }
    }

    function gestionarVictoria() {
        if(intento < 3) {
            intento++; hablar("¡Muy bien!"); generarNuevoLaberinto();
        } else if(nivel < 3) {
            nivel++; intento = 1;
            let m = nivel === 3 ? "NIVEL FINAL: Debes recoger el punto dorado para abrir la meta." : "Nivel superado. El laberinto es ahora más grande.";
            mostrarOverlay(`NIVEL ${nivel-1} COMPLETADO`, m);
        } else {
            mostrarOverlay("¡SESIÓN FINALIZADA!", "Has completado con éxito todos los laberintos de planificación.");
        }
    }

    window.addEventListener('keydown', (e) => {
        if(e.key === "ArrowUp") mover('up');
        if(e.key === "ArrowDown") mover('down');
        if(e.key === "ArrowLeft") mover('left');
        if(e.key === "ArrowRight") mover('right');
    });

    window.onload = () => {
        mostrarOverlay("SESIÓN 8: PLANIFICACIÓN", "Supera 3 laberintos por nivel para completar la sesión.");
    };
</script>
</body>
</html>

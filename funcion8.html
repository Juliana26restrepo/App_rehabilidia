<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sesión 8: Planificación Avanzada - Fase Final</title>
    <style>
        :root { --navy: #103A57; --gold: #FFD700; --bg: #F0F4F8; --wall: #263238; --path: #FFFFFF; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: center; color: var(--navy); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--navy); color: white; padding: 12px; font-weight: bold; font-size: 1.2rem; }
        
        #contenedor-juego { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; overflow: auto; }
        
        .stats-bar { display: flex; gap: 20px; margin-bottom: 10px; font-weight: bold; background: white; padding: 10px 25px; border-radius: 50px; border: 2px solid var(--navy); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        #canvas-contenedor { position: relative; background: var(--wall); padding: 10px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); margin: auto; }
        canvas { display: block; background: var(--path); border-radius: 4px; }

        .controles { margin-top: 15px; display: grid; grid-template-areas: ". up ." "left down right"; gap: 10px; padding-bottom: 20px; }
        .btn-dir { width: 60px; height: 60px; background: white; border: 3px solid var(--navy); border-radius: 50%; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: 0 4px 0 var(--navy); }
        .btn-dir:active { background: var(--gold); transform: translateY(4px); box-shadow: none; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 58, 87, 0.96); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 25px; text-align: center; }
        .btn-ready { background: var(--gold); border: none; padding: 20px 45px; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 1.4rem; color: var(--navy); margin-top: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<header>SESIÓN 8: REHABILITACIÓN FINAL - PLANIFICACIÓN ESTRATÉGICA</header>

<div id="contenedor-juego">
    <div class="stats-bar">
        <span id="txt-nivel">Nivel: 1</span>
        <span id="txt-intento">Intento: 1 / 3</span>
    </div>

    <div id="canvas-contenedor">
        <canvas id="laberintoCanvas"></canvas>
    </div>

    <div class="controles">
        <button class="btn-dir" style="grid-area: up" onclick="mover('up')">↑</button>
        <button class="btn-dir" style="grid-area: left" onclick="mover('left')">←</button>
        <button class="btn-dir" style="grid-area: down" onclick="mover('down')">↓</button>
        <button class="btn-dir" style="grid-area: right" onclick="mover('right')">→</button>
    </div>
</div>

<div id="overlay-msg" class="overlay">
    <h1 id="msg-titulo" style="color: var(--gold); font-size: 2.8rem; margin-bottom: 10px;"></h1>
    <p id="msg-cuerpo" style="font-size: 1.6rem; max-width: 85%; line-height: 1.5;"></p>
    <button class="btn-ready" id="btn-accion" onclick="cerrarOverlay()">¡COMENZAR DESAFÍO!</button>
</div>

<script>
    const canvas = document.getElementById('laberintoCanvas');
    const ctx = canvas.getContext('2d');
    
    let nivel = 1, intento = 1;
    let jugador = { x: 1, y: 1 };
    let mapa = [];
    let tamañoCelda;
    let filas, columnas;
    let tieneLlave = false;

    function hablar(t, callback) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        if(callback) m.onend = callback;
        window.speechSynthesis.speak(m);
    }

    function mostrarOverlay(tit, msj, botonTxt = "EMPEZAR") {
        document.getElementById('msg-titulo').innerText = tit;
        document.getElementById('msg-cuerpo').innerText = msj;
        document.getElementById('btn-accion').innerText = botonTxt;
        document.getElementById('overlay-msg').style.display = 'flex';
        hablar(tit + ". " + msj);
    }

    function cerrarOverlay() {
        if (document.getElementById('btn-accion').innerText === "REINICIAR") {
            window.location.reload();
            return;
        }
        document.getElementById('overlay-msg').style.display = 'none';
        generarNuevoLaberinto();
    }

    function generarNuevoLaberinto() {
        // DIFICULTAD ALTA: Tamaños aumentados para exigir planificación
        if(nivel === 1) { filas = 11; columnas = 11; tamañoCelda = 40; }
        else if(nivel === 2) { filas = 17; columnas = 17; tamañoCelda = 28; }
        else { filas = 23; columnas = 23; tamañoCelda = 22; }

        canvas.width = columnas * tamañoCelda;
        canvas.height = filas * tamañoCelda;
        tieneLlave = (nivel < 3); // Obligatoria solo en Nivel 3

        // Inicializar matriz (1 = pared)
        mapa = Array.from({ length: filas }, () => Array(columnas).fill(1));

        // Algoritmo de generación DFS (Deep First Search) para laberinto perfecto
        function generar(cx, cy) {
            mapa[cy][cx] = 0;
            const direcciones = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
            
            direcciones.forEach(([dx, dy]) => {
                let nx = cx + dx, ny = cy + dy;
                if(nx > 0 && nx < columnas-1 && ny > 0 && ny < filas-1 && mapa[ny][nx] === 1) {
                    mapa[cy + dy/2][cx + dx/2] = 0;
                    generar(nx, ny);
                }
            });
        }
        generar(1, 1);

        // Posicionar Meta
        mapa[filas-2][columnas-2] = 2;

        // Posicionar Punto Dorado (Llave) en Nivel 3
        if(nivel === 3) {
            // Colocar la llave en una esquina opuesta para forzar recorrido
            mapa[1][columnas-2] = 3; 
        }

        jugador = { x: 1, y: 1 };
        actualizarUI();
        dibujar();
    }

    function actualizarUI() {
        document.getElementById('txt-nivel').innerText = `Nivel: ${nivel}`;
        document.getElementById('txt-intento').innerText = `Intento: ${intento} / 3`;
    }

    function dibujar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(let r=0; r<filas; r++) {
            for(let c=0; c<columnas; c++) {
                if(mapa[r][c] === 1) {
                    ctx.fillStyle = "#263238"; 
                    ctx.fillRect(c*tamañoCelda, r*tamañoCelda, tamañoCelda, tamañoCelda);
                } else if(mapa[r][c] === 2) {
                    ctx.fillStyle = tieneLlave ? "#4CAF50" : "#90A4AE"; // Verde si puede ganar, Gris si no
                    ctx.fillRect(c*tamañoCelda, r*tamañoCelda, tamañoCelda, tamañoCelda);
                    if(!tieneLlave) {
                       ctx.fillStyle = "white";
                       ctx.font = "bold 10px Arial";
                       ctx.fillText("BLOQ", c*tamañoCelda+2, r*tamañoCelda + tamañoCelda/1.5);
                    }
                } else if(mapa[r][c] === 3) {
                    ctx.fillStyle = "#FFD700"; 
                    ctx.beginPath();
                    ctx.arc(c*tamañoCelda + tamañoCelda/2, r*tamañoCelda + tamañoCelda/2, tamañoCelda/3, 0, Math.PI*2);
                    ctx.fill();
                    // Brillo del punto dorado
                    ctx.strokeStyle = "orange";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }
        // Dibujar Jugador
        ctx.fillStyle = "#103A57";
        ctx.beginPath();
        ctx.arc(jugador.x*tamañoCelda + tamañoCelda/2, jugador.y*tamañoCelda + tamañoCelda/2, tamañoCelda/2.5, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    function mover(dir) {
        let nx = jugador.x, ny = jugador.y;
        if(dir === 'up') ny--;
        if(dir === 'down') ny++;
        if(dir === 'left') nx--;
        if(dir === 'right') nx++;

        if(ny >= 0 && ny < filas && nx >= 0 && nx < columnas && mapa[ny][nx] !== 1) {
            if(mapa[ny][nx] === 3) {
                tieneLlave = true;
                mapa[ny][nx] = 0;
                hablar("¡Punto dorado recogido! La meta está activa.");
            }
            
            if(mapa[ny][nx] === 2) {
                if(!tieneLlave) {
                    hablar("No puedes salir todavía. Recoge primero el punto dorado.");
                    return;
                }
                gestionarVictoria();
                return;
            }

            jugador.x = nx;
            jugador.y = ny;
            dibujar();
        }
    }

    function gestionarVictoria() {
        if(intento < 3) {
            intento++;
            hablar("Objetivo logrado. Prepárate para el siguiente plano.");
            generarNuevoLaberinto();
        } else if(nivel < 3) {
            nivel++;
            intento = 1;
            let proximoMensaje = nivel === 2 ? 
                "Aumentamos la escala. El camino es más largo y complejo. Tómate un momento para observar." : 
                "NIVEL FINAL: Antes de ir a la meta, debes recoger el punto dorado obligatoriamente.";
            mostrarOverlay(`¡NIVEL ${nivel-1} COMPLETADO!`, proximoMensaje);
        } else {
            mostrarOverlay("REHABILITACIÓN COMPLETADA", "Has demostrado un control excepcional de tus impulsos y una planificación brillante. Actualizar tu mente te ayudará a tener el control.", "REINICIAR");
        }
    }

    // Soporte para teclado
    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if(key === "arrowup" || key === "w") mover('up');
        if(key === "arrowdown" || key === "s") mover('down');
        if(key === "arrowleft" || key === "a") mover('left');
        if(key === "arrowright" || key === "d") mover('right');
    });

    window.onload = () => {
        mostrarOverlay("DESAFÍO DE PLANIFICACIÓN", "Fase final de rehabilitación. Observa todo el mapa, traza la ruta mentalmente y luego actúa. Supera 3 laberintos por nivel.");
    };
</script>
</body>
</html>

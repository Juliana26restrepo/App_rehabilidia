<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sesión 8: Planificación Final - Control Lateral</title>
    <style>
        :root { --navy: #103A57; --gold: #FFD700; --bg: #F0F4F8; --wall: #263238; --path: #FFFFFF; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--navy); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        header { background: var(--navy); color: white; padding: 15px; font-weight: bold; text-align: center; }

        /* Contenedor principal para separar laberinto de controles */
        #zona-de-trabajo {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: space-evenly;
            padding: 20px;
        }

        .stats-bar { 
            position: absolute; 
            top: 65px; 
            left: 50%; 
            transform: translateX(-50%);
            display: flex; 
            gap: 20px; 
            font-weight: bold; 
            background: white; 
            padding: 8px 25px; 
            border-radius: 50px; 
            border: 2px solid var(--navy); 
            z-index: 10;
        }

        /* Área del Laberinto */
        #canvas-contenedor { 
            background: var(--wall); 
            padding: 12px; 
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        canvas { display: block; background: var(--path); border-radius: 5px; }

        /* Panel de Control a la Derecha */
        .panel-derecho {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 30px;
            border-radius: 25px;
            border: 3px solid var(--navy);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .instruccion-viva {
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controles-grid { 
            display: grid; 
            grid-template-areas: ". up ." "left down right"; 
            gap: 15px; 
        }

        .btn-dir { 
            width: 75px; 
            height: 75px; 
            background: white; 
            border: 4px solid var(--navy); 
            border-radius: 50%; 
            font-size: 2rem; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.2s; 
            box-shadow: 0 6px 0 var(--navy);
        }

        .btn-dir:active { 
            background: var(--gold); 
            transform: translateY(4px); 
            box-shadow: 0 2px 0 var(--navy);
        }

        /* Overlays */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(16, 58, 87, 0.98); color: white; 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 100; text-align: center; padding: 30px; 
        }

        .btn-ready { 
            background: var(--gold); border: none; padding: 20px 50px; 
            border-radius: 40px; font-weight: bold; cursor: pointer; 
            font-size: 1.5rem; color: var(--navy); margin-top: 30px; 
        }
    </style>
</head>
<body>

<header>SESIÓN 8: REHABILITACIÓN FINAL - PLANIFICACIÓN ESTRATÉGICA</header>

<div class="stats-bar">
    <span id="txt-nivel">Nivel: 1</span>
    <span id="txt-intento">Intento: 1 / 3</span>
</div>

<div id="zona-de-trabajo">
    <div id="canvas-contenedor">
        <canvas id="laberintoCanvas"></canvas>
    </div>

    <div class="panel-derecho">
        <div class="instruccion-viva" id="mini-guia">Planifica tu ruta</div>
        <div class="controles-grid">
            <button class="btn-dir" style="grid-area: up" onclick="mover('up')">↑</button>
            <button class="btn-dir" style="grid-area: left" onclick="mover('left')">←</button>
            <button class="btn-dir" style="grid-area: down" onclick="mover('down')">↓</button>
            <button class="btn-dir" style="grid-area: right" onclick="mover('right')">→</button>
        </div>
    </div>
</div>

<div id="overlay-msg" class="overlay">
    <h1 id="msg-titulo" style="color: var(--gold); font-size: 3rem;"></h1>
    <p id="msg-cuerpo" style="font-size: 1.6rem; max-width: 800px;"></p>
    <button class="btn-ready" id="btn-accion" onclick="cerrarOverlay()">COMENZAR</button>
</div>

<script>
    const canvas = document.getElementById('laberintoCanvas');
    const ctx = canvas.getContext('2d');
    
    let nivel = 1, intento = 1;
    let jugador = { x: 1, y: 1 }, mapa = [];
    let tamañoCelda, filas, columnas, tieneLlave = false;

    function hablar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        window.speechSynthesis.speak(m);
    }

    function mostrarOverlay(tit, msj) {
        document.getElementById('msg-titulo').innerText = tit;
        document.getElementById('msg-cuerpo').innerText = msj;
        document.getElementById('overlay-msg').style.display = 'flex';
        hablar(tit + ". " + msj);
    }

    function cerrarOverlay() {
        document.getElementById('overlay-msg').style.display = 'none';
        generarNuevoLaberinto();
    }

    function generarNuevoLaberinto() {
        // Dificultad Avanzada
        if(nivel === 1) { filas = 11; columnas = 11; tamañoCelda = 40; }
        else if(nivel === 2) { filas = 17; columnas = 17; tamañoCelda = 28; }
        else { filas = 23; columnas = 23; tamañoCelda = 22; }

        canvas.width = columnas * tamañoCelda;
        canvas.height = filas * tamañoCelda;
        tieneLlave = (nivel < 3);

        mapa = Array.from({ length: filas }, () => Array(columnas).fill(1));

        function generar(cx, cy) {
            mapa[cy][cx] = 0;
            const direcciones = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
            direcciones.forEach(([dx, dy]) => {
                let nx = cx + dx, ny = cy + dy;
                if(nx > 0 && nx < columnas-1 && ny > 0 && ny < filas-1 && mapa[ny][nx] === 1) {
                    mapa[cy + dy/2][cx + dx/2] = 0;
                    generar(nx, ny);
                }
            });
        }
        generar(1, 1);
        mapa[filas-2][columnas-2] = 2; // Meta

        if(nivel === 3) {
            mapa[1][columnas-2] = 3; // Punto Dorado
            document.getElementById('mini-guia').innerText = "Busca el punto dorado";
        } else {
            document.getElementById('mini-guia').innerText = "Llega a la meta verde";
        }

        jugador = { x: 1, y: 1 };
        document.getElementById('txt-nivel').innerText = `Nivel: ${nivel}`;
        document.getElementById('txt-intento').innerText = `Intento: ${intento} / 3`;
        dibujar();
    }

    function dibujar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(let r=0; r<filas; r++) {
            for(let c=0; c<columnas; c++) {
                if(mapa[r][c] === 1) {
                    ctx.fillStyle = "#263238"; ctx.fillRect(c*tamañoCelda, r*tamañoCelda, tamañoCelda, tamañoCelda);
                } else if(mapa[r][c] === 2) {
                    ctx.fillStyle = tieneLlave ? "#4CAF50" : "#90A4AE";
                    ctx.fillRect(c*tamañoCelda, r*tamañoCelda, tamañoCelda, tamañoCelda);
                } else if(mapa[r][c] === 3) {
                    ctx.fillStyle = "#FFD700"; ctx.beginPath();
                    ctx.arc(c*tamañoCelda+tamañoCelda/2, r*tamañoCelda+tamañoCelda/2, tamañoCelda/3, 0, Math.PI*2); ctx.fill();
                }
            }
        }
        // Jugador
        ctx.fillStyle = "#103A57"; ctx.beginPath();
        ctx.arc(jugador.x*tamañoCelda+tamañoCelda/2, jugador.y*tamañoCelda+tamañoCelda/2, tamañoCelda/2.5, 0, Math.PI*2);
        ctx.fill(); ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
    }

    function mover(dir) {
        let nx = jugador.x, ny = jugador.y;
        if(dir === 'up') ny--; if(dir === 'down') ny++; if(dir === 'left') nx--; if(dir === 'right') nx++;

        if(ny >= 0 && ny < filas && nx >= 0 && nx < columnas && mapa[ny][nx] !== 1) {
            if(mapa[ny][nx] === 3) {
                tieneLlave = true; mapa[ny][nx] = 0;
                hablar("¡Punto dorado recogido! Ahora puedes ir a la meta.");
            }
            if(mapa[ny][nx] === 2) {
                if(!tieneLlave) { hablar("Antes de ir a la meta, coge el punto dorado."); return; }
                gestionarVictoria(); return;
            }
            jugador.x = nx; jugador.y = ny; dibujar();
        }
    }

    function gestionarVictoria() {
        if(intento < 3) {
            intento++; hablar("¡Muy bien! Siguiente laberinto."); generarNuevoLaberinto();
        } else if(nivel < 3) {
            nivel++; intento = 1;
            let m = nivel === 3 ? "NIVEL FINAL: Antes de ir a la meta, debes recoger el punto dorado." : "Subiendo la dificultad. Planifica bien.";
            mostrarOverlay(`¡NIVEL ${nivel-1} LOGRADO!`, m);
        } else {
            mostrarOverlay("SESIÓN COMPLETADA", "Has demostrado un control excepcional. Actualizar tu mente te ayudará a tener el control.");
        }
    }

    window.onload = () => {
        mostrarOverlay("DESAFÍO FINAL", "Observa el laberinto, traza la ruta mentalmente y usa los controles laterales para moverte.");
    };
</script>
</body>
</html>

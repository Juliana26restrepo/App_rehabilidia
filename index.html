<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REHABILIDIA - Control</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57;
            --teal-blue: #307B8E;
            --mughal-green: #366B2B;
            --pastel-blue: #A9D3C5;
            --light-silver: #CEE5D6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--light-silver);
            color: var(--prussian-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER */
        header {
            background-color: var(--prussian-blue);
            color: var(--white);
            width: 100%;
            padding: 20px 0;
            text-align: center;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .datos-header {
            max-width: 900px;
            margin: auto;
            text-align: left;
            padding: 0 20px;
            font-size: 0.85rem;
        }
        .datos-header strong { font-size: 1.1rem; color: var(--pastel-blue); }

        /* CONTENEDOR PRINCIPAL */
        .container {
            max-width: 900px;
            width: 95%;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* SECCIÓN DEL COTERAPEUTA */
        .guia-box {
            background: white;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .guia-img { width: 90px; height: auto; margin-right: 15px; }

        .burbuja {
            background: var(--light-silver);
            padding: 12px;
            border-radius: 15px;
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* LA CUADRÍCULA DE TU BOCETO */
        .grid-dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* El botón grande de ejercicios ocupa 2 columnas arriba */
        .grid-dashboard > :first-child {
            grid-column: span 2;
        }

        .btn-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            color: var(--prussian-blue);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border-bottom: 5px solid var(--pastel-blue);
        }

        .btn-card:hover { transform: translateY(-5px); border-bottom-color: var(--teal-blue); }

        .btn-card i { font-size: 2.2rem; color: var(--teal-blue); margin-bottom: 15px; }

        /* Estilo especial para el botón grande arriba */
        .btn-card-large {
            background-color: var(--mughal-green);
            color: white;
            border-bottom-color: var(--white);
        }
        .btn-card-large i { color: var(--pastel-blue); }
        .btn-card-large:hover { border-bottom-color: var(--mughal-green); opacity: 0.9; }

    </style>
</head>
<body>

<header>
    <div class="datos-header">
        <strong>Juan Pérez (TCE Moderado)</strong>
        📅 17 de Marzo, 2026 | 🕒 14:30 PM | 📍 Medellín
    </div>
</header>

<div class="container">
    
    <div class="guia-box">
        <img src="1000214588.png" class="guia-img" alt="Coterapeuta">
        <div class="burbuja">
            ¡Hola Juan! Soy tu guía. Aquí tienes tu tablero central. ¿Por dónde te gustaría empezar hoy?
        </div>
    </div>

    <div class="grid-dashboard">
        
        <a href="#" class="btn-card btn-card-large" onclick="alert('Cargando Módulos: Atención, Memoria...')">
            <i class="fas fa-brain"></i>
            EJERCICIOS (Módulos)
        </a>

        <a href="#" class="btn-card" onclick="alert('Abriendo Material Psicoeducativo...')">
            <i class="fas fa-play-circle"></i>
            VIDEOS
        </a>

        <a href="#" class="btn-card" onclick="alert('Abriendo Monitoreo de Ánimo y Salud...')">
            <i class="fas fa-notes-medical"></i>
            REGISTRAR MI DIARIO
        </a>

        <a href="#" class="btn-card" onclick="alert('Cargando gráficas de progreso...')">
            <i class="fas fa-chart-line"></i>
            MIS DATOS
        </a>

        <a href="#" class="btn-card" onclick="alert('Abriendo configuraciones de accesibilidad...')">
            <i class="fas fa-cog"></i>
            AJUSTES
        </a>

    </div>

</div>

</body>
</html>

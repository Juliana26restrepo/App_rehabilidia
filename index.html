<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REHABILIDIA - Memoria</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57;
            --teal-blue: #307B8E;
            --mughal-green: #366B2B;
            --pastel-blue: #A9D3C5;
            --light-silver: #CEE5D6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--light-silver);
            color: var(--prussian-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: var(--prussian-blue);
            color: var(--white);
            width: 100%;
            padding: 30px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .logo-container img {
            max-width: 180px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        h1 { margin: 0; font-size: 2rem; letter-spacing: 2px; }
        .subtitle { font-weight: 300; opacity: 0.9; margin-top: 5px; }

        .container {
            max-width: 900px;
            width: 90%;
            padding: 30px 0;
            text-align: center;
        }

        .btn-diario {
            background-color: var(--mughal-green);
            color: var(--white);
            border: none;
            padding: 18px 35px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(54, 107, 43, 0.3);
            transition: 0.3s;
            margin-bottom: 30px;
        }

        .btn-diario:hover { transform: scale(1.05); background-color: var(--teal-blue); }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .session-card {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 5px solid var(--pastel-blue);
        }

        .session-card:hover {
            transform: translateY(-8px);
            border-bottom: 5px solid var(--teal-blue);
        }

        .session-card i {
            font-size: 2.5rem;
            color: var(--teal-blue);
            margin-bottom: 15px;
        }

        .session-card h3 { margin: 10px 0 5px 0; color: var(--prussian-blue); }
        .session-card p { font-size: 0.9rem; color: #666; margin: 0; }

    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="logo.jpg" alt="Logo REHABILIDIA">
    </div>
    <h1>REHABILIDIA</h1>
    <div class="subtitle">Programa de Rehabilitación Neuropsicológica</div>
</header>

<div class="container">
    <button class="btn-diario">
        <i class="fas fa-heart"></i> REGISTRAR MI DIARIO
    </button>

    <div class="menu-grid">
        <div class="session-card" onclick="alert('Iniciando Sesión 1: Entorno Doméstico')">
            <i class="fas fa-house-user"></i>
            <h3>Sesión 1</h3>
            <p>Entorno Doméstico</p>
        </div>

        <div class="session-card" onclick="alert('Iniciando Sesión 2: Lista de Mercado')">
            <i class="fas fa-shopping-basket"></i>
            <h3>Sesión 2</h3>
            <p>Actividades de Compra</p>
        </div>

        <div class="session-card" onclick="alert('Iniciando Sesión 3: Reconocimiento')">
            <i class="fas fa-ear-listen"></i>
            <h3>Sesión 3</h3>
            <p>Estímulos Auditivos</p>
        </div>
    </div>
</div>

</body>
</html>

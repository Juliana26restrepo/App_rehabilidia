<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RehabilitaMind - Módulo de Memoria</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2e7d32; --secondary: #00796b; --bg: #f1f8e9; }
        body { font-family: sans-serif; margin: 0; background-color: var(--bg); text-align: center; }
        header { background-color: var(--primary); color: white; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-diario { background-color: #ff9800; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.1rem; margin: 20px 0; cursor: pointer; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 20px; max-width: 800px; margin: auto; }
        .session-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; }
        .session-card i { font-size: 2rem; color: var(--secondary); margin-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>REHABILIDIA</h1>
        <p>Programa de Rehabilitación Neuropsicológica</p>
    </header>
    <button class="btn-diario">REGISTRAR MI DIARIO</button>
    <div class="menu-grid">
        <div class="session-card"> <i class="fas fa-home"></i> <p>Sesión 1</p> </div>
        <div class="session-card"> <i class="fas fa-shopping-cart"></i> <p>Sesión 2</p> </div>
        <div class="session-card"> <i class="fas fa-volume-up"></i> <p>Sesión 3</p> </div>
    </div>
</body>
</html>

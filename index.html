<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REHABILIDIA - Panel de Control</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57; --teal-blue: #307B8E; --mughal-green: #366B2B;
            --pastel-blue: #A9D3C5; --light-silver: #CEE5D6; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); }
        
        header { 
            background-color: var(--prussian-blue); color: var(--white); 
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; 
        }
        .paciente-info { text-align: left; font-size: 0.9rem; }
        .paciente-info strong { font-size: 1.2rem; display: block; color: var(--pastel-blue); }
        
        /* Aseguramos que el logo cargue correctamente como logo.jpg */
        .logo-box img { height: 50px; background: white; padding: 5px; border-radius: 8px; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }

        /* SECCIÓN COTERAPEUTA */
        .guia-card { 
            background: white; border-radius: 20px; padding: 20px; 
            display: flex; align-items: center; gap: 20px; 
            margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .guia-card img { width: 100px; height: auto; }
        .burbuja { background: var(--light-silver); padding: 15px; border-radius: 15px; flex: 1; font-size: 1rem; }

        /* CUADRÍCULA DE BOTONES (BOCETO REALIZADO) */
        .grid-dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .btn-card {
            background: white; border-radius: 20px; padding: 35px 10px;
            text-align: center; text-decoration: none; color: var(--prussian-blue);
            font-weight: bold; transition: 0.3s; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 6px solid var(--pastel-blue);
        }
        .btn-card i { font-size: 2.3rem; margin-bottom: 12px; color: var(--teal-blue); }
        
        /* Botón de Ejercicios resaltado en Mughal Green */
        .btn-large { 
            grid-column: span 2; background-color: var(--mughal-green); 
            color: white; border-bottom-color: rgba(255,255,255,0.3); 
        }
        .btn-large i { color: white; }
        .btn-card:hover { transform: translateY(-5px); border-bottom-color: var(--teal-blue); }
    </style>
</head>
<body>

<header>
    <div class="paciente-info">
        <strong>Juan Pérez</strong>
        <span id="txt-fecha">Cargando...</span> | <span id="txt-hora">00:00</span><br>
        📍 Medellín, Colombia
    </div>
    <div class="logo-box">
        <img src="logo.jpg" alt="Logo">
    </div>
</header>

<div class="container">
    <div class="guia-card">
        <img src="COTERAPEUTA.JPG" alt="Coterapeuta">
        <div class="burbuja">¡Hola Juan! Selecciona un módulo para comenzar tu entrenamiento de hoy.</div>
    </div>

    <div class="grid-dashboard">
        <a href="ejercicios.html" class="btn-card btn-large">
            <i class="fas fa-brain"></i> EJERCICIOS
        </a>
        <a href="videos.html" class="btn-card">
            <i class="fas fa-play-circle"></i> VIDEOS
        </a>
        <a href="diario.html" class="btn-card">
            <i class="fas fa-book-medical"></i> MI DIARIO
        </a>
        <a href="datos.html" class="btn-card">
            <i class="fas fa-chart-bar"></i> MIS DATOS
        </a>
        <a href="ajustes.html" class="btn-card">
            <i class="fas fa-sliders-h"></i> AJUSTES
        </a>
    </div>
</div>

<script>
    // SCRIPT PARA FECHA Y HORA AUTOMÁTICA
    function actualizarReloj() {
        const ahora = new Date();
        const opciones = { day: 'numeric', month: 'long' };
        document.getElementById('txt-fecha').textContent = ahora.toLocaleDateString('es-ES', opciones);
        document.getElementById('txt-hora').textContent = ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(actualizarReloj, 1000);
    actualizarReloj();
</script>

</body>
</html>

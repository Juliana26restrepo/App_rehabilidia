<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memoria 9 - Evocación de Detalles</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; background: #E8F5E9; text-align: center; color: #1B5E20; height: 100vh; display: flex; flex-direction: column; }
        #cabecera { background: white; height: 75px; display: flex; align-items: center; justify-content: center; border-bottom: 4px solid #FFD700; flex-shrink: 0; }
        #instruccion-box { display: flex; align-items: center; font-weight: bold; font-size: 1.2rem; }
        #instruccion-box img { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; border: 2px solid #2E7D32; }
        
        #contenedor-principal { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        #display-imagen { max-width: 85%; max-height: 60vh; border: 10px solid white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: none; }
        #timer { font-size: 3.5rem; font-weight: bold; color: #2E7D32; margin-top: 15px; display: none; background: white; padding: 10px 40px; border-radius: 50px; border: 3px solid #FFD700; }

        #quiz-box { display: none; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 650px; }
        #pregunta-texto { font-size: 1.8rem; margin-bottom: 25px; font-weight: bold; color: #333; }
        .btn-opcion { display: block; width: 100%; padding: 18px; margin: 12px 0; font-size: 1.5rem; border: 3px solid #C8E6C9; border-radius: 15px; cursor: pointer; background: #F1F8E9; color: #1B5E20; font-weight: bold; transition: 0.2s; }
        .btn-opcion:hover { background: #C8E6C9; transform: scale(1.02); }

        #pantalla-transicion, #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index:1000; }
        #pantalla-transicion { background: #2E7D32; color: white; }
        #overlay-final { background: rgba(27, 94, 32, 0.98); color: white; }
        .stat-item { background: rgba(255,255,255,0.2); padding: 15px 30px; border-radius: 15px; font-weight: bold; font-size: 1.8rem; margin: 10px; }
    </style>
</head>
<body onload="iniciarJuego()">

<div id="cabecera">
    <div id="instruccion-box">
        <img src="COTERAPEUTA.JPG" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1041/1041916.png'">
        <span id="label-guia">Observa los detalles...</span>
    </div>
</div>

<div id="contenedor-principal">
    <img id="display-imagen" src="">
    <div id="timer">20</div>
    <div id="quiz-box">
        <div id="pregunta-texto"></div>
        <div id="opciones-box"></div>
    </div>
</div>

<div id="pantalla-transicion">
    <h1 id="tit-nivel" style="font-size: 4rem; background: #FFD700; color: #1B5E20; padding: 10px 50px; border-radius: 50px;"></h1>
    <p id="desc-nivel" style="font-size: 2.2rem; margin-top: 20px; width: 80%;"></p>
</div>

<div id="overlay-final">
    <h1 style="color: #FFD700; font-size: 3.5rem;">¡OBJETIVO LOGRADO!</h1>
    <div id="stats" style="display:flex;"></div>
    <p style="font-size: 2.2rem; width: 80%; font-weight: bold; margin-top: 30px;">“Tu mente recuerda más de lo que imaginas, sigue practicando”</p>
    <button onclick="location.reload()" style="padding: 20px 60px; background: #FFD700; color: #1B5E20; border-radius: 20px; font-size: 2rem; border:none; cursor:pointer; font-weight:bold; margin-top: 20px;">REPETIR</button>
</div>

<script>
    let nivel = 1, aciertos = 0, errores = 0, escenaActual = null;
    
    const configNivel = {
        1: { n: "Bajo", t: 15, r: [1, 10] },
        2: { n: "Medio", t: 22, r: [11, 20] },
        3: { n: "Alto", t: 30, r: [21, 30] }
    };

    const bancoPreguntas = {
        1: { p: "¿De qué color era el florero?", o: ["Rojo", "Azul", "Blanco"], r: 1 },
        2: { p: "¿Dónde estaba el perro?", o: ["En el sofá", "En la alfombra verde", "En el patio"], r: 1 },
        3: { p: "¿Qué sostenía el niño?", o: ["Un globo azul", "Una pelota", "Un helado"], r: 0 },
        4: { p: "¿De qué color era el gato?", o: ["Negro", "Manchado", "Blanco"], r: 2 },
        11: { p: "¿Qué objeto había sobre la mesa?", o: ["Una licuadora", "Una cafetera", "Una tostadora"], r: 0 },
        12: { p: "¿Qué animal viste en el parque?", o: ["Un perro", "Un pato", "Un gato"], r: 1 },
        13: { p: "¿De qué color era la lámpara?", o: ["Blanca", "Negra", "Dorada"], r: 1 },
        14: { p: "¿De qué forma era el espejo?", o: ["Cuadrado", "Ovalado", "Circular"], r: 2 },
        21: { p: "¿Qué decía el letrero de la frutería?", o: ["Oferta 2x1", "Fruta Fresca", "Cerrado"], r: 0 },
        22: { p: "¿De qué color era el coche elevado?", o: ["Gris", "Rojo", "Negro"], r: 1 },
        24: { p: "¿De qué color era el bus?", o: ["Rojo", "Blanco", "Amarillo"], r: 2 },
        25: { p: "¿Qué frase estaba en la pizarra?", o: ["Bienvenidos", "Hola Juan", "Matemáticas"], r: 1 },
        27: { p: "¿Qué había al centro del campamento?", o: ["Una fogata", "Una mesa", "Una piscina"], r: 0 },
        30: { p: "¿De qué color era la alfombra del pasillo?", o: ["Azul", "Verde", "Roja"], r: 2 }
    };

    function hablar(t, cb) { 
        window.speechSynthesis.cancel(); 
        const m = new SpeechSynthesisUtterance(t); 
        m.lang = 'es-ES'; m.rate = 0.9; 
        if(cb) m.onend = cb; 
        window.speechSynthesis.speak(m); 
    }

    function iniciarJuego() { prepararNivel(); }

    function prepararNivel() {
        const c = configNivel[nivel];
        document.getElementById('tit-nivel').innerText = "NIVEL " + c.n.toUpperCase();
        document.getElementById('desc-nivel').innerText = "Observa la imagen y memoriza los detalles para luego evocarlos.";
        document.getElementById('pantalla-transicion').style.display = 'flex';
        
        hablar(`Juan, Nivel ${c.n}. Observa la imagen con atención.`, () => {
            setTimeout(() => {
                document.getElementById('pantalla-transicion').style.display = 'none';
                iniciarObservacion();
            }, 3000);
        });
    }

    function iniciarObservacion() {
        const c = configNivel[nivel];
        const numAzar = Math.floor(Math.random() * (c.r - c.r + 1)) + c.r; // Simplificado para el azar del rango
        const idImg = Math.floor(Math.random() * (c.r[1] - c.r[0] + 1)) + c.r[0];
        escenaActual = idImg;
        
        const imgDisplay = document.getElementById('display-imagen');
        imgDisplay.src = `memo/imagen${idImg}.jpeg`;
        imgDisplay.style.display = 'block';
        
        const timerTxt = document.getElementById('timer');
        timerTxt.style.display = 'block';
        let segundos = c.t;
        timerTxt.innerText = segundos;

        let interval = setInterval(() => {
            segundos--;
            timerTxt.innerText = segundos;
            if(segundos <= 0) {
                clearInterval(interval);
                timerTxt.style.display = 'none';
                imgDisplay.style.display = 'none';
                iniciarQuiz();
            }
        }, 1000);
    }

    function iniciarQuiz() {
        document.getElementById('quiz-box').style.display = 'block';
        const data = bancoPreguntas[escenaActual] || { p: "¿Qué objeto era el más grande en la imagen?", o: ["Un mueble", "Una persona", "Un animal"], r: 0 };
        
        document.getElementById('pregunta-texto').innerText = data.p;
        const box = document.getElementById('opciones-box');
        box.innerHTML = "";
        
        data.o.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-opcion';
            btn.innerText = opt;
            btn.onclick = () => verificar(index, data.r);
            box.appendChild(btn);
        });
        hablar(data.p);
    }

    function verificar(elegido, correcto) {
        if(elegido === correcto) {
            aciertos++;
            hablar("¡Muy bien recordado!");
        } else {
            errores++;
            hablar("Ese detalle se nos escapó, pero no importa.");
        }
        
        setTimeout(() => {
            document.getElementById('quiz-box').style.display = 'none';
            if(nivel < 3) {
                nivel++;
                prepararNivel();
            } else {
                mostrarCierre();
            }
        }, 1500);
    }

    function mostrarCierre() {
        const porc = Math.round((aciertos / (aciertos + errores)) * 100) || 0;
        document.getElementById('stats').innerHTML = `
            <div class="stat-item">Aciertos: ${aciertos}</div>
            <div class="stat-item">Errores: ${errores}</div>
            <div class="stat-item">Precisión: ${porc}%</div>
        `;
        document.getElementById('overlay-final').style.display = 'flex';
        hablar("Tu mente recuerda más de lo que imaginas, sigue practicando");
    }
</script>
</body>
</html>

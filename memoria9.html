<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memoria 9 - Juan: Observación y Detalle</title>
    <style>
        :root {
            --primary-green: #2E7D32;
            --light-green: #E8F5E9;
            --accent-gold: #FFD700;
            --white: #ffffff;
            --dark-green: #1B5E20;
        }

        /* Sistema Universal Zoom */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; overflow: hidden; 
            background: #121212; 
            text-align: center; color: var(--dark-green); 
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        #contenedor-proporcional {
            width: 100vw; height: 100vh;
            max-width: 1200px; max-height: 800px;
            background: var(--light-green);
            position: relative;
            display: flex; flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #cabecera { 
            background: var(--white); height: 12%; display: flex; 
            align-items: center; justify-content: center; 
            border-bottom: 4px solid var(--accent-gold); flex-shrink: 0; 
        }

        #instruccion-box { 
            display: flex; align-items: center; font-weight: bold; 
            font-size: clamp(0.9rem, 2.5vw, 1.3rem); color: var(--dark-green); 
        }
        #instruccion-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; border: 2px solid var(--primary-green); }

        #contenedor-principal { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; 
            position: relative; overflow: hidden;
        }

        #display-imagen { 
            max-width: 90%; max-height: 65vh; 
            border: 8px solid var(--white); border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            display: none; object-fit: contain;
        }

        #timer { 
            font-size: clamp(2rem, 6vw, 3.5rem); font-weight: bold; 
            color: var(--primary-green); margin-top: 15px; display: none; 
            background: var(--white); padding: 5px 40px; border-radius: 50px; 
            border: 3px solid var(--accent-gold); 
        }

        #quiz-box { 
            display: none; background: var(--white); padding: 25px; 
            border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 90%; max-width: 600px; 
        }

        .btn-opcion { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            font-size: clamp(1rem, 2vw, 1.4rem); border: 3px solid #C8E6C9; 
            border-radius: 15px; cursor: pointer; background: #F1F8E9; 
            color: var(--dark-green); font-weight: bold; transition: 0.2s;
            touch-action: manipulation;
        }
        .btn-opcion:active { transform: scale(0.98); background: #C8E6C9; }

        #pantalla-transicion, #overlay-final { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            display:none; flex-direction:column; justify-content:center; 
            align-items:center; z-index:1000; padding: 20px;
        }
        #pantalla-transicion { background: var(--primary-green); color: var(--white); }
        #overlay-final { background: rgba(27, 94, 32, 0.98); color: var(--white); }

        .cuadro-resultados {
            background: var(--white); color: var(--dark-green); padding: 30px;
            border-radius: 25px; border: 6px solid var(--accent-gold);
            width: 90%; max-width: 500px; text-align: center;
        }

        .stat-line { 
            display: flex; justify-content: space-between; 
            font-size: 1.5rem; margin: 10px 0; padding-bottom: 5px;
            border-bottom: 2px solid #eee;
        }

        .btn-final {
            padding: 15px 40px; background: var(--accent-gold); color: var(--dark-green); 
            border-radius: 15px; font-size: 1.4rem; border:none; cursor:pointer; 
            font-weight:bold; width: 100%; margin-top: 10px;
        }
    </style>
</head>
<body onload="iniciarJuego()">

<div id="contenedor-proporcional">
    <div id="cabecera">
        <div id="instruccion-box">
            <img src="COTERAPEUTA.JPG">
            <span id="label-guia">Juan, observa la escena</span>
        </div>
    </div>

    <div id="contenedor-principal">
        <img id="display-imagen" src="">
        <div id="timer">0</div>
        
        <div id="quiz-box">
            <div id="pregunta-texto" style="font-size: 1.6rem; font-weight: bold; margin-bottom: 20px;"></div>
            <div id="opciones-box"></div>
        </div>
    </div>

    <div id="pantalla-transicion">
        <h1 id="tit-nivel" style="background: var(--accent-gold); color: var(--dark-green); padding: 10px 40px; border-radius: 50px;"></h1>
        <p id="desc-nivel" style="font-size: 1.6rem; margin-top: 20px; width: 85%;"></p>
    </div>

    <div id="overlay-final">
        <div class="cuadro-resultados">
            <h1 style="color: var(--primary-green); margin: 0;">¡SESIÓN LOGRADA!</h1>
            <div id="resumen-stats" style="margin: 20px 0;"></div>
            <p style="font-weight: bold; margin-bottom: 25px;">“Tu mente recuerda más de lo que imaginas, sigue practicando”</p>
            <button class="btn-final" onpointerdown="irAlMenu()">FINALIZAR Y GUARDAR</button>
        </div>
    </div>
</div>

<script>
    let nivel = 1, rondaEnNivel = 1, aciertos = 0, errores = 0, escenaActual = null;
    let imagenesUsadasGlobal = [];
    const TOTAL_RETOS = 9;

    const configNivel = {
        1: { n: "Bajo", t: 15, r: [1, 10] },
        2: { n: "Medio", t: 25, r: [11, 20] },
        3: { n: "Alto", t: 35, r: [21, 30] }
    };

    const bancoPreguntas = {
        1: [{p:"¿De qué color era el florero?", o:["Rojo","Azul","Blanco"], r:1}, {p:"¿Había fruta en la mesa?", o:["No","Sí, una manzana","Sí, uvas"], r:1}],
        2: [{p:"¿Sobre qué dormía el perro?", o:["Alfombra verde","Sofá","Cesta"], r:0}, {p:"¿De qué color es el perro?", o:["Café","Negro","Blanco"], r:0}],
        3: [{p:"¿Color de la camiseta del niño?", o:["Azul","Amarilla","Roja"], r:1}, {p:"¿Qué tiene el niño en la mano?", o:["Un globo","Un pan","Nada"], r:0}],
        4: [{p:"¿Qué animal está en la silla?", o:["Perro","Gato blanco","Ave"], r:1}, {p:"¿De qué es la silla?", o:["Madera","Metal","Plástico"], r:0}],
        5: [{p:"¿Qué hay en el plato?", o:["Huevo y tostada","Fruta","Carne"], r:0}, {p:"¿El café tiene humo?", o:["No","Sí, está caliente","Está volcado"], r:1}],
        6: [{p:"¿Color de las cortinas?", o:["Rojas","Blancas","Azules"], r:1}, {p:"¿La ventana está abierta?", o:["No","Sí","No hay ventana"], r:1}],
        7: [{p:"¿Color del zapato?", o:["Negro","Café","Rojo"], r:2}, {p:"¿Es un zapato de hombre?", o:["Sí","No, de mujer","De niño"], r:1}],
        8: [{p:"¿Qué hay sobre el libro?", o:["Gafas","Lápiz","Taza"], r:0}, {p:"¿El libro está abierto?", o:["No","Sí","Está roto"], r:1}],
        9: [{p:"¿Color de la cinta del regalo?", o:["Roja","Dorada","Verde"], r:1}, {p:"¿El papel es azul?", o:["Sí","No, es morado","Es blanco"], r:1}],
        10:[{p:"¿Qué hay en el árbol?", o:["Una red","Bicicleta","Silla"], r:1}, {p:"¿La bicicleta es roja?", o:["Sí","No, es azul","Es negra"], r:0}],
        11:[{p:"¿Qué hora es en el reloj?", o:["10:00","12:00","8:00"], r:0}, {p:"¿El reloj es de pared?", o:["Sí","No, de mesa","Digital"], r:0}],
        12:[{p:"¿Qué animal hay en el parque?", o:["Cisne","Pato","Perro"], r:1}, {p:"¿El agua está limpia?", o:["Sí","No","Está seca"], r:0}],
        13:[{p:"¿Cuántos lápices hay?", o:["2","3","5"], r:1}, {p:"¿Hay un borrador?", o:["Sí","No","No se ve"], r:0}],
        14:[{p:"¿Color de la toalla?", o:["Naranja","Azul","Blanca"], r:0}, {p:"¿Está colgada?", o:["Sí","No, en el piso","En la mano"], r:0}],
        15:[{p:"¿Color de los cojines?", o:["Rojos","Azules","Amarillos"], r:2}, {p:"¿Cuántos cojines hay?", o:["1","2","3"], r:1}],
        16:[{p:"¿Sabor de la mermelada?", o:["Fresa","Piña","Mora"], r:0}, {p:"¿El frasco está lleno?", o:["Sí","No, a la mitad","Vacío"], r:1}],
        17:[{p:"¿Libro del medio?", o:["Azul","Rojo","Verde"], r:1}, {p:"¿Cuántos libros hay?", o:["2","3","4"], r:1}],
        18:[{p:"¿Color de la regadera?", o:["Verde","Roja","Azul"], r:1}, {p:"¿Hay flores cerca?", o:["Sí","No","Solo pasto"], r:0}],
        19:[{p:"¿Tipo de reloj?", o:["Digital","De pulsera","Campana"], r:2}, {p:"¿Es de metal?", o:["Sí","No, de plástico","Madera"], r:0}],
        20:[{p:"¿Camiseta de la maleta?", o:["Lisa","A rayas","Cuadros"], r:1}, {p:"¿La maleta está abierta?", o:["Sí","No","Está rota"], r:0}],
        21:[{p:"¿Qué dice el letrero?", o:["Oferta 2x1","Liquidación","Cerrado"], r:0}, {p:"¿El fondo es amarillo?", o:["Sí","No, blanco","Verde"], r:0}],
        22:[{p:"¿Suelo del taller?", o:["Agua","Aceite","Tierra"], r:1}, {p:"¿Hay un coche?", o:["Sí, elevado","No","Está afuera"], r:0}],
        23:[{p:"¿Cuántos niños con gorro?", o:["2","4","3"], r:1}, {p:"¿Hay un pastel?", o:["Sí","No","Es una pizza"], r:0}],
        24:[{p:"¿Nombre panadería?", o:["El Sol","La Luna","Pan Rico"], r:0}, {p:"¿Hay pan afuera?", o:["Sí","No","Hay tortas"], r:0}],
        25:[{p:"¿Qué dice la pizarra?", o:["Hola Juan","Bienvenidos","Tarea"], r:0}, {p:"¿El marco es de madera?", o:["Sí","No, de metal","No tiene"], r:0}],
        26:[{p:"¿Cartel de la pared?", o:["Huesos","Músculos","Anatomía"], r:2}, {p:"¿Hay un escritorio?", o:["Sí","No","Solo sillas"], r:0}],
        27:[{p:"¿Color de la carpa?", o:["Verde","Roja","Azul"], r:2}, {p:"¿Hay una fogata?", o:["Sí","No","Hay una estufa"], r:0}],
        28:[{p:"¿Color del teclado?", o:["Gris","Blanco","Negro"], r:2}, {p:"¿Hay un ratón (mouse)?", o:["Sí","No","No se ve"], r:0}],
        29:[{p:"¿Color del balde?", o:["Rojo","Azul","Amarillo"], r:1}, {p:"¿Hay arena dentro?", o:["Sí","No","Tiene agua"], r:0}],
        30:[{p:"¿Color de la lámpara?", o:["Roja","Verde","Dorada"], r:1}, {p:"¿Está encendida?", o:["Sí","No","Está rota"], r:1}]
    };

    function hablar(t, cb) { 
        window.speechSynthesis.cancel(); 
        const m = new SpeechSynthesisUtterance(t); 
        m.lang = 'es-ES'; m.rate = 0.9; 
        if(cb) m.onend = cb; 
        window.speechSynthesis.speak(m); 
    }

    function iniciarJuego() { prepararNivel(); }

    function prepararNivel() {
        rondaEnNivel = 1;
        const c = configNivel[nivel];
        document.getElementById('tit-nivel').innerText = "NIVEL " + c.n.toUpperCase();
        document.getElementById('desc-nivel').innerText = "Juan, observa bien los detalles.";
        document.getElementById('pantalla-transicion').style.display = 'flex';
        
        hablar(`Juan, Nivel ${c.n}. Observa con atención.`, () => {
            setTimeout(() => {
                document.getElementById('pantalla-transicion').style.display = 'none';
                iniciarObservacion();
            }, 2500);
        });
    }

    function iniciarObservacion() {
        const c = configNivel[nivel];
        let idImg;
        do {
            idImg = Math.floor(Math.random() * (c.r[1] - c.r[0] + 1)) + c.r[0];
        } while (imagenesUsadasGlobal.includes(idImg));
        
        imagenesUsadasGlobal.push(idImg);
        escenaActual = idImg;
        
        const imgDisplay = document.getElementById('display-imagen');
        imgDisplay.src = `mem9/imagen${idImg}.jpeg`; 
        imgDisplay.style.display = 'block';
        
        const timerTxt = document.getElementById('timer');
        timerTxt.style.display = 'block';
        let segundos = c.t;
        timerTxt.innerText = segundos;

        let interval = setInterval(() => {
            segundos--;
            timerTxt.innerText = segundos;
            if(segundos <= 0) {
                clearInterval(interval);
                timerTxt.style.display = 'none';
                imgDisplay.style.display = 'none';
                iniciarQuiz();
            }
        }, 1000);
    }

    function iniciarQuiz() {
        const opciones = bancoPreguntas[escenaActual];
        const data = opciones[Math.floor(Math.random() * opciones.length)];
        
        document.getElementById('pregunta-texto').innerText = data.p;
        const box = document.getElementById('opciones-box');
        box.innerHTML = "";
        
        data.o.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-opcion';
            btn.innerText = opt;
            btn.onpointerdown = (e) => { e.preventDefault(); verificar(index, data.r); };
            box.appendChild(btn);
        });

        document.getElementById('quiz-box').style.display = 'block';
        hablar(data.p);
    }

    function verificar(elegido, correcto) {
        if(elegido === correcto) { aciertos++; hablar("¡Bien!"); } 
        else { errores++; hablar("No."); }
        
        setTimeout(() => {
            document.getElementById('quiz-box').style.display = 'none';
            if(rondaEnNivel < 3) {
                rondaEnNivel++;
                iniciarObservacion();
            } else if(nivel < 3) {
                nivel++;
                prepararNivel();
            } else {
                finalizarSesion();
            }
        }, 1500);
    }

    function finalizarSesion() {
        const ef = Math.round((aciertos / (aciertos + errores || 1)) * 100);
        document.getElementById('resumen-stats').innerHTML = `
            <div class="stat-line"><span>Aciertos:</span> <b>${aciertos}</b></div>
            <div class="stat-line"><span>Errores:</span> <b>${errores}</b></div>
            <div class="stat-line" style="color:var(--primary-green); border:none; font-size:1.8rem;">
                <span>Eficacia:</span> <b>${ef}%</b>
            </div>
        `;
        document.getElementById('overlay-final').style.display = 'flex';
        hablar("Muy bien Juan, hemos terminado.");
    }

    function irAlMenu() {
        const ef = Math.round((aciertos / (aciertos + errores || 1)) * 100);
        const datosSesion = {
            fecha: new Date().toLocaleDateString(),
            modulo: "Memoria", 
            id_sesion: 9,      
            aciertos: aciertos,
            errores: errores,
            eficacia: ef + "%"
        };

        let historial = JSON.parse(localStorage.getItem('sesiones_rehabilitidia')) || []; 
        if (!Array.isArray(historial)) historial = []; 
        historial.push(datosSesion); 
        localStorage.setItem('sesiones_rehabilitidia', JSON.stringify(historial)); 

        window.location.href = "memoria_sesiones.html";
    }
</script>
</body>
</html>

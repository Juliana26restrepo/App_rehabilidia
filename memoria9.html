<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria 9 - Tres Rondas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #E8F5E9; text-align: center; color: #1B5E20; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #cabecera { background: white; height: 75px; display: flex; align-items: center; justify-content: center; border-bottom: 4px solid #FFD700; flex-shrink: 0; }
        #contenedor-principal { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #display-imagen { max-width: 85%; max-height: 60vh; border: 10px solid white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: none; }
        #timer { font-size: 3.5rem; font-weight: bold; color: #2E7D32; margin-top: 15px; display: none; background: white; padding: 10px 40px; border-radius: 50px; border: 3px solid #FFD700; }
        #quiz-box { display: none; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 650px; }
        .btn-opcion { display: block; width: 100%; padding: 18px; margin: 12px 0; font-size: 1.5rem; border: 3px solid #C8E6C9; border-radius: 15px; cursor: pointer; background: #F1F8E9; color: #1B5E20; font-weight: bold; }
        #pantalla-transicion, #overlay-final { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; z-index:1000; }
        #pantalla-transicion { background: #2E7D32; color: white; }
        #overlay-final { background: rgba(27, 94, 32, 0.98); color: white; }
    </style>
</head>
<body onload="iniciarJuego()">

<div id="cabecera">
    <div style="display:flex; align-items:center;">
        <img src="COTERAPEUTA.JPG" style="width:50px; height:50px; border-radius:50%; margin-right:15px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1041/1041916.png'">
        <span id="label-guia" style="font-weight:bold; font-size: 1.2rem;">Observa los detalles...</span>
    </div>
</div>

<div id="contenedor-principal">
    <img id="display-imagen" src="">
    <div id="timer">0</div>
    <div id="quiz-box">
        <div id="pregunta-texto" style="font-size: 1.8rem; font-weight: bold; margin-bottom: 25px;"></div>
        <div id="opciones-box"></div>
    </div>
</div>

<div id="pantalla-transicion">
    <h1 id="tit-nivel" style="font-size: 4rem; background: #FFD700; color: #1B5E20; padding: 10px 50px; border-radius: 50px;"></h1>
    <p id="desc-nivel" style="font-size: 2.2rem; margin-top: 20px; width: 80%;"></p>
</div>

<div id="overlay-final">
    <h1 style="color: #FFD700; font-size: 3.5rem;">¡OBJETIVO LOGRADO!</h1>
    <div id="stats" style="display:flex; gap: 20px; margin: 20px;"></div>
    <p style="font-size: 2.2rem; width: 80%; font-weight: bold;">“Tu mente recuerda más de lo que imaginas, sigue practicando”</p>
    <button onclick="location.reload()" style="padding: 20px 60px; background: #FFD700; color: #1B5E20; border-radius: 20px; font-size: 2rem; border:none; cursor:pointer; font-weight:bold;">REPETIR</button>
</div>

<script>
    let nivel = 1;
    let rondaEnNivel = 1; // Contador para las 3 rondas
    let aciertos = 0;
    let errores = 0;
    let escenaActual = null;
    
    const configNivel = {
        1: { n: "Bajo", t: 15, r: [1, 10] },
        2: { n: "Medio", t: 25, r: [11, 20] },
        3: { n: "Alto", t: 35, r: [21, 30] }
    };

    const bancoPreguntas = {
        1: { p: "¿De qué color era el florero?", o: ["Rojo", "Azul", "Blanco"], r: 1 },
        2: { p: "¿Sobre qué dormía el perro?", o: ["Alfombra verde", "Sofá", "Cesta"], r: 0 },
        3: { p: "¿Qué color era la camiseta del niño?", o: ["Azul", "Amarilla", "Roja"], r: 1 },
        4: { p: "¿Qué animal estaba sobre la silla?", o: ["Un perro", "Un gato blanco", "Un ave"], r: 1 },
        5: { p: "¿Qué había en el plato?", o: ["Huevo y tostada", "Fruta", "Sopa"], r: 0 },
        6: { p: "¿De qué color eran las cortinas?", o: ["Rojas", "Blancas", "Verdes"], r: 1 },
        7: { p: "¿De qué color era el zapato?", o: ["Café", "Negro", "Rojo"], r: 2 },
        8: { p: "¿Qué había sobre el libro?", o: ["Gafas", "Lápiz", "Taza"], r: 0 },
        9: { p: "¿De qué color era la cinta del regalo?", o: ["Plateada", "Dorada", "Roja"], r: 1 },
        10: { p: "¿Qué objeto estaba en el árbol?", o: ["Una red", "Una bicicleta", "Una silla"], r: 1 },
        11: { p: "¿Qué hora marcaba el reloj?", o: ["10:00", "12:00", "8:00"], r: 0 },
        12: { p: "¿Qué animal viste en el parque?", o: ["Un cisne", "Un pato", "Un perro"], r: 1 },
        13: { p: "¿Cuántos lápices viste?", o: ["2", "3", "5"], r: 1 },
        14: { p: "¿De qué color era la toalla?", o: ["Naranja", "Azul", "Verde"], r: 0 },
        15: { p: "¿De qué color eran los cojines?", o: ["Azules", "Rojos", "Amarillos"], r: 2 },
        16: { p: "¿De qué color era la mermelada?", o: ["Fresa", "Piña", "Mora"], r: 0 },
        17: { p: "¿De qué color era el libro del medio?", o: ["Azul", "Rojo", "Verde"], r: 1 },
        18: { p: "¿De qué color era la regadera?", o: ["Verde", "Roja", "Amarilla"], r: 1 },
        19: { p: "¿Qué tipo de reloj era?", o: ["Digital", "De pulsera", "De campana"], r: 2 },
        20: { p: "¿Cómo era la camiseta de la maleta?", o: ["Lisa", "A rayas", "De flores"], r: 1 },
        21: { p: "¿Qué decía el letrero?", o: ["Oferta 2x1", "Liquidación", "Cerrado"], r: 0 },
        22: { p: "¿Qué había en el suelo del taller?", o: ["Agua", "Aceite", "Arena"], r: 1 },
        23: { p: "¿Cuántos niños tenían gorritos?", o: ["2", "4", "6"], r: 1 },
        24: { p: "¿Cómo se llamaba la panadería?", o: ["El Sol", "La Luna", "Pan Rico"], r: 0 },
        25: { p: "¿Qué decía la pizarra?", o: ["Hola Juan", "Tarea", "Dibujo"], r: 0 },
        26: { p: "¿Qué cartel había en la pared?", o: ["Huesos", "Músculos", "Anatomía Humana"], r: 2 },
        27: { p: "¿De qué color era la carpa?", o: ["Verde", "Roja", "Azul"], r: 2 },
        28: { p: "¿De qué color era el teclado?", o: ["Gris", "Blanco", "Negro"], r: 2 },
        29: { p: "¿De qué color era el balde?", o: ["Rojo", "Azul", "Amarillo"], r: 1 },
        30: { p: "¿De qué color era la lámpara?", o: ["Roja", "Verde", "Blanca"], r: 1 }
    };

    function hablar(t, cb) { 
        window.speechSynthesis.cancel(); 
        const m = new SpeechSynthesisUtterance(t); 
        m.lang = 'es-ES'; m.rate = 0.9; 
        if(cb) m.onend = cb; 
        window.speechSynthesis.speak(m); 
    }

    function iniciarJuego() { prepararNivel(); }

    function prepararNivel() {
        rondaEnNivel = 1; // Reiniciamos rondas al cambiar de nivel
        const c = configNivel[nivel];
        document.getElementById('tit-nivel').innerText = "NIVEL " + c.n.toUpperCase();
        document.getElementById('desc-nivel').innerText = "Completaremos 3 ejercicios en este nivel.";
        document.getElementById('pantalla-transicion').style.display = 'flex';
        
        hablar(`Juan, Nivel ${c.n}. Vamos a realizar tres ejercicios. Observa con atención.`, () => {
            setTimeout(() => {
                document.getElementById('pantalla-transicion').style.display = 'none';
                iniciarObservacion();
            }, 3000);
        });
    }

    function iniciarObservacion() {
        const c = configNivel[nivel];
        // Seleccionar imagen aleatoria dentro del rango
        const idImg = Math.floor(Math.random() * (c.r[1] - c.r[0] + 1)) + c.r[0];
        escenaActual = idImg;
        
        const imgDisplay = document.getElementById('display-imagen');
        imgDisplay.src = `mem9/imagen${idImg}.jpeg`; 
        imgDisplay.style.display = 'block';
        
        const timerTxt = document.getElementById('timer');
        timerTxt.style.display = 'block';
        let segundos = c.t;
        timerTxt.innerText = segundos;

        let interval = setInterval(() => {
            segundos--;
            timerTxt.innerText = segundos;
            if(segundos <= 0) {
                clearInterval(interval);
                timerTxt.style.display = 'none';
                imgDisplay.style.display = 'none';
                iniciarQuiz();
            }
        }, 1000);
    }

    function iniciarQuiz() {
        const data = bancoPreguntas[escenaActual];
        document.getElementById('pregunta-texto').innerText = data.p;
        const box = document.getElementById('opciones-box');
        box.innerHTML = "";
        
        data.o.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-opcion';
            btn.innerText = opt;
            btn.onclick = () => verificar(index, data.r);
            box.appendChild(btn);
        });

        document.getElementById('quiz-box').style.display = 'block';
        
        // El coterapeuta dice la pregunta y luego "Selecciona la respuesta"
        hablar(data.p + ". Selecciona la respuesta.");
    }

    function verificar(elegido, correcto) {
        if(elegido === correcto) {
            aciertos++;
            hablar("¡Muy bien!");
        } else {
            errores++;
            hablar("Casi lo logras.");
        }
        
        setTimeout(() => {
            document.getElementById('quiz-box').style.display = 'none';
            
            if(rondaEnNivel < 3) {
                rondaEnNivel++;
                iniciarObservacion(); // Siguiente ronda del mismo nivel
            } else {
                if(nivel < 3) {
                    nivel++;
                    prepararNivel(); // Subir de nivel
                } else {
                    mostrarCierre(); // Fin del juego
                }
            }
        }, 2000);
    }

    function mostrarCierre() {
        document.getElementById('stats').innerHTML = `
            <div style="background:#1B5E20; color:white; padding:15px; border-radius:10px;">Aciertos: ${aciertos}</div>
            <div style="background:#B71C1C; color:white; padding:15px; border-radius:10px;">Errores: ${errores}</div>
        `;
        document.getElementById('overlay-final').style.display = 'flex';
        hablar("Tu mente recuerda más de lo que imaginas, sigue practicando");
    }
</script>
</body>
</html>

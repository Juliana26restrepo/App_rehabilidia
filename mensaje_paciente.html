<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Mensajes - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; --bg: #F4F7F9; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); overflow: hidden; }

        header { background: var(--t-blue); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .btn-volver { color: white; text-decoration: none; font-size: 1.2rem; }

        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card-pro { 
            background: white; padding: 15px; border-radius: 12px; display: flex; align-items: center; 
            gap: 15px; margin-bottom: 10px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* MODAL POP-UP */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000;
        }

        .chat-modal {
            background: white; width: 92%; max-width: 450px; height: 85vh;
            border-radius: 25px; display: flex; flex-direction: column; position: relative;
            overflow: hidden; animation: popUp 0.3s ease;
        }

        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .chat-header { 
            padding: 12px 15px; background: white; border-bottom: 1px solid #eee;
            display: flex; align-items: center; gap: 10px; flex-shrink: 0;
        }

        /* MENÚ DE ADJUNTOS ARRIBA */
        .clip-pop { 
            position: absolute; top: 55px; right: 15px; background: white; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            display: none; flex-direction: column; z-index: 100; border: 1px solid #f0f0f0;
        }
        .clip-pop.active { display: flex; }
        .clip-item { padding: 12px 20px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--p-blue); }
        .clip-item:hover { background: #f8f9fa; }

        #mensajes-box { flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 0.9rem; }
        .msg.paciente { align-self: flex-end; background: var(--p-blue); color: white; border-bottom-right-radius: 2px; }
        .msg.pro { align-self: flex-start; background: #e0e0e0; color: #333; border-bottom-left-radius: 2px; }

        /* BARRA DE ESCRIBIR CON MICRÓFONO */
        .input-area { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: white; padding: 10px 15px; border-top: 1px solid #eee;
            display: flex; align-items: center; gap: 10px;
        }

        .input-pill { flex: 1; background: #f0f2f5; border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; }
        #mensajeInput { flex: 1; border: none; background: transparent; outline: none; }
        
        .icon-btn { color: #888; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .icon-btn:hover { color: var(--t-blue); }

        .btn-send { background: var(--t-blue); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <a href="perfil_paciente.html" class="btn-volver"><i class="fas fa-arrow-left"></i></a>
    <span style="font-weight: bold; margin-left:10px;">Mis Consultas</span>
</header>

<div class="container">
    <div class="card-pro" onclick="abrirChat('Dra. Valderrama', 'chat_rehabilitidia_juan')">
        <div style="width:50px; height:50px; background:var(--p-blue); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white;"><i class="fas fa-user-md"></i></div>
        <div>
            <strong>Dra. Valderrama</strong>
            <p style="margin:5px 0 0; font-size:0.8rem; color:#888;">Especialista asignada</p>
        </div>
    </div>
</div>

<div id="chatModal" class="modal-overlay">
    <div class="chat-modal">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:10px; flex:1">
                <div style="width:35px; height:35px; background:var(--t-blue); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:0.8rem;"><i class="fas fa-user-md"></i></div>
                <strong id="chatNombre">Especialista</strong>
            </div>
            <div style="display:flex; gap:15px; color:var(--p-blue); cursor:pointer; align-items:center;">
                <i class="fas fa-paperclip" onclick="toggleClip(event)"></i>
                <i class="fas fa-times" onclick="cerrarChat()" style="color:#aaa;"></i>
            </div>
        </div>

        <div id="clipMenu" class="clip-pop">
            <div class="clip-item" onclick="alert('Abriendo Cámara...')"><i class="fas fa-camera"></i> Foto / Cámara</div>
            <div class="clip-item" onclick="alert('Buscando Documentos...')"><i class="fas fa-file-pdf"></i> Archivos / Tareas</div>
        </div>

        <div id="mensajes-box"></div>

        <div class="input-area">
            <i class="fas fa-microphone icon-btn" onclick="alert('Grabando audio...')"></i>
            <div class="input-pill">
                <input type="text" id="mensajeInput" placeholder="Escribe a tu doctora..." autocomplete="off">
            </div>
            <button class="btn-send" onclick="enviarMensaje()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
    let chatKey = '';

    function toggleClip(e) {
        e.stopPropagation();
        document.getElementById('clipMenu').classList.toggle('active');
    }

    function abrirChat(nombre, key) {
        chatKey = key;
        document.getElementById('chatNombre').innerText = nombre;
        document.getElementById('chatModal').style.display = 'flex';
        cargarChat();
    }

    function cerrarChat() {
        document.getElementById('chatModal').style.display = 'none';
        document.getElementById('clipMenu').classList.remove('active');
    }

    function cargarChat() {
        if(!chatKey) return;
        const box = document.getElementById('mensajes-box');
        const data = JSON.parse(localStorage.getItem(chatKey)) || [];
        box.innerHTML = data.map(m => `
            <div class="msg ${m.emisor}">${m.texto}</div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    function enviarMensaje() {
        const input = document.getElementById('mensajeInput');
        if(!input.value.trim()) return;

        const data = JSON.parse(localStorage.getItem(chatKey)) || [];
        data.push({ emisor: 'paciente', texto: input.value });
        localStorage.setItem(chatKey, JSON.stringify(data));
        
        input.value = '';
        cargarChat();
    }

    // Auto-refresco cada 2 segundos para ver respuestas de la doctora
    setInterval(() => {
        if (document.getElementById('chatModal').style.display === 'flex') {
            cargarChat();
        }
    }, 2000);

    document.getElementById('mensajeInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') enviarMensaje();
    });

    // Cerrar menú si se hace clic fuera
    document.addEventListener('click', () => {
        const menu = document.getElementById('clipMenu');
        if(menu) menu.classList.remove('active');
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REHABILIDIA - Juan Pérez</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57; --teal-blue: #307B8E; --mughal-green: #366B2B;
            --pastel-blue: #A9D3C5; --light-silver: #CEE5D6; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); overflow-x: hidden; }
        
        header { 
            background-color: var(--prussian-blue); color: var(--white); 
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; 
        }
        .paciente-info { text-align: left; font-size: 0.9rem; }
        .paciente-info strong { font-size: 1.2rem; display: block; color: var(--pastel-blue); }
        .logo-box img { height: 45px; background: white; padding: 5px; border-radius: 8px; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }

        .guia-card { 
            background: white; border-radius: 20px; padding: 20px; 
            display: flex; align-items: center; gap: 20px; 
            margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .guia-card img { width: 80px; height: auto; border-radius: 12px; }
        .burbuja { background: var(--light-silver); padding: 15px; border-radius: 15px; flex: 1; font-size: 1rem; }

        .grid-dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .btn-card {
            background: white; border-radius: 20px; padding: 30px 10px;
            text-align: center; text-decoration: none; color: var(--prussian-blue);
            font-weight: bold; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 6px solid var(--pastel-blue);
        }
        .btn-card i { font-size: 2.2rem; margin-bottom: 10px; color: var(--teal-blue); }
        .btn-large { grid-column: span 2; background-color: var(--mughal-green); color: white; border-bottom-color: rgba(255,255,255,0.2); }
        .btn-large i { color: white; }

        /* BURBUJA DE CHAT FLOTANTE */
        .float-chat {
            position: fixed; bottom: 25px; right: 25px;
            width: 65px; height: 65px; background: var(--prussian-blue);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.8rem; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999; border: 3px solid white;
        }

        /* MODAL (POP-UP) */
        .modal-chat {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .chat-content {
            background: white; width: 92%; max-width: 400px; height: 80vh;
            border-radius: 25px; display: flex; flex-direction: column; overflow: hidden;
            position: relative; animation: popUp 0.3s ease;
        }
        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .chat-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        
        /* MENU ADJUNTOS ARRIBA */
        .clip-pop { 
            position: absolute; top: 60px; right: 20px; background: white; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            display: none; flex-direction: column; z-index: 1001; border: 1px solid #eee;
        }
        .clip-pop.active { display: flex; }
        .clip-item { padding: 12px 20px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--prussian-blue); }

        #box-mensajes { flex: 1; overflow-y: auto; padding: 15px; background: #f8f9fa; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        
        .m-msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 0.9rem; }
        .m-msg.paciente { align-self: flex-end; background: var(--prussian-blue); color: white; border-bottom-right-radius: 2px; }
        .m-msg.pro { align-self: flex-start; background: #e9ecef; color: #333; border-bottom-left-radius: 2px; }

        /* FOOTER CON MICRÓFONO */
        .chat-footer { padding: 10px 15px; border-top: 1px solid #eee; display: flex; align-items: center; gap: 10px; background: white; }
        .input-pill { flex: 1; background: #f1f3f4; border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; }
        .chat-footer input { flex: 1; border: none; background: transparent; outline: none; padding: 5px; }
        .btn-send { background: var(--teal-blue); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <div class="paciente-info">
        <strong>Juan Pérez</strong>
        <span id="fecha">...</span> | <span id="hora">00:00</span>
    </div>
    <div class="logo-box"><img src="logo.jpg" alt="Logo"></div>
</header>

<div class="container">
    <div class="guia-card">
        <img src="COTERAPEUTA.JPG" alt="Coterapeuta">
        <div class="burbuja">¡Hola Juan! Cada esfuerzo cuenta. ¡Vamos con toda hoy!</div>
    </div>
    <div class="grid-dashboard">
        <a href="ejercicios.html" class="btn-card btn-large"><i class="fas fa-brain"></i> EJERCICIOS</a>
        <a href="videos.html" class="btn-card"><i class="fas fa-play-circle"></i> VIDEOS</a>
        <a href="diario.html" class="btn-card"><i class="fas fa-book-medical"></i> MI DIARIO</a>
        <a href="datos.html" class="btn-card"><i class="fas fa-chart-bar"></i> MIS DATOS</a>
        <a href="ajustes.html" class="btn-card"><i class="fas fa-sliders-h"></i> AJUSTES</a>
    </div>
</div>

<div class="float-chat" onclick="abrirC()"><i class="fas fa-comment-dots"></i></div>

<div id="mChat" class="modal-chat">
    <div class="chat-content">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:35px; height:35px; background:var(--teal-blue); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white;"><i class="fas fa-user-md"></i></div>
                <strong>Dra. Valderrama</strong>
            </div>
            <div style="display:flex; gap:15px; align-items:center;">
                <i class="fas fa-paperclip" style="cursor:pointer; color:var(--prussian-blue);" onclick="toggleClip(event)"></i>
                <i class="fas fa-times" onclick="cerrarC()" style="cursor:pointer; color:#aaa; font-size:1.2rem;"></i>
            </div>
        </div>

        <div id="clipMenu" class="clip-pop">
            <div class="clip-item" onclick="alert('Cámara')"><i class="fas fa-camera"></i> Foto / Cámara</div>
            <div class="clip-item" onclick="alert('Archivos')"><i class="fas fa-file-pdf"></i> Tareas / Archivos</div>
        </div>

        <div id="box-mensajes"></div>

        <div class="chat-footer">
            <i class="fas fa-microphone" style="color:#888; cursor:pointer; font-size:1.2rem;" onclick="alert('Grabando...')"></i>
            <div class="input-pill">
                <input type="text" id="iMsg" placeholder="Escribe a tu doctora...">
            </div>
            <button class="btn-send" onclick="enviarM()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const K = 'chat_rehabilitidia_juan';

    function reloj() {
        const d = new Date();
        document.getElementById('fecha').textContent = d.toLocaleDateString('es-ES', {day:'numeric', month:'long'});
        document.getElementById('hora').textContent = d.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
    }
    setInterval(reloj, 1000); reloj();

    function toggleClip(e) {
        e.stopPropagation();
        document.getElementById('clipMenu').classList.toggle('active');
    }

    function abrirC() { 
        document.getElementById('mChat').style.display = 'flex'; 
        cargarM(); 
    }
    
    function cerrarC() { 
        document.getElementById('mChat').style.display = 'none'; 
        document.getElementById('clipMenu').classList.remove('active');
    }

    function cargarM() {
        const b = document.getElementById('box-mensajes');
        const d = JSON.parse(localStorage.getItem(K)) || [];
        b.innerHTML = d.map(m => `<div class="m-msg ${m.emisor}">${m.texto}</div>`).join('');
        b.scrollTop = b.scrollHeight;
    }

    function enviarM() {
        const i = document.getElementById('iMsg');
        if(!i.value.trim()) return;
        const d = JSON.parse(localStorage.getItem(K)) || [];
        d.push({ emisor: 'paciente', texto: i.value });
        localStorage.setItem(K, JSON.stringify(d));
        i.value = '';
        cargarM();
    }

    // Auto-refresco
    setInterval(() => {
        if (document.getElementById('mChat').style.display === 'flex') cargarM();
    }, 2000);

    document.addEventListener('click', () => {
        document.getElementById('clipMenu').classList.remove('active');
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Clínico - REHABILIDIA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --prussian-blue: #103A57; --teal-blue: #307B8E; --mughal-green: #366B2B;
            --light-silver: #CEE5D6; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light-silver); color: var(--prussian-blue); }
        header { background-color: var(--prussian-blue); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .btn-volver { color: white; text-decoration: none; }
        
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; padding-bottom: 60px; }
        .card-registro { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--teal-blue); }
        
        .fecha { font-size: 0.8rem; color: #666; font-weight: bold; margin-bottom: 5px; display: block; }
        .emocion-tag { display: inline-block; background: var(--light-silver); padding: 4px 10px; border-radius: 10px; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; }
        .detalle { font-size: 0.95rem; margin: 5px 0; }
        .sintomas-list { font-size: 0.85rem; color: #d9534f; font-weight: bold; }
        
        .sin-datos { text-align: center; margin-top: 50px; color: #888; }
        .btn-borrar { background: transparent; color: #d9534f; border: 1px solid #d9534f; padding: 8px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="btn-volver"><i class="fas fa-chevron-left"></i></a>
    <span style="font-weight: bold;">HISTORIAL DE SEGUIMIENTO</span>
</header>

<div class="container">
    <div id="contenedor-historial">
        </div>
    
    <button class="btn-borrar" onclick="limpiarHistorial()">
        <i class="fas fa-trash"></i> BORRAR TODO EL HISTORIAL
    </button>
</div>

<script>
    function cargarHistorial() {
        const contenedor = document.getElementById('contenedor-historial');
        // Obtenemos los datos que guardamos en diario.html
        const historial = JSON.parse(localStorage.getItem('historial_rehabilitidia')) || [];

        if (historial.length === 0) {
            contenedor.innerHTML = '<div class="sin-datos"><i class="fas fa-folder-open fa-3x"></i><p>Aún no hay registros guardados.</p></div>';
            return;
        }

        // Invertimos el orden para que el más reciente aparezca arriba
        historial.reverse().forEach(reg => {
            const div = document.createElement('div');
            div.className = 'card-registro';
            
            // Creamos la lista de síntomas si existen
            const textoSintomas = reg.sintomas && reg.sintomas.length > 0 
                ? `<div class="sintomas-list">⚠️ Síntomas: ${reg.sintomas.join(', ')}</div>` 
                : '';

            div.innerHTML = `
                <span class="fecha"><i class="far fa-calendar-alt"></i> ${reg.fecha}</span>
                <div class="emocion-tag">Sentimiento: ${reg.emocion}</div>
                <div class="detalle"><strong>Energía:</strong> ${reg.energia}/10</div>
                ${textoSintomas}
                <div class="detalle" style="background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top:10px;">
                    <strong>Nota:</strong> ${reg.nota || 'Sin observaciones.'}
                </div>
            `;
            contenedor.appendChild(div);
        });
    }

    function limpiarHistorial() {
        if(confirm("¿Seguro que quieres borrar todos los registros del historial?")) {
            localStorage.removeItem('historial_rehabilitidia');
            location.reload();
        }
    }

    document.addEventListener('DOMContentLoaded', cargarHistorial);
</script>

<script src="logica_rehabilitacion.js"></script>

</body>
</html>

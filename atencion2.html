    <title>Sesión 2: Rutinas Panorámicas - REHABILIDIA</title>

    <style>
        :root { --p-blue: #103A57; --t-blue: #307B8E; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            background-color: #B0E0E6; 
        }

        /* Contenedor con scroll lateral para Juan */
        #pantalla-juego {
            width: 100vw; height: 100vh;
            overflow-x: scroll; 
            overflow-y: hidden;
            display: flex; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Escenario panorámico ancho con el NUEVO FONDO */
        #escenario-ancho {
            width: 300vw; /* Tres veces el ancho de la pantalla para explorar */
            height: 100vh;
            /* INTEGRACIÓN DEL NUEVO FONDO PANORÁMICO SUBIDO */
            background-image: url('fondo_bano.png'); 
            background-size: 100% 100%; /* Se adapta a lo ancho y alto del escenario ancho */
            background-repeat: no-repeat;
            background-position: center;
            position: relative; 
            flex-shrink: 0;
        }

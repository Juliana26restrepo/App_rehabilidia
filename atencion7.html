<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sesión 7 - Atención Alternante - REHABILIDIA</title>
    <style>
        :root { --p-blue: #0A253A; --t-blue: #307B8E; --bg-light: #f4f7f6; --gold: #FFD700; }
        * { box-sizing: border-box; touch-action: none; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        header { background: var(--p-blue); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--gold); }

        #guia-box { background: white; width: 95%; max-width: 800px; border-radius: 10px; padding: 10px; display: flex; align-items: center; border: 3px solid var(--t-blue); margin: 8px auto; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; }
        #texto-guia { font-size: 0.9rem; font-weight: bold; color: var(--p-blue); margin: 0; }
        
        #escenario { flex: 1; display: flex; background: url('img7/mesa.png') no-repeat center; background-size: cover; position: relative; }
        
        #zona-preparacion { width: 65%; position: relative; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 50px; }
        #bowl { width: 320px; z-index: 5; }

        #interfaz-derecha { width: 35%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; border-left: 3px solid var(--p-blue); }
        
        #seccion-celular { height: 30%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 2px solid #ccc; }
        #celular { width: 70px; cursor: pointer; }
        .vibrar { animation: shake 0.2s infinite; filter: drop-shadow(0 0 10px red); }
        @keyframes shake { 0% { transform: rotate(0); } 25% { transform: rotate(5deg); } 75% { transform: rotate(-5deg); } 100% { transform: rotate(0); } }
        
        #despensa { height: 70%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; overflow-y: auto; }
        .item { width: 100%; max-width: 80px; aspect-ratio: 1; margin: auto; object-fit: contain; cursor: grab; }
        .dragging { position: fixed !important; z-index: 1000 !important; width: 80px !important; pointer-events: none; }

        #modal-cierre { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 37, 58, 0.9); z-index: 2000; justify-content: center; align-items: center; }
        .stats-box { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 400px; }
        button { padding: 15px; width: 100%; background: var(--t-blue); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div id="status-nivel">Nivel 1</div>
    <div id="status-puntos">Aciertos: 0</div>
</header>

<div id="guia-box" onclick="iniciar()">
    <img src="COTERAPEUTA.JPG" id="avatar">
    <p id="texto-guia">Juan, toca aquí para empezar.</p>
</div>

<div id="escenario">
    <div id="zona-preparacion">
        <img src="img7/bowl.png" id="bowl">
    </div>
    <div id="interfaz-derecha">
        <div id="seccion-celular">
            <p id="status-cel" style="font-size: 0.7rem; font-weight: bold;">TELÉFONO EN ESPERA</p>
            <img src="img7/celular.png" id="celular" onclick="contestar()">
        </div>
        <div id="despensa"></div>
    </div>
</div>

<div id="modal-cierre">
    <div class="stats-box">
        <h2>Sesión Completada</h2>
        <div id="stats-detalle"></div>
        <button onclick="window.location.href='menu.html'">TERMINAR</button>
    </div>
</div>

<script>
    let nivel = 1, aciertosNivel = 0, totalAciertos = 0, totalErrores = 0, receta = [], iniciada = false, llamadaActiva = false;
    const ringtone = new Audio("img7/ringtone.mp3");

    function hablar(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        document.getElementById('texto-guia').innerText = txt;
        window.speechSynthesis.speak(msg);
    }

    function iniciar() { if(!iniciada) { iniciada = true; cargarNivel(); } }

    function cargarNivel() {
        const despensa = document.getElementById('despensa');
        despensa.innerHTML = ""; aciertosNivel = 0;
        document.getElementById('status-nivel').innerText = `Nivel ${nivel}`;

        if(nivel === 1) {
            receta = ['huevo_crudo.png', 'sal.png', 'tomate.png', 'cebolla.png'];
            hablar("Nivel 1: Pon en el bowl huevo, sal, tomate y cebolla.");
        } else {
            receta = ['avena_cruda.png', 'arandano.png', 'fresa.png', 'leche.png', 'banano.png', 'azucar_morena.png'];
            hablar("Nivel 2: Prepara la avena con todos sus ingredientes.");
        }

        let pool = [...receta, 'uva.png', 'sandia.png', 'mango.png'].sort(() => Math.random() - 0.5);
        pool.forEach(img => {
            const el = document.createElement('img');
            el.src = `img7/${img}`; el.className = 'item'; el.dataset.id = img;
            el.onpointerdown = startDrag;
            despensa.appendChild(el);
        });
        setTimeout(lanzarLlamada, 8000);
    }

    function lanzarLlamada() {
        if(!iniciada) return;
        llamadaActiva = true;
        document.getElementById('celular').classList.add('vibrar');
        document.getElementById('status-cel').innerText = "¡LLAMADA ENTRANTE!";
        ringtone.play();
        hablar("¡Juan, contesta el teléfono!");
    }

    function contestar() {
        if(llamadaActiva) {
            llamadaActiva = false;
            document.getElementById('celular').classList.remove('vibrar');
            document.getElementById('status-cel').innerText = "EN LLAMADA...";
            ringtone.pause(); ringtone.currentTime = 0;
            hablar("Hola Juan, sigue concentrado en tu receta.");
            setTimeout(() => {
                document.getElementById('status-cel').innerText = "TELÉFONO EN ESPERA";
                if(iniciada) setTimeout(lanzarLlamada, 12000);
            }, 4000);
        }
    }

    function startDrag(e) {
        const el = e.target;
        const rect = el.getBoundingClientRect();
        const offsetX = e.clientX - rect.left;
        const offsetY = e.clientY - rect.top;
        el.classList.add('dragging');

        const move = (me) => {
            el.style.left = (me.clientX - offsetX) + 'px';
            el.style.top = (me.clientY - offsetY) + 'px';
        };

        const stop = (se) => {
            el.classList.remove('dragging');
            window.removeEventListener('pointermove', move);
            window.removeEventListener('pointerup', stop);

            const bowl = document.getElementById('bowl').getBoundingClientRect();
            if(se.clientX > bowl.left && se.clientX < bowl.right && se.clientY > bowl.top && se.clientY < bowl.bottom) {
                if(receta.includes(el.dataset.id)) {
                    totalAciertos++; aciertosNivel++;
                    document.getElementById('status-puntos').innerText = `Aciertos: ${totalAciertos}`;
                    el.style.display = 'none';
                    if(aciertosNivel === receta.length) {
                        if(nivel < 2) { nivel++; setTimeout(cargarNivel, 2000); }
                        else { finalizar(); }
                    }
                } else {
                    totalErrores++;
                    hablar("Ese ingrediente no va aquí.");
                    el.style.position = 'static';
                }
            } else { el.style.position = 'static'; }
        };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', stop);
    }

    function finalizar() {
        iniciada = false; ringtone.pause();
        const ef = Math.round((totalAciertos / (totalAciertos + totalErrores)) * 100) || 0;
        document.getElementById('stats-detalle').innerHTML = `Aciertos: ${totalAciertos}<br>Errores: ${totalErrores}<br>Eficacia: ${ef}%`;
        document.getElementById('modal-cierre').style.display = 'flex';
        hablar("¡Muy bien Juan! Terminaste la sesión.");
    }
</script>
</body>
</html>

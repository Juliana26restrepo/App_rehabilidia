<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sesión 7 - Atención Alternante - REHABILIDIA</title>
    <style>
        :root { --p-blue: #0A253A; --t-blue: #307B8E; --bg-light: #eef2f5; --gold: #FFD700; --danger: #e74c3c; }
        * { box-sizing: border-box; touch-action: none; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-light); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: var(--p-blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--gold); }

        #guia-box { background: white; width: 95%; max-width: 800px; border-radius: 15px; padding: 10px; display: flex; align-items: center; border: 3px solid var(--t-blue); margin: 8px auto; cursor: pointer; position: relative; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 12px; border: 2px solid var(--t-blue); }
        #texto-guia { font-size: 0.95rem; font-weight: bold; color: var(--p-blue); margin: 0; flex: 1; }

        #zona-juego { flex: 1; display: flex; padding: 10px; gap: 10px; height: calc(100vh - 160px); }

        /* COCINA */
        #panel-preparacion { flex: 1.2; border-radius: 20px; background: white; border: 2px solid #cbd5e1; position: relative; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(#f1f5f9 1px, transparent 1px); background-size: 20px 20px; }
        #bowl { width: 60%; max-width: 280px; z-index: 5; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }

        /* PANEL DERECHO */
        #panel-derecho { flex: 0.8; display: flex; flex-direction: column; gap: 10px; }
        
        #seccion-celular { height: 150px; background: white; border-radius: 20px; border: 3px solid var(--t-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #celular { width: 65px; cursor: pointer; transition: transform 0.2s; z-index: 10; }
        
        .vibrar { animation: shake 0.2s infinite; filter: drop-shadow(0 0 15px var(--danger)); }
        @keyframes shake { 0% { transform: rotate(0); } 25% { transform: rotate(5deg); } 75% { transform: rotate(-5deg); } 100% { transform: rotate(0); } }

        #despensa { flex: 1; background: white; border-radius: 20px; border: 2px solid #cbd5e1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; overflow-y: auto; align-content: start; }
        
        .item { width: 100%; max-width: 80px; aspect-ratio: 1; cursor: grab; object-fit: contain; margin: auto; }
        .dragging { position: fixed !important; z-index: 5000 !important; width: 85px !important; pointer-events: none; }

        #modal-cierre { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 37, 58, 0.95); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .stats-box { background: white; color: var(--p-blue); padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div id="status-nivel">Sesión 7: Cocina y Teléfono</div>
    <div id="status-puntos">Aciertos: 0</div>
</header>

<div id="guia-box" onclick="iniciarSesion()">
    <img src="COTERAPEUTA.JPG" id="avatar">
    <p id="texto-guia">Juan, toca mi foto para empezar a cocinar.</p>
</div>

<div id="zona-juego">
    <div id="panel-preparacion">
        <img src="img7/bowl.png" id="bowl" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1830/1830606.png'">
        <div id="drop-zone" style="position:absolute; width:100%; height:100%;"></div>
    </div>

    <div id="panel-derecho">
        <div id="seccion-celular">
            <p id="status-cel" style="font-size: 0.8rem; font-weight: bold; color: var(--p-blue); margin: 5px;">ESPERANDO LLAMADA</p>
            <img src="img7/celular.png" id="celular" onclick="contestar()" onerror="this.src='https://cdn-icons-png.flaticon.com/512/727/727269.png'">
        </div>
        <div id="despensa"></div>
    </div>
</div>

<div id="modal-cierre">
    <div class="stats-box">
        <h2>¡Sesión Completada!</h2>
        <div id="stats-detalle" style="margin: 20px 0; font-size: 1.1rem;"></div>
        <button onclick="window.location.href='menu.html'" style="padding:15px 30px; background:var(--t-blue); color:white; border:none; border-radius:50px; cursor:pointer; font-weight:bold; width:100%;">REGRESAR AL MENÚ</button>
    </div>
</div>

<script>
    let nivel = 1, aciertos = 0, errores = 0, receta = [], llamadaActiva = false, iniciado = false;
    let totalAciertos = 0, totalErrores = 0;
    const ringtone = new Audio("img7/ringtone.mp3");

    function hablar(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'es-ES';
        document.getElementById('texto-guia').innerText = txt;
        window.speechSynthesis.speak(msg);
    }

    function iniciarSesion() {
        if(!iniciado) {
            iniciado = true;
            cargarNivel();
            setTimeout(lanzarLlamada, 5000);
        }
    }

    function cargarNivel() {
        const d = document.getElementById('despensa');
        d.innerHTML = ""; aciertos = 0;
        
        if(nivel === 1) {
            receta = ['huevo_crudo.png', 'sal.png', 'tomate.png'];
            hablar("Nivel 1: Pon Huevo, Sal y Tomate en el bowl. ¡Atento al teléfono!");
        } else {
            receta = ['avena_cruda.png', 'leche.png', 'fresa.png', 'banano.png'];
            hablar("Nivel 2: Pon Avena, Leche, Fresa y Banano.");
        }

        let pool = [...receta, 'jabon.png', 'moneda.png'].sort(() => Math.random() - 0.5);
        pool.forEach(img => {
            const el = document.createElement('img');
            el.src = `img7/${img}`;
            el.className = 'item';
            el.dataset.id = img;
            el.onpointerdown = startDrag;
            d.appendChild(el);
        });
    }

    function lanzarLlamada() {
        if(!iniciado) return;
        llamadaActiva = true;
        document.getElementById('celular').classList.add('vibrar');
        document.getElementById('status-cel').innerText = "¡LLAMADA ENTRANTE!";
        ringtone.play().catch(e => console.log("Audio bloqueado"));
        hablar("¡Juan, contesta el teléfono rápido!");
    }

    function contestar() {
        if(llamadaActiva) {
            llamadaActiva = false;
            document.getElementById('celular').classList.remove('vibrar');
            document.getElementById('status-cel').innerText = "EN LLAMADA...";
            ringtone.pause();
            ringtone.currentTime = 0;
            hablar("Hola Juan, sigue cocinando, vas muy bien.");
            setTimeout(() => {
                document.getElementById('status-cel').innerText = "ESPERANDO LLAMADA";
                if(iniciado) setTimeout(lanzarLlamada, 12000);
            }, 4000);
        }
    }

    function startDrag(e) {
        const el = e.target;
        const rect = el.getBoundingClientRect();
        const offsetX = e.clientX - rect.left;
        const offsetY = e.clientY - rect.top;
        el.classList.add('dragging');

        function mover(me) {
            el.style.left = (me.clientX - offsetX) + 'px';
            el.style.top = (me.clientY - offsetY) + 'px';
        }

        function soltar(se) {
            el.classList.remove('dragging');
            window.removeEventListener('pointermove', mover);
            window.removeEventListener('pointerup', soltar);

            const bowl = document.getElementById('bowl').getBoundingClientRect();
            if(se.clientX > bowl.left && se.clientX < bowl.right && se.clientY > bowl.top && se.clientY < bowl.bottom) {
                if(receta.includes(el.dataset.id)) {
                    aciertos++; totalAciertos++;
                    document.getElementById('status-puntos').innerText = `Aciertos: ${totalAciertos}`;
                    el.style.display = 'none';
                    if(aciertos === receta.length) {
                        if(nivel < 2) { nivel++; setTimeout(cargarNivel, 1500); }
                        else { finalizar(); }
                    }
                } else {
                    totalErrores++;
                    hablar("Eso no va en la receta.");
                    el.style.position = 'static';
                }
            } else { el.style.position = 'static'; }
        }
        window.addEventListener('pointermove', mover);
        window.addEventListener('pointerup', soltar);
    }

    function finalizar() {
        iniciado = false;
        ringtone.pause();
        const ef = Math.round((totalAciertos / (totalAciertos + totalErrores)) * 100) || 0;
        document.getElementById('stats-detalle').innerHTML = `Aciertos: ${totalAciertos}<br>Errores: ${totalErrores}<br>Eficacia: ${ef}%`;
        document.getElementById('modal-cierre').style.display = 'flex';
        hablar("¡Excelente trabajo Juan! Completaste la tarea alternante.");
    }
</script>
</body>
</html>
